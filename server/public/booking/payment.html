<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Secure Payment – Sunbeam</title>

<script src="https://js.stripe.com/v3/"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.container{
  width:95%;
  max-width:420px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.title{
  text-align:center;
  margin-bottom:15px;
  font-size:20px;
}

.trip-info{
  font-size:13px;
  margin-bottom:10px;
  opacity:0.8;
}

.amount{
  font-size:22px;
  font-weight:bold;
  margin-bottom:15px;
  color:#22c55e;
}

#card-element{
  background:#fff;
  padding:12px;
  border-radius:10px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:12px;
  font-size:16px;
  cursor:pointer;
  background:#22c55e;
  color:#fff;
}

button:hover{
  background:#16a34a;
}

.msg{
  margin-top:10px;
  text-align:center;
}

.success{ color:#22c55e; }
.error{ color:red; }

/* 📱 Mobile */
@media(max-width:500px){
  body{
    padding:15px;
    align-items:flex-start;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="title">💳 Complete Payment</div>

    <div class="trip-info" id="tripInfo">Loading trip...</div>

    <div class="amount" id="amount">$0</div>

    <div id="card-element"></div>

    <button id="payBtn">Pay Now</button>

    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
let stripe;
let elements;
let card;
let tripId;
let amount = 0;

// 🔥 1. نجيب tripId من اللينك
const params = new URLSearchParams(window.location.search);
tripId = params.get("tripId");

// 🔥 2. نجيب بيانات الرحلة
async function loadTrip(){
  const res = await fetch(`/api/trips/${tripId}`);
  const data = await res.json();

  if(!data || !data._id){
    document.getElementById("tripInfo").innerText = "Trip not found";
    return;
  }

  amount = data.priceAmount || 0;

  document.getElementById("tripInfo").innerHTML =
    `${data.pickup} ➜ ${data.dropoff}`;

  document.getElementById("amount").innerText =
    `$${amount}`;
}

// 🔥 3. Stripe Init
async function initStripe(){
  const res = await fetch("/api/config");
  const data = await res.json();

  stripe = Stripe(data.publishableKey);

  elements = stripe.elements();
  card = elements.create("card");
  card.mount("#card-element");
}

// 🔥 4. الدفع
document.getElementById("payBtn").onclick = async () => {

  if(!amount){
    alert("Invalid amount");
    return;
  }

  // 🔥 create payment intent
  const res = await fetch("/api/create-payment-intent",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ amount })
  });

  const data = await res.json();

  const result = await stripe.confirmCardPayment(data.clientSecret,{
    payment_method:{ card }
  });

  if(result.error){

    document.getElementById("msg").innerHTML =
      `<div class="error">${result.error.message}</div>`;

  }else{

    const paymentIntentId = result.paymentIntent.id;

    // 🔥 نبعت للسيرفر
    await fetch("/api/payment-success",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        tripId,
        paymentIntentId
      })
    });

    document.getElementById("msg").innerHTML =
      `<div class="success">Payment Successful 🎉</div>`;

    // 🔥 redirect بعد الدفع
    setTimeout(()=>{
      window.location.href = "/";
    },2000);
  }
};

// تشغيل
loadTrip();
initStripe();
</script>

</body>
</html>
