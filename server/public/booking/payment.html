<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Complete Payment – Sunbeam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://js.stripe.com/v3/"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#0f172a,#1d4ed8);
  color:#fff;
  padding:16px;
}

.box{
  width:100%;
  max-width:390px;
  background:#111827;
  border-radius:18px;
  padding:24px;
  box-shadow:0 15px 35px rgba(0,0,0,.45);
  text-align:center;
}

h2{
  margin:0 0 18px;
  font-size:22px;
}

.amount{
  font-size:32px;
  font-weight:bold;
  color:#22c55e;
  margin-bottom:18px;
}

#card-element{
  background:#fff;
  padding:14px;
  border-radius:10px;
  margin-bottom:16px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#fff;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  background:#64748b;
  cursor:not-allowed;
}

.msg{
  margin-top:15px;
  font-size:14px;
  line-height:1.5;
}

.success{color:#22c55e}
.error{color:#ef4444}
.loading{color:#facc15}
</style>
</head>

<body>

<div class="box">
  <h2>Complete Payment</h2>

  <div class="amount" id="amountText">Loading...</div>

  <div id="card-element"></div>

  <button id="payBtn" disabled>Pay Now</button>

  <div id="msg" class="msg"></div>
</div>

<script>
let stripe = null;
let elements = null;
let card = null;
let tripId = null;
let amount = 0;

const amountText = document.getElementById("amountText");
const payBtn = document.getElementById("payBtn");
const msg = document.getElementById("msg");

function showError(text){
  msg.innerHTML = `<div class="error">${text}</div>`;
}

function showLoading(text){
  msg.innerHTML = `<div class="loading">${text}</div>`;
}

function showSuccess(){
  msg.innerHTML = `
    <div class="success">
      Payment successful ✔<br>
      A confirmation email has been sent with your booking details.
    </div>
  `;
}

async function initPaymentPage(){
  try{
    const params = new URLSearchParams(window.location.search);
    tripId = params.get("tripId");

    if(!tripId){
      amountText.innerText = "$0";
      showError("Missing trip ID.");
      return;
    }

    showLoading("Loading payment...");

    const tripRes = await fetch(`/api/trips/${tripId}`);
    const trip = await tripRes.json();

    if(!tripRes.ok || !trip || !trip._id){
      amountText.innerText = "$0";
      showError("Trip not found.");
      return;
    }

    amount = Number(trip.priceAmount || 0);

    if(!amount || amount <= 0){
      amountText.innerText = "$0";
      showError("Invalid trip price.");
      return;
    }

    amountText.innerText = `$${amount.toFixed(2)}`;

    const configRes = await fetch("/api/config");
    const config = await configRes.json();

    if(!config.publishableKey){
      showError("Stripe publishable key missing.");
      return;
    }

    stripe = Stripe(config.publishableKey);
    elements = stripe.elements();
    card = elements.create("card");
    card.mount("#card-element");

    payBtn.disabled = false;
    msg.innerHTML = "";

  }catch(err){
    console.log(err);
    amountText.innerText = "$0";
    showError("Payment page failed to load.");
  }
}

payBtn.onclick = async function(){
  try{
    payBtn.disabled = true;
    payBtn.innerText = "Processing...";
    showLoading("Processing payment...");

    const intentRes = await fetch("/api/create-payment-intent",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        amount: amount,
        tripId: tripId
      })
    });

    const intentData = await intentRes.json();

    if(!intentRes.ok || !intentData.clientSecret){
      showError("Unable to start payment.");
      payBtn.disabled = false;
      payBtn.innerText = "Pay Now";
      return;
    }

    const result = await stripe.confirmCardPayment(intentData.clientSecret,{
      payment_method:{
        card:card
      }
    });

    if(result.error){
      showError(result.error.message);
      payBtn.disabled = false;
      payBtn.innerText = "Pay Now";
      return;
    }

    const paymentIntentId = result.paymentIntent.id;

    const successRes = await fetch("/api/payment-success",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        tripId:tripId,
        paymentIntentId:paymentIntentId
      })
    });

    if(!successRes.ok){
      showError("Payment completed, but booking confirmation failed.");
      return;
    }

    showSuccess();
    payBtn.style.display = "none";

  }catch(err){
    console.log(err);
    showError("Payment failed.");
    payBtn.disabled = false;
    payBtn.innerText = "Pay Now";
  }
};

initPaymentPage();
</script>

</body>
</html>
