<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://js.stripe.com/v3/"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.box{
  background:#111827;
  padding:25px;
  border-radius:16px;
  width:90%;
  max-width:360px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.amount{
  font-size:30px;
  color:#22c55e;
  margin-bottom:15px;
  font-weight:bold;
}

#card-element{
  background:#fff;
  padding:12px;
  border-radius:10px;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

button:disabled{
  background:#555;
  cursor:not-allowed;
}

.msg{
  margin-top:12px;
  font-size:14px;
}

.success{color:#22c55e}
.error{color:#ef4444}
</style>
</head>

<body>

<div class="box">

  <div class="amount" id="amount">Loading...</div>

  <div id="card-element"></div>

  <button id="payBtn" disabled>Pay Now</button>

  <div class="msg" id="msg"></div>

</div>

<script>
let stripe, elements, card;
let tripId = null;
let amount = 0;

// get tripId
const params = new URLSearchParams(window.location.search);
tripId = params.get("tripId");

// load trip
async function loadTrip(){
  try{
    const res = await fetch(`/api/trips/${tripId}`);
    const data = await res.json();

    if(!data || !data._id){
      amountEl.innerText = "Trip not found";
      return;
    }

    amount = Number(data.priceAmount || 0);

    if(!amount){
      amountEl.innerText = "Invalid amount";
      return;
    }

    amountEl.innerText = `$${amount}`;
    payBtn.disabled = false;

  }catch(err){
    amountEl.innerText = "Error loading trip";
  }
}

// stripe init
async function init(){
  const res = await fetch("/api/config");
  const data = await res.json();

  stripe = Stripe(data.publishableKey);
  elements = stripe.elements();

  card = elements.create("card");
  card.mount("#card-element");
}

// payment
payBtn.onclick = async ()=>{

  payBtn.disabled = true;
  payBtn.innerText = "Processing...";

  try{

    const res = await fetch("/api/create-payment-intent",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ amount })
    });

    const data = await res.json();

    const result = await stripe.confirmCardPayment(data.clientSecret,{
      payment_method:{ card }
    });

    if(result.error){
      msg.innerHTML = `<div class="error">${result.error.message}</div>`;
      payBtn.disabled = false;
      payBtn.innerText = "Pay Now";
      return;
    }

    const paymentIntentId = result.paymentIntent.id;

    await fetch("/api/payment-success",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        tripId,
        paymentIntentId
      })
    });

    msg.innerHTML = `
      <div class="success">
        Payment successful ✔<br>
        A confirmation email has been sent with your booking details.
      </div>
    `;

  }catch(err){
    msg.innerHTML = `<div class="error">Payment failed</div>`;
    payBtn.disabled = false;
    payBtn.innerText = "Pay Now";
  }
};

loadTrip();
init();
</script>

</body>
</html>
