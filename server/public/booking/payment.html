<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Complete Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://js.stripe.com/v3/"></script>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#2563eb);
  font-family:Arial;
}

.box{
  background:#111827;
  padding:25px;
  border-radius:12px;
  width:320px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,.4);
}

h2{
  color:#fff;
  margin-bottom:15px;
}

.price{
  color:#22c55e;
  font-size:22px;
  font-weight:bold;
  margin-bottom:15px;
}

#card-element{
  background:#fff;
  padding:12px;
  border-radius:8px;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:14px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  opacity:.6;
}

.msg{
  margin-top:15px;
  color:#22c55e;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Complete Payment</h2>
  <div class="price" id="price">$0</div>
  <div id="card-element"></div>
  <button id="payBtn">Pay Now</button>
  <div id="msg" class="msg"></div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const tripId = urlParams.get("tripId");

let stripe, elements, card, clientSecret, amount = 0;

// 🔥 STEP 1: Load trip data
async function loadTrip(){
  const res = await fetch("/api/trips/" + tripId);
  const trip = await res.json();

  if(!res.ok){
    alert("Trip not found");
    return;
  }

  amount = trip.priceAmount || 0;
  document.getElementById("price").innerText = "$" + amount;

  // 🔥 STEP 2: Create payment intent
  const payRes = await fetch("/api/create-payment-intent",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ amount })
  });

  const payData = await payRes.json();
  clientSecret = payData.clientSecret;

  // 🔥 STEP 3: Stripe init
  const config = await fetch("/api/config").then(r=>r.json());

  stripe = Stripe(config.publishableKey);

  elements = stripe.elements();
  card = elements.create("card");
  card.mount("#card-element");
}

// 🔥 STEP 4: Payment click
document.getElementById("payBtn").onclick = async () => {
  const btn = document.getElementById("payBtn");
  btn.disabled = true;

  const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, {
    payment_method: {
      card: card
    }
  });

  if(error){
    alert(error.message);
    btn.disabled = false;
    return;
  }

  // 🔥 STEP 5: Notify server
  await fetch("/api/payment-success",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      tripId,
      paymentIntentId: paymentIntent.id
    })
  });

  // ✅ SUCCESS UI
  document.getElementById("msg").innerText =
    "Payment successful ✔ Email with booking details has been sent";

  btn.style.display = "none";
};

// 🔥 INIT
loadTrip();
</script>

</body>
</html>
