<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking – Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial,sans-serif;
  background:#f8fafc;
  margin:0;
  padding:20px;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:12px;
  max-width:750px;
  margin:auto;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
}

h1{margin-bottom:10px}

label{
  display:block;
  margin-top:15px;
  font-size:13px;
  color:#374151;
}

input,textarea,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  font-size:14px;
  border:1px solid #d1d5db;
  border-radius:6px;
}

input[readonly],textarea[readonly]{
  background:#e5e7eb;
}

textarea{
  min-height:70px;
}

.row{
  display:flex;
  gap:10px;
}

.row>div{flex:1}

.actions{
  margin-top:25px;
  display:flex;
  gap:10px;
}

button{
  padding:12px;
  font-size:14px;
  border:none;
  border-radius:6px;
  flex:1;
  cursor:pointer;
}

.confirm{
  background:#2563eb;
  color:#fff;
}

.recalc{
  background:#dc2626;
  color:#fff;
}

.result{
  margin-top:20px;
  padding:15px;
  background:#ecfdf5;
  border:1px solid #22c55e;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
  display:none;
}

@media(max-width:768px){
  .row{flex-direction:column}
  .actions{flex-direction:column}
}
</style>
</head>

<body>

<div class="box">
  <h1>Confirm Booking</h1>

  <label>Pickup</label>
  <input id="pickup" readonly>

  <label>Stops</label>
  <textarea id="stops" readonly></textarea>

  <label>Dropoff</label>
  <input id="dropoff" readonly>

  <div class="row">
    <div>
      <label>Distance</label>
      <input id="miles" readonly>
    </div>
    <div>
      <label>Price</label>
      <input id="price" readonly>
    </div>
  </div>

  <label>Passenger Name</label>
  <input id="name">

  <label>Phone</label>
  <input id="phone">

  <div class="row">
    <div>
      <label>Date</label>
      <input type="date" id="date">
    </div>
    <div>
      <label>Time</label>
      <input type="time" id="time">
    </div>
  </div>

  <label>Notes</label>
  <textarea id="notes"></textarea>

  <div class="actions">
    <button class="recalc" onclick="recalculate()">Recalculate</button>
    <button class="confirm" onclick="confirmBooking()">Pay Now</button>
  </div>

  <!-- 🔥 هنا النتيجة -->
  <div id="resultBox" class="result"></div>

</div>

<script>

/* ================= LOAD DATA ================= */

let tripData = JSON.parse(localStorage.getItem("pendingTrip"));

if(!tripData){
  alert("Session expired");
  location.href="/getquote/index.html";
}

pickup.value  = tripData.pickup;
dropoff.value = tripData.dropoff;
miles.value   = tripData.distance;
price.value   = tripData.price;
stops.value   = tripData.stops?.length ? tripData.stops.join("\n") : "No stops";

/* ================= TIME CHECK ================= */

function minutesUntilTrip(dateStr,timeStr){

  const now = new Date();
  const trip = new Date(dateStr+"T"+timeStr);

  return Math.floor((trip-now)/60000);
}

/* ================= RECALC ================= */

function recalculate(){
  localStorage.removeItem("pendingTrip");
  location.href="/getquote/index.html";
}

/* ================= CONFIRM ================= */

async function confirmBooking(){

  const btn = document.querySelector(".confirm");
  btn.disabled = true;

  if(!name.value || !phone.value || !date.value || !time.value){
    alert("Fill all fields");
    btn.disabled=false;
    return;
  }

  const mins = minutesUntilTrip(date.value,time.value);

  if(mins <= 120){

    const ok = confirm(
`⚠️ Trip is within 2 hours

❌ Cancellation will NOT be allowed

Continue?`
    );

    if(!ok){
      btn.disabled=false;
      return;
    }
  }

  /* ================= SEND ================= */

  const data = {
    type:"individual",
    pickup: pickup.value,
    dropoff: dropoff.value,
    stops: tripData.stops || [],
    clientName: name.value,
    clientPhone: phone.value,
    tripDate: date.value,
    tripTime: time.value,
    notes: notes.value
  };

  try{

    const res = await fetch("/api/trips",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    const trip = await res.json();

    if(!res.ok){
      alert("Error");
      btn.disabled=false;
      return;
    }

    /* 🔥 بدل popup */
    const box = document.getElementById("resultBox");
    box.style.display="block";
    box.innerHTML = `
      ✅ Trip Created Successfully <br><br>
      Trip Number: <b>${trip.tripNumber}</b>
    `;

    /* 🔥 يوديه للدفع */
    setTimeout(()=>{
      window.location.href="/booking/payment.html";
    },2000);

  }catch(e){
    alert("Server error");
    btn.disabled=false;
  }

}

</script>

</body>
</html>
