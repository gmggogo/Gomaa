انتا م<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking – Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box}

body{
  font-family:system-ui,-apple-system,Arial;
  background:#f1f5f9;
  margin:0;
  padding:15px;
  color:#111827;
}

/* ===== CONTAINER ===== */
.container{
  max-width:850px;
  margin:auto;
}

/* ===== CARD ===== */
.card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  margin-bottom:15px;
}

/* ===== HEADER ===== */
.header{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}

/* ===== LABEL ===== */
label{
  font-size:13px;
  color:#6b7280;
  margin-top:12px;
  display:block;
}

/* ===== INPUT ===== */
input, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  margin-top:5px;
  font-size:14px;
}

input[readonly], textarea[readonly]{
  background:#f3f4f6;
}

/* ===== GRID ===== */
.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.row>div{flex:1}

/* ===== SUMMARY ===== */
.summary{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:15px;
}

.summary div{
  background:#f8fafc;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-size:14px;
}

/* ===== BUTTONS ===== */
.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  font-size:15px;
}

.btn-confirm{
  background:#2563eb;
  color:#fff;
}

.btn-recalc{
  background:#ef4444;
  color:#fff;
}

button:disabled{
  opacity:.6;
}

/* ===== MOBILE ===== */
@media(max-width:600px){

  body{padding:10px}

  .card{padding:15px}

  .row{flex-direction:column}

  .summary{
    grid-template-columns:1fr 1fr;
  }

}

</style>
</head>

<body>

<div class="container">

<div class="card">
<div class="header">Confirm Your Booking</div>

<label>Pickup</label>
<input id="pickup" readonly>

<label>Stops</label>
<textarea id="stops" readonly></textarea>

<label>Dropoff</label>
<input id="dropoff" readonly>

<div class="summary">
  <div><b id="miles"></b><br>Distance</div>
  <div><b id="price"></b><br>Price</div>
</div>

</div>

<div class="card">

<label>Passenger Name</label>
<input id="name">

<label>Phone</label>
<input id="phone" placeholder="Enter phone number">

<div class="row">
  <div>
    <label>Date</label>
    <input type="date" id="date">
  </div>
  <div>
    <label>Time</label>
    <input type="time" id="time">
  </div>
</div>

<div class="actions">
  <button class="btn-recalc" onclick="recalculate()">Edit Trip</button>
  <button class="btn-confirm" id="confirmBtn" onclick="confirmBooking()">Confirm</button>
</div>

</div>

</div>

<script>

/* ================= LOAD DATA ================= */

let tripData = JSON.parse(localStorage.getItem("pendingTrip") || "null");

if(!tripData){
  alert("Session expired");
  location.href="../getquote/index.html";
}

/* ================= SHOW ================= */

pickup.value = tripData.pickup;
dropoff.value = tripData.dropoff;
miles.innerText = tripData.distance;
price.innerText = tripData.price;

stops.value = tripData.stops?.length
  ? tripData.stops.join("\n")
  : "No stops";

/* ================= RECALC ================= */

function recalculate(){
  localStorage.removeItem("pendingTrip");
  location.href="../getquote/index.html";
}

/* ================= CONFIRM ================= */

async function confirmBooking(){

  const btn = document.getElementById("confirmBtn");
  btn.disabled = true;

  if(!name.value || !phone.value || !date.value || !time.value){
    alert("Please fill all fields");
    btn.disabled = false;
    return;
  }

  const bookingData = {

    type: "individual",
    company: "INDIVIDUAL",

    pickup: tripData.pickup,
    pickupLat: tripData.pickupLat,
    pickupLng: tripData.pickupLng,

    dropoff: tripData.dropoff,
    dropoffLat: tripData.dropoffLat,
    dropoffLng: tripData.dropoffLng,

    stops: tripData.stops || [],
    stopCoords: (tripData.stops || []).map(s => ({
      address:s,
      lat:null,
      lng:null
    })),

    clientName: name.value,
    clientPhone: phone.value,

    tripDate: date.value,
    tripTime: time.value,

    status: "Booked"
  };

  try{

    const res = await fetch("/api/trips",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(bookingData)
    });

    const data = await res.json();

    if(!res.ok){
      alert("Booking failed");
      btn.disabled = false;
      return;
    }

    alert("Booking Confirmed ✔\nTrip #: " + data.tripNumber);

    localStorage.removeItem("pendingTrip");

    location.href="./payment.html";

  }catch(err){
    alert("Server error");
    btn.disabled = false;
  }

}

</script>

</body>
</html>
