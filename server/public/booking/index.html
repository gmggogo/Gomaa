<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking – Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#f8fafc;
  margin:0;
  padding:20px;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:12px;
  max-width:750px;
  margin:auto;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
}

label{margin-top:12px;display:block;font-size:13px}
input,textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:6px;
}

.row{display:flex;gap:10px}
.row div{flex:1}

.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.recalc{background:#dc2626;color:#fff}
.confirm{background:#2563eb;color:#fff}

.result{
  margin-top:20px;
  padding:15px;
  background:#ecfdf5;
  border:1px solid #22c55e;
  border-radius:10px;
  text-align:center;
  display:none;
}

@media(max-width:768px){
  .row{flex-direction:column}
  .actions{flex-direction:column}
}
</style>
</head>

<body>

<div class="box">

<h2>Confirm Booking</h2>

<label>Pickup</label>
<input id="pickup" readonly>

<label>Stops</label>
<textarea id="stops" readonly></textarea>

<label>Dropoff</label>
<input id="dropoff" readonly>

<div class="row">
  <div>
    <label>Distance</label>
    <input id="miles" readonly>
  </div>
  <div>
    <label>Price</label>
    <input id="price" readonly>
  </div>
</div>

<label>Passenger Name</label>
<input id="name">

<label>Phone</label>
<input id="phone">

<div class="row">
  <div>
    <label>Date</label>
    <input type="date" id="date">
  </div>
  <div>
    <label>Time</label>
    <input type="time" id="time">
  </div>
</div>

<label>Notes (optional)</label>
<textarea id="notes"></textarea>

<div class="actions">
  <button class="recalc" onclick="recalculate()">Recalculate</button>
  <button class="confirm" onclick="confirmBooking()">Pay Now</button>
</div>

<div id="resultBox" class="result"></div>

</div>

<script>

/* ================= LOAD DATA ================= */

const tripData = JSON.parse(localStorage.getItem("pendingTrip"));

if(!tripData){
  alert("Session expired");
  location.href="/getquote/index.html";
}

document.getElementById("pickup").value = tripData.pickup;
document.getElementById("dropoff").value = tripData.dropoff;
document.getElementById("miles").value = tripData.distance;
document.getElementById("price").value = tripData.price;
document.getElementById("stops").value =
  tripData.stops?.length ? tripData.stops.join("\n") : "No stops";

/* ================= TIME ================= */

function minutesUntilTrip(dateStr,timeStr){
  const now = new Date();
  const trip = new Date(dateStr+"T"+timeStr);
  return Math.floor((trip-now)/60000);
}

/* ================= RECALC ================= */

function recalculate(){
  localStorage.removeItem("pendingTrip");
  location.href="/getquote/index.html";
}

/* ================= CONFIRM ================= */

async function confirmBooking(){

  const btn = document.querySelector(".confirm");
  btn.disabled = true;

  const nameEl  = document.getElementById("name");
  const phoneEl = document.getElementById("phone");
  const dateEl  = document.getElementById("date");
  const timeEl  = document.getElementById("time");
  const notesEl = document.getElementById("notes");

  /* ✅ VALIDATION (notes مش موجود هنا) */
  if(!nameEl.value || !phoneEl.value || !dateEl.value || !timeEl.value){
    alert("Fill all required fields");
    btn.disabled = false;
    return;
  }

  /* ✅ 2 HOURS RULE */
  const mins = minutesUntilTrip(dateEl.value,timeEl.value);

  if(mins <= 120){
    const ok = confirm(
`⚠️ Trip is within 2 hours

❌ Cancellation will NOT be allowed

Continue?`
    );

    if(!ok){
      btn.disabled=false;
      return;
    }
  }

  /* ================= SEND ================= */

  const data = {
    type:"individual",
    pickup: tripData.pickup,
    dropoff: tripData.dropoff,
    stops: tripData.stops || [],
    clientName: nameEl.value,
    clientPhone: phoneEl.value,
    tripDate: dateEl.value,
    tripTime: timeEl.value,
    notes: notesEl.value || ""
  };

  try{

    const res = await fetch("/api/trips",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    const trip = await res.json();

    if(!res.ok){
      alert("Error creating trip");
      btn.disabled=false;
      return;
    }

    /* ✅ SHOW RESULT تحت */
    const box = document.getElementById("resultBox");
    box.style.display="block";
    box.innerHTML = `
      ✅ Trip Created Successfully <br><br>
      Trip Number: <b>${trip.tripNumber}</b>
    `;

    /* 🔥 تحويل للدفع */
    setTimeout(()=>{
      window.location.href="/booking/payment.html";
    },2000);

  }catch(err){
    alert("Server error");
    btn.disabled=false;
  }

}

</script>

</body>
</html>
