<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking – Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:#f8fafc;
  margin:0;
  padding:20px;
  color:#111827;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:14px;
  max-width:750px;
  margin:auto;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.topBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:15px;
}

h2{
  margin:0;
  font-size:24px;
}

.langBox{
  display:flex;
  gap:8px;
}

.langBox button{
  padding:8px 12px;
  border-radius:8px;
  border:1px solid #cbd5e1;
  background:#fff;
  cursor:pointer;
  font-weight:bold;
  color:#111827;
}

.langBox button.active{
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}

label{
  margin-top:12px;
  display:block;
  font-size:13px;
  font-weight:bold;
}

input,textarea{
  width:100%;
  padding:12px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:16px;
}

input[readonly]{
  background:#f3f4f6;
  color:#374151;
}

textarea{min-height:90px}

.row{
  display:flex;
  gap:10px;
}

.row div{flex:1}

.vehicleBox{
  margin-top:5px;
  padding:12px;
  background:#e5e7eb;
  border:1px solid #cbd5e1;
  border-radius:8px;
  font-weight:bold;
  color:#111827;
  pointer-events:none;
  user-select:none;
}

.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

button.mainBtn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  font-size:15px;
}

.recalc{background:#dc2626;color:#fff}
.confirm{background:#2563eb;color:#fff}
.confirm:disabled{
  background:#94a3b8;
  cursor:not-allowed;
}

.result{
  margin-top:20px;
  padding:15px;
  background:#ecfdf5;
  border:1px solid #22c55e;
  border-radius:10px;
  text-align:center;
  display:none;
}

.error{
  margin-top:20px;
  padding:15px;
  background:#fef2f2;
  border:1px solid #ef4444;
  border-radius:10px;
  color:#991b1b;
  display:none;
}

@media(max-width:768px){
  body{padding:10px}
  .box{padding:15px}
  .topBar{
    flex-direction:column;
    align-items:flex-start;
  }
  h2{font-size:22px}
  .langBox{
    width:100%;
  }
  .langBox button{
    flex:1;
  }
  .row{flex-direction:column}
  .actions{flex-direction:column}
}
</style>
</head>

<body>

<div class="box">

  <div class="topBar">
    <h2 id="title">Confirm Booking</h2>

    <div class="langBox">
      <button id="btnEn" type="button" onclick="setLang('en')">English</button>
      <button id="btnEs" type="button" onclick="setLang('es')">Español</button>
    </div>
  </div>

  <label id="pickupLabel">Pickup</label>
  <input id="pickup" readonly>

  <div id="stopsBox"></div>

  <label id="dropoffLabel">Dropoff</label>
  <input id="dropoff" readonly>

  <div class="row">
    <div>
      <label id="distanceLabel">Distance</label>
      <input id="miles" readonly>
    </div>
    <div>
      <label id="priceLabel">Price</label>
      <input id="price" readonly>
    </div>
  </div>

  <label id="vehicleLabel">Vehicle Type</label>
  <div id="vehicleDisplay" class="vehicleBox">Loading...</div>

  <label id="nameLabel">Passenger Name</label>
  <input id="name" autocomplete="name">

  <label id="phoneLabel">Phone</label>
  <input id="phone" autocomplete="tel">

  <label id="emailLabel">Email</label>
  <input id="email" type="email" autocomplete="email">

  <div class="row">
    <div>
      <label id="dateLabel">Date</label>
      <input type="date" id="date">
    </div>
    <div>
      <label id="timeLabel">Time</label>
      <input type="time" id="time">
    </div>
  </div>

  <label id="notesLabel">Notes</label>
  <textarea id="notes"></textarea>

  <div class="actions">
    <button class="mainBtn recalc" type="button" onclick="recalculate()" id="recalcBtn">Recalculate</button>
    <button class="mainBtn confirm" type="button" onclick="confirmBooking()" id="payBtn">Pay Now</button>
  </div>

  <div id="errorBox" class="error"></div>
  <div id="resultBox" class="result"></div>

</div>

<script>
/* =========================
   LANGUAGE
========================= */
let lang = localStorage.getItem("bookingLang") || "en";

const T = {
  en:{
    title:"Confirm Booking",
    pickup:"Pickup",
    dropoff:"Dropoff",
    distance:"Distance",
    price:"Price",
    vehicle:"Vehicle Type",
    name:"Passenger Name",
    phone:"Phone",
    email:"Email",
    date:"Date",
    time:"Time",
    notes:"Notes",
    recalc:"Recalculate",
    pay:"Pay Now",
    stop:"Stop",
    loading:"Loading...",
    standard:"Standard (X)",
    large:"Large (XL)",
    fill:"Please fill all required fields",
    invalidPrice:"Invalid price",
    session:"Session expired. Please calculate the trip again.",
    fee:"Trip is within 2 hours. A $15 cancellation fee will apply. Continue?",
    created:"Trip Created Successfully",
    errorCreate:"Error creating trip",
    server:"Server error"
  },
  es:{
    title:"Confirmar Reserva",
    pickup:"Recogida",
    dropoff:"Destino",
    distance:"Distancia",
    price:"Precio",
    vehicle:"Tipo de Vehículo",
    name:"Nombre del Pasajero",
    phone:"Teléfono",
    email:"Correo Electrónico",
    date:"Fecha",
    time:"Hora",
    notes:"Notas",
    recalc:"Recalcular",
    pay:"Pagar Ahora",
    stop:"Parada",
    loading:"Cargando...",
    standard:"Estándar (X)",
    large:"Grande (XL)",
    fill:"Por favor complete todos los campos requeridos",
    invalidPrice:"Precio inválido",
    session:"La sesión expiró. Calcule el viaje otra vez.",
    fee:"El viaje es dentro de 2 horas. Se aplicará una tarifa de cancelación de $15. ¿Continuar?",
    created:"Viaje Creado Correctamente",
    errorCreate:"Error al crear el viaje",
    server:"Error del servidor"
  }
};

function setLang(l){
  lang = l;
  localStorage.setItem("bookingLang", lang);
  applyLang();
}

function applyLang(){
  const d = T[lang];

  document.documentElement.lang = lang;
  title.innerText = d.title;
  pickupLabel.innerText = d.pickup;
  dropoffLabel.innerText = d.dropoff;
  distanceLabel.innerText = d.distance;
  priceLabel.innerText = d.price;
  vehicleLabel.innerText = d.vehicle;
  nameLabel.innerText = d.name;
  phoneLabel.innerText = d.phone;
  emailLabel.innerText = d.email;
  dateLabel.innerText = d.date;
  timeLabel.innerText = d.time;
  notesLabel.innerText = d.notes;
  recalcBtn.innerText = d.recalc;
  payBtn.innerText = d.pay;

  btnEn.classList.toggle("active", lang === "en");
  btnEs.classList.toggle("active", lang === "es");

  renderStops();
  renderVehicle();
}

/* =========================
   LOAD PENDING TRIP
========================= */
let tripData = null;

try{
  tripData = JSON.parse(localStorage.getItem("pendingTrip"));
}catch(e){
  tripData = null;
}

if(!tripData || !tripData.pickup || !tripData.dropoff){
  alert(T[lang].session);
  location.href = "/getquote/index.html";
}

/* =========================
   VEHICLE LOCKED
========================= */
function getVehicleType(){
  const raw =
    tripData.vehicleType ||
    tripData.vehicleTypeFromQuote ||
    tripData.vehicle ||
    "X";

  return String(raw).toUpperCase() === "XL" ? "XL" : "X";
}

function renderVehicle(){
  if(!tripData) return;

  const vehicleType = getVehicleType();
  vehicleDisplay.innerText =
    vehicleType === "XL" ? T[lang].large : T[lang].standard;
}

/* =========================
   SET TRIP DATA
========================= */
pickup.value = tripData.pickup || "";
dropoff.value = tripData.dropoff || "";
miles.value = tripData.distance || tripData.miles || "";
price.value = tripData.price || "";

function renderStops(){
  if(!tripData) return;

  stopsBox.innerHTML = "";

  (tripData.stops || []).forEach((s,i)=>{
    const label = document.createElement("label");
    label.innerText = `${T[lang].stop} ${i+1}`;

    const input = document.createElement("input");
    input.value = s;
    input.readOnly = true;

    stopsBox.appendChild(label);
    stopsBox.appendChild(input);
  });
}

renderStops();
renderVehicle();
applyLang();

/* =========================
   HELPERS
========================= */
function showError(msg){
  errorBox.style.display = "block";
  errorBox.innerText = msg;
}

function clearError(){
  errorBox.style.display = "none";
  errorBox.innerText = "";
}

function cleanPriceValue(v){
  return Number(String(v || "").replace(/[^0-9.]/g,""));
}

function minutesUntilTrip(date,time){
  const now = new Date();
  const trip = new Date(date + "T" + time);
  return (trip - now) / 60000;
}

/* =========================
   RECALCULATE
========================= */
function recalculate(){
  localStorage.removeItem("pendingTrip");
  location.href="/getquote/index.html";
}

/* =========================
   CONFIRM BOOKING
========================= */
async function confirmBooking(){
  clearError();

  const btn = payBtn;
  btn.disabled = true;

  const passengerName = name.value.trim();
  const passengerPhone = phone.value.trim();
  const passengerEmail = email.value.trim();
  const tripDate = date.value;
  const tripTime = time.value;
  const tripNotes = notes.value.trim();

  if(!passengerName || !passengerPhone || !passengerEmail || !tripDate || !tripTime){
    showError(T[lang].fill);
    btn.disabled = false;
    return;
  }

  const cleanPrice = cleanPriceValue(tripData.price);

  if(!cleanPrice){
    showError(T[lang].invalidPrice);
    btn.disabled = false;
    return;
  }

  const mins = minutesUntilTrip(tripDate, tripTime);

  if(mins <= 120){
    if(!confirm(T[lang].fee)){
      btn.disabled = false;
      return;
    }
  }

  const vehicleType = getVehicleType();

  const data = {
    type:"individual",

    pickup: tripData.pickup,
    dropoff: tripData.dropoff,
    stops: tripData.stops || [],

    pickupLat: tripData.pickupLat || null,
    pickupLng: tripData.pickupLng || null,
    dropoffLat: tripData.dropoffLat || null,
    dropoffLng: tripData.dropoffLng || null,
    stopCoords: tripData.stopCoords || [],

    priceAmount: cleanPrice,

    clientName: passengerName,
    clientPhone: passengerPhone,
    clientEmail: passengerEmail,

    vehicleTypeFromQuote: vehicleType,

    tripDate: tripDate,
    tripTime: tripTime,
    notes: tripNotes,
    status:"Booked"
  };

  try{
    const res = await fetch("/api/trips",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    const trip = await res.json();

    if(!res.ok){
      showError(trip.message || T[lang].errorCreate);
      btn.disabled = false;
      return;
    }

    resultBox.style.display = "block";
    resultBox.innerHTML = `
      ${T[lang].created}<br><br>
      Trip #: <b>${trip.tripNumber || ""}</b>
    `;

    setTimeout(()=>{
      window.location.href = `/booking/payment.html?tripId=${trip._id}`;
    },1200);

  }catch(e){
    showError(T[lang].server);
    btn.disabled = false;
  }
}
</script>

</body>
</html>
