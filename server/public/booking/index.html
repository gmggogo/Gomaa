<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking – Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  font-family:Arial;
  background:#f8fafc;
  margin:0;
  padding:20px;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:16px;
  max-width:800px;
  margin:auto;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
  position:relative;
}

.lang-btn{
  position:absolute;
  right:20px;
  top:20px;
  background:#2563eb;
  color:#fff;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  font-weight:bold;
}

h1{margin-bottom:10px}

label{
  display:block;
  margin-top:12px;
  font-size:13px;
  color:#374151;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:8px;
}

input[readonly],textarea[readonly]{
  background:#e5e7eb;
}

.row{
  display:flex;
  gap:10px;
}

.row>div{flex:1}

.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.recalc{background:#dc2626;color:#fff}
.confirm{background:#2563eb;color:#fff}

#warningBox{
  color:red;
  font-weight:bold;
  margin-top:10px;
  display:none;
}

.error{
  border:2px solid red !important;
}

@media(max-width:600px){
  .row{flex-direction:column}
}
</style>
</head>

<body>

<div class="box">

<div class="lang-btn" onclick="toggleLang()" id="langBtn">
English / Spanish
</div>

<h1 id="title">Confirm Booking</h1>

<label id="pickupLabel">Pickup</label>
<input id="pickup" readonly>

<div id="stopsContainer"></div>

<label id="dropLabel">Dropoff</label>
<input id="dropoff" readonly>

<div class="row">
<div>
<label>Distance</label>
<input id="miles" readonly>
</div>
<div>
<label>Price</label>
<input id="price" readonly>
</div>
</div>

<label id="nameLabel">Passenger Name</label>
<input id="name">

<label id="phoneLabel">Phone</label>
<input id="phone">

<div class="row">
<div>
<label>Date</label>
<input type="date" id="date">
</div>
<div>
<label>Time</label>
<input type="time" id="time">
</div>
</div>

<label>Notes</label>
<textarea id="notes"></textarea>

<div id="warningBox"></div>

<div class="actions">
<button class="recalc" id="recalcBtn" onclick="recalculate()">Recalculate</button>
<button class="confirm" id="confirmBtn" onclick="confirmBooking()">Confirm</button>
</div>

</div>

<script>

/* ================= LOAD DATA ================= */

let tripData = JSON.parse(localStorage.getItem("pendingTrip") || "null");

if(!tripData){
  alert("Session expired");
  location.href="../getquote/index.html";
}

/* ================= FILL ================= */

pickup.value = tripData.pickup;
dropoff.value = tripData.dropoff;
miles.value = tripData.distance;
price.value = tripData.price;

/* ================= STOPS ================= */

if(tripData.stops && tripData.stops.length){
  tripData.stops.forEach((s,i)=>{
    const label = document.createElement("label");
    label.innerText = "Stop " + (i+1);

    const input = document.createElement("input");
    input.value = s;
    input.readOnly = true;

    stopsContainer.appendChild(label);
    stopsContainer.appendChild(input);
  });
}

/* ================= LANGUAGE ================= */

let lang="en";

function toggleLang(){

  if(lang==="en"){
    lang="es";
    langBtn.innerText="Spanish / English";

    title.innerText="Confirmar Reserva";
    pickupLabel.innerText="Origen";
    dropLabel.innerText="Destino";
    nameLabel.innerText="Nombre";
    phoneLabel.innerText="Teléfono";

    recalcBtn.innerText="Recalcular";
    confirmBtn.innerText="Confirmar";

  }else{
    lang="en";
    langBtn.innerText="English / Spanish";

    title.innerText="Confirm Booking";
    pickupLabel.innerText="Pickup";
    dropLabel.innerText="Dropoff";
    nameLabel.innerText="Passenger Name";
    phoneLabel.innerText="Phone";

    recalcBtn.innerText="Recalculate";
    confirmBtn.innerText="Confirm";
  }
}

/* ================= TIME ================= */

function nowAZ(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Phoenix"}));
}

function minutesUntilTripAZ(dateStr,timeStr){
  if(!dateStr || !timeStr) return null;
  const now = nowAZ();
  const trip = new Date(dateStr + "T" + timeStr);
  return Math.floor((trip - now)/60000);
}

/* ================= RECALC ================= */

function recalculate(){
  localStorage.removeItem("pendingTrip");
  location.href="../getquote/index.html";
}

/* ================= CONFIRM ================= */

async function confirmBooking(){

  const btn = confirmBtn;
  btn.disabled=true;

  /* 🔥 VALIDATION FIX */
  const nameVal = name.value.trim();
  const phoneVal = phone.value.trim();
  const dateVal = date.value;
  const timeVal = time.value;

  document.querySelectorAll("input").forEach(i=>i.classList.remove("error"));

  if(nameVal===""){
    name.classList.add("error");
    alert("Enter passenger name");
    btn.disabled=false;
    return;
  }

  if(phoneVal===""){
    phone.classList.add("error");
    alert("Enter phone number");
    btn.disabled=false;
    return;
  }

  if(!dateVal){
    alert("Select date");
    btn.disabled=false;
    return;
  }

  if(!timeVal){
    alert("Select time");
    btn.disabled=false;
    return;
  }

  /* TIME RULE */
  const minutesLeft = minutesUntilTripAZ(dateVal,timeVal);

  if(minutesLeft <= 0){
    alert("Trip time passed");
    btn.disabled=false;
    return;
  }

  if(minutesLeft <= 120){
    recalcBtn.style.display="none";
    warningBox.style.display="block";
    warningBox.innerText="⚠️ Editing disabled (within 2 hours)";
  }

  /* SEND */

  const bookingData={
    type:"individual",
    company:"INDIVIDUAL",

    pickup:tripData.pickup,
    pickupLat:tripData.pickupLat,
    pickupLng:tripData.pickupLng,

    dropoff:tripData.dropoff,
    dropoffLat:tripData.dropoffLat,
    dropoffLng:tripData.dropoffLng,

    stops:tripData.stops || [],
    stopCoords:(tripData.stops || []).map(s=>({
      address:s,lat:null,lng:null
    })),

    clientName:nameVal,
    clientPhone:phoneVal,

    tripDate:dateVal,
    tripTime:timeVal,

    notes:notes.value,

    status:"Booked"
  };

  try{

    const res=await fetch("/api/trips",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(bookingData)
    });

    const data=await res.json();

    if(!res.ok){
      alert("Booking failed");
      btn.disabled=false;
      return;
    }

    alert("Trip Created ✔\n"+data.tripNumber);

    localStorage.removeItem("pendingTrip");

    location.href="./payment.html";

  }catch{
    alert("Server error");
    btn.disabled=false;
  }
}

</script>

</body>
</html>
