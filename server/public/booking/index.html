<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking – Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  font-family:Arial;
  background:#f8fafc;
  margin:0;
  padding:20px;
  color:#111827;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:14px;
  max-width:750px;
  margin:auto;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.topBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.langBtn{
  padding:6px 10px;
  border-radius:6px;
  border:1px solid #ddd;
  cursor:pointer;
  font-size:12px;
}

h2{margin-top:0}

label{
  margin-top:12px;
  display:block;
  font-size:13px;
  font-weight:bold;
}

input,textarea{
  width:100%;
  padding:12px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:16px;
}

textarea{min-height:90px}

.row{
  display:flex;
  gap:10px;
}

.row div{flex:1}

.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  font-size:15px;
}

.recalc{background:#dc2626;color:#fff}
.confirm{background:#2563eb;color:#fff}

.result{
  margin-top:20px;
  padding:15px;
  background:#ecfdf5;
  border:1px solid #22c55e;
  border-radius:10px;
  text-align:center;
  display:none;
}

/* 🔒 LOCKED VEHICLE */
.vehicleBox{
  margin-top:10px;
  padding:12px;
  background:#e5e7eb;
  border-radius:8px;
  font-weight:bold;
  pointer-events:none;
  user-select:none;
}

@media(max-width:768px){
  .row{flex-direction:column}
  .actions{flex-direction:column}
}
</style>
</head>

<body>

<div class="box">

<div class="topBar">
  <h2 id="title">Confirm Booking</h2>
  <button class="langBtn" onclick="toggleLang()">ES</button>
</div>

<label id="pickupLabel">Pickup</label>
<input id="pickup" readonly>

<div id="stopsBox"></div>

<label id="dropoffLabel">Dropoff</label>
<input id="dropoff" readonly>

<div class="row">
  <div>
    <label id="distanceLabel">Distance</label>
    <input id="miles" readonly>
  </div>
  <div>
    <label id="priceLabel">Price</label>
    <input id="price" readonly>
  </div>
</div>

<label id="vehicleLabel">Vehicle Type</label>
<div id="vehicleDisplay" class="vehicleBox"></div>

<label id="nameLabel">Passenger Name</label>
<input id="name">

<label id="phoneLabel">Phone</label>
<input id="phone">

<label id="emailLabel">Email</label>
<input id="email" type="email">

<div class="row">
  <div>
    <label id="dateLabel">Date</label>
    <input type="date" id="date">
  </div>
  <div>
    <label id="timeLabel">Time</label>
    <input type="time" id="time">
  </div>
</div>

<label id="notesLabel">Notes</label>
<textarea id="notes"></textarea>

<div class="actions">
  <button class="recalc" onclick="recalculate()" id="recalcBtn">Recalculate</button>
  <button class="confirm" onclick="confirmBooking()" id="payBtn">Pay Now</button>
</div>

<div id="resultBox" class="result"></div>

</div>

<script>

// =======================
// LANGUAGE
// =======================
let lang = "en";

function toggleLang(){
  lang = (lang === "en") ? "es" : "en";
  applyLang();
}

function applyLang(){
  const t = {
    en:{
      title:"Confirm Booking",
      pickup:"Pickup",
      dropoff:"Dropoff",
      distance:"Distance",
      price:"Price",
      vehicle:"Vehicle Type",
      name:"Passenger Name",
      phone:"Phone",
      email:"Email",
      date:"Date",
      time:"Time",
      notes:"Notes",
      pay:"Pay Now",
      recalc:"Recalculate"
    },
    es:{
      title:"Confirmar Reserva",
      pickup:"Recogida",
      dropoff:"Destino",
      distance:"Distancia",
      price:"Precio",
      vehicle:"Tipo de Vehículo",
      name:"Nombre del Pasajero",
      phone:"Teléfono",
      email:"Correo",
      date:"Fecha",
      time:"Hora",
      notes:"Notas",
      pay:"Pagar",
      recalc:"Recalcular"
    }
  };

  const d = t[lang];

  document.getElementById("title").innerText = d.title;
  document.getElementById("pickupLabel").innerText = d.pickup;
  document.getElementById("dropoffLabel").innerText = d.dropoff;
  document.getElementById("distanceLabel").innerText = d.distance;
  document.getElementById("priceLabel").innerText = d.price;
  document.getElementById("vehicleLabel").innerText = d.vehicle;
  document.getElementById("nameLabel").innerText = d.name;
  document.getElementById("phoneLabel").innerText = d.phone;
  document.getElementById("emailLabel").innerText = d.email;
  document.getElementById("dateLabel").innerText = d.date;
  document.getElementById("timeLabel").innerText = d.time;
  document.getElementById("notesLabel").innerText = d.notes;
  document.getElementById("payBtn").innerText = d.pay;
  document.getElementById("recalcBtn").innerText = d.recalc;
}

// =======================
// LOAD DATA
// =======================
let tripData = JSON.parse(localStorage.getItem("pendingTrip"));

if(!tripData){
  alert("Session expired");
  location.href="/getquote/index.html";
}

// =======================
// SET DATA
// =======================
pickup.value = tripData.pickup;
dropoff.value = tripData.dropoff;
miles.value = tripData.distance;
price.value = tripData.price;

// =======================
// 🔒 VEHICLE LOCK
// =======================
const vehicleType = tripData.vehicleType || "X";

vehicleDisplay.innerText =
  vehicleType === "XL" ? "Large (XL)" : "Standard (X)";

// =======================
// STOPS
// =======================
(tripData.stops || []).forEach((s,i)=>{
  stopsBox.innerHTML += `
    <label>Stop ${i+1}</label>
    <input value="${s}" readonly>
  `;
});

// =======================
function recalculate(){
  localStorage.removeItem("pendingTrip");
  location.href="/getquote/index.html";
}

// =======================
async function confirmBooking(){

  const btn = payBtn;
  btn.disabled = true;

  try{

    const data = {
      pickup: tripData.pickup,
      dropoff: tripData.dropoff,
      stops: tripData.stops || [],
      priceAmount: Number(tripData.price),
      clientName: name.value,
      clientPhone: phone.value,
      clientEmail: email.value,
      vehicleTypeFromQuote: vehicleType,
      tripDate: date.value,
      tripTime: time.value,
      notes: notes.value
    };

    const res = await fetch("/api/trips",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    const trip = await res.json();

    resultBox.style.display="block";
    resultBox.innerHTML = "Trip #: " + trip.tripNumber;

  }catch{
    alert("Error");
  }finally{
    btn.disabled=false;
  }
}

applyLang();

</script>

</body>
</html>
