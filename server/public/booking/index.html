<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking – Sunbeam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f8fafc;margin:0;color:#111}
.page{max-width:900px;margin:auto;padding:15px}

.hero{
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:#fff;
  border-radius:16px;
  padding:20px;
  text-align:center;
  position:relative;
}

.langBox{
  position:absolute;
  right:10px;
  top:10px;
  display:flex;
  gap:6px;
}

.langBox button{
  padding:3px 8px;
  font-size:11px;
  border-radius:20px;
  border:1px solid #ddd;
  background:#fff;
  cursor:pointer;
}

.langBox .active{
  background:#2563eb;
  color:#fff;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:15px;
  margin-top:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08)
}

input,textarea{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:10px;
}

.vehicleBox{
  background:#e5e7eb;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.btn{
  background:#2563eb;
  color:#fff;
}

@media(max-width:600px){
  .page{padding:10px}
}
</style>
</head>

<body>

<div class="page">

<div class="hero">

<div class="langBox">
<button id="enBtn" onclick="setLang('en')">English</button>
<button id="esBtn" onclick="setLang('es')">Español</button>
</div>

<h1 id="title">Confirm Booking</h1>

</div>

<div class="card">

<label id="pickupL">Pickup</label>
<input id="pickup" readonly>

<label id="dropoffL">Dropoff</label>
<input id="dropoff" readonly>

<label id="vehicleL">Vehicle</label>
<div id="vehicleBox" class="vehicleBox"></div>

<label id="priceL">Price</label>
<input id="price" readonly>

<label id="nameL">Name</label>
<input id="name">

<label id="phoneL">Phone</label>
<input id="phone">

<label id="emailL">Email</label>
<input id="email">

<label id="dateL">Date</label>
<input type="date" id="date">

<label id="timeL">Time</label>
<input type="time" id="time">

<button class="btn" onclick="confirmBooking()" id="payBtn">Pay Now</button>

</div>

</div>

<script>

// 🔥 LANGUAGE
let lang="en";

function setLang(l){
  lang=l;
  applyLang();
}

function applyLang(){
  if(lang==="es"){
    title.innerText="Confirmar Reserva";
    pickupL.innerText="Origen";
    dropoffL.innerText="Destino";
    vehicleL.innerText="Vehículo";
    priceL.innerText="Precio";
    nameL.innerText="Nombre";
    phoneL.innerText="Teléfono";
    emailL.innerText="Correo";
    dateL.innerText="Fecha";
    timeL.innerText="Hora";
    payBtn.innerText="Pagar";
  }else{
    title.innerText="Confirm Booking";
    pickupL.innerText="Pickup";
    dropoffL.innerText="Dropoff";
    vehicleL.innerText="Vehicle";
    priceL.innerText="Price";
    nameL.innerText="Name";
    phoneL.innerText="Phone";
    emailL.innerText="Email";
    dateL.innerText="Date";
    timeL.innerText="Time";
    payBtn.innerText="Pay Now";
  }

  enBtn.classList.toggle("active",lang==="en");
  esBtn.classList.toggle("active",lang==="es");
}

applyLang();

// 🔥 LOAD DATA
const tripData = JSON.parse(localStorage.getItem("pendingTrip"));

if(!tripData){
  alert("Session expired");
  location.href="/getquote/index.html";
}

pickup.value = tripData.pickup;
dropoff.value = tripData.dropoff;
price.value = tripData.price;

// 🔥 VEHICLE FIX
const rawVehicle = tripData.vehicleType;

let vehicle =
  rawVehicle === "minivan" ? "XL" :
  rawVehicle === "standard" ? "X" :
  rawVehicle || "X";

vehicleBox.innerText =
  vehicle === "XL" ? "Minivan (XL)" : "Car (X)";

// 🔥 CONFIRM
async function confirmBooking(){

  const name=nameL.nextElementSibling.value;
  const phone=phoneL.nextElementSibling.value;
  const email=emailL.nextElementSibling.value;
  const date=dateL.nextElementSibling.value;
  const time=timeL.nextElementSibling.value;

  if(!name||!phone||!email||!date||!time){
    alert("Fill all fields");
    return;
  }

  const mins=(new Date(date+"T"+time)-new Date())/60000;

  if(mins<=120){
    if(!confirm("Trip is within 120 minutes. Cancellation fee will be $15. Continue?")){
      return;
    }
  }

  const cleanPrice = Number(price.value.replace(/[^0-9.]/g,""));

  const res = await fetch("/api/trips",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      pickup:pickup.value,
      dropoff:dropoff.value,
      priceAmount:cleanPrice,
      clientName:name,
      clientPhone:phone,
      clientEmail:email,
      vehicleTypeFromQuote:vehicle,
      tripDate:date,
      tripTime:time
    })
  });

  const trip = await res.json();

  window.location.href = `/booking/payment.html?tripId=${trip._id}`;
}

</script>

</body>
</html>
