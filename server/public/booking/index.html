<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking – Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  font-family:Arial;
  background:#f8fafc;
  margin:0;
  padding:20px;
  color:#111827;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:14px;
  max-width:750px;
  margin:auto;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
  position:relative;
}

h2{margin-top:0}

label{
  margin-top:12px;
  display:block;
  font-size:13px;
  font-weight:bold;
}

input,textarea,select{
  width:100%;
  padding:12px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:16px;
}

textarea{min-height:90px}

.row{
  display:flex;
  gap:10px;
}

.row div{flex:1}

.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  font-size:15px;
}

.recalc{background:#dc2626;color:#fff}
.confirm{background:#2563eb;color:#fff}

.result{
  margin-top:20px;
  padding:15px;
  background:#ecfdf5;
  border:1px solid #22c55e;
  border-radius:10px;
  text-align:center;
  display:none;
}

@media(max-width:768px){
  body{padding:10px}
  .row{flex-direction:column}
  .actions{flex-direction:column}
}
</style>
</head>

<body>

<div class="box">

<h2>Confirm Booking</h2>

<label>Pickup</label>
<input id="pickup" readonly>

<div id="stopsBox"></div>

<label>Dropoff</label>
<input id="dropoff" readonly>

<div class="row">
  <div>
    <label>Distance</label>
    <input id="miles" readonly>
  </div>
  <div>
    <label>Price</label>
    <input id="price" readonly>
  </div>
</div>

<!-- 🔥 NEW -->
<label>Vehicle Type</label>
<select id="vehicleType">
  <option value="X">Standard (X)</option>
  <option value="XL">Large (XL)</option>
</select>

<label>Passenger Name</label>
<input id="name">

<label>Phone</label>
<input id="phone">

<label>Email</label>
<input id="email" type="email">

<div class="row">
  <div>
    <label>Date</label>
    <input type="date" id="date">
  </div>
  <div>
    <label>Time</label>
    <input type="time" id="time">
  </div>
</div>

<label>Notes</label>
<textarea id="notes"></textarea>

<div class="actions">
  <button class="recalc" onclick="recalculate()">Recalculate</button>
  <button class="confirm" onclick="confirmBooking()" id="payBtn">Pay Now</button>
</div>

<div id="resultBox" class="result"></div>

</div>

<script>

// =======================
// LOAD TRIP
// =======================
const tripData = JSON.parse(localStorage.getItem("pendingTrip"));

if(!tripData){
  alert("Session expired");
  location.href="/getquote/index.html";
}

pickup.value = tripData.pickup || "";
dropoff.value = tripData.dropoff || "";
miles.value = tripData.distance || "";
price.value = tripData.price || "";

// =======================
// STOPS
// =======================
function renderStops(){
  const box = document.getElementById("stopsBox");
  box.innerHTML = "";

  if(Array.isArray(tripData.stops)){
    tripData.stops.forEach((s,i)=>{
      box.innerHTML += `
        <label>Stop ${i+1}</label>
        <input value="${s}" readonly>
      `;
    });
  }
}
renderStops();

// =======================
// TIME CHECK
// =======================
function minutesUntilTrip(date,time){
  const now = new Date();
  const trip = new Date(date+"T"+time);
  return (trip-now)/60000;
}

// =======================
function recalculate(){
  localStorage.removeItem("pendingTrip");
  location.href="/getquote/index.html";
}

// =======================
// CONFIRM BOOKING
// =======================
async function confirmBooking(){

  const btn = document.getElementById("payBtn");
  btn.disabled = true;

  const name  = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const date  = document.getElementById("date").value;
  const time  = document.getElementById("time").value;
  const notes = document.getElementById("notes").value;

  const vehicleType = document.getElementById("vehicleType").value;

  if(!name || !phone || !email || !date || !time){
    alert("Fill all fields");
    btn.disabled=false;
    return;
  }

  // 🔥 FIX السعر
  const cleanPrice = Number(String(tripData.price).replace(/[^0-9.]/g,""));

  if(!cleanPrice || cleanPrice <= 0){
    alert("Invalid price ❌");
    btn.disabled=false;
    return;
  }

  const mins = minutesUntilTrip(date,time);

  if(mins <= 120){
    if(!confirm("Trip within 2 hours → No cancel allowed. Continue?")){
      btn.disabled=false;
      return;
    }
  }

  const data = {
    type:"individual",

    pickup: tripData.pickup,
    dropoff: tripData.dropoff,
    stops: tripData.stops || [],

    priceAmount: cleanPrice,

    clientName: name,
    clientPhone: phone,
    clientEmail: email,

    vehicleType: vehicleType,

    tripDate: date,
    tripTime: time,
    notes: notes
  };

  try{

    const res = await fetch("/api/trips",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    const trip = await res.json();

    if(!res.ok){
      alert("Error creating trip");
      btn.disabled=false;
      return;
    }

    document.getElementById("resultBox").style.display="block";
    document.getElementById("resultBox").innerHTML = `
      Trip Created Successfully<br><br>
      Trip #: <b>${trip.tripNumber}</b>
    `;

    setTimeout(()=>{
      window.location.href = `/booking/payment.html?tripId=${trip._id}`;
    },1500);

  }catch{
    alert("Server error");
    btn.disabled=false;
  }
}

</script>

</body>
</html>
