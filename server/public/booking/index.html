<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking – Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#f8fafc;
  margin:0;
  padding:20px;
  color:#111827;
}

.box{
  background:#fff;
  padding:20px;
  border-radius:14px;
  max-width:750px;
  margin:auto;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
  position:relative;
}

.lang-btn{
  position:absolute;
  right:15px;
  top:15px;
  background:#2563eb;
  color:#fff;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
  font-weight:bold;
}

h2{
  margin-top:0;
  padding-right:140px;
}

label{
  margin-top:12px;
  display:block;
  font-size:13px;
  font-weight:bold;
}

input,textarea{
  width:100%;
  padding:12px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:16px;
}

textarea{
  min-height:90px;
  resize:vertical;
}

.row{
  display:flex;
  gap:10px;
}

.row div{
  flex:1;
}

.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  font-size:15px;
}

.recalc{
  background:#dc2626;
  color:#fff;
}

.confirm{
  background:#2563eb;
  color:#fff;
}

.result{
  margin-top:20px;
  padding:15px;
  background:#ecfdf5;
  border:1px solid #22c55e;
  border-radius:10px;
  text-align:center;
  display:none;
}

@media(max-width:768px){
  body{
    padding:10px;
  }

  .box{
    padding:15px;
    border-radius:12px;
  }

  h2{
    font-size:22px;
    padding-right:115px;
  }

  .lang-btn{
    right:10px;
    top:10px;
    padding:6px 10px;
    font-size:11px;
  }

  .row{
    flex-direction:column;
    gap:0;
  }

  .actions{
    flex-direction:column;
  }

  button{
    width:100%;
    padding:15px;
    font-size:16px;
  }

  input,textarea{
    font-size:16px;
    padding:14px;
  }
}
</style>
</head>

<body>

<div class="box">

<div class="lang-btn" onclick="toggleLang()" id="langBtn">English / Spanish</div>

<h2 id="title">Confirm Booking</h2>

<label id="pickupLabel">Pickup</label>
<input id="pickup" readonly>

<div id="stopsBox"></div>

<label id="dropLabel">Dropoff</label>
<input id="dropoff" readonly>

<div class="row">
  <div>
    <label id="distanceLabel">Distance</label>
    <input id="miles" readonly>
  </div>
  <div>
    <label id="priceLabel">Price</label>
    <input id="price" readonly>
  </div>
</div>

<label id="nameLabel">Passenger Name</label>
<input id="name">

<label id="phoneLabel">Phone</label>
<input id="phone">

<div class="row">
  <div>
    <label id="dateLabel">Date</label>
    <input type="date" id="date">
  </div>
  <div>
    <label id="timeLabel">Time</label>
    <input type="time" id="time">
  </div>
</div>

<label id="notesLabel">Notes (optional)</label>
<textarea id="notes"></textarea>

<div class="actions">
  <button class="recalc" onclick="recalculate()" id="recalcBtn">Recalculate</button>
  <button class="confirm" onclick="confirmBooking()" id="payBtn">Pay Now</button>
</div>

<div id="resultBox" class="result"></div>

</div>

<script>
let lang = "en";

const tripData = JSON.parse(localStorage.getItem("pendingTrip"));

if(!tripData){
  alert("Session expired");
  location.href="/getquote/index.html";
}

pickup.value = tripData.pickup || "";
dropoff.value = tripData.dropoff || "";
miles.value = tripData.distance || "";
price.value = tripData.price || "";

/* ✅ Stops تظهر خانة خانة فقط لو موجودة */
function renderStops(){
  const stopsBox = document.getElementById("stopsBox");
  stopsBox.innerHTML = "";

  if(Array.isArray(tripData.stops) && tripData.stops.length > 0){
    tripData.stops.forEach((stop,index)=>{
      const label = document.createElement("label");
      label.className = "stop-label";
      label.innerText = lang === "en" ? `Stop ${index + 1}` : `Parada ${index + 1}`;

      const input = document.createElement("input");
      input.value = stop;
      input.readOnly = true;

      stopsBox.appendChild(label);
      stopsBox.appendChild(input);
    });
  }
}

renderStops();

function toggleLang(){
  if(lang === "en"){
    lang = "es";
    langBtn.innerText = "Spanish / English";

    title.innerText = "Confirmar Reserva";
    pickupLabel.innerText = "Origen";
    dropLabel.innerText = "Destino";
    distanceLabel.innerText = "Distancia";
    priceLabel.innerText = "Precio";
    nameLabel.innerText = "Nombre";
    phoneLabel.innerText = "Teléfono";
    dateLabel.innerText = "Fecha";
    timeLabel.innerText = "Hora";
    notesLabel.innerText = "Notas (opcional)";
    recalcBtn.innerText = "Recalcular";
    payBtn.innerText = "Pagar Ahora";
  }else{
    lang = "en";
    langBtn.innerText = "English / Spanish";

    title.innerText = "Confirm Booking";
    pickupLabel.innerText = "Pickup";
    dropLabel.innerText = "Dropoff";
    distanceLabel.innerText = "Distance";
    priceLabel.innerText = "Price";
    nameLabel.innerText = "Passenger Name";
    phoneLabel.innerText = "Phone";
    dateLabel.innerText = "Date";
    timeLabel.innerText = "Time";
    notesLabel.innerText = "Notes (optional)";
    recalcBtn.innerText = "Recalculate";
    payBtn.innerText = "Pay Now";
  }

  renderStops();
}

function minutesUntilTrip(dateStr,timeStr){
  const now = new Date();
  const trip = new Date(dateStr+"T"+timeStr);
  return Math.floor((trip-now)/60000);
}

function recalculate(){
  localStorage.removeItem("pendingTrip");
  location.href="/getquote/index.html";
}

async function confirmBooking(){
  const btn = document.getElementById("payBtn");
  btn.disabled = true;

  const nameEl  = document.getElementById("name");
  const phoneEl = document.getElementById("phone");
  const dateEl  = document.getElementById("date");
  const timeEl  = document.getElementById("time");
  const notesEl = document.getElementById("notes");

  if(!nameEl.value.trim() || !phoneEl.value.trim() || !dateEl.value || !timeEl.value){
    alert(lang === "en" ? "Fill all required fields" : "Complete todos los campos requeridos");
    btn.disabled = false;
    return;
  }

  const mins = minutesUntilTrip(dateEl.value,timeEl.value);

  if(mins <= 120){
    const ok = confirm(
      lang === "en"
      ? `⚠️ Trip is within 2 hours\n\n❌ Cancellation will NOT be allowed\n\nContinue?`
      : `⚠️ El viaje es dentro de 2 horas\n\n❌ No se permite cancelar\n\n¿Continuar?`
    );

    if(!ok){
      btn.disabled=false;
      return;
    }
  }

  const data = {
    type:"individual",
    pickup: tripData.pickup,
    dropoff: tripData.dropoff,
    stops: tripData.stops || [],
    clientName: nameEl.value.trim(),
    clientPhone: phoneEl.value.trim(),
    tripDate: dateEl.value,
    tripTime: timeEl.value,
    notes: notesEl.value || ""
  };

  try{
    const res = await fetch("/api/trips",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    const trip = await res.json();

    if(!res.ok){
      alert(lang === "en" ? "Error creating trip" : "Error al crear el viaje");
      btn.disabled=false;
      return;
    }

    const box = document.getElementById("resultBox");
    box.style.display="block";
    box.innerHTML = `
      ${lang === "en" ? "Trip Created Successfully" : "Viaje creado exitosamente"}<br><br>
      ${lang === "en" ? "Trip Number" : "Número de viaje"}: <b>${trip.tripNumber}</b>
    `;

    setTimeout(()=>{
      window.location.href="/booking/payment.html";
    },2000);

  }catch{
    alert(lang === "en" ? "Server error" : "Error del servidor");
    btn.disabled=false;
  }
}
</script>

</body>
</html>
