<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f8fafc;margin:0;color:#111827}
.page{max-width:900px;margin:auto;padding:15px}

/* MOBILE */
@media(max-width:600px){
  .page{padding:10px}
  h1{font-size:22px}
  #map{height:250px}
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:#fff;
  border-radius:16px;
  padding:20px;
  text-align:center;
  position:relative;
}

.lang-btn{
  position:absolute;
  right:10px;
  top:10px;
  background:#fff;
  color:#111;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
}

/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  padding:15px;
  margin-top:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08)
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:10px;
  font-size:16px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  margin-top:8px;
}

.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#22c55e;color:#fff}
.btn-stop{background:#f97316;color:#fff}

/* VEHICLE */
.vehicle-box{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.vehicle{
  flex:1;
  border:2px solid #ddd;
  border-radius:12px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.vehicle.active{
  border-color:#2563eb;
  background:#eff6ff;
}

.vehicle img{
  width:70px;
}

/* STOP */
.stop-row{
  display:flex;
  gap:6px;
}

.remove-btn{
  background:#ef4444;
  color:#fff;
  padding:10px;
  border-radius:10px;
}

/* MAP */
#map{
  height:300px;
  border-radius:12px;
}

/* RESULT */
.quote-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:15px
}

.quote-grid div{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
}

.quote-grid b{
  display:block;
  margin-top:6px;
  font-size:18px;
}

.hidden{display:none}

.pricing{
  margin-top:12px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="page">

<div class="hero">

<div class="lang-btn">English / Spanish</div>

<h1>Get Quote</h1>

<div class="pricing">
<b>✔ Base fare includes first 5 miles</b><br><br>
Car (X): $20 base + $2 per mile<br>
Minivan (XL): $30 base + $2.5 per mile<br>
Stop: $5 each<br>
No Show: $15
</div>

</div>

<div class="card">

<!-- VEHICLE -->
<div class="vehicle-box">
  <div class="vehicle" id="carBtn">
    <img src="https://cdn-icons-png.flaticon.com/512/744/744465.png">
    <div>Car (X)</div>
  </div>

  <div class="vehicle" id="vanBtn">
    <img src="https://cdn-icons-png.flaticon.com/512/3202/3202926.png">
    <div>Minivan (XL)</div>
  </div>
</div>

<label>Pickup</label>
<input id="pickup">

<div id="stops"></div>

<button class="btn-stop" onclick="addStop()">+ Add Stop</button>

<label>Dropoff</label>
<input id="dropoff">

<button class="btn-primary" onclick="calculate()">Calculate</button>

<button class="btn-success hidden" id="bookBtn" onclick="bookTrip()">Booking Now</button>

<div id="priceBox" class="hidden">
<div class="quote-grid">
<div>Distance<b id="distance"></b></div>
<div>Stops<b id="stopsCount"></b></div>
<div>Time<b id="time"></b></div>
<div>Price<b id="price">$0</b></div>
</div>
</div>

</div>

</div>

<script>

let vehicleType=null;

const carBtn=document.getElementById("carBtn");
const vanBtn=document.getElementById("vanBtn");

carBtn.onclick=()=>selectVehicle("car");
vanBtn.onclick=()=>selectVehicle("van");

function selectVehicle(type){
  vehicleType=type;

  carBtn.classList.remove("active");
  vanBtn.classList.remove("active");

  if(type==="car"){
    carBtn.classList.add("active");
  }else{
    vanBtn.classList.add("active");
  }

  resetUI();
}

function addStop(){
  const row=document.createElement("div");
  row.className="stop-row";

  const input=document.createElement("input");
  input.placeholder="Stop";

  const remove=document.createElement("button");
  remove.innerText="X";
  remove.className="remove-btn";
  remove.onclick=()=>{row.remove();resetUI();};

  row.appendChild(input);
  row.appendChild(remove);

  document.getElementById("stops").appendChild(row);
}

function resetUI(){
  bookBtn.classList.add("hidden");
  priceBox.classList.add("hidden");
}

function calculate(){

  if(!vehicleType){
    alert("Select vehicle type");
    return;
  }

  let miles=10;

  let OPEN=vehicleType==="van"?30:20;
  let PER_MILE=vehicleType==="van"?2.5:2;

  let extraMiles=Math.max(0,miles-5);
  let total=OPEN+(extraMiles*PER_MILE);

  distance.innerText=miles+" mi";
  stopsCount.innerText=0;
  time.innerText="20 min";
  price.innerText="$"+total;

  priceBox.classList.remove("hidden");
  bookBtn.classList.remove("hidden");
}

function bookTrip(){
  localStorage.setItem("trip",JSON.stringify({
    vehicleType
  }));
}

</script>

</body>
</html>
