<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Summary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Segoe UI,Arial,sans-serif;
  background:#f1f5f9;
  color:#0f172a;
}

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
}

.page-body{
  padding:300px 18px 30px;
}

.page-title{
  font-size:28px;
  font-weight:900;
  margin-bottom:6px;
  color:#0f172a;
}

.page-subtitle{
  font-size:13px;
  color:#64748b;
  margin-bottom:16px;
  font-weight:700;
}

/* =========================
   FILTERS
========================= */

.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
  background:#fff;
  padding:12px;
  border-radius:14px;
  box-shadow:0 8px 24px rgba(15,23,42,.08);
  margin-bottom:14px;
}

.toolbar input,
.toolbar select{
  height:42px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  padding:0 12px;
  font-size:13px;
  font-weight:800;
  background:#fff;
  color:#0f172a;
  outline:none;
}

.toolbar input{
  min-width:260px;
  flex:1;
}

.toolbar select{
  min-width:135px;
}

.toolbar input:focus,
.toolbar select:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,.12);
}

/* =========================
   TOTAL STATS
========================= */

.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(145px,1fr));
  gap:10px;
  margin-bottom:14px;
}

.stat-card{
  background:#fff;
  border-radius:14px;
  padding:12px;
  box-shadow:0 8px 22px rgba(15,23,42,.08);
  border-left:6px solid #334155;
  min-height:82px;
}

.stat-card.total{border-left-color:#0f172a;}
.stat-card.completed{border-left-color:#16a34a;}
.stat-card.cancelled{border-left-color:#dc2626;}
.stat-card.noshow{border-left-color:#f59e0b;}
.stat-card.notcompleted{border-left-color:#64748b;}
.stat-card.money{border-left-color:#059669;}
.stat-card.miles{border-left-color:#2563eb;}
.stat-card.facility{border-left-color:#1d4ed8;}
.stat-card.gq{border-left-color:#22c55e;}
.stat-card.reserved{border-left-color:#f59e0b;}
.stat-card.shared{border-left-color:#7c3aed;}

.stat-number{
  font-size:22px;
  font-weight:900;
  color:#0f172a;
  line-height:1.1;
}

.stat-label{
  margin-top:6px;
  font-size:11px;
  color:#64748b;
  font-weight:900;
  text-transform:uppercase;
}

/* =========================
   SERVICE CARDS
========================= */

.service-cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  margin-bottom:14px;
}

.service-card{
  background:#fff;
  border:2px solid transparent;
  border-radius:14px;
  padding:12px;
  cursor:pointer;
  box-shadow:0 8px 22px rgba(15,23,42,.08);
  transition:.15s;
}

.service-card:hover{
  transform:translateY(-1px);
  border-color:#93c5fd;
}

.service-card.active-card{
  border-color:#2563eb;
  background:#eff6ff;
}

.service-card-title{
  font-size:15px;
  font-weight:900;
  margin-bottom:8px;
  color:#0f172a;
}

.service-line{
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-size:12px;
  font-weight:800;
  color:#334155;
  padding:3px 0;
  border-bottom:1px dashed #e2e8f0;
}

.service-line:last-child{
  border-bottom:none;
}

.service-line span:last-child{
  font-weight:900;
  color:#0f172a;
}

/* =========================
   TABLE
========================= */

.table-wrap{
  width:100%;
  max-width:100%;
  overflow-x:auto;
  overflow-y:visible;
  -webkit-overflow-scrolling:touch;
  background:#fff;
  border-radius:14px;
  box-shadow:0 8px 22px rgba(15,23,42,.08);
  margin-bottom:20px;
}

.summary-table{
  width:100%;
  min-width:1680px;
  table-layout:fixed;
  border-collapse:collapse;
  background:#fff;
  border-top:6px solid #000;
}

.summary-table th,
.summary-table td{
  border:1px solid #dbe3ee;
  padding:5px;
  text-align:center;
  font-size:11px;
  vertical-align:middle;
  line-height:1.25;
  box-sizing:border-box;
}

.summary-table th{
  background:#1f2937;
  color:#fff;
  font-weight:900;
  white-space:nowrap;
  font-size:11px;
}

.col-num{width:34px;}
.col-trip{width:82px;}
.col-source{width:82px;}
.col-service{width:90px;}
.col-date{width:82px;}
.col-time{width:62px;}
.col-status{width:125px;}
.col-miles{width:70px;}
.col-money{width:90px;}
.col-passengers{width:74px;}
.col-eye{width:38px;}

.wide-company{
  width:150px;
  text-align:left!important;
  white-space:normal;
  word-break:break-word;
}

.wide-passenger{
  width:190px;
  text-align:left!important;
  white-space:normal;
  word-break:break-word;
}

.wide-address{
  width:250px;
  text-align:left!important;
  white-space:normal;
  word-break:break-word;
  font-size:10.5px;
}

.wide-money-break{
  width:150px;
  text-align:left!important;
}

.date-row td{
  background:#bfdbfe!important;
  color:#1e3a8a!important;
  font-weight:900!important;
  text-align:center!important;
  padding:6px!important;
  font-size:13px!important;
  border-top:2px solid #60a5fa!important;
  border-bottom:2px solid #60a5fa!important;
}

.trip-divider td{
  border-bottom:3px solid #000!important;
}

.row-facility td{
  background:#eaf4ff!important;
}

.row-getquote td{
  background:#dcfce7!important;
}

.row-reserved td{
  background:#fef3c7!important;
}

.shared-row td{
  background:#ede9fe!important;
}

.completed-row td{
  box-shadow:inset 0 0 0 9999px rgba(22,163,74,.08);
}

.cancelled-row td{
  box-shadow:inset 0 0 0 9999px rgba(220,38,38,.07);
}

.noshow-row td{
  box-shadow:inset 0 0 0 9999px rgba(245,158,11,.08);
}

.notcompleted-row td{
  box-shadow:inset 0 0 0 9999px rgba(100,116,139,.08);
}

/* =========================
   CELL INSIDE CELL
========================= */

.cell-box{
  display:grid;
  border:1px solid #111;
  background:#fff;
  width:100%;
  box-sizing:border-box;
  border-radius:4px;
  overflow:hidden;
}

.cell-item{
  padding:4px 5px;
  min-height:22px;
  font-weight:800;
  white-space:normal;
  word-break:break-word;
  box-sizing:border-box;
  background:#fff;
  font-size:10.5px;
}

.cell-item + .cell-item{
  border-top:1px solid #111;
}

/* =========================
   PILLS
========================= */

.trip-number-badge{
  font-weight:900;
  color:#1d4ed8;
  white-space:normal;
  word-break:break-word;
  font-size:10px;
}

.source-pill,
.status-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:4px 7px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
  border:1px solid #cbd5e1;
  white-space:nowrap;
}

.source-pill.facility{
  background:#dbeafe;
  color:#1e3a8a;
  border-color:#93c5fd;
}

.source-pill.gq{
  background:#dcfce7;
  color:#14532d;
  border-color:#86efac;
}

.source-pill.reserved{
  background:#fef3c7;
  color:#92400e;
  border-color:#fcd34d;
}

.status-pill.completed{
  background:#bbf7d0;
  color:#14532d;
  border-color:#86efac;
}

.status-pill.cancelled{
  background:#fecaca;
  color:#7f1d1d;
  border-color:#fca5a5;
}

.status-pill.noshow{
  background:#fde68a;
  color:#78350f;
  border-color:#fcd34d;
}

.status-pill.notcompleted{
  background:#e5e7eb;
  color:#374151;
  border-color:#cbd5e1;
}

.status-pill.mixed{
  background:#ddd6fe;
  color:#4c1d95;
  border-color:#c4b5fd;
}

/* =========================
   VIEW MODAL
========================= */

.eye-btn{
  border:none;
  background:transparent;
  color:#2563eb;
  width:30px;
  height:26px;
  cursor:pointer;
  font-size:18px;
  font-weight:900;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:0;
}

.eye-btn:hover{
  color:#1d4ed8;
  background:#dbeafe;
  border-radius:6px;
}

.view-overlay{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.55);
  z-index:99999;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:15px;
}

.view-box{
  background:#fff;
  width:min(760px,96vw);
  max-height:90vh;
  overflow:auto;
  border-radius:15px;
  box-shadow:0 20px 60px rgba(0,0,0,.28);
}

.view-head{
  position:sticky;
  top:0;
  background:#2563eb;
  color:#fff;
  padding:12px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:900;
  z-index:2;
}

.view-close{
  border:none;
  background:#fff;
  color:#0f172a;
  width:30px;
  height:30px;
  border-radius:50%;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

.view-body{
  padding:14px;
  display:grid;
  gap:8px;
}

.view-line{
  display:grid;
  grid-template-columns:170px 1fr;
  border:1px solid #e2e8f0;
  border-radius:9px;
  overflow:hidden;
}

.view-label{
  background:#f1f5f9;
  padding:9px;
  font-weight:900;
  color:#334155;
}

.view-value{
  padding:9px;
  font-weight:800;
  color:#0f172a;
  word-break:break-word;
  white-space:pre-line;
}

.empty-state{
  background:#fff;
  border-radius:14px;
  padding:30px;
  text-align:center;
  font-weight:900;
  color:#64748b;
  box-shadow:0 8px 22px rgba(15,23,42,.08);
}

@media(max-width:768px){
  .page-body{
    padding:230px 10px 25px;
  }

  .page-title{
    font-size:23px;
  }

  .toolbar{
    display:grid;
    grid-template-columns:1fr;
  }

  .toolbar input,
  .toolbar select{
    width:100%;
    min-width:0;
  }

  .summary-table{
    min-width:1680px;
  }

  .summary-table th,
  .summary-table td{
    font-size:10px;
    padding:4px;
  }

  .cell-item{
    font-size:9.5px;
    padding:3px 4px;
  }

  .view-line{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

  <div class="page-title">
    Admin Summary
  </div>

  <div class="page-subtitle">
    Closed trips financial review by Facilities, Get Quote, Reserved, Services, Miles and Revenue.
  </div>

  <div class="toolbar">

    <input
      id="searchInput"
      type="text"
      placeholder="Search trip, facility, client, passenger, pickup, dropoff...">

    <select id="sourceFilter">
      <option value="ALL">All Sources</option>
      <option value="FACILITY">Facilities</option>
      <option value="GQ">Get Quote</option>
      <option value="RV">Reserved</option>
    </select>

    <select id="facilityFilter" style="display:none;">
      <option value="ALL">All Facilities</option>
    </select>

    <select id="serviceFilter">
      <option value="ALL">All Services</option>
    </select>

    <select id="statusFilter">
      <option value="">All Status</option>
      <option value="Completed">Completed</option>
      <option value="Cancelled">Cancelled</option>
      <option value="No Show">No Show</option>
      <option value="Not Completed">Not Completed</option>
      <option value="Mixed Closed">Mixed Closed</option>
    </select>

    <select id="yearFilter">
      <option value="">All Years</option>
    </select>

    <select id="monthFilter">
      <option value="">All Months</option>
    </select>

    <select id="dayFilter">
      <option value="">All Days</option>
    </select>

  </div>

  <div id="summaryStats" class="stats-grid"></div>

  <div id="serviceCards" class="service-cards"></div>

  <div id="summaryContent"></div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/summary.js"></script>

</body>
</html>
