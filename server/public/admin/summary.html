<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Trips Summary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f1f5f9;
}

/* HEADER */
#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

/* PAGE */
.page-body{
padding-top:300px;
padding-left:20px;
padding-right:20px;
}

@media (max-width:768px){
.page-body{
padding-top:360px;
padding-left:10px;
padding-right:10px;
}
}

/* TITLE */
.title{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
color:#0f172a;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
padding:8px 16px;
border:none;
background:#e2e8f0;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

.tab.active{
background:#2563eb;
color:#fff;
}

/* FILTERS */
.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

.filters input,
.filters select,
.filters button{
padding:7px;
border:1px solid #ccc;
border-radius:5px;
}

.filters button{
background:#2563eb;
color:#fff;
border:none;
cursor:pointer;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:8px;
overflow:hidden;
}

th{
background:#2563eb;
color:#fff;
padding:10px;
font-size:13px;
}

td{
padding:10px;
font-size:13px;
border-bottom:1px solid #eee;
text-align:center;
}

tr:hover{
background:#f1f5f9;
}

/* STATUS */
.status-completed{color:green;font-weight:bold}
.status-noshow{color:#eab308;font-weight:bold}
.status-cancelled{color:#ef4444;font-weight:bold}

</style>

</head>

<body>

<!-- HEADER -->
<div id="adminHeader"></div>

<div class="page-body">

<div class="title">Trips Summary</div>

<!-- TABS -->
<div class="tabs">
<button class="tab active" onclick="switchTab('individual',this)">Individual</button>
<button class="tab" onclick="switchTab('shared',this)">Shared</button>
</div>

<!-- FILTER -->
<div class="filters">

<input type="date" id="searchDate">

<input type="text" id="searchText" placeholder="Search name / company">

<select id="searchType">
<option value="">All Types</option>
<option value="INDIVIDUAL">Individual</option>
<option value="SHARED">Shared</option>
</select>

<button onclick="applySearch()">Search</button>

<button onclick="printPage()">Print</button>

</div>

<!-- TABLE -->
<table>

<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Name / Company</th>
<th>Phone</th>
<th>Type</th>
<th>Status</th>
<th>Total ($)</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<!-- SCRIPTS -->
<script src="/admin/header.js"></script>
<script src="/admin/summary.js"></script>

</body>
</html>
