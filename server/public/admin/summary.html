<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Trips Summary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f1f5f9;
}

/* HEADER */
#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

/* PAGE */
.page-body{
padding-top:130px;
padding-left:15px;
padding-right:15px;
}

/* TITLE */
.title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap;
}

.tab{
padding:10px 20px;
border:none;
background:#1e293b;
color:#cbd5e1;
border-radius:6px;
cursor:pointer;
}

.tab.active{
background:#facc15;
color:#000;
}

/* FILTER */
.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

.filters input,
.filters button{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.filters button{
background:#2563eb;
color:#fff;
border:none;
cursor:pointer;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:10px;
margin-bottom:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:8px;
text-align:center;
}

.card h3{
margin:0;
font-size:14px;
color:#555;
}

.card .num{
font-size:20px;
font-weight:bold;
margin-top:5px;
}

/* TABLE */
.table-wrap{
overflow:auto;
background:#fff;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

th{
background:#2563eb;
color:#fff;
padding:10px;
font-size:13px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
font-size:13px;
text-align:center;
}

/* STATUS */
.completed{color:green;font-weight:bold}
.noshow{color:#eab308;font-weight:bold}
.cancelled{color:#ef4444;font-weight:bold}

</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="title">Trips Summary</div>

<!-- TABS -->
<div class="tabs">
<button class="tab active" onclick="switchTab('individual',this)">Individual</button>
<button class="tab" onclick="switchTab('shared',this)">Shared</button>
</div>

<!-- FILTER -->
<div class="filters">
<input type="date" id="date">
<input type="text" id="search" placeholder="Search name/company">
<button onclick="apply()">Search</button>
<button onclick="printPage()">Print</button>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">
<h3>Total Trips</h3>
<div class="num" id="totalTrips">0</div>
</div>

<div class="card">
<h3>Total Revenue</h3>
<div class="num" id="totalMoney">$0</div>
</div>

<div class="card">
<h3>Completed</h3>
<div class="num" id="completedCount">0</div>
</div>

<div class="card">
<h3>No Show</h3>
<div class="num" id="noshowCount">0</div>
</div>

<div class="card">
<h3>Cancelled</h3>
<div class="num" id="cancelCount">0</div>
</div>
</div>

<!-- TABLE -->
<div class="table-wrap">
<table>
<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Name</th>
<th>Phone</th>
<th>Status</th>
<th>Total ($)</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>
</div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/summary.js"></script>

</body>
</html>
