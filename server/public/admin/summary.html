<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trips Summary | Sunbeam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>
.content{
  margin-left:220px;
  margin-top:55px;
  padding:25px;
}

h1{color:#3f51b5;margin-bottom:5px}
.subtitle{color:#666;margin-bottom:15px}

/* FILTERS */
.filters{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px
}
.filters input,.filters select,.filters button{
  padding:7px;
  border:1px solid #ccc;
  border-radius:4px
}
.filters button{
  background:#3f51b5;
  color:#fff;
  border:none;
  cursor:pointer
}

/* TOTAL */
#totalBox{
  margin-bottom:10px;
  font-weight:bold;
  font-size:16px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:6px;
  overflow:hidden
}
th{
  background:#3f51b5;
  color:#fff;
  padding:10px;
  font-size:13px
}
td{
  padding:10px;
  font-size:13px;
  border-bottom:1px solid #eee;
  text-align:center
}
tr:hover{background:#f1f5f9}

.status-completed{color:green;font-weight:bold}
.status-noshow{color:#eab308;font-weight:bold}
.status-cancel{color:#ef4444;font-weight:bold}
</style>
</head>

<body>

<!-- HEADER -->
<div id="headerContainer"></div>

<!-- SIDEBAR -->
<div id="sidebarContainer"></div>

<!-- CONTENT -->
<div class="content">

<h1>Trips Summary</h1>
<div class="subtitle">
Completed • No Show • Cancelled Trips – Full Pricing Breakdown
</div>

<!-- FILTERS -->
<div class="filters">
<input type="date" id="searchDate">

<input type="text" id="searchText"
placeholder="Search by name / company">

<select id="searchType">
<option value="">All Types</option>
<option value="Individual">Individual</option>
<option value="Company">Company</option>
</select>

<button onclick="applySearch()">Search</button>
<button onclick="printSummary()">Print</button>
</div>

<!-- TOTAL -->
<div id="totalBox">Total: $0</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Client / Company</th>
<th>Phone</th>
<th>Type</th>
<th>Miles</th>
<th>Stops ($)</th>
<th>Delay ($)</th>
<th>Status</th>
<th>Total ($)</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

<!-- JS -->
<script src="/admin/header.js"></script>
<script src="/admin/summary.js"></script>

</body>
</html>
