<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch Review</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/admin/style.css">

<style>
*{box-sizing:border-box;}

:root{
  --blue:#2563eb;
  --green:#16a34a;
  --red:#dc2626;
  --orange:#f59e0b;
  --purple:#7c3aed;
  --text:#0f172a;
  --muted:#64748b;
  --bg:#f4f8fb;
  --card:#fff;
  --border:#dbe3ee;
}

body{
  margin:0;
  background:var(--bg);
  font-family:Arial,sans-serif;
  color:var(--text);
}

.page-content{
  padding:22px;
  width:100%;
}

.page-head{
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px 20px;
  margin-bottom:16px;
  box-shadow:0 8px 22px rgba(15,23,42,.06);
  display:flex;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
  align-items:center;
}

.page-title{
  font-size:27px;
  font-weight:900;
}

.page-sub{
  margin-top:5px;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
}

.role-badge{
  background:#e0edff;
  color:#1d4ed8;
  padding:9px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
}

.review-stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(135px,1fr));
  gap:10px;
  margin-bottom:14px;
}

.stat-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:14px;
  padding:13px;
  text-align:center;
  box-shadow:0 6px 16px rgba(15,23,42,.07);
}

.stat-card.total{border-left:6px solid var(--blue);}
.stat-card.today{border-left:6px solid #0ea5e9;}
.stat-card.month{border-left:6px solid #0891b2;}
.stat-card.completed{border-left:6px solid var(--green);}
.stat-card.cancelled{border-left:6px solid var(--red);}
.stat-card.noshow{border-left:6px solid var(--orange);}
.stat-card.notcompleted{border-left:6px solid var(--purple);}
.stat-card.company{border-left:6px solid #1d4ed8;}
.stat-card.gq{border-left:6px solid #22c55e;}
.stat-card.shared{border-left:6px solid #7c3aed;}

.stat-number{
  font-size:25px;
  line-height:1;
  font-weight:900;
  color:#0f172a;
}

.stat-label{
  margin-top:6px;
  font-size:12px;
  font-weight:900;
  color:#64748b;
}

.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  margin-bottom:14px;
}

.search-input,
.filter-select{
  padding:12px 14px;
  border-radius:11px;
  border:1px solid #cbd5e1;
  background:#fff;
  font-size:14px;
  font-weight:800;
  outline:none;
}

.search-input{
  flex:1;
  min-width:260px;
}

.search-input:focus,
.filter-select:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.12);
}

.service-tabs{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:8px;
  margin-bottom:14px;
}

.service-tab{
  border:1px solid var(--border);
  background:#fff;
  color:#0f172a;
  border-radius:13px;
  padding:10px 8px;
  cursor:pointer;
  font-weight:900;
  box-shadow:0 5px 14px rgba(15,23,42,.06);
  text-align:center;
  min-height:84px;
}

.service-tab.active{
  background:#2563eb;
  color:#fff;
}

.service-title{
  font-size:13px;
  line-height:1.15;
  margin-bottom:5px;
}

.service-total{
  font-size:24px;
  line-height:1.05;
  font-weight:900;
}

.service-source{
  margin-top:5px;
  font-size:10px;
  line-height:1.35;
  opacity:.92;
}

.service-cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
  gap:10px;
  margin-bottom:16px;
}

.service-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:15px;
  padding:14px;
  box-shadow:0 7px 18px rgba(15,23,42,.07);
}

.service-card-title{
  font-size:14px;
  font-weight:900;
  color:#0f172a;
  margin-bottom:8px;
}

.service-line{
  display:flex;
  justify-content:space-between;
  gap:8px;
  border-top:1px dashed #e2e8f0;
  padding:6px 0;
  font-size:12px;
  font-weight:900;
  color:#475569;
}

.service-line span:last-child{
  color:#0f172a;
  font-size:14px;
}

.day-title{
  margin:18px 0 8px;
  padding:10px 13px;
  background:#e0edff;
  color:#1e3a8a;
  border-left:6px solid #2563eb;
  border-radius:12px;
  font-size:15px;
  font-weight:900;
}

.table-wrap{
  width:100%;
  overflow-x:auto;
  margin-bottom:20px;
  border-radius:14px;
  background:#fff;
  box-shadow:0 8px 22px rgba(15,23,42,.08);
}

.review-table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  min-width:1800px;
}

.review-table th,
.review-table td{
  border:1px solid var(--border);
  padding:8px;
  text-align:center;
  font-size:13px;
  vertical-align:middle;
  line-height:1.4;
  font-weight:600;
}

.review-table th{
  background:#2563eb;
  color:#fff;
  font-size:13px;
  font-weight:900;
  white-space:nowrap;
}

.review-table tbody tr:hover td {
  background-color: rgba(37, 99, 235, 0.04) !important;
}

.wide-address{
  min-width:240px;
  max-width:360px;
  text-align:left!important;
  white-space:pre-line;
  word-break:break-word;
  font-size:12px!important;
}

.wide-client{
  min-width:160px;
  max-width:240px;
  text-align:left!important;
  white-space:pre-line;
  word-break:break-word;
}

.trip-number-badge{
  font-weight:900;
  color:#1d4ed8;
  white-space:nowrap;
}
/* =========================
   PILLS SIZE (UNIFIED)
========================= */

.service-pill,
.source-pill,
.status-pill{
  display:inline-block;
  width:90px;
  min-width:90px;
  max-width:90px;

  padding:6px 0;

  text-align:center;
  white-space:nowrap;

  font-size:11px;
  font-weight:700;
  line-height:1.2;

  border-radius:8px;
  box-sizing:border-box;
}

/* =========================
   SERVICE
========================= */

.service-pill{
  background:#dbeafe;
  color:#1d4ed8;
  border:1px solid #bfdbfe;
}

/* =========================
   COMPANY
========================= */

.source-pill.company{
  background:#dbeafe;
  color:#1e3a8a;
  border:1px solid #93c5fd;

  font-size:10px;
  font-weight:600;
  height:24px;
  line-height:24px;
  padding:0;
}

/* =========================
   GET QUOTE
========================= */

.source-pill.gq{
  background:#fce7f3;
  color:#9d174d;
  border:1px solid #f9a8d4;
}

/* =========================
   RESERVED
========================= */

.source-pill.reserved{
  background:#fef3c7;
  color:#92400e;
  border:1px solid #fcd34d;
}

/* =========================
   STATUS
========================= */

.status-pill.completed{
  background:#bbf7d0;
  color:#14532d;
  border:1px solid #86efac;
}

.status-pill.cancelled{
  background:#fecaca;
  color:#7f1d1d;
  border:1px solid #fca5a5;
}

.status-pill.noshow{
  background:#fde68a;
  color:#78350f;
  border:1px solid #fcd34d;
}

.status-pill.notcompleted{
  background:#e5e7eb;
  color:#374151;
  border:1px solid #cbd5e1;
}
.shared-row td{box-shadow:inset 0 0 0 9999px rgba(124,58,237,.05);}

.shared-row td{
  box-shadow:inset 0 0 0 9999px rgba(124,58,237,.05);
}

/* STATUS COLORS */

.status-td{
  text-align:center;
  font-size:13px;
  font-weight:900;
  color:#111827;
}

.status-td.completed{
  background:#bbf7d0 !important;
}

.status-td.cancelled{
  background:#fecaca !important;
}

.status-td.noshow{
  background:#fde68a !important;
}

.status-td.notcompleted{
  background:#e5e7eb !important;
}

/* DATE HEADER */

.date-row td{
  background:#eff6ff;
  color:#1e40af;
  font-size:14px;
  font-weight:900;
  text-align:left;
  padding:12px;
  border-top:3px solid #2563eb;
}

.shared-separator td{
  border-bottom:2px dashed #cbd5e1;
}

.shared-separator td{
  border-bottom:2px dashed #cbd5e1;
}
.shared-separator td{
  border-bottom:2px dashed #cbd5e1;
}

.trip-divider-line td{
  height:3px;
  padding:0;
  background:#cbd5e1;
}

.trip-divider td{
  height:10px;
  padding:0;
  background:#f8fafc;
}

.btn-action {
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: #fff;
  cursor: pointer;
  font-size: 11px;
  font-weight: 800;
  margin: 2px;
  transition: all 0.2s;
}

.btn-action.btn-view:hover {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}

.btn-action.btn-edit:hover {
  background: var(--orange);
  color: #fff;
  border-color: var(--orange);
}

.empty-state{
  background:#fff;
  padding:22px;
  border-radius:14px;
  box-shadow:0 8px 22px rgba(15,23,42,.08);
  color:#475569;
  font-weight:900;
  text-align:center;
}

/* =================================
   TABLE COLORS
================================= */

.company-name{
  color:#1d4ed8;
  font-size:13px;
  font-weight:700;
}

.row-company td{
  background:#eaf4ff !important;
}

.row-getquote td{
  background:#ffeaf4 !important;
}

.completed-row td{
  background:#dcfce7 !important;
}

.cancelled-row td{
  background:#fee2e2 !important;
}

.noshow-row td{
  background:#fef3c7 !important;
}

.notcompleted-row td{
  background:#f1f5f9 !important;
}

.shared-row td{
  box-shadow:inset 0 0 0 9999px rgba(124,58,237,.03);
}

@media(max-width:768px){
  .page-content{padding:12px;}
  .page-title{font-size:22px;}
  .toolbar{flex-direction:column;align-items:stretch;}
  .search-input,.filter-select{width:100%;}
  .review-table{min-width:1550px;}
}
</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-content">

  <div class="page-head">
    <div>
      <div class="page-title">Dispatch Review</div>
      <div class="page-sub">Completed • Cancelled • No Show • Not Completed Trips</div>
    </div>
    <div class="role-badge">Admin / Dispatcher</div>
  </div>

  <div id="reviewStats" class="review-stats"></div>

  <div class="toolbar">
    <input id="searchInput" class="search-input" type="text" placeholder="Search trip #, company, passenger, phone, email, address">
    <select id="statusFilter" class="filter-select">
      <option value="">All Statuses</option>
      <option value="Completed">Completed</option>
      <option value="Cancelled">Cancelled</option>
      <option value="No Show">No Show</option>
      <option value="Not Completed">Not Completed</option>
    </select>
    <select id="yearFilter" class="filter-select"></select>
    <select id="monthFilter" class="filter-select"></select>
  </div>

  <div id="serviceTabs" class="service-tabs"></div>
  <div id="serviceCards" class="service-cards"></div>
  <div id="reviewContent"></div>

</div>

<script src="/admin/header.js"></script>
<script src="dispatch-review.js"></script>

</body>
</html>
