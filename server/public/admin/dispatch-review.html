<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch Review</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/admin/style.css">

<style>
*{box-sizing:border-box;}

:root{
  --blue:#2563eb;
  --green:#16a34a;
  --red:#dc2626;
  --orange:#f59e0b;
  --purple:#7c3aed;
  --text:#0f172a;
  --muted:#64748b;
  --bg:#f4f8fb;
  --card:#ffffff;
  --border:#dbe3ee;
}

body{
  margin:0;
  background:var(--bg);
  font-family:Arial,sans-serif;
  color:var(--text);
}

.page-content{
  padding:22px;
  width:100%;
}

.page-head{
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px 20px;
  margin-bottom:16px;
  box-shadow:0 8px 22px rgba(15,23,42,.06);
  display:flex;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
  align-items:center;
}

.page-title{
  font-size:27px;
  font-weight:900;
}

.page-sub{
  margin-top:5px;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
}

.role-badge{
  background:#e0edff;
  color:#1d4ed8;
  padding:9px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
}

.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  margin-bottom:14px;
}

.search-input,
.filter-select{
  padding:12px 14px;
  border-radius:11px;
  border:1px solid #cbd5e1;
  background:#fff;
  font-size:14px;
  font-weight:800;
  outline:none;
}

.search-input{
  flex:1;
  min-width:260px;
}

.search-input:focus,
.filter-select:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.12);
}

/* ===============================
   DYNAMIC SERVICE CARDS
================================ */

.service-tabs{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  margin-bottom:16px;
}

.service-tab{
  border:1px solid var(--border);
  background:#fff;
  color:#0f172a;
  border-radius:15px;
  padding:13px;
  cursor:pointer;
  font-weight:900;
  box-shadow:0 7px 18px rgba(15,23,42,.07);
  text-align:center;
  min-height:205px;
  transition:.2s ease;
}

.service-tab:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 24px rgba(15,23,42,.12);
}

.service-tab.active{
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}

.service-title{
  font-size:14px;
  line-height:1.15;
  margin-bottom:7px;
  text-transform:uppercase;
  min-height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.service-total{
  font-size:30px;
  line-height:1.05;
  font-weight:900;
  margin-bottom:9px;
}

.service-source{
  margin-top:7px;
  text-align:left;
  font-size:11px;
  line-height:1.55;
  border-top:1px dashed rgba(148,163,184,.55);
  padding-top:7px;
}

.service-tab.active .service-source{
  border-top-color:rgba(255,255,255,.35);
}

.service-source-row{
  display:flex;
  justify-content:space-between;
  gap:8px;
}

.day-title{
  margin:18px 0 8px;
  padding:10px 13px;
  background:#e0edff;
  color:#1e3a8a;
  border-left:6px solid #2563eb;
  border-radius:12px;
  font-size:15px;
  font-weight:900;
}

.table-wrap{
  width:100%;
  overflow-x:auto;
  margin-bottom:20px;
  border-radius:14px;
  background:#fff;
  box-shadow:0 8px 22px rgba(15,23,42,.08);
}

.review-table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  min-width:1760px;
  table-layout:fixed;
}

.review-table th,
.review-table td{
  border:1px solid var(--border);
  padding:7px;
  text-align:center;
  font-size:12px;
  vertical-align:middle;
  line-height:1.35;
  font-weight:800;
}

.review-table th{
  background:#2563eb;
  color:#fff;
  font-weight:900;
  white-space:nowrap;
}

.review-table th:nth-child(4),
.review-table td:nth-child(4),
.review-table th:nth-child(5),
.review-table td:nth-child(5),
.review-table th:nth-child(6),
.review-table td:nth-child(6){
  width:150px;
  min-width:150px;
  max-width:150px;
}

.wide-address{
  min-width:240px;
  max-width:360px;
  text-align:left!important;
  white-space:pre-line;
  word-break:break-word;
  font-size:12px!important;
}

.wide-client{
  min-width:160px;
  max-width:240px;
  text-align:left!important;
  white-space:pre-line;
  word-break:break-word;
}

.trip-number-badge{
  font-weight:900;
  color:#1d4ed8;
  white-space:nowrap;
}

.service-pill,
.source-pill,
.status-pill{
  display:inline-flex;
  padding:5px 9px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
}

.service-pill{
  background:#dbeafe;
  color:#1d4ed8;
}

.source-pill.company{
  background:#dbeafe;
  color:#1d4ed8;
}

.source-pill.gq{
  background:#dcfce7;
  color:#166534;
}

.source-pill.reserved{
  background:#e0e7ff;
  color:#4338ca;
}

.status-pill.completed{
  background:#e5e7eb;
  color:#374151;
}

.status-pill.cancelled{
  background:#fee2e2;
  color:#991b1b;
}

.status-pill.noshow{
  background:#ffedd5;
  color:#9a3412;
}

.status-pill.notcompleted{
  background:#ede9fe;
  color:#5b21b6;
}

.status-pill.reserved{
  background:#e0e7ff;
  color:#4338ca;
}

.completed-row td{background:#f3f4f6;}
.cancelled-row td{background:#fecaca!important;}
.noshow-row td{background:#ffedd5!important;}
.notcompleted-row td{background:#ede9fe!important;}
.reserved-row td{box-shadow:inset 0 0 0 9999px rgba(67,56,202,.045);}
.shared-row td{box-shadow:inset 0 0 0 9999px rgba(124,58,237,.05);}

.shared-separator td{
  border-bottom:2px dashed #cbd5e1;
}

.trip-divider-line td{
  height:3px;
  padding:0;
  background:#cbd5e1;
}

.trip-divider td{
  height:10px;
  padding:0;
  background:#f8fafc;
}

.empty-state{
  background:#fff;
  padding:22px;
  border-radius:14px;
  box-shadow:0 8px 22px rgba(15,23,42,.08);
  color:#475569;
  font-weight:900;
  text-align:center;
}

@media(max-width:768px){
  .page-content{padding:12px;}
  .page-title{font-size:22px;}
  .toolbar{flex-direction:column;align-items:stretch;}
  .search-input,.filter-select{width:100%;}
  .review-table{min-width:1600px;}
}
</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-content">

  <div class="page-head">
    <div>
      <div class="page-title">Dispatch Review</div>
      <div class="page-sub">Completed • Cancelled • No Show • Not Completed • Reserved Trips</div>
    </div>
    <div class="role-badge">Admin / Dispatcher</div>
  </div>

  <div class="toolbar">
    <input id="searchInput" class="search-input" type="text" placeholder="Search trip #, company, passenger, phone, email, address">
    <select id="yearFilter" class="filter-select"></select>
    <select id="monthFilter" class="filter-select"></select>
  </div>

  <div id="serviceTabs" class="service-tabs"></div>
  <div id="reviewContent"></div>

</div>

<script src="/admin/header.js"></script>

<script>
/* ==========================================================================
   DISPATCH REVIEW V2
   Dynamic Service Cards + Reserved + Source Colors
   ========================================================================== */

const API_URL = "/api/trips";
const SERVICES_URL = "/api/services/admin";

const role = localStorage.getItem("role") || "";
const token = localStorage.getItem("token") || "";

if(!["superadmin","admin","dispatcher"].includes(role)){
  window.location.href = "/admin/login.html";
}

let allTrips = [];
let services = [];
let displayItems = [];
let activeService = "ALL";
let refreshTimer = null;

const CLOSED_HOURS = 10;

const searchInput = document.getElementById("searchInput");
const yearFilter = document.getElementById("yearFilter");
const monthFilter = document.getElementById("monthFilter");
const reviewContent = document.getElementById("reviewContent");

function safe(v){
  return String(v ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function normalizeText(v){
  return String(v ?? "").trim();
}

function cleanStatus(v){
  return String(v || "")
    .replace(/[_-]/g," ")
    .replace(/\s+/g," ")
    .toLowerCase()
    .trim();
}

function compactStatus(v){
  return cleanStatus(v).replace(/\s+/g,"");
}

function getAZNow(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Phoenix"}));
}

function dateKey(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function monthKey(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}

function parseTripDateTime(t){
  if(!t || !t.tripDate) return null;

  const date = String(t.tripDate || "").trim();
  let time = String(t.tripTime || "00:00").trim();

  if(!time) time = "00:00";

  let d = new Date(`${date}T${time}`);
  if(isNaN(d)) d = new Date(`${date} ${time}`);
  if(isNaN(d)) return null;

  return d;
}

function getBookedDateObj(t){
  return new Date(t?.bookedAt || t?.createdAt || t?.updatedAt || t?.tripDate || Date.now());
}

function formatDateObj(d){
  if(!d || isNaN(d)) return "-";
  return d.toLocaleDateString();
}

function formatTimeObj(d){
  if(!d || isNaN(d)) return "-";
  return d.toLocaleTimeString([],{
    hour:"2-digit",
    minute:"2-digit"
  });
}

function getBookedDate(t){
  return formatDateObj(getBookedDateObj(t));
}

function getBookedTime(t){
  return formatTimeObj(getBookedDateObj(t));
}

function getTripNumber(t){
  return String(t?.tripNumber || t?.bookingNumber || t?.id || t?._id || "-");
}

function getTripDateKey(t){
  return t?.tripDate || "Unknown";
}

/* ===============================
   STATUS
================================ */

function isCompletedStatus(status){
  const s = cleanStatus(status);
  return s === "completed" || s === "complete" || s.includes("completed");
}

function isCancelledStatus(status){
  return cleanStatus(status).includes("cancel");
}

function isNoShowStatus(status){
  const s = cleanStatus(status);
  return s.includes("no show") || s.includes("noshow");
}

function isScheduledStatus(status){
  return cleanStatus(status) === "scheduled";
}

function isConfirmedStatus(status){
  return cleanStatus(status) === "confirmed";
}

function isReservedStatus(status,trip){
  const s = cleanStatus(status);
  const c = compactStatus(status);

  if(s === "reserved" || c === "reserved" || s.includes("reserved")){
    return true;
  }

  const raw = [
    trip?.source,
    trip?.from,
    trip?.bookingSource,
    trip?.createdBy,
    trip?.bookingType,
    trip?.type,
    trip?.status
  ].join(" ").toLowerCase();

  return (
    trip?.reserved === true ||
    trip?.isReserved === true ||
    raw.includes("reserved") ||
    raw.includes("reservation")
  );
}

function isNotCompletedStatus(status,trip){
  const s = cleanStatus(status);
  const c = compactStatus(status);

  if(
    s === "not completed" ||
    c === "notcompleted" ||
    s.includes("not complete")
  ){
    return true;
  }

  if(
    isCompletedStatus(status) ||
    isCancelledStatus(status) ||
    isNoShowStatus(status) ||
    isReservedStatus(status,trip)
  ){
    return false;
  }

  if(!isScheduledStatus(status) && !isConfirmedStatus(status)){
    return false;
  }

  const dt = parseTripDateTime(trip);
  if(!dt) return false;

  return Date.now() - dt.getTime() >= CLOSED_HOURS * 60 * 60 * 1000;
}

function isReviewStatus(status,trip){
  return (
    isReservedStatus(status,trip) ||
    isCompletedStatus(status) ||
    isCancelledStatus(status) ||
    isNoShowStatus(status) ||
    isNotCompletedStatus(status,trip)
  );
}

function displayStatus(status,trip){
  if(isReservedStatus(status,trip)) return "Reserved";
  if(isNotCompletedStatus(status,trip)) return "Not Completed";
  if(isCompletedStatus(status)) return "Completed";
  if(isCancelledStatus(status)) return "Cancelled";
  if(isNoShowStatus(status)) return "No Show";
  return status || "-";
}

function statusClass(status,trip){
  const label = displayStatus(status,trip);
  if(label === "Reserved") return "reserved";
  if(label === "Completed") return "completed";
  if(label === "Cancelled") return "cancelled";
  if(label === "No Show") return "noshow";
  if(label === "Not Completed") return "notcompleted";
  return "";
}

function statusHTML(status,trip){
  const label = displayStatus(status,trip);
  const cls = statusClass(status,trip);
  return `<span class="status-pill ${cls}">${safe(label)}</span>`;
}

/* ===============================
   SERVICES
================================ */

function extractServices(data){
  if(Array.isArray(data)) return data;
  if(Array.isArray(data?.services)) return data.services;
  if(Array.isArray(data?.data)) return data.data;
  if(Array.isArray(data?.items)) return data.items;
  if(Array.isArray(data?.results)) return data.results;
  return [];
}

function serviceEnabled(s){
  if(!s) return false;

  if(s.hidden === true || s.deleted === true) return false;

  return (
    s.enabled === true ||
    s.companyEnabled === true ||
    s.active === true ||
    s.isActive === true ||
    String(s.status || "").toLowerCase() === "active"
  );
}

function normalizeKnownCode(code){
  const c = normalizeText(code).toUpperCase();

  if(c === "STANDARD") return "ST";
  if(c === "WHEELCHAIR") return "WH";
  if(c === "SHARED") return "SH";
  if(c === "LIMOUSINE" || c === "LIMO") return "LM";
  if(c === "TAXI") return "TX";
  if(c === "XL") return "XL";

  return c;
}

function getServiceCodeFromService(s){
  return normalizeKnownCode(
    s?.companySuffix ||
    s?.suffix ||
    s?.serviceKey ||
    s?.key ||
    s?.code ||
    s?.title ||
    s?.name ||
    ""
  );
}

function getServiceTitle(s){
  return (
    s?.title ||
    s?.name ||
    s?.serviceName ||
    s?.serviceKey ||
    getServiceCodeFromService(s) ||
    "Service"
  );
}

function getServiceCodeFromTrip(t){
  const direct = normalizeText(
    t?.serviceKey ||
    t?.serviceCode ||
    t?.serviceType ||
    t?.serviceSuffix ||
    t?.service ||
    t?.pricingSnapshot?.serviceKey ||
    t?.pricingSnapshot?.serviceCode ||
    t?.priceSnapshot?.serviceKey ||
    t?.priceSnapshot?.serviceCode ||
    ""
  ).toUpperCase();

  if(direct) return normalizeKnownCode(direct);

  const num = normalizeText(t?.tripNumber).toUpperCase();

  if(num.includes("-SH") || isSharedTrip(t)) return "SH";
  if(num.includes("-XL")) return "XL";
  if(num.includes("-WH")) return "WH";
  if(num.includes("-TX")) return "TX";
  if(num.includes("-LM")) return "LM";
  if(num.includes("-ST")) return "ST";

  return "ST";
}

function getServiceTitleByTrip(t){
  const code = getServiceCodeFromTrip(t);
  const service = services.find(s => getServiceCodeFromService(s) === code);
  return service ? getServiceTitle(service) : code;
}

function tripMatchesService(t,code){
  if(code === "ALL") return true;
  return getServiceCodeFromTrip(t) === code;
}

/* ===============================
   SOURCE
================================ */

function getSourceCode(t){
  if(isReservedStatus(t?.status,t)) return "RS";

  const raw = [
    t?.source,
    t?.from,
    t?.bookingSource,
    t?.createdBy,
    t?.bookingType,
    t?.type,
    t?.company ? "company" : ""
  ].join(" ").toLowerCase();

  if(
    t?.reserved === true ||
    t?.isReserved === true ||
    raw.includes("reserved") ||
    raw.includes("reservation")
  ){
    return "RS";
  }

  if(
    raw.includes("quote") ||
    raw.includes("gq") ||
    raw.includes("website") ||
    raw.includes("public")
  ){
    return "GQ";
  }

  if(
    raw.includes("company") ||
    raw.includes("portal") ||
    t?.company
  ){
    return "CO";
  }

  return t?.company ? "CO" : "GQ";
}

function sourceHTML(t){
  const code = getSourceCode(t);

  if(code === "RS"){
    return `<span class="source-pill reserved">Reserved</span>`;
  }

  if(code === "CO"){
    return `<span class="source-pill company">Company</span>`;
  }

  return `<span class="source-pill gq">Get Quote</span>`;
}
