<script>

/* =========================
   DYNAMIC COMPANY
========================= */

const dynamicCompany =

document.getElementById(
"dynamicCompanyName"
);

if(dynamicCompany){

dynamicCompany.innerText =

localStorage.getItem(
"companyName"
)

|| "Company";

}

/* =========================
   DYNAMIC TIME
========================= */

function updateDynamicTime(){

const timezone =

localStorage.getItem(
"systemTimezone"
)

|| "America/Phoenix";

const now = new Date();

const date = now.toLocaleDateString(
"en-US",
{
timeZone:timezone,
month:"short",
day:"numeric",
year:"numeric"
}
);

const time = now.toLocaleTimeString(
"en-US",
{
timeZone:timezone,
hour:"numeric",
minute:"2-digit",
second:"2-digit",
hour12:true
}
);

const el =
document.getElementById(
"dynamicTime"
);

if(el){

el.innerHTML = `
${date} ${time}
`;

}

}

updateDynamicTime();

setInterval(
updateDynamicTime,
1000
);

</script>
