<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f4f8fb;
}

#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

.page-body{
padding-top:520px;
padding-left:20px;
padding-right:20px;
}

@media(max-width:768px){
.page-body{
padding-top:620px;
}
}

.table-wrap{
width:100%;
overflow-x:auto;
}

table{
min-width:1500px;
width:100%;
border-collapse:collapse;
background:white;
font-size:13px;
}

th{
background:#0f172a;
color:white;
padding:8px;
text-align:center;
}

td{
padding:6px;
border-bottom:1px solid #e5e7eb;
text-align:center;
}

input,textarea{
width:100%;
padding:4px;
border:1px solid #ddd;
font-size:12px;
}

.notes{
height:38px;
resize:vertical;
}

.actions{
display:flex;
gap:6px;
justify-content:center;
}

.btn{
border:none;
padding:4px 8px;
border-radius:5px;
cursor:pointer;
font-size:12px;
}

.edit{
background:#2563eb;
color:white;
}

.delete{
background:#dc2626;
color:white;
}

.stop-row{
display:flex;
gap:5px;
margin-bottom:3px;
}

.addStop{
background:#facc15;
border:none;
padding:3px 6px;
border-radius:4px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="table-wrap">

<table id="tripTable">

<thead>

<tr>

<th>#</th>
<th>Trip #</th>
<th>Type</th>
<th>Company</th>
<th>Entry Name</th>
<th>Entry Phone</th>
<th>Client</th>
<th>Client Phone</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Notes</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="tripBody"></tbody>

</table>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/trips.js"></script>

</body>
</html>
