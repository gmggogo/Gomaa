<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

/* ================= GLOBAL ================= */

body{
  margin:0;
  font-family:Segoe UI,Arial,sans-serif;
  background:#f1f5f9;
  color:#0f172a;
}

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
}

/* ================= PAGE ================= */

.page-body{
  padding-top:140px; /* ✔ اترفعت لفوق */
  padding-left:20px;
  padding-right:20px;
  padding-bottom:30px;
}

/* ================= TOP ================= */

.admin-trips-top{
  position:sticky;
  top:0;
  z-index:800;
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:14px;
  padding:0 0 8px;
  background:#f1f5f9;
  border-bottom:1px solid #cbd5e1;
}

/* ================= STATS (DESKTOP) ================= */

.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(145px,1fr));
  gap:8px;
}

.stat-card{
  background:#fff;
  border:1px solid #dbe3ee;
  border-left:6px solid #2563eb;
  border-radius:14px;
  padding:10px 8px;
  text-align:center;
  box-shadow:0 5px 14px rgba(15,23,42,.07);
}

.stat-label{
  font-size:11px;
  font-weight:900;
  color:#64748b;
}

.stat-value{
  font-size:24px;
  font-weight:900;
}

/* ================= SERVICES (DESKTOP) ================= */

.service-strip{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:7px;
}

.service-card{
  background:#fff;
  border:1px solid #dbe3ee;
  border-radius:13px;
  padding:8px 7px;
  text-align:center;
  min-height:78px;
}

/* ================= TABLE ================= */

.table-scroll{
  overflow-x:auto;
  background:#fff;
  border-radius:14px;
  box-shadow:0 8px 22px rgba(15,23,42,.08);
}

.trip-table{
  width:100%;
  min-width:1560px;
  border-collapse:collapse;
}

.trip-table th,
.trip-table td{
  border:1px solid #dbe3ee;
  padding:5px;
  font-size:11px;
}

/* ================= MOBILE FIX ================= */

@media(max-width:768px){

.page-body{
  padding-top:120px;
  padding-left:10px;
  padding-right:10px;
}

/* 🔥 STATS = scroll بدل grid */

.stats-grid{
  display:flex;
  overflow-x:auto;
  gap:6px;
}

.stat-card{
  flex:0 0 90px;
  min-height:50px;
  padding:6px 5px;
}

.stat-label{
  font-size:9px;
}

.stat-value{
  font-size:15px;
}

/* 🔥 SERVICES */

.service-strip{
  display:flex;
  overflow-x:auto;
  gap:6px;
}

.service-card{
  flex:0 0 85px;
  min-height:60px;
  padding:6px 5px;
}

/* 🔥 TABLE */

.trip-table{
  min-width:1400px;
}

}

</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

  <div class="admin-trips-top">

    <div id="statsCards" class="stats-grid"></div>

    <div id="serviceCards" class="service-strip"></div>

    <div class="selection-bar">
      <button id="selectAllBtn" onclick="toggleSelectAll()">Select All</button>
      <button id="selectTodayBtn" onclick="toggleSelectToday()">Select Today</button>
      <button id="selectTomorrowBtn" onclick="toggleSelectTomorrow()">Select Tomorrow</button>
    </div>

  </div>

  <div id="tripsContainer"></div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/trips.js"></script>

</body>
</html>
