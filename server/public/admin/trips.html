<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root{
 --blue:#0f172a;
 --gold:#facc15;
 --today:#e0f2fe;
 --tomorrow:#fef9c3;
}

body{
 margin:0;
 padding-top:90px;
 background:#f8fafc;
 font-family:Arial,Helvetica,sans-serif;
}

/* HEADER */

.page-header{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:85px;
 background:linear-gradient(90deg,var(--blue),#1e293b);
 display:flex;
 align-items:center;
 padding:0 20px;
 color:#fff;
 z-index:999;
 border-bottom:3px solid var(--gold);
}

.header-left{width:25%}

.back-btn{
 background:var(--gold);
 border:none;
 padding:6px 12px;
 border-radius:8px;
 font-weight:bold;
 cursor:pointer;
}

.header-center{
 width:50%;
 text-align:center;
}

.header-center h1{
 margin:0;
 color:var(--gold);
 font-size:18px;
}

.header-right{
 width:25%;
 text-align:right;
 font-size:12px;
}

/* SEARCH */

.top-bar{
 padding:15px;
 background:#fff;
 border-bottom:1px solid #ddd;
}

#searchBox{
 width:100%;
 padding:8px;
 border:1px solid #ccc;
 border-radius:6px;
}

/* TABLE */

.hub-table{
 width:100%;
 border-collapse:collapse;
 background:#fff;
 font-size:13px;
}

.hub-table th{
 background:#0f172a;
 color:#fff;
 padding:8px;
}

.hub-table td{
 padding:6px;
 border-bottom:1px solid #eee;
}

.hub-table input{
 width:100%;
 font-size:12px;
 padding:3px;
}

/* ACTIONS */

.hub-actions{
 display:flex;
 gap:6px;
 justify-content:center;
 flex-wrap:wrap;
}

.hub-btn{
 border:none;
 padding:4px 8px;
 border-radius:6px;
 font-size:12px;
 cursor:pointer;
}

.edit-btn{background:#2563eb;color:#fff}
.save-btn{background:#16a34a;color:#fff}
.delete-btn{background:#dc2626;color:#fff}

.stop-btn{
 background:#2563eb;
 color:#fff;
 border:none;
 padding:2px 6px;
 font-size:11px;
 border-radius:6px;
 margin-top:3px;
}

/* GROUP TITLES */

.group-title{
 padding:10px;
 font-weight:bold;
 font-size:14px;
}

/* TODAY COLOR */

.today-group{
 background:var(--today);
}

/* TOMORROW COLOR */

.tomorrow-group{
 background:var(--tomorrow);
}

/* MOBILE */

@media(max-width:768px){

.hub-table{
 display:block;
 overflow-x:auto;
 white-space:nowrap;
}

}

</style>
</head>

<body>

<header class="page-header">

<div class="header-left">
<button class="back-btn" onclick="location.href='dashboard.html'">← Back</button>
</div>

<div class="header-center">
<h1>Trips</h1>
<p id="adminName">Welcome</p>
</div>

<div class="header-right">
<span id="clock"></span>
</div>

</header>

<div class="top-bar">
<input id="searchBox" placeholder="Search name / phone / address">
</div>

<div id="tripsContainer"></div>

<script src="trips.js"></script>

</body>
</html>
