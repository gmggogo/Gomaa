<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Trips</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
margin:0;
background:#f1f5f9;
font-family:Segoe UI,Arial;
padding-top:75px;
}

.group-title{
font-size:15px;
font-weight:700;
padding:12px;
background:#e2e8f0;
margin-top:15px;
border-left:4px solid #0f172a;
}

.trip-table{
width:100%;
border-collapse:collapse;
background:white;
font-size:13px;
}

.trip-table th{
background:#0f172a;
color:white;
padding:8px;
}

.trip-table td{
padding:6px;
border-bottom:1px solid #eee;
}

.trip-table input{
width:100%;
border:1px solid #ddd;
padding:4px;
font-size:12px;
}

.actions{
display:flex;
gap:6px;
justify-content:center;
}

.btn{
border:none;
padding:4px 8px;
border-radius:6px;
font-size:12px;
cursor:pointer;
}

.btn-edit{
background:#2563eb;
color:white;
}

.btn-delete{
background:#dc2626;
color:white;
}

.btn-disable{
background:#64748b;
color:white;
}

.row-company{
background:#fff6d6;
}

.row-individual{
background:#e8f4ff;
}

.row-reserved{
background:#dcfce7;
}

@media(max-width:768px){

.trip-table{
display:block;
overflow-x:auto;
white-space:nowrap;
}

}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div id="tripsContainer"></div>

<script src="/admin/header.js"></script>
<script src="/admin/trips.js"></script>

</body>
</html>
