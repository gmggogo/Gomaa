<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f1f5f9;
}

.page-body{
padding:20px;
}

.table-scroll{
width:100%;
overflow-x:auto;
}

.trip-table{
min-width:1200px;
width:100%;
border-collapse:collapse;
background:white;
font-size:13px;
}

.trip-table th{
background:#0f172a;
color:white;
padding:8px;
}

.trip-table td{
padding:6px;
border-bottom:1px solid #eee;
}

.trip-table input,
.trip-table textarea{
width:100%;
border:1px solid #ddd;
padding:4px;
font-size:12px;
}

.notes{
height:40px;
resize:vertical;
}

.group-title{
font-weight:700;
margin:20px 0 8px;
font-size:15px;
}

.btn{
border:none;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.btn-edit{background:#2563eb;color:white;}
.btn-delete{background:#dc2626;color:white;}
.btn-disable{background:#64748b;color:white;}

.dispatch-check:checked{
accent-color:#16a34a;
}

.add-stop{
background:#facc15;
border:none;
padding:3px 6px;
cursor:pointer;
border-radius:5px;
font-size:12px;
}

.row-company{background:#fff6d6;}
.row-individual{background:#e8f4ff;}
.row-reserved{background:#dcfce7;}

.stop-row{
display:flex;
align-items:center;
gap:5px;
margin-bottom:3px;
}

.stop-remove{
cursor:pointer;
color:#dc2626;
font-weight:bold;
}

</style>

</head>

<body>

<div class="page-body">

<div id="tripsContainer"></div>

</div>

<script src="/admin/trips.js"></script>

</body>
</html>
