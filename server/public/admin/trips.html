<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/admin/style.css">

<style>
body{margin:0;font-family:Segoe UI,Arial;background:#f1f5f9;}
#adminHeader{position:fixed;top:0;left:0;width:100%;z-index:1000;}

.page-body{
  padding-top:300px;
  padding-left:20px;
  padding-right:20px;
  padding-bottom:30px;
}

.admin-trips-top{display:flex;flex-direction:column;gap:14px;margin-bottom:18px;}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;
}

.stat-card,.service-card{
  background:#fff;
  border:1px solid #dbe3ee;
  border-radius:16px;
  padding:14px;
  box-shadow:0 6px 16px rgba(15,23,42,.06);
}

.stat-label{font-size:12px;color:#64748b;font-weight:800;}
.stat-value{font-size:26px;font-weight:900;color:#0f172a;margin-top:6px;}

.service-strip{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding-bottom:4px;
}

.service-card{
  min-width:130px;
  cursor:pointer;
  text-align:center;
  flex:0 0 auto;
}

.service-card.active{
  outline:3px solid #2563eb;
  background:#eff6ff;
}

.service-name{font-size:17px;font-weight:900;}
.service-total{font-size:25px;font-weight:900;margin:6px 0;}
.service-mini{
  display:flex;
  justify-content:center;
  gap:7px;
  font-size:12px;
  font-weight:800;
  color:#334155;
}

.selection-bar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.select-btn{
  border:none;
  background:#0f172a;
  color:#fff;
  border-radius:10px;
  padding:10px 14px;
  font-weight:800;
  cursor:pointer;
}

.table-scroll{width:100%;overflow-x:auto;}
.trip-table{width:100%;border-collapse:collapse;background:white;font-size:13px;min-width:1400px;}
.trip-table th{background:#0f172a;color:white;padding:8px;text-align:center;white-space:nowrap;}
.trip-table td{padding:6px;border-bottom:1px solid #eee;text-align:center;vertical-align:middle;position:relative;overflow:visible;}
.trip-table input{width:100%;border:1px solid #ddd;padding:4px;font-size:12px;box-sizing:border-box;border-radius:6px;}
.trip-table input:disabled{background:#f8fafc;color:#111827;opacity:1;}
.group-title{font-weight:700;margin:20px 0 8px;font-size:15px;}

.actions{display:flex;gap:6px;justify-content:center;align-items:center;flex-wrap:wrap;}
.btn{border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;}
.btn-edit{background:#2563eb;color:white;}
.btn-delete{background:#dc2626;color:white;}
.btn-disable{background:#f59e0b;color:white;font-weight:600;}
.dispatch-check:checked{accent-color:#16a34a;}

.add-stop{background:#facc15;border:none;padding:3px 6px;cursor:pointer;border-radius:5px;font-size:12px;margin-top:4px;}
.row-company{background:#fff6d6;}
.row-individual{background:#e8f4ff;}
.row-reserved{background:#dcfce7;}
.row-quote{background:#f3e8ff;}
.stop-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.stop-remove{cursor:pointer;color:#dc2626;font-weight:bold;}

.input-wrap{position:relative;width:100%;}
.suggestions{
  position:absolute;top:100%;left:0;right:0;background:#ffffff;border:1px solid #cbd5e1;
  border-radius:10px;z-index:99999;max-height:220px;overflow:auto;
  box-shadow:0 12px 24px rgba(0,0,0,.15);margin-top:4px;text-align:left;
}
.option{padding:10px 12px;cursor:pointer;font-size:13px;line-height:1.35;border-bottom:1px solid #eef2f7;background:#fff;color:#111827;}
.option:last-child{border-bottom:none;}
.option:hover{background:#eff6ff;}
.option.disabled{background:#f8fafc;color:#64748b;cursor:default;}

@media (max-width:1100px){.stats-grid{grid-template-columns:repeat(3,1fr);}}
@media (max-width:768px){
  .page-body{padding-top:360px;padding-left:10px;padding-right:10px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .trip-table{font-size:12px;}
  .trip-table th{padding:7px;font-size:12px;}
  .trip-table td{padding:5px;}
  .trip-table input{font-size:12px;padding:5px;}
}
</style>
</head>

<body>
<div id="adminHeader"></div>

<div class="page-body">

  <div class="admin-trips-top">
    <div id="statsCards" class="stats-grid"></div>
    <div id="serviceCards" class="service-strip"></div>

    <div class="selection-bar">
      <button id="selectAllBtn" class="select-btn" onclick="toggleSelectAll()">SELECT ALL</button>
      <button id="selectTodayBtn" class="select-btn" onclick="toggleSelectToday()">SELECT TODAY</button>
      <button id="selectTomorrowBtn" class="select-btn" onclick="toggleSelectTomorrow()">SELECT TOMORROW</button>
    </div>
  </div>

  <div id="tripsContainer"></div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/trips.js"></script>
</body>
</html>
