<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Sunbeam Trips</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f1f5f9;
}

/* الهيدر */

#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

/* المسافة تحت الهيدر */

.page-body{
padding-top:200px;
padding-left:20px;
padding-right:20px;
}

/* container */

.trips-container{
width:100%;
}

/* scroll للموبايل */

.table-scroll{
width:100%;
overflow-x:auto;
-webkit-overflow-scrolling:touch;
}

/* الجدول */

.trip-table{
min-width:1200px;
border-collapse:collapse;
background:white;
font-size:13px;
}

.trip-table th{
background:#0f172a;
color:white;
padding:8px;
text-align:left;
}

.trip-table td{
padding:6px;
border-bottom:1px solid #eee;
}

/* input */

.trip-table input{
width:100%;
border:1px solid #ddd;
padding:4px;
font-size:12px;
}

/* العناوين */

.group-title{
font-weight:700;
margin:20px 0 6px;
}

/* الأزرار */

.btn{
border:none;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.btn-edit{
background:#2563eb;
color:white;
}

.btn-delete{
background:#dc2626;
color:white;
}

.btn-disable{
background:#64748b;
color:white;
}

/* dispatch */

.dispatch-check:checked{
accent-color:#16a34a;
}

/* stop */

.add-stop{
background:#facc15;
border:none;
padding:3px 6px;
cursor:pointer;
border-radius:5px;
font-size:12px;
}

/* ألوان الرحلات */

.row-company{
background:#fff6d6;
}

.row-individual{
background:#e8f4ff;
}

.row-reserved{
background:#dcfce7;
}

.stop{
display:block;
margin-bottom:3px;
}

/* موبايل */

@media (max-width:768px){

.page-body{
padding-top:240px;
padding-left:10px;
padding-right:10px;
}

.trip-table{
min-width:1000px;
font-size:12px;
}

}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="trips-container">

<div id="tripsContainer"></div>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/trips.js"></script>

</body>
</html>
