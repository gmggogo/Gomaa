<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Refunds – Sunbeam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ مهم -->
<link rel="stylesheet" href="/admin/style.css">

<style>
body{
  font-family:Arial;
  background:#f8fafc;
  margin:0;
  color:#111827;
}

.page{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h2{margin-bottom:10px}

/* SEARCH */
.search-box{
  margin:15px 0;
}

.search-box input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

/* TABLE */
.table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.table th{
  background:#111827;
  color:#fff;
  padding:12px;
  font-size:13px;
}

.table td{
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:14px;
  text-align:center;
}

/* STATUS */
.full{color:#22c55e;font-weight:bold}
.partial{color:#f59e0b;font-weight:bold}
.none{color:#ef4444;font-weight:bold}

/* MOBILE */
@media(max-width:900px){
  .table{
    display:block;
    overflow-x:auto;
  }
}
</style>
</head>

<body>

<!-- 🔥 HEADER -->
<div id="header"></div>

<div class="page">

<h2>Refunds</h2>

<!-- 🔍 SEARCH -->
<div class="search-box">
  <input id="search" placeholder="Search Trip / Name / Phone / Email">
</div>

<!-- 📊 TABLE -->
<table class="table">
<thead>
<tr>
  <th>Trip #</th>
  <th>Client</th>
  <th>Phone</th>
  <th>Email</th>
  <th>Trip Time</th>
  <th>Cancel Time</th>
  <th>Paid</th>
  <th>Refund</th>
  <th>Fee</th>
  <th>Status</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

<!-- 🔥 HEADER LOAD -->
<script>
fetch("/admin/header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>

<script>

// =======================
// LOAD DATA
// =======================
async function loadRefunds(){

  const res = await fetch("/api/trips");
  const trips = await res.json();

  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  trips
    .filter(t => t.status === "Cancelled")
    .forEach(t => {

      // 🔥 STATUS الحقيقي
      let statusClass = "none";
      let statusText = "No Refund";

      if(t.refundStatus === "processing"){
        statusClass = "partial";
        statusText = "Processing";
      }
      else if(t.refundStatus === "refunded"){
        statusClass = "full";
        statusText = "Refunded";
      }

      // 🟢 Trip Time
      const tripTime = (t.tripDate || "-") + " " + (t.tripTime || "");

      // 🔥 Cancel Time (مهم)
      const cancelTime = t.cancelDateTime
        ? new Date(t.cancelDateTime).toLocaleString()
        : "-";

      const row = `
        <tr>
          <td>${t.tripNumber || "-"}</td>
          <td>${t.clientName || "-"}</td>
          <td>${t.clientPhone || "-"}</td>
          <td>${t.clientEmail || "-"}</td>
          <td>${tripTime}</td>
          <td>${cancelTime}</td>
          <td>$${t.priceAmount || 0}</td>
          <td>$${t.refundAmount || 0}</td>
          <td>$${t.cancelFee || 0}</td>
          <td class="${statusClass}">${statusText}</td>
        </tr>
      `;

      tbody.innerHTML += row;
    });
}

loadRefunds();

// =======================
// SEARCH
// =======================
document.getElementById("search").addEventListener("input", function(){

  const val = this.value.toLowerCase();
  const rows = document.querySelectorAll("#tableBody tr");

  rows.forEach(r=>{
    r.style.display = r.innerText.toLowerCase().includes(val)
      ? ""
      : "none";
  });

});

</script>

</body>
</html>
