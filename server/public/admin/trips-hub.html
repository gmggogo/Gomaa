<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trips Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/trips-hub.css">

<style>
*{box-sizing:border-box;}

:root{
  --blue:#2563eb;
  --blueDark:#1d4ed8;
  --green:#16a34a;
  --red:#dc2626;
  --orange:#f59e0b;
  --purple:#7c3aed;
  --text:#0f172a;
  --muted:#64748b;
  --bg:#f4f8fb;
  --card:#ffffff;
  --border:#dbe3ee;
}

body{
  margin:0;
  background:var(--bg);
  font-family:Arial,sans-serif;
  color:var(--text);
}

.page-content{
  padding:22px;
  width:100%;
}

/* HEADER TITLE */

.page-head{
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px 20px;
  margin-bottom:18px;
  box-shadow:0 8px 22px rgba(15,23,42,.06);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
}

.page-title{
  font-size:26px;
  font-weight:900;
}

.page-sub{
  margin-top:5px;
  color:var(--muted);
  font-size:13px;
  font-weight:700;
}

.role-badge{
  background:#e0edff;
  color:#1d4ed8;
  padding:9px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
}

/* TOOLBAR */

.toolbar{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.add-btn{
  background:var(--blue);
  color:#fff;
  border:none;
  padding:11px 18px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  font-weight:900;
  box-shadow:0 6px 16px rgba(37,99,235,.18);
}

.add-btn:hover{
  background:var(--blueDark);
}

.search-input{
  flex:1;
  min-width:240px;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  font-size:14px;
  outline:none;
  font-weight:700;
  background:#fff;
}

.search-input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.12);
}

/* TABS */

.hub-tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:18px;
}

.hub-tab{
  border:none;
  border-radius:16px;
  padding:16px;
  cursor:pointer;
  background:#e2e8f0;
  color:#0f172a;
  font-weight:900;
  font-size:15px;
  box-shadow:0 6px 16px rgba(15,23,42,.05);
}

.hub-tab.active{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;
}

.tab-title{
  display:block;
  font-size:16px;
}

.tab-count{
  display:block;
  margin-top:6px;
  font-size:12px;
  opacity:.85;
}

/* CONTAINER */

#hubContainer{
  width:100%;
  overflow-x:auto;
}

/* GROUP TITLE */

.group-title{
  font-size:18px;
  font-weight:900;
  margin:20px 0 10px;
  color:#0f172a;
}

/* TABLE */

.hub-table{
  width:100%;
  border-collapse:collapse;
  table-layout:auto;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 8px 22px rgba(15,23,42,.08);
  margin-bottom:22px;
}

.hub-table th,
.hub-table td{
  border:1px solid var(--border);
  padding:8px;
  text-align:center;
  font-size:12px;
  vertical-align:middle;
}

.hub-table th{
  background:#0f172a;
  color:#fff;
  white-space:nowrap;
  font-weight:900;
}

.hub-table td{
  position:relative;
  overflow:visible;
  background-clip:padding-box;
  font-weight:700;
}

.hub-table input,
.hub-table textarea,
.hub-table select{
  width:100%;
  box-sizing:border-box;
  padding:7px 8px;
  border:1px solid #cbd5e1;
  border-radius:7px;
  font-size:12px;
  font-family:inherit;
  font-weight:700;
}

.hub-table textarea{
  min-height:48px;
  resize:vertical;
}

.hub-table input:disabled,
.hub-table textarea:disabled,
.hub-table select:disabled{
  background:#f8fafc;
  color:#111827;
  opacity:1;
}

/* AUTOCOMPLETE */

.input-wrap{
  position:relative;
  width:100%;
}

.suggestions{
  position:absolute;
  top:100%;
  left:0;
  right:0;
  background:#fff;
  border:1px solid #cbd5e1;
  border-radius:10px;
  z-index:99999;
  max-height:220px;
  overflow:auto;
  box-shadow:0 15px 30px rgba(0,0,0,.15);
  margin-top:4px;
  text-align:left;
}

.option{
  padding:10px 12px;
  cursor:pointer;
  font-size:13px;
  border-bottom:1px solid #eef2f7;
  color:#111827;
  background:#fff;
}

.option:hover{
  background:#eff6ff;
}

.option.disabled{
  background:#f8fafc;
  color:#64748b;
  cursor:default;
}

/* ACTIONS */

.hub-actions{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
}

.hub-btn{
  border:none;
  padding:7px 11px;
  border-radius:7px;
  cursor:pointer;
  font-size:12px;
  font-weight:900;
}

.edit{background:#3b82f6;color:#fff;}
.save{background:#16a34a;color:#fff;}
.delete{background:#dc2626;color:#fff;}

.no-data{
  background:#fff;
  padding:18px;
  border-radius:14px;
  box-shadow:0 8px 22px rgba(15,23,42,.08);
  color:#475569;
  font-weight:900;
}

/* SHARED CARDS READY */

.shared-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 8px 22px rgba(15,23,42,.07);
}

.shared-title{
  font-size:17px;
  font-weight:900;
  margin-bottom:10px;
}

.shared-meta{
  color:var(--muted);
  font-size:13px;
  font-weight:800;
  margin-bottom:12px;
}

/* MOBILE */

@media(max-width:768px){
  .page-content{
    padding:12px;
  }

  .toolbar{
    flex-direction:column;
    align-items:stretch;
  }

  .add-btn,
  .search-input{
    width:100%;
  }

  .hub-tabs{
    grid-template-columns:1fr;
  }

  .hub-table{
    min-width:1300px;
  }

  .page-title{
    font-size:22px;
  }
}
</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-content">

 
  <div class="toolbar">
    <button id="addManualTripBtn" class="add-btn" type="button">
      + Add Reserved Trip
    </button>

    <input
      id="searchInput"
      class="search-input"
      type="text"
      placeholder="Search trip #, name, phone, company">
  </div>

  <div id="hubContainer"></div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/trips-hub.js"></script>

</body>
</html>
