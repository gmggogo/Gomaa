<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trips Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/trips-hub.css">

<style>
*{box-sizing:border-box;}

:root{
  --blue:#2563eb;
  --blueDark:#1d4ed8;
  --green:#16a34a;
  --red:#dc2626;
  --orange:#f59e0b;
  --purple:#7c3aed;
  --text:#0f172a;
  --muted:#64748b;
  --bg:#f4f8fb;
  --card:#ffffff;
  --border:#dbe3ee;
}

body{
  margin:0;
  background:var(--bg);
  font-family:Arial,sans-serif;
  color:var(--text);
}

.page-content{
  padding:22px;
  width:100%;
}

/* TOOLBAR */

.toolbar{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.add-btn{
  background:var(--blue);
  color:#fff;
  border:none;
  padding:11px 18px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  font-weight:900;
  box-shadow:0 6px 16px rgba(37,99,235,.18);
}

.add-btn:hover{
  background:var(--blueDark);
}

.search-input{
  flex:1;
  min-width:240px;
  padding:12px 14px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  font-size:14px;
  outline:none;
  font-weight:700;
  background:#fff;
}

.search-input:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.12);
}

/* CONTAINER */

#hubContainer{
  width:100%;
}

/* TABLE */

.table-wrap{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  border-radius:16px;
  background:#fff;
  box-shadow:0 8px 22px rgba(15,23,42,.08);
}

.hub-table{
  width:100%;
  min-width:1450px;
  border-collapse:collapse;
  background:#fff;
}

.hub-table th,
.hub-table td{
  border:1px solid var(--border);
  padding:8px;
  text-align:center;
  font-size:12px;
  vertical-align:middle;
  font-weight:700;
}

.hub-table th{
  background:#0f172a;
  color:#fff;
  white-space:nowrap;
  font-weight:900;
  position:sticky;
  top:0;
  z-index:2;
}

.date-row td{
  background:#1e293b!important;
  color:#fff!important;
  text-align:left!important;
  font-size:14px!important;
  font-weight:900!important;
  padding:11px 14px!important;
}

/* ROW COLORS */

.facility-row td{background:#dbeafe;}
.gq-row td{background:#dcfce7;}
.reserved-row td{background:#fef3c7;}
.shared-row td{background:#ede9fe;}
.new-trip-row td{box-shadow:inset 0 0 0 9999px rgba(22,163,74,.08);}

/* WIDTHS */

.w-trip{min-width:110px;}
.w-facility{min-width:130px;}
.w-client{min-width:160px;text-align:left!important;}
.w-phone{min-width:110px;}
.w-address{min-width:220px;max-width:320px;text-align:left!important;white-space:pre-line;word-break:break-word;}
.w-stops{min-width:180px;max-width:260px;text-align:left!important;white-space:pre-line;word-break:break-word;}
.w-notes{min-width:170px;max-width:260px;text-align:left!important;white-space:pre-line;word-break:break-word;}
.w-date{min-width:105px;}
.w-time{min-width:90px;}
.w-status{min-width:105px;}
.w-view{min-width:70px;}

/* PILLS */

.trip-number-badge{
  font-weight:900;
  color:#1d4ed8;
  white-space:nowrap;
}

.status-pill{
  display:inline-flex;
  padding:5px 9px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  background:#f1f5f9;
  color:#0f172a;
  white-space:nowrap;
}

.status-pill.scheduled{
  background:#f1f5f9;
  color:#334155;
  border:1px solid #cbd5e1;
}

.status-pill.confirmed{
  background:#bbf7d0;
  color:#14532d;
  border:1px solid #86efac;
}

.status-pill.paid{
  background:#dbeafe;
  color:#1d4ed8;
  border:1px solid #93c5fd;
}

/* VIEW */

.view-btn{
  border:none;
  background:#0f172a;
  color:#fff;
  width:34px;
  height:34px;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  font-weight:900;
}

.view-btn:hover{
  background:#2563eb;
}

.details-row td{
  background:#f8fafc!important;
  padding:0!important;
}

.details-box{
  padding:14px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.details-item{
  background:#fff;
  border:1px solid #dbe3ee;
  border-radius:10px;
  padding:10px;
  text-align:left;
}

.details-label{
  font-size:11px;
  color:#64748b;
  font-weight:900;
  margin-bottom:4px;
}

.details-value{
  font-size:13px;
  font-weight:800;
  color:#0f172a;
  white-space:pre-line;
  word-break:break-word;
}

/* SHARED INNER CELLS */

.shared-grid{
  display:flex;
  flex-direction:column;
  border:1px solid #cbd5e1;
  border-radius:8px;
  overflow:hidden;
  background:#fff;
}

.shared-cell{
  min-height:34px;
  padding:7px;
  border-bottom:1px solid #cbd5e1;
  background:#fff;
  text-align:left;
  font-size:12px;
  font-weight:800;
  white-space:pre-line;
  word-break:break-word;
}

.shared-cell:last-child{
  border-bottom:none;
}

/* EDIT */

.edit-input,
.edit-textarea{
  width:100%;
  min-width:95px;
  padding:7px;
  border:1px solid #cbd5e1;
  border-radius:7px;
  font-size:12px;
  font-weight:700;
  box-sizing:border-box;
  font-family:inherit;
}

.edit-textarea{
  min-height:58px;
  resize:vertical;
}

/* NO DATA */

.no-data{
  background:#fff;
  padding:18px;
  border-radius:14px;
  box-shadow:0 8px 22px rgba(15,23,42,.08);
  color:#475569;
  font-weight:900;
}

/* MOBILE */

@media(max-width:768px){
  .page-content{
    padding:12px;
  }

  .toolbar{
    flex-direction:column;
    align-items:stretch;
  }

  .add-btn,
  .search-input{
    width:100%;
  }

  .hub-table{
    min-width:1200px;
  }

  .hub-table th,
  .hub-table td{
    font-size:11px;
    padding:6px;
  }

  .w-address{
    min-width:180px;
  }

  .w-stops{
    min-width:150px;
  }

  .w-notes{
    min-width:150px;
  }

  .details-box{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-content">

  <div class="toolbar">
    <button id="addManualTripBtn" class="add-btn" type="button">
      + Add Trip
    </button>

    <input
      id="searchInput"
      class="search-input"
      type="text"
      placeholder="Search trip #, name, phone, company">
  </div>

  <div id="hubContainer"></div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/trips-hub.js"></script>

</body>
</html>
