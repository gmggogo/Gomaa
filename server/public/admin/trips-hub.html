<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Trips Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/trips-hub.css">

<style>

:root{
  --blue:#0f172a;
  --gold:#facc15;
}

body{
  margin:0;
  padding-top:95px;
  font-family:Arial, Helvetica, sans-serif;
  background:#f8fafc;
}

/* ===== HEADER ===== */

.page-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:85px;
  background:linear-gradient(90deg,var(--blue),#1e293b);
  display:flex;
  align-items:center;
  padding:0 20px;
  color:#fff;
  border-bottom:3px solid var(--gold);
  z-index:999;
}

.header-left{
  width:25%;
}

.back-btn{
  background:var(--gold);
  border:none;
  border-radius:8px;
  padding:6px 12px;
  font-weight:bold;
  cursor:pointer;
}

.header-center{
  width:50%;
  text-align:center;
}

.header-center h1{
  margin:0;
  font-size:18px;
  color:var(--gold);
}

.header-center p{
  margin-top:4px;
  font-size:12px;
}

.header-right{
  width:25%;
  text-align:right;
  font-size:12px;
}

/* ===== TOOLBAR ===== */

.toolbar{
  display:flex;
  gap:10px;
  align-items:center;
  margin:15px;
}

.add-btn{
  background:#2563eb;
  color:#fff;
  border:none;
  padding:7px 14px;
  border-radius:6px;
  cursor:pointer;
}

.search-input{
  flex:1;
  padding:7px;
}

/* ===== GROUP TITLE ===== */

.group-title{
  margin:18px 15px 8px;
  font-size:16px;
  font-weight:bold;
  color:#0f172a;
}

/* ===== TABLE ===== */

.hub-table{
  width:calc(100% - 30px);
  margin:0 15px 18px;
  border-collapse:collapse;
  font-size:12px;
}

.hub-table th{
  background:#0f172a;
  color:#fff;
  padding:6px;
}

.hub-table td{
  border:1px solid #e5e7eb;
  padding:5px;
  vertical-align:middle;
}

.hub-table input,
.hub-table textarea,
.hub-table select{
  width:100%;
  border:none;
  font-size:11px;
  background:transparent;
  box-sizing:border-box;
}

.hub-table textarea{
  resize:vertical;
  min-height:34px;
}

.hub-btn{
  border:none;
  border-radius:6px;
  padding:5px 10px;
  font-size:11px;
  cursor:pointer;
  color:#fff;
  margin:2px;
}

.edit-btn{
  background:#3b82f6;
}

.save-btn{
  background:#16a34a;
}

.delete-btn{
  background:#ef4444;
}

.no-data{
  margin:20px 15px;
  font-size:14px;
  color:#334155;
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="page-header">

<div class="header-left">
<button class="back-btn" onclick="goBack()">← Back</button>
</div>

<div class="header-center">
<h1>Trips Hub</h1>
<p id="welcomeText">Welcome</p>
</div>

<div class="header-right">
<span id="clock"></span>
</div>

</header>

<!-- TOOLBAR -->

<div class="toolbar">

<button
id="addManualTripBtn"
class="add-btn">
Add Reserved Trip
</button>

<input
id="searchInput"
class="search-input"
placeholder="Search trip #, name, phone, company">

</div>

<!-- TRIPS TABLE -->

<div id="hubContainer"></div>

<!-- JS FILE -->

<script src="/admin/trips-hub.js"></script>

<script>

/* ===== Admin Name ===== */

const adminRaw = localStorage.getItem("loggedAdmin");

if(adminRaw){
  try{
    const admin = JSON.parse(adminRaw);
    const name = admin.name || admin.username || admin.fullName || "";
    document.getElementById("welcomeText").innerText =
      name ? "Welcome, " + name : "Welcome";
  }catch{
    document.getElementById("welcomeText").innerText = "Welcome";
  }
}

/* ===== CLOCK ===== */

function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleDateString() + " " + now.toLocaleTimeString();
}

setInterval(updateClock,1000);
updateClock();

/* ===== BACK BUTTON ===== */

function goBack(){
  window.history.back();
}

</script>

</body>

</html>
