<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Trips Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="header.css">
<link rel="stylesheet" href="trips-hub.css">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f4f8fb;
padding-top:120px;
}

.toolbar{
display:flex;
gap:10px;
padding:20px;
}

.add-btn{
background:#2563eb;
color:white;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
}

.search-input{
flex:1;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

#hubContainer{
padding:20px;
}

</style>
</head>

<body>

<div id="adminHeader"></div>


<div class="toolbar">

<button id="addManualTripBtn" class="add-btn">
Add Reserved Trip
</button>

<input id="searchInput" class="search-input"
placeholder="Search trip #, name, phone, company">

</div>


<div id="hubContainer"></div>


<script src="header.js"></script>
<script src="trips-hub.js"></script>

</body>
</html>
