<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Service Management
</title>

<link
rel="stylesheet"
href="style.css"
/>

<style>

/* =========================
BODY
========================= */

body{
  margin:0;
  background:#f1f5f9;
  font-family:'Segoe UI',sans-serif;
  color:#0f172a;
}

/* =========================
HEADER
========================= */

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:9999;
}

/* =========================
PAGE
========================= */

.page-body{
  max-width:1800px;
  margin:auto;
  padding:260px 20px 80px;
}

@media(max-width:768px){

  .page-body{
    padding-top:340px;
    padding-left:12px;
    padding-right:12px;
  }

}

/* =========================
TITLE
========================= */

.page-title{
  font-size:34px;
  font-weight:900;
  margin-bottom:28px;
}

/* =========================
GRID
========================= */

.services-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(360px,1fr));

  gap:24px;

}

/* =========================
CARD
========================= */

.service-card{

  background:#fff;

  border-radius:28px;

  padding:24px;

  box-shadow:
  0 15px 35px rgba(0,0,0,.08);

}

/* =========================
TOP
========================= */

.service-top{

  display:flex;

  align-items:center;

  justify-content:space-between;

  margin-bottom:22px;

}

.service-info{

  display:flex;

  align-items:center;

  gap:16px;

}

.service-icon{

  width:72px;

  height:72px;

  border-radius:22px;

  background:#eff6ff;

  display:flex;

  align-items:center;

  justify-content:center;

  overflow:hidden;

}

.service-icon img{

  width:100%;
  height:100%;
  object-fit:cover;

}

.service-name{

  font-size:24px;

  font-weight:900;

}

.service-status{

  margin-top:5px;

  font-size:13px;

  font-weight:700;

  color:#64748b;

}

/* =========================
TOGGLE
========================= */

.toggle-btn{

  border:none;

  padding:14px 20px;

  border-radius:18px;

  font-size:13px;

  font-weight:900;

  cursor:pointer;

  color:#fff;

}

.toggle-on{
  background:#16a34a;
}

.toggle-off{
  background:#dc2626;
}

/* =========================
WARNING
========================= */

.warning-box{

  padding:14px;

  border-radius:16px;

  font-size:14px;

  font-weight:700;

  margin-bottom:20px;

}

.warning-green{
  background:#dcfce7;
  color:#166534;
}

.warning-red{
  background:#fee2e2;
  color:#991b1b;
}

/* =========================
FIELDS
========================= */

.fields{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:16px;

}

@media(max-width:768px){

  .fields{
    grid-template-columns:1fr;
  }

}

.field{

  display:flex;

  flex-direction:column;

  gap:6px;

}

.field label{

  font-size:13px;

  font-weight:800;

  color:#475569;

}

.field input,
.field select{

  width:100%;

  border:1px solid #cbd5e1;

  border-radius:16px;

  padding:14px;

  font-size:15px;

  background:#f8fafc;

  outline:none;

}

/* =========================
BUTTONS
========================= */

.buttons{

  display:flex;

  gap:14px;

  margin-top:24px;

}

.edit-btn,
.save-btn{

  flex:1;

  border:none;

  border-radius:18px;

  padding:16px;

  font-size:15px;

  font-weight:900;

  cursor:pointer;

}

.edit-btn{
  background:#f59e0b;
  color:#fff;
}

.save-btn{
  background:#145cff;
  color:#fff;
}

</style>

</head>

<body>

<!-- =========================
HEADER
========================= -->

<div id="adminHeader"></div>

<!-- =========================
BODY
========================= -->

<div class="page-body">

  <div class="page-title">
    Service Management
  </div>

  <div
    class="services-grid"
    id="servicesGrid"
  ></div>

</div>

<script src="header.js"></script>

<script src="service-management.js"></script>

</body>

</html>
