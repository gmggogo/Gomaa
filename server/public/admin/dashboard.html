<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f1f5f9;
}

/* HEADER */

#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

/* PAGE */

.page-body{
padding-top:300px;
padding-left:20px;
padding-right:20px;
}

/* MOBILE HEADER SPACE */

@media (max-width:768px){

.page-body{
padding-top:360px;
padding-left:10px;
padding-right:10px;
}

}

/* DASHBOARD GRID */

.dashboard-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* CARD */

.dashboard-card{
background:white;
border-radius:8px;
padding:20px;
text-align:center;
border:1px solid #e2e8f0;
}

.dashboard-card h3{
margin:0;
font-size:15px;
color:#0f172a;
}

.dashboard-number{
font-size:28px;
font-weight:bold;
margin-top:10px;
color:#2563eb;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="dashboard-grid">

<div class="dashboard-card">
<h3>Total Trips</h3>
<div class="dashboard-number" id="totalTrips">0</div>
</div>

<div class="dashboard-card">
<h3>Confirmed Trips</h3>
<div class="dashboard-number" id="confirmedTrips">0</div>
</div>

<div class="dashboard-card">
<h3>Cancelled Trips</h3>
<div class="dashboard-number" id="cancelledTrips">0</div>
</div>

<div class="dashboard-card">
<h3>Completed Trips</h3>
<div class="dashboard-number" id="completedTrips">0</div>
</div>

<div class="dashboard-card">
<h3>Dispatch Trips</h3>
<div class="dashboard-number" id="dispatchTrips">0</div>
</div>

</div>

</div>

<script src="/admin/header.js"></script>

<script>

async function loadDashboard(){

try{

const res = await fetch("/api/trips")
const trips = await res.json()

document.getElementById("totalTrips").innerText = trips.length

document.getElementById("confirmedTrips").innerText =
trips.filter(t=>t.status==="confirmed").length

document.getElementById("cancelledTrips").innerText =
trips.filter(t=>t.status==="cancelled").length

document.getElementById("completedTrips").innerText =
trips.filter(t=>t.status==="completed").length

document.getElementById("dispatchTrips").innerText =
trips.filter(t=>t.dispatchSelected).length

}catch(err){

console.log("Dashboard error",err)

}

}

document.addEventListener("DOMContentLoaded",()=>{

loadDashboard()

})

</script>

</body>
</html>
