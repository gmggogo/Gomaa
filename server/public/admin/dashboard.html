<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="header.css">
<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f4f8fb;
padding-top:120px;
}

.dashboard-cards{
display:flex;
gap:20px;
padding:30px;
flex-wrap:wrap;
}

.card{
background:white;
padding:25px;
border-radius:10px;
width:220px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
text-align:center;
}

.card h2{
margin:0;
font-size:32px;
}

.card p{
margin-top:10px;
color:#555;
}

</style>
</head>

<body>

<div id="adminHeader"></div>


<div class="dashboard-cards">

<div class="card">
<h2 id="totalTrips">0</h2>
<p>Total Trips</p>
</div>

<div class="card">
<h2 id="pendingTrips">0</h2>
<p>Pending Trips</p>
</div>

<div class="card">
<h2 id="driversCount">0</h2>
<p>Drivers</p>
</div>

<div class="card">
<h2 id="companiesCount">0</h2>
<p>Companies</p>
</div>

</div>


<script src="header.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
