<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dashboard – Sunbeam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">

<style>

/* ===============================
DASHBOARD GRID
================================ */

.dashboard-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

/* ===============================
CARD
================================ */

.dashboard-card{
background:#fff;
border-radius:8px;
padding:20px;
border:1px solid #ddd;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
text-align:center;
}

.dashboard-card h3{
font-size:15px;
margin:0 0 10px 0;
color:#0f172a;
}

.dashboard-number{
font-size:28px;
font-weight:700;
color:#1e3a8a;
}

/* ===============================
MOBILE
================================ */

@media(max-width:768px){

.dashboard-grid{
grid-template-columns:1fr;
gap:15px;
}

.dashboard-card{
padding:16px;
}

.dashboard-number{
font-size:24px;
}

}

</style>

</head>

<body>

<!-- HEADER -->
<div id="adminHeader"></div>

<!-- PAGE CONTENT -->
<div class="page-content">

<h1>Dashboard</h1>

<div class="dashboard-grid">

<div class="dashboard-card">
<h3>Total Trips</h3>
<div class="dashboard-number" id="totalTrips">0</div>
</div>

<div class="dashboard-card">
<h3>Confirmed Trips</h3>
<div class="dashboard-number" id="confirmedTrips">0</div>
</div>

<div class="dashboard-card">
<h3>Cancelled Trips</h3>
<div class="dashboard-number" id="cancelledTrips">0</div>
</div>

<div class="dashboard-card">
<h3>Completed Trips</h3>
<div class="dashboard-number" id="completedTrips">0</div>
</div>

<div class="dashboard-card">
<h3>Dispatch Trips</h3>
<div class="dashboard-number" id="dispatchTrips">0</div>
</div>

</div>

</div>

<script src="/admin/header.js"></script>

<script>

async function loadDashboard(){

try{

const res = await fetch("/api/trips")
const trips = await res.json()

document.getElementById("totalTrips").innerText = trips.length

document.getElementById("confirmedTrips").innerText =
trips.filter(t => (t.status || "").toLowerCase() === "confirmed").length

document.getElementById("cancelledTrips").innerText =
trips.filter(t => (t.status || "").toLowerCase() === "cancelled").length

document.getElementById("completedTrips").innerText =
trips.filter(t => (t.status || "").toLowerCase() === "completed").length

document.getElementById("dispatchTrips").innerText =
trips.filter(t => t.dispatchSelected === true).length

}catch(err){

console.error("Dashboard Load Error",err)

}

}

document.addEventListener("DOMContentLoaded",()=>{

loadDashboard()

})

</script>

</body>
</html>
