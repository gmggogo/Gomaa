<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dashboard – Sunbeam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- MAIN CSS -->
<link rel="stylesheet" href="/admin/style.css">

<!-- HEADER CSS -->
<link rel="stylesheet" href="/admin/header.css">

<style>

/* ===============================
PAGE
================================ */

.page{
padding:20px;
margin-top:120px;
}

/* ===============================
TITLE
================================ */

.page h1{
margin-bottom:25px;
font-size:24px;
color:#0f172a;
}

/* ===============================
GRID
================================ */

.dashboard-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;

}

/* ===============================
CARD
================================ */

.card{

background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
transition:.2s;

}

.card:hover{
transform:translateY(-3px);
}

/* ===============================
CARD TITLE
================================ */

.card h3{

margin:0;
font-size:16px;
color:#0f172a;

}

/* ===============================
NUMBER
================================ */

.card p{

font-size:26px;
font-weight:bold;
margin-top:10px;
color:#2563eb;

}

/* ===============================
MOBILE
================================ */

@media(max-width:768px){

.page{
margin-top:140px;
padding:15px;
}

.page h1{
font-size:20px;
}

}

</style>

</head>

<body>

<!-- HEADER LOAD -->
<div id="adminHeader"></div>

<!-- PAGE -->

<div class="page">

<h1>Dashboard</h1>

<div class="dashboard-grid">

<div class="card">
<h3>Total Trips</h3>
<p id="totalTrips">0</p>
</div>

<div class="card">
<h3>Confirmed Trips</h3>
<p id="confirmedTrips">0</p>
</div>

<div class="card">
<h3>Cancelled Trips</h3>
<p id="cancelledTrips">0</p>
</div>

<div class="card">
<h3>Completed Trips</h3>
<p id="completedTrips">0</p>
</div>

</div>

</div>

<!-- HEADER SCRIPT -->
<script src="/admin/header.js"></script>

<script>

/* ===============================
LOAD HEADER
================================ */

document.addEventListener("DOMContentLoaded",()=>{

fetch("/admin/header.html")
.then(res=>res.text())
.then(html=>{
document.getElementById("adminHeader").innerHTML=html
})

})

</script>

</body>
</html>
