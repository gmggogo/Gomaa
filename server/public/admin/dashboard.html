<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Admin Dashboard | Sunbeam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<style>

.dashboard{
max-width:1100px;
margin:40px auto;
padding:20px;
}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

gap:20px;

}

.card{

background:#fff;

border-radius:14px;

padding:16px;

text-align:center;

box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.card h2{

margin:0;

font-size:26px;

color:#0f172a;

}

.card p{

margin-top:6px;

font-size:13px;

color:#475569;

font-weight:bold;

}

</style>

</head>

<body>


<!-- HEADER LOAD -->
<div id="adminHeader"></div>


<!-- DASHBOARD -->

<div class="dashboard">

<div class="cards">

<div class="card">
<h2 id="totalTrips">0</h2>
<p>Total Trips</p>
</div>

<div class="card">
<h2 id="pendingTrips">0</h2>
<p>Pending Trips</p>
</div>

<div class="card">
<h2 id="driversCount">0</h2>
<p>Drivers</p>
</div>

<div class="card">
<h2 id="companiesCount">0</h2>
<p>Companies</p>
</div>

</div>

</div>


<script src="header.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
