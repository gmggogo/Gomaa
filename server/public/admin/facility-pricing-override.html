<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facility Pricing Override</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Segoe UI,Arial,sans-serif;
  background:#f1f5f9;
  color:#0f172a;
}

#adminHeader{
  position:sticky;
  top:0;
  z-index:1000;
}

.page-body{
  padding:22px;
}

.page-head{
  background:#fff;
  border:1px solid #dbe3ee;
  border-radius:18px;
  padding:18px 20px;
  margin-bottom:16px;
  box-shadow:0 8px 22px rgba(15,23,42,.06);
}

.page-title{
  font-size:26px;
  font-weight:900;
}

.page-sub{
  margin-top:6px;
  color:#64748b;
  font-size:13px;
  font-weight:800;
}

.layout{
  display:grid;
  grid-template-columns:280px 1fr;
  gap:16px;
}

.side-panel,
.main-panel{
  background:#fff;
  border:1px solid #dbe3ee;
  border-radius:16px;
  box-shadow:0 8px 22px rgba(15,23,42,.07);
  overflow:hidden;
}

.side-head,
.main-head{
  padding:14px;
  background:#0f172a;
  color:#fff;
  font-weight:900;
}

.company-search{
  width:100%;
  padding:12px;
  border:none;
  border-bottom:1px solid #e2e8f0;
  outline:none;
  font-weight:800;
}

.facility-list{
  max-height:calc(100vh - 240px);
  overflow:auto;
}

.facility-item{
  padding:12px;
  border-bottom:1px solid #e2e8f0;
  cursor:pointer;
  font-weight:900;
}

.facility-item:hover{
  background:#eff6ff;
}

.facility-item.active{
  background:#dbeafe;
  color:#1d4ed8;
}

.facility-name{
  font-size:13px;
}

.facility-status{
  margin-top:5px;
  font-size:11px;
  font-weight:900;
}

.facility-status.on{
  color:#16a34a;
}

.facility-status.off{
  color:#64748b;
}

.selected-box{
  padding:14px;
  border-bottom:1px solid #e2e8f0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.selected-name{
  font-size:18px;
  font-weight:900;
}

.mode-badge{
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.mode-badge.on{
  background:#dcfce7;
  color:#14532d;
}

.mode-badge.off{
  background:#e5e7eb;
  color:#374151;
}

.toggle-row{
  padding:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  border-bottom:1px solid #e2e8f0;
}

.toggle-title{
  font-weight:900;
}

.toggle-sub{
  margin-top:4px;
  font-size:12px;
  color:#64748b;
  font-weight:800;
}

.switch{
  position:relative;
  width:58px;
  height:30px;
}

.switch input{
  display:none;
}

.slider{
  position:absolute;
  cursor:pointer;
  inset:0;
  background:#cbd5e1;
  transition:.2s;
  border-radius:999px;
}

.slider:before{
  position:absolute;
  content:"";
  height:24px;
  width:24px;
  left:3px;
  bottom:3px;
  background:white;
  transition:.2s;
  border-radius:50%;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}

.switch input:checked + .slider{
  background:#16a34a;
}

.switch input:checked + .slider:before{
  transform:translateX(28px);
}

.notice{
  margin:14px;
  padding:12px;
  border-radius:12px;
  background:#eff6ff;
  color:#1e3a8a;
  font-size:13px;
  font-weight:800;
  border:1px solid #bfdbfe;
}

.services-grid{
  padding:14px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:12px;
}

.service-card{
  border:1px solid #cbd5e1;
  border-radius:14px;
  overflow:hidden;
  background:#fff;
}

.service-card.disabled{
  opacity:.65;
}

.service-head{
  padding:12px;
  background:#f8fafc;
  border-bottom:1px solid #e2e8f0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.service-title{
  font-weight:900;
  color:#0f172a;
}

.service-code{
  font-size:11px;
  font-weight:900;
  padding:5px 8px;
  border-radius:999px;
  background:#dbeafe;
  color:#1d4ed8;
}

.form-grid{
  padding:12px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.field label{
  font-size:11px;
  font-weight:900;
  color:#475569;
}

.field input,
.field select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  outline:none;
  font-weight:800;
}

.field input:disabled,
.field select:disabled{
  background:#f1f5f9;
  color:#64748b;
}

.actions{
  padding:14px;
  border-top:1px solid #e2e8f0;
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

.btn{
  border:none;
  border-radius:11px;
  padding:12px 18px;
  font-size:13px;
  font-weight:900;
  cursor:pointer;
}

.btn-save{
  background:#16a34a;
  color:#fff;
}

.btn-save:hover{
  background:#15803d;
}

.btn-refresh{
  background:#0f172a;
  color:#fff;
}

.empty{
  padding:24px;
  text-align:center;
  color:#64748b;
  font-weight:900;
}

@media(max-width:850px){
  .page-body{
    padding:12px;
  }

  .layout{
    grid-template-columns:1fr;
  }

  .facility-list{
    max-height:260px;
  }
}
</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

  <div class="page-head">
    <div class="page-title">Facility Pricing Override</div>
    <div class="page-sub">
      OFF = use Service Management. ON = use facility custom pricing only.
    </div>
  </div>

  <div class="layout">

    <div class="side-panel">
      <div class="side-head">Facilities</div>
      <input id="facilitySearch" class="company-search" placeholder="Search facility">
      <div id="facilityList" class="facility-list"></div>
    </div>

    <div class="main-panel">
      <div class="main-head">Pricing Control</div>

      <div id="mainContent" class="empty">
        Select a facility from the left.
      </div>
    </div>

  </div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/facility-pricing-override.js"></script>

</body>
</html>
