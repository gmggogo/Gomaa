<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facility Pricing Override</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>
*{
  box-sizing:border-box;
}

html,
body{
  margin:0;
  width:100%;
  min-height:100%;
  overflow-x:hidden;
}

body{
  font-family:Segoe UI,Arial,sans-serif;
  background:#f1f5f9;
  color:#0f172a;
}

/* ===============================
   HEADER
================================ */

#adminHeader{
  position:sticky;
  top:0;
  z-index:1000;
}

/* ===============================
   PAGE
================================ */

.page-body{
  padding:22px;
  width:100%;
}

.page-head{
  background:#fff;
  border:1px solid #dbe3ee;
  border-radius:18px;
  padding:18px 20px;
  margin-bottom:16px;
  box-shadow:0 8px 22px rgba(15,23,42,.06);
}

.page-title{
  font-size:26px;
  font-weight:900;
  color:#0f172a;
}

.page-sub{
  margin-top:6px;
  color:#64748b;
  font-size:13px;
  font-weight:800;
  line-height:1.5;
}

/* ===============================
   LAYOUT
================================ */

.layout{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:16px;
  align-items:start;
}

.side-panel,
.main-panel{
  background:#fff;
  border:1px solid #dbe3ee;
  border-radius:16px;
  box-shadow:0 8px 22px rgba(15,23,42,.07);
  overflow:hidden;
}

.side-head,
.main-head{
  padding:14px;
  background:#0f172a;
  color:#fff;
  font-weight:900;
  font-size:14px;
}

/* ===============================
   FACILITY SEARCH / LIST
================================ */

.company-search{
  width:100%;
  padding:12px;
  border:none;
  border-bottom:1px solid #e2e8f0;
  outline:none;
  font-size:13px;
  font-weight:800;
  color:#0f172a;
}

.company-search:focus{
  background:#f8fafc;
}

.facility-list{
  max-height:calc(100vh - 245px);
  overflow:auto;
  -webkit-overflow-scrolling:touch;
}

.facility-item{
  padding:12px;
  border-bottom:1px solid #e2e8f0;
  cursor:pointer;
  font-weight:900;
  background:#fff;
  transition:.15s ease;
}

.facility-item:hover{
  background:#eff6ff;
}

.facility-item.active{
  background:#dbeafe;
  color:#1d4ed8;
  border-left:5px solid #2563eb;
}

.facility-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

.facility-name{
  font-size:13px;
  line-height:1.3;
  word-break:break-word;
}

.facility-badge{
  flex:0 0 auto;
  font-size:10px;
  font-weight:900;
  padding:4px 7px;
  border-radius:999px;
  white-space:nowrap;
}

.facility-badge.active{
  background:#dcfce7;
  color:#14532d;
  border:1px solid #86efac;
}

.facility-badge.disabled{
  background:#fee2e2;
  color:#7f1d1d;
  border:1px solid #fecaca;
}

.facility-status{
  margin-top:6px;
  font-size:11px;
  font-weight:900;
  line-height:1.4;
}

.facility-status.on{
  color:#16a34a;
}

.facility-status.off{
  color:#64748b;
}

/* ===============================
   MAIN SELECTED FACILITY
================================ */

.selected-box{
  padding:14px;
  border-bottom:1px solid #e2e8f0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.selected-name{
  font-size:18px;
  font-weight:900;
  color:#0f172a;
}

.mode-badge{
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
}

.mode-badge.on{
  background:#dcfce7;
  color:#14532d;
  border:1px solid #86efac;
}

.mode-badge.off{
  background:#e5e7eb;
  color:#374151;
  border:1px solid #cbd5e1;
}

/* ===============================
   TOGGLE
================================ */

.toggle-row{
  padding:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  border-bottom:1px solid #e2e8f0;
}

.toggle-title{
  font-weight:900;
  color:#0f172a;
}

.toggle-sub{
  margin-top:4px;
  font-size:12px;
  color:#64748b;
  font-weight:800;
  line-height:1.5;
}

.switch{
  position:relative;
  flex:0 0 auto;
  width:58px;
  height:30px;
}

.switch input{
  display:none;
}

.slider{
  position:absolute;
  cursor:pointer;
  inset:0;
  background:#cbd5e1;
  transition:.2s;
  border-radius:999px;
}

.slider:before{
  position:absolute;
  content:"";
  height:24px;
  width:24px;
  left:3px;
  bottom:3px;
  background:white;
  transition:.2s;
  border-radius:50%;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}

.switch input:checked + .slider{
  background:#16a34a;
}

.switch input:checked + .slider:before{
  transform:translateX(28px);
}

/* ===============================
   NOTICE
================================ */

.notice{
  margin:14px;
  padding:12px;
  border-radius:12px;
  background:#eff6ff;
  color:#1e3a8a;
  font-size:13px;
  font-weight:800;
  border:1px solid #bfdbfe;
  line-height:1.5;
}

/* ===============================
   SERVICES GRID
================================ */

.services-grid{
  padding:14px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(360px,1fr));
  gap:14px;
  align-items:start;
}

.service-card{
  min-width:0;
  border:1px solid #cbd5e1;
  border-radius:14px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 6px 18px rgba(15,23,42,.06);
}

.service-card.disabled{
  opacity:.72;
}

.service-head{
  padding:12px;
  background:#f8fafc;
  border-bottom:1px solid #e2e8f0;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}

.service-title{
  font-weight:900;
  color:#0f172a;
  font-size:15px;
  line-height:1.3;
}

.service-sub{
  margin-top:4px;
  color:#64748b;
  font-size:11px;
  font-weight:800;
  line-height:1.4;
}

.service-code{
  flex:0 0 auto;
  font-size:11px;
  font-weight:900;
  padding:5px 8px;
  border-radius:999px;
  background:#dbeafe;
  color:#1d4ed8;
  border:1px solid #bfdbfe;
}

/* ===============================
   FORM
================================ */

.form-grid{
  padding:12px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:5px;
}

.field label{
  font-size:11px;
  font-weight:900;
  color:#475569;
  line-height:1.25;
}

.field input,
.field select{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  outline:none;
  font-size:13px;
  font-weight:800;
  color:#0f172a;
  background:#fff;
}

.field input:focus,
.field select:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,.12);
}

.field input:disabled,
.field select:disabled{
  background:#f1f5f9;
  color:#64748b;
  cursor:not-allowed;
}

/* ===============================
   POLICY BLOCKS
================================ */

.policy-title,
.add-stop-title{
  grid-column:1 / -1;
  padding:10px;
  border-radius:10px;
  background:#eff6ff;
  color:#1e3a8a;
  font-size:12px;
  font-weight:900;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  border:1px solid #bfdbfe;
}

.add-stop-title span{
  color:#64748b;
  font-size:11px;
  font-weight:800;
  text-align:right;
}

.shared-lock{
  grid-column:1 / -1;
  padding:10px;
  background:#fee2e2;
  border:1px solid #fecaca;
  color:#7f1d1d;
  border-radius:10px;
  font-size:12px;
  font-weight:800;
  line-height:1.5;
}

/* ===============================
   ACTIONS
================================ */

.actions{
  padding:14px;
  border-top:1px solid #e2e8f0;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  border:none;
  border-radius:11px;
  padding:12px 18px;
  font-size:13px;
  font-weight:900;
  cursor:pointer;
  transition:.15s ease;
}

.btn-save{
  background:#16a34a;
  color:#fff;
}

.btn-save:hover{
  background:#15803d;
}

.btn-refresh{
  background:#0f172a;
  color:#fff;
}

.btn-refresh:hover{
  background:#1d4ed8;
}

/* ===============================
   EMPTY
================================ */

.empty{
  padding:24px;
  text-align:center;
  color:#64748b;
  font-weight:900;
  line-height:1.5;
}

/* ===============================
   SCROLLBAR
================================ */

.facility-list::-webkit-scrollbar{
  width:6px;
}

.facility-list::-webkit-scrollbar-thumb{
  background:#94a3b8;
  border-radius:999px;
}

/* ===============================
   MOBILE
================================ */

@media(max-width:900px){
  .page-body{
    padding:12px;
  }

  .layout{
    grid-template-columns:1fr;
  }

  .facility-list{
    max-height:260px;
  }

  .services-grid{
    grid-template-columns:1fr;
  }
}

@media(max-width:650px){
  .page-title{
    font-size:22px;
  }

  .selected-box,
  .toggle-row{
    align-items:flex-start;
    flex-direction:column;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

  .actions{
    justify-content:stretch;
  }

  .btn{
    width:100%;
  }

  .policy-title,
  .add-stop-title{
    flex-direction:column;
    align-items:flex-start;
  }

  .add-stop-title span{
    text-align:left;
  }
}
</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

  <div class="page-head">
    <div class="page-title">Facility Pricing Override</div>
    <div class="page-sub">
      OFF = use Service Management. ON = this facility uses its own pricing only.
    </div>
  </div>

  <div class="layout">

    <div class="side-panel">
      <div class="side-head">Facilities</div>

      <input
        id="facilitySearch"
        class="company-search"
        type="text"
        placeholder="Search facility"
      >

      <div id="facilityList" class="facility-list"></div>
    </div>

    <div class="main-panel">
      <div class="main-head">Pricing Control</div>

      <div id="mainContent" class="empty">
        Select a facility from the left.
      </div>
    </div>

  </div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/facility-pricing-override.js"></script>

</body>
</html>
