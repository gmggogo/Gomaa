<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Live Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<link rel="stylesheet" href="/admin/maps.css">

<style>
html,
body{
  margin:0;
  width:100%;
  height:100%;
  background:#020617;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

/* =========================
   ADMIN HEADER HOLDER
========================= */

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:10000;
}

/* =========================
   MAP PAGE
========================= */

.map-page{
  position:absolute;
  top:80px;
  left:0;
  right:0;
  bottom:0;
  background:#020617;
}

#map{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
}

/* =========================
   SMALL TITLE OVER MAP
========================= */

.map-title-box{
  position:fixed;
  top:92px;
  left:50%;
  transform:translateX(-50%);
  z-index:9998;
  background:rgba(15,23,42,.92);
  color:white;
  padding:8px 18px;
  border-radius:999px;
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  text-align:center;
  pointer-events:none;
}

.map-title-box h2{
  margin:0;
  font-size:14px;
  color:#facc15;
  font-weight:900;
}

.map-title-box span{
  display:block;
  font-size:11px;
  color:#cbd5e1;
  margin-top:2px;
  font-weight:700;
}

/* =========================
   MOBILE
========================= */

@media(max-width:800px){

  .map-page{
    top:75px;
  }

  .map-title-box{
    top:84px;
    padding:6px 12px;
  }

  .map-title-box h2{
    font-size:12px;
  }

  .map-title-box span{
    font-size:10px;
  }

}
</style>
</head>

<body>

<!-- ADMIN MAIN HEADER -->
<div id="adminHeader"></div>

<!-- MAP TITLE -->
<div class="map-title-box">
  <h2>Sunbeam Transportation</h2>
  <span>LIVE DRIVERS MAP</span>
</div>

<!-- MAP -->
<div class="map-page">
  <div id="map"></div>
</div>

<script>
/* =========================
   SECURITY
========================= */

const token = localStorage.getItem("token") || "";
const role  = localStorage.getItem("role") || "";

if(!token || !["superadmin","admin","dispatcher"].includes(role)){
  window.location.href = "/admin/login.html";
}

/* =========================
   LOAD ADMIN HEADER
========================= */

async function loadAdminHeader(){

  try{

    const holder =
      document.getElementById("adminHeader");

    if(!holder){
      return;
    }

    const res =
      await fetch("/admin/header.html", {
        cache:"no-store"
      });

    if(res.ok){
      holder.innerHTML = await res.text();
    }

    const script =
      document.createElement("script");

    script.src = "/admin/header.js";
    script.defer = true;

    document.body.appendChild(script);

  }catch(err){

    console.log("HEADER LOAD ERROR:", err);

  }

}

loadAdminHeader();
</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/admin/maps.js"></script>

</body>
</html>
