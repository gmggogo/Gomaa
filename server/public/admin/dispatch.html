<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{background:#f3f4f6}

.top-layout{
display:flex;
gap:15px;
margin-bottom:15px;
}

#map{
width:33%;
height:250px;
border-radius:10px;
}

#driversBox{
flex:1;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.driver-card{
background:#1e3a8a;
color:#fff;
padding:10px;
border-radius:6px;
}

table{
width:100%;
background:#fff;
border-collapse:collapse;
}

th{
background:#1e3a8a;
color:#fff;
}

td,th{
padding:8px;
border:1px solid #ddd;
text-align:center;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div style="padding:15px">

<button onclick="Engine.toggleAll()">Select All</button>
<button onclick="Engine.editMode=!Engine.editMode;UI.render()">Edit</button>
<button onclick="Engine.sendSelected()">Send Selected</button>
<button onclick="Engine.runAuto()">Redistribute</button>

<div class="top-layout">
<div id="map"></div>
<div id="driversBox"></div>
</div>

<table>
<thead>
<tr>
<th>Select</th>
<th>Trip#</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Send</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

<script src="/admin/header.js"></script>
<script>
fetch("/admin/header.html")
.then(r=>r.text())
.then(h=>document.getElementById("adminHeader").innerHTML=h)
</script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.engine.js"></script>
<script src="/admin/dispatch.ui.js"></script>

<script>
Engine.load()
</script>

</body>
</html>
