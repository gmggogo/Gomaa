<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Dispatch Center</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 CSS -->
<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">

<style>

.page{
padding:20px;
}

/* TOP BAR */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

/* MAP + DRIVERS */
.top-layout{
display:flex;
gap:10px;
margin-bottom:15px;
}

#map{
width:33%;
height:220px;
background:#111;
border-radius:8px;
}

/* DRIVERS */
#driversBox{
flex:1;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.driver-card{
background:#1f2937;
padding:10px;
border-radius:6px;
min-width:120px;
text-align:center;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:#111827;
}

th,td{
padding:8px;
border:1px solid #1f2937;
font-size:13px;
text-align:center;
}

th{
background:#1e293b;
}

tr:hover{
background:#1f2937;
}

/* BUTTONS */
.btn{
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
font-size:12px;
}

.btn-blue{background:#2563eb;color:#fff;}
.btn-green{background:#16a34a;color:#fff;}
.btn-red{background:#dc2626;color:#fff;}
.btn-gray{background:#6b7280;color:#fff;}

</style>

</head>

<body>

<!-- 🔥 HEADER -->
<div id="adminHeader"></div>

<div class="page">

<h2>Dispatch Center</h2>

<!-- ACTION BUTTONS -->
<div class="top-bar">

<div>
<button class="btn btn-blue" onclick="Engine.toggleAll()">Select All</button>
<button class="btn btn-gray" onclick="Engine.editMode=!Engine.editMode;UI.render()">Edit Selected</button>
<button class="btn btn-green" onclick="Engine.sendSelected()">Send Selected</button>
<button class="btn btn-blue" onclick="Engine.runAuto()">Redistribute</button>
</div>

</div>

<!-- MAP + DRIVERS -->
<div class="top-layout">

<div id="map">MAP</div>

<div id="driversBox"></div>

</div>

<!-- TABLE -->
<table>

<thead>
<tr>
<th>Select</th>
<th>Trip#</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Send</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

<!-- 🔥 HEADER LOAD -->
<script src="/admin/header.js"></script>
<script>
fetch("/admin/header.html")
.then(res=>res.text())
.then(html=>{
document.getElementById("adminHeader").innerHTML=html
})
</script>

<!-- 🔥 SCRIPTS -->
<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.engine.js"></script>
<script src="/admin/dispatch.ui.js"></script>

<script>
Engine.load()
</script>

</body>
</html>
