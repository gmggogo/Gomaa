<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">

<style>

.page-body{
padding:15px 20px;
background:#f1f5f9;
min-height:calc(100vh - 80px);
}

.top-actions{
margin:10px 0;
display:flex;
gap:10px;
}

.btn{
padding:8px 12px;
border:none;
color:#fff;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

.blue{background:#2563eb}
.orange{background:#f97316}
.green{background:#16a34a}

table{
width:100%;
border-collapse:collapse;
background:#fff;
}

th{
background:#1e293b;
color:#fff;
padding:8px;
}

td{
border:1px solid #ddd;
padding:6px;
font-size:12px;
}

</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="top-actions">
<button class="btn blue" onclick="selectAll()">Select All</button>
<button class="btn orange" onclick="toggleEdit()" id="editBtn">Edit</button>
<button class="btn green" onclick="sendSelected()">Send Selected</button>
</div>

<table>
<thead>
<tr>
<th>Select</th>
<th>#</th>
<th>Client</th>
<th>Pickup</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Notes</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

<script>

let trips=[]
let drivers=[]
let editMode=false

/* ================= LOAD ================= */

async function load(){

  const res = await fetch("/api/dispatch")
  const data = await res.json()

  console.log("🔥 DATA:", data)

  trips = data.trips || []
  drivers = data.drivers || []

  render()

}

/* ================= RENDER ================= */

function render(){

  const body=document.getElementById("tbody")
  body.innerHTML=""

  trips.forEach((t,i)=>{

    body.innerHTML+=`
    <tr>

    <td>
      <input type="checkbox"
      ${t.selected?"checked":""}
      onchange="trips[${i}].selected=this.checked">
    </td>

    <td>${t.tripNumber || i+1}</td>

    <td>${t.clientName||""}</td>
    <td>${t.pickup||""}</td>
    <td>${t.dropoff||""}</td>
    <td>${t.tripDate||""}</td>
    <td>${t.tripTime||""}</td>

    <td>
      <select ${editMode?"":"disabled"}
      onchange="assignDriver(${i},this.value)">

        <option value="">--</option>

        ${drivers.map(d=>`
          <option value="${d._id}"
          ${t.driverId==d._id?"selected":""}>
          ${d.name}
          </option>
        `).join("")}

      </select>
    </td>

    <td>
      <input value="${t.vehicle||""}"
      ${editMode?"":"disabled"}
      oninput="trips[${i}].vehicle=this.value">
    </td>

    <td>
      <input value="${t.notes||""}"
      ${editMode?"":"disabled"}
      oninput="trips[${i}].notes=this.value">
    </td>

    <td>
      <button onclick="sendOne('${t._id}')">Send</button>
    </td>

    </tr>
    `
  })

}

/* ================= ACTIONS ================= */

function selectAll(){
  trips.forEach(t=>t.selected=true)
  render()
}

function toggleEdit(){

  editMode=!editMode

  document.getElementById("editBtn").innerText =
  editMode?"Save":"Edit"

  render()
}

/* ================= DRIVER ASSIGN ================= */

async function assignDriver(i,driverId){

  const trip=trips[i]

  await fetch(`/api/dispatch/${trip._id}/driver`,{
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({driverId})
  })

  console.log("Driver assigned")
}

/* ================= SEND ================= */

async function sendOne(id){

  await fetch("/api/dispatch/send",{
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ids:[id]})
  })

  alert("Sent")
  load()
}

async function sendSelected(){

  const ids = trips.filter(t=>t.selected).map(t=>t._id)

  if(!ids.length) return alert("No selection")

  await fetch("/api/dispatch/send",{
    method:"PATCH",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ids})
  })

  alert("Sent")
  load()
}

/* ================= START ================= */

load()

</script>

</body>
</html>
