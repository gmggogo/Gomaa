<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dispatch – Sunbeam</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="/admin/dispatch.css">

<style>

/* ===============================
PAGE
================================ */

.page-body{
max-width:1400px;
margin:auto;
padding:220px 20px 40px;
}

/* ===============================
TITLE
================================ */

.page-title{
margin-bottom:20px;
font-size:22px;
font-weight:700;
}

/* ===============================
ACTION BAR
================================ */

.dispatch-bar{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.dispatch-bar button{
background:#1e3a8a;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.dispatch-bar button:hover{
background:#162d6b;
}

/* ===============================
TABLE
================================ */

.table-wrapper{
width:100%;
overflow-x:auto;
}

.dispatch-table{
width:100%;
border-collapse:collapse;
min-width:1100px;
background:white;
}

.dispatch-table th,
.dispatch-table td{
padding:8px;
border:1px solid #ddd;
font-size:13px;
text-align:left;
}

.dispatch-table th{
background:#0f172a;
color:white;
}

/* ===============================
MOBILE
================================ */

@media(max-width:768px){

.page-body{
padding:300px 10px 40px;
}

.page-title{
font-size:18px;
}

.dispatch-bar button{
font-size:12px;
padding:7px 10px;
}

}

</style>

</head>

<body>

<!-- HEADER -->
<div id="adminHeader"></div>

<div class="page-body">

<h2 class="page-title">Dispatch Center</h2>

<div class="dispatch-bar">

<button onclick="selectAll()">Select All</button>
<button onclick="removeAll()">Remove All</button>
<button onclick="Engine.sendSelected()">Send Selected</button>
<button onclick="editSelected()">Edit Selected</button>
<button onclick="Engine.saveDrivers()">Save</button>

</div>

<div class="table-wrapper">

<table class="dispatch-table">

<thead>

<tr>
<th>Select</th>
<th>Trip #</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Send</th>
</tr>

</thead>

<tbody id="dispatchBody">

<tr>
<td colspan="11" style="text-align:center;padding:40px">
Loading trips...
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.engine.js"></script>
<script src="/admin/dispatch.ui.js"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

Engine.load()

})

function selectAll(){
document.querySelectorAll(".tripSelect")
.forEach(c=>c.checked=true)
}

function removeAll(){
document.querySelectorAll(".tripSelect")
.forEach(c=>c.checked=false)
}

function editSelected(){

const rows=document.querySelectorAll(".tripSelect:checked")

rows.forEach(chk=>{

const row=chk.closest("tr")
const cell=row.querySelector(".driverCell")
const current=cell.innerText

cell.innerHTML=`

<select class="driverEdit">

<option value="">Select Driver</option>

${Engine.drivers.map(d=>`
<option value="${d._id}" ${d.name===current?"selected":""}>
${d.name}
</option>
`).join("")}

</select>

`

})

}

</script>

</body>
</html>
