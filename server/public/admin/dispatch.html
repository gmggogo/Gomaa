<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
.page-body{padding:15px 20px;background:#f1f5f9;min-height:calc(100vh - 80px);}
.dispatch-tabs{display:flex;margin-bottom:5px;}
.tab-btn{flex:1;padding:14px;border:none;background:#1e293b;color:#fff;font-weight:bold;cursor:pointer;}
.tab-btn.active{background:#2563eb;}
.top-actions{margin:10px 0;display:flex;gap:10px;flex-wrap:wrap;}
.btn{padding:8px 12px;border:none;color:#fff;cursor:pointer;border-radius:5px;font-weight:bold;}
.blue{background:#2563eb}
.orange{background:#f97316}
.green{background:#16a34a}
.purple{background:#7c3aed}

table{width:100%;border-collapse:collapse;background:#fff;}
th{background:#1e293b;color:#fff;padding:8px;}
td{border:1px solid #ddd;padding:6px;font-size:12px;}

.tab-page{display:none}
.tab-page.active{display:block}

.drivers-layout{display:flex;height:80vh;}
#map{width:70%;}
#driversPanel{width:30%;background:#0f172a;color:#fff;overflow:auto;}

.driver{padding:10px;border-bottom:1px solid #1e293b;cursor:pointer;}
.driver-bar{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:13px;}
.driver-name{font-weight:bold;}
.driver-info{display:flex;gap:10px;}

.driver-marker div{
background:#2563eb;
color:#fff;
border-radius:50%;
width:30px;
height:30px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}
</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="dispatch-tabs">
<button id="tabTrips" class="tab-btn active">Trips</button>
<button id="tabDrivers" class="tab-btn">Drivers Map</button>
</div>

<!-- TRIPS -->
<div id="tripsPage" class="tab-page active">

<div class="top-actions">
<button id="selectBtn" class="btn blue">Select All</button>
<button id="editBtn" class="btn orange">Edit Selected</button>
<button id="sendBtn" class="btn green">Send Selected</button>
<button id="redistributeBtn" class="btn purple">Redistribute</button>
</div>

<table>
<thead>
<tr>
<th>Select</th>
<th>#</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Notes</th>
<th>Send</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<!-- DRIVERS -->
<div id="driversPage" class="tab-page">
<div class="drivers-layout">
<div id="map"></div>
<div id="driversPanel"></div>
</div>
</div>

</div>

<script src="/admin/header.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ================= STATE ================= */

let trips=[]
let drivers=[]
let schedule={}
let map
let markers=[]
let geoCache={}
let editMode=false
let allSelected=false

/* ================= STORE ================= */

const Store={
API:"/api/dispatch",
async load(){
try{
const res=await fetch(this.API)
return await res.json()
}catch(e){
console.log("API ERROR",e)
return {trips:[],drivers:[],schedule:{}}
}
}
}

/* ================= INIT ================= */

async function init(){

const data=await Store.load()

drivers=(data.drivers||[]).map(d=>({...d,_id:String(d._id)}))

trips=(data.trips||[]).map(t=>({
...t,
selected:false,
driverId:t.driverId?String(t.driverId):""
}))

schedule=data.schedule||{}

renderTrips()
initMap()
renderDrivers()

}

/* ================= STOPS ================= */

function getStops(t){
if(Array.isArray(t.stops)) return t.stops
if(Array.isArray(t.stopAddresses)) return t.stopAddresses
if(Array.isArray(t.extraStops)) return t.extraStops
if(typeof t.stop==="string") return [t.stop]
return []
}

/* ================= RENDER TRIPS ================= */

function renderTrips(){

const body=document.getElementById("tbody")
body.innerHTML=""

trips.forEach((t,i)=>{

const stops=getStops(t)

body.innerHTML+=`
<tr>

<td>
<button class="btn ${t.selected?'green':'blue'}"
onclick="toggleTrip(${i})">
${t.selected?'✔':'Select'}
</button>
</td>

<td>${t.tripNumber||i+1}</td>
<td>${t.clientName||""}</td>
<td>${t.pickup||""}</td>
<td>${stops.length?stops.join("<br>"):"-"}</td>
<td>${t.dropoff||""}</td>
<td>${t.tripDate||""}</td>
<td>${t.tripTime||""}</td>

<td>
<select ${(editMode && t.selected)?'':'disabled'}
onchange="assignDriver(${i},this.value)">
<option value="">--</option>
${drivers.map(d=>`
<option value="${d._id}" ${t.driverId===d._id?'selected':''}>
${d.name}
</option>`).join("")}
</select>
</td>

<td>${t.vehicle||""}</td>
<td>${t.notes||""}</td>

<td>
<button class="btn green" onclick="sendOne(${i})">Send</button>
</td>

</tr>
`
})

}

/* ================= MAP ================= */

function initMap(){
map=L.map('map').setView([33.4484,-112.0740],10)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)
setTimeout(()=>map.invalidateSize(),300)
}

/* ================= GEO ================= */

async function geocode(addr){

if(!addr) return null
if(geoCache[addr]) return geoCache[addr]

try{
const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`)
const data=await res.json()
if(!data.length) return null

return geoCache[addr]={
lat:+data[0].lat,
lng:+data[0].lon
}
}catch{
return null
}

}

/* ================= ROUTE ================= */

async function getRoute(points){

if(points.length < 2) return null

const coords=points.map(p=>`${p.lng},${p.lat}`).join(";")

const res=await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full`)
const data=await res.json()

if(!data.routes || !data.routes.length) return null

const r=data.routes[0]

return{
coords:r.geometry.coordinates.map(c=>[c[1],c[0]]),
distance:(r.distance/1609).toFixed(1),
duration:(r.duration/60).toFixed(0)
}

}

/* ================= DRIVER CLICK ================= */

async function focusDriver(id){

const t=trips.find(x=>x.driverId===id)
if(!t) return

markers.forEach(m=>map.removeLayer(m))
markers=[]

const stops=getStops(t)

let pts=[]

const p=await geocode(t.pickup)
if(p) pts.push(p)

for(let s of stops){
const g=await geocode(s)
if(g) pts.push(g)
}

const d=await geocode(t.dropoff)
if(d) pts.push(d)

if(pts.length < 2) return

const route=await getRoute(pts)
if(!route) return

pts.forEach(p=>{
markers.push(L.marker([p.lat,p.lng]).addTo(map))
})

const line=L.polyline(route.coords,{color:'blue'}).addTo(map)

line.bindPopup(`
<b>${route.distance} miles</b><br>
ETA: ${route.duration} min
`).openPopup()

map.fitBounds(line.getBounds())

}

/* ================= DRIVERS PANEL ================= */

function renderDrivers(){

const panel=document.getElementById("driversPanel")
panel.innerHTML=""

drivers.forEach((d,i)=>{

const car=getDriverCar(d._id)
const trip=trips.find(t=>t.driverId===d._id)

panel.innerHTML+=`
<div class="driver" onclick="focusDriver('${d._id}')">
<div class="driver-bar">
<div class="driver-name">${i+1} - ${d.name}</div>
<div class="driver-info">
🚗 ${car||"-"} | 📦 ${trip?trip.tripNumber:"-"}
</div>
</div>
</div>
`

})

}

/* ================= HELPERS ================= */

function getDriverCar(id){
const s=schedule[id]
if(!s) return ""
return s.carNumber||s.vehicleNumber||s.car||""
}

function assignDriver(i,id){
const d=drivers.find(x=>x._id===id)
if(!d) return
trips[i].driverId=id
trips[i].vehicle=getDriverCar(id)
renderDrivers()
}

function toggleTrip(i){
trips[i].selected=!trips[i].selected
renderTrips()
}

function toggleSelect(){
allSelected=!allSelected
trips.forEach(t=>t.selected=allSelected)
document.getElementById("selectBtn").innerText=
allSelected?"Remove All":"Select All"
renderTrips()
}

function toggleEdit(){
editMode=!editMode
document.getElementById("editBtn").innerText=
editMode?"Save":"Edit Selected"
renderTrips()
}

function sendSelected(){
console.log(trips.filter(t=>t.selected))
}

function sendOne(i){
console.log(trips[i])
}

function redistribute(){
const selected=trips.filter(t=>t.selected)
selected.forEach((t,i)=>{
const d=drivers[i%drivers.length]
t.driverId=d._id
t.vehicle=getDriverCar(d._id)
})
renderTrips()
renderDrivers()
}

/* ================= TABS ================= */

document.getElementById("tabTrips").onclick=()=>{
tripsPage.classList.add("active")
driversPage.classList.remove("active")
tabTrips.classList.add("active")
tabDrivers.classList.remove("active")
}

document.getElementById("tabDrivers").onclick=()=>{
tripsPage.classList.remove("active")
driversPage.classList.add("active")
tabTrips.classList.remove("active")
tabDrivers.classList.add("active")
setTimeout(()=>map.invalidateSize(),300)
}

/* ================= GLOBAL ================= */

window.toggleTrip = toggleTrip
window.toggleSelect = toggleSelect
window.toggleEdit = toggleEdit
window.sendSelected = sendSelected
window.sendOne = sendOne
window.redistribute = redistribute
window.focusDriver = focusDriver
window.assignDriver = assignDriver

/* ================= START ================= */

init()

</script>

</body>
</html>
