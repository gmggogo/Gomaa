<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

.page-body{
padding:15px 20px;
background:#f1f5f9;
min-height:calc(100vh - 80px);
}

.dispatch-tabs{
display:flex;
margin-bottom:5px;
}

.tab-btn{
flex:1;
padding:14px;
border:none;
background:#1e293b;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.tab-btn.active{background:#2563eb;}

.top-actions{
margin:10px 0;
display:flex;
gap:10px;
}

.btn{
padding:8px 12px;
border:none;
color:#fff;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

.blue{background:#2563eb}
.orange{background:#f97316}
.green{background:#16a34a}

table{
width:100%;
border-collapse:collapse;
background:#fff;
}

th{
background:#1e293b;
color:#fff;
padding:8px;
}

td{
border:1px solid #ddd;
padding:6px;
font-size:12px;
}

.tab-page{display:none}
.tab-page.active{display:block}

.drivers-layout{
display:flex;
height:80vh;
}

#map{width:70%;}
#driversPanel{
width:30%;
background:#0f172a;
color:#fff;
overflow:auto;
}

.driver{
padding:8px;
border-bottom:1px solid #1e293b;
}

</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="dispatch-tabs">
<button id="tabTrips" class="tab-btn active">Trips</button>
<button id="tabDrivers" class="tab-btn">Drivers Map</button>
</div>

<!-- TRIPS -->
<div id="tripsPage" class="tab-page active">

<div class="top-actions">
<button class="btn blue" onclick="selectAll()">Select All</button>
<button class="btn orange" onclick="toggleEdit()">Edit</button>
<button class="btn green" onclick="sendSelected()">Send</button>
</div>

<table>
<thead>
<tr>
<th>Select</th>
<th>#</th>
<th>Client</th>
<th>Pickup</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Notes</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<!-- DRIVERS -->
<div id="driversPage" class="tab-page">
<div class="drivers-layout">
<div id="map"></div>
<div id="driversPanel"></div>
</div>
</div>

</div>

<script src="/admin/header.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ================= STATE ================= */

let trips = []
let drivers = []
let schedule = {}
let editMode = false
let map
let markers=[]

/* ================= STORE ================= */

const Store = {
API: "/api/dispatch",
async load(){
const res = await fetch(this.API)
return await res.json()
}
}

/* ================= INIT ================= */

async function init(){

const data = await Store.load()

drivers = (data.drivers || []).map(d=>({
...d,
_id:String(d._id)
}))

trips = (data.trips || []).map(t=>({
...t,
selected:false,
driverId: t.driverId ? String(t.driverId) : ""
}))

schedule = data.schedule || {}

renderTrips()
initMap()
renderDrivers()

}

/* ================= GET CAR FROM SCHEDULE ================= */

function getDriverCar(driverId){

const s = schedule[driverId]

if(!s) return ""

return (
s.carNumber ||
s.vehicleNumber ||
s.car ||
""
)

}

/* ================= RENDER TRIPS ================= */

function renderTrips(){

const body=document.getElementById("tbody")
body.innerHTML=""

trips.forEach((t,i)=>{

body.innerHTML+=`
<tr>

<td>
<input type="checkbox"
${t.selected?"checked":""}
onchange="trips[${i}].selected=this.checked">
</td>

<td>${t.tripNumber || i+1}</td>
<td>${t.clientName || ""}</td>
<td>${t.pickup || ""}</td>
<td>${t.dropoff || ""}</td>
<td>${t.tripDate || ""}</td>
<td>${t.tripTime || ""}</td>

<td>
<select ${editMode?"":"disabled"}
onchange="assignDriver(${i},this.value)">

<option value="">--</option>

${drivers.map(d=>`
<option value="${d._id}"
${t.driverId===d._id?"selected":""}>
${d.name}
</option>`).join("")}

</select>
</td>

<td id="car-${i}">
${t.vehicle || ""}
</td>

<td>
<input value="${t.notes||""}" ${editMode?"":"disabled"}>
</td>

</tr>
`
})

}

/* ================= ASSIGN ================= */

function assignDriver(i,driverId){

const driver = drivers.find(d=>d._id===driverId)
if(!driver) return

trips[i].driverId = driverId
trips[i].driverName = driver.name

// 🔥 هنا بياخد العربية من schedule
trips[i].vehicle = getDriverCar(driverId)

document.getElementById(`car-${i}`).innerText = trips[i].vehicle

}

/* ================= MAP ================= */

function initMap(){
map = L.map('map').setView([33.4484,-112.0740],10)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map)
}

function renderDrivers(){

const panel=document.getElementById("driversPanel")
panel.innerHTML=""

markers.forEach(m=>map.removeLayer(m))
markers=[]

drivers.forEach((d,i)=>{

const car = getDriverCar(d._id)

panel.innerHTML+=`
<div class="driver">
${i+1} - ${d.name} (${car})
</div>
`

if(d.lat && d.lng){
const m = L.marker([d.lat,d.lng]).addTo(map)
.bindPopup(d.name)
markers.push(m)
}

})

}

/* ================= ACTIONS ================= */

function selectAll(){
trips.forEach(t=>t.selected=true)
renderTrips()
}

function toggleEdit(){
editMode=!editMode
renderTrips()
}

function sendSelected(){
console.log(trips.filter(t=>t.selected))
}

/* ================= TABS ================= */

tabTrips.onclick=()=>{
tripsPage.classList.add("active")
driversPage.classList.remove("active")
tabTrips.classList.add("active")
tabDrivers.classList.remove("active")
}

tabDrivers.onclick=()=>{
tripsPage.classList.remove("active")
driversPage.classList.add("active")
tabTrips.classList.remove("active")
tabDrivers.classList.add("active")
}

/* ================= START ================= */

init()

</script>

</body>
</html>
