<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dispatch System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ CSS (يشتغل على السيرفر أو محلي) -->
<link rel="stylesheet" href="/admin/style.css" onerror="this.href='./style.css'">
<link rel="stylesheet" href="/admin/header.css" onerror="this.href='./header.css'">

<!-- ✅ MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
/* fallback لو style.css مش اتحمل */
.page-body{max-width:1400px;margin:auto;padding:180px 15px 40px;}
.top-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.dispatch-grid{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:10px;}
.map-box,.drivers-box{background:#fff;border-radius:8px;overflow:hidden;}
.box-title{background:#1e293b;color:#fff;padding:8px;font-size:13px;}
#dispatchMap{height:300px;}
.table-wrap{overflow:auto;}
table{width:100%;border-collapse:collapse;background:#fff;}
th{background:#1e293b;color:#fff;padding:6px;font-size:12px;}
td{border:1px solid #e5e7eb;padding:5px;font-size:11px;text-align:center;}
</style>

</head>

<body>

<!-- ✅ HEADER -->
<div id="adminHeader"></div>

<!-- ✅ PAGE -->
<div class="page-body">

<!-- 🔥 BUTTONS -->
<div class="top-actions">

<button onclick="Engine.redistributeSelected()" class="btn-blue">
Redistribute Selected
</button>

<button id="editBtn" onclick="UI.toggleEdit()" class="btn-orange">
Manual Edit
</button>

<button onclick="Engine.load()" class="btn-purple">
Save Changes
</button>

<button onclick="Engine.sendSelected()" class="btn-green">
Send Selected
</button>

</div>

<!-- 🔥 GRID -->
<div class="dispatch-grid">

<!-- MAP -->
<div class="map-box">
<div class="box-title">Live Dispatch Map</div>
<div id="dispatchMap"></div>
</div>

<!-- DRIVERS -->
<div class="drivers-box">
<div class="box-title">Active Drivers</div>
<div id="driversPanel"></div>
</div>

</div>

<!-- 🔥 TABLE -->
<div class="table-wrap">

<table>

<thead>
<tr>
<th>Select</th>
<th>Trip #</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Notes</th>
<th>Driver</th>
<th>Vehicle</th>
<th>Send</th>
</tr>
</thead>

<tbody id="dispatchBody"></tbody>

</table>

</div>

</div>

<!-- ✅ HEADER LOAD -->
<script src="/admin/header.js"></script>

<!-- ✅ MAP -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- ✅ SCRIPTS -->
<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.ui.js"></script>
<script src="/admin/dispatch.engine.js"></script>

</body>
</html>
