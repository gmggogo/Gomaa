<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

.page-body{
padding:15px 20px;
background:#f1f5f9;
min-height:calc(100vh - 80px);
}

/* ===== TABS ===== */
.dispatch-tabs{
display:flex;
margin-bottom:5px;
}

.tab-btn{
flex:1;
padding:14px;
border:none;
background:#1e293b;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.tab-btn.active{
background:#2563eb;
}

/* ===== TABLE ===== */
table{
width:100%;
border-collapse:collapse;
background:#fff;
}

th{
background:#1e293b;
color:#fff;
padding:8px;
}

td{
border:1px solid #ddd;
padding:6px;
font-size:12px;
}

/* ===== BUTTONS ===== */
.top-actions{
margin:10px 0;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:8px 12px;
border:none;
color:#fff;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

.blue{background:#2563eb}
.orange{background:#f97316}
.green{background:#16a34a}
.purple{background:#7c3aed}

/* ===== PAGES ===== */
.tab-page{display:none}
.tab-page.active{display:block}

/* ===== DRIVERS ===== */
.drivers-layout{
display:flex;
height:80vh;
}

#map{
width:70%;
height:100%;
}

#driversPanel{
width:30%;
background:#0f172a;
color:#fff;
overflow:auto;
}

.driver{
padding:8px 12px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
cursor:pointer;
}

.driver:hover{
background:#2563eb;
}

</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<!-- ===== TABS ===== -->
<div class="dispatch-tabs">
<button id="tabTrips" class="tab-btn active">Trips Schedule</button>
<button id="tabDrivers" class="tab-btn">Drivers Map</button>
</div>

<!-- ===== TRIPS ===== -->
<div id="tripsPage" class="tab-page active">

<div class="top-actions">

<button class="btn blue" onclick="selectAll()">
Select All
</button>

<button class="btn orange" onclick="editSelected()" id="editBtn">
Edit Selected
</button>

<button class="btn green" onclick="sendSelected()">
Send Selected
</button>

<button class="btn purple" onclick="redistributeSelected()">
Redistribute Selected
</button>

</div>

<table>
<thead>
<tr>
<th>Select</th>
<th>#</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Notes</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

<!-- ===== DRIVERS ===== -->
<div id="driversPage" class="tab-page">

<div class="drivers-layout">
<div id="map"></div>
<div id="driversPanel"></div>
</div>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ===== TABS ===== */
tabTrips.onclick=()=>{
tripsPage.classList.add("active")
driversPage.classList.remove("active")
tabTrips.classList.add("active")
tabDrivers.classList.remove("active")
}

tabDrivers.onclick=()=>{
tripsPage.classList.remove("active")
driversPage.classList.add("active")
tabTrips.classList.remove("active")
tabDrivers.classList.add("active")
}

</script>

</body>
</html>
