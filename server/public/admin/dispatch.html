<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

.page-body{
padding:15px;
background:#f1f5f9;
}

.btn{padding:6px 10px;border:none;color:#fff;cursor:pointer;border-radius:5px;}
.blue{background:#2563eb}
.orange{background:#f97316}
.green{background:#16a34a}
.purple{background:#7c3aed}

table{width:100%;background:#fff;border-collapse:collapse}
th{background:#1e293b;color:#fff;padding:8px}
td{padding:6px;border:1px solid #ddd;font-size:12px}

.drivers-layout{display:flex;height:80vh}
#map{width:70%}
#driversPanel{width:30%;background:#0f172a;color:#fff;overflow:auto}

.driver{padding:10px;border-bottom:1px solid #1e293b;cursor:pointer}
.driver-bar{display:flex;justify-content:space-between}
.driver-info{display:flex;gap:10px}

</style>
</head>

<body>

<div class="page-body">

<!-- ACTIONS -->
<div style="margin-bottom:10px;display:flex;gap:10px">

<button id="selectBtn" class="btn blue" onclick="toggleSelect()">Select All</button>

<button id="editBtn" class="btn orange" onclick="toggleEdit()">Edit Selected</button>

<button class="btn green" onclick="sendSelected()">Send Selected</button>

<button class="btn purple" onclick="redistribute()">Redistribute</button>

</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Select</th>
<th>#</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Driver</th>
<th>Car</th>
<th>Notes</th>
<th>Send</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<!-- MAP -->
<div class="drivers-layout">
<div id="map"></div>
<div id="driversPanel"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let trips=[],drivers=[],schedule={}
let map,markers=[],geoCache={}
let editMode=false,allSelected=false

/* ================= LOAD ================= */

async function init(){

const res=await fetch("/api/dispatch")
const data=await res.json()

drivers=data.drivers||[]
trips=data.trips||[]
schedule=data.schedule||{}

renderTrips()
initMap()
renderDrivers()

}

/* ================= GET STOPS ================= */

function getStops(t){

if(Array.isArray(t.stops)) return t.stops
if(Array.isArray(t.stopAddresses)) return t.stopAddresses
if(Array.isArray(t.extraStops)) return t.extraStops

if(typeof t.stop==="string") return [t.stop]

return []

}

/* ================= RENDER TABLE ================= */

function renderTrips(){

const body=document.getElementById("tbody")
body.innerHTML=""

trips.forEach((t,i)=>{

const stops=getStops(t)

body.innerHTML+=`
<tr>

<td>
<input type="checkbox" ${t.selected?'checked':''}
onchange="t.selected=this.checked">
</td>

<td>${t.tripNumber||i+1}</td>
<td>${t.clientName||""}</td>
<td>${t.pickup||""}</td>

<td>
${stops.length?stops.join("<br>"):"-"}
</td>

<td>${t.dropoff||""}</td>

<td>
<select ${(editMode&&t.selected)?'':'disabled'}
onchange="assignDriver(${i},this.value)">
<option value="">--</option>
${drivers.map(d=>`
<option value="${d._id}" ${t.driverId==d._id?'selected':''}>
${d.name}
</option>`).join("")}
</select>
</td>

<td>${t.vehicle||""}</td>

<td>${t.notes||""}</td>

<td>
<button class="btn green" onclick="sendOne(${i})">Send</button>
</td>

</tr>
`
})

}

/* ================= DRIVER PANEL ================= */

function renderDrivers(){

const panel=document.getElementById("driversPanel")
panel.innerHTML=""

drivers.forEach((d,i)=>{

const trip=trips.find(t=>t.driverId==d._id)

panel.innerHTML+=`
<div class="driver" onclick="focusDriver('${d._id}')">

<div class="driver-bar">
<b>${i+1} - ${d.name}</b>
<div class="driver-info">
🚗 ${getCar(d._id)||"-"} | 📦 ${trip?trip.tripNumber:"-"}
</div>
</div>

</div>
`
})

}

/* ================= MAP ================= */

function initMap(){

map=L.map('map').setView([33.4,-112],10)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map)

}

/* ================= GEO ================= */

async function geo(addr){

if(geoCache[addr]) return geoCache[addr]

const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`)
const data=await res.json()

if(!data.length) return null

return geoCache[addr]={
lat:+data[0].lat,
lng:+data[0].lon
}

}

/* ================= ROUTE ================= */

async function route(points){

const coords=points.map(p=>`${p.lng},${p.lat}`).join(";")

const res=await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full`)
const data=await res.json()

const r=data.routes[0]

return{
coords:r.geometry.coordinates.map(c=>[c[1],c[0]]),
distance:(r.distance/1609).toFixed(1),
duration:(r.duration/60).toFixed(0)
}

}

/* ================= CLICK DRIVER ================= */

async function focusDriver(id){

const t=trips.find(x=>x.driverId==id)
if(!t) return

markers.forEach(m=>map.removeLayer(m))
markers=[]

const stops=getStops(t)

let points=[]

const p=await geo(t.pickup)
points.push(p)

for(let s of stops){
const g=await geo(s)
if(g) points.push(g)
}

const d=await geo(t.dropoff)
points.push(d)

const r=await route(points)

points.forEach(p=>{
markers.push(L.marker([p.lat,p.lng]).addTo(map))
})

const line=L.polyline(r.coords,{color:'blue'}).addTo(map)

line.bindPopup(`
<b>${r.distance} miles</b><br>
ETA: ${r.duration} min
`).openPopup()

map.fitBounds(line.getBounds())

}

/* ================= HELPERS ================= */

function getCar(id){
const s=schedule[id]
if(!s) return ""
return s.carNumber||s.vehicleNumber||s.car||""
}

function assignDriver(i,id){
const d=drivers.find(x=>x._id==id)
trips[i].driverId=id
trips[i].vehicle=getCar(id)
renderDrivers()
}

function toggleSelect(){
allSelected=!allSelected
trips.forEach(t=>t.selected=allSelected)
renderTrips()
}

function toggleEdit(){
editMode=!editMode
document.getElementById("editBtn").innerText=
editMode?"Save":"Edit Selected"
renderTrips()
}

function sendSelected(){
console.log(trips.filter(t=>t.selected))
}

function sendOne(i){
console.log(trips[i])
}

function redistribute(){
const sel=trips.filter(t=>t.selected)
sel.forEach((t,i)=>{
const d=drivers[i%drivers.length]
t.driverId=d._id
t.vehicle=getCar(d._id)
})
renderTrips()
renderDrivers()
}

init()

</script>

</body>
</html>
