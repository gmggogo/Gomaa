<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

/* LAYOUT */
.main-layout{
display:flex;
height:100vh;
gap:10px;
padding:10px;
background:#e5e7eb;
}

/* LEFT */
.left-panel{
width:40%;
display:flex;
flex-direction:column;
gap:10px;
}

/* MAP */
#map{
height:50%;
border-radius:10px;
}

/* DRIVERS */
#driversList{
flex:1;
overflow-y:auto;
background:#1e3a8a;
border-radius:10px;
padding:10px;
color:#fff;
}

/* DRIVER ROW */
.driver-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.2);
cursor:pointer;
font-size:13px;
}

.driver-row:hover{
background:#2563eb;
}

/* RIGHT */
.right-panel{
flex:1;
display:flex;
flex-direction:column;
gap:10px;
}

/* BUTTON BAR */
.top-bar{
display:flex;
gap:10px;
}

/* BUTTON */
.btn{
background:#2563eb;
color:#fff;
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.btn:hover{
background:#1d4ed8;
}

/* TRIPS */
#tripsContainer{
flex:1;
overflow:auto;
background:#fff;
border-radius:10px;
padding:10px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th{
background:#1e3a8a;
color:#fff;
}

td,th{
padding:6px;
border:1px solid #ddd;
font-size:12px;
text-align:center;
}

</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="main-layout">

<!-- LEFT -->
<div class="left-panel">

<div id="map"></div>

<div id="driversList"></div>

</div>

<!-- RIGHT -->
<div class="right-panel">

<div class="top-bar">
<button class="btn" onclick="Engine.toggleAll()">Select All</button>
<button id="editBtn" class="btn" onclick="Engine.toggleEdit()">Edit</button>
<button class="btn" onclick="Engine.sendSelected()">Send</button>
</div>

<div id="tripsContainer"></div>

</div>

</div>

<script src="/admin/header.js"></script>
<script>
fetch("/admin/header.html")
.then(r=>r.text())
.then(h=>document.getElementById("adminHeader").innerHTML=h)
</script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.engine.js"></script>
<script src="/admin/dispatch.ui.js"></script>

<script>
Engine.load()
</script>

</body>
</html>
