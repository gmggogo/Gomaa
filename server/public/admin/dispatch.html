<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
.page-body{
  padding:15px 20px;
  background:#f1f5f9;
  min-height:calc(100vh - 80px);
}

.dispatch-tabs{
  display:flex;
  margin-bottom:8px;
  gap:8px;
}

.tab-btn{
  flex:1;
  padding:14px;
  border:none;
  background:#1e293b;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
  transition:.2s;
}

.tab-btn.active{
  background:#2563eb;
}

.top-actions{
  margin:12px 0;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  padding:9px 13px;
  border:none;
  color:#fff;
  cursor:pointer;
  border-radius:7px;
  font-weight:bold;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-1px);
}

.blue{background:#2563eb}
.orange{background:#f97316}
.green{background:#16a34a}
.purple{background:#7c3aed}
.gray{background:#475569}
.red{background:#dc2626}

.table-wrap{
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 18px rgba(15,23,42,.08);
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th{
  background:#1e293b;
  color:#fff;
  padding:10px 8px;
  font-size:12px;
  text-align:left;
  white-space:nowrap;
}

td{
  border:1px solid #e5e7eb;
  padding:8px 7px;
  font-size:12px;
  vertical-align:top;
}

tbody tr:hover{
  background:#f8fafc;
}

.trip-urgent{background:#fef2f2;}
.trip-soon{background:#fffbeb;}

.tab-page{display:none}
.tab-page.active{display:block}

.drivers-layout{
  display:flex;
  height:80vh;
  gap:10px;
}

#map{
  width:70%;
  border-radius:10px;
  overflow:hidden;
}

#driversPanel{
  width:30%;
  background:#0f172a;
  color:#fff;
  overflow:auto;
  border-radius:10px;
}

.panel-header{
  position:sticky;
  top:0;
  background:#111827;
  padding:12px;
  font-weight:bold;
}

.driver{
  padding:12px;
  border-bottom:1px solid #1e293b;
  cursor:pointer;
}

.driver:hover{background:#1e293b;}

.driver.active{
  background:linear-gradient(90deg,#2563eb,#1d4ed8);
}

.driver-name{
  font-weight:bold;
}

.badge{
  padding:3px 8px;
  border-radius:999px;
  font-size:11px;
}

.badge-available{background:#166534;}
.badge-busy{background:#991b1b;}

#toast{
  position:fixed;
  right:18px;
  bottom:18px;
  background:#111827;
  color:#fff;
  padding:12px;
  border-radius:10px;
  opacity:0;
  transition:.2s;
}

#toast.show{
  opacity:1;
}
</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

  <div class="dispatch-tabs">
    <button id="tabTrips" class="tab-btn active">Trips</button>
    <button id="tabDrivers" class="tab-btn">Drivers Map</button>
  </div>

  <!-- TRIPS -->
  <div id="tripsPage" class="tab-page active">

    <div class="top-actions">
      <button id="selectBtn" class="btn blue">Select All</button>
      <button id="editBtn" class="btn orange">Edit Selected</button>
      <button id="sendBtn" class="btn green">Send Selected</button>
      <button id="redistributeBtn" class="btn purple">Redistribute</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Select</th>
            <th>#</th>
            <th>Client</th>
            <th>Pickup</th>
            <th>Stops</th>
            <th>Dropoff</th>
            <th>Date</th>
            <th>Time</th>
            <th>Driver</th>
            <th>Car</th>
            <th>Notes</th>
            <th>Send</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

  </div>

  <!-- DRIVERS -->
  <div id="driversPage" class="tab-page">
    <div class="drivers-layout">
      <div id="map"></div>
      <div id="driversPanel">
        <div class="panel-header">Drivers Dispatch Panel</div>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script src="/admin/header.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- 🔥 ملفاتك -->
<script src="/admin/store.js"></script>
<script src="/admin/engine.js"></script>
<script src="/admin/ui.js"></script>
<script src="/admin/app.js"></script>

</body>
</html>
