<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dispatch Board</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

.page{
max-width:1500px;
margin:auto;
padding:20px;
}

.toolbar{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:wrap;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#0f2c5c;
color:white;
padding:8px;
}

td{
padding:6px;
border-bottom:1px solid #ddd;
font-size:13px;
text-align:center;
}

.btn{
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
}

.green{background:#16a34a}
.blue{background:#2563eb}
.gold{background:#d4af37;color:black}
.red{background:#dc2626}

.note{
width:90px;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page">

<h2>Dispatch Board</h2>

<div class="toolbar">

<button class="btn green" onclick="sendSelected()">Send Selected</button>

<button class="btn blue" onclick="autoDispatch()">Auto Distribution</button>

<button class="btn gold" onclick="editSelected()">Manual Edit</button>

<button class="btn green" onclick="saveEdit()">Save</button>

<button class="btn blue" onclick="selectAll()">Select All</button>

<button class="btn red" onclick="removeAll()">Remove All</button>

</div>

<table>

<thead>

<tr>

<th>✓</th>
<th>Trip #</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Note</th>
<th>Send</th>

</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

</div>

<script src="/admin/header.js"></script>

<script>

let trips=[]
let drivers=[]

async function loadData(){

const resTrips = await fetch("/api/dispatch")
trips = await resTrips.json()

const resDrivers = await fetch("/api/drivers")
drivers = await resDrivers.json()

render()

}

function render(){

const tbody=document.getElementById("tbody")

tbody.innerHTML=""

trips.forEach(t=>{

const tr=document.createElement("tr")

tr.innerHTML=`

<td>
<input type="checkbox" class="tripSelect" value="${t._id}">
</td>

<td class="tripNumber">${t.tripNumber||""}</td>

<td>${t.clientName||""}</td>

<td>${t.pickup||""}</td>

<td>${(t.stops||[]).join(" | ")||"-"}</td>

<td>${t.dropoff||""}</td>

<td>${t.tripDate||""}</td>

<td>${t.tripTime||""}</td>

<td class="driverCell">${t.driverName||""}</td>

<td>${t.carNumber||""}</td>

<td>
<input class="note" value="${t.note||""}">
</td>

<td>
<button class="btn blue" onclick="sendTrip('${t._id}')">Send</button>
</td>

`

tbody.appendChild(tr)

})

}

function selectAll(){

document.querySelectorAll(".tripSelect")
.forEach(c=>c.checked=true)

}

function removeAll(){

document.querySelectorAll(".tripSelect")
.forEach(c=>c.checked=false)

}

function editSelected(){

const rows=document.querySelectorAll(".tripSelect:checked")

if(!rows.length){
alert("Select trips first")
return
}

rows.forEach(chk=>{

const row=chk.closest("tr")

const cell=row.querySelector(".driverCell")

const current=cell.innerText

cell.innerHTML=`
<select class="driverEdit">
${drivers.map(d=>`
<option value="${d._id}"
${d.name===current?'selected':''}>
${d.name}
</option>
`).join("")}
</select>
`

})

}

async function saveEdit(){

const edits=document.querySelectorAll(".driverEdit")

for(const sel of edits){

const row=sel.closest("tr")

const tripNumber=row.querySelector(".tripNumber").innerText

await fetch("/api/dispatch/assignDriver",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

tripNumber,
driverId:sel.value

})

})

}

alert("Drivers Updated")

loadData()

}

async function sendSelected(){

const selected=[...document.querySelectorAll(".tripSelect:checked")]

for(const chk of selected){

await fetch("/api/dispatch/send/"+chk.value,{
method:"POST"
})

}

alert("Trips Sent")

loadData()

}

async function sendTrip(id){

await fetch("/api/dispatch/send/"+id,{
method:"POST"
})

alert("Trip Sent")

loadData()

}

async function autoDispatch(){

await fetch("/api/dispatch/auto",{
method:"POST"
})

alert("Trips Re-Distributed")

loadData()

}

loadData()

</script>

</body>
</html>
