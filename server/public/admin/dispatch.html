<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

/* ===== PAGE ===== */
.page-body{
  padding:15px 20px;
  background:#f1f5f9;
  min-height:calc(100vh - 80px);
}

/* ===== TABS ===== */
.dispatch-tabs{
  display:flex;
  margin-bottom:8px;
  gap:8px;
}

.tab-btn{
  flex:1;
  padding:14px;
  border:none;
  background:#1e293b;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
}

.tab-btn.active{
  background:#2563eb;
}

/* ===== ACTION BUTTONS ===== */
.top-actions{
  margin:12px 0;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  padding:9px 13px;
  border:none;
  color:#fff;
  cursor:pointer;
  border-radius:7px;
  font-weight:bold;
}

.blue{background:#2563eb}
.orange{background:#f97316}
.green{background:#16a34a}
.purple{background:#7c3aed}

/* ===== TABLE ===== */
.table-wrap{
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 18px rgba(15,23,42,.08);
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#1e293b;
  color:#fff;
  padding:10px;
  font-size:12px;
}

td{
  border:1px solid #e5e7eb;
  padding:8px;
  font-size:12px;
}

tbody tr:hover{
  background:#f8fafc;
}

/* ===== MAP + PANEL ===== */
.drivers-layout{
  display:flex;
  height:calc(100vh - 140px);
  gap:10px;
}

#map{
  width:70%;
  height:100%;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 18px rgba(15,23,42,.08);
}

#driversPanel{
  width:30%;
  height:100%;
  background:#0f172a;
  color:#fff;
  overflow:auto;
  border-radius:10px;
  box-shadow:0 4px 18px rgba(15,23,42,.12);
}

/* ===== PANEL ===== */
.panel-header{
  position:sticky;
  top:0;
  background:#111827;
  padding:12px;
  font-weight:bold;
  border-bottom:1px solid #1f2937;
}

/* ===== DRIVER ===== */
.driver{
  padding:12px;
  border-bottom:1px solid #1e293b;
  cursor:pointer;
  transition:.2s;
}

.driver:hover{
  background:#1e293b;
}

.driver.active{
  background:linear-gradient(90deg,#2563eb,#1d4ed8);
}

/* ===== DRIVER CONTENT ===== */
.driver-bar{
  display:flex;
  justify-content:space-between;
}

.driver-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:6px;
}

.driver-name{
  font-weight:bold;
  color:#facc15;
}

/* ===== BADGES ===== */
.badge{
  padding:3px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
}

.badge-available{
  background:#166534;
}

.badge-busy{
  background:#991b1b;
}

.badge-count{
  background:#334155;
}

/* ===== TABS ===== */
.tab-page{display:none}
.tab-page.active{display:block}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<!-- TABS -->
<div class="dispatch-tabs">
  <button id="tabTrips" class="tab-btn active">Trips</button>
  <button id="tabDrivers" class="tab-btn">Drivers Map</button>
</div>

<!-- TRIPS -->
<div id="tripsPage" class="tab-page active">

  <div class="top-actions">
    <button id="selectBtn" class="btn blue" onclick="toggleSelect()">Select All</button>
    <button id="editBtn" class="btn orange" onclick="toggleEdit()">Edit Selected</button>
    <button class="btn green" onclick="sendSelected()">Send Selected</button>
    <button class="btn purple" onclick="redistribute()">Redistribute</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Select</th>
          <th>#</th>
          <th>Client</th>
          <th>Pickup</th>
          <th>Stops</th>
          <th>Dropoff</th>
          <th>Date</th>
          <th>Time</th>
          <th>Driver</th>
          <th>Car</th>
          <th>Notes</th>
          <th>Send</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<!-- DRIVERS -->
<div id="driversPage" class="tab-page">

  <div class="drivers-layout">

    <div id="map"></div>

    <div id="driversPanel">
      <div class="panel-header">Drivers Dispatch Panel</div>
    </div>

  </div>

</div>

</div>

<div id="toast"></div>

<!-- HEADER -->
<script src="/admin/header.js"></script>

<!-- MAP -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- FILES -->
<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.ui.js"></script>
<script src="/admin/dispatch.engine.js"></script>

<!-- TABS -->
<script>
document.getElementById("tabTrips").onclick = () => {
  tripsPage.classList.add("active")
  driversPage.classList.remove("active")
  tabTrips.classList.add("active")
  tabDrivers.classList.remove("active")
}

document.getElementById("tabDrivers").onclick = () => {
  tripsPage.classList.remove("active")
  driversPage.classList.add("active")
  tabTrips.classList.remove("active")
  tabDrivers.classList.add("active")

  setTimeout(()=>{ if(window.map) map.invalidateSize() },300)
}
</script>

</body>
</html>
