<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

/* ===== PAGE ===== */
.page-body{
padding:15px 20px;
background:#f1f5f9;
min-height:calc(100vh - 80px);
}

/* ===== TABS ===== */
.dispatch-tabs{
display:flex;
margin-bottom:5px;
}

.tab-btn{
flex:1;
padding:14px;
border:none;
background:#1e293b;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.tab-btn.active{
background:#2563eb;
}

/* ===== WELCOME ===== */
.welcome-msg{
background:#e2e8f0;
padding:10px;
margin:10px 0;
border-radius:6px;
font-weight:bold;
}

/* ===== TABLE ===== */
table{
width:100%;
border-collapse:collapse;
background:#fff;
}

th{
background:#1e293b;
color:#fff;
padding:8px;
}

td{
border:1px solid #ddd;
padding:6px;
font-size:12px;
}

/* ===== BUTTONS ===== */
.top-actions{
margin:10px 0;
display:flex;
gap:10px;
}

.btn{
padding:8px 12px;
border:none;
color:#fff;
cursor:pointer;
}

.blue{background:#2563eb}
.orange{background:#f97316}
.green{background:#16a34a}

/* ===== DRIVERS ===== */
.tab-page{display:none}
.tab-page.active{display:block}

.drivers-layout{
display:flex;
height:80vh;
}

#map{
width:70%;
height:100%;
}

#driversPanel{
width:30%;
background:#0f172a;
color:#fff;
overflow:auto;
}

.driver{
padding:10px;
border-bottom:1px solid #1e293b;
cursor:pointer;
}

.driver:hover{
background:#2563eb;
}

</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<div id="adminHeader"></div>

<!-- ===== PAGE ===== -->
<div class="page-body">

<!-- TABS -->
<div class="dispatch-tabs">
<button id="tabTrips" class="tab-btn active">Trips Schedule</button>
<button id="tabDrivers" class="tab-btn">Drivers Map</button>
</div>

<!-- WELCOME -->
<div id="welcomeMsg" class="welcome-msg"></div>

<!-- ===== TRIPS ===== -->
<div id="tripsPage" class="tab-page active">

<div class="top-actions">
<button class="btn blue" onclick="selectAll()">Select All</button>
<button class="btn orange" onclick="toggleEdit()" id="editBtn">Edit</button>
<button class="btn green" onclick="sendTrips()">Send</button>
</div>

<table>
<thead>
<tr>
<th>Select</th>
<th>#</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Notes</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<!-- ===== DRIVERS ===== -->
<div id="driversPage" class="tab-page">

<div class="drivers-layout">
<div id="map"></div>
<div id="driversPanel"></div>
</div>

</div>

</div>

<!-- ===== JS ===== -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let trips=[]
let drivers=[]
let editMode=false
let map
let markers=[]

/* ===== HEADER LOAD ===== */
fetch("/admin/header.html")
.then(res=>res.text())
.then(data=>{
document.getElementById("adminHeader").innerHTML=data
})

/* ===== WELCOME ===== */
const adminName = localStorage.getItem("name") || "Admin"
document.getElementById("welcomeMsg").innerText =
`Welcome ${adminName}`

/* ===== LOAD ===== */
async function load(){

const res = await fetch("/api/trips")
const data = await res.json()

// 🔥 يسحب بس selected
trips = data.filter(t => t.selected === true)

const d = await fetch("/api/users/driver")
drivers = await d.json()

renderTrips()

}

/* ===== RENDER ===== */
function renderTrips(){

const body=document.getElementById("tbody")
body.innerHTML=""

trips.forEach((t,i)=>{

body.innerHTML+=`
<tr>

<td><input type="checkbox"></td>

<td>${i+1}</td>

<td>${t.clientName||""}</td>

<td>${t.pickup||""}</td>

<td>${(t.stops||[]).join(" , ")}</td>

<td>${t.dropoff||""}</td>

<td>${t.tripDate||""}</td>

<td>${t.tripTime||""}</td>

<td>
<select ${editMode?"":"disabled"}>
<option value="">--</option>
${drivers.map(d=>`
<option value="${d._id}" ${t.driverId==d._id?"selected":""}>
${d.name}
</option>
`).join("")}
</select>
</td>

<td>${t.vehicle||"-"}</td>

<td><input value="${t.notes||""}"></td>

</tr>
`

})

}

/* ===== BUTTONS ===== */
function selectAll(){
document.querySelectorAll("input[type=checkbox]")
.forEach(c=>c.checked=true)
}

function toggleEdit(){
editMode=!editMode
document.getElementById("editBtn").innerText =
editMode?"Save":"Edit"
renderTrips()
}

function sendTrips(){
alert("Trips Sent ✅")
}

/* ===== TABS ===== */
tabTrips.onclick=()=>{
tripsPage.classList.add("active")
driversPage.classList.remove("active")
tabTrips.classList.add("active")
tabDrivers.classList.remove("active")
}

tabDrivers.onclick=()=>{

tripsPage.classList.remove("active")
driversPage.classList.add("active")

tabTrips.classList.remove("active")
tabDrivers.classList.add("active")

setTimeout(()=>{
initMap()
renderDrivers()
map.invalidateSize()
},300)

}

/* ===== MAP ===== */
function initMap(){

if(map) return

map=L.map('map').setView([33.45,-112.07],10)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map)

}

function renderDrivers(){

markers.forEach(m=>map.removeLayer(m))
markers=[]

const panel=document.getElementById("driversPanel")
panel.innerHTML=""

drivers.forEach((d,i)=>{

const trip = trips.find(t=>t.driverId==d._id)

panel.innerHTML+=`
<div class="driver" onclick="focusDriver(${d.lat||33.4},${d.lng||-112.07})">
<b>#${i+1} ${d.name}</b><br>
🚗 ${d.vehicleNumber||"-"}<br>
Trip: ${trip?.tripNumber||"None"}
</div>
`

if(d.lat && d.lng){
const m=L.marker([d.lat,d.lng]).addTo(map)
markers.push(m)
}

})

}

function focusDriver(lat,lng){
map.setView([lat,lng],13)
}

/* ===== START ===== */
load()

</script>

</body>
</html>
