<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{background:#f3f4f6;font-family:Arial}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin:10px;
}

.tab{
padding:8px 20px;
background:#1e3a8a;
color:#fff;
border-radius:6px;
cursor:pointer;
}

.tab.active{
background:#2563eb;
}

/* PAGES */
.page{
display:none;
padding:10px;
}

.page.active{
display:block;
}

/* MAP */
#map{
height:300px;
border-radius:10px;
margin-bottom:10px;
}

/* DRIVERS */
.driver-row{
padding:10px;
background:#1e3a8a;
color:#fff;
margin-bottom:5px;
border-radius:6px;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.driver-row:hover{
background:#2563eb;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<!-- TABS -->
<div class="tabs">
<div class="tab active" onclick="UI.showTab('trips')">Trips</div>
<div class="tab" onclick="UI.showTab('drivers')">Drivers & Map</div>
</div>

<!-- TRIPS PAGE -->
<div id="tripsPage" class="page active">

<div style="margin-bottom:10px">
<button onclick="Engine.toggleAll()">Select All</button>
<button id="editBtn" onclick="Engine.toggleEdit()">Edit</button>
<button onclick="Engine.sendSelected()">Send</button>
</div>

<div id="tripsContainer"></div>

</div>

<!-- DRIVERS PAGE -->
<div id="driversPage" class="page">

<div id="map"></div>
<div id="driversList"></div>

</div>

<script src="/admin/header.js"></script>
<script>
fetch("/admin/header.html")
.then(r=>r.text())
.then(h=>document.getElementById("adminHeader").innerHTML=h)
</script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.engine.js"></script>
<script src="/admin/dispatch.ui.js"></script>

<script>
Engine.load()
</script>

</body>
</html>
