<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dispatch</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:'Segoe UI',Arial;
background:#f3f4f6;
}

.page-body{
max-width:1400px;
margin:auto;
padding:120px 15px 40px;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
}

th{
background:#1e293b;
color:#fff;
padding:10px;
font-size:13px;
}

td{
border:1px solid #e2e8f0;
padding:8px;
text-align:center;
font-size:13px;
}

tr.row-selected{
background:#e0f2fe;
}

button{
padding:5px 10px;
border:none;
border-radius:5px;
cursor:pointer;
}

.btn-send{
background:#16a34a;
color:#fff;
}

.top-actions{
margin-bottom:10px;
}

.driver-card{
background:#1e293b;
color:#fff;
padding:10px;
border-radius:8px;
margin:5px;
font-size:12px;
}

#driversPanel{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="top-actions">

<button onclick="Engine.redistributeSelected()">Auto Assign</button>
<button onclick="Engine.sendSelected()">Send Selected</button>

</div>

<table>

<thead>
<tr>

<th>Select</th>
<th>#</th>
<th>Name</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Note</th>
<th>Driver</th>
<th>Car</th>
<th>Send</th>

</tr>
</thead>

<tbody id="dispatchBody"></tbody>

</table>

<h3>Drivers</h3>
<div id="driversPanel"></div>

<div id="dispatchMap" style="height:400px;margin-top:15px;"></div>

</div>

<script src="/admin/header.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- 👇 مهم جداً -->
<script src="/admin/store.js"></script>
<script src="/admin/ui.js"></script>
<script src="/admin/engine.js"></script>

</body>
</html>
