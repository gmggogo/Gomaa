<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dispatch System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css" onerror="this.href='./style.css'">
<link rel="stylesheet" href="/admin/header.css" onerror="this.href='./header.css'">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

.page-body{
  max-width:1400px;
  margin:auto;
  padding:180px 15px 40px;
}

/* 🔥 BUTTONS */
.top-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.btn{
  border:none;
  padding:8px 14px;
  border-radius:6px;
  color:#fff;
  font-size:13px;
  cursor:pointer;
}

.btn-blue{background:#2563eb;}
.btn-orange{background:#f59e0b;}
.btn-purple{background:#7c3aed;}
.btn-green{background:#16a34a;}

/* GRID */
.dispatch-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:12px;
  margin-bottom:10px;
}

.map-box,.drivers-box{
  background:#fff;
  border-radius:8px;
  overflow:hidden;
}

.box-title{
  background:#1e293b;
  color:#fff;
  padding:8px;
}

#dispatchMap{
  height:300px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th{
  background:#1e293b;
  color:#fff;
  padding:6px;
  font-size:12px;
}

td{
  border:1px solid #e5e7eb;
  padding:5px;
  font-size:11px;
  text-align:center;
}

.row-selected{
  background:#e0f2fe;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="top-actions">

<button onclick="toggleEdit()" class="btn btn-orange">
Manual Edit
</button>

<button onclick="load()" class="btn btn-purple">
Reload
</button>

</div>

<div class="dispatch-grid">

<div class="map-box">
<div class="box-title">Live Map</div>
<div id="dispatchMap"></div>
</div>

<div class="drivers-box">
<div class="box-title">Drivers</div>
<div id="driversPanel"></div>
</div>

</div>

<div class="table-wrap">

<table>

<thead>
<tr>
<th>Select</th>
<th>Trip</th>
<th>Client</th>
<th>Pickup</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
</tr>
</thead>

<tbody id="dispatchBody"></tbody>

</table>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ================= STATE ================= */

let trips=[]
let drivers=[]
let schedule={}
let editMode=false

/* ================= LOAD ================= */

async function load(){

  const t=await fetch("/api/trips").then(r=>r.json())
  const d=await fetch("/api/drivers").then(r=>r.json())
  const s=await fetch("/api/driver-schedule").then(r=>r.json())

  trips = t
  drivers = d
  schedule = s || {}

  render()

}

/* ================= HELPERS ================= */

function getDriverName(id){
  const d=drivers.find(x=>x._id==id)
  return d?.name || "-"
}

function getVehicle(id){
  return schedule[id]?.vehicle || "-"
}

/* ================= UI ================= */

function renderDrivers(){

  const panel=document.getElementById("driversPanel")

  panel.innerHTML = drivers.map(d=>{

    return `
      <div style="display:flex;justify-content:space-between;padding:6px;">
        <strong>${d.name}</strong>
        <span>🚗 ${getVehicle(d._id)}</span>
      </div>
    `

  }).join("")
}

/* ================= TABLE ================= */

function renderTrips(){

  const body=document.getElementById("dispatchBody")

  body.innerHTML = trips.map(t=>{

    return `
      <tr class="${t.selected?'row-selected':''}">

        <td>
          <input type="checkbox"
          ${t.selected?'checked':''}
          onchange="selectTrip('${t._id}', this.checked)">
        </td>

        <td>${t.tripNumber || "-"}</td>
        <td>${t.clientName || "-"}</td>
        <td>${t.pickup || "-"}</td>
        <td>${t.dropoff || "-"}</td>
        <td>${t.tripDate || "-"}</td>
        <td>${t.tripTime || "-"}</td>

        <td>
          ${
            editMode && t.selected
            ? `
              <select onchange="assignDriver('${t._id}', this.value)">
                <option value="">--</option>
                ${drivers.map(d=>`
                  <option value="${d._id}"
                  ${t.driverId==d._id?'selected':''}>
                  ${d.name}
                  </option>
                `).join("")}
              </select>
            `
            : getDriverName(t.driverId)
          }
        </td>

        <td>${getVehicle(t.driverId)}</td>

      </tr>
    `

  }).join("")
}

/* ================= ACTIONS ================= */

function selectTrip(id, val){
  const t=trips.find(x=>x._id==id)
  t.selected=val
  renderTrips()
}

function toggleEdit(){
  editMode=!editMode
  renderTrips()
}

function assignDriver(tripId, driverId){

  const t=trips.find(x=>x._id==tripId)

  t.driverId=driverId

  renderTrips()

}

/* ================= MAIN ================= */

function render(){
  renderDrivers()
  renderTrips()
}

load()

</script>

</body>
</html>
