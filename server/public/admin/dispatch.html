<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{background:#f3f4f6;font-family:Arial}

/* TOP */
.top-layout{
display:flex;
gap:10px;
margin-bottom:10px;
}

/* MAP */
#map{
width:35%;
height:260px;
border-radius:10px;
}

/* DRIVERS (SMART STRIP) */
#driversBox{
flex:1;
display:flex;
gap:6px;
overflow-x:auto;
height:120px;
padding:5px;
}

.driver-card{
min-width:90px;
background:linear-gradient(180deg,#1e3a8a,#2563eb);
color:#fff;
padding:6px;
border-radius:6px;
font-size:11px;
text-align:center;
}

/* TABLE */
table{
width:100%;
background:#fff;
border-collapse:collapse;
}

th{
background:#1e3a8a;
color:#fff;
}

td,th{
padding:6px;
border:1px solid #ddd;
text-align:center;
font-size:12px;
}

/* BUTTONS */
.btn{
background:#2563eb;
color:#fff;
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

</style>
</head>

<body>

<div id="adminHeader"></div>

<div style="padding:10px">

<!-- BUTTONS -->
<div style="margin-bottom:8px">
<button class="btn" onclick="Engine.toggleAll()">Select All</button>
<button id="editBtn" class="btn" onclick="Engine.toggleEdit()">Edit</button>
<button class="btn" onclick="Engine.sendSelected()">Send Selected</button>
<button class="btn" onclick="Engine.runAuto()">Redistribute</button>
</div>

<!-- MAP + DRIVERS -->
<div class="top-layout">
<div id="map"></div>
<div id="driversBox"></div>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Select</th>
<th>Trip#</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Notes</th>
<th>Send</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

<script src="/admin/header.js"></script>
<script>
fetch("/admin/header.html")
.then(r=>r.text())
.then(h=>document.getElementById("adminHeader").innerHTML=h)
</script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.engine.js"></script>
<script src="/admin/dispatch.ui.js"></script>

<script>
Engine.load()
</script>

</body>
</html>
