<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dispatch System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css" onerror="this.href='./style.css'">
<link rel="stylesheet" href="/admin/header.css" onerror="this.href='./header.css'">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

.page-body{
  max-width:1400px;
  margin:auto;
  padding:180px 15px 40px;
}

/* 🔥 BUTTONS */
.top-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.btn{
  border:none;
  padding:8px 14px;
  border-radius:6px;
  color:#fff;
  font-size:13px;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.05);
}

/* 🎨 COLORS */
.btn-blue{background:#2563eb;}
.btn-orange{background:#f59e0b;}
.btn-purple{background:#7c3aed;}
.btn-green{background:#16a34a;}
.btn-red{background:#dc2626;}

/* GRID */
.dispatch-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:12px;
  margin-bottom:10px;
}

.map-box,.drivers-box{
  background:#fff;
  border-radius:8px;
  overflow:hidden;
}

.box-title{
  background:#1e293b;
  color:#fff;
  padding:8px;
  font-size:13px;
}

#dispatchMap{
  height:300px;
}

/* TABLE */
.table-wrap{overflow:auto;}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th{
  background:#1e293b;
  color:#fff;
  padding:6px;
  font-size:12px;
}

td{
  border:1px solid #e5e7eb;
  padding:5px;
  font-size:11px;
  text-align:center;
}

/* ROW SELECT */
.row-selected{
  background:#e0f2fe;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<!-- 🔥 BUTTONS -->
<div class="top-actions">

<button onclick="Engine.redistributeSelected()" class="btn btn-blue">
Redistribute
</button>

<button onclick="UI.toggleEdit?.()" class="btn btn-orange">
Manual Edit
</button>

<button onclick="Engine.load()" class="btn btn-purple">
Reload
</button>

<button onclick="Engine.sendSelected()" class="btn btn-green">
Send Selected
</button>

</div>

<!-- 🔥 GRID -->
<div class="dispatch-grid">

<div class="map-box">
<div class="box-title">Live Dispatch Map</div>
<div id="dispatchMap"></div>
</div>

<div class="drivers-box">
<div class="box-title">Active Drivers</div>
<div id="driversPanel"></div>
</div>

</div>

<!-- 🔥 TABLE -->
<div class="table-wrap">

<table>

<thead>
<tr>
<th>Select</th>
<th>Trip #</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Notes</th>
<th>Driver</th>
<th>Vehicle</th>
<th>Send</th>
</tr>
</thead>

<tbody id="dispatchBody"></tbody>

</table>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.ui.js"></script>
<script src="/admin/dispatch.engine.js"></script>

<script>
if(typeof loadAdminHeader==="function"){
  loadAdminHeader()
}
Engine.load()
</script>

</body>
</html>
