<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Dispatch</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 CSS -->
<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/dispatch.css">

</head>

<body>

<!-- 🔥 HEADER بيتسحب -->
<div id="adminHeader"></div>

<!-- 🔥 MAIN -->
<div class="dispatch-container">

  <!-- BUTTONS -->
  <div class="dispatch-actions">
    <button onclick="Engine.autoAssignSmart()">Smart Assign</button>
  </div>

  <!-- MAP + DRIVERS -->
  <div class="dispatch-top">

    <div id="dispatchMap"></div>

    <div id="driversPanel"></div>

  </div>

  <!-- TABLE -->
  <table class="dispatch-table">

    <thead>
      <tr>
        <th>Trip #</th>
        <th>Client</th>
        <th>Pickup</th>
        <th>Stops</th>
        <th>Dropoff</th>
        <th>Date</th>
        <th>Time</th>
        <th>Notes</th>
        <th>Driver</th>
        <th>Vehicle</th>
        <th>Assign</th>
      </tr>
    </thead>

    <tbody id="dispatchBody"></tbody>

  </table>

</div>

<!-- 🔥 SCRIPTS -->
<script src="/admin/header.js"></script>
<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.engine.js"></script>
<script src="/admin/dispatch.ui.js"></script>

<script>
  // تحميل الهيدر
  if(typeof loadAdminHeader === "function"){
    loadAdminHeader()
  }

  // تشغيل السيستم
  Engine.load()
</script>

</body>
</html>
