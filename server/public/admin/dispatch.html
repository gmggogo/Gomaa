<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
.page-body{padding:15px 20px;background:#f1f5f9}
.table-wrap{background:#fff;border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:#1e293b;color:#fff;padding:10px}
td{border:1px solid #e5e7eb;padding:8px}
.btn{padding:6px 10px;border:none;color:#fff;cursor:pointer;border-radius:5px}
.blue{background:#2563eb}
.green{background:#16a34a}
.orange{background:#f97316}
</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div style="margin-bottom:10px">
<button class="btn blue" onclick="toggleSelect()">Select All</button>
<button class="btn orange" onclick="toggleEdit()">Edit</button>
<button class="btn green" onclick="redistribute()">Redistribute</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Select</th>
<th>#</th>
<th>Client</th>
<th>Pickup</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>
</div>

</div>

<script>

/* ================= STATE ================= */

let trips = []
let drivers = []
let schedule = {}
let editMode = false
let allSelected = false

/* ================= STORE ================= */

const Store = {
  API: "/api/dispatch",
  async load(){
    try{
      const res = await fetch(this.API)
      return await res.json()
    }catch(e){
      return { trips:[], drivers:[], schedule:{} }
    }
  }
}

/* ================= INIT ================= */

async function init(){

  const data = await Store.load()

  // 🔥 FIX API
  const driversRaw = data.drivers || data.data?.drivers || []
  const tripsRaw   = data.trips   || data.data?.trips   || []
  const schedRaw   = data.schedule|| data.data?.schedule|| {}

  drivers = driversRaw.map(d=>({
    ...d,
    _id:String(d._id)
  }))

  trips = tripsRaw.map(t=>({
    ...t,
    selected:false,
    driverId: t.driverId ? String(t.driverId) : ""
  }))

  schedule = schedRaw

  autoAssign()

  renderTrips()
}

/* ================= AUTO ASSIGN ================= */

function autoAssign(){

  if(!drivers.length) return

  let index=0

  trips.forEach(t=>{

    if(!t.driverId){

      const d=drivers[index]

      t.driverId=d._id
      t.vehicle=getCar(d._id)

      index++
      if(index>=drivers.length) index=0
    }

  })
}

/* ================= HELPERS ================= */

function getCar(id){
  const s=schedule[id]
  if(!s) return ""
  return s.carNumber||s.vehicleNumber||""
}

/* ================= RENDER ================= */

function renderTrips(){

  const body=document.getElementById("tbody")
  body.innerHTML=""

  trips.forEach((t,i)=>{

    body.innerHTML+=`
<tr>

<td>
<button onclick="toggleTrip(${i})">
${t.selected?'✔':'Select'}
</button>
</td>

<td>${t.tripNumber||i+1}</td>
<td>${t.clientName||""}</td>
<td>${t.pickup||""}</td>
<td>${t.dropoff||""}</td>
<td>${t.tripDate||""}</td>
<td>${t.tripTime||""}</td>

<td>
<select ${(editMode&&t.selected)?"":"disabled"} onchange="assignDriver(${i},this.value)">
<option value="">--</option>
${drivers.map(d=>`
<option value="${d._id}" ${t.driverId===d._id?'selected':''}>
${d.name}
</option>
`).join("")}
</select>
</td>

<td>${t.vehicle||""}</td>

</tr>
`
  })
}

/* ================= ACTIONS ================= */

function toggleTrip(i){
  trips[i].selected=!trips[i].selected
  renderTrips()
}

function toggleSelect(){
  allSelected=!allSelected
  trips.forEach(t=>t.selected=allSelected)
  renderTrips()
}

function toggleEdit(){
  editMode=!editMode
  renderTrips()
}

function assignDriver(i,id){

  const d=drivers.find(x=>x._id===id)
  if(!d) return

  trips[i].driverId=id
  trips[i].vehicle=getCar(id)

  renderTrips()
}

function redistribute(){

  if(!drivers.length) return

  let index=0

  trips.forEach(t=>{

    if(!t.selected) return

    const d=drivers[index]

    t.driverId=d._id
    t.vehicle=getCar(d._id)

    index++
    if(index>=drivers.length) index=0
  })

  renderTrips()
}

/* ================= START ================= */

init()

</script>

</body>
</html>
