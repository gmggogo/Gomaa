<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
.page-body{padding:15px 20px;background:#f1f5f9;min-height:calc(100vh - 80px);}
.dispatch-tabs{display:flex;gap:8px;margin-bottom:10px;}
.tab-btn{flex:1;padding:14px;background:#1e293b;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
.tab-btn.active{background:#2563eb;}
.top-actions{margin:12px 0;display:flex;gap:10px;}
.btn{padding:9px 13px;border:none;color:#fff;border-radius:7px;font-weight:bold;cursor:pointer;}
.blue{background:#2563eb}
.orange{background:#f97316}
.green{background:#16a34a}
.purple{background:#7c3aed}
.table-wrap{background:#fff;border-radius:10px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{background:#1e293b;color:#fff;padding:10px;}
td{padding:8px;border:1px solid #eee;}
.tab-page{display:none}
.tab-page.active{display:block}
.drivers-layout{display:flex;height:80vh;}
#map{width:70%}
#driversPanel{width:30%;background:#0f172a;color:#fff;overflow:auto}
.driver{padding:10px;border-bottom:1px solid #1e293b;cursor:pointer;}
.driver:hover{background:#1e293b;}
</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="dispatch-tabs">
<button id="tabTrips" class="tab-btn active">Trips</button>
<button id="tabDrivers" class="tab-btn">Drivers Map</button>
</div>

<!-- TRIPS -->
<div id="tripsPage" class="tab-page active">

<div class="top-actions">
<button class="btn blue" onclick="toggleSelect()">Select All</button>
<button id="editBtn" class="btn orange" onclick="toggleEdit()">Edit Selected</button>
<button class="btn green" onclick="sendSelected()">Send Selected</button>
<button class="btn purple" onclick="redistribute()">Redistribute</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Select</th><th>#</th><th>Client</th><th>Pickup</th>
<th>Dropoff</th><th>Date</th><th>Time</th>
<th>Driver</th><th>Car</th><th>Send</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<!-- DRIVERS -->
<div id="driversPage" class="tab-page">
<div class="drivers-layout">
<div id="map"></div>
<div id="driversPanel"></div>
</div>
</div>

</div>

<script src="/admin/header.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ================= STATE ================= */
let trips = []
let drivers = []
let schedule = {}
let map = null
let markers = []

/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded", async () => {

setupTabs()

const res = await fetch("/api/dispatch")
const data = await res.json()

trips = data.trips || []
drivers = data.drivers || []
schedule = data.schedule || {}

autoAssign()
renderTrips()
renderDrivers()

})

/* ================= TABS ================= */

function setupTabs(){

const tabTrips = document.getElementById("tabTrips")
const tabDrivers = document.getElementById("tabDrivers")

tabTrips.onclick = () => {
document.getElementById("tripsPage").classList.add("active")
document.getElementById("driversPage").classList.remove("active")
tabTrips.classList.add("active")
tabDrivers.classList.remove("active")
}

tabDrivers.onclick = () => {
document.getElementById("tripsPage").classList.remove("active")
document.getElementById("driversPage").classList.add("active")
tabTrips.classList.remove("active")
tabDrivers.classList.add("active")

setTimeout(()=>{
if(!map) initMap()
map.invalidateSize()
},300)

}

}

/* ================= MAP ================= */

function initMap(){
map = L.map("map").setView([33.44,-112.07],10)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)
}

/* ================= AUTO ASSIGN ================= */

function autoAssign(){

trips.forEach(t=>{
if(!t.driverId){
const d = drivers[0]
if(d){
t.driverId = d._id
t.vehicle = schedule[d._id]?.carNumber || ""
}
}
})

}

/* ================= RENDER ================= */

function renderTrips(){

const body = document.getElementById("tbody")
body.innerHTML=""

trips.forEach((t,i)=>{

body.innerHTML+=`
<tr>
<td><button class="btn blue" onclick="toggleTrip(${i})">Select</button></td>
<td>${t.tripNumber||i}</td>
<td>${t.clientName||""}</td>
<td>${t.pickup||""}</td>
<td>${t.dropoff||""}</td>
<td>${t.tripDate||""}</td>
<td>${t.tripTime||""}</td>
<td>${t.driverId||""}</td>
<td>${t.vehicle||""}</td>
<td><button class="btn green" onclick="sendOne(${i})">Send</button></td>
</tr>
`

})

}

/* ================= DRIVERS ================= */

function renderDrivers(){

const panel = document.getElementById("driversPanel")
panel.innerHTML=""

drivers.forEach(d=>{

panel.innerHTML+=`
<div class="driver" onclick="focusDriver('${d._id}')">
${d.name}
</div>
`

})

}

/* ================= DRIVER CLICK ================= */

function focusDriver(id){

if(!map) return

markers.forEach(m=>map.removeLayer(m))
markers=[]

const trip = trips.find(t=>t.driverId===id)
if(!trip) return

fetch(`https://nominatim.openstreetmap.org/search?q=${trip.pickup}&format=json`)
.then(r=>r.json())
.then(data=>{
if(!data.length) return

const lat = data[0].lat
const lon = data[0].lon

const marker = L.marker([lat,lon]).addTo(map)
markers.push(marker)

map.setView([lat,lon],13)
})

}

/* ================= ACTIONS ================= */

function toggleTrip(i){
console.log(i)
}

function toggleSelect(){console.log("select")}
function toggleEdit(){console.log("edit")}
function sendSelected(){console.log("send")}
function sendOne(i){console.log("send",i)}
function redistribute(){console.log("redistribute")}

/* ================= GLOBAL ================= */

window.toggleTrip=toggleTrip
window.toggleSelect=toggleSelect
window.toggleEdit=toggleEdit
window.sendSelected=sendSelected
window.sendOne=sendOne
window.redistribute=redistribute
window.focusDriver=focusDriver

</script>

</body>
</html>
