<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dispatch</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f1f5f9;
}

#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

.page-body{
padding-top:300px;
padding-left:20px;
padding-right:20px;
}

/* TOOLBAR */

.dispatch-toolbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
flex-wrap:wrap;
gap:10px;
}

.left-tools{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.right-tools{
display:flex;
gap:8px;
}

.btn{
border:none;
padding:7px 14px;
border-radius:7px;
font-size:12px;
cursor:pointer;
font-weight:600;
}

.btn-redistribute{background:#1e40af;color:white}
.btn-manual{background:#9333ea;color:white}
.btn-sendSelected{background:#16a34a;color:white}
.btn-select{background:#0f172a;color:white}

/* MAP */

#dispatchMap{
height:500px;
width:100%;
margin-bottom:15px;
border-radius:10px;
}

/* TABLE */

.table-scroll{
width:100%;
overflow:auto;
max-height:600px;
}

.trip-table{
width:100%;
border-collapse:collapse;
background:white;
font-size:13px;
}

.trip-table th{
background:#0f172a;
color:white;
padding:8px;
text-align:center;
}

.trip-table td{
padding:6px;
border-bottom:1px solid #eee;
text-align:center;
}

.btn-send{
background:#16a34a;
color:white;
border:none;
padding:5px 10px;
border-radius:6px;
font-size:12px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<!-- TOOLBAR -->

<div class="dispatch-toolbar">

<div class="left-tools">

<button class="btn btn-redistribute"
onclick="Engine.distributeSelected()">
Redistribute Selected
</button>

<button class="btn btn-redistribute"
onclick="Engine.autoDispatch()">
Auto Dispatch
</button>

</div>

<div class="right-tools">

<button id="selectBtn"
class="btn btn-select"
onclick="toggleSelect()">
Select All
</button>

</div>

</div>

<!-- MAP -->

<div id="dispatchMap"></div>

<!-- TABLE -->

<div class="table-scroll">

<table class="trip-table">

<thead>

<tr>
<th>Select</th>
<th>Trip #</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Notes</th>
<th>Send</th>
</tr>

</thead>

<tbody id="dispatchBody">

<tr>
<td colspan="12" style="text-align:center;padding:40px">
Loading trips...
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="/admin/header.js"></script>
<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.engine.js"></script>
<script src="/admin/dispatch.ui.js"></script>

<script>

/* =========================
SELECT
========================= */

let selectMode=false

function toggleSelect(){

const boxes=document.querySelectorAll(".tripSelect")

selectMode=!selectMode

boxes.forEach(b=>b.checked=selectMode)

document.getElementById("selectBtn").innerText=
selectMode ? "Remove All" : "Select All"

}

/* =========================
MAP
========================= */

const DispatchMap={

map:null,
markers:[],

init(){

this.map=L.map("dispatchMap").setView([33.4484,-112.0740],10)

L.tileLayer(
"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
{maxZoom:19}
).addTo(this.map)

},

clear(){

this.markers.forEach(m=>this.map.removeLayer(m))
this.markers=[]

},

renderDrivers(drivers){

drivers.forEach(d=>{

if(!d.lat) return

const m=L.marker([d.lat,d.lng])

m.bindPopup("Driver: "+d.name)

m.addTo(this.map)

this.markers.push(m)

})

},

renderTrips(trips){

trips.forEach(t=>{

if(!t.pickupLat) return

const m=L.circleMarker(
[t.pickupLat,t.pickupLng],
{
radius:8,
color:"#facc15",
fillColor:"#facc15",
fillOpacity:1
})

m.bindPopup("Trip "+(t.tripNumber||t._id))

m.addTo(this.map)

this.markers.push(m)

})

},

fit(){

if(!this.markers.length) return

const group=new L.featureGroup(this.markers)

this.map.fitBounds(group.getBounds(),{
padding:[50,50]
})

}

}

/* =========================
LOAD
========================= */

document.addEventListener("DOMContentLoaded", async ()=>{

await Engine.load()

DispatchMap.init()

DispatchMap.clear()

DispatchMap.renderDrivers(Engine.drivers)

DispatchMap.renderTrips(Engine.trips)

DispatchMap.fit()

})

</script>

</body>
</html>
