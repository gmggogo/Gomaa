<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dispatch System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">

<style>

body{
margin:0;
font-family:'Segoe UI',Arial;
background:#f3f4f6;
}

/* HEADER FIX */
#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
}

/* PAGE */
.page-body{
max-width:1400px;
margin:auto;
padding:200px 15px 40px;
}

/* BUTTONS */
.top-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:10px;
}

.btn{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.blue{background:#2563eb;color:#fff;}
.orange{background:#f59e0b;color:#fff;}
.purple{background:#7c3aed;color:#fff;}
.green{background:#16a34a;color:#fff;}

/* GRID */
.dispatch-grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:12px;
margin-bottom:10px;
}

/* BOX */
.box{
background:#fff;
border-radius:8px;
overflow:hidden;
}

.box-title{
background:#1e293b;
color:#fff;
padding:8px;
font-size:13px;
}

/* MAP */
#dispatchMap{
height:300px;
}

/* DRIVERS */
#driversPanel{
padding:10px;
font-size:12px;
}

.driver-card{
border-bottom:1px solid #e5e7eb;
padding:6px 0;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:#fff;
}

th{
background:#1e293b;
color:#fff;
padding:6px;
font-size:12px;
}

td{
border:1px solid #e5e7eb;
padding:5px;
font-size:11px;
text-align:center;
}

</style>

</head>

<body>

<!-- HEADER -->
<div id="adminHeader"></div>

<div class="page-body">

<!-- BUTTONS -->
<div class="top-actions">

<button class="btn blue" onclick="Engine.redistributeSelected()">
Redistribute Selected
</button>

<button class="btn orange">
Manual Edit
</button>

<button class="btn purple">
Save Changes
</button>

<button class="btn green" onclick="Engine.sendSelected()">
Send Selected
</button>

</div>

<!-- GRID -->
<div class="dispatch-grid">

<!-- MAP -->
<div class="box">

<div class="box-title">Live Dispatch Map</div>

<div id="dispatchMap"></div>

</div>

<!-- DRIVERS -->
<div class="box">

<div class="box-title">Active Drivers</div>

<div id="driversPanel"></div>

</div>

</div>

<!-- TABLE -->
<table>

<thead>
<tr>

<th>Select</th>
<th>Trip #</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Notes</th>
<th>Driver</th>
<th>Vehicle</th>
<th>Send</th>

</tr>
</thead>

<tbody id="dispatchBody"></tbody>

</table>

</div>

<!-- SCRIPTS -->
<script src="/admin/header.js"></script>

<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.ui.js"></script>
<script src="/admin/dispatch.engine.js"></script>

</body>
</html>
