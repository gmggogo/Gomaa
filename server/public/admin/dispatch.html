<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

.page-body{
padding:15px 20px;
background:#f1f5f9;
min-height:calc(100vh - 80px);
}

.dispatch-tabs{
display:flex;
margin-bottom:5px;
}

.tab-btn{
flex:1;
padding:14px;
border:none;
background:#1e293b;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.tab-btn.active{background:#2563eb;}

.top-actions{
margin:10px 0;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:8px 12px;
border:none;
color:#fff;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

.blue{background:#2563eb}
.orange{background:#f97316}
.green{background:#16a34a}
.purple{background:#7c3aed}

table{
width:100%;
border-collapse:collapse;
background:#fff;
}

th{
background:#1e293b;
color:#fff;
padding:8px;
}

td{
border:1px solid #ddd;
padding:6px;
font-size:12px;
}

.tab-page{display:none}
.tab-page.active{display:block}

.drivers-layout{
display:flex;
height:80vh;
}

#map{width:70%;}
#driversPanel{
width:30%;
background:#0f172a;
color:#fff;
overflow:auto;
}

.driver{
padding:10px;
border-bottom:1px solid #1e293b;
cursor:pointer;
}

.driver:hover{
background:#1e293b;
}

</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="dispatch-tabs">
<button id="tabTrips" class="tab-btn active">Trips</button>
<button id="tabDrivers" class="tab-btn">Drivers Map</button>
</div>

<!-- TRIPS -->
<div id="tripsPage" class="tab-page active">

<div class="top-actions">

<button id="selectBtn" class="btn blue" onclick="toggleSelect()">Select All</button>

<button id="editBtn" class="btn orange" onclick="toggleEdit()">Edit</button>

<button class="btn green" onclick="sendSelected()">Send Selected</button>

<button class="btn purple" onclick="redistribute()">Redistribute</button>

</div>

<table>
<thead>
<tr>
<th>Select</th>
<th>#</th>
<th>Client</th>
<th>Pickup</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Send</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

</div>

<!-- DRIVERS -->
<div id="driversPage" class="tab-page">
<div class="drivers-layout">
<div id="map"></div>
<div id="driversPanel"></div>
</div>
</div>

</div>

<script src="/admin/header.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ================= STATE ================= */

let trips=[]
let drivers=[]
let schedule={}
let map
let markers=[]
let geoCache={}
let editMode=false
let allSelected=false

/* ================= STORE ================= */

const Store={
API:"/api/dispatch",
async load(){
const res=await fetch(this.API)
return await res.json()
}
}

/* ================= INIT ================= */

async function init(){

const data=await Store.load()

drivers=(data.drivers||[]).map(d=>({...d,_id:String(d._id)}))

trips=(data.trips||[]).map(t=>({
...t,
selected:false,
driverId:t.driverId?String(t.driverId):""
}))

schedule=data.schedule||{}

renderTrips()
initMap()
renderDrivers()

}

/* ================= CAR ================= */

function getDriverCar(id){
const s=schedule[id]
if(!s) return ""
return s.carNumber||s.vehicleNumber||s.car||""
}

/* ================= TRIPS ================= */

function renderTrips(){

const body=document.getElementById("tbody")
body.innerHTML=""

trips.forEach((t,i)=>{

body.innerHTML+=`
<tr>

<td>
<button class="btn ${t.selected?'green':'blue'}"
onclick="toggleTrip(${i})">
${t.selected?'Selected':'Select'}
</button>
</td>

<td>${t.tripNumber||i+1}</td>
<td>${t.clientName||""}</td>
<td>${t.pickup||""}</td>
<td>${t.dropoff||""}</td>
<td>${t.tripDate||""}</td>
<td>${t.tripTime||""}</td>

<td>
<select ${(editMode && t.selected)?'':'disabled'}
onchange="assignDriver(${i},this.value)">
<option value="">--</option>
${drivers.map(d=>`
<option value="${d._id}" ${t.driverId===d._id?'selected':''}>
${d.name}
</option>`).join("")}
</select>
</td>

<td id="car-${i}">${t.vehicle||""}</td>

<td>
<button class="btn green" onclick="sendOne(${i})">Send</button>
</td>

</tr>
`
})

}

/* ================= SELECT ================= */

function toggleTrip(i){
trips[i].selected=!trips[i].selected
renderTrips()
}

function toggleSelect(){
allSelected=!allSelected
trips.forEach(t=>t.selected=allSelected)
document.getElementById("selectBtn").innerText=
allSelected?"Remove All":"Select All"
renderTrips()
}

/* ================= EDIT ================= */

function toggleEdit(){

editMode=!editMode

document.getElementById("editBtn").innerText=
editMode?"Save":"Edit"

if(!editMode){
renderDrivers()
}

renderTrips()
}

/* ================= ASSIGN ================= */

function assignDriver(i,id){

const d=drivers.find(x=>x._id===id)
if(!d) return

trips[i].driverId=id
trips[i].driverName=d.name
trips[i].vehicle=getDriverCar(id)

}

/* ================= SEND ================= */

function sendSelected(){
console.log("Send Selected:",trips.filter(t=>t.selected))
}

function sendOne(i){
console.log("Send Trip:",trips[i])
}

/* ================= REDISTRIBUTE ================= */

function redistribute(){

const selected=trips.filter(t=>t.selected)

selected.forEach((t,i)=>{
const d=drivers[i%drivers.length]
t.driverId=d._id
t.vehicle=getDriverCar(d._id)
})

renderTrips()
renderDrivers()
}

/* ================= MAP ================= */

function initMap(){

map=L.map('map').setView([33.4484,-112.0740],10)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map)

setTimeout(()=>map.invalidateSize(),300)
}

/* ================= GEOCODE ================= */

async function geocode(addr){

if(!addr) return null
if(geoCache[addr]) return geoCache[addr]

const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`)
const data=await res.json()

if(!data.length) return null

return geoCache[addr]={
lat:parseFloat(data[0].lat),
lng:parseFloat(data[0].lon)
}
}

/* ================= DRIVERS ================= */

function renderDrivers(){

const panel=document.getElementById("driversPanel")
panel.innerHTML=""

markers.forEach(m=>map.removeLayer(m))
markers=[]

drivers.forEach((d,i)=>{

const car=getDriverCar(d._id)
const trip=trips.find(t=>t.driverId===d._id)

panel.innerHTML+=`
<div class="driver" onclick="focusDriver('${d._id}')">
<b>${i+1} - ${d.name}</b><br>
🚗 ${car||"-"}<br>
📦 ${trip?trip.tripNumber:"-"}
</div>
`

// marker رقم السواق
if(d.lat && d.lng){

const icon=L.divIcon({
className:'driver-marker',
html:`<div style="
background:#2563eb;
color:#fff;
border-radius:50%;
width:30px;
height:30px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;">
${i+1}
</div>`
})

const m=L.marker([d.lat,d.lng],{icon})
.addTo(map)
.bindPopup(d.name)

markers.push(m)
}

})

}

/* ================= CLICK DRIVER ================= */

async function focusDriver(id){

const d=drivers.find(x=>x._id===id)
const t=trips.find(x=>x.driverId===id)

if(!d) return

const pickup=t?await geocode(t.pickup):null
const dropoff=t?await geocode(t.dropoff):null

markers.forEach(m=>map.removeLayer(m))
markers=[]

// driver
if(d.lat && d.lng){
markers.push(L.marker([d.lat,d.lng]).addTo(map).bindPopup("Driver"))
}

// pickup
if(pickup){
markers.push(L.marker([pickup.lat,pickup.lng]).addTo(map).bindPopup("Pickup"))
}

// dropoff
if(dropoff){
markers.push(L.marker([dropoff.lat,dropoff.lng]).addTo(map).bindPopup("Dropoff"))
}

// line
if(pickup && dropoff){
const line=L.polyline([
[pickup.lat,pickup.lng],
[dropoff.lat,dropoff.lng]
],{color:'blue'}).addTo(map)
markers.push(line)
}

// zoom
let bounds=[]
if(d.lat && d.lng) bounds.push([d.lat,d.lng])
if(pickup) bounds.push([pickup.lat,pickup.lng])
if(dropoff) bounds.push([dropoff.lat,dropoff.lng])

if(bounds.length){
map.fitBounds(bounds,{padding:[50,50]})
}

}

/* ================= TABS ================= */

tabTrips.onclick=()=>{
tripsPage.classList.add("active")
driversPage.classList.remove("active")
tabTrips.classList.add("active")
tabDrivers.classList.remove("active")
}

tabDrivers.onclick=()=>{
tripsPage.classList.remove("active")
driversPage.classList.add("active")
tabTrips.classList.remove("active")
tabDrivers.classList.add("active")
setTimeout(()=>map.invalidateSize(),300)
}

/* ================= START ================= */

init()

</script>

</body>
</html>
