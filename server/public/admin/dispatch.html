<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

.page-body{
padding:15px 20px;
background:#f1f5f9;
min-height:calc(100vh - 80px);
}

.dispatch-tabs{
display:flex;
margin-bottom:5px;
}

.tab-btn{
flex:1;
padding:14px;
border:none;
background:#1e293b;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.tab-btn.active{
background:#2563eb;
}

.top-actions{
margin:10px 0;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:8px 12px;
border:none;
color:#fff;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

.blue{background:#2563eb}
.orange{background:#f97316}
.green{background:#16a34a}
.purple{background:#7c3aed}

table{
width:100%;
border-collapse:collapse;
background:#fff;
}

th{
background:#1e293b;
color:#fff;
padding:8px;
}

td{
border:1px solid #ddd;
padding:6px;
font-size:12px;
}

.tab-page{display:none}
.tab-page.active{display:block}

.drivers-layout{
display:flex;
height:80vh;
}

#map{
width:70%;
height:100%;
}

#driversPanel{
width:30%;
background:#0f172a;
color:#fff;
overflow:auto;
}

.driver{
padding:8px 12px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
cursor:pointer;
}

.driver:hover{
background:#2563eb;
}

</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<!-- ===== TABS ===== -->
<div class="dispatch-tabs">
<button id="tabTrips" class="tab-btn active">Trips Schedule</button>
<button id="tabDrivers" class="tab-btn">Drivers Map</button>
</div>

<!-- ===== TRIPS ===== -->
<div id="tripsPage" class="tab-page active">

<div class="top-actions">
<button class="btn blue" onclick="selectAll()">Select All</button>
<button class="btn orange" onclick="toggleEdit()" id="editBtn">Edit Selected</button>
<button class="btn green" onclick="sendSelected()">Send Selected</button>
<button class="btn purple" onclick="redistributeSelected()">Redistribute</button>
</div>

<table>
<thead>
<tr>
<th>Select</th>
<th>#</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Notes</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

<!-- ===== DRIVERS ===== -->
<div id="driversPage" class="tab-page">

<div class="drivers-layout">
<div id="map"></div>
<div id="driversPanel"></div>
</div>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/* ================= STATE ================= */

let trips = []     // هيتم ملؤها من Engine
let drivers = []   // هيتم ملؤها من Engine
let editMode = false
let map
let markers=[]

/* ================= RENDER ================= */

function renderTrips(){

const body=document.getElementById("tbody")
body.innerHTML=""

trips.forEach((t,i)=>{

body.innerHTML+=`
<tr>

<td>
<input type="checkbox"
${t.selected ? "checked" : ""}
onchange="trips[${i}].selected=this.checked">
</td>

<td>${t.tripNumber || i+1}</td>

<td>${t.clientName || ""}</td>
<td>${t.pickup || ""}</td>
<td>${(t.stops || []).join(" , ")}</td>
<td>${t.dropoff || ""}</td>
<td>${t.tripDate || ""}</td>
<td>${t.tripTime || ""}</td>

<!-- DRIVER -->
<td>
<select onchange="trips[${i}].driverId=this.value"
${editMode ? "" : "disabled"}>

<option value="">--</option>

${drivers.map(d=>`
<option value="${d._id}"
${t.driverId==d._id ? "selected" : ""}>
${d.name}
</option>
`).join("")}

</select>
</td>

<!-- CAR -->
<td>
<input value="${t.vehicle || ""}"
oninput="trips[${i}].vehicle=this.value"
${editMode ? "" : "disabled"}>
</td>

<!-- NOTES -->
<td>
<input value="${t.notes || ""}"
oninput="trips[${i}].notes=this.value"
${editMode ? "" : "disabled"}>
</td>

<td>
<button class="btn green" onclick="sendOne(${i})">Send</button>
</td>

</tr>
`

})

}

/* ================= ACTIONS ================= */

function selectAll(){
trips.forEach(t=>t.selected=true)
renderTrips()
}

function toggleEdit(){

editMode=!editMode

document.getElementById("editBtn").innerText =
editMode ? "Save" : "Edit Selected"

renderTrips()

}

function sendOne(i){
console.log("Send Trip:", trips[i])
}

function sendSelected(){
console.log("Send Selected:", trips.filter(t=>t.selected))
}

function redistributeSelected(){
console.log("Redistribute:", trips.filter(t=>t.selected))
}

/* ================= MAP ================= */

function initMap(){

if(map) return

map=L.map('map').setView([33.45,-112.07],10)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map)

}

function renderDrivers(){

markers.forEach(m=>map.removeLayer(m))
markers=[]

const panel=document.getElementById("driversPanel")
panel.innerHTML=""

drivers.forEach((d,i)=>{

const trip = trips.find(t=>t.driverId==d._id)

panel.innerHTML+=`
<div class="driver"
onclick="focusDriver(${d.lat||33.4},${d.lng||-112.07})">

<span>${i+1} - ${d.name}</span>
<span>🚗 ${d.vehicleNumber||"-"} | ${trip?.tripNumber||"-"}</span>

</div>
`

if(d.lat && d.lng){
const m=L.marker([d.lat,d.lng]).addTo(map)
markers.push(m)
}

})

}

function focusDriver(lat,lng){
map.setView([lat,lng],13)
}

/* ================= TABS ================= */

tabTrips.onclick=()=>{
tripsPage.classList.add("active")
driversPage.classList.remove("active")
tabTrips.classList.add("active")
tabDrivers.classList.remove("active")
}

tabDrivers.onclick=()=>{

tripsPage.classList.remove("active")
driversPage.classList.add("active")

tabTrips.classList.remove("active")
tabDrivers.classList.add("active")

setTimeout(()=>{
initMap()
renderDrivers()
map.invalidateSize()
},300)

}

/* ================= READY ================= */

// 🔥 مهم: Engine هو اللي هيحط الداتا هنا
// مثال:
// trips = [...]
// drivers = [...]

renderTrips()

</script>

</body>
</html>
