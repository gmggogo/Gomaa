<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">

<style>

.page-body{
padding:15px 20px;
background:#f1f5f9;
min-height:calc(100vh - 80px);
}

.dispatch-tabs{
display:flex;
margin-bottom:5px;
}

.tab-btn{
flex:1;
padding:14px;
border:none;
background:#1e293b;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.tab-btn.active{
background:#2563eb;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
}

th{
background:#1e293b;
color:#fff;
padding:8px;
}

td{
border:1px solid #ddd;
padding:6px;
font-size:12px;
}

.top-actions{
margin:10px 0;
display:flex;
gap:10px;
}

.btn{
padding:8px 12px;
border:none;
color:#fff;
cursor:pointer;
border-radius:5px;
}

.blue{background:#2563eb}
.orange{background:#f97316}
.green{background:#16a34a}

</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<!-- ❌ شيلنا welcome-msg -->

<div class="top-actions">
<button class="btn blue" onclick="selectAll()">Select All</button>
<button class="btn orange" onclick="toggleEdit()" id="editBtn">Edit</button>
<button class="btn green" onclick="sendSelected()">Send</button>
</div>

<table>
<thead>
<tr>
<th>Select</th>
<th>#</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Notes</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

</div>

<script src="/admin/header.js"></script>

<script>

let trips = []
let drivers = []
let editMode = false

/* ================= LOAD ================= */

async function load(){

const res = await fetch("/api/trips")
const data = await res.json()

// 🔥 اهم نقطة
trips = data.filter(t => t.dispatchSelected === true)

const d = await fetch("/api/users/driver")
drivers = await d.json()

renderTrips()

}

/* ================= RENDER ================= */

function renderTrips(){

const body = document.getElementById("tbody")
body.innerHTML = ""

trips.forEach((t,i)=>{

body.innerHTML += `
<tr>

<td>
<input type="checkbox"
onchange="toggleSelect(${i},this.checked)">
</td>

<td>${i+1}</td>

<td>${t.clientName || ""}</td>
<td>${t.pickup || ""}</td>
<td>${(t.stops || []).join(" , ")}</td>
<td>${t.dropoff || ""}</td>
<td>${t.tripDate || ""}</td>
<td>${t.tripTime || ""}</td>

<td>
<select ${editMode ? "" : "disabled"}>
<option value="">--</option>
${drivers.map(d=>`
<option value="${d._id}" ${t.driverId==d._id?"selected":""}>
${d.name}
</option>
`).join("")}
</select>
</td>

<td>
<input value="${t.notes || ""}" ${editMode ? "" : "disabled"}>
</td>

<td>
<button class="btn green" onclick="sendOne(${i})">Send</button>
</td>

</tr>
`

})

}

/* ================= SELECT ================= */

function toggleSelect(i,val){
trips[i].selected = val
}

function selectAll(){

document.querySelectorAll("input[type=checkbox]")
.forEach(c=>c.checked = true)

trips.forEach(t => t.selected = true)

}

/* ================= EDIT ================= */

function toggleEdit(){

editMode = !editMode

document.getElementById("editBtn").innerText =
editMode ? "Save" : "Edit"

renderTrips()

}

/* ================= SEND ================= */

function sendOne(i){
alert("Sent: " + trips[i].clientName)
}

function sendSelected(){

const selected = trips.filter(t => t.selected)

alert("Sending " + selected.length + " trips")

}

/* ================= START ================= */

setTimeout(()=>{
load()
},200)

</script>

</body>
</html>
