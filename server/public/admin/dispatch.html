<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dispatch – Sunbeam</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="dispatch.css">
<link rel="stylesheet" href="header.css">

</head>

<body>

<!-- HEADER -->
<div id="header"></div>


<!-- PAGE -->

<div class="page">

<h2 class="page-title">Dispatch Center</h2>


<!-- ACTION BAR -->

<div class="dispatch-bar">

<button onclick="selectAll()">
Select All
</button>

<button onclick="removeAll()">
Remove All
</button>

<button onclick="Engine.sendSelected()">
Send Selected
</button>

<button onclick="editSelected()">
Edit Selected
</button>

<button onclick="Engine.saveDrivers()">
Save
</button>

</div>


<!-- TABLE -->

<div class="table-wrapper">

<table class="dispatch-table">

<thead>

<tr>

<th>Select</th>
<th>Trip #</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Send</th>

</tr>

</thead>

<tbody id="dispatchBody">

<tr>
<td colspan="11" style="text-align:center;padding:40px">
Loading trips...
</td>
</tr>

</tbody>

</table>

</div>

</div>



<!-- SCRIPTS -->

<script src="header.js"></script>

<script src="dispatch.store.js"></script>
<script src="dispatch.engine.js"></script>
<script src="dispatch.ui.js"></script>

<script>

Engine.load()

function selectAll(){

document.querySelectorAll(".tripSelect")
.forEach(c=>c.checked=true)

}

function removeAll(){

document.querySelectorAll(".tripSelect")
.forEach(c=>c.checked=false)

}

function editSelected(){

const rows=document.querySelectorAll(".tripSelect:checked")

rows.forEach(chk=>{

const row=chk.closest("tr")

const cell=row.querySelector(".driverCell")

const current=cell.innerText

cell.innerHTML=`
<select class="driverEdit">

${Engine.drivers.map(d=>`
<option value="${d._id}"
${d.name===current?"selected":""}>
${d.name}
</option>
`).join("")}

</select>
`

})

}

</script>


</body>
</html>
