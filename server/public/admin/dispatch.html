<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
.page-body{
  padding:15px 20px;
  background:#f1f5f9;
  min-height:calc(100vh - 80px);
}

.dispatch-tabs{
  display:flex;
  margin-bottom:8px;
  gap:8px;
}

.tab-btn{
  flex:1;
  padding:14px;
  border:none;
  background:#1e293b;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  border-radius:8px;
  transition:.2s;
}

.tab-btn.active{
  background:#2563eb;
}

.top-actions{
  margin:12px 0;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  padding:9px 13px;
  border:none;
  color:#fff;
  cursor:pointer;
  border-radius:7px;
  font-weight:bold;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-1px);
}

.blue{background:#2563eb}
.orange{background:#f97316}
.green{background:#16a34a}
.purple{background:#7c3aed}
.gray{background:#475569}
.red{background:#dc2626}

.table-wrap{
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 18px rgba(15,23,42,.08);
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th{
  background:#1e293b;
  color:#fff;
  padding:10px 8px;
  font-size:12px;
  text-align:left;
  white-space:nowrap;
}

td{
  border:1px solid #e5e7eb;
  padding:8px 7px;
  font-size:12px;
  vertical-align:top;
}

tbody tr:hover{
  background:#f8fafc;
}

.trip-urgent{
  background:#fef2f2;
}

.trip-soon{
  background:#fffbeb;
}

.tab-page{display:none}
.tab-page.active{display:block}

.drivers-layout{
  display:flex;
  height:80vh;
  gap:10px;
}

#map{
  width:70%;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 18px rgba(15,23,42,.08);
}

#driversPanel{
  width:30%;
  background:#0f172a;
  color:#fff;
  overflow:auto;
  border-radius:10px;
  box-shadow:0 4px 18px rgba(15,23,42,.12);
}

.panel-header{
  position:sticky;
  top:0;
  background:#111827;
  padding:12px;
  font-weight:bold;
  border-bottom:1px solid #1f2937;
  z-index:2;
}

.driver{
  padding:12px;
  border-bottom:1px solid #1e293b;
  cursor:pointer;
  pointer-events:auto;
  transition:.2s;
}

.driver:hover{
  background:#1e293b;
}

.driver.active{
  background:linear-gradient(90deg,#2563eb,#1d4ed8) !important;
  color:#fff;
}

.driver.active .driver-name{
  color:#facc15;
}

.driver-bar{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  font-size:13px;
}

.driver-name{
  font-weight:bold;
  min-width:0;
}

.driver-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:6px;
}

.driver-info{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
  font-size:12px;
}

.driver-meta{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  justify-content:flex-end;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:3px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  white-space:nowrap;
}

.badge-available{
  background:#166534;
  color:#ecfdf5;
}

.badge-busy{
  background:#991b1b;
  color:#fef2f2;
}

.badge-trip{
  background:#1d4ed8;
  color:#eff6ff;
}

.badge-count{
  background:#334155;
  color:#e2e8f0;
}

.driver-marker div{
  box-shadow:0 0 6px rgba(0,0,0,0.5);
}

.stop-list{
  line-height:1.45;
}

.notes-cell{
  min-width:120px;
  white-space:pre-wrap;
}

.send-btn{
  min-width:70px;
}

.select-btn{
  min-width:76px;
}

select{
  padding:6px;
  border:1px solid #d1d5db;
  border-radius:6px;
  background:#fff;
  min-width:140px;
}

select:disabled{
  background:#f3f4f6;
  color:#6b7280;
}

#toast{
  position:fixed;
  right:18px;
  bottom:18px;
  background:#111827;
  color:#fff;
  padding:12px 16px;
  border-radius:10px;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  opacity:0;
  pointer-events:none;
  transform:translateY(10px);
  transition:.2s;
  z-index:9999;
  font-weight:700;
}

#toast.show{
  opacity:1;
  transform:translateY(0);
}

.small-muted{
  color:#94a3b8;
  font-size:11px;
}
</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

  <div class="dispatch-tabs">
    <button id="tabTrips" class="tab-btn active">Trips</button>
    <button id="tabDrivers" class="tab-btn">Drivers Map</button>
  </div>

  <!-- TRIPS -->
  <div id="tripsPage" class="tab-page active">

    <div class="top-actions">
      <button id="selectBtn" class="btn blue" onclick="toggleSelect()">Select All</button>
      <button id="editBtn" class="btn orange" onclick="toggleEdit()">Edit Selected</button>
      <button class="btn green" onclick="sendSelected()">Send Selected</button>
      <button class="btn purple" onclick="redistribute()">Redistribute</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Select</th>
            <th>#</th>
            <th>Client</th>
            <th>Pickup</th>
            <th>Stops</th>
            <th>Dropoff</th>
            <th>Date</th>
            <th>Time</th>
            <th>Driver</th>
            <th>Car</th>
            <th>Notes</th>
            <th>Send</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

  </div>

  <!-- DRIVERS -->
  <div id="driversPage" class="tab-page">
    <div class="drivers-layout">
      <div id="map"></div>
      <div id="driversPanel">
        <div class="panel-header">Drivers Dispatch Panel</div>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script src="/admin/header.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
/* ================= STATE ================= */

let trips = []
let drivers = []
let schedule = {}
let map = null
let markers = []
let geoCache = {}
let editMode = false
let allSelected = false
let selectedDriverId = null

/* ================= STORE ================= */

const Store = {
  API: "/api/dispatch",
  async load(){
    try{
      const res = await fetch(this.API)
      return await res.json()
    }catch(e){
      console.log("API ERROR", e)
      return { trips: [], drivers: [], schedule: {} }
    }
  }
}

/* ================= INIT ================= */

async function init(){
  const data = await Store.load()

  drivers = (data.drivers || []).map(d => ({
    ...d,
    _id: String(d._id)
  }))

  trips = (data.trips || []).map(t => ({
    ...t,
    selected: false,
    driverId: t.driverId ? String(t.driverId) : ""
  }))

  schedule = data.schedule || {}

  renderTrips()
  initMap()
  renderDrivers()
}

/* ================= HELPERS ================= */

function showToast(msg){
  const toast = document.getElementById("toast")
  toast.textContent = msg
  toast.classList.add("show")
  clearTimeout(showToast._timer)
  showToast._timer = setTimeout(()=>toast.classList.remove("show"), 1800)
}

function getStops(t){
  if (Array.isArray(t.stops)) return t.stops.filter(Boolean)
  if (Array.isArray(t.stopAddresses)) return t.stopAddresses.filter(Boolean)
  if (Array.isArray(t.extraStops)) return t.extraStops.filter(Boolean)
  if (typeof t.stop === "string" && t.stop.trim()) return [t.stop.trim()]
  return []
}

function getDriverCar(id){
  const s = schedule[id]
  if (!s) return ""
  return s.carNumber || s.vehicleNumber || s.car || ""
}

function escapeHtml(value){
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
}

function syncSelectButtonText(){
  const selectedCount = trips.filter(t => t.selected).length
  const btn = document.getElementById("selectBtn")
  if(!btn) return

  if(trips.length && selectedCount === trips.length){
    allSelected = true
    btn.innerText = "Remove All"
  }else{
    allSelected = false
    btn.innerText = "Select All"
  }
}

function getTripDateTimeValue(t){
  const raw = `${t.tripDate || ""} ${t.tripTime || ""}`.trim()
  const d = new Date(raw)
  if (isNaN(d.getTime())) return 0
  return d.getTime()
}

function getLatestTripForDriver(driverId){
  const driverTrips = trips.filter(t => String(t.driverId || "") === String(driverId))
  if(!driverTrips.length) return null
  driverTrips.sort((a,b)=> getTripDateTimeValue(b) - getTripDateTimeValue(a))
  return driverTrips[0]
}

function getDriverTripsCount(driverId){
  return trips.filter(t => String(t.driverId || "") === String(driverId)).length
}

function getDriverStatus(driverId){
  return getDriverTripsCount(driverId) > 0 ? "Busy" : "Available"
}

function getTripRowClass(t){
  const ts = getTripDateTimeValue(t)
  if(!ts) return ""

  const diffMin = Math.round((ts - Date.now()) / 60000)

  if(diffMin <= 30) return "trip-urgent"
  if(diffMin <= 90) return "trip-soon"
  return ""
}

/* ================= RENDER TRIPS ================= */

function renderTrips(){
  const body = document.getElementById("tbody")
  body.innerHTML = ""

  trips.forEach((t, i) => {
    const stops = getStops(t)
    const rowClass = getTripRowClass(t)

    body.innerHTML += `
      <tr class="${rowClass}">
        <td>
          <button class="btn ${t.selected ? 'green' : 'blue'} select-btn" onclick="toggleTrip(${i})">
            ${t.selected ? '✔' : 'Select'}
          </button>
        </td>

        <td>${escapeHtml(t.tripNumber || i + 1)}</td>
        <td>${escapeHtml(t.clientName || "")}</td>
        <td>${escapeHtml(t.pickup || "")}</td>

        <td class="stop-list">
          ${stops.length ? stops.map(s => escapeHtml(s)).join("<br>") : "-"}
        </td>

        <td>${escapeHtml(t.dropoff || "")}</td>
        <td>${escapeHtml(t.tripDate || "")}</td>
        <td>${escapeHtml(t.tripTime || "")}</td>

        <td>
          <select ${(editMode && t.selected) ? "" : "disabled"} onchange="assignDriver(${i},this.value)">
            <option value="">--</option>
            ${drivers.map(d => `
              <option value="${d._id}" ${String(t.driverId || "") === String(d._id) ? 'selected' : ''}>
                ${escapeHtml(d.name || "")}
              </option>
            `).join("")}
          </select>
        </td>

        <td id="car-${i}">${escapeHtml(t.vehicle || "")}</td>
        <td class="notes-cell">${escapeHtml(t.notes || "")}</td>

        <td>
          <button class="btn green send-btn" onclick="sendOne(${i})">Send</button>
        </td>
      </tr>
    `
  })

  syncSelectButtonText()
}

/* ================= MAP ================= */

function initMap(){
  map = L.map('map').setView([33.4484, -112.0740], 10)

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
  }).addTo(map)

  setTimeout(() => map.invalidateSize(), 300)
}

function clearMap(){
  markers.forEach(m => {
    try{ map.removeLayer(m) }catch(e){}
  })
  markers = []
}

/* ================= GEO ================= */

async function geocode(addr){
  if(!addr) return null
  if(geoCache[addr]) return geoCache[addr]

  try{
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`)
    const data = await res.json()

    if(!data.length) return null

    const point = {
      lat: parseFloat(data[0].lat),
      lng: parseFloat(data[0].lon)
    }

    geoCache[addr] = point
    return point
  }catch(e){
    console.log("GEOCODE ERROR", e)
    return null
  }
}

/* ================= ROUTE ================= */

async function getRoute(points){
  if(points.length < 2) return null

  try{
    const coords = points.map(p => `${p.lng},${p.lat}`).join(";")
    const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`)
    const data = await res.json()

    if(!data.routes || !data.routes.length) return null

    const r = data.routes[0]

    return {
      coords: r.geometry.coordinates.map(c => [c[1], c[0]]),
      distance: (r.distance / 1609.34).toFixed(1),
      duration: Math.round(r.duration / 60)
    }
  }catch(e){
    console.log("ROUTE ERROR", e)
    return null
  }
}

/* ================= DRIVER CLICK ================= */

async function focusDriver(id){
  const trip = getLatestTripForDriver(id)
  if(!trip) return

  clearMap()

  const stops = getStops(trip)
  const points = []

  const pickup = await geocode(trip.pickup)
  if(pickup) points.push({ ...pickup, label: "Pickup" })

  for(const s of stops){
    const g = await geocode(s)
    if(g) points.push({ ...g, label: "Stop" })
  }

  const dropoff = await geocode(trip.dropoff)
  if(dropoff) points.push({ ...dropoff, label: "Dropoff" })

  if(points.length < 2) return

  const route = await getRoute(points)
  if(!route) return

  points.forEach((p, idx) => {
    const marker = L.marker([p.lat, p.lng]).addTo(map).bindPopup(
      idx === 0
        ? "Pickup"
        : idx === points.length - 1
          ? "Dropoff"
          : `Stop ${idx}`
    )
    markers.push(marker)
  })

  const line = L.polyline(route.coords, { color: 'blue', weight: 5 }).addTo(map)
  markers.push(line)

  line.bindPopup(`
    <b>Distance:</b> ${route.distance} miles<br>
    <b>ETA:</b> ${route.duration} min<br>
    <b>Trip:</b> ${escapeHtml(trip.tripNumber || "-")}
  `).openPopup()

  map.fitBounds(line.getBounds(), { padding: [40, 40] })
}

/* ================= DRIVERS PANEL ================= */

function renderDrivers(){
  const panel = document.getElementById("driversPanel")
  panel.innerHTML = `<div class="panel-header">Drivers Dispatch Panel</div>`

  drivers.forEach((d, i) => {
    const car = getDriverCar(d._id)
    const trip = getLatestTripForDriver(d._id)
    const tripsCount = getDriverTripsCount(d._id)
    const status = getDriverStatus(d._id)
    const statusClass = status === "Busy" ? "badge-busy" : "badge-available"

    panel.innerHTML += `
      <div class="driver ${selectedDriverId === d._id ? 'active' : ''}" data-id="${d._id}">
        <div class="driver-bar">
          <div class="driver-name">${i + 1} - ${escapeHtml(d.name || "")}</div>

          <div class="driver-right">
            <div class="driver-info">
              <span>🚗 ${escapeHtml(car || "-")}</span>
              <span>📦 ${escapeHtml(trip ? (trip.tripNumber || "-") : "-")}</span>
            </div>

            <div class="driver-meta">
              <span class="badge ${statusClass}">${status}</span>
              <span class="badge badge-count">${tripsCount} Trip${tripsCount === 1 ? "" : "s"}</span>
              <span class="badge badge-trip">ETA Map</span>
            </div>
          </div>
        </div>
      </div>
    `
  })

  document.querySelectorAll(".driver").forEach(el => {
    el.addEventListener("click", () => {
      selectedDriverId = el.dataset.id

      document.querySelectorAll(".driver").forEach(d => {
        d.classList.remove("active")
      })

      el.classList.add("active")
      focusDriver(el.dataset.id)
    })
  })
}

/* ================= ACTIONS ================= */

function toggleTrip(i){
  trips[i].selected = !trips[i].selected
  renderTrips()
}

function toggleSelect(){
  allSelected = !allSelected
  trips.forEach(t => t.selected = allSelected)
  renderTrips()
  showToast(allSelected ? "All trips selected" : "Selection cleared")
}

function toggleEdit(){
  editMode = !editMode
  document.getElementById("editBtn").innerText = editMode ? "Save" : "Edit Selected"
  renderTrips()
  showToast(editMode ? "Edit mode enabled" : "Changes saved")
}

function assignDriver(i, id){
  const d = drivers.find(x => x._id === id)
  if(!d) return

  trips[i].driverId = id
  trips[i].vehicle = getDriverCar(id)

  const carCell = document.getElementById(`car-${i}`)
  if(carCell){
    carCell.innerText = trips[i].vehicle || ""
  }

  renderDrivers()
  showToast("Driver updated")
}

function sendSelected(){
  const selected = trips.filter(t => t.selected)
  console.log("SEND SELECTED", selected)
  showToast(`${selected.length} selected trip(s) ready`)
}

function sendOne(i){
  console.log("SEND ONE", trips[i])
  showToast(`Trip ${trips[i].tripNumber || i + 1} ready`)
}

function redistribute(){
  const selected = trips.filter(t => t.selected)
  if(!selected.length || !drivers.length) return

  selected.forEach((t, i) => {
    const d = drivers[i % drivers.length]
    t.driverId = d._id
    t.vehicle = getDriverCar(d._id)
  })

  renderTrips()
  renderDrivers()
  showToast("Trips redistributed")
}

/* ================= TABS ================= */

document.getElementById("tabTrips").onclick = () => {
  document.getElementById("tripsPage").classList.add("active")
  document.getElementById("driversPage").classList.remove("active")
  document.getElementById("tabTrips").classList.add("active")
  document.getElementById("tabDrivers").classList.remove("active")
}

document.getElementById("tabDrivers").onclick = () => {
  document.getElementById("tripsPage").classList.remove("active")
  document.getElementById("driversPage").classList.add("active")
  document.getElementById("tabTrips").classList.remove("active")
  document.getElementById("tabDrivers").classList.add("active")
  setTimeout(() => map.invalidateSize(), 300)
}

/* ================= GLOBAL ================= */

window.toggleTrip = toggleTrip
window.toggleSelect = toggleSelect
window.toggleEdit = toggleEdit
window.assignDriver = assignDriver
window.sendSelected = sendSelected
window.sendOne = sendOne
window.redistribute = redistribute
window.focusDriver = focusDriver

/* ================= START ================= */

init()
</script>

</body>
</html>
