<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dispatch</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- MAIN STYLE -->
<link rel="stylesheet" href="/admin/style.css">

</head>

<body>

<!-- HEADER -->
<div id="adminHeader"></div>

<!-- PAGE -->
<div class="page-container">

<!-- 🔥 ACTION BUTTONS -->
<div class="top-actions">

<button onclick="Engine.redistributeSelected()" class="btn-blue">
Redistribute Selected
</button>

<button id="editBtn" onclick="UI.toggleEdit()" class="btn-orange">
Manual Edit
</button>

<button onclick="Engine.load()" class="btn-purple">
Save Changes
</button>

<button onclick="Engine.sendSelected()" class="btn-green">
Send Selected
</button>

</div>

<!-- 🔥 GRID -->
<div class="dispatch-grid">

<!-- MAP -->
<div class="card">

<div class="card-header">
Live Dispatch Map
</div>

<div id="dispatchMap" style="height:250px;"></div>

</div>

<!-- DRIVERS -->
<div class="card">

<div class="card-header">
Active Drivers
</div>

<div id="driversPanel"></div>

</div>

</div>

<!-- 🔥 TABLE -->
<div class="table-wrapper">

<table class="dispatch-table">

<thead>
<tr>

<th>Select</th>
<th>Trip #</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Notes</th>
<th>Driver</th>
<th>Vehicle</th>
<th>Send</th>

</tr>
</thead>

<tbody id="dispatchBody">

<!-- بيتم ملئه من JS -->

</tbody>

</table>

</div>

</div>

<!-- 🔥 HEADER LOAD -->
<script src="/admin/header.js"></script>

<!-- 🔥 SCRIPTS -->
<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.ui.js"></script>
<script src="/admin/dispatch.engine.js"></script>

</body>
</html>
