<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dispatch System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">
<link rel="stylesheet" href="/admin/header.css">

<style>

body{
  margin:0;
  font-family:'Segoe UI',Arial;
  background:#f3f4f6;
}

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.page-body{
  max-width:1400px;
  margin:auto;
  padding:200px 20px 40px;
}

/* BUTTONS */
.top-actions{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.btn{
  border:none;
  padding:8px 14px;
  border-radius:6px;
  color:#fff;
  font-size:13px;
  cursor:pointer;
}

.btn-orange{background:#f59e0b;}
.btn-purple{background:#7c3aed;}
.btn-green{background:#16a34a;}

/* DRIVERS */
.drivers-box{
  background:#fff;
  border-radius:8px;
  margin-bottom:10px;
}

.box-title{
  background:#1e293b;
  color:#fff;
  padding:8px;
}

#driversPanel{
  padding:10px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th{
  background:#1e293b;
  color:#fff;
  padding:6px;
  font-size:12px;
}

td{
  border:1px solid #e5e7eb;
  padding:5px;
  font-size:11px;
  text-align:center;
}

.row-selected{
  background:#e0f2fe;
}

select{
  padding:3px;
  font-size:11px;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="top-actions">

<button onclick="UI.toggleEdit()" class="btn btn-orange">
Manual Edit
</button>

<button onclick="Engine.reload()" class="btn btn-purple">
Reload
</button>

<button onclick="Engine.sendSelected()" class="btn btn-green">
Send Selected
</button>

</div>

<div class="drivers-box">
<div class="box-title">Drivers</div>
<div id="driversPanel"></div>
</div>

<table>

<thead>
<tr>
<th>Select</th>
<th>Trip</th>
<th>Client</th>
<th>Pickup</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Action</th>
</tr>
</thead>

<tbody id="dispatchBody"></tbody>

</table>

</div>

<!-- 🔥 مهم -->
<script src="/admin/header.js"></script>
<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatchengine.js"></script>

<script>

/* ================= UI ================= */

const tbody = document.getElementById("dispatchBody")
const driversPanel = document.getElementById("driversPanel")

let editMode = false

const UI = {

  toggleEdit(){
    editMode = !editMode
    this.renderTrips(Engine.trips)
  },

  renderTrips(trips){

    if(!trips || !trips.length){
      tbody.innerHTML = `
      <tr>
        <td colspan="10" style="padding:20px">
          No Trips
        </td>
      </tr>`
      return
    }

    tbody.innerHTML = trips.map(t=>{

      const driverName = t.driverName || "-"
      const vehicle = t.vehicle || "-"

      return `
      <tr class="${t.selected?'row-selected':''}">

        <td>
          <input type="checkbox"
          ${t.selected?'checked':''}
          onchange="UI.selectTrip('${t._id}', this.checked)">
        </td>

        <td>${t.tripNumber||"-"}</td>
        <td>${t.clientName||"-"}</td>
        <td>${t.pickup||"-"}</td>
        <td>${t.dropoff||"-"}</td>
        <td>${t.tripDate||"-"}</td>
        <td>${t.tripTime||"-"}</td>

        <td>
          ${
            editMode && t.selected
            ? `
              <select onchange="UI.changeDriver('${t._id}', this.value)">
                <option value="">--</option>
                ${Engine.drivers.map(d=>`
                  <option value="${d._id}">
                    ${d.name}
                  </option>
                `).join("")}
              </select>
            `
            : driverName
          }
        </td>

        <td>🚗 ${vehicle}</td>

        <td>
          <button onclick="Engine.disableTrip('${t._id}')"
          style="background:#dc2626;color:#fff;border:none;padding:4px 8px;border-radius:4px;">
          Disable
          </button>
        </td>

      </tr>
      `

    }).join("")
  },

  renderDriversPanel(drivers){

    driversPanel.innerHTML = drivers.map(d=>{

      const vehicle = Engine.getDriverVehicleById(d._id)

      return `
      <div style="display:flex;justify-content:space-between;padding:6px;border-bottom:1px solid #eee;">
        <strong>${d.name}</strong>
        <span>🚗 ${vehicle}</span>
      </div>
      `
    }).join("")
  },

  selectTrip(id,val){

    const t = Engine.trips.find(x=>x._id==id)
    if(!t) return

    t.selected = val

    this.renderTrips(Engine.trips)
  },

  changeDriver(tripId, driverId){
    Engine.assignDriver(tripId, driverId)
  },

  getSelected(){
    return Engine.trips.filter(t=>t.selected).map(t=>t._id)
  }

}

/* ================= START ================= */

window.onload = ()=>{
  Engine.load()
}

</script>

</body>
</html>
