<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dispatch</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>
.page-body{
max-width:1400px;
margin:auto;
padding:200px 20px 40px;
}

.dispatch-top{
display:flex;
gap:10px;
margin-bottom:10px;
}

#dispatchMap{
flex:2;
height:300px;
}

#driversPanel{
flex:1;
background:#fff;
border:1px solid #ddd;
padding:10px;
overflow:auto;
}

.table-wrap{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
}

th{
background:#111827;
color:#fff;
padding:8px;
font-size:13px;
}

td{
border:1px solid #ddd;
padding:6px;
font-size:13px;
text-align:center;
}

button{
padding:5px 10px;
margin:2px;
cursor:pointer;
}
</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div>

<button onclick="Engine.autoAssign()">Redistribute</button>
<button onclick="Engine.toggleManual()">Manual Edit</button>
<button onclick="Engine.save()">Save Changes</button>

</div>

<div class="dispatch-top">

<div id="dispatchMap"></div>

<div id="driversPanel"></div>

</div>

<div class="table-wrap">

<table>

<thead>
<tr>

<th>Select</th>
<th>Trip #</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Notes</th>
<th>Driver</th>
<th>Vehicle</th>
<th>Send</th>

</tr>
</thead>

<tbody id="dispatchBody"></tbody>

</table>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.engine.js"></script>
<script src="/admin/dispatch.ui.js"></script>

<script>
loadAdminHeader()
Engine.load()
</script>

</body>
</html>
