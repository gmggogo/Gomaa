<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch</title>

<style>

/* ================= TABS ================= */
.dispatch-tabs{
  display:flex;
}

.tab-btn{
  flex:1;
  padding:14px;
  border:none;
  background:#0f172a;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.tab-btn.active{
  background:#2563eb;
}

.tab-page{ display:none; }
.tab-page.active{ display:block; }

/* ================= BUTTONS ================= */
.top-actions{
  margin:10px;
  display:flex;
  gap:10px;
}

.btn-blue{background:#2563eb;color:#fff;padding:8px;border:none}
.btn-orange{background:#f97316;color:#fff;padding:8px;border:none}
.btn-green{background:#16a34a;color:#fff;padding:8px;border:none}

/* ================= TABLE ================= */
.dispatch-table{
  width:100%;
  border-collapse:collapse;
}

.dispatch-table th{
  background:#1e293b;
  color:#fff;
  padding:8px;
}

.dispatch-table td{
  border:1px solid #ddd;
  padding:6px;
}

select:disabled{
  background:#e5e7eb;
}

/* ================= DRIVERS ================= */
.drivers-layout{
  display:flex;
  height:80vh;
}

#map{
  width:70%;
}

#driversPanel{
  width:30%;
  background:#0f172a;
  color:#fff;
  overflow:auto;
}

.driver-card{
  padding:10px;
  border-bottom:1px solid #1e293b;
}

</style>

</head>
<body>

<!-- ================= TABS ================= -->
<div class="dispatch-tabs">
  <button id="tabTrips" class="tab-btn active">Trips Schedule</button>
  <button id="tabDrivers" class="tab-btn">Drivers Map</button>
</div>

<!-- ================= TRIPS ================= -->
<div id="tripsPage" class="tab-page active">

  <div class="top-actions">
    <button onclick="selectAll()" class="btn-blue">Select All</button>
    <button onclick="toggleEdit()" class="btn-orange" id="editBtn">Edit</button>
    <button onclick="sendTrips()" class="btn-green">Send</button>
  </div>

  <table class="dispatch-table">
    <thead>
      <tr>
        <th>Select</th>
        <th>Trip ID</th>
        <th>Client</th>
        <th>Pickup</th>
        <th>Dropoff</th>
        <th>Stops</th>
        <th>Time</th>
        <th>Driver</th>
        <th>Car</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody id="tripsBody"></tbody>
  </table>

</div>

<!-- ================= DRIVERS ================= -->
<div id="driversPage" class="tab-page">

  <div class="drivers-layout">
    <div id="map"></div>
    <div id="driversPanel"></div>
  </div>

</div>

<!-- ================= JS ================= -->
<script>

let trips=[]
let drivers=[]
let editMode=false

/* ================= LOAD ================= */
async function load(){

const t=await fetch("/api/trips")
trips=await t.json()

const d=await fetch("/api/users/driver")
drivers=await d.json()

renderTrips()

}

/* ================= RENDER ================= */
function renderTrips(){

const body=document.getElementById("tripsBody")
body.innerHTML=""

trips.forEach(trip=>{

body.innerHTML+=`
<tr>
<td><input type="checkbox"></td>
<td>${trip.tripId||""}</td>
<td>${trip.client||""}</td>
<td>${trip.pickup||""}</td>
<td>${trip.dropoff||""}</td>
<td>${trip.stops||"-"}</td>
<td>${trip.tripTime||""}</td>

<td>
<select ${editMode?"":"disabled"}>
<option></option>
${drivers.map(d=>`
<option ${trip.driverId==d._id?"selected":""}>
${d.name}
</option>`).join("")}
</select>
</td>

<td>${trip.carNumber||"-"}</td>

<td><input value="${trip.notes||""}"></td>

</tr>
`

})

}

/* ================= ACTIONS ================= */
function selectAll(){
document.querySelectorAll("input[type=checkbox]")
.forEach(c=>c.checked=true)
}

function toggleEdit(){

editMode=!editMode

document.getElementById("editBtn").innerText=
editMode?"Save":"Edit"

renderTrips()

}

function sendTrips(){
alert("Sent ✅")
}

/* ================= TABS ================= */
document.getElementById("tabTrips").onclick=()=>{
document.getElementById("tripsPage").classList.add("active")
document.getElementById("driversPage").classList.remove("active")
}

document.getElementById("tabDrivers").onclick=()=>{
document.getElementById("tripsPage").classList.remove("active")
document.getElementById("driversPage").classList.add("active")
}

/* ================= START ================= */
load()

</script>

</body>
</html>
