<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Dispatch</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f1f5f9;
}

/* HEADER */

#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

/* PAGE */

.page-body{
padding-top:300px;
padding-left:20px;
padding-right:20px;
}

/* MOBILE HEADER SPACE */

@media (max-width:768px){

.page-body{
padding-top:360px;
padding-left:10px;
padding-right:10px;
}

}

/* TABLE */

.table-scroll{
width:100%;
overflow-x:auto;
}

.trip-table{
width:100%;
border-collapse:collapse;
background:white;
font-size:13px;
}

.trip-table th{
background:#0f172a;
color:white;
padding:8px;
text-align:center;
}

.trip-table td{
padding:6px;
border-bottom:1px solid #eee;
text-align:center;
}

/* BUTTONS */

.actions{
display:flex;
gap:6px;
justify-content:center;
align-items:center;
}

.btn{
border:none;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.btn-send{
background:#16a34a;
color:white;
}

.btn-remove{
background:#dc2626;
color:white;
}

.driverEdit{
width:100%;
border:1px solid #ddd;
padding:4px;
font-size:12px;
}

.dispatch-check:checked{
accent-color:#16a34a;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="table-scroll">

<table class="trip-table">

<thead>

<tr>
<th>Select</th>
<th>Trip #</th>
<th>Client</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Driver</th>
<th>Car</th>
<th>Send</th>
</tr>

</thead>

<tbody id="dispatchBody">

<tr>
<td colspan="11" style="text-align:center;padding:40px">
Loading trips...
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/dispatch.store.js"></script>
<script src="/admin/dispatch.engine.js"></script>
<script src="/admin/dispatch.ui.js"></script>

<script>

document.addEventListener("DOMContentLoaded",()=>{

Engine.load()

})

function selectAll(){
document.querySelectorAll(".tripSelect")
.forEach(c=>c.checked=true)
}

function removeAll(){
document.querySelectorAll(".tripSelect")
.forEach(c=>c.checked=false)
}

</script>

</body>
</html>
