<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>User Management</title>

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
margin:0;
font-family:Segoe UI,Arial,sans-serif;
background:#f1f5f9;
}

/* HEADER */

#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

/* PAGE */

.page-body{
padding-top:300px;
padding-left:20px;
padding-right:20px;
padding-bottom:40px;
max-width:1700px;
margin:auto;
}

/* MOBILE */

@media(max-width:768px){

.page-body{
padding-top:360px;
padding-left:10px;
padding-right:10px;
}

}

/* LAYOUT */

.layout{
display:grid;
grid-template-columns:260px 1fr;
gap:20px;
}

@media(max-width:1000px){

.layout{
grid-template-columns:1fr;
}

}

/* SIDEBAR */

.sidebar{
background:white;
border-radius:10px;
padding:20px;
border:1px solid #e2e8f0;
height:fit-content;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.sidebar-title{
font-size:20px;
font-weight:900;
margin-bottom:20px;
color:#0f172a;
}

.sidebar button{
width:100%;
border:none;
padding:14px;
margin-bottom:12px;
border-radius:10px;
font-size:14px;
font-weight:900;
cursor:pointer;
background:#e2e8f0;
color:#0f172a;
transition:.2s;
}

.sidebar button:hover{
opacity:.92;
transform:translateY(-1px);
}

.sidebar button.active{
background:#2563eb;
color:white;
}

/* CONTENT */

.content{
display:flex;
flex-direction:column;
gap:20px;
}

/* CARD */

.card{
background:white;
border-radius:10px;
padding:20px;
border:1px solid #e2e8f0;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

/* TITLE */

.page-title{
font-size:28px;
font-weight:900;
margin-bottom:5px;
color:#0f172a;
}

.page-subtitle{
font-size:14px;
color:#64748b;
margin-bottom:20px;
}

/* FORM */

.form-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.input-group{
display:flex;
flex-direction:column;
gap:8px;
}

.input-group label{
font-size:13px;
font-weight:800;
color:#334155;
}

.input-group input{
height:50px;
border:1px solid #dbe2ea;
border-radius:10px;
padding:0 14px;
font-size:14px;
outline:none;
}

/* SAVE BUTTON */

.save-btn{
margin-top:20px;
border:none;
background:#16a34a;
color:white;
padding:14px 22px;
border-radius:10px;
font-size:14px;
font-weight:900;
cursor:pointer;
transition:.2s;
}

.save-btn:hover{
opacity:.92;
transform:translateY(-1px);
}

/* TABLE */

.table-wrap{
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1200px;
}

th{
background:#0f172a;
color:white;
padding:14px;
font-size:13px;
text-align:left;
}

td{
padding:14px;
border-bottom:1px solid #e5e7eb;
font-size:13px;
font-weight:700;
vertical-align:top;
}

/* BUTTONS */

.actions{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.btn{
border:none;
padding:10px 14px;
border-radius:8px;
font-size:12px;
font-weight:900;
cursor:pointer;
transition:.2s;
}

.btn:hover{
transform:translateY(-1px);
}

.edit{
background:#dbeafe;
color:#1d4ed8;
}

.disable{
background:#fef3c7;
color:#92400e;
}

.delete{
background:#fee2e2;
color:#991b1b;
}

</style>

</head>

<body>

<!-- ADMIN HEADER -->
<div id="adminHeader"></div>

<!-- PAGE -->
<div class="page-body">

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="sidebar-title">
User Roles
</div>

<button
id="superadminBtn"
class="active"
onclick="changeRole('superadmin')">

Super Admins

</button>

<button
id="adminBtn"
onclick="changeRole('admin')">

Admins

</button>

<button
id="dispatcherBtn"
onclick="changeRole('dispatcher')">

Dispatchers

</button>

<button
id="driverBtn"
onclick="changeRole('driver')">

Drivers

</button>

<button
id="companyBtn"
onclick="changeRole('company')">

Companies

</button>

</div>

<!-- CONTENT -->
<div class="content">

<!-- FORM -->
<div class="card">

<div
class="page-title"
id="title">

Super Admins

</div>

<div class="page-subtitle">

Create, edit, disable, and manage users.

</div>

<div class="form-grid">

<!-- NAME -->
<div class="input-group">

<label>
Full Name
</label>

<input
type="text"
id="name"
placeholder="Enter full name"
>

</div>

<!-- USERNAME -->
<div class="input-group">

<label>
Username
</label>

<input
type="text"
id="username"
placeholder="Enter username"
>

</div>

<!-- EMAIL -->
<div class="input-group">

<label>
Email Address
</label>

<input
type="email"
id="email"
placeholder="Enter email address"
>

</div>

<!-- PHONE -->
<div class="input-group">

<label>
Phone Number
</label>

<input
type="tel"
id="phone"
placeholder="Enter phone number"
>

</div>

<!-- PASSWORD -->
<div class="input-group">

<label>
Password
</label>

<input
type="password"
id="password"
placeholder="Enter password"
>

</div>

</div>

<button
class="save-btn"
onclick="addUser()">

Save User

</button>

</div>

<!-- TABLE -->
<div class="card">

<div class="table-wrap">

<table>

<thead>

<tr>

<th>Name</th>
<th>Username</th>
<th>Email</th>
<th>Phone</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="table">

<tr>

<td colspan="6">
Loading...
</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

<!-- HEADER -->
<script src="/admin/header.js"></script>

<!-- PAGE -->
<script src="/admin/users.js"></script>

</body>
</html>
