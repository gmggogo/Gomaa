<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dispatch Add Trip</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:#f4f8fb;
  color:#111827;
  overflow-x:hidden;
}

#layoutHeader{
  position:sticky;
  top:0;
  z-index:1000;
  background:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.container{
  width:100%;
  max-width:1700px;
  margin:auto;
  padding:24px 14px;
}

/* TOP NAV */
.dispatch-nav{
  display:flex;
  gap:10px;
  margin-bottom:18px;
  background:#e2e8f0;
  padding:6px;
  border-radius:14px;
  flex-wrap:wrap;
}

.dispatch-nav button,
.tabs button,
button{
  padding:12px 22px;
  border:none;
  border-radius:10px;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
  transition:.2s;
}

button:hover{transform:translateY(-1px);}

.btn-blue{background:#2563eb;color:#fff;}
.btn-gray{background:#64748b;color:#fff;}
.btn-green{background:#22c55e;color:#000;}
.btn-light{background:#0ea5e9;color:#fff;}
.btn-orange{background:#f97316;color:#fff;}
.btn-red{background:#ef4444;color:#fff;}

/* SERVICE TABS */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  background:#e2e8f0;
  padding:6px;
  border-radius:14px;
  flex-wrap:wrap;
}

.tabs button{
  flex:1;
  min-width:120px;
}

/* SECTIONS */
section{
  background:#fff;
  padding:18px;
  border-radius:16px;
  margin-bottom:18px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
}

section h3{
  margin:0 0 14px;
  font-size:16px;
  font-weight:900;
  color:#0f172a;
}

/* FORMS */
.form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

input,
textarea,
select{
  width:100%;
  padding:12px;
  font-size:13px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  background:#fff;
  color:#111827;
}

input:focus,
textarea:focus,
select:focus{
  outline:none;
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,.15);
}

textarea{
  min-height:90px;
  margin-top:12px;
  resize:vertical;
}

.actions{
  display:flex;
  gap:12px;
  margin-top:12px;
  flex-wrap:wrap;
}

/* STOPS */
.stop-row{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.stop-row input{flex:1;}

.remove-stop-btn{
  background:#ef4444;
  color:#fff;
  border-radius:8px;
  padding:10px 14px;
  width:auto;
}

/* PASSENGERS */
.passenger-card{
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
}

.passenger-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

/* REVIEW */
#dispatchReviewPage{display:none;}

.review-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  margin-bottom:14px;
}

.review-title{
  font-size:22px;
  font-weight:900;
  color:#0f172a;
}

.table-wrap{
  width:100%;
  overflow-x:auto;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  background:#fff;
}

.review-table{
  width:100%;
  min-width:2100px;
  border-collapse:collapse;
  background:#fff;
}

.review-table th,
.review-table td{
  border:1px solid #e2e8f0;
  padding:7px;
  font-size:11px;
  text-align:center;
  vertical-align:top;
}

.review-table th{
  background:#0f172a;
  color:#fff;
  font-weight:900;
  white-space:nowrap;
}

.multi-line{
  white-space:pre-line;
  text-align:left;
  min-width:150px;
  max-width:240px;
  word-break:break-word;
}

.trip-number-badge{
  color:#2563eb;
  font-size:13px;
  font-weight:900;
  white-space:nowrap;
}

.price-badge{
  color:#15803d;
  font-size:13px;
  font-weight:900;
  white-space:nowrap;
}

.actions-wrap{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
  justify-content:center;
  min-width:180px;
}

.btn{
  border:none;
  padding:6px 9px;
  border-radius:6px;
  font-size:10px;
  font-weight:900;
  cursor:pointer;
  white-space:nowrap;
}

.btn.edit{background:#2563eb;color:#fff;}
.btn.delete{background:#dc2626;color:#fff;}
.btn.cancel{background:#ef4444;color:#fff;}
.btn.confirm{background:#16a34a;color:#fff;}

.scheduled-row{background:#fff;}
.confirmed-row{background:#dcfce7;}
.cancelled-row{background:#fecaca;}
.yellow{background:#fef9c3;}
.red-light{background:#fecaca;}
.red-mid{background:#fca5a5;}
.red-dark{background:#7f1d1d;color:#fff;}
.past-row{background:#374151;color:#f3f4f6;}

.empty-review{
  background:#fff;
  padding:22px;
  border-radius:14px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
  color:#64748b;
  font-weight:900;
  text-align:center;
}

@media(max-width:768px){
  .container{padding:16px 6px;}
  .form-grid{grid-template-columns:1fr;}
  .actions{flex-direction:column;}
  button{width:100%;}
  .stop-row{flex-direction:column;}
  .review-table{min-width:1500px;}
}
</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="container">


  <!-- ================= ADD PAGE ================= -->
  <div id="dispatchAddPage">

    <div class="tabs" id="companyTabs"></div>

    <!-- INDIVIDUAL -->
    <div id="individualSection">

      <section>
        <h3>Entry Information</h3>

        <div class="form-grid">
          <input id="entryName" placeholder="Data Entry Name" readonly>
          <input id="entryPhone" placeholder="Phone Number" readonly>
        </div>

        <div class="actions">
          <button class="btn-blue" id="editEntryBtn" type="button">Edit</button>
          <button class="btn-light" id="saveEntryBtn" type="button">Save Entry Info</button>
        </div>
      </section>

      <section>
        <h3>Client Information</h3>

        <div class="form-grid">
          <input id="clientName" placeholder="Client Name">
          <input id="clientPhone" placeholder="Client Phone">
        </div>
      </section>

      <section>
        <h3>Trip Details</h3>

        <div class="form-grid">
          <input id="pickup" placeholder="Pickup Address">
          <input id="tripDate" type="date">
        </div>

        <div id="stops" style="margin-top:12px;"></div>

        <div style="margin-top:10px;">
          <button class="btn-orange" id="addStopBtn" type="button">+ Add Stop</button>
        </div>

        <div class="form-grid" style="margin-top:12px;">
          <input id="dropoff" placeholder="Dropoff Address">
          <input id="tripTime" type="time">
        </div>

        <textarea id="notes" placeholder="Notes"></textarea>
      </section>

      <div class="actions">
        <button class="btn-gray" id="saveDraftBtn" type="button">Save Draft</button>
        <button class="btn-green" id="submitTrip" type="button">Submit Trip</button>
      </div>

    </div>

    <!-- SHARED -->
    <div id="sharedSection" style="display:none;">

      <section>
        <h3>Entry Information</h3>

        <div class="form-grid">
          <input id="sharedEntryName" placeholder="Data Entry Name" readonly>
          <input id="sharedEntryPhone" placeholder="Phone Number" readonly>
        </div>

        <div class="actions">
          <button class="btn-blue" id="editSharedEntryBtn" type="button">Edit</button>
        </div>
      </section>

      <section>
        <h3>Shared Setup</h3>

        <div class="form-grid">
          <select id="passengerCount">
            <option value="">Select Passengers</option>
            <option value="2">2 Passengers</option>
            <option value="3">3 Passengers</option>
            <option value="4">4 Passengers</option>
          </select>

          <input id="sharedDate" type="date">
          <input id="sharedTime" type="time">
        </div>
      </section>

      <section>
        <h3>Passengers</h3>
        <div id="passengersContainer"></div>
      </section>

      <section>
        <h3>Notes</h3>
        <textarea id="sharedNotes" placeholder="Notes"></textarea>
      </section>

      <div class="actions">
        <button class="btn-gray" id="saveSharedDraftBtn" type="button">Save Draft</button>
        <button class="btn-green" id="submitShared" type="button">Submit Shared</button>
      </div>

    </div>

  </div>

  <!-- ================= REVIEW PAGE ================= -->
  <div id="dispatchReviewPage">

    <section>
      <div class="review-head">
        <div class="review-title">Dispatch Review</div>

        <div class="actions">
          <button id="reviewBackToAddBtn" class="btn-orange" type="button">Back To Add Trip</button>
          <button id="submitAllToHubBtn" class="btn-green" type="button">Submit All To Trips Hub</button>
        </div>
      </div>

      <div id="dispatchTripsContainer"></div>
    </section>

  </div>

</div>

<script src="dispatch-add-trip.js"></script>
<script src="dispatch-pre-review.js"></script>

</body>
</html>
