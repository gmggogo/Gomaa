<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Dispatch Add Trip – Reserved RV</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>
*{
  box-sizing:border-box;
}

html,
body{
  width:100%;
  max-width:100%;
  margin:0;
  padding:0;
  overflow-x:hidden;
}

body{
  font-family:'Segoe UI',Arial,sans-serif;
  background:#f4f8fb;
  color:#111827;
}

/* ================= HEADER ================= */

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
}

/* ================= PAGE ================= */

.container{
  width:100%;
  max-width:100%;
  margin:0 auto;
  padding:115px 6px 24px;
}

.page-title{
  margin:0 0 14px;
  font-size:24px;
  font-weight:900;
  color:#0f172a;
  text-align:center;
}

.page-subtitle{
  margin:0 0 18px;
  font-size:13px;
  font-weight:800;
  color:#64748b;
  text-align:center;
}

/* ================= TOP ACTIONS ================= */

.dispatch-top-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.dispatch-top-actions button{
  flex:1;
  border:none;
  border-radius:8px;
  padding:12px;
  color:#fff;
  font-weight:900;
  cursor:pointer;
  min-width:160px;
}

/* ================= SERVICE TABS ================= */

.tabs,
#companyTabs{
  display:flex;
  gap:10px;
  margin-bottom:18px;
  background:#e2e8f0;
  padding:6px;
  border-radius:14px;
  overflow-x:auto;
}

.tabs button,
#companyTabs button{
  flex:1;
  min-width:120px;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:13px;
  font-weight:900;
  cursor:pointer;
  transition:.2s;
}

.btn-blue{
  background:#2563eb !important;
  color:#fff !important;
}

.btn-gray{
  background:#64748b !important;
  color:#fff !important;
}

.btn-orange{
  background:#f97316 !important;
  color:#fff !important;
}

.btn-green{
  background:#16a34a !important;
  color:#fff !important;
}

/* ================= FORM SECTIONS ================= */

.form-section{
  background:#fff;
  border:1px solid #dbe3ee;
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
  box-shadow:0 8px 22px rgba(15,23,42,.08);
}

.section-title{
  margin:0 0 14px;
  font-size:18px;
  font-weight:900;
  color:#0f172a;
  border-bottom:2px solid #e2e8f0;
  padding-bottom:10px;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}

.field-wrap{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field-wrap.full{
  grid-column:1 / -1;
}

.field-wrap label{
  font-size:12px;
  font-weight:900;
  color:#334155;
}

.field-wrap input,
.field-wrap textarea,
.field-wrap select{
  width:100%;
  padding:12px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  font-size:14px;
  font-weight:700;
  outline:none;
  background:#fff;
  color:#111827;
}

.field-wrap input:focus,
.field-wrap textarea:focus,
.field-wrap select:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,.15);
}

.field-wrap input[readonly]{
  background:#f1f5f9;
  color:#475569;
}

textarea{
  min-height:85px;
  resize:vertical;
}

/* ================= ENTRY ROW ================= */

.entry-row{
  display:grid;
  grid-template-columns:1fr 1fr auto auto;
  gap:10px;
  align-items:end;
  margin-bottom:14px;
}

.entry-row .field-wrap{
  margin:0;
}

/* ================= STOPS ================= */

#stops{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:8px;
}

.stop-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
}

.stop-row input{
  padding:11px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  font-size:14px;
  font-weight:700;
}

.remove-stop-btn{
  background:#dc2626;
  color:#fff;
  border:none;
  border-radius:10px;
  padding:0 12px;
  font-weight:900;
  cursor:pointer;
}

/* ================= PASSENGER CARDS ================= */

#passengersContainer{
  display:grid;
  gap:14px;
  margin-top:14px;
}

.passenger-card{
  background:#f8fafc;
  border:1px solid #cbd5e1;
  border-radius:16px;
  padding:14px;
}

.passenger-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  border-bottom:1px dashed #cbd5e1;
  padding-bottom:8px;
}

.passenger-header h4{
  margin:0;
  color:#2563eb;
  font-weight:900;
}

/* ================= ACTION BUTTONS ================= */

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}

.actions button,
.action-btn{
  border:none;
  border-radius:10px;
  padding:12px 18px;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
}

.primary-btn{
  background:#16a34a;
  color:#fff;
}

.secondary-btn{
  background:#64748b;
  color:#fff;
}

.warning-btn{
  background:#f97316;
  color:#fff;
}

.add-stop-btn{
  background:#7c3aed;
  color:#fff;
}

/* =====================================================
   REVIEW TABLE STYLE SAME AS COMPANY REVIEW
===================================================== */

.table-wrap{
  width:calc(100vw - 12px);
  overflow-x:auto;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  background:#fff;
  margin-top:12px;
}

.review-table{
  width:100%;
  min-width:2100px;
  border-collapse:collapse;
  background:#fff;
  table-layout:fixed;
  border-top:6px solid #000;
}

.review-table th,
.review-table td{
  border:1px solid #e2e8f0;
  padding:6px;
  font-size:11px;
  text-align:center;
  vertical-align:middle;
  line-height:1.25;
  box-sizing:border-box;
}

.review-table th{
  background:#0f172a;
  color:#fff;
  font-size:11px;
  font-weight:900;
  white-space:nowrap;
  position:sticky;
  top:0;
  z-index:5;
}

.date-row td{
  background:#bfdbfe!important;
  color:#1e3a8a!important;
  font-weight:900!important;
  text-align:center!important;
  padding:8px!important;
  font-size:13px!important;
  border-top:3px solid #000!important;
  border-bottom:2px solid #60a5fa!important;
}

.col-num{width:36px;}
.col-trip{width:105px;}
.col-type{width:75px;}
.col-service{width:95px;}
.col-entry{width:120px;}
.col-entry-phone{width:105px;}
.col-client{width:175px;}
.col-phone{width:115px;}
.col-pickup{width:230px;}
.col-stops{width:190px;}
.col-drop{width:230px;}
.col-date{width:95px;}
.col-time{width:70px;}
.col-notes{width:180px;}
.col-miles{width:80px;}
.col-mins{width:80px;}
.col-price{width:90px;}
.col-status{width:95px;}
.col-actions{width:210px;}

.cell-box{
  display:grid;
  border:1px solid #111;
  background:#fff;
  width:100%;
  box-sizing:border-box;
  border-radius:4px;
  overflow:hidden;
}

.cell-item{
  padding:4px 5px;
  min-height:23px;
  font-weight:800;
  white-space:normal;
  word-break:break-word;
  box-sizing:border-box;
  background:#fff;
  color:#111827;
  font-size:10.5px;
  line-height:1.35;
  text-align:left;
}

.cell-item + .cell-item{
  border-top:1px solid #111;
}

.trip-number-badge{
  color:#2563eb;
  font-size:12px;
  font-weight:900;
  white-space:normal;
  word-break:break-word;
}

.price-badge{
  color:#16a34a;
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
}

.miles-strong{
  color:#2563eb;
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
}

.route-locked-badge{
  display:inline-block;
  margin-top:4px;
  padding:3px 6px;
  border-radius:999px;
  background:#fef3c7;
  color:#92400e;
  border:1px solid #fcd34d;
  font-size:9px;
  font-weight:900;
}

.actions-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:4px;
  flex-wrap:wrap;
  min-width:180px;
}

.btn{
  border:none;
  padding:6px 9px;
  border-radius:6px;
  font-size:10px;
  font-weight:900;
  cursor:pointer;
  margin:2px;
  white-space:nowrap;
}

.btn.edit{background:#2563eb;color:#fff;}
.btn.delete{background:#111827;color:#fff;}
.btn.confirm{background:#16a34a;color:#fff;}
.btn.cancel{background:#dc2626;color:#fff;}
.btn.add-stop{background:#7c3aed;color:#fff;}

.scheduled-row{background:#fff;color:#111827;}
.review-row{background:#f8fafc;color:#111827;}
.confirmed-row{background:#dcfce7;color:#111827;}
.cancelled-row{background:#fecaca;color:#111827;}
.yellow{background:#fef9c3;color:#111827;}
.red-light{background:#fecaca;color:#111827;}
.red-mid{background:#fca5a5;color:#111827;}
.red-dark{background:#7f1d1d;color:#fff;}
.past-row{background:#374151;color:#f3f4f6;}

.edit-input{
  width:100%;
  min-width:120px;
  padding:7px;
  border:1px solid #94a3b8;
  border-radius:6px;
  font-size:12px;
  background:#fff;
  color:#111827;
  outline:none;
  margin-bottom:4px;
}

.dispatch-review-note{
  background:#eff6ff;
  border:1px solid #bfdbfe;
  color:#1e3a8a;
  padding:10px;
  border-radius:12px;
  font-weight:900;
  margin-bottom:10px;
}

.table-wrap::-webkit-scrollbar{
  height:10px;
}

.table-wrap::-webkit-scrollbar-thumb{
  background:#94a3b8;
  border-radius:10px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .container{
    padding:100px 6px 18px;
  }

  .page-title{
    font-size:20px;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

  .entry-row{
    grid-template-columns:1fr;
  }

  .actions button,
  .action-btn{
    width:100%;
  }

  .review-table{
    min-width:1800px;
  }

  .review-table th,
  .review-table td{
    padding:5px;
    font-size:10px;
  }

  .cell-item{
    font-size:9.5px;
  }

  .btn{
    font-size:9px;
    padding:5px 7px;
  }

}
</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="container">

  <h1 class="page-title">Dispatch Add Trip</h1>
  <p class="page-subtitle">
    Reserved Trips • Add Trip creates RV Trip Number immediately • Review uses same table style as company review
  </p>

  <!-- SERVICE TABS -->
  <div id="companyTabs" class="tabs"></div>

  <!-- ================= INDIVIDUAL RESERVED TRIP ================= -->
  <section id="individualSection" class="form-section">

    <h2 class="section-title">Reserved Trip</h2>

    <!-- ENTRY INFO -->
    <div class="entry-row">

      <div class="field-wrap">
        <label>Entry Name</label>
        <input id="entryName" type="text" placeholder="Entry name" readonly>
      </div>

      <div class="field-wrap">
        <label>Entry Phone</label>
        <input id="entryPhone" type="text" placeholder="Entry phone" readonly>
      </div>

      <button id="editEntryBtn" type="button" class="action-btn secondary-btn">
        Edit
      </button>

      <button id="saveEntryBtn" type="button" class="action-btn primary-btn">
        Save
      </button>

    </div>

    <div class="form-grid">

      <div class="field-wrap">
        <label>Client Name</label>
        <input id="clientName" type="text" placeholder="Client name">
      </div>

      <div class="field-wrap">
        <label>Client Phone</label>
        <input id="clientPhone" type="text" placeholder="Client phone">
      </div>

      <div class="field-wrap full">
        <label>Pickup Address</label>
        <input id="pickup" type="text" placeholder="Pickup address">
      </div>

      <div class="field-wrap full">
        <label>Dropoff Address</label>
        <input id="dropoff" type="text" placeholder="Dropoff address">
      </div>

      <div class="field-wrap">
        <label>Trip Date</label>
        <input id="tripDate" type="date">
      </div>

      <div class="field-wrap">
        <label>Trip Time</label>
        <input id="tripTime" type="time">
      </div>

      <div class="field-wrap full">
        <label>Notes</label>
        <textarea id="notes" placeholder="Trip notes"></textarea>
      </div>

    </div>

    <div class="actions">
      <button id="addStopBtn" type="button" class="action-btn add-stop-btn">
        Add Stop
      </button>

      <button id="saveDraftBtn" type="button" class="action-btn secondary-btn">
        Save Draft
      </button>

      <button id="submitTrip" type="button" class="action-btn primary-btn">
        Add To Review
      </button>
    </div>

    <div id="stops"></div>

  </section>

  <!-- ================= SHARED RESERVED TRIP ================= -->
  <section id="sharedSection" class="form-section" style="display:none;">

    <h2 class="section-title">Reserved Shared Trip</h2>

    <!-- SHARED ENTRY INFO -->
    <div class="entry-row">

      <div class="field-wrap">
        <label>Entry Name</label>
        <input id="sharedEntryName" type="text" placeholder="Entry name" readonly>
      </div>

      <div class="field-wrap">
        <label>Entry Phone</label>
        <input id="sharedEntryPhone" type="text" placeholder="Entry phone" readonly>
      </div>

      <button id="editSharedEntryBtn" type="button" class="action-btn secondary-btn">
        Edit
      </button>

      <button type="button" class="action-btn primary-btn" onclick="document.getElementById('saveEntryBtn')?.click()">
        Save
      </button>

    </div>

    <div class="form-grid">

      <div class="field-wrap">
        <label>Passenger Count</label>
        <select id="passengerCount">
          <option value="">Select</option>
          <option value="2">2 Passengers</option>
          <option value="3">3 Passengers</option>
          <option value="4">4 Passengers</option>
        </select>
      </div>

      <div class="field-wrap">
        <label>Trip Date</label>
        <input id="sharedDate" type="date">
      </div>

      <div class="field-wrap">
        <label>Trip Time</label>
        <input id="sharedTime" type="time">
      </div>

      <div class="field-wrap full">
        <label>Shared Notes</label>
        <textarea id="sharedNotes" placeholder="Shared trip notes"></textarea>
      </div>

    </div>

    <div id="passengersContainer"></div>

    <div class="actions">
      <button id="saveSharedDraftBtn" type="button" class="action-btn secondary-btn">
        Save Shared Draft
      </button>

      <button id="submitShared" type="button" class="action-btn primary-btn">
        Add Shared To Review
      </button>
    </div>

  </section>

  <!-- DISPATCH REVIEW PAGE WILL BE CREATED BY JS -->
  <!-- id="dispatchReviewPage" and id="dispatchReviewList" are injected from dispatch-add-trip.js -->

</div>

<script src="/admin/header.js"></script>
<script src="/admin/dispatch-add-trip.js"></script>

</body>
</html>
