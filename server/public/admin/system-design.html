<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
System Design
</title>

<link rel="stylesheet" href="style.css">

<style>

/* =========================
BODY
========================= */

body{
  margin:0;
  background:#f1f5f9;
  font-family:'Segoe UI',sans-serif;
  color:#0f172a;
}

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
}

/* =========================
PAGE
========================= */

.page-body{
  max-width:1900px;
  margin:auto;
  padding:260px 22px 80px;
}

@media(max-width:768px){

  .page-body{
    padding-top:320px;
    padding-left:12px;
    padding-right:12px;
  }

}

/* =========================
TITLE
========================= */

.page-title{
  font-size:38px;
  font-weight:900;
  margin-bottom:30px;
}

/* =========================
SECTION
========================= */

.section-box{

  background:#fff;

  border-radius:28px;

  padding:26px;

  margin-bottom:28px;

  box-shadow:
  0 12px 35px rgba(0,0,0,.08);

}

.section-title{

  font-size:26px;

  font-weight:900;

  margin-bottom:22px;

}

/* =========================
GRID
========================= */

.form-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(320px,1fr));

  gap:20px;

}

/* =========================
INPUT GROUP
========================= */

.input-group{

  display:flex;

  flex-direction:column;

  gap:8px;

}

.input-group label{

  font-size:14px;

  font-weight:800;

  color:#475569;

}

.input-group input,
.input-group textarea,
.input-group select{

  width:100%;

  border:1px solid #cbd5e1;

  border-radius:18px;

  padding:15px;

  font-size:15px;

  background:#fff;

  outline:none;

}

.input-group textarea{

  min-height:120px;

  resize:vertical;

}

/* =========================
PREVIEW
========================= */

.preview-image{

  width:100%;

  height:180px;

  object-fit:cover;

  border-radius:20px;

  background:#e2e8f0;

  border:2px dashed #cbd5e1;

}

/* =========================
BUTTONS
========================= */

.upload-btn,
.save-btn,
.reset-btn,
.disable-btn{

  border:none;

  border-radius:18px;

  padding:15px;

  font-size:15px;

  font-weight:900;

  cursor:pointer;

  color:#fff;

}

.upload-btn{
  background:#145cff;
}

.save-btn{
  background:#16a34a;
}

.reset-btn{
  background:#dc2626;
}

.disable-btn{
  background:#64748b;
}

.bottom-buttons{

  display:flex;

  gap:14px;

  margin-top:25px;

  flex-wrap:wrap;

}

/* =========================
TOGGLE
========================= */

.toggle-row{

  display:flex;

  align-items:center;

  gap:10px;

  margin-top:10px;

  font-size:14px;

  font-weight:700;

}

/* =========================
CARDS
========================= */

.cards-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(360px,1fr));

  gap:24px;

}

.service-card{

  border:1px solid #e2e8f0;

  border-radius:24px;

  padding:20px;

  background:#fff;

}

.service-top{

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:14px;

  margin-bottom:18px;

}

.service-title{

  font-size:22px;

  font-weight:900;

}

.card-save{
  width:100%;
  margin-top:18px;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

  .page-title{
    font-size:30px;
  }

  .section-title{
    font-size:22px;
  }

  .cards-grid{
    grid-template-columns:1fr;
  }

  .service-top{
    flex-direction:column;
    align-items:stretch;
  }

}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

  <div class="page-title">
    System Design
  </div>

  <!-- =========================
       BRANDING
  ========================== -->

  <div class="section-box">

    <div class="section-title">
      Branding
    </div>

    <div class="form-grid">

      <div class="input-group">

        <label>
          Company Name
        </label>

        <input
          type="text"
          id="companyNameInput"
        >

      </div>

      <div class="input-group">

        <label>
          Timezone
        </label>

        <select id="timezoneInput">

          <option value="America/Phoenix">
            Arizona / Phoenix
          </option>

          <option value="America/New_York">
            New York
          </option>

          <option value="America/Chicago">
            Chicago
          </option>

        </select>

      </div>

    </div>

  </div>

  <!-- =========================
       HOMEPAGE
  ========================== -->

  <div class="section-box">

    <div class="section-title">
      Homepage
    </div>

    <div class="form-grid">

      <div class="input-group">

        <label>
          About Title
        </label>

        <input
          type="text"
          id="aboutTitleInput"
        >

      </div>

      <div class="input-group">

        <label>
          About Text
        </label>

        <textarea
          id="aboutTextInput"
        ></textarea>

      </div>

      <div class="input-group">

        <label>
          Quote Title
        </label>

        <input
          type="text"
          id="quoteTitleInput"
        >

      </div>

      <div class="input-group">

        <label>
          Quote Text
        </label>

        <textarea
          id="quoteTextInput"
        ></textarea>

      </div>

    </div>

  </div>

  <!-- =========================
       EXTRA BOXES
  ========================== -->

  <div class="section-box">

    <div class="section-title">
      Extra Boxes
    </div>

    <div class="form-grid">

      <div class="input-group">

        <label>
          Extra Box 1 Title
        </label>

        <input
          type="text"
          id="extra1Title"
        >

      </div>

      <div class="input-group">

        <label>
          Extra Box 1 Text
        </label>

        <textarea
          id="extra1Text"
        ></textarea>

      </div>

      <div class="input-group">

        <label>
          Extra Box 2 Title
        </label>

        <input
          type="text"
          id="extra2Title"
        >

      </div>

      <div class="input-group">

        <label>
          Extra Box 2 Text
        </label>

        <textarea
          id="extra2Text"
        ></textarea>

      </div>

    </div>

    <!-- =========================
         THEME ENGINE
    ========================== -->

    <div class="section-title" style="margin-top:40px;">
      Extra Boxes Theme Engine
    </div>

    <div class="form-grid">

      <div class="input-group">

        <label>
          Box Background
        </label>

        <input
          type="color"
          id="extraBoxBg"
        >

      </div>

      <div class="input-group">

        <label>
          Border Color
        </label>

        <input
          type="color"
          id="extraBoxBorder"
        >

      </div>

      <div class="input-group">

        <label>
          Title Color
        </label>

        <input
          type="color"
          id="extraBoxTitleColor"
        >

      </div>

      <div class="input-group">

        <label>
          Text Color
        </label>

        <input
          type="color"
          id="extraBoxTextColor"
        >

      </div>

      <div class="input-group">

        <label>
          Border Radius
        </label>

        <input
          type="number"
          id="extraBoxRadius"
        >

      </div>

      <div class="input-group">

        <label>
          Padding
        </label>

        <input
          type="number"
          id="extraBoxPadding"
        >

      </div>

      <div class="input-group">

        <label>
          Title Size
        </label>

        <input
          type="number"
          id="extraBoxTitleSize"
        >

      </div>

      <div class="input-group">

        <label>
          Text Size
        </label>

        <input
          type="number"
          id="extraBoxTextSize"
        >

      </div>

      <div class="input-group">

        <label>
          Border Size
        </label>

        <input
          type="number"
          id="extraBoxBorderSize"
        >

      </div>

      <div class="input-group">

        <label>
          Text Align
        </label>

        <select id="extraBoxAlign">

          <option value="left">
            Left
          </option>

          <option value="center">
            Center
          </option>

          <option value="right">
            Right
          </option>

        </select>

      </div>

    </div>

    <div class="toggle-row">

      <input
        type="checkbox"
        id="extraBoxShadow"
      >

      <label>
        Enable Shadow
      </label>

    </div>

    <div class="toggle-row">

      <input
        type="checkbox"
        id="extra1Active"
      >

      <label>
        Show Extra Box 1
      </label>

    </div>

    <div class="toggle-row">

      <input
        type="checkbox"
        id="extra2Active"
      >

      <label>
        Show Extra Box 2
      </label>

    </div>

  </div>

  <!-- =========================
       CONTACT
  ========================== -->

  <div class="section-box">

    <div class="section-title">
      Contact & Footer
    </div>

    <div class="form-grid">

      <div class="input-group">

        <label>
          Contact Title
        </label>

        <input
          type="text"
          id="contactTitleInput"
        >

      </div>

      <div class="input-group">

        <label>
          Phone Number
        </label>

        <input
          type="text"
          id="contactPhoneInput"
        >

      </div>

      <div class="input-group">

        <label>
          Email Address
        </label>

        <input
          type="text"
          id="contactEmailInput"
        >

      </div>

      <div class="input-group">

        <label>
          Footer Text
        </label>

        <input
          type="text"
          id="footerTextInput"
        >

      </div>

    </div>

  </div>

  <!-- =========================
       SERVICES
  ========================== -->

  <div class="section-box">

    <div class="section-title">
      Homepage Service Cards
    </div>

    <div
      class="cards-grid"
      id="cardsEditor"
    ></div>

  </div>

  <!-- =========================
       BUTTONS
  ========================== -->

  <div class="bottom-buttons">

    <button
      class="save-btn"
      onclick="saveAllSystemDesign()"
    >
      Save All Settings
    </button>

    <button
      class="reset-btn"
      onclick="resetSystemDesign()"
    >
      Reset
    </button>

  </div>

</div>

<script src="header.js"></script>

<script>

if(typeof loadHeader === "function"){
  loadHeader("System Design");
}

</script>

<script src="/core/branding.js"></script>

<script src="system-design.js"></script>

</body>
</html>
