<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
System Design
</title>

<link rel="stylesheet" href="style.css">

<style>

/* =========================
BODY
========================= */

body{
  margin:0;
  background:#f1f5f9;
  font-family:'Segoe UI',sans-serif;
  color:#0f172a;
}

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:9999;
}

/* =========================
PAGE
========================= */

.page-body{
  max-width:1900px;
  margin:auto;
  padding:260px 22px 80px;
}

@media(max-width:768px){

  .page-body{
    padding-top:320px;
    padding-left:12px;
    padding-right:12px;
  }

}

/* =========================
TITLE
========================= */

.page-title{
  font-size:40px;
  font-weight:900;
  margin-bottom:30px;
}

/* =========================
SECTION
========================= */

.section-box{

  background:#fff;

  border-radius:28px;

  padding:26px;

  margin-bottom:28px;

  box-shadow:
  0 12px 35px rgba(0,0,0,.08);

}

.section-title{

  font-size:26px;

  font-weight:900;

  margin-bottom:24px;

}

/* =========================
GRID
========================= */

.form-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(320px,1fr));

  gap:20px;

}

/* =========================
INPUTS
========================= */

.input-group{

  display:flex;

  flex-direction:column;

  gap:8px;

}

.input-group label{

  font-size:14px;

  font-weight:800;

  color:#475569;

}

.input-group input,
.input-group textarea,
.input-group select{

  width:100%;

  border:1px solid #cbd5e1;

  border-radius:18px;

  padding:15px;

  font-size:15px;

  background:#fff;

  outline:none;

}

.input-group textarea{

  min-height:120px;

  resize:vertical;

}

/* =========================
PREVIEW
========================= */

.preview-image{

  width:100%;

  height:200px;

  object-fit:cover;

  border-radius:22px;

  background:#e2e8f0;

  border:2px dashed #cbd5e1;

}

/* =========================
BUTTONS
========================= */

.upload-btn,
.save-btn,
.disable-btn{

  border:none;

  border-radius:18px;

  padding:15px;

  font-size:15px;

  font-weight:900;

  cursor:pointer;

  color:#fff;

}

.upload-btn{
  background:#145cff;
}

.save-btn{
  background:#16a34a;
}

.disable-btn{
  background:#dc2626;
}

/* =========================
BOTTOM BUTTONS
========================= */

.bottom-buttons{

  display:flex;

  gap:14px;

  flex-wrap:wrap;

  margin-top:24px;

}

/* =========================
CARDS
========================= */

.cards-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(380px,1fr));

  gap:24px;

}

.service-card{

  border:1px solid #e2e8f0;

  border-radius:28px;

  padding:22px;

  background:#fff;

}

.service-top{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:20px;

}

.service-title{

  font-size:24px;

  font-weight:900;

}

.card-save{

  width:100%;

  margin-top:18px;

}

</style>

</head>

<body>

<!-- =========================
HEADER
========================= -->

<div id="adminHeader"></div>

<!-- =========================
PAGE
========================= -->

<div class="page-body">

  <div class="page-title">
    System Design
  </div>

  <!-- =========================
  BRANDING
  ========================== -->

  <div class="section-box">

    <div class="section-title">
      Branding
    </div>

    <div class="form-grid">

      <div class="input-group">

        <label>
          Company Name
        </label>

        <input
          type="text"
          id="companyNameInput"
        >

      </div>

      <div class="input-group">

        <label>
          Timezone
        </label>

        <select id="timezoneInput">

          <option value="America/Phoenix">
            Arizona / Phoenix
          </option>

          <option value="America/New_York">
            New York
          </option>

          <option value="America/Chicago">
            Chicago
          </option>

        </select>

      </div>

    </div>

  </div>

  <!-- =========================
  SERVICE CARDS
  ========================== -->

  <div class="section-box">

    <div class="section-title">
      Homepage Service Cards
    </div>

    <div
      class="cards-grid"
      id="cardsEditor"
    ></div>

  </div>

  <!-- =========================
  SAVE
  ========================== -->

  <div class="bottom-buttons">

    <button
      class="save-btn"
      onclick="saveAllSystemDesign()"
    >
      Save All Settings
    </button>

    <button
      class="disable-btn"
      onclick="resetSystemDesign()"
    >
      Reset
    </button>

  </div>

</div>

<!-- =========================
HEADER ENGINE
========================= -->

<script src="header.js"></script>

<script>

if(typeof loadHeader === "function"){

  loadHeader(
    "System Design"
  );

}

</script>

<!-- =========================
BRANDING
========================= -->

<script src="/core/branding.js"></script>

<!-- =========================
SYSTEM DESIGN
========================= -->

<script src="system-design.js"></script>

</body>
</html>
