<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
System Design
</title>

<link rel="stylesheet" href="style.css">

<style>

/* =========================
BODY
========================= */

body{
  margin:0;
  background:#f1f5f9;
  font-family:'Segoe UI',sans-serif;
  color:#0f172a;
}

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
}

/* =========================
PAGE
========================= */

.page-body{
  max-width:1900px;
  margin:auto;
  padding:260px 22px 80px;
}

@media(max-width:768px){

  .page-body{
    padding-top:320px;
    padding-left:12px;
    padding-right:12px;
  }

}

/* =========================
TITLE
========================= */

.page-title{
  font-size:38px;
  font-weight:900;
  margin-bottom:30px;
}

/* =========================
SECTION
========================= */

.section-box{

  background:#fff;

  border-radius:28px;

  padding:26px;

  margin-bottom:28px;

  box-shadow:
  0 12px 35px rgba(0,0,0,.08);

}

.section-title{

  font-size:26px;

  font-weight:900;

  margin-bottom:22px;

}

/* =========================
GRID
========================= */

.form-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(320px,1fr));

  gap:20px;

}

/* =========================
INPUT GROUP
========================= */

.input-group{

  display:flex;

  flex-direction:column;

  gap:8px;

}

.input-group label{

  font-size:14px;

  font-weight:800;

  color:#475569;

}

.input-group input,
.input-group textarea,
.input-group select{

  width:100%;

  border:1px solid #cbd5e1;

  border-radius:18px;

  padding:15px;

  font-size:15px;

  background:#fff;

  outline:none;

}

.input-group textarea{

  min-height:120px;

  resize:vertical;

}

/* =========================
PREVIEW
========================= */

.preview-image{

  width:100%;

  height:180px;

  object-fit:cover;

  border-radius:20px;

  background:#e2e8f0;

  border:2px dashed #cbd5e1;

}

/* =========================
BUTTONS
========================= */

.upload-btn,
.save-btn,
.reset-btn{

  border:none;

  border-radius:18px;

  padding:15px;

  font-size:15px;

  font-weight:900;

  cursor:pointer;

  color:#fff;

}

.upload-btn{
  background:#145cff;
}

.save-btn{
  background:#16a34a;
}

.reset-btn{
  background:#dc2626;
}

.bottom-buttons{

  display:flex;

  gap:14px;

  margin-top:25px;

  flex-wrap:wrap;

}

/* =========================
TOGGLE
========================= */

.toggle-row{

  display:flex;

  align-items:center;

  gap:10px;

  margin-top:10px;

  font-size:14px;

  font-weight:700;

}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

  .page-title{
    font-size:30px;
  }

  .section-title{
    font-size:22px;
  }

}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

  <div class="page-title">
    System Design
  </div>

  <!-- =========================
       HOMEPAGE
  ========================== -->

  <div class="section-box">

    <div class="section-title">
      Homepage
    </div>

    <div class="form-grid">

      <!-- HERO -->

      <div class="input-group">

        <label>
          Hero Image
        </label>

        <img
          id="heroImagePreview"
          class="preview-image"
        >

        <input
          type="file"
          hidden
          accept="image/*"
          onchange="uploadHeroImage(this)"
        >

        <button
          class="upload-btn"
          type="button"
          onclick="
          this.previousElementSibling.click()
          "
        >
          Upload Hero Image
        </button>

      </div>

      <!-- ABOUT EN -->

      <div class="input-group">

        <label>
          About Title
        </label>

        <input
          type="text"
          id="aboutTitleInput"
        >

      </div>

      <div class="input-group">

        <label>
          About Text
        </label>

        <textarea
          id="aboutTextInput"
        ></textarea>

      </div>

      <!-- ABOUT ES -->

      <div class="input-group">

        <label>
          About Title Spanish
        </label>

        <input
          type="text"
          id="aboutTitleEsInput"
        >

      </div>

      <div class="input-group">

        <label>
          About Text Spanish
        </label>

        <textarea
          id="aboutTextEsInput"
        ></textarea>

      </div>

      <!-- QUOTE EN -->

      <div class="input-group">

        <label>
          Quote Title
        </label>

        <input
          type="text"
          id="quoteTitleInput"
        >

      </div>

      <div class="input-group">

        <label>
          Quote Text
        </label>

        <textarea
          id="quoteTextInput"
        ></textarea>

      </div>

      <!-- QUOTE ES -->

      <div class="input-group">

        <label>
          Quote Title Spanish
        </label>

        <input
          type="text"
          id="quoteTitleEsInput"
        >

      </div>

      <div class="input-group">

        <label>
          Quote Text Spanish
        </label>

        <textarea
          id="quoteTextEsInput"
        ></textarea>

      </div>

    </div>

  </div>

  <!-- =========================
       EXTRA BOXES
  ========================== -->

  <div class="section-box">

    <div class="section-title">
      Extra Boxes
    </div>

    <div class="form-grid">

      <!-- EXTRA 1 EN -->

      <div class="input-group">

        <label>
          Extra Box 1 Title
        </label>

        <input
          type="text"
          id="extra1Title"
        >

      </div>

      <div class="input-group">

        <label>
          Extra Box 1 Text
        </label>

        <textarea
          id="extra1Text"
        ></textarea>

      </div>

      <!-- EXTRA 1 ES -->

      <div class="input-group">

        <label>
          Extra Box 1 Title Spanish
        </label>

        <input
          type="text"
          id="extra1TitleEs"
        >

      </div>

      <div class="input-group">

        <label>
          Extra Box 1 Text Spanish
        </label>

        <textarea
          id="extra1TextEs"
        ></textarea>

      </div>

      <!-- EXTRA 2 EN -->

      <div class="input-group">

        <label>
          Extra Box 2 Title
        </label>

        <input
          type="text"
          id="extra2Title"
        >

      </div>

      <div class="input-group">

        <label>
          Extra Box 2 Text
        </label>

        <textarea
          id="extra2Text"
        ></textarea>

      </div>

      <!-- EXTRA 2 ES -->

      <div class="input-group">

        <label>
          Extra Box 2 Title Spanish
        </label>

        <input
          type="text"
          id="extra2TitleEs"
        >

      </div>

      <div class="input-group">

        <label>
          Extra Box 2 Text Spanish
        </label>

        <textarea
          id="extra2TextEs"
        ></textarea>

      </div>

    </div>

    <div class="toggle-row">

      <input
        type="checkbox"
        id="extra1Active"
      >

      <label>
        Show Extra Box 1
      </label>

    </div>

    <div class="toggle-row">

      <input
        type="checkbox"
        id="extra2Active"
      >

      <label>
        Show Extra Box 2
      </label>

    </div>

  </div>

  <!-- =========================
       CONTACT
  ========================== -->

  <div class="section-box">

    <div class="section-title">
      Contact & Footer
    </div>

    <div class="form-grid">

      <div class="input-group">

        <label>
          Contact Title
        </label>

        <input
          type="text"
          id="contactTitleInput"
        >

      </div>

      <div class="input-group">

        <label>
          Contact Title Spanish
        </label>

        <input
          type="text"
          id="contactTitleEsInput"
        >

      </div>

      <div class="input-group">

        <label>
          Phone Number
        </label>

        <input
          type="text"
          id="contactPhoneInput"
        >

      </div>

      <div class="input-group">

        <label>
          Email Address
        </label>

        <input
          type="text"
          id="contactEmailInput"
        >

      </div>

      <div class="input-group">

        <label>
          Footer Text
        </label>

        <input
          type="text"
          id="footerTextInput"
        >

      </div>

      <div class="input-group">

        <label>
          Footer Text Spanish
        </label>

        <input
          type="text"
          id="footerTextEsInput"
        >

      </div>

    </div>

  </div>

  <!-- =========================
       BUTTONS
  ========================== -->

  <div class="bottom-buttons">

    <button
      class="save-btn"
      onclick="saveAllSystemDesign()"
    >
      Save All Settings
    </button>

    <button
      class="reset-btn"
      onclick="resetSystemDesign()"
    >
      Reset
    </button>

  </div>

</div>

<script src="header.js"></script>

<script>

if(typeof loadHeader === "function"){
  loadHeader("System Design");
}

</script>

<script src="/core/branding.js"></script>

<script src="system-design.js"></script>

</body>
</html>
