<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
System Design
</title>

<link rel="stylesheet" href="style.css">

<style>

/* =========================
BODY
========================= */

body{
  margin:0;
  background:#f1f5f9;
  font-family:'Segoe UI',sans-serif;
  color:#0f172a;
}

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
}

/* =========================
PAGE
========================= */

.page-body{
  max-width:1900px;
  margin:auto;
  padding:260px 22px 80px;
}

@media(max-width:768px){

  .page-body{
    padding-top:320px;
    padding-left:12px;
    padding-right:12px;
  }

}

/* =========================
TITLE
========================= */

.page-title{
  font-size:38px;
  font-weight:900;
  margin-bottom:30px;
  color:#0f172a;
}

/* =========================
SECTION
========================= */

.section-box{

  background:#ffffff;

  border-radius:30px;

  padding:30px;

  margin-bottom:30px;

  border:
  2px solid #dbeafe;

  box-shadow:
  0 14px 40px rgba(37,99,235,.08);

}

.section-title{

  font-size:28px;

  font-weight:900;

  margin-bottom:24px;

  color:#1d4ed8;

}

/* =========================
GRID
========================= */

.form-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(320px,1fr));

  gap:22px;

}

/* =========================
INPUT GROUP
========================= */

.input-group{

  display:flex;

  flex-direction:column;

  gap:10px;

}

.input-group label{

  font-size:15px;

  font-weight:900;

  color:#334155;

}

.input-group input,
.input-group textarea,
.input-group select{

  width:100%;

  border:
  2px solid #dbeafe;

  border-radius:20px;

  padding:18px;

  font-size:16px;

  background:#ffffff;

  outline:none;

  transition:.2s;

  color:#0f172a;

}

.input-group input:focus,
.input-group textarea:focus,
.input-group select:focus{

  border-color:#2563eb;

  box-shadow:
  0 0 0 4px rgba(37,99,235,.10);

}

.input-group textarea{

  min-height:140px;

  resize:vertical;

  line-height:1.8;

}

/* =========================
PREVIEW
========================= */

.preview-image{

  width:100%;

  height:220px;

  object-fit:cover;

  border-radius:24px;

  background:#eef2ff;

  border:
  2px solid #dbeafe;

}

/* =========================
BUTTONS
========================= */

.upload-btn,
.save-btn,
.reset-btn,
.disable-btn{

  border:none;

  border-radius:18px;

  padding:16px 22px;

  font-size:16px;

  font-weight:900;

  cursor:pointer;

  color:#fff;

  transition:.2s;

}

.upload-btn{
  background:#2563eb;
}

.save-btn{
  background:#16a34a;
}

.reset-btn{
  background:#dc2626;
}

.disable-btn{
  background:#64748b;
}

.upload-btn:hover,
.save-btn:hover,
.reset-btn:hover,
.disable-btn:hover{

  transform:
  translateY(-2px);

  opacity:.94;

}

.bottom-buttons{

  display:flex;

  gap:14px;

  margin-top:25px;

  flex-wrap:wrap;

}

/* =========================
TOGGLE
========================= */

.toggle-row{

  display:flex;

  align-items:center;

  gap:10px;

  margin-top:14px;

  font-size:15px;

  font-weight:800;

}

/* =========================
CARDS
========================= */

.cards-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(420px,1fr));

  gap:28px;

  align-items:start;

}

/* =========================
SERVICE CARD
========================= */

.service-card{

  background:
  linear-gradient(
  135deg,
  #ffffff,
  #f8fbff
  );

  border:
  2px solid #dbeafe;

  border-radius:32px;

  padding:34px;

  box-shadow:
  0 14px 40px rgba(37,99,235,.08);

  transition:.25s;

}

.service-card:hover{

  transform:
  translateY(-4px);

  box-shadow:
  0 18px 50px rgba(37,99,235,.16);

  border-color:#93c5fd;

}

/* =========================
TOP
========================= */

.service-top{

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:18px;

  margin-bottom:28px;

  flex-wrap:wrap;

}

.service-title{

  font-size:30px;

  font-weight:900;

  color:#1d4ed8;

  line-height:1.2;

}

.card-save{

  width:100%;

  margin-top:16px;

  min-height:58px;

  font-size:18px;

}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

  .page-title{
    font-size:30px;
  }

  .section-title{
    font-size:24px;
  }

  .cards-grid{
    grid-template-columns:1fr;
  }

  .service-card{

    padding:22px;

    border-radius:24px;

  }

  .service-title{

    font-size:24px;

  }

  .service-top{

    flex-direction:column;

    align-items:stretch;

  }

}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

  <div class="page-title">
    System Design
  </div>

  <!-- باقي الصفحة كما هي بدون تغيير -->

</div>

<script src="header.js"></script>

<script>

if(typeof loadHeader === "function"){
  loadHeader("System Design");
}

</script>

<script src="/core/branding.js"></script>

<script src="system-design.js"></script>

</body>
</html>
