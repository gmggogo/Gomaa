<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
System Design
</title>

<link rel="stylesheet" href="style.css">

<style>

/* =========================
BODY
========================= */

body{
  margin:0;
  background:#f1f5f9;
  font-family:'Segoe UI',sans-serif;
  color:#0f172a;
}

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
}

/* =========================
PAGE
========================= */

.page-body{
  max-width:1900px;
  margin:auto;
  padding:260px 22px 80px;
}

@media(max-width:768px){

  .page-body{
    padding-top:320px;
    padding-left:12px;
    padding-right:12px;
  }

}

/* =========================
TITLE
========================= */

.page-title{
  font-size:38px;
  font-weight:900;
  margin-bottom:30px;
}

/* =========================
SECTION
========================= */

.section-box{

  background:#fff;

  border-radius:28px;

  padding:26px;

  margin-bottom:28px;

  box-shadow:
  0 12px 35px rgba(0,0,0,.08);

}

.section-title{

  font-size:26px;

  font-weight:900;

  margin-bottom:22px;

}

/* =========================
GRID
========================= */

.form-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(320px,1fr));

  gap:20px;

}

/* =========================
INPUT GROUP
========================= */

.input-group{

  display:flex;

  flex-direction:column;

  gap:8px;

}

.input-group label{

  font-size:14px;

  font-weight:800;

  color:#475569;

}

.input-group input,
.input-group textarea,
.input-group select{

  width:100%;

  border:1px solid #cbd5e1;

  border-radius:18px;

  padding:15px;

  font-size:15px;

  background:#fff;

  outline:none;

}

.input-group textarea{

  min-height:120px;

  resize:vertical;

}

/* =========================
PREVIEW
========================= */

.preview-image{

  width:100%;

  height:180px;

  object-fit:cover;

  border-radius:20px;

  background:#e2e8f0;

  border:2px dashed #cbd5e1;

}

/* =========================
BUTTONS
========================= */

.upload-btn,
.save-btn,
.reset-btn,
.disable-btn{

  border:none;

  border-radius:18px;

  padding:15px;

  font-size:15px;

  font-weight:900;

  cursor:pointer;

  color:#fff;

}

.upload-btn{
  background:#145cff;
}

.save-btn{
  background:#16a34a;
}

.reset-btn{
  background:#dc2626;
}

.disable-btn{
  background:#64748b;
}

.bottom-buttons{

  display:flex;

  gap:14px;

  margin-top:25px;

  flex-wrap:wrap;

}

/* =========================
TOGGLE
========================= */

.toggle-row{

  display:flex;

  align-items:center;

  gap:10px;

  margin-top:10px;

  font-size:14px;

  font-weight:700;

}

/* =========================
CARDS
========================= */

.cards-grid{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(360px,1fr));

  gap:24px;

}

.service-card{

  border:1px solid #e2e8f0;

  border-radius:24px;

  padding:20px;

  background:#fff;

}

.service-top{

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:14px;

  margin-bottom:18px;

}

.service-title{

  font-size:22px;

  font-weight:900;

}

.card-save{
  width:100%;
  margin-top:18px;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

  .page-title{
    font-size:30px;
  }

  .section-title{
    font-size:22px;
  }

  .cards-grid{
    grid-template-columns:1fr;
  }

  .service-top{
    flex-direction:column;
    align-items:stretch;
  }

}

</style>

</head>

<!-- REGION -->
