<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Billing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:#f1f5f9;
}

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
}

.page{
  padding-top:140px;
  max-width:1400px;
  margin:auto;
  padding-left:15px;
  padding-right:15px;
}

/* CARDS */
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

/* INPUTS */
input{
  padding:10px;
  margin:5px;
}

/* BUTTONS */
button{
  padding:10px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.save{background:#0f172a;color:white;}
.stripe{background:#635bff;color:white;}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.stat{
  background:white;
  padding:15px;
  border-radius:10px;
}

.green{color:green;font-weight:bold;}
.orange{color:orange;font-weight:bold;}
.red{color:red;font-weight:bold;}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:left;
}

/* ACTIONS */
.lock{background:#fee2e2;color:#991b1b;}
.unlock{background:#dcfce7;color:#166534;}
.paid{background:#2563eb;color:white;}

</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page">

<!-- SETTINGS -->
<div class="card">

<h3>Billing Settings</h3>

<input id="startDate" type="date">
<input id="duration" type="number" placeholder="Duration Days">
<input id="grace" type="number" placeholder="Grace Days">

<button class="save" onclick="saveSettings()">Save</button>
<button class="stripe" id="connectStripeBtn">Connect Stripe</button>

</div>

<!-- STATS -->
<div class="stats">

<div class="stat">
Total: <span id="totalCompanies">0</span>
</div>

<div class="stat green">
Active: <span id="activeCompanies">0</span>
</div>

<div class="stat orange">
Past Due: <span id="pastDueCompanies">0</span>
</div>

<div class="stat red">
Suspended: <span id="suspendedCompanies">0</span>
</div>

</div>

<!-- TABLE -->
<div class="card">

<table>

<thead>
<tr>
<th>Company</th>
<th>Status</th>
<th>Start</th>
<th>End</th>
<th>Days Left</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="billingContainer"></tbody>

</table>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/admin-billing.js"></script>

</body>
</html>
