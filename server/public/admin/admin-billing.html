<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Admin Billing Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:#f1f5f9;
}

/* HEADER */
#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
}

/* PAGE */
.page-body{
  padding-top:320px;
  padding-left:20px;
  padding-right:20px;
  padding-bottom:40px;
  max-width:1700px;
  margin:auto;
}

/* GRID */
.top-grid{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:25px;
  margin-bottom:25px;
}

@media(max-width:1100px){
  .top-grid{
    grid-template-columns:1fr;
  }
}

/* CARD */
.card{
  background:white;
  border-radius:12px;
  padding:25px;
  border:1px solid #e2e8f0;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

/* TITLE */
.title{
  font-size:22px;
  font-weight:900;
  color:#0f172a;
  margin-bottom:10px;
}

.subtitle{
  font-size:14px;
  color:#64748b;
  line-height:1.7;
}

/* STRIPE BUTTON */
.btn-connect{
  background:#635bff;
  color:white;
  border:none;
  padding:14px 18px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.stat{
  background:white;
  padding:18px;
  border-radius:10px;
  border:1px solid #e2e8f0;
}

.stat h4{
  font-size:12px;
  color:#64748b;
}

.stat p{
  font-size:26px;
  font-weight:bold;
  margin-top:10px;
}

.green{ color:#16a34a; }
.orange{ color:#ca8a04; }
.red{ color:#dc2626; }

/* FILTERS */
.filters{
  display:grid;
  grid-template-columns:1fr 200px;
  gap:15px;
  margin-bottom:20px;
}

.search,
.select{
  padding:12px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  outline:none;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  min-width:1200px;
}

th{
  background:#0f172a;
  color:white;
  padding:14px;
  font-size:13px;
  text-align:left;
}

td{
  padding:14px;
  border-bottom:1px solid #e2e8f0;
  font-size:13px;
}

/* STATUS */
.badge{
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.active{ background:#dcfce7; color:#166534; }
.past{ background:#fef9c3; color:#854d0e; }
.suspended{ background:#fee2e2; color:#991b1b; }

/* BUTTONS */
.btn{
  padding:8px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
  margin-right:5px;
}

.lock{ background:#fee2e2; color:#991b1b; }
.unlock{ background:#dcfce7; color:#166534; }
.paid{ background:#2563eb; color:white; }

.empty{
  text-align:center;
  padding:30px;
  color:#64748b;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<!-- TOP -->
<div class="top-grid">

  <!-- BILLING INFO -->
  <div class="card">

    <div class="title">
      Billing Control Panel
    </div>

    <div class="subtitle">

      Full billing system with:

      <br><br>

      ✔ Subscription Duration  
      <br>
      ✔ Start / End Date  
      <br>
      ✔ Grace Period  
      <br>
      ✔ Auto Suspend  

    </div>

    <button class="btn-connect" id="connectStripeBtn">
      Connect Stripe
    </button>

  </div>

  <!-- STATS -->
  <div class="stats">

    <div class="stat">
      <h4>Total</h4>
      <p id="totalCompanies">0</p>
    </div>

    <div class="stat">
      <h4>Active</h4>
      <p class="green" id="activeCompanies">0</p>
    </div>

    <div class="stat">
      <h4>Past Due</h4>
      <p class="orange" id="pastDueCompanies">0</p>
    </div>

    <div class="stat">
      <h4>Suspended</h4>
      <p class="red" id="suspendedCompanies">0</p>
    </div>

  </div>

</div>

<!-- FILTERS -->
<div class="filters">

  <input
    id="searchInput"
    class="search"
    placeholder="Search company..."
  />

  <select id="statusFilter" class="select">

    <option value="">All</option>
    <option value="ACTIVE">ACTIVE</option>
    <option value="PAST_DUE">PAST DUE</option>
    <option value="SUSPENDED">SUSPENDED</option>

  </select>

</div>

<!-- TABLE -->
<div style="overflow:auto; background:white; border-radius:10px;">

<table>

<thead>
<tr>
  <th>Company</th>
  <th>Status</th>
  <th>Cycle</th>
  <th>Invoice</th>
  <th>End Date</th>
  <th>Locked</th>
  <th>Notes</th>
  <th>Actions</th>
</tr>
</thead>

<tbody id="billingContainer">

<tr>
<td colspan="8" class="empty">
Loading...
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/admin-billing.js"></script>

</body>
</html>
