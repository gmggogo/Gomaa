<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Admin Billing Center</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="layout.css">

<style>

body{
  margin:0;
  background:#f4f7fb;
  font-family:'Segoe UI',sans-serif;
  color:#0f172a;
}

.page{
  max-width:1700px;
  margin:auto;
  padding:25px;
}

/* HEADER */
#layoutHeader{
  width:100%;
  margin-bottom:25px;
}

/* TOP */
.top-grid{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:25px;
  margin-bottom:25px;
}

@media(max-width:1100px){
  .top-grid{
    grid-template-columns:1fr;
  }
}

/* CARD */
.card{
  background:#fff;
  border-radius:18px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

/* STRIPE */
.stripe-card{
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.stripe-title{
  font-size:24px;
  font-weight:900;
  color:#1e3a8a;
  margin-bottom:10px;
}

.stripe-text{
  color:#64748b;
  line-height:1.7;
  margin-bottom:20px;
  font-size:14px;
}

.connect-btn{
  border:none;
  background:#635bff;
  color:#fff;
  border-radius:14px;
  padding:15px 22px;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  width:220px;
  transition:.2s;
}

.connect-btn:hover{
  transform:translateY(-2px);
  opacity:.95;
}

/* COUNTERS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
}

@media(max-width:900px){
  .stats{
    grid-template-columns:repeat(2,1fr);
  }
}

@media(max-width:600px){
  .stats{
    grid-template-columns:1fr;
  }
}

.stat-box{
  background:#fff;
  border-radius:18px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.stat-title{
  font-size:13px;
  color:#64748b;
  font-weight:800;
  text-transform:uppercase;
}

.stat-value{
  margin-top:15px;
  font-size:34px;
  font-weight:900;
}

.green{
  color:#16a34a;
}

.orange{
  color:#ca8a04;
}

.red{
  color:#dc2626;
}

/* FILTERS */
.filters{
  display:grid;
  grid-template-columns:1fr 240px;
  gap:15px;
  margin-bottom:20px;
}

@media(max-width:700px){
  .filters{
    grid-template-columns:1fr;
  }
}

.search-input,
.select-input{
  width:100%;
  height:50px;
  border-radius:14px;
  border:1px solid #dbe2ea;
  padding:0 16px;
  font-size:14px;
  background:#fff;
}

/* TABLE */
.table-wrap{
  overflow:auto;
  background:#fff;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

table{
  width:100%;
  min-width:1300px;
  border-collapse:collapse;
}

th{
  background:#0f172a;
  color:#fff;
  padding:16px;
  font-size:13px;
  text-align:left;
}

td{
  padding:16px;
  border-bottom:1px solid #e5e7eb;
  vertical-align:top;
  font-size:13px;
  font-weight:700;
}

.company-name{
  font-size:16px;
  font-weight:900;
  margin-bottom:8px;
}

.company-small{
  color:#64748b;
  line-height:1.8;
  font-size:12px;
}

.status-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:7px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.status-active{
  background:#dcfce7;
  color:#166534;
}

.status-past{
  background:#fef9c3;
  color:#854d0e;
}

.status-suspended{
  background:#fee2e2;
  color:#991b1b;
}

.amount{
  font-size:18px;
  font-weight:900;
}

.locked-yes{
  color:#dc2626;
  font-weight:900;
}

.locked-no{
  color:#16a34a;
  font-weight:900;
}

/* ACTIONS */
.action-buttons{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.btn{
  border:none;
  border-radius:12px;
  padding:10px 14px;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
}

.btn-lock{
  background:#fee2e2;
  color:#991b1b;
}

.btn-unlock{
  background:#dcfce7;
  color:#166534;
}

.btn-paid{
  background:#2563eb;
  color:#fff;
}

.empty{
  text-align:center;
  padding:40px;
  font-size:15px;
  color:#64748b;
}

</style>
</head>

<body>

<!-- HEADER -->
<div id="layoutHeader"></div>

<div class="page">

  <!-- TOP -->
  <div class="top-grid">

    <!-- STRIPE -->
    <div class="card stripe-card">

      <div class="stripe-title">
        Stripe Platform Connect
      </div>

      <div class="stripe-text">
        Connect your main Stripe platform account for:
        <br><br>

        • SaaS billing
        <br>
        • White-label companies
        <br>
        • Marketplace payouts
        <br>
        • Future ACH systems
      </div>

      <button
        id="connectStripeBtn"
        class="connect-btn">

        Connect Stripe Platform

      </button>

    </div>

    <!-- STATS -->
    <div class="stats">

      <div class="stat-box">
        <div class="stat-title">
          Total Companies
        </div>

        <div
          class="stat-value"
          id="totalCompanies">

          0

        </div>
      </div>

      <div class="stat-box">
        <div class="stat-title">
          Active
        </div>

        <div
          class="stat-value green"
          id="activeCompanies">

          0

        </div>
      </div>

      <div class="stat-box">
        <div class="stat-title">
          Past Due
        </div>

        <div
          class="stat-value orange"
          id="pastDueCompanies">

          0

        </div>
      </div>

      <div class="stat-box">
        <div class="stat-title">
          Suspended
        </div>

        <div
          class="stat-value red"
          id="suspendedCompanies">

          0

        </div>
      </div>

    </div>

  </div>

  <!-- FILTERS -->
  <div class="filters">

    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="Search company..."
    >

    <select
      id="statusFilter"
      class="select-input">

      <option value="">
        All Statuses
      </option>

      <option value="ACTIVE">
        ACTIVE
      </option>

      <option value="PAST_DUE">
        PAST DUE
      </option>

      <option value="SUSPENDED">
        SUSPENDED
      </option>

    </select>

  </div>

  <!-- TABLE -->
  <div class="table-wrap">

    <table>

      <thead>

        <tr>

          <th>Company</th>
          <th>Status</th>
          <th>Cycle</th>
          <th>Invoice</th>
          <th>Next Billing</th>
          <th>Locked</th>
          <th>Notes</th>
          <th>Actions</th>

        </tr>

      </thead>

      <tbody id="billingContainer">

        <tr>
          <td colspan="8" class="empty">
            Loading billing data...
          </td>
        </tr>

      </tbody>

    </table>

  </div>

</div>

<!-- HEADER SCRIPT -->
<script src="header.js"></script>

<!-- BILLING SCRIPT -->
<script src="admin-billing.js"></script>

</body>
</html>
