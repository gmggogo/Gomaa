<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Billing Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

/* =========================
   GLOBAL
========================= */

*{
  box-sizing:border-box;
}

:root{

  --bg:#eef3f9;
  --card:#ffffff;

  --text:#0f172a;
  --muted:#64748b;

  --border:#dbe4ee;

  --blue:#2563eb;
  --green:#16a34a;
  --red:#dc2626;
  --yellow:#f59e0b;

  --shadow:
    0 10px 30px rgba(15,23,42,.06);

}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Segoe UI,Arial,sans-serif;
  overflow-x:hidden;
}

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:9999;
}

/* =========================
   PAGE
========================= */

.page-body{
  max-width:1800px;
  margin:auto;
  padding:320px 18px 50px;
}

@media(max-width:768px){

  .page-body{
    padding-top:360px;
    padding-left:10px;
    padding-right:10px;
  }

}

/* =========================
   FILTERS
========================= */

.filters{

  display:grid;

  grid-template-columns:
    1fr 180px 180px 180px;

  gap:12px;

  margin-bottom:20px;

}

@media(max-width:900px){

  .filters{
    grid-template-columns:1fr 1fr;
  }

}

@media(max-width:550px){

  .filters{
    grid-template-columns:1fr;
  }

}

.input,
.select{

  width:100%;
  height:50px;

  border-radius:14px;

  border:1px solid #cbd5e1;

  background:#fff;

  padding:0 14px;

  font-size:14px;

  outline:none;

}

.input:focus,
.select:focus{

  border-color:#2563eb;

  box-shadow:
    0 0 0 3px rgba(37,99,235,.12);

}

/* =========================
   CARDS
========================= */

.cards{
  display:grid;
  gap:18px;
}

.company-card{

  background:#fff;

  border-radius:24px;

  border:1px solid var(--border);

  box-shadow:var(--shadow);

  padding:22px;

}

/* =========================
   TOP
========================= */

.company-top{

  display:flex;

  justify-content:space-between;

  align-items:flex-start;

  gap:20px;

  margin-bottom:18px;

  flex-wrap:wrap;

}

.company-box{

  background:#dcfce7;

  padding:18px;

  border-radius:18px;

  min-width:240px;

}

.company-name{

  font-size:22px;

  font-weight:900;

  color:#166534;

  margin-bottom:8px;

}

.company-small{

  color:#166534;

  line-height:1.8;

  font-size:13px;

}

.badge{

  padding:10px 16px;

  border-radius:999px;

  font-size:12px;

  font-weight:900;

}

.active{
  background:#dcfce7;
  color:#166534;
}

.locked{
  background:#fee2e2;
  color:#991b1b;
}

/* =========================
   STATS
========================= */

.stats-grid{

  display:grid;

  grid-template-columns:
    repeat(6,1fr);

  gap:12px;

  margin-bottom:18px;

}

@media(max-width:1200px){

  .stats-grid{
    grid-template-columns:repeat(3,1fr);
  }

}

@media(max-width:700px){

  .stats-grid{
    grid-template-columns:repeat(2,1fr);
  }

}

.stat-box{

  background:#f8fafc;

  border:1px solid #e2e8f0;

  border-radius:18px;

  padding:16px;

}

.stat-label{

  font-size:11px;

  color:#64748b;

  margin-bottom:8px;

  text-transform:uppercase;

  font-weight:700;

}

.stat-value{

  font-size:28px;

  font-weight:900;

}

/* =========================
   BILLING
========================= */

.billing-grid{

  display:grid;

  grid-template-columns:
    repeat(4,1fr);

  gap:12px;

  margin-bottom:18px;

}

@media(max-width:1000px){

  .billing-grid{
    grid-template-columns:1fr 1fr;
  }

}

@media(max-width:600px){

  .billing-grid{
    grid-template-columns:1fr;
  }

}

.field{

  display:flex;
  flex-direction:column;
  gap:6px;

}

.field label{

  font-size:12px;

  font-weight:700;

  color:#64748b;

}

.small-input{

  height:42px;

  border:1px solid #cbd5e1;

  border-radius:12px;

  padding:0 12px;

  font-size:13px;

  background:#fff;

  outline:none;

}

.small-input:disabled{

  background:#f1f5f9;

  color:#64748b;

}

/* =========================
   BUTTONS
========================= */

.btn-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{

  border:none;

  border-radius:12px;

  padding:11px 16px;

  font-size:12px;

  font-weight:900;

  cursor:pointer;

}

.btn-blue{
  background:#2563eb;
  color:#fff;
}

.btn-dark{
  background:#111827;
  color:#fff;
}

.btn-green{
  background:#dcfce7;
  color:#166534;
}

.btn-red{
  background:#fee2e2;
  color:#991b1b;
}

.btn-yellow{
  background:#fef3c7;
  color:#92400e;
}

.empty{

  background:#fff;

  border-radius:20px;

  padding:50px;

  text-align:center;

  color:#64748b;

  font-weight:700;

}

</style>
</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

  <!-- FILTERS -->

  <div class="filters">

    <input
      id="searchInput"
      class="input"
      placeholder="Search company..."
    >

    <select
      id="statusFilter"
      class="select"
    >
      <option value="">All Status</option>
      <option value="ACTIVE">ACTIVE</option>
      <option value="SUSPENDED">SUSPENDED</option>
    </select>

    <select
      id="monthFilter"
      class="select"
    >
      <option value="">All Months</option>
    </select>

    <input
      id="yearFilter"
      class="input"
      type="number"
      placeholder="Year"
    >

  </div>

  <!-- CARDS -->

  <div
    class="cards"
    id="billingContainer"
  >

    <div class="empty">
      Loading billing...
    </div>

  </div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/admin-billing.js"></script>

</body>
</html>
