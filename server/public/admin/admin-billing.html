<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Billing</title>

<link rel="stylesheet" href="style.css">

<style>

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f7fb;
}

.page{
  padding:20px;
}

.title{
  font-size:28px;
  font-weight:800;
  margin-bottom:20px;
  color:#111827;
}

.billing-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card h3{
  margin:0 0 12px;
  color:#2563eb;
}

.row{
  margin-bottom:10px;
  font-size:14px;
}

.status-active{
  color:#16a34a;
  font-weight:800;
}

.status-past{
  color:#dc2626;
  font-weight:800;
}

.status-suspended{
  color:#111827;
  font-weight:800;
}

.btn{
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  margin-top:10px;
}

.btn-lock{
  background:#dc2626;
  color:#fff;
}

.btn-unlock{
  background:#16a34a;
  color:#fff;
}

</style>

</head>
<body>

<div id="layoutHeader"></div>

<div class="page">

  <div class="title">
    Billing Management
  </div>

  <div id="billingContainer" class="billing-grid"></div>

</div>

<script src="header.js"></script>
<script src="admin-billing.js"></script>

</body>
</html>
