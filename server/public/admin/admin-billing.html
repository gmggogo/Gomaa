<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Admin Billing Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>
body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:#f1f5f9;
}

#adminHeader{
  position:fixed;
  top:0;
  width:100%;
  z-index:1000;
}

.page-body{
  padding-top:320px;
  max-width:1700px;
  margin:auto;
  padding-left:20px;
  padding-right:20px;
}

/* GRID */
.top{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  border:1px solid #e2e8f0;
}

.title{
  font-size:20px;
  font-weight:900;
}

.btn{
  background:#635bff;
  color:#fff;
  border:none;
  padding:12px;
  width:100%;
  border-radius:10px;
  margin-top:15px;
  cursor:pointer;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.box{
  background:#fff;
  padding:15px;
  border-radius:10px;
}

.green{color:#16a34a}
.orange{color:#ca8a04}
.red{color:#dc2626}

/* FILTER */
.filters{
  display:flex;
  gap:10px;
  margin:20px 0;
}

input,select{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th{
  background:#0f172a;
  color:#fff;
  padding:12px;
}

td{
  padding:12px;
  border-bottom:1px solid #eee;
}

.status-active{color:#16a34a;font-weight:bold}
.status-past{color:#ca8a04;font-weight:bold}
.status-suspended{color:#dc2626;font-weight:bold}

.small{
  font-size:12px;
  color:#64748b;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<!-- TOP -->
<div class="top">

  <div class="card">

    <div class="title">Billing Control Panel</div>

    <div class="small">
      Duration + Grace + Auto Suspend + Stripe
    </div>

    <button id="connectStripeBtn" class="btn">
      Connect Stripe
    </button>

  </div>

  <div class="stats">

    <div class="box">
      Total <div id="totalCompanies">0</div>
    </div>

    <div class="box green">
      Active <div id="activeCompanies">0</div>
    </div>

    <div class="box orange">
      Past Due <div id="pastDueCompanies">0</div>
    </div>

    <div class="box red">
      Suspended <div id="suspendedCompanies">0</div>
    </div>

  </div>

</div>

<!-- FILTER -->
<div class="filters">
  <input id="searchInput" placeholder="Search company">
  <select id="statusFilter">
    <option value="">All</option>
    <option value="ACTIVE">ACTIVE</option>
    <option value="PAST_DUE">PAST DUE</option>
    <option value="SUSPENDED">SUSPENDED</option>
  </select>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
  <th>Company</th>
  <th>Status</th>
  <th>Cycle</th>
  <th>Invoice</th>
  <th>Start</th>
  <th>End</th>
  <th>Days Left</th>
  <th>Locked</th>
  <th>Actions</th>
</tr>
</thead>

<tbody id="billingContainer"></tbody>

</table>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/admin-billing.js"></script>

</body>
</html>
