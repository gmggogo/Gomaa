<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Admin Billing Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f1f5f9;
}

#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

.page-body{
padding-top:320px;
padding-left:20px;
padding-right:20px;
padding-bottom:40px;
max-width:1700px;
margin:auto;
}

@media (max-width:768px){
.page-body{
padding-top:380px;
}
}

.card{
background:white;
border-radius:10px;
padding:20px;
border:1px solid #e2e8f0;
box-shadow:0 2px 10px rgba(0,0,0,.06);
margin-bottom:20px;
}

label{
font-size:12px;
font-weight:bold;
display:block;
margin-bottom:5px;
color:#334155;
}

.search-input,
.select-input{
height:45px;
border:1px solid #dbe2ea;
border-radius:10px;
padding:0 10px;
width:100%;
font-size:14px;
}

.btn{
border:none;
padding:10px 14px;
border-radius:8px;
font-size:12px;
font-weight:bold;
cursor:pointer;
}

.btn-paid{background:#2563eb;color:white;}
.btn-lock{background:#fee2e2;color:#991b1b;}
.btn-unlock{background:#dcfce7;color:#166534;}

.status-active{color:#16a34a;font-weight:bold;}
.status-past{color:#ca8a04;font-weight:bold;}
.status-suspended{color:#dc2626;font-weight:bold;}

.table-wrap{
background:white;
border-radius:10px;
overflow:auto;
border:1px solid #e2e8f0;
}

table{
width:100%;
border-collapse:collapse;
min-width:1300px;
}

th{
background:#0f172a;
color:white;
padding:12px;
font-size:13px;
text-align:left;
}

td{
padding:12px;
border-bottom:1px solid #e5e7eb;
font-size:13px;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<!-- =========================
   BILLING CONTROL PANEL
========================= -->
<div class="card">

<h3>Billing Control Panel</h3>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:15px;">

<div>
<label>Billing Cycle</label>
<select id="billingCycle" class="select-input">
<option value="MONTHLY">Monthly</option>
<option value="WEEKLY">Weekly</option>
</select>
</div>

<div>
<label>Duration (Days)</label>
<input id="billingDuration" type="number" value="30" class="search-input">
</div>

<div>
<label>Grace Period (Days)</label>
<input id="graceDays" type="number" value="3" class="search-input">
</div>

</div>

<div style="margin-top:15px;">
<button class="btn btn-paid" onclick="applySettings()">
Save Settings
</button>
</div>

</div>

<!-- =========================
   STATS
========================= -->
<div class="card">

<div id="stats">
Loading stats...
</div>

</div>

<!-- =========================
   FILTERS
========================= -->
<div class="card">

<input id="search" class="search-input" placeholder="Search company...">

</div>

<!-- =========================
   TABLE
========================= -->
<div class="table-wrap">

<table>

<thead>
<tr>
<th>Company</th>
<th>Status</th>
<th>Cycle</th>
<th>Period</th>
<th>Grace</th>
<th>Next Billing</th>
<th>Locked</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="billingContainer">
<tr>
<td colspan="8">Loading...</td>
</tr>
</tbody>

</table>

</div>

</div>

<script>

/* =========================
   SETTINGS STATE
========================= */
let settings = {
  billingCycle: "MONTHLY",
  billingDuration: 30,
  graceDays: 3
};

/* =========================
   APPLY SETTINGS
========================= */
function applySettings(){

  settings.billingCycle =
    document.getElementById("billingCycle").value;

  settings.billingDuration =
    Number(document.getElementById("billingDuration").value);

  settings.graceDays =
    Number(document.getElementById("graceDays").value);

  alert("Settings updated ✅");

}

/* =========================
   LOAD DATA
========================= */
async function loadBilling(){

  const res = await fetch("/api/admin/billing");
  const data = await res.json();

  render(data);

}

/* =========================
   RENDER
========================= */
function render(data){

  const container =
    document.getElementById("billingContainer");

  container.innerHTML = "";

  data.forEach(c => {

    const start = c.billingStartDate ?
      new Date(c.billingStartDate).toLocaleDateString() : "-";

    const end = c.billingEndDate ?
      new Date(c.billingEndDate).toLocaleDateString() : "-";

    let statusClass =
      c.billingStatus === "ACTIVE"
        ? "status-active"
        : c.billingStatus === "PAST_DUE"
          ? "status-past"
          : "status-suspended";

    container.innerHTML += `
      <tr>

        <td>
          <b>${c.name}</b>
        </td>

        <td class="${statusClass}">
          ${c.billingStatus}
        </td>

        <td>
          ${c.billingCycle}
        </td>

        <td>
          ${start} → ${end}
        </td>

        <td>
          ${c.graceDays || 0} days
        </td>

        <td>
          ${c.nextBillingDate ? new Date(c.nextBillingDate).toLocaleDateString() : "-"}
        </td>

        <td>
          ${c.billingLocked ? "🔴 YES" : "🟢 NO"}
        </td>

        <td>

          <button class="btn btn-lock">
            Lock
          </button>

          <button class="btn btn-unlock">
            Unlock
          </button>

          <button class="btn btn-paid">
            Mark Paid
          </button>

        </td>

      </tr>
    `;

  });

}

/* =========================
   INIT
========================= */
loadBilling();

</script>

<script src="/admin/header.js"></script>

</body>
</html>
