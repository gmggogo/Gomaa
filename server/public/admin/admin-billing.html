<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sunbeam Admin – Billing</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f4f7fb;
  color:#0f172a;
}

.page{
  max-width:1600px;
  margin:auto;
  padding:32px 22px 60px;
}

.page-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  margin-bottom:26px;
}

.page-title{
  font-size:30px;
  font-weight:900;
  color:#0f172a;
}

.page-subtitle{
  margin-top:6px;
  color:#64748b;
  font-size:14px;
  font-weight:700;
}

.header-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.top-btn{
  border:none;
  border-radius:12px;
  padding:12px 18px;
  font-weight:900;
  cursor:pointer;
  background:#0f172a;
  color:#fff;
}

.metrics{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
  margin-bottom:24px;
}

.metric{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:16px;
  padding:18px;
  box-shadow:0 8px 20px rgba(15,23,42,.05);
}

.metric-label{
  font-size:12px;
  font-weight:900;
  color:#64748b;
  text-transform:uppercase;
}

.metric-value{
  margin-top:10px;
  font-size:28px;
  font-weight:900;
  color:#0f172a;
}

.toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:18px;
  padding:14px;
  margin-bottom:18px;
  box-shadow:0 8px 20px rgba(15,23,42,.05);
}

.search-input{
  flex:1;
  min-width:220px;
  height:44px;
  border:1px solid #dbe2ea;
  border-radius:12px;
  padding:0 14px;
  font-size:14px;
  font-weight:700;
  outline:none;
}

.filter-select{
  height:44px;
  border:1px solid #dbe2ea;
  border-radius:12px;
  padding:0 14px;
  background:#fff;
  font-weight:800;
}

.table-card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(15,23,42,.06);
}

.table-wrap{
  overflow-x:auto;
}

.billing-table{
  width:100%;
  min-width:1050px;
  border-collapse:collapse;
}

.billing-table th{
  background:#0f172a;
  color:#fff;
  text-align:left;
  padding:15px 14px;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.5px;
}

.billing-table td{
  padding:15px 14px;
  border-bottom:1px solid #eef2f7;
  font-size:13px;
  font-weight:700;
  vertical-align:middle;
}

.billing-table tr:hover td{
  background:#f8fafc;
}

.company-main{
  font-size:15px;
  font-weight:900;
  color:#0f172a;
}

.company-sub{
  margin-top:4px;
  font-size:12px;
  color:#64748b;
  font-weight:700;
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
}

.badge-active{
  background:#dcfce7;
  color:#166534;
}

.badge-past{
  background:#fef9c3;
  color:#854d0e;
}

.badge-suspended{
  background:#fee2e2;
  color:#991b1b;
}

.locked-yes{
  color:#dc2626;
  font-weight:900;
}

.locked-no{
  color:#16a34a;
  font-weight:900;
}

.amount{
  font-weight:900;
  color:#145cff;
}

.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.btn{
  border:none;
  border-radius:10px;
  padding:9px 12px;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
}

.btn-lock{
  background:#fee2e2;
  color:#991b1b;
}

.btn-unlock{
  background:#dcfce7;
  color:#166534;
}

.btn-edit{
  background:#dbeafe;
  color:#1d4ed8;
}

.btn-paid{
  background:#0f172a;
  color:#fff;
}

.empty{
  padding:35px;
  text-align:center;
  color:#64748b;
  font-weight:900;
}

@media(max-width:768px){
  .page{
    padding:22px 10px 40px;
  }

  .page-head{
    align-items:flex-start;
    flex-direction:column;
  }

  .page-title{
    font-size:24px;
  }

  .toolbar{
    flex-direction:column;
    align-items:stretch;
  }

  .search-input,
  .filter-select{
    width:100%;
  }
}
</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="page">

  <div class="page-head">
    <div>
      <div class="page-title">Billing Management</div>
      <div class="page-subtitle">
        Manage company billing status, invoice amounts, locks, and payment access.
      </div>
    </div>

    <div class="header-actions">
      <button class="top-btn" onclick="location.reload()">Refresh</button>
    </div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Total Companies</div>
      <div class="metric-value" id="totalCompanies">0</div>
    </div>

    <div class="metric">
      <div class="metric-label">Active</div>
      <div class="metric-value" id="activeCompanies">0</div>
    </div>

    <div class="metric">
      <div class="metric-label">Past Due</div>
      <div class="metric-value" id="pastDueCompanies">0</div>
    </div>

    <div class="metric">
      <div class="metric-label">Suspended</div>
      <div class="metric-value" id="suspendedCompanies">0</div>
    </div>
  </div>

  <div class="toolbar">
    <input
      id="searchInput"
      class="search-input"
      placeholder="Search company name..."
    >

    <select id="statusFilter" class="filter-select">
      <option value="">All Status</option>
      <option value="ACTIVE">Active</option>
      <option value="PAST_DUE">Past Due</option>
      <option value="SUSPENDED">Suspended</option>
    </select>
  </div>

  <div class="table-card">
    <div class="table-wrap">
      <table class="billing-table">
        <thead>
          <tr>
            <th>Company</th>
            <th>Status</th>
            <th>Cycle</th>
            <th>Invoice</th>
            <th>Next Billing</th>
            <th>Locked</th>
            <th>Notes</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="billingContainer">
          <tr>
            <td colspan="8" class="empty">Loading billing data...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="header.js"></script>
<script src="admin-billing.js"></script>

</body>
</html>
