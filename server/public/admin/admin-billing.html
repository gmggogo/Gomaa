<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Billing Control Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:#f1f5f9;
}

.page{
  padding:120px 20px;
  max-width:1600px;
  margin:auto;
}

/* CONTROL PANEL */
.card{
  background:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  border:1px solid #e5e7eb;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

input,select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.save{background:#0f172a;color:#fff;margin-top:10px;}
.stripe{background:#635bff;color:#fff;margin-top:10px;}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
}

th{
  background:#0f172a;
  color:#fff;
  padding:12px;
  font-size:13px;
}

td{
  padding:12px;
  border-bottom:1px solid #eee;
}

.status-active{color:#16a34a;font-weight:bold;}
.status-past{color:#ca8a04;font-weight:bold;}
.status-suspended{color:#dc2626;font-weight:bold;}

.actions{
  display:flex;
  gap:6px;
}

.lock{background:#fee2e2;color:#991b1b;}
.unlock{background:#dcfce7;color:#166534;}
.paid{background:#2563eb;color:#fff;}

</style>

</head>

<body>

<div class="page">

<!-- SETTINGS -->
<div class="card">

<h3>Billing Settings</h3>

<div class="grid">

  <input type="date" id="startDate">

  <input type="number" id="duration" placeholder="Duration (Days)" value="30">

  <input type="number" id="grace" placeholder="Grace Days" value="3">

  <select id="cycle">
    <option value="MONTHLY">Monthly</option>
    <option value="WEEKLY">Weekly</option>
  </select>

</div>

<button class="save" onclick="saveSettings()">
Save Billing Settings
</button>

<button class="stripe" id="connectStripeBtn">
Connect Stripe
</button>

</div>

<!-- TABLE -->
<table>

<thead>
<tr>
<th>Company</th>
<th>Status</th>
<th>Start</th>
<th>End</th>
<th>Days Left</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="billingContainer"></tbody>

</table>

</div>

<script src="billing.js"></script>

</body>
</html>
