<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Billing Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

/* =========================
   GLOBAL
========================= */

body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
background:#f1f5f9;
color:#0f172a;
}

/* =========================
   HEADER
========================= */

#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

/* =========================
   PAGE
========================= */

.page-body{
padding-top:300px;
padding-left:20px;
padding-right:20px;
padding-bottom:50px;
max-width:1700px;
margin:auto;
}

@media(max-width:768px){

.page-body{
padding-top:360px;
padding-left:10px;
padding-right:10px;
}

}

/* =========================
   TOP
========================= */

.page-top{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:25px;
flex-wrap:wrap;
}

.page-title{
font-size:34px;
font-weight:900;
color:#0f172a;
}

.page-subtitle{
margin-top:6px;
font-size:14px;
color:#64748b;
font-weight:600;
}

.refresh-btn{
border:none;
background:#60a5fa;
color:#fff;
padding:12px 20px;
border-radius:12px;
font-weight:800;
cursor:pointer;
transition:.2s;
}

.refresh-btn:hover{
background:#3b82f6;
}

/* =========================
   METRICS
========================= */

.metrics-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-bottom:25px;
}

.metric-card{
background:#fff;
border-radius:16px;
padding:20px;
border:1px solid #dbeafe;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.metric-title{
font-size:12px;
font-weight:900;
letter-spacing:.5px;
text-transform:uppercase;
color:#64748b;
}

.metric-value{
margin-top:10px;
font-size:30px;
font-weight:900;
color:#2563eb;
}

/* =========================
   TOOLBAR
========================= */

.toolbar{
background:#fff;
border-radius:16px;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
margin-bottom:20px;
border:1px solid #dbeafe;
box-shadow:0 5px 15px rgba(0,0,0,.04);
flex-wrap:wrap;
}

.search-input{
flex:1;
min-width:240px;
height:46px;
border:1px solid #cbd5e1;
border-radius:12px;
padding:0 15px;
font-size:14px;
outline:none;
font-weight:700;
}

.filter-select{
height:46px;
border:1px solid #cbd5e1;
border-radius:12px;
padding:0 15px;
font-weight:700;
background:#fff;
}

/* =========================
   TABLE
========================= */

.table-wrapper{
background:#fff;
border-radius:18px;
overflow:hidden;
border:1px solid #dbeafe;
box-shadow:0 10px 25px rgba(0,0,0,.05);
overflow-x:auto;
}

.billing-table{
width:100%;
border-collapse:collapse;
min-width:1200px;
}

/* TABLE HEADER */

.billing-table thead{
background:#dbeafe;
}

.billing-table th{
padding:16px;
font-size:12px;
text-transform:uppercase;
letter-spacing:.5px;
color:#111827;
font-weight:900;
text-align:left;
border-bottom:1px solid #bfdbfe;
}

/* ROWS */

.billing-table td{
padding:18px 16px;
font-size:14px;
border-bottom:1px solid #f1f5f9;
vertical-align:top;
text-align:left !important;
font-weight:700;

display:table-cell;
}

.billing-table td div,
.billing-table td span{
text-align:left !important;
margin-left:0 !important;
padding-left:0 !important;
justify-content:flex-start !important;
align-items:flex-start !important;
}

/* =========================
   COMPANY
========================= */

.company-name{
font-size:18px;
font-weight:900;
color:#2563eb;
margin-bottom:6px;
text-align:left !important;
display:block;
width:100%;
}

.company-small{
font-size:13px;
color:#475569;
font-weight:600;
line-height:1.7;
text-align:left !important;
display:block;
width:100%;
}
/* =========================
   STATUS
========================= */

.status-badge{
display:inline-flex;
align-items:center;
padding:7px 12px;
border-radius:999px;
font-size:12px;
font-weight:900;
}

.status-active{
background:#dcfce7;
color:#16a34a;
}

.status-past{
background:#fef9c3;
color:#ca8a04;
}

.status-suspended{
background:#fee2e2;
color:#dc2626;
}

/* =========================
   LOCK
========================= */

.locked-yes{
color:#dc2626;
font-weight:900;
}

.locked-no{
color:#16a34a;
font-weight:900;
}

/* =========================
   AMOUNT
========================= */

.amount{
font-size:15px;
font-weight:900;
color:#2563eb;
}

/* =========================
   BUTTONS
========================= */

.action-buttons{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:10px 14px;
border-radius:10px;
font-size:12px;
font-weight:900;
cursor:pointer;
transition:.2s;
}

.btn:hover{
transform:translateY(-1px);
}

.btn-lock{
background:#fee2e2;
color:#dc2626;
}

.btn-unlock{
background:#dcfce7;
color:#16a34a;
}

.btn-edit{
background:#dbeafe;
color:#2563eb;
}

.btn-paid{
background:#2563eb;
color:#fff;
}

/* =========================
   EMPTY
========================= */

.empty{
padding:40px;
text-align:center;
font-size:18px;
font-weight:800;
color:#64748b;
}

</style>

</head>

<body>

<!-- HEADER -->
<div id="adminHeader"></div>

<!-- PAGE -->
<div class="page-body">

<!-- TOP -->

<div class="page-top">

<div>

<div class="page-title">
Billing Management
</div>

<div class="page-subtitle">
Manage company subscriptions, invoices, payment status, and account locks.
</div>

</div>

<button class="refresh-btn" onclick="location.reload()">
Refresh
</button>

</div>

<!-- METRICS -->

<div class="metrics-grid">

<div class="metric-card">
<div class="metric-title">Total Companies</div>
<div class="metric-value" id="totalCompanies">0</div>
</div>

<div class="metric-card">
<div class="metric-title">Active</div>
<div class="metric-value" id="activeCompanies">0</div>
</div>

<div class="metric-card">
<div class="metric-title">Past Due</div>
<div class="metric-value" id="pastDueCompanies">0</div>
</div>

<div class="metric-card">
<div class="metric-title">Suspended</div>
<div class="metric-value" id="suspendedCompanies">0</div>
</div>

</div>

<!-- TOOLBAR -->

<div class="toolbar">

<input
type="text"
id="searchInput"
class="search-input"
placeholder="Search company..."
>

<select id="statusFilter" class="filter-select">

<option value="">All Status</option>
<option value="ACTIVE">ACTIVE</option>
<option value="PAST_DUE">PAST DUE</option>
<option value="SUSPENDED">SUSPENDED</option>

</select>

</div>

<!-- TABLE -->

<div class="table-wrapper">

<table class="billing-table">

<thead>

<tr>

<th>Company</th>
<th>Status</th>
<th>Cycle</th>
<th>Invoice</th>
<th>Next Billing</th>
<th>Locked</th>
<th>Notes</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="billingContainer">

<tr>
<td colspan="8" class="empty">
Loading billing data...
</td>
</tr>

</tbody>

</table>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/admin-billing.js"></script>

</body>
</html>
