<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Billing Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
  margin:0;
  font-family:Segoe UI,Arial;
  background:#f1f5f9;
}

/* HEADER FIX */
#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
}

/* PAGE */
.page-body{
  padding-top:140px;
  max-width:1400px;
  margin:auto;
  padding-left:15px;
  padding-right:15px;
}

/* PANEL */
.panel{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

/* INPUTS */
input,select{
  padding:10px;
  margin:5px;
  border-radius:6px;
  border:1px solid #ccc;
}

/* BUTTONS */
button{
  padding:10px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.save{
  background:#0f172a;
  color:white;
}

.stripe{
  background:#635bff;
  color:white;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:left;
}

/* STATUS */
.active{color:green;font-weight:bold;}
.past{color:orange;font-weight:bold;}
.suspended{color:red;font-weight:bold;}

/* ACTIONS */
.btn-lock{background:#fee2e2;color:#991b1b;}
.btn-unlock{background:#dcfce7;color:#166534;}
.btn-paid{background:#2563eb;color:white;}

</style>
</head>

<body>

<!-- 🔥 HEADER -->
<div id="adminHeader"></div>

<div class="page-body">

<div class="panel">

<h2>Billing Control Panel</h2>

<!-- SETTINGS -->
<input id="startDate" type="date">
<input id="duration" type="number" placeholder="Duration (days)">
<input id="grace" type="number" placeholder="Grace days">

<button class="save" onclick="saveSettings()">Save Settings</button>
<button class="stripe" id="connectStripeBtn">Connect Stripe</button>

<!-- TABLE -->
<table>

<thead>
<tr>
<th>Company</th>
<th>Status</th>
<th>Start</th>
<th>End</th>
<th>Days Left</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="billingContainer"></tbody>

</table>

</div>

</div>

<!-- HEADER SCRIPT -->
<script src="/admin/header.js"></script>

<!-- BILLING SCRIPT -->
<script src="/admin/admin-billing.js"></script>

</body>
</html>
