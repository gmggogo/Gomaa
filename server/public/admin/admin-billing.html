<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Admin Billing Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f1f5f9;
}

/* HEADER */

#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

/* PAGE */

.page-body{
padding-top:300px;
padding-left:20px;
padding-right:20px;
padding-bottom:40px;
max-width:1700px;
margin:auto;
}

/* MOBILE HEADER SPACE */

@media (max-width:768px){

.page-body{
padding-top:360px;
padding-left:10px;
padding-right:10px;
}

}

/* TOP GRID */

.top-grid{
display:grid;
grid-template-columns:420px 1fr;
gap:25px;
margin-bottom:25px;
}

@media(max-width:1100px){

.top-grid{
grid-template-columns:1fr;
}

}

/* CARD */

.card{
background:white;
border-radius:10px;
padding:25px;
border:1px solid #e2e8f0;
box-shadow:0 2px 10px rgba(0,0,0,.06);
}

/* STRIPE */

.stripe-title{
font-size:24px;
font-weight:900;
margin-bottom:10px;
color:#1e3a8a;
}

.stripe-text{
font-size:14px;
line-height:1.7;
color:#64748b;
margin-bottom:20px;
}

.connect-btn{
border:none;
background:#635bff;
color:white;
padding:14px 22px;
border-radius:10px;
font-weight:bold;
font-size:14px;
cursor:pointer;
transition:.2s;
}

.connect-btn:hover{
opacity:.92;
transform:translateY(-2px);
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.stat-box{
background:white;
border-radius:10px;
padding:20px;
border:1px solid #e2e8f0;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.stat-title{
font-size:12px;
font-weight:900;
color:#64748b;
text-transform:uppercase;
}

.stat-value{
font-size:30px;
font-weight:bold;
margin-top:12px;
}

.green{
color:#16a34a;
}

.orange{
color:#ca8a04;
}

.red{
color:#dc2626;
}

/* FILTERS */

.filters{
display:grid;
grid-template-columns:1fr 240px;
gap:15px;
margin-bottom:20px;
}

@media(max-width:700px){

.filters{
grid-template-columns:1fr;
}

}

.search-input,
.select-input{
height:50px;
border:1px solid #dbe2ea;
border-radius:10px;
padding:0 15px;
font-size:14px;
background:white;
outline:none;
}

/* TABLE */

.table-wrap{
background:white;
border-radius:10px;
overflow:auto;
border:1px solid #e2e8f0;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

table{
width:100%;
border-collapse:collapse;
min-width:1250px;
}

th{
background:#0f172a;
color:white;
padding:15px;
font-size:13px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #e5e7eb;
font-size:13px;
vertical-align:top;
text-align:left;
}

/* COMPANY */

.company-name{
font-size:16px;
font-weight:bold;
margin-bottom:8px;
color:#0f172a;
text-align:left;
}

.company-small{
font-size:12px;
line-height:1.8;
color:#64748b;
text-align:left;
}

/* STATUS */

.status-badge{
display:inline-block;
padding:6px 12px;
border-radius:999px;
font-size:12px;
font-weight:bold;
}

.status-active{
background:#dcfce7;
color:#166534;
}

.status-past{
background:#fef9c3;
color:#854d0e;
}

.status-suspended{
background:#fee2e2;
color:#991b1b;
}

/* MONEY */

.amount{
font-size:17px;
font-weight:bold;
}

/* LOCK */

.locked-yes{
color:#dc2626;
font-weight:bold;
}

.locked-no{
color:#16a34a;
font-weight:bold;
}

/* ACTIONS */

.action-buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.btn{
border:none;
padding:10px 14px;
border-radius:8px;
font-size:12px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.btn:hover{
transform:translateY(-1px);
}

.btn-lock{
background:#fee2e2;
color:#991b1b;
}

.btn-unlock{
background:#dcfce7;
color:#166534;
}

.btn-paid{
background:#2563eb;
color:white;
}

.empty{
text-align:center;
padding:40px;
font-size:15px;
color:#64748b;
}

</style>

</head>

<body>

<!-- ADMIN HEADER -->
<div id="adminHeader"></div>

<!-- PAGE -->
<div class="page-body">

<!-- TOP -->
<div class="top-grid">

<!-- STRIPE -->
<div class="card">

<div class="stripe-title">
Stripe Platform Connect
</div>

<div class="stripe-text">

Connect your Stripe platform account for:

<br><br>

• SaaS billing
<br>
• White-label companies
<br>
• Marketplace payouts
<br>
• Future ACH systems

</div>

<button
id="connectStripeBtn"
class="connect-btn">

Connect Stripe Platform

</button>

</div>

<!-- STATS -->
<div class="stats">

<div class="stat-box">

<div class="stat-title">
Total Companies
</div>

<div
class="stat-value"
id="totalCompanies">

0

</div>

</div>

<div class="stat-box">

<div class="stat-title">
Active
</div>

<div
class="stat-value green"
id="activeCompanies">

0

</div>

</div>

<div class="stat-box">

<div class="stat-title">
Past Due
</div>

<div
class="stat-value orange"
id="pastDueCompanies">

0

</div>

</div>

<div class="stat-box">

<div class="stat-title">
Suspended
</div>

<div
class="stat-value red"
id="suspendedCompanies">

0

</div>

</div>

</div>

</div>

<!-- FILTERS -->
<div class="filters">

<input
type="text"
id="searchInput"
class="search-input"
placeholder="Search company..."
>

<select
id="statusFilter"
class="select-input">

<option value="">
All Statuses
</option>

<option value="ACTIVE">
ACTIVE
</option>

<option value="PAST_DUE">
PAST DUE
</option>

<option value="SUSPENDED">
SUSPENDED
</option>

</select>

</div>

<!-- TABLE -->
<div class="table-wrap">

<table>

<thead>

<tr>

<th>Company</th>
<th>Status</th>
<th>Cycle</th>
<th>Invoice</th>
<th>Next Billing</th>
<th>Locked</th>
<th>Notes</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="billingContainer">

<tr>

<td colspan="8" class="empty">
Loading billing data...
</td>

</tr>

</tbody>

</table>

</div>

</div>

<!-- HEADER -->
<script src="/admin/header.js"></script>

<!-- PAGE -->
<script src="/admin/admin-billing.js"></script>

</body>
</html>
