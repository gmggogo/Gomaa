<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Driver Schedule</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

/* ================= BASE ================= */

body{
  margin:0;
  font-family:'Segoe UI',Arial;
  background:#f3f4f6;
}

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.page-body{
  max-width:1400px;
  margin:auto;
  padding:220px 20px 40px;
}

.page-title{
  text-align:center;
  font-size:22px;
  font-weight:700;
  margin-bottom:20px;
  background:linear-gradient(90deg,#1e3a8a,#2563eb);
  color:#fff;
  padding:12px;
  border-radius:10px;
}

/* ================= CARD ================= */

.card{
  background:#fff;
  border-radius:12px;
  padding:15px;
}

/* ================= TABLE ================= */

.table-wrap{
  width:100%;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1100px;
}

th{
  background:#111827;
  color:#fff;
  padding:12px;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

/* ================= DRIVER NAME COLUMN (FIXED) ================= */

th:nth-child(2){
  background:#1d4ed8;
  color:#ffffff;
}

td:nth-child(2){
  background:#dbeafe;
  color:#1e3a8a;
  font-weight:700;
}

/* ================= CAR COLUMN (FIXED) ================= */

th:nth-child(3){
  background:#f59e0b;
  color:#111827;
}

td:nth-child(3){
  background:#fef3c7;
  color:#78350f;
  font-weight:700;
}

/* ================= GENERAL ================= */

td{
  border:1px solid #e5e7eb;
  padding:8px;
  text-align:center;
  font-size:13px;
}

tr:hover td{
  background:#f9fafb;
}

/* ================= INPUT ================= */

input{
  width:100%;
  height:28px;
  border:1px solid #cbd5e1;
  border-radius:5px;
  padding:4px 6px;
  font-size:12px;
}

input:disabled{
  background:#e5e7eb;
}

/* ================= WEEK ================= */

.week-box{
  display:flex;
  gap:4px;
  justify-content:center;
}

.day-square{
  width:50px;
  height:40px;
  border-radius:6px;
  border:1px solid #d1d5db;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:10px;
  cursor:pointer;
  background:#f3f4f6;
}

.day-square.active{
  background:#16a34a;
  color:#fff;
}

/* ================= SERVICES ================= */

select{
  padding:5px;
  border-radius:6px;
  border:1px solid #cbd5e1;
  font-size:12px;
  width:100%;
}

.service-tag{
  display:inline-block;
  padding:3px 6px;
  border-radius:6px;
  font-size:11px;
  margin:2px;
  background:#e5e7eb;
}

.service-tag.all{
  background:#16a34a;
  color:#fff;
}

/* ================= STATUS ================= */

.status-active{
  color:#16a34a;
  font-weight:800;
}

.status-off{
  color:#dc2626;
  font-weight:800;
}

/* ================= ACTION ================= */

.action-btn{
  border:none;
  border-radius:6px;
  padding:6px 10px;
  font-size:11px;
  cursor:pointer;
  margin:2px;
  font-weight:700;
}

.edit{background:#2563eb;color:#fff;}
.save{background:#16a34a;color:#fff;}
.disable{background:#dc2626;color:#fff;}
.enable{background:#f59e0b;color:#fff;}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="page-title">
Driver Schedule Management
</div>

<div class="card">

<div class="table-wrap">

<table>

<thead>
<tr>
<th>#</th>
<th>Driver Name</th>
<th>Car #</th>
<th>Phone</th>
<th>Address</th>
<th>Weekly</th>
<th>Services</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/driver-schedule.js"></script>

</body>
</html>
