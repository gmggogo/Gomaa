<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Driver Schedule</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

/* ================= BASE ================= */
body{
  margin:0;
  font-family:Arial;
  background:#f4f6fb;
}

.page-body{
  max-width:1400px;
  margin:auto;
  padding:160px 20px;
}

.page-title{
  text-align:center;
  background:#1e3a8a;
  color:#fff;
  padding:12px;
  font-weight:700;
  border-radius:10px;
  margin-bottom:15px;
}

/* ================= TABLE ================= */
table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

th{
  background:#111;
  color:#fff;
  padding:10px;
  font-size:13px;
}

td{
  border-bottom:1px solid #eee;
  padding:8px;
  text-align:center;
}

/* ================= DRIVER ================= */
.driver-name{
  background:#e8f0ff;
  font-weight:700;
  color:#1e3a8a;
}

/* ================= WEEK ================= */
.week{
  display:flex;
  gap:4px;
  justify-content:center;
}

.day{
  width:36px;
  height:30px;
  font-size:10px;
  border-radius:6px;
  border:1px solid #ccc;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.day.active{
  background:#16a34a;
  color:#fff;
}

/* ================= SERVICE ================= */
.service-badge{
  padding:5px 10px;
  border-radius:20px;
  background:#e5e7eb;
  font-size:11px;
  display:inline-block;
}

.service-badge.active{
  background:#16a34a;
  color:#fff;
}

/* ================= STATUS ================= */
.status{
  padding:4px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:700;
}

.status.on{
  background:#16a34a;
  color:#fff;
}

.status.off{
  background:#dc2626;
  color:#fff;
}

/* ================= INPUT ================= */
input,select{
  width:100%;
  padding:4px;
  border-radius:5px;
  border:1px solid #ccc;
}

/* ================= BUTTONS ================= */
.btn{
  padding:5px 10px;
  border:none;
  border-radius:6px;
  font-size:11px;
  cursor:pointer;
}

.edit{background:#2563eb;color:#fff;}
.save{background:#16a34a;color:#fff;}
.disable{background:#dc2626;color:#fff;}
.enable{background:#f59e0b;color:#fff;}

</style>

</head>

<body>

<div class="page-body">

  <div class="page-title">
    Driver Schedule Management
  </div>

  <table>

    <thead>
      <tr>
        <th>#</th>
        <th>Driver</th>
        <th>Car</th>
        <th>Phone</th>
        <th>Address</th>
        <th>Week</th>
        <th>Service</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="tbody"></tbody>

  </table>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/driver-schedule.js"></script>

</body>
</html>
