<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Driver Schedule</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

/* ================= BODY ================= */
body{
margin:0;
font-family:'Segoe UI',Arial;
background:#eef2f7;
}

/* ================= HEADER ================= */
#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
}

/* ================= PAGE ================= */
.page-body{
max-width:1400px;
margin:auto;
padding:200px 20px 40px;
}

@media(max-width:768px){
.page-body{
padding:260px 10px 40px;
}
}

/* ================= CARD ================= */
.card{
background:#ffffff;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
padding:15px;
}

/* ================= TITLE ================= */
.page-title{
font-size:20px;
font-weight:700;
margin-bottom:12px;
color:#0f172a;
}

/* ================= TABLE ================= */
.table-wrap{
width:100%;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1100px;
}

/* HEADER */
th{
background:#0f172a;
color:#fff;
padding:10px;
font-size:13px;
}

/* CELLS */
td{
border:1px solid #e5e7eb;
padding:8px;
text-align:center;
font-size:13px;
}

/* ROW HOVER */
tr:hover{
background:#f1f5f9;
}

/* ================= INPUT ================= */
input{
height:30px;
border:1px solid #cbd5e1;
border-radius:6px;
padding:4px 8px;
outline:none;
transition:0.2s;
}

input:focus{
border-color:#3b82f6;
box-shadow:0 0 0 2px rgba(59,130,246,0.2);
}

input:disabled{
background:#e5e7eb;
}

/* ================= WEEK ================= */
.week-box{
display:flex;
gap:6px;
}

.day-square{
width:64px;
height:46px;
border-radius:8px;
border:1px solid #d1d5db;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:10px;
cursor:pointer;
background:#f8fafc;
transition:0.2s;
}

.day-square:hover{
background:#e2e8f0;
}

.day-square.active{
background:#16a34a;
color:#fff;
border:none;
}

/* ================= STATUS ================= */
.status-active{
color:#16a34a;
font-weight:bold;
}

.status-inactive{
color:#dc2626;
font-weight:bold;
}

/* ================= BUTTONS ================= */
.action-btn{
border:none;
border-radius:6px;
padding:6px 10px;
font-size:11px;
cursor:pointer;
margin:2px;
font-weight:600;
transition:0.2s;
}

/* EDIT */
.edit{
background:#2563eb;
color:#fff;
}
.edit:hover{
background:#1d4ed8;
}

/* SAVE */
.save{
background:#16a34a;
color:#fff;
}
.save:hover{
background:#15803d;
}

/* DISABLE */
.disable{
background:#dc2626;
color:#fff;
}
.disable:hover{
background:#b91c1c;
}

/* ENABLE */
.enable{
background:#f59e0b;
color:#fff;
}
.enable:hover{
background:#d97706;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="card">

<div class="page-title">
Driver Weekly Schedule
</div>

<div class="table-wrap">

<table>

<thead>
<tr>
<th>#</th>
<th>Driver Name</th>
<th>Car #</th>
<th>Phone</th>
<th>Address</th>
<th id="weekTitle">Week</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/driver-schedule.js"></script>

</body>
</html>
