<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Driver Schedule</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
margin:0;
font-family:'Segoe UI',Arial;
background:#f3f4f6;
}

#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
}

.page-body{
max-width:1400px;
margin:auto;
padding:220px 20px 40px;
}

@media(max-width:768px){
.page-body{
padding:300px 10px 40px;
}
}

.table-wrap{
width:100%;
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
min-width:950px;
}

th{
background:#3f3f46;
color:#fff;
padding:8px;
font-size:13px;
}

td{
border:1px solid #d1d5db;
padding:6px;
text-align:center;
font-size:13px;
}

input{
height:26px;
border:1px solid #cbd5e1;
border-radius:4px;
padding:3px 6px;
}

input:disabled{
background:#e5e7eb;
}

.week-box{
display:flex;
gap:4px;
flex-wrap:nowrap;
}

.day-square{

width:60px;
height:44px;

border-radius:6px;
border:1px solid #d1d5db;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

font-size:10px;

cursor:pointer;
background:#f3f4f6;

}

.day-square.active{
background:#16a34a;
color:#fff;
}

.action-btn{
border:none;
border-radius:4px;
padding:4px 8px;
font-size:11px;
cursor:pointer;
margin-left:4px;
}

.edit{
background:#2563eb;
color:#fff;
}

.save{
background:#16a34a;
color:#fff;
}

.disable{
background:#dc2626;
color:#fff;
}

.enable{
background:#16a34a;
color:#fff;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="table-wrap">

<table>

<thead>

<tr>
<th>#</th>
<th>Driver Name</th>
<th>Phone</th>
<th>Address</th>
<th id="weekTitle">Week</th>
<th>Status</th>
<th>Action</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/driver-schedule.js"></script>

</body>
</html>
