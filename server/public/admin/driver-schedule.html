<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Driver Schedule</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

/* ===== PAGE ===== */

body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
background:#f3f4f6;
}


/* ===== HEADER ===== */

#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
}


/* ===== PAGE BODY ===== */

.page-body{

max-width:1500px;
margin:auto;

/* المسافة تحت الهيدر */
padding:220px 20px 40px;

}


/* ===== MOBILE HEADER SPACE ===== */

@media(max-width:768px){

.page-body{

padding:300px 10px 40px;

}

}


/* ===== TABLE WRAP (mobile scroll) ===== */

.table-wrap{

width:100%;
overflow-x:auto;

}


/* ===== TABLE ===== */

table{

width:100%;
border-collapse:collapse;
background:#fff;
min-width:900px;

}


/* ===== TABLE HEAD ===== */

th{

background:#3f3f46;
color:#fff;
font-size:13px;
padding:8px;
text-align:center;

}


/* ===== TABLE BODY ===== */

td{

border:1px solid #d1d5db;
padding:6px;
text-align:center;
font-size:13px;

}


/* ===== INPUT ===== */

input{

height:26px;
font-size:12px;
padding:2px 6px;
border-radius:4px;
border:1px solid #cbd5e1;

}


input:disabled{

background:#e5e7eb;

}


/* ===== WEEK BOX ===== */

.week-box{

display:flex;
gap:4px;
flex-wrap:wrap;
justify-content:center;

}


/* ===== DAY SQUARE ===== */

.day-square{

width:60px;
height:44px;

border-radius:6px;
border:1px solid #d1d5db;

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

font-size:10px;

cursor:pointer;
user-select:none;

background:#f3f4f6;

}


/* ===== ACTIVE DAY ===== */

.day-square.active{

background:#16a34a;
color:#fff;

}


/* ===== BUTTONS ===== */

.action-btn{

border:none;
border-radius:4px;
padding:4px 8px;
font-size:11px;
cursor:pointer;

}


.edit{

background:#2563eb;
color:#fff;

}


.save{

background:#16a34a;
color:#fff;

}


.disable{

background:#dc2626;
color:#fff;

}


.enable{

background:#16a34a;
color:#fff;

}

</style>

</head>



<body>


<!-- HEADER -->
<div id="adminHeader"></div>



<div class="page-body">


<div class="table-wrap">

<table>


<thead>

<tr>

<th>#</th>
<th>Driver Name</th>
<th>Phone</th>
<th>Address</th>

<th id="weekTitle">
Week
</th>

<th>Status</th>
<th>Action</th>

</tr>

</thead>


<tbody id="tbody"></tbody>


</table>

</div>


</div>



<script src="/admin/header.js"></script>
<script src="/admin/driver-schedule.js"></script>


</body>
</html>
