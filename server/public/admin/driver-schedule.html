<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Driver Schedule</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

/* ================= BASE ================= */

body{
  margin:0;
  font-family:Arial;
  background:#f3f4f6;
}

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.page-body{
  max-width:1400px;
  margin:auto;
  padding:220px 20px;
}

.page-title{
  text-align:center;
  background:#1e3a8a;
  color:#fff;
  padding:12px;
  font-weight:700;
  border-radius:10px;
}

/* ================= TABLE ================= */

table{
  width:100%;
  border-collapse:collapse;
  min-width:1100px;
  background:#fff;
}

/* 🔥 HEADER FULL BLACK */
th{
  background:#000;
  color:#fff;
  padding:10px;
  font-size:13px;
}

/* ================= DRIVER COLUMN ================= */

td.driver{
  background:#dbeafe;
  font-weight:700;
  color:#1e3a8a;
}

/* ================= CAR COLUMN ================= */

td.car{
  background:#fef3c7;
  font-weight:700;
  color:#78350f;
}

/* ================= CELLS ================= */

td{
  border:1px solid #e5e7eb;
  padding:8px;
  text-align:center;
}

/* ================= STATUS ================= */

.status-active{
  color:#16a34a;
  font-weight:700;
}

.status-off{
  color:#dc2626;
  font-weight:700;
}

/* ================= WEEK ================= */

.week{
  display:flex;
  gap:4px;
  justify-content:center;
}

.day{
  width:45px;
  height:38px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  background:#f3f4f6;
}

.day.active{
  background:#16a34a;
  color:#fff;
}

/* ================= SERVICES ================= */

.service-tag{
  display:inline-block;
  padding:3px 6px;
  border-radius:6px;
  font-size:11px;
  margin:2px;
  background:#e5e7eb;
}

.service-tag.all{
  background:#16a34a;
  color:#fff;
}

/* ================= INPUT ================= */

input{
  width:100%;
  padding:4px;
  border-radius:5px;
  border:1px solid #ccc;
}

/* ================= BUTTONS ================= */

.btn{
  padding:5px 10px;
  border:none;
  border-radius:6px;
  font-size:11px;
  cursor:pointer;
}

.edit{background:#2563eb;color:#fff;}
.save{background:#16a34a;color:#fff;}
.disable{background:#dc2626;color:#fff;}
.enable{background:#f59e0b;color:#fff;}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="page-title">Driver Schedule Management</div>

<table>

<thead>
<tr>
<th>#</th>
<th>Driver Name</th>
<th>Car #</th>
<th>Phone</th>
<th>Address</th>
<th>Weekly</th>
<th>Services</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/driver-schedule.js"></script>

</body>
</html>
