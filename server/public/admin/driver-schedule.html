<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Driver Schedule</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

body{
margin:0;
background:#f3f4f6;
font-family:Arial,Helvetica,sans-serif;
}

/* ===== HEADER PLACE ===== */

#adminHeader{
position:fixed;
top:0;
left:0;
width:100%;
z-index:1000;
}

/* ===== PAGE BODY ===== */

.page-body{
padding-top:260px;
padding-left:20px;
padding-right:20px;
max-width:1400px;
margin:auto;
}

/* MOBILE */

@media(max-width:768px){

.page-body{
padding-top:320px;
padding-left:10px;
padding-right:10px;
}

}

/* ===== TABLE ===== */

table{
width:100%;
border-collapse:collapse;
background:#fff;
}

th,td{
border:1px solid #d1d5db;
padding:6px;
text-align:center;
font-size:13px;
}

th{
background:#3f3f46;
color:#fff;
}

/* WEEK GRID */

.week-box{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

/* DAY SQUARE */

.day-box{
border:1px solid #d1d5db;
padding:4px;
border-radius:6px;
font-size:10px;
background:#e5e7eb;
cursor:pointer;
}

.day-box.active{
background:#16a34a;
color:#fff;
}

/* INPUT */

input[disabled]{
background:#e5e7eb;
}

/* BUTTONS */

.action-btn{
border:none;
padding:5px 10px;
border-radius:6px;
font-size:12px;
font-weight:bold;
cursor:pointer;
}

.edit{background:#2563eb;color:#fff}
.save{background:#16a34a;color:#fff}
.disable{background:#dc2626;color:#fff}
.enable{background:#16a34a;color:#fff}

.row-disabled{
opacity:.4;
pointer-events:none;
}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<table>

<thead>
<tr>
<th>#</th>
<th>Driver Name</th>
<th>Phone</th>
<th>Address</th>
<th id="weekTitle"></th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/driver-schedule.js"></script>

</body>
</html>
