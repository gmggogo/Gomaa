<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Driver Schedule</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/admin/style.css">

<style>

/* ================= BASE ================= */

body{
  margin:0;
  font-family:'Segoe UI',Arial;
  background:#f3f4f6;
}

#adminHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:999;
}

.page-body{
  max-width:1400px;
  margin:auto;
  padding:220px 20px 40px;
}

.page-title{
  text-align:center;
  font-size:22px;
  font-weight:700;
  margin-bottom:20px;
  background:linear-gradient(to right,#1e3a8a,#2563eb);
  color:#fff;
  padding:12px;
  border-radius:10px;
}

/* ================= CARD ================= */

.card{
  background:#fff;
  border-radius:12px;
  padding:15px;
}

/* ================= TABLE ================= */

.table-wrap{
  width:100%;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1100px;
}

th{
  background:#0f172a;
  color:#fff;
  padding:10px;
  font-size:13px;
}

td{
  border:1px solid #e5e7eb;
  padding:6px;
  text-align:center;
  font-size:13px;
  transition:0.2s;
}

/* ================= COLUMN COLORS ================= */

th:nth-child(2), td:nth-child(2){
  background:#eff6ff;
  color:#1e3a8a;
  font-weight:600;
}

th:nth-child(3), td:nth-child(3){
  background:#fef3c7;
  color:#92400e;
  font-weight:600;
}

/* ================= HOVER ================= */

tr:hover td{
  background:#f9fafb;
}

/* ================= INPUT ================= */

input{
  height:26px;
  border:1px solid #cbd5e1;
  border-radius:4px;
  padding:3px 6px;
}

input:disabled{
  background:#e5e7eb;
}

/* ================= WEEK ================= */

.week-box{
  display:flex;
  gap:4px;
}

.day-square{
  width:60px;
  height:44px;
  border-radius:6px;
  border:1px solid #d1d5db;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-size:10px;
  cursor:pointer;
  background:#f3f4f6;
}

.day-square.active{
  background:#16a34a;
  color:#fff;
}

/* ================= SERVICES ================= */

.service-select{
  width:100%;
  padding:5px;
  border:1px solid #cbd5e1;
  border-radius:6px;
  font-size:12px;
}

.service-tags{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  justify-content:center;
}

.tag{
  background:#e2e8f0;
  padding:3px 6px;
  border-radius:6px;
  font-size:11px;
}

.tag.all{
  background:#16a34a;
  color:#fff;
}

/* ================= BUTTONS ================= */

.action-btn{
  border:none;
  border-radius:6px;
  padding:5px 10px;
  font-size:11px;
  cursor:pointer;
  margin-left:4px;
  font-weight:600;
}

.edit{background:#2563eb;color:#fff;}
.save{background:#16a34a;color:#fff;}
.disable{background:#dc2626;color:#fff;}
.enable{background:#16a34a;color:#fff;}

</style>

</head>

<body>

<div id="adminHeader"></div>

<div class="page-body">

<div class="page-title">
Driver Schedule Management
</div>

<div class="card">

<div class="table-wrap">

<table>

<thead>
<tr>
<th>#</th>
<th>Driver Name</th>
<th>Car #</th>
<th>Phone</th>
<th>Address</th>
<th>Weekly</th>
<th>Services</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

</div>

<script src="/admin/header.js"></script>
<script src="/admin/driver-schedule.js"></script>

</body>
</html>
