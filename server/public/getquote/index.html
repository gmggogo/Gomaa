<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f8fafc;margin:0;color:#111827}
.page{max-width:900px;margin:auto;padding:15px}

/* MOBILE */
@media(max-width:600px){
  .page{padding:10px}
  h1{font-size:22px}
  #map{height:250px}
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:#fff;
  border-radius:16px;
  padding:20px;
  text-align:center;
  position:relative;
}

.lang-btn{
  position:absolute;
  right:10px;
  top:10px;
  background:#fff;
  color:#111;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
}

/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  padding:15px;
  margin-top:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08)
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:10px;
  font-size:16px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  margin-top:8px;
}

.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#22c55e;color:#fff}
.btn-stop{background:#f97316;color:#fff}

/* STOP */
.stop-row{
  display:flex;
  gap:6px;
}

.remove-btn{
  background:#ef4444;
  color:#fff;
  padding:10px;
  border-radius:10px;
}

/* MAP */
#map{
  height:300px;
  border-radius:12px;
}

/* CARDS */
.quote-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:15px
}

.quote-grid div{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.quote-grid b{
  display:block;
  margin-top:6px;
  font-size:18px;
}

/* COLORS */
#distance{color:#60a5fa;text-shadow:0 0 10px #60a5fa;}
#time{color:#fb923c;text-shadow:0 0 10px #fb923c;}
#price{color:#4ade80;text-shadow:0 0 15px #4ade80;}
#stopsCount{color:#facc15;text-shadow:0 0 10px #facc15;}

/* 🔥 الزرار ينور ويطفي فعلاً */
.btn-success.active{
  animation:blinkBtn 0.7s infinite;
}

@keyframes blinkBtn{
  0%{opacity:1; box-shadow:0 0 0px #22c55e;}
  50%{opacity:0.5; box-shadow:0 0 25px #22c55e;}
  100%{opacity:1; box-shadow:0 0 0px #22c55e;}
}

.hidden{display:none}

.pricing{
  margin-top:12px;
  font-size:14px;
  line-height:1.6;
}
</style>
</head>

<body>

<!-- نفس HTML بتاعك بدون تغيير -->

<!-- (اختصارًا: سيب باقي الكود زي ما هو بالظبط اللي انت بعته) -->

</body>
</html>
