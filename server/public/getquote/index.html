<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Get Quote – Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{font-family:Arial;background:#f8fafc;margin:0;color:#111827}
.page{max-width:980px;margin:auto;padding:18px}
.hero{background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#fff;border-radius:16px;padding:18px;margin-bottom:16px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px}
input{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-bottom:10px}
button{padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin-top:8px}
.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#22c55e;color:#fff}
.quote-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
#map{height:350px;border-radius:12px;margin-top:10px}
.suggestions{position:absolute;background:#fff;border:1px solid #ccc;z-index:9999;width:100%}
.option{padding:10px;cursor:pointer}
.option:hover{background:#eee}
.option.disabled{background:#f3f4f6}
.hidden{display:none}
</style>
</head>

<body>

<div class="page">

<div class="hero">
<h1>Get Quote</h1>
</div>

<div class="card">

<label>Pickup</label>
<div style="position:relative">
<input id="pickup">
</div>

<div id="stops"></div>
<button onclick="addStop()">+ Stop</button>

<label>Dropoff</label>
<div style="position:relative">
<input id="dropoff">
</div>

<button class="btn-primary" onclick="calculate()">Calculate</button>
<button class="btn-success" id="bookBtn" disabled>Book</button>

<div id="priceBox" class="hidden">
<div class="quote-grid">
<div>Distance <br><b id="distance"></b></div>
<div>Stops <br><b id="stopsCount"></b></div>
<div>Time <br><b id="time"></b></div>
<div>Price <br><b id="price"></b></div>
</div>
</div>

</div>

<div class="card">
<div id="map"></div>
</div>

</div>

<script>
let map, directionsService, directionsRenderer, geocoder, autocomplete;

const pickupInput = document.getElementById("pickup");
const dropoffInput = document.getElementById("dropoff");

const OPEN = 20;
const PER_MILE = 2;
const STOP_PRICE = 5;

let selected = {pickup:null, dropoff:null};

/* ================= GOOGLE INIT ================= */

function initGoogle(){
  map = new google.maps.Map(document.getElementById("map"), {
    center:{lat:33.4484,lng:-112.0740},
    zoom:11
  });

  geocoder = new google.maps.Geocoder();
  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({map});
  autocomplete = new google.maps.places.AutocompleteService();
}

/* ================= INPUT ================= */

function attachInput(input,type){
  input.addEventListener("input", ()=> {
    selected[type]=null;
  });

  input.addEventListener("blur", async ()=>{
    let val=input.value.trim();
    if(!val) return;

    let geo=await geocode(val);

    if(!geo){
      showSuggestions(input,type);
    }else{
      selected[type]=geo;
    }
  });
}

/* ================= SUGGESTIONS ================= */

function showSuggestions(input,type){
  let box=document.createElement("div");
  box.className="suggestions";

  autocomplete.getPlacePredictions({input:input.value},(res)=>{
    if(!res) return;

    box.innerHTML='<div class="option disabled">Choose correct address</div>';

    res.slice(0,5).forEach(p=>{
      let d=document.createElement("div");
      d.className="option";
      d.innerText=p.description;

      d.onclick=async ()=>{
        input.value=p.description;
        let geo=await geocode(p.description);
        selected[type]=geo;
        box.remove();
      };

      box.appendChild(d);
    });

    input.parentNode.appendChild(box);
  });
}

/* ================= GEOCODE ================= */

function geocode(address){
  return new Promise(resolve=>{
    geocoder.geocode({address},(res,status)=>{
      if(status!=="OK") return resolve(null);

      let r=res[0];

      resolve({
        address:r.formatted_address,
        lat:r.geometry.location.lat(),
        lng:r.geometry.location.lng()
      });
    });
  });
}

/* ================= STOPS ================= */

function addStop(){
  let input=document.createElement("input");
  input.placeholder="Stop";

  attachInput(input,"stop_"+Date.now());

  document.getElementById("stops").appendChild(input);
}

/* ================= CALCULATE ================= */

async function calculate(){

  let pickup = selected.pickup || await geocode(pickupInput.value);
  let drop   = selected.dropoff || await geocode(dropoffInput.value);

  if(!pickup || !drop){
    alert("Fix address");
    return;
  }

  let points=[pickup];

  for (const i of document.querySelectorAll("#stops input")) {
    let geo = await geocode(i.value);
    if (geo) points.push(geo);
  }

  points.push(drop);

  directionsService.route({
    origin:points[0],
    destination:points[points.length-1],
    waypoints:points.slice(1,-1).map(p=>({location:p})),
    travelMode:"DRIVING"
  },(res,status)=>{

    if(status!=="OK") return alert("Route error");

    directionsRenderer.setDirections(res);

    let meters=0,sec=0;

    res.routes[0].legs.forEach(l=>{
      meters+=l.distance.value;
      sec+=l.duration.value;
    });

    let miles=meters/1609;
    let mins=Math.round(sec/60);
    let stops=points.length-2;

    let price=OPEN+(miles*PER_MILE)+(stops*STOP_PRICE);

    distance.innerText=miles.toFixed(2)+" mi";
    stopsCount.innerText=stops;
    time.innerText=mins+" min";
    price.innerText="$"+price.toFixed(2);

    priceBox.classList.remove("hidden");
    bookBtn.disabled=false;
  });
}

/* ================= LOAD GOOGLE ================= */

async function loadGoogle(){
  const res = await fetch("/api/config");
  const data = await res.json();

  const s = document.createElement("script");
  s.src = `https://maps.googleapis.com/maps/api/js?key=${data.googleKey}&libraries=places`;
  s.async = true;

  document.head.appendChild(s);

  s.onload = ()=>{
    initGoogle();
    attachInput(pickupInput,"pickup");
    attachInput(dropoffInput,"dropoff");
  };
}

window.onload=loadGoogle;
</script>

</body>
</html>
