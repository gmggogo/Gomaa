<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f8fafc;margin:0;color:#111827}
.page{max-width:900px;margin:auto;padding:20px}
.hero{background:linear-gradient(135deg,#0f172a,#2563eb);color:#fff;border-radius:16px;padding:20px;text-align:center;position:relative}
.lang-btn{position:absolute;right:15px;top:15px;background:#fff;color:#111;padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:bold}
.pricing{margin-top:12px;font-size:14px;line-height:1.6}
.card{background:#fff;border-radius:16px;padding:20px;margin-top:20px;box-shadow:0 5px 15px rgba(0,0,0,0.08)}
input{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-bottom:10px}
button{padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin-top:10px}
.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#22c55e;color:#fff}
.btn-stop{background:#f97316;color:#fff}
.stop-row{display:flex;gap:8px}
.stop-row input{flex:1}
.remove-btn{background:#ef4444;color:#fff;padding:10px;border-radius:10px;cursor:pointer}
#map{height:350px;border-radius:12px;margin-top:10px}
.quote-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:15px}
.hidden{display:none}
@media(max-width:768px){.quote-grid{grid-template-columns:repeat(2,1fr)}.lang-btn{position:static;display:inline-block;margin-bottom:10px}}
</style>
</head>

<body>

<div class="page">

<div class="hero">
<div class="lang-btn" onclick="toggleLang()" id="langBtn">English / Spanish</div>
<h1 id="title">Get Quote</h1>

<div id="payTitle" style="margin-top:10px;font-weight:bold;font-size:15px">
Payment Calculation
</div>

<div class="pricing" id="pricing">
Base Fare: $20 (includes first 5 miles)<br>
Extra Mile: $2 per mile after 5 miles<br>
Stop: $5 each<br>
Waiting: 10 minutes after pickup time<br>
Cancellation: $15 within 2 hours
</div>
</div>

<div class="card">

<label id="pickupLabel">Pickup</label>
<input id="pickup">

<div id="stops"></div>

<button class="btn-stop" onclick="addStop()" id="addStopBtn">+ Add Stop</button>

<label id="dropLabel">Dropoff</label>
<input id="dropoff">

<button class="btn-primary" onclick="calculate()" id="calcBtn">Calculate</button>
<button class="btn-success" id="bookBtn" disabled onclick="bookTrip()">Book</button>

<div id="priceBox" class="hidden">
<div class="quote-grid">
<div><span id="distanceLabel">Distance</span><br><b id="distance"></b></div>
<div><span id="stopsLabel">Stops</span><br><b id="stopsCount"></b></div>
<div><span id="timeLabel">Time</span><br><b id="time"></b></div>
<div><span id="priceLabel">Price</span><br><b id="price">$0</b></div>
</div>
</div>

</div>

<div class="card">
<div id="map"></div>
</div>

</div>

<script>
let lang="en";

function toggleLang(){
  if(lang==="en"){
    lang="es";
    document.getElementById("langBtn").innerText="Spanish / English";
    document.getElementById("title").innerText="Cotizar Viaje";
    document.getElementById("payTitle").innerText="Cálculo de Pago";
    document.getElementById("pickupLabel").innerText="Origen";
    document.getElementById("dropLabel").innerText="Destino";
    document.getElementById("addStopBtn").innerText="+ Parada";
    document.getElementById("calcBtn").innerText="Calcular";
    document.getElementById("bookBtn").innerText="Reservar";
    document.getElementById("distanceLabel").innerText="Distancia";
    document.getElementById("stopsLabel").innerText="Paradas";
    document.getElementById("timeLabel").innerText="Tiempo";
    document.getElementById("priceLabel").innerText="Precio";

    document.getElementById("pricing").innerHTML=`
Tarifa base: $20 (incluye primeras 5 millas)<br>
Milla extra: $2 por milla después de 5<br>
Parada: $5 cada una<br>
Espera: 10 minutos después de la hora de recogida<br>
Cancelación: $15 dentro de 2 horas
`;

    document.querySelectorAll(".stop-row input").forEach(i=>i.placeholder="Parada");

  }else{
    lang="en";
    document.getElementById("langBtn").innerText="English / Spanish";
    document.getElementById("title").innerText="Get Quote";
    document.getElementById("payTitle").innerText="Payment Calculation";
    document.getElementById("pickupLabel").innerText="Pickup";
    document.getElementById("dropLabel").innerText="Dropoff";
    document.getElementById("addStopBtn").innerText="+ Add Stop";
    document.getElementById("calcBtn").innerText="Calculate";
    document.getElementById("bookBtn").innerText="Book";
    document.getElementById("distanceLabel").innerText="Distance";
    document.getElementById("stopsLabel").innerText="Stops";
    document.getElementById("timeLabel").innerText="Time";
    document.getElementById("priceLabel").innerText="Price";

    document.getElementById("pricing").innerHTML=`
Base Fare: $20 (includes first 5 miles)<br>
Extra Mile: $2 per mile after 5 miles<br>
Stop: $5 each<br>
Waiting: 10 minutes after pickup time<br>
Cancellation: $15 within 2 hours
`;

    document.querySelectorAll(".stop-row input").forEach(i=>i.placeholder="Stop");
  }
}

let map, directionsService, directionsRenderer;

const OPEN = 20;
const PER_MILE = 2;
const STOP_PRICE = 5;

function initGoogle(){
  map = new google.maps.Map(document.getElementById("map"), {
    center:{lat:33.4484,lng:-112.0740},
    zoom:11
  });

  directionsService = new google.maps.DirectionsService();

  directionsRenderer = new google.maps.DirectionsRenderer({
    map,
    polylineOptions:{
      strokeColor:"#2563eb",
      strokeWeight:5
    }
  });
}

function addStop(){
  const row = document.createElement("div");
  row.className = "stop-row";

  const input = document.createElement("input");
  input.placeholder = lang==="es" ? "Parada" : "Stop";

  const remove = document.createElement("button");
  remove.innerText = "X";
  remove.className = "remove-btn";

  remove.onclick = () => row.remove();

  row.appendChild(input);
  row.appendChild(remove);

  document.getElementById("stops").appendChild(row);
}

function fixAZ(address){
  address = String(address || "").trim();
  if(address === "") return "";
  if(!address.toLowerCase().includes("arizona") && !address.toLowerCase().includes("az")){
    return address + ", Arizona";
  }
  return address;
}

function calculate(){
  let pickupVal = fixAZ(document.getElementById("pickup").value);
  let dropVal = fixAZ(document.getElementById("dropoff").value);

  if(!pickupVal || !dropVal){
    alert(lang==="es" ? "Ingrese una dirección válida" : "Enter valid address");
    return;
  }

  const stopsInputs = Array.from(document.querySelectorAll(".stop-row input"))
    .filter(i => i.value.trim())
    .map(i => ({ location: fixAZ(i.value) }));

  directionsService.route({
    origin: pickupVal,
    destination: dropVal,
    waypoints: stopsInputs,
    optimizeWaypoints:false,
    travelMode:"DRIVING",
    drivingOptions:{
      departureTime:new Date(),
      trafficModel:"bestguess"
    }
  }, (res, status)=>{

    if(status !== "OK"){
      alert(lang==="es" ? "Dirección no válida" : "Address not valid");
      return;
    }

    directionsRenderer.setDirections(res);

    let meters=0, sec=0;

    res.routes[0].legs.forEach(l=>{
      meters+=l.distance.value;
      sec+=l.duration.value;
    });

    let miles = meters/1609;
    let mins = Math.round(sec/60);
    let stops = stopsInputs.length;

    let extraMiles = Math.max(0, miles - 5);
    let totalPrice = OPEN + (extraMiles * PER_MILE) + (stops * STOP_PRICE);

    document.getElementById("distance").innerText = miles.toFixed(2)+" mi";
    document.getElementById("stopsCount").innerText = stops;
    document.getElementById("time").innerText = mins+" min";
    document.getElementById("price").innerText = "$"+totalPrice.toFixed(2);

    document.getElementById("priceBox").classList.remove("hidden");
    document.getElementById("bookBtn").disabled=false;
  });
}

function bookTrip(){
  const stops = [];
  document.querySelectorAll(".stop-row input").forEach(i=>{
    if(i.value.trim()) stops.push(i.value.trim());
  });

  const trip = {
    pickup: document.getElementById("pickup").value,
    dropoff: document.getElementById("dropoff").value,
    stops,
    distance: document.getElementById("distance").innerText,
    time: document.getElementById("time").innerText,
    price: document.getElementById("price").innerText
  };

  localStorage.setItem("pendingTrip", JSON.stringify(trip));
  window.location.href="/booking/index.html";
}

async function loadGoogle(){
  const res = await fetch("/api/config");
  const data = await res.json();

  const script = document.createElement("script");
  script.src = `https://maps.googleapis.com/maps/api/js?key=${data.googleKey}`;
  script.async = true;

  document.head.appendChild(script);
  script.onload = initGoogle;
}

window.onload = loadGoogle;
</script>

</body>
</html>
