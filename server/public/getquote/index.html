<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f8fafc;margin:0;color:#111827}
.page{max-width:900px;margin:auto;padding:15px}

/* MOBILE */
@media(max-width:600px){
  .page{padding:10px}
  h1{font-size:22px}
  #map{height:250px}
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:#fff;
  border-radius:16px;
  padding:20px;
  text-align:center;
  position:relative;
}

.lang-btn{
  position:absolute;
  right:10px;
  top:10px;
  background:#fff;
  color:#111;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
}

/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  padding:15px;
  margin-top:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08)
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:10px;
  font-size:16px;
  box-sizing:border-box;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  margin-top:8px;
  cursor:pointer;
}

.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#22c55e;color:#fff}
.btn-stop{background:#f97316;color:#fff}

/* VEHICLE */
.vehicle-pricing{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:12px;
}

.vehicle-option{
  background:linear-gradient(135deg,#f8fafc,#e2e8f0);
  border:2px solid #e5e7eb;
  border-radius:16px;
  padding:14px;
  text-align:center;
  cursor:pointer;
  transition:0.25s;
}

.vehicle-option.active{
  border-color:#2563eb;
  background:linear-gradient(135deg,#eff6ff,#dbeafe);
  box-shadow:0 0 20px rgba(37,99,235,0.35);
  transform:scale(1.03);
}

.vehicle-option img{
  width:70px;
  height:45px;
  object-fit:contain;
  margin:0 auto 6px;
  display:block;
}

.vehicle-emoji{
  font-size:42px;
  height:45px;
  line-height:45px;
  margin-bottom:6px;
}

.vehicle-option b{
  display:block;
  font-size:15px;
  margin-bottom:4px;
}

.vehicle-option span{
  display:block;
  font-size:13px;
  color:#374151;
}

/* STOP */
.stop-row{
  display:flex;
  gap:6px;
}

.remove-btn{
  background:#ef4444;
  color:#fff;
  padding:10px;
  border-radius:10px;
  width:55px;
  margin-top:0;
  margin-bottom:10px;
}

/* MAP */
#map{
  height:300px;
  border-radius:12px;
}

/* RESULT CARDS */
.quote-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:15px
}

.quote-grid div{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.quote-grid b{
  display:block;
  margin-top:6px;
  font-size:18px;
}

/* COLORS */
#distance{color:#60a5fa;text-shadow:0 0 10px #60a5fa;}
#time{color:#fb923c;text-shadow:0 0 10px #fb923c;}
#price{color:#4ade80;text-shadow:0 0 15px #4ade80;}
#stopsCount{color:#facc15;text-shadow:0 0 10px #facc15;}

/* BOOK BUTTON BLINK */
.btn-success.active{
  animation:blinkBtn 0.7s infinite;
}

@keyframes blinkBtn{
  0%{opacity:1;box-shadow:0 0 0px #22c55e;}
  50%{opacity:0.45;box-shadow:0 0 28px #22c55e,0 0 40px #22c55e;}
  100%{opacity:1;box-shadow:0 0 0px #22c55e;}
}

.hidden{display:none}

.pricing{
  margin-top:12px;
  font-size:14px;
  line-height:1.6;
}

.loading-services{
  text-align:center;
  padding:20px;
  color:#64748b;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="page">

<div class="hero">

<div class="lang-btn" onclick="toggleLang()" id="langBtn">English / Spanish</div>

<h1 id="title">Get Quote</h1>

<div style="margin-top:10px;font-weight:bold;font-size:15px">
Payment Calculation
</div>

<div class="pricing" id="pricing">
<b>Prices are controlled from Service Management</b><br>
Select a service below to calculate your quote.<br>
Stops, No Show, and Cancellation fees are based on admin settings.
</div>

</div>

<div class="card">

<div class="vehicle-pricing" id="vehicleContainer">
  <div class="loading-services">Loading services...</div>
</div>

<label id="pickupLabel">Pickup</label>
<input id="pickup">

<div id="stops"></div>

<button class="btn-stop" onclick="addStop()">+ Add Stop</button>

<label id="dropLabel">Dropoff</label>
<input id="dropoff">

<button class="btn-primary" onclick="calculate()">Calculate</button>

<button class="btn-success hidden" id="bookBtn" onclick="bookTrip()">Booking Now</button>

<div id="priceBox" class="hidden">
<div class="quote-grid">
<div>Distance<b id="distance"></b></div>
<div>Stops<b id="stopsCount"></b></div>
<div>Time<b id="time"></b></div>
<div>Price<b id="price">$0</b></div>
</div>
</div>

</div>

<div class="card">
<div id="map"></div>
</div>

</div>

<script>

let lang = "en";

let selectedService = null;
let selectedServiceData = null;
let servicesData = [];

let map;
let directionsService;
let directionsRenderer;

/* =========================
   SERVICE ICONS / IMAGES
========================= */

function getServiceImage(serviceKey){

  if(serviceKey === "STANDARD"){
    return "11.jpeg";
  }

  if(serviceKey === "XL"){
    return "10.jpeg";
  }

  return "";
}

function getServiceEmoji(serviceKey){

  if(serviceKey === "STANDARD") return "🚗";
  if(serviceKey === "XL") return "🚐";
  if(serviceKey === "TAXI") return "🚕";
  if(serviceKey === "LIMO") return "🖤";
  if(serviceKey === "WHEELCHAIR") return "🦽";
  if(serviceKey === "AIRPORT") return "✈️";

  return "🚘";
}

/* =========================
   LOAD SERVICES
========================= */

async function loadServices(){

  const container =
    document.getElementById("vehicleContainer");

  try{

    const res =
      await fetch("/api/services");

    const data =
      await res.json();

    servicesData =
      Array.isArray(data)
        ? data
        : [];

    const visibleServices =
      servicesData.filter(service=>{

        const key =
          String(service.serviceKey || "")
            .toUpperCase();

        if(key === "SHARED"){
          return false;
        }

        return service.enabled === true;

      });

    container.innerHTML = "";

    if(visibleServices.length === 0){

      container.innerHTML = `
        <div class="loading-services">
          No services available
        </div>
      `;

      return;
    }

    visibleServices.forEach(service=>{

      const serviceKey =
        String(service.serviceKey || "")
          .toUpperCase();

      const title =
        service.title ||
        service.name ||
        serviceKey;

      const image =
        getServiceImage(serviceKey);

      const emoji =
        getServiceEmoji(serviceKey);

      const baseFare =
        Number(service.baseFare || 0);

      const includedMiles =
        Number(service.includedMiles || 0);

      const perMile =
        Number(service.perMile || 0);

      const hourlyRate =
        Number(service.hourlyRate || 0);

      const sharedPrice =
        Number(service.sharedPrice || 0);

      const pricingMode =
        String(service.pricingMode || "PER_MILE");

      const card =
        document.createElement("div");

      card.className = "vehicle-option";

      let mediaHtml = "";

      if(image){
        mediaHtml = `<img src="${image}">`;
      }else{
        mediaHtml = `<div class="vehicle-emoji">${emoji}</div>`;
      }

      let priceLines = "";

      if(pricingMode === "HOURLY"){

        priceLines = `
          <span>$${hourlyRate} / hour</span>
        `;

      }else if(pricingMode === "SHARED"){

        priceLines = `
          <span>$${sharedPrice} shared price</span>
        `;

      }else{

        priceLines = `
          <span>$${baseFare} base</span>
          <span>$${perMile} / mile after ${includedMiles} miles</span>
        `;

      }

      card.innerHTML = `
        ${mediaHtml}
        <b>${title}</b>
        ${priceLines}
      `;

      card.onclick = function(){

        selectService(
          service,
          card
        );

      };

      container.appendChild(card);

    });

  }catch(err){

    console.log(err);

    container.innerHTML = `
      <div class="loading-services">
        Failed to load services
      </div>
    `;

  }

}

/* =========================
   SELECT SERVICE
========================= */

function selectService(service, card){

  selectedServiceData = service;

  selectedService =
    String(service.serviceKey || "")
      .toUpperCase();

  document
    .querySelectorAll(".vehicle-option")
    .forEach(el=>{
      el.classList.remove("active");
    });

  card.classList.add("active");

  resetUI();

}

/* =========================
   LANGUAGE
========================= */

function toggleLang(){

  if(lang==="en"){

    lang="es";

    langBtn.innerText="Spanish / English";
    title.innerText="Cotizar Viaje";
    pickupLabel.innerText="Origen";
    dropLabel.innerText="Destino";

    pricing.innerHTML=`
<b>Los precios se controlan desde Service Management</b><br>
Seleccione un servicio para calcular su viaje.<br>
Paradas, No Show y cancelación dependen de la configuración del admin.
`;

  }else{

    lang="en";

    langBtn.innerText="English / Spanish";
    title.innerText="Get Quote";
    pickupLabel.innerText="Pickup";
    dropLabel.innerText="Dropoff";

    pricing.innerHTML=`
<b>Prices are controlled from Service Management</b><br>
Select a service below to calculate your quote.<br>
Stops, No Show, and Cancellation fees are based on admin settings.
`;

  }

}

/* =========================
   GOOGLE MAP
========================= */

function initGoogle(){

  map =
    new google.maps.Map(
      document.getElementById("map"),
      {
        center:{
          lat:33.4484,
          lng:-112.0740
        },
        zoom:11
      }
    );

  directionsService =
    new google.maps.DirectionsService();

  directionsRenderer =
    new google.maps.DirectionsRenderer({
      map,
      polylineOptions:{
        strokeColor:"#2563eb",
        strokeWeight:5
      }
    });

}

/* =========================
   STOPS
========================= */

function addStop(){

  const row =
    document.createElement("div");

  row.className = "stop-row";

  const input =
    document.createElement("input");

  input.placeholder =
    lang==="es"
      ? "Parada"
      : "Stop";

  input.addEventListener(
    "input",
    resetUI
  );

  const remove =
    document.createElement("button");

  remove.innerText = "X";
  remove.className = "remove-btn";

  remove.onclick = function(){

    row.remove();

    resetUI();

  };

  row.appendChild(input);
  row.appendChild(remove);

  document
    .getElementById("stops")
    .appendChild(row);

}

/* =========================
   RESET
========================= */

function resetUI(){

  bookBtn.classList.add("hidden");
  bookBtn.classList.remove("active");
  priceBox.classList.add("hidden");

}

pickup.addEventListener("input", resetUI);
dropoff.addEventListener("input", resetUI);

/* =========================
   FIX ARIZONA
========================= */

function fixAZ(address){

  address =
    String(address || "")
      .trim();

  if(address === ""){
    return "";
  }

  if(
    !address
      .toLowerCase()
      .includes("arizona")
  ){
    return address + ", Arizona";
  }

  return address;

}

/* =========================
   CALCULATE
========================= */

function calculate(){

  if(!selectedService){

    alert(
      lang === "en"
        ? "Select service type"
        : "Seleccione el tipo de servicio"
    );

    return;

  }

  const pickupVal =
    fixAZ(pickup.value);

  const dropVal =
    fixAZ(dropoff.value);

  if(!pickupVal || !dropVal){

    alert(
      lang === "en"
        ? "Enter valid address"
        : "Ingrese una dirección válida"
    );

    return;

  }

  const stopsInputs =
    Array
      .from(
        document.querySelectorAll(
          ".stop-row input"
        )
      )
      .filter(i=>i.value)
      .map(i=>({
        location:fixAZ(i.value)
      }));

  directionsService.route({

    origin:pickupVal,
    destination:dropVal,
    waypoints:stopsInputs,
    travelMode:"DRIVING",

    drivingOptions:{
      departureTime:new Date(),
      trafficModel:"bestguess"
    }

  }, async function(res,status){

    if(status !== "OK"){

      alert(
        lang === "en"
          ? "Address not valid"
          : "Dirección no válida"
      );

      return;

    }

    directionsRenderer.setDirections(res);

    let meters = 0;
    let sec = 0;

    res.routes[0].legs.forEach(l=>{

      meters += l.distance.value;
      sec += l.duration.value;

    });

    const miles =
      meters / 1609;

    const mins =
      Math.round(sec / 60);

    const stops =
      stopsInputs.length;

    try{

      const pricingRes =
        await fetch(
          "/api/pricing/calculate",
          {
            method:"POST",

            headers:{
              "Content-Type":"application/json"
            },

            body:JSON.stringify({
              serviceKey:selectedService,
              miles:miles,
              stops:stops
            })
          }
        );

      const pricingData =
        await pricingRes.json();

      if(!pricingData.success){

        alert(
          lang === "en"
            ? "Pricing error"
            : "Error de precio"
        );

        return;

      }

      const totalPrice =
        Number(pricingData.total || 0);

      distance.innerText =
        miles.toFixed(2) + " mi";

      stopsCount.innerText =
        stops;

      time.innerText =
        mins + " min";

      price.innerText =
        "$" + totalPrice.toFixed(2);

      priceBox.classList.remove("hidden");

      bookBtn.classList.remove("hidden");
      bookBtn.classList.add("active");

    }catch(err){

      console.log(err);

      alert(
        lang === "en"
          ? "Server pricing failed"
          : "Falló el precio del servidor"
      );

    }

  });

}

/* =========================
   BOOK
========================= */

function bookTrip(){

  const stops = [];

  document
    .querySelectorAll(".stop-row input")
    .forEach(i=>{

      if(i.value){
        stops.push(i.value);
      }

    });

  let vehicleType =
    "standard";

  let vehicleTypeFromQuote =
    "X";

  let vehicleName =
    selectedServiceData?.title ||
    selectedService ||
    "";

  if(selectedService === "XL"){

    vehicleType =
      "minivan";

    vehicleTypeFromQuote =
      "XL";

  }

  if(selectedService === "STANDARD"){

    vehicleType =
      "standard";

    vehicleTypeFromQuote =
      "X";

  }

  const trip = {

    serviceKey:
      selectedService,

    serviceTitle:
      selectedServiceData?.title || "",

    vehicleType:
      vehicleType,

    vehicleTypeFromQuote:
      vehicleTypeFromQuote,

    vehicleName:
      vehicleName,

    pickup:
      pickup.value,

    dropoff:
      dropoff.value,

    stops,

    distance:
      distance.innerText,

    time:
      time.innerText,

    price:
      price.innerText

  };

  localStorage.setItem(
    "pendingTrip",
    JSON.stringify(trip)
  );

  window.location.href =
    "/booking/index.html";

}

/* =========================
   LOAD GOOGLE
========================= */

async function loadGoogle(){

  const res =
    await fetch("/api/config");

  const data =
    await res.json();

  const script =
    document.createElement("script");

  script.src =
    `https://maps.googleapis.com/maps/api/js?key=${data.googleKey}`;

  script.async = true;

  document.head.appendChild(script);

  script.onload =
    initGoogle;

}

/* =========================
   START
========================= */

window.onload = async function(){

  await loadServices();

  await loadGoogle();

};

</script>

</body>
</html>
