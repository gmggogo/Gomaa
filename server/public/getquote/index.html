<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Get Quote – Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box}

body{
  font-family:Arial;
  background:#f3f6fb;
  margin:0;
  color:#111827
}

.page{
  max-width:900px;
  margin:auto;
  padding:20px
}

/* ===== HEADER ===== */
.hero{
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:#fff;
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  text-align:center
}

.hero h1{
  margin:0;
  font-size:26px;
}

.rules{
  margin-top:10px;
  font-size:14px;
  line-height:1.6;
  opacity:.95
}

.lang{
  margin-top:10px;
  font-size:12px;
  opacity:.8
}

/* ===== CARD ===== */
.card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08)
}

input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:10px;
}

/* ===== BUTTONS ===== */
button{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.btn-primary{
  background:#2563eb;
  color:#fff;
}

.btn-success{
  background:#22c55e;
  color:#fff;
}

/* 🔥 STOP BUTTON */
.btn-stop{
  background:#f97316;
  color:#fff;
}

/* ===== MAP ===== */
#map{
  height:350px;
  border-radius:12px;
  margin-top:10px
}

/* ===== RESULT ===== */
.quote-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:15px;
  text-align:center;
}

.hidden{display:none}

</style>
</head>

<body>

<div class="page">

<div class="hero">
  <h1>Get Quote</h1>

  <div class="rules">
    Base fare: $20 (includes first 5 miles)<br>
    Extra mile: $2 per mile after 5 miles<br>
    Stop: $5 each<br>
    Waiting time: 10 minutes<br>
    Cancellation: $15 within 2 hours
  </div>

  <div class="lang">English | Spanish</div>
</div>

<div class="card">

<label>Pickup</label>
<input id="pickup">

<div id="stops"></div>

<button class="btn-stop" onclick="addStop()">+ Add Stop</button>

<label>Dropoff</label>
<input id="dropoff">

<button class="btn-primary" onclick="calculate()">Calculate</button>
<button class="btn-success" id="bookBtn" disabled onclick="bookTrip()">Book</button>

<div id="priceBox" class="hidden">
  <div class="quote-grid">
    <div>Distance<br><b id="distance"></b></div>
    <div>Stops<br><b id="stopsCount"></b></div>
    <div>Time<br><b id="time"></b></div>
    <div>Price<br><b id="price">$0</b></div>
  </div>
</div>

</div>

<div class="card">
  <div id="map"></div>
</div>

</div>

<script>

let map, directionsService, directionsRenderer;

let selected = {pickup:null, dropoff:null};

/* ================= GOOGLE ================= */

function initGoogle(){

  map = new google.maps.Map(document.getElementById("map"), {
    center:{lat:33.4484,lng:-112.0740},
    zoom:11
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({map});

  const pickupAuto = new google.maps.places.Autocomplete(
    document.getElementById("pickup")
  );

  const dropAuto = new google.maps.places.Autocomplete(
    document.getElementById("dropoff")
  );

  pickupAuto.addListener("place_changed", ()=>{
    const p = pickupAuto.getPlace();
    if(!p.geometry) return;

    selected.pickup = {
      lat: p.geometry.location.lat(),
      lng: p.geometry.location.lng()
    };
  });

  dropAuto.addListener("place_changed", ()=>{
    const p = dropAuto.getPlace();
    if(!p.geometry) return;

    selected.dropoff = {
      lat: p.geometry.location.lat(),
      lng: p.geometry.location.lng()
    };
  });
}

/* ================= STOPS ================= */

function addStop(){
  const input = document.createElement("input");
  input.placeholder = "Stop";

  const auto = new google.maps.places.Autocomplete(input);

  auto.addListener("place_changed", ()=>{
    const p = auto.getPlace();
    input.dataset.lat = p.geometry.location.lat();
    input.dataset.lng = p.geometry.location.lng();
  });

  document.getElementById("stops").appendChild(input);
}

/* ================= CALCULATE ================= */

function calculate(){

  if(!selected.pickup || !selected.dropoff){
    alert("Please choose valid addresses from suggestions");
    return;
  }

  let points=[selected.pickup];

  document.querySelectorAll("#stops input").forEach(i=>{
    if(i.dataset.lat){
      points.push({
        lat:Number(i.dataset.lat),
        lng:Number(i.dataset.lng)
      });
    }
  });

  points.push(selected.dropoff);

  directionsService.route({
    origin:points[0],
    destination:points[points.length-1],
    waypoints:points.slice(1,-1).map(p=>({location:p})),
    optimizeWaypoints:false,
    travelMode:"DRIVING"
  },(res,status)=>{

    if(status!=="OK"){
      alert("Route error");
      return;
    }

    directionsRenderer.setDirections(res);

    let meters=0,sec=0;

    res.routes[0].legs.forEach(l=>{
      meters+=l.distance.value;
      sec+=l.duration.value;
    });

    let miles=meters/1609;
    let mins=Math.round(sec/60);
    let stops=points.length-2;

    /* 💰 السعر الصح */
    let price = 20;

    if(miles > 5){
      price += (miles - 5) * 2;
    }

    price += stops * 5;

    document.getElementById("distance").innerText = miles.toFixed(2)+" mi";
    document.getElementById("stopsCount").innerText = stops;
    document.getElementById("time").innerText = mins+" min";
    document.getElementById("price").innerText = "$"+price.toFixed(2);

    document.getElementById("priceBox").classList.remove("hidden");
    document.getElementById("bookBtn").disabled=false;

  });
}

/* ================= BOOK ================= */

function bookTrip(){

  const data = {
    pickup: document.getElementById("pickup").value,
    dropoff: document.getElementById("dropoff").value,
    stops: Array.from(document.querySelectorAll("#stops input")).map(i=>i.value),
    price: document.getElementById("price").innerText
  };

  localStorage.setItem("tripData", JSON.stringify(data));

  alert("Trip saved ✔");
}

/* ================= LOAD GOOGLE ================= */

async function loadGoogle(){

  const res = await fetch("/api/config");
  const data = await res.json();

  const script = document.createElement("script");
  script.src = `https://maps.googleapis.com/maps/api/js?key=${data.googleKey}&libraries=places`;
  script.async = true;

  document.head.appendChild(script);

  script.onload = initGoogle;
}

window.onload = loadGoogle;

</script>

</body>
</html>
