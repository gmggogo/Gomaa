<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f8fafc;margin:0;color:#111827}
.page{max-width:900px;margin:auto;padding:20px}

.hero{
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:#fff;
  border-radius:16px;
  padding:20px;
  text-align:center;
  position:relative;
}

.lang-btn{
  position:absolute;
  right:15px;
  top:15px;
  background:#fff;
  color:#111;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  font-weight:bold;
}

.pricing{
  margin-top:12px;
  font-size:14px;
  line-height:1.6;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08)
}

input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:10px
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px
}

.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#22c55e;color:#fff}
.btn-stop{background:#f97316;color:#fff}

.stop-row{
  display:flex;
  gap:8px;
}

.stop-row input{
  flex:1;
}

.remove-btn{
  background:#ef4444;
  color:#fff;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

#map{height:350px;border-radius:12px;margin-top:10px}

.quote-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-top:15px
}

.quote-box{
  background:#2563eb;
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.quote-box.price{
  background:#16a34a;
}

.quote-title{font-size:13px}
.quote-value{font-size:18px;font-weight:bold}

.hidden{display:none}

.pulse{
  animation:pulseAnim 1.2s infinite;
}

@keyframes pulseAnim{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,0.7);transform:scale(1)}
  50%{box-shadow:0 0 0 14px rgba(34,197,94,0);transform:scale(1.05)}
  100%{box-shadow:0 0 0 0 rgba(34,197,94,0);transform:scale(1)}
}
</style>
</head>

<body>

<div class="page">

<div class="hero">
<div class="lang-btn" onclick="toggleLang()" id="langBtn">English / Spanish</div>

<h1 id="title">Get Quote</h1>

<div style="margin-top:10px;font-weight:bold">Payment Calculation</div>

<div class="pricing" id="pricing">
Base Fare: $20 (includes first 5 miles)<br>
Extra Mile: $2 per mile<br>
Stop: $5 each<br>
Cancellation: $15 within 2 hours
</div>
</div>

<div class="card">

<label id="pickupLabel">Pickup</label>
<input id="pickup">

<div id="stops"></div>

<button class="btn-stop" onclick="addStop()">+ Add Stop</button>

<label id="dropLabel">Dropoff</label>
<input id="dropoff">

<button class="btn-primary" onclick="calculate()">Calculate</button>

<button class="btn-success hidden pulse" id="bookBtn" onclick="bookTrip()">Book Now</button>

<div id="priceBox" class="hidden">
<div class="quote-grid">

<div class="quote-box">
<div class="quote-title" id="distanceLabel">Distance</div>
<div class="quote-value" id="distance"></div>
</div>

<div class="quote-box">
<div class="quote-title" id="stopsLabel">Stops</div>
<div class="quote-value" id="stopsCount"></div>
</div>

<div class="quote-box">
<div class="quote-title" id="timeLabel">Time</div>
<div class="quote-value" id="time"></div>
</div>

<div class="quote-box price">
<div class="quote-title" id="priceLabel">Price</div>
<div class="quote-value" id="price">$0</div>
</div>

</div>
</div>

</div>

<div class="card">
<div id="map"></div>
</div>

</div>

<script>

/* LANGUAGE */
let lang="en";

function toggleLang(){

  const title = document.getElementById("title");
  const pickupLabel = document.getElementById("pickupLabel");
  const dropLabel = document.getElementById("dropLabel");
  const pricing = document.getElementById("pricing");

  const distanceLabel = document.getElementById("distanceLabel");
  const stopsLabel = document.getElementById("stopsLabel");
  const timeLabel = document.getElementById("timeLabel");
  const priceLabel = document.getElementById("priceLabel");

  const langBtn = document.getElementById("langBtn");

  if(lang==="en"){
    lang="es";

    langBtn.innerText="Spanish / English";
    title.innerText="Cotizar Viaje";

    pickupLabel.innerText="Origen";
    dropLabel.innerText="Destino";

    distanceLabel.innerText="Distancia";
    stopsLabel.innerText="Paradas";
    timeLabel.innerText="Tiempo";
    priceLabel.innerText="Precio";

    pricing.innerHTML=`
Tarifa base: $20 (incluye 5 millas)<br>
Milla extra: $2 por milla<br>
Parada: $5 cada una<br>
Cancelación: $15 dentro de 2 horas
`;

  }else{
    lang="en";

    langBtn.innerText="English / Spanish";
    title.innerText="Get Quote";

    pickupLabel.innerText="Pickup";
    dropLabel.innerText="Dropoff";

    distanceLabel.innerText="Distance";
    stopsLabel.innerText="Stops";
    timeLabel.innerText="Time";
    priceLabel.innerText="Price";

    pricing.innerHTML=`
Base Fare: $20 (includes first 5 miles)<br>
Extra Mile: $2 per mile<br>
Stop: $5 each<br>
Cancellation: $15 within 2 hours
`;
  }
}

/* باقي الكود زي ما هو عندك */

</script>

</body>
</html>
