<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Get Quote – Sunbeam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{font-family:Arial;background:#f8fafc;margin:0}
.page{max-width:900px;margin:auto;padding:15px}
.hero{background:#1d4ed8;color:#fff;padding:20px;border-radius:12px}
.card{background:#fff;padding:15px;border-radius:12px;margin-top:15px}
input{width:100%;padding:12px;margin-top:6px;border-radius:8px;border:1px solid #ccc}
button{padding:12px;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#22c55e}
.toolbar{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
#map{height:300px;margin-top:15px;border-radius:12px}
.suggestions{background:#fff;border:1px solid #ccc;position:absolute;width:100%;z-index:999}
.option{padding:8px;cursor:pointer}
.option:hover{background:#eee}
</style>
</head>

<body>

<div class="page">

<div class="hero">
<h2>Get Quote</h2>
</div>

<div class="card">

<label>Pickup</label>
<div style="position:relative">
<input id="pickup">
<div class="suggestions" id="pickupSug"></div>
</div>

<label>Dropoff</label>
<div style="position:relative">
<input id="dropoff">
<div class="suggestions" id="dropoffSug"></div>
</div>

<div id="stops"></div>

<div class="toolbar">
<button onclick="addStop()">+ Stop</button>
<button class="btn-primary" onclick="calculate()">Calculate</button>
<button class="btn-success" id="bookBtn" disabled>Book</button>
</div>

<div id="result"></div>

</div>

<div class="card">
<div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([33.45,-112.07],10);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let markers=[],routeLine=null;

function clearMap(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  if(routeLine) map.removeLayer(routeLine);
}

async function geocode(address){
  const res = await fetch(
    "https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(address)+"&format=json&limit=1",
    {headers:{"User-Agent":"sunbeam"}}
  );
  const data = await res.json();
  if(!data.length) return null;
  return {
    lat:+data[0].lat,
    lng:+data[0].lon,
    name:data[0].display_name
  }
}

async function search(q){
  if(q.length<3) return [];
  const res = await fetch(
    "https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(q)+"&format=json&limit=5",
    {headers:{"User-Agent":"sunbeam"}}
  );
  return await res.json();
}

function attach(input,sug){
  input.addEventListener("input", async ()=>{
    const list = await search(input.value);
    sug.innerHTML="";
    list.forEach(i=>{
      const d=document.createElement("div");
      d.className="option";
      d.innerText=i.display_name;
      d.onclick=()=>{
        input.value=i.display_name;
        sug.innerHTML="";
      };
      sug.appendChild(d);
    });
  });
}

attach(pickup,pickupSug);
attach(dropoff,dropoffSug);

function addStop(){
  const div=document.createElement("div");
  div.innerHTML='<input class="stop">';
  stops.appendChild(div);
}

async function route(points){
  const coords=points.map(p=>p.lng+","+p.lat).join(";");
  const res=await fetch("https://router.project-osrm.org/route/v1/driving/"+coords+"?overview=full&geometries=geojson");
  const data=await res.json();
  const r=data.routes[0];
  return {
    dist:r.distance/1609,
    dur:r.duration/60,
    coords:r.geometry.coordinates.map(c=>[c[1],c[0]])
  }
}

async function calculate(){

  clearMap();

  const p = await geocode(pickup.value);
  const d = await geocode(dropoff.value);

  if(!p||!d){alert("invalid address");return;}

  const stopsArr=[];
  document.querySelectorAll(".stop").forEach(async s=>{
    if(s.value){
      const g=await geocode(s.value);
      if(g) stopsArr.push(g);
    }
  });

  const points=[p,...stopsArr,d];

  const r=await route(points);

  routeLine=L.polyline(r.coords).addTo(map);
  map.fitBounds(routeLine.getBounds());

  let price=30;
  if(r.dist>10) price+=(r.dist-10)*2;

  document.getElementById("result").innerHTML=
    "Distance: "+r.dist.toFixed(2)+" mi<br>"+
    "Time: "+Math.round(r.dur)+" min<br>"+
    "Price: $"+price.toFixed(2);

  document.getElementById("bookBtn").disabled=false;
}

</script>

</body>
</html>
