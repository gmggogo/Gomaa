<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  font-family:Arial,sans-serif;
  background:#f8fafc;
  margin:0;
  color:#111827;
}

.page{
  max-width:900px;
  margin:auto;
  padding:15px;
}

@media(max-width:600px){

  .page{
    padding:10px;
  }

  h1{
    font-size:24px;
  }

  #map{
    height:250px;
  }

}

/* ================= HERO ================= */

.hero{
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:#fff;
  border-radius:20px;
  padding:22px;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.lang-btn{
  position:absolute;
  right:12px;
  top:12px;
  background:#fff;
  color:#111;
  padding:7px 12px;
  border-radius:10px;
  font-size:12px;
  cursor:pointer;
  font-weight:bold;
}

/* ================= TOP PRICING ================= */

.pricing-bar{
  margin-top:18px;
}

.pricing-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.pricing-item{
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.18);
  border-radius:15px;
  padding:12px;
  backdrop-filter:blur(6px);
  transition:.25s;
}

.pricing-item.active{
  border:2px solid #fff;
  background:rgba(255,255,255,.18);
  box-shadow:0 0 22px rgba(255,255,255,.25);
  transform:scale(1.02);
}

.pricing-last{
  grid-column:1 / -1;
  width:48%;
  margin:auto;
}

.pricing-title{
  font-size:15px;
  font-weight:900;
  margin-bottom:8px;
  text-align:center;
}

.pricing-row{
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-size:12px;
  padding:3px 0;
}

.pricing-label{
  opacity:.85;
}

.pricing-value{
  font-weight:800;
  color:#fff;
}

@media(max-width:600px){

  .pricing-grid{
    grid-template-columns:1fr;
  }

  .pricing-last{
    width:100%;
  }

}

/* ================= CARD ================= */

.card{
  background:#fff;
  border-radius:18px;
  padding:15px;
  margin-top:15px;
  box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

/* ================= INPUT ================= */

input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:10px;
  font-size:16px;
  box-sizing:border-box;
}

/* ================= BUTTON ================= */

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  margin-top:8px;
  cursor:pointer;
  transition:.25s;
}

.btn-primary{
  background:#2563eb;
  color:#fff;
}

.btn-success{
  background:#22c55e;
  color:#fff;
}

.btn-stop{
  background:#f97316;
  color:#fff;
}

/* ================= VEHICLES ================= */

.vehicle-pricing{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:14px;
}

.vehicle-option{
  background:linear-gradient(135deg,#f8fafc,#e2e8f0);
  border:2px solid #e5e7eb;
  border-radius:16px;
  padding:12px;
  text-align:center;
  cursor:pointer;
  transition:.25s;
}

.vehicle-option.active{
  border-color:#2563eb;
  background:linear-gradient(135deg,#eff6ff,#dbeafe);
  box-shadow:0 0 18px rgba(37,99,235,.30);
  transform:scale(1.03);
}

.vehicle-option img{
  width:62px;
  height:40px;
  object-fit:contain;
  margin:auto;
  display:block;
  margin-bottom:6px;
}

.vehicle-emoji{
  font-size:34px;
  margin-bottom:6px;
}

.vehicle-option b{
  display:block;
  font-size:14px;
}

.vehicle-last{
  grid-column:1 / -1;
  width:48%;
  margin:auto;
}

@media(max-width:600px){

  .vehicle-last{
    width:100%;
  }

}

/* ================= STOP ================= */

.stop-row{
  display:flex;
  gap:6px;
}

.remove-btn{
  background:#ef4444;
  color:#fff;
  width:55px;
  margin-top:0;
  margin-bottom:10px;
}

/* ================= MAP ================= */

#map{
  height:300px;
  border-radius:14px;
}

/* ================= RESULT ================= */

.quote-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:15px;
}

.quote-grid div{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
}

.quote-grid b{
  display:block;
  margin-top:6px;
  font-size:20px;
}

#distance{
  color:#60a5fa;
}

#time{
  color:#fb923c;
}

#price{
  color:#4ade80;
}

#stopsCount{
  color:#facc15;
}

.hidden{
  display:none;
}

.loading-services{
  text-align:center;
  padding:20px;
  color:#fff;
}

.btn-success.active{
  animation:blinkBtn .7s infinite;
}

@keyframes blinkBtn{

  0%{
    opacity:1;
  }

  50%{
    opacity:.5;
    box-shadow:0 0 25px #22c55e;
  }

  100%{
    opacity:1;
  }

}

</style>
</head>

<body>

<div class="page">

<div class="hero">

<div
class="lang-btn"
onclick="toggleLang()"
id="langBtn"
>
English / Spanish
</div>

<h1 id="title">
Get Quote
</h1>

<div
style="
margin-top:10px;
font-weight:bold;
font-size:15px;
"
>
Payment Calculation
</div>

<div
class="pricing-bar"
id="pricing"
>
Loading Services...
</div>

</div>

<div class="card">

<div
class="vehicle-pricing"
id="vehicleContainer"
>
<div class="loading-services">
Loading...
</div>
</div>

<label id="pickupLabel">
Pickup
</label>

<input id="pickup">

<div id="stops"></div>

<button
class="btn-stop"
onclick="addStop()"
>
+ Add Stop
</button>

<label id="dropLabel">
Dropoff
</label>

<input id="dropoff">

<button
class="btn-primary"
onclick="calculate()"
>
Calculate
</button>

<button
class="btn-success hidden"
id="bookBtn"
onclick="bookTrip()"
>
Booking Now
</button>

<div
id="priceBox"
class="hidden"
>

<div class="quote-grid">

<div>
Distance
<b id="distance"></b>
</div>

<div>
Stops
<b id="stopsCount"></b>
</div>

<div>
Time
<b id="time"></b>
</div>

<div>
Price
<b id="price">$0</b>
</div>

</div>

</div>

</div>

<div class="card">
<div id="map"></div>
</div>

</div>

<script>

let lang = "en";

let selectedService = null;
let selectedServiceData = null;
let servicesData = [];

let map;
let directionsService;
let directionsRenderer;

/* =========================
   IMAGES
========================= */

function getServiceImage(serviceKey){

  if(serviceKey === "STANDARD"){
    return "11.jpeg";
  }

  if(serviceKey === "XL"){
    return "10.jpeg";
  }

  return "";

}

function getServiceEmoji(serviceKey){

  if(serviceKey === "STANDARD") return "🚗";
  if(serviceKey === "XL") return "🚐";
  if(serviceKey === "TAXI") return "🚕";
  if(serviceKey === "LIMO") return "🚘";
  if(serviceKey === "WHEELCHAIR") return "🦽";

  return "🚘";

}

/* =========================
   LOAD SERVICES
========================= */

async function loadServices(){

  const container =
  document.getElementById(
    "vehicleContainer"
  );

  const pricingBox =
  document.getElementById(
    "pricing"
  );

  try{

    const res =
    await fetch("/api/services");

    const data =
    await res.json();

    servicesData =
    Array.isArray(data)
    ? data
    : [];

    const visibleServices =
    servicesData.filter(service=>{

      const key =
      String(
        service.serviceKey || ""
      ).toUpperCase();

      if(key === "SHARED"){
        return false;
      }

      return service.enabled === true;

    });

/* =========================
   PRICING TABLE
========================= */

pricingBox.innerHTML = `

<div class="pricing-grid">

${visibleServices.map((service,index)=>{

const mode =
String(
service.pricingMode || ""
).toUpperCase();

const title =
service.title || "";

let rows = "";

if(mode === "HOURLY"){

rows = `

<div class="pricing-row">
<div class="pricing-label">
Hourly
</div>

<div class="pricing-value">
$${Number(service.hourlyRate || 0)}/h
</div>
</div>

`;

}else{

rows = `

<div class="pricing-row">
<div class="pricing-label">
Base
</div>

<div class="pricing-value">
$${Number(service.baseFare || 0)}
</div>
</div>

<div class="pricing-row">
<div class="pricing-label">
Per Mile
</div>

<div class="pricing-value">
$${Number(service.perMile || 0)}
</div>
</div>

`;

}

return `

<div
class="
pricing-item
${index === 4 ? "pricing-last" : ""}
"
id="price-card-${service.serviceKey}"
>

<div class="pricing-title">
${title}
</div>

${rows}

<div class="pricing-row">
<div class="pricing-label">
Waiting
</div>

<div class="pricing-value">
15m
</div>
</div>

<div class="pricing-row">
<div class="pricing-label">
No Show
</div>

<div class="pricing-value">
$${Number(service.noShowFee || 0)}
</div>
</div>

<div class="pricing-row">
<div class="pricing-label">
Cancel
</div>

<div class="pricing-value">
$15
</div>
</div>

</div>

`;

}).join("")}

</div>

`;

/* =========================
   VEHICLES
========================= */

container.innerHTML = "";

visibleServices.forEach((service,index)=>{

const serviceKey =
String(
service.serviceKey || ""
).toUpperCase();

const title =
service.title ||
serviceKey;

const image =
getServiceImage(serviceKey);

const emoji =
getServiceEmoji(serviceKey);

const card =
document.createElement("div");

card.className =
`
vehicle-option
${index === 4 ? "vehicle-last" : ""}
`;

let mediaHtml = "";

if(image){

mediaHtml =
`<img src="${image}">`;

}else{

mediaHtml =
`
<div class="vehicle-emoji">
${emoji}
</div>
`;

}

card.innerHTML = `
${mediaHtml}
<b>${title}</b>
`;

card.onclick = function(){

selectService(
service,
card
);

};

container.appendChild(card);

});

}catch(err){

console.log(err);

}

}

/* =========================
   SELECT
========================= */

function selectService(service,card){

selectedServiceData = service;

selectedService =
String(
service.serviceKey || ""
).toUpperCase();

document
.querySelectorAll(".vehicle-option")
.forEach(el=>{
  el.classList.remove("active");
});

card.classList.add("active");

document
.querySelectorAll(".pricing-item")
.forEach(el=>{
  el.classList.remove("active");
});

const selectedPriceCard =
document.getElementById(
`price-card-${selectedService}`
);

if(selectedPriceCard){
selectedPriceCard.classList.add("active");
}

resetUI();

}

/* =========================
   LANGUAGE
========================= */

function toggleLang(){

if(lang==="en"){

lang="es";

langBtn.innerText =
"Spanish / English";

title.innerText =
"Cotizar Viaje";

pickupLabel.innerText =
"Origen";

dropLabel.innerText =
"Destino";

}else{

lang="en";

langBtn.innerText =
"English / Spanish";

title.innerText =
"Get Quote";

pickupLabel.innerText =
"Pickup";

dropLabel.innerText =
"Dropoff";

}

}

/* =========================
   MAP
========================= */

function initGoogle(){

map =
new google.maps.Map(
document.getElementById("map"),
{
center:{
lat:33.4484,
lng:-112.0740
},

zoom:11,

mapTypeControl:true,

fullscreenControl:true,

streetViewControl:false
}
);

directionsService =
new google.maps.DirectionsService();

directionsRenderer =
new google.maps.DirectionsRenderer({

suppressMarkers:false,

preserveViewport:false,

polylineOptions:{
strokeColor:"#2563eb",
strokeOpacity:1,
strokeWeight:6
}

});

directionsRenderer.setMap(map);

}

/* =========================
   STOPS
========================= */

function addStop(){

const row =
document.createElement("div");

row.className =
"stop-row";

const input =
document.createElement("input");

input.placeholder =
lang==="es"
? "Parada"
: "Stop";

input.addEventListener(
"input",
resetUI
);

const remove =
document.createElement("button");

remove.innerText = "X";

remove.className =
"remove-btn";

remove.onclick = function(){

row.remove();

resetUI();

};

row.appendChild(input);
row.appendChild(remove);

document
.getElementById("stops")
.appendChild(row);

}

/* =========================
   RESET
========================= */

function resetUI(){

bookBtn.classList.add("hidden");

bookBtn.classList.remove("active");

priceBox.classList.add("hidden");

}

pickup.addEventListener(
"input",
resetUI
);

dropoff.addEventListener(
"input",
resetUI
);

/* =========================
   FIX AZ
========================= */

function fixAZ(address){

address =
String(address || "")
.trim();

if(address === ""){
return "";
}

if(
!address
.toLowerCase()
.includes("arizona")
){
return address + ", Arizona";
}

return address;

}

/* =========================
   CALCULATE
========================= */

function calculate(){

if(!selectedService){

alert("Select service");
return;

}

const pickupVal =
fixAZ(pickup.value);

const dropVal =
fixAZ(dropoff.value);

if(!pickupVal || !dropVal){

alert("Enter valid address");
return;

}

const stopsInputs =
Array
.from(
document.querySelectorAll(
".stop-row input"
)
)
.filter(i=>i.value)
.map(i=>({
location:fixAZ(i.value)
}));

directionsService.route({

origin:pickupVal,

destination:dropVal,

waypoints:stopsInputs,

travelMode:"DRIVING",

drivingOptions:{
departureTime:new Date(),
trafficModel:"bestguess"
}

}, async function(res,status){

if(status !== "OK"){

alert("Address not valid");
return;

}

directionsRenderer.setDirections(res);

const bounds =
new google.maps.LatLngBounds();

res.routes[0].legs.forEach(leg=>{

bounds.extend(
leg.start_location
);

bounds.extend(
leg.end_location
);

});

map.fitBounds(bounds);

let meters = 0;
let sec = 0;

res.routes[0].legs.forEach(l=>{

meters += l.distance.value;
sec += l.duration.value;

});

const miles =
meters / 1609;

const mins =
Math.round(sec / 60);

const stops =
stopsInputs.length;

try{

const pricingRes =
await fetch(
"/api/pricing/calculate",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

serviceKey:
selectedService,

miles:miles,

minutes:mins,

stops:stops

})
}
);

const pricingData =
await pricingRes.json();

if(!pricingData.success){

alert("Pricing error");
return;

}

const pricingMode =
String(
pricingData.pricingMode || ""
).toUpperCase();

let totalPrice = 0;

/* =========================
   HOURLY
========================= */

if(pricingMode === "HOURLY"){

const hourlyRate =
Number(
pricingData.service?.hourlyRate || 0
);

const hours =
Math.max(
1,
Math.ceil(mins / 60)
);

totalPrice =
hours * hourlyRate;

}

/* =========================
   PER MILE
========================= */

else{

totalPrice =
Number(
pricingData.total || 0
);

}

/* =========================
   SHOW
========================= */

distance.innerText =
miles.toFixed(2) + " mi";

stopsCount.innerText =
stops;

time.innerText =
mins + " min";

price.innerText =
"$" +
Number(totalPrice).toFixed(2);

priceBox.classList.remove("hidden");

bookBtn.classList.remove("hidden");

bookBtn.classList.add("active");

}catch(err){

console.log(err);

alert("Server pricing failed");

}

});

}

/* =========================
   BOOK
========================= */

function bookTrip(){

window.location.href =
"/booking/index.html";

}

/* =========================
   GOOGLE
========================= */

async function loadGoogle(){

const res =
await fetch("/api/config");

const data =
await res.json();

const script =
document.createElement("script");

script.src =
`https://maps.googleapis.com/maps/api/js?key=${data.googleKey}`;

script.async = true;

document.head.appendChild(script);

script.onload =
initGoogle;

}

/* =========================
   START
========================= */

window.onload = async function(){

await loadServices();

await loadGoogle();

};

</script>

</body>
</html>
