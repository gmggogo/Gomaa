<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f8fafc;margin:0;color:#111827}
.page{max-width:900px;margin:auto;padding:20px}

.hero{
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:#fff;
  border-radius:16px;
  padding:20px;
  text-align:center;
  position:relative;
}

.lang-btn{
  position:absolute;
  right:15px;
  top:15px;
  background:#fff;
  color:#111;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  font-weight:bold;
}

.pricing{
  margin-top:12px;
  font-size:14px;
  line-height:1.6;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08)
}

input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:10px
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px
}

.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#22c55e;color:#fff}
.btn-stop{background:#f97316;color:#fff}

.stop-row{
  display:flex;
  gap:8px;
}

.stop-row input{
  flex:1;
}

.remove-btn{
  background:#ef4444;
  color:#fff;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

#map{height:350px;border-radius:12px;margin-top:10px}

/* 🔥 quote boxes */
.quote-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-top:15px
}

.quote-box{
  background:#2563eb;
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.quote-box.price{
  background:#16a34a;
}

.quote-title{
  font-size:13px;
}

.quote-value{
  font-size:18px;
  font-weight:bold;
}

.hidden{display:none}

/* 🔥 Book button animation */
.pulse{
  animation:pulseAnim 1.2s infinite;
}

@keyframes pulseAnim{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,0.7);transform:scale(1)}
  50%{box-shadow:0 0 0 14px rgba(34,197,94,0);transform:scale(1.05)}
  100%{box-shadow:0 0 0 0 rgba(34,197,94,0);transform:scale(1)}
}
</style>
</head>

<body>

<div class="page">

<div class="hero">
<div class="lang-btn" onclick="toggleLang()" id="langBtn">English / Spanish</div>

<h1 id="title">Get Quote</h1>

<div style="margin-top:10px;font-weight:bold">Payment Calculation</div>

<div class="pricing">
Base Fare: $20 (includes first 5 miles)<br>
Extra Mile: $2 per mile<br>
Stop: $5 each<br>
Cancellation: $15 within 2 hours
</div>
</div>

<div class="card">

<label>Pickup</label>
<input id="pickup">

<div id="stops"></div>

<button class="btn-stop" onclick="addStop()">+ Add Stop</button>

<label>Dropoff</label>
<input id="dropoff">

<button class="btn-primary" onclick="calculate()">Calculate</button>

<!-- 🔥 زرار Book -->
<button class="btn-success hidden pulse" id="bookBtn" onclick="bookTrip()">Book Now</button>

<div id="priceBox" class="hidden">
<div class="quote-grid">

<div class="quote-box">
<div class="quote-title">Distance</div>
<div class="quote-value" id="distance"></div>
</div>

<div class="quote-box">
<div class="quote-title">Stops</div>
<div class="quote-value" id="stopsCount"></div>
</div>

<div class="quote-box">
<div class="quote-title">Time</div>
<div class="quote-value" id="time"></div>
</div>

<div class="quote-box price">
<div class="quote-title">Price</div>
<div class="quote-value" id="price">$0</div>
</div>

</div>
</div>

</div>

<div class="card">
<div id="map"></div>
</div>

</div>

<script>

/* RESET */
function resetUI(){
  priceBox.classList.add("hidden");
  bookBtn.classList.add("hidden");
}

/* MAP */
let map, directionsService, directionsRenderer;

const OPEN = 20;
const PER_MILE = 2;
const STOP_PRICE = 5;

function initGoogle(){
  map = new google.maps.Map(document.getElementById("map"), {
    center:{lat:33.4484,lng:-112.0740},
    zoom:11
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({map});
}

/* STOP */
function addStop(){
  const row = document.createElement("div");
  row.className = "stop-row";

  const input = document.createElement("input");
  input.placeholder = "Stop";
  input.addEventListener("input", resetUI);

  const remove = document.createElement("button");
  remove.innerText = "X";
  remove.className = "remove-btn";

  remove.onclick = () => {row.remove();resetUI();};

  row.appendChild(input);
  row.appendChild(remove);
  stops.appendChild(row);
}

/* FIX AZ */
function fixAZ(address){
  if(!address.toLowerCase().includes("arizona")){
    return address + ", Arizona";
  }
  return address;
}

/* CALCULATE */
function calculate(){

  let pickupVal = fixAZ(pickup.value);
  let dropVal = fixAZ(dropoff.value);

  if(!pickupVal || !dropVal){
    alert("Enter valid address");
    return;
  }

  const stopsInputs = Array.from(document.querySelectorAll(".stop-row input"))
    .filter(i=>i.value)
    .map(i=>({location:fixAZ(i.value)}));

  directionsService.route({
    origin:pickupVal,
    destination:dropVal,
    waypoints:stopsInputs,
    travelMode:"DRIVING"
  },(res,status)=>{

    if(status!=="OK"){alert("Error");return;}

    directionsRenderer.setDirections(res);

    let meters=0,sec=0;
    res.routes[0].legs.forEach(l=>{
      meters+=l.distance.value;
      sec+=l.duration.value;
    });

    let miles=meters/1609;
    let mins=Math.round(sec/60);

    let priceCalc=OPEN + (Math.max(0,miles-5)*PER_MILE) + (stopsInputs.length*STOP_PRICE);

    distance.innerText=miles.toFixed(2)+" mi";
    stopsCount.innerText=stopsInputs.length;
    time.innerText=mins+" min";
    price.innerText="$"+priceCalc.toFixed(2);

    priceBox.classList.remove("hidden");
    bookBtn.classList.remove("hidden");

  });
}

/* BOOK */
function bookTrip(){

  const stopsArr=[];
  document.querySelectorAll(".stop-row input").forEach(i=>{
    if(i.value) stopsArr.push(i.value);
  });

  const trip={
    pickup:pickup.value,
    dropoff:dropoff.value,
    stops:stopsArr,
    distance:distance.innerText,
    time:time.innerText,
    price:price.innerText
  };

  localStorage.setItem("pendingTrip",JSON.stringify(trip));
  window.location.href="/booking/index.html";
}

/* EVENTS */
pickup.addEventListener("input",resetUI);
dropoff.addEventListener("input",resetUI);

/* LOAD GOOGLE */
async function loadGoogle(){
  const res=await fetch("/api/config");
  const data=await res.json();

  const script=document.createElement("script");
  script.src=`https://maps.googleapis.com/maps/api/js?key=${data.googleKey}`;
  document.head.appendChild(script);
  script.onload=initGoogle;
}

window.onload=loadGoogle;

</script>

</body>
</html>
