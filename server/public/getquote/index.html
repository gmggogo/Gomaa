<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Get Quote – Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}

body{
  font-family:Arial;
  background:#f8fafc;
  margin:0;
  color:#111827;
}

.page{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.hero{
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:#fff;
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  text-align:center;
}

.hero h1{
  margin:0;
}

/* 🔥 أسعار الرحلات */
.pricing{
  margin-top:12px;
  font-size:14px;
  opacity:.95;
  line-height:1.6;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:10px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#22c55e;color:#fff}

#map{
  height:350px;
  border-radius:12px;
  margin-top:10px;
}

.quote-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:15px;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="page">

<div class="hero">
<h1>Get Quote</h1>

<!-- 🔥 هنا أسعار الرحلات -->
<div class="pricing">
🚗 فتح الرحلة: <b>$20</b> (شامل أول 5 مايل)<br>
📏 كل مايل إضافي بعد 5 مايل: <b>$2</b><br>
🛑 كل Stop إضافي: <b>$5</b>
</div>

</div>

<div class="card">

<label>Pickup</label>
<input id="pickup" placeholder="Enter pickup address">

<div id="stops"></div>

<button onclick="addStop()">+ Add Stop</button>

<label>Dropoff</label>
<input id="dropoff" placeholder="Enter dropoff address">

<button class="btn-primary" onclick="calculate()">Calculate</button>
<button class="btn-success" id="bookBtn" disabled>Book</button>

<div id="priceBox" class="hidden">
<div class="quote-grid">
<div>Distance <br><b id="distance"></b></div>
<div>Stops <br><b id="stopsCount"></b></div>
<div>Time <br><b id="time"></b></div>
<div>Price <br><b id="price"></b></div>
</div>
</div>

</div>

<div class="card">
<div id="map"></div>
</div>

</div>

<script>

let map, directionsService, directionsRenderer;

const OPEN = 20;
const PER_MILE = 2;
const STOP_PRICE = 5;

/* ================= INIT GOOGLE ================= */

function initGoogle(){
  map = new google.maps.Map(document.getElementById("map"), {
    center:{lat:33.4484,lng:-112.0740},
    zoom:11
  });

  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({map});
}

/* ================= ADD STOP ================= */

function addStop(){
  const input = document.createElement("input");
  input.placeholder = "Stop";
  document.getElementById("stops").appendChild(input);
}

/* ================= CALCULATE (ONE REQUEST ONLY) ================= */

function calculate(){

  const pickupVal = document.getElementById("pickup").value;
  const dropVal = document.getElementById("dropoff").value;

  if(!pickupVal || !dropVal){
    alert("Please enter addresses");
    return;
  }

  const stopsInputs = Array.from(document.querySelectorAll("#stops input"))
    .filter(i => i.value)
    .map(i => ({ location: i.value }));

  /* 🔥 Request واحد فقط */
  directionsService.route({
    origin: pickupVal,
    destination: dropVal,
    waypoints: stopsInputs,
    travelMode: "DRIVING"
  }, (res, status)=>{

    if(status !== "OK"){
      alert("Address not valid");
      return;
    }

    directionsRenderer.setDirections(res);

    let meters=0, sec=0;

    res.routes[0].legs.forEach(l=>{
      meters += l.distance.value;
      sec += l.duration.value;
    });

    let miles = meters / 1609;
    let mins = Math.round(sec / 60);
    let stops = stopsInputs.length;

    /* ✅ السعر الصح */
    let extraMiles = Math.max(0, miles - 5);
    let price = OPEN + (extraMiles * PER_MILE) + (stops * STOP_PRICE);

    document.getElementById("distance").innerText = miles.toFixed(2)+" mi";
    document.getElementById("stopsCount").innerText = stops;
    document.getElementById("time").innerText = mins+" min";
    document.getElementById("price").innerText = "$"+price.toFixed(2);

    document.getElementById("priceBox").classList.remove("hidden");
    document.getElementById("bookBtn").disabled=false;

  });
}

/* ================= LOAD GOOGLE KEY FROM SERVER ================= */

async function loadGoogle(){

  const res = await fetch("/api/config");
  const data = await res.json();

  const script = document.createElement("script");
  script.src = `https://maps.googleapis.com/maps/api/js?key=${data.googleKey}`;
  script.async = true;

  document.head.appendChild(script);

  script.onload = initGoogle;
}

window.onload = loadGoogle;

</script>

</body>
</html>
