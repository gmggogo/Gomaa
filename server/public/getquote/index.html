<script>

/* ================= ADDRESS SEARCH (FIXED) ================= */

async function searchAddress(q){
  const query = String(q || "").trim();

  if(query.length < 3) return [];

  try{
    const res = await fetch(
      `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=6`
    );

    const data = await res.json();

    if(!data.features) return [];

    return data.features.map(f => ({
      display_name: [
        f.properties.name,
        f.properties.city,
        f.properties.state
      ].filter(Boolean).join(", "),
      lat: f.geometry.coordinates[1],
      lon: f.geometry.coordinates[0]
    }));

  }catch(err){
    console.log("Search error:", err);
    return [];
  }
}

/* ================= AUTOCOMPLETE FIX ================= */

function attachAutocomplete(input, type){
  const box = getOrCreateSuggestionBox(input);
  let timer;

  input.addEventListener("input", () => {
    clearTimeout(timer);

    const q = input.value.trim();

    if(q.length < 3){
      clearSuggestions(box);
      return;
    }

    timer = setTimeout(async () => {
      const results = await searchAddress(q);
      renderSuggestions(box, results);
    }, 200);
  });

  box.addEventListener("click", e => {
    const option = e.target.closest(".option");
    if(!option) return;

    const selected = {
      address: option.dataset.address,
      lat: Number(option.dataset.lat),
      lng: Number(option.dataset.lng)
    };

    input.value = selected.address;
    setSelectedAddress(type, input, selected);
    clearSuggestions(box);
  });
}

/* ================= CALCULATE FIX ================= */

async function calculate(){

  const pickupText = pickupInput.value.trim();
  const dropoffText = dropoffInput.value.trim();

  if(!pickupText || !dropoffText){
    alert("Enter addresses");
    return;
  }

  // fallback لو المستخدم مدخل يدوي
  if(!selectedPickup){
    selectedPickup = await fakeGeocode(pickupText);
  }

  if(!selectedDropoff){
    selectedDropoff = await fakeGeocode(dropoffText);
  }

  const { stopsGeo } = collectStopsData();

  const points = [
    selectedPickup,
    ...stopsGeo,
    selectedDropoff
  ];

  setLoading(true);
  clearMap();

  const route = await getRoute(points);

  if(!route){
    alert("Route error");
    setLoading(false);
    return;
  }

  const polyline = L.polyline(route.coords).addTo(map);
  routeLayers.push(polyline);

  drawMarkers(points);
  map.fitBounds(polyline.getBounds(), { padding:[40,40] });

  let price = 30;

  if(route.distance > 10){
    price += (route.distance - 10) * 2;
  }

  price += stopsGeo.length * 5;

  priceBox.classList.remove("hidden");

  distanceValue.textContent = route.distance.toFixed(2) + " mi";
  stopsValue.textContent = stopsGeo.length;
  durationValue.textContent = formatDuration(route.duration);
  priceValue.textContent = "$" + price.toFixed(2);

  lastTripData = {
    pickup: pickupText,
    dropoff: dropoffText,
    price
  };

  isQuoteValid = true;
  bookTripBtn.disabled = false;

  setLoading(false);
}

/* ================= FALLBACK GEOCODE ================= */

async function fakeGeocode(address){
  try{
    const res = await fetch(
      `https://photon.komoot.io/api/?q=${encodeURIComponent(address)}&limit=1`
    );
    const data = await res.json();

    const f = data.features[0];

    return {
      address: address,
      lat: f.geometry.coordinates[1],
      lng: f.geometry.coordinates[0]
    };

  }catch{
    return null;
  }
}

</script>
