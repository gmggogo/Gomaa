<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  font-family:Arial,sans-serif;
  background:#f8fafc;
  margin:0;
  color:#111827;
}

.page{
  max-width:900px;
  margin:auto;
  padding:15px;
}

@media(max-width:600px){

  .page{
    padding:10px;
  }

  h1{
    font-size:24px;
  }

  #map{
    height:250px;
  }

}

/* ================= HERO ================= */

.hero{
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:#fff;
  border-radius:20px;
  padding:22px;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.lang-btn{
  position:absolute;
  right:12px;
  top:12px;
  background:#fff;
  color:#111;
  padding:7px 12px;
  border-radius:10px;
  font-size:12px;
  cursor:pointer;
  font-weight:bold;
}

/* ================= PRICING ================= */

.pricing-wrap{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-top:18px;
}

.pricing-card{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.20);
  border-radius:18px;
  padding:14px;
  backdrop-filter:blur(6px);
  transition:.25s;
}

.pricing-card.active{
  border:2px solid #fff;
  background:rgba(255,255,255,.18);
  box-shadow:0 0 22px rgba(255,255,255,.20);
  transform:scale(1.02);
}

.pricing-card.last-center{
  grid-column:1 / -1;
  width:48%;
  margin:auto;
}

.pricing-title{
  text-align:center;
  font-size:16px;
  font-weight:900;
  margin-bottom:12px;
  color:#fff;
}

.pricing-table{
  width:100%;
  border-collapse:collapse;
}

.pricing-table th{
  font-size:11px;
  font-weight:700;
  color:#dbeafe;
  padding-bottom:6px;
}

.pricing-table td{
  font-size:13px;
  font-weight:800;
  color:#fff;
  text-align:center;
}

@media(max-width:600px){

  .pricing-wrap{
    grid-template-columns:1fr;
  }

  .pricing-card.last-center{
    width:100%;
  }

  .pricing-table th{
    font-size:10px;
  }

  .pricing-table td{
    font-size:11px;
  }

}

/* ================= CARD ================= */

.card{
  background:#fff;
  border-radius:18px;
  padding:15px;
  margin-top:15px;
  box-shadow:0 5px 18px rgba(0,0,0,0.08);
}

/* ================= INPUT ================= */

input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:10px;
  font-size:16px;
  box-sizing:border-box;
}

/* ================= BUTTON ================= */

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  margin-top:8px;
  cursor:pointer;
  transition:.25s;
}

.btn-primary{
  background:#2563eb;
  color:#fff;
}

.btn-success{
  background:#22c55e;
  color:#fff;
}

.btn-stop{
  background:#f97316;
  color:#fff;
}

/* ================= VEHICLES ================= */

.vehicle-pricing{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  margin-bottom:15px;
}

.vehicle-option{
  background:linear-gradient(135deg,#ffffff,#f1f5f9);
  border:2px solid #e2e8f0;
  border-radius:18px;
  padding:14px;
  text-align:center;
  cursor:pointer;
  transition:.25s;
}

.vehicle-option.active{
  border-color:#2563eb;
  background:linear-gradient(135deg,#eff6ff,#dbeafe);
  box-shadow:0 0 20px rgba(37,99,235,.22);
  transform:scale(1.03);
}

.vehicle-option img{
  width:62px;
  height:40px;
  object-fit:contain;
  margin:auto;
  display:block;
  margin-bottom:6px;
}

.vehicle-emoji{
  font-size:34px;
  margin-bottom:6px;
}

.vehicle-option b{
  display:block;
  font-size:14px;
}

.vehicle-pricing .vehicle-option:last-child:nth-child(odd){
  grid-column:1 / -1;
  width:48%;
  margin:auto;
}

@media(max-width:600px){

  .vehicle-pricing{
    grid-template-columns:1fr;
  }

  .vehicle-pricing .vehicle-option:last-child:nth-child(odd){
    width:100%;
  }

}

/* ================= STOP ================= */

.stop-row{
  display:flex;
  gap:6px;
}

.remove-btn{
  background:#ef4444;
  color:#fff;
  width:55px;
  margin-top:0;
  margin-bottom:10px;
}

/* ================= MAP ================= */

#map{
  height:300px;
  border-radius:14px;
}

/* ================= RESULT ================= */

.quote-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:15px;
}

.quote-grid div{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
}

.quote-grid b{
  display:block;
  margin-top:6px;
  font-size:20px;
}

#distance{
  color:#60a5fa;
}

#time{
  color:#fb923c;
}

#price{
  color:#4ade80;
}

#stopsCount{
  color:#facc15;
}

.hidden{
  display:none;
}

.loading-services{
  text-align:center;
  padding:20px;
  color:#fff;
}

.btn-success.active{
  animation:blinkBtn .7s infinite;
}

@keyframes blinkBtn{

  0%{
    opacity:1;
  }

  50%{
    opacity:.5;
    box-shadow:0 0 25px #22c55e;
  }

  100%{
    opacity:1;
  }

}

</style>
</head>

<body>

<div class="page">

<div class="hero">

<div
class="lang-btn"
onclick="toggleLang()"
id="langBtn"
>
English / Spanish
</div>

<h1 id="title">
Get Quote
</h1>

<div
style="
margin-top:10px;
font-weight:bold;
font-size:15px;
"
>
Payment Calculation
</div>

<div id="pricing">
Loading Services...
</div>

</div>

<div class="card">

<div
class="vehicle-pricing"
id="vehicleContainer"
>
<div class="loading-services">
Loading...
</div>
</div>

<label id="pickupLabel">
Pickup
</label>

<input id="pickup">

<div id="stops"></div>

<button
class="btn-stop"
onclick="addStop()"
>
+ Add Stop
</button>

<label id="dropLabel">
Dropoff
</label>

<input id="dropoff">

<button
class="btn-primary"
onclick="calculate()"
>
Calculate
</button>

<button
class="btn-success hidden"
id="bookBtn"
onclick="bookTrip()"
>
Booking Now
</button>

<div
id="priceBox"
class="hidden"
>

<div class="quote-grid">

<div>
Distance
<b id="distance"></b>
</div>

<div>
Stops
<b id="stopsCount"></b>
</div>

<div>
Time
<b id="time"></b>
</div>

<div>
Price
<b id="price">$0</b>
</div>

</div>

</div>

</div>

<div class="card">
<div id="map"></div>
</div>

</div>

<script>

let lang = "en";

let selectedService = null;
let servicesData = [];

let map;
let directionsService;
let directionsRenderer;

/* ================= TRANSLATE ================= */

const words = {

  en:{
    base:"Base",
    mile:"Mile",
    hourly:"Hourly",
    noShow:"NoShow",
    cancel:"Cancel",
    wait:"Wait"
  },

  es:{
    base:"Base",
    mile:"Milla",
    hourly:"Hora",
    noShow:"NoShow",
    cancel:"Cancelar",
    wait:"Espera"
  }

};

/* ================= IMAGES ================= */

function getServiceImage(serviceKey){

  if(serviceKey === "STANDARD"){
    return "11.jpeg";
  }

  if(serviceKey === "XL"){
    return "10.jpeg";
  }

  return "";

}

function getServiceEmoji(serviceKey){

  if(serviceKey === "STANDARD") return "🚗";
  if(serviceKey === "XL") return "🚐";
  if(serviceKey === "TAXI") return "🚕";
  if(serviceKey === "LIMO") return "🚘";
  if(serviceKey === "WHEELCHAIR") return "🦽";

  return "🚘";

}

/* ================= LOAD SERVICES ================= */

async function loadServices(){

  const container =
  document.getElementById(
    "vehicleContainer"
  );

  const pricingBox =
  document.getElementById(
    "pricing"
  );

  try{

    const res =
    await fetch("/api/services");

    const data =
    await res.json();

    servicesData =
    Array.isArray(data)
    ? data
    : [];

    const visibleServices =
    servicesData.filter(service=>{

      const key =
      String(
        service.serviceKey || ""
      ).toUpperCase();

      if(key === "SHARED"){
        return false;
      }

      return service.enabled === true;

    });

/* ================= PRICING ================= */

pricingBox.innerHTML = `

<div class="pricing-wrap">

${visibleServices.map((service,index)=>{

const mode =
String(
service.pricingMode || ""
).toUpperCase();

const title =
lang === "es"
? (service.titleEs || service.title || "")
: (service.title || "");

let headers = "";
let values = "";

if(mode === "HOURLY"){

headers = `
<th>${words[lang].hourly}</th>
<th>${words[lang].noShow}</th>
<th>${words[lang].cancel}</th>
<th>${words[lang].wait}</th>
`;

values = `
<td>$${Number(service.hourlyRate || 0)}/hr</td>
<td>$${Number(service.noShowFee || 0)}</td>
<td>$15</td>
<td>15m</td>
`;

}else{

headers = `
<th>${words[lang].base}</th>
<th>${words[lang].mile}</th>
<th>${words[lang].noShow}</th>
<th>${words[lang].cancel}</th>
<th>${words[lang].wait}</th>
`;

values = `
<td>$${Number(service.baseFare || 0)}</td>
<td>$${Number(service.perMile || 0)}/mi</td>
<td>$${Number(service.noShowFee || 0)}</td>
<td>$15</td>
<td>15m</td>
`;

}

return `

<div
class="
pricing-card
${index === visibleServices.length - 1 && visibleServices.length % 2 !== 0 ? "last-center" : ""}
"
id="price-card-${service.serviceKey}"
>

<div class="pricing-title">
${title}
</div>

<table class="pricing-table">

<tr>
${headers}
</tr>

<tr>
${values}
</tr>

</table>

</div>

`;

}).join("")}

</div>

`;

/* ================= VEHICLES ================= */

container.innerHTML = "";

visibleServices.forEach(service=>{

const serviceKey =
String(
service.serviceKey || ""
).toUpperCase();

const title =
lang === "es"
? (service.titleEs || service.title || serviceKey)
: (service.title || serviceKey);

const image =
getServiceImage(serviceKey);

const emoji =
getServiceEmoji(serviceKey);

const card =
document.createElement("div");

card.className =
"vehicle-option";

let mediaHtml = "";

if(image){

mediaHtml =
`<img src="${image}">`;

}else{

mediaHtml =
`
<div class="vehicle-emoji">
${emoji}
</div>
`;

}

card.innerHTML = `
${mediaHtml}
<b>${title}</b>
`;

card.onclick = function(){

selectService(
service,
card
);

};

container.appendChild(card);

});

}catch(err){

console.log(err);

}

}

/* ================= SELECT ================= */

function selectService(service,card){

selectedService =
String(
service.serviceKey || ""
).toUpperCase();

document
.querySelectorAll(".vehicle-option")
.forEach(el=>{
  el.classList.remove("active");
});

card.classList.add("active");

document
.querySelectorAll(".pricing-card")
.forEach(el=>{
  el.classList.remove("active");
});

const selectedPriceCard =
document.getElementById(
`price-card-${selectedService}`
);

if(selectedPriceCard){
selectedPriceCard.classList.add("active");
}

resetUI();

}

/* ================= LANGUAGE ================= */

function toggleLang(){

if(lang==="en"){

lang="es";

langBtn.innerText =
"Spanish / English";

title.innerText =
"Cotizar Viaje";

pickupLabel.innerText =
"Origen";

dropLabel.innerText =
"Destino";

}else{

lang="en";

langBtn.innerText =
"English / Spanish";

title.innerText =
"Get Quote";

pickupLabel.innerText =
"Pickup";

dropLabel.innerText =
"Dropoff";

}

loadServices();

}

/* ================= MAP ================= */

function initGoogle(){

map =
new google.maps.Map(
document.getElementById("map"),
{
center:{
lat:33.4484,
lng:-112.0740
},

zoom:11,

mapTypeControl:true,

fullscreenControl:true,

streetViewControl:false
}
);

directionsService =
new google.maps.DirectionsService();

directionsRenderer =
new google.maps.DirectionsRenderer({

suppressMarkers:false,

preserveViewport:false,

polylineOptions:{
strokeColor:"#2563eb",
strokeOpacity:1,
strokeWeight:6
}

});

directionsRenderer.setMap(map);

}

/* ================= STOP ================= */

function addStop(){

const row =
document.createElement("div");

row.className =
"stop-row";

const input =
document.createElement("input");

input.placeholder =
lang==="es"
? "Parada"
: "Stop";

input.addEventListener(
"input",
resetUI
);

const remove =
document.createElement("button");

remove.innerText = "X";

remove.className =
"remove-btn";

remove.onclick = function(){

row.remove();

resetUI();

};

row.appendChild(input);
row.appendChild(remove);

document
.getElementById("stops")
.appendChild(row);

}

/* ================= RESET ================= */

function resetUI(){

bookBtn.classList.add("hidden");

bookBtn.classList.remove("active");

priceBox.classList.add("hidden");

}

pickup.addEventListener(
"input",
resetUI
);

dropoff.addEventListener(
"input",
resetUI
);

/* ================= FIX AZ ================= */

function fixAZ(address){

address =
String(address || "")
.trim();

if(address === ""){
return "";
}

if(
!address
.toLowerCase()
.includes("arizona")
){
return address + ", Arizona";
}

return address;

}

/* ================= CALCULATE ================= */

function calculate(){

if(!selectedService){

alert("Select service");
return;

}

const pickupVal =
fixAZ(pickup.value);

const dropVal =
fixAZ(dropoff.value);

if(!pickupVal || !dropVal){

alert("Enter valid address");
return;

}

const stopsInputs =
Array
.from(
document.querySelectorAll(
".stop-row input"
)
)
.filter(i=>i.value)
.map(i=>({
location:fixAZ(i.value)
}));

directionsService.route({

origin:pickupVal,

destination:dropVal,

waypoints:stopsInputs,

travelMode:"DRIVING",

drivingOptions:{
departureTime:new Date(),
trafficModel:"bestguess"
}

}, async function(res,status){

if(status !== "OK"){

alert("Address not valid");
return;

}

directionsRenderer.setDirections(res);

const bounds =
new google.maps.LatLngBounds();

res.routes[0].legs.forEach(leg=>{

bounds.extend(
leg.start_location
);

bounds.extend(
leg.end_location
);

});

map.fitBounds(bounds);

let meters = 0;
let sec = 0;

res.routes[0].legs.forEach(l=>{

meters += l.distance.value;
sec += l.duration.value;

});

const miles =
meters / 1609;

const mins =
Math.round(sec / 60);

const stops =
stopsInputs.length;

try{

const pricingRes =
await fetch(
"/api/pricing/calculate",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

serviceKey:
selectedService,

miles:miles,

minutes:mins,

stops:stops

})
}
);

const pricingData =
await pricingRes.json();

/* =========================
SAVE WARNING POLICY
========================= */

window.selectedWarningPolicy = {

  warningMinutes:
  Number(
    pricingData.service?.warningMinutes || 0
  ),

  cancelFee:
  Number(
    pricingData.service?.cancelFee || 0
  ),

  noShowFee:
  Number(
    pricingData.service?.noShowFee || 0
  ),

  disableCancel:

Boolean(
  pricingData.service?.disableCancel
)

};


if(!pricingData.success){

alert("Pricing error");
return;

}

const pricingMode =
String(
pricingData.pricingMode || ""
).toUpperCase();

let totalPrice = 0;

if(pricingMode === "HOURLY"){

const hourlyRate =
Number(
pricingData.service?.hourlyRate || 0
);

const billingMode =

String(
pricingData.service?.hourlyBillingMode || ""
)
.toUpperCase();

let hours = 1;

/* =========================
   QUARTER
========================= */

if(billingMode === "QUARTER"){

hours =

Math.max(
1,
Math.ceil(mins / 15) / 4
);

}

/* =========================
   FULL
========================= */

else{

hours =

Math.max(
1,
Math.ceil(mins / 60)
);

}

totalPrice =
hours * hourlyRate;

}else{

totalPrice =
Number(
pricingData.total || 0
);

}

distance.innerText =
miles.toFixed(2) + " mi";

stopsCount.innerText =
stops;

time.innerText =
mins + " min";

price.innerText =
"$" +
Number(totalPrice).toFixed(2);

priceBox.classList.remove("hidden");

bookBtn.classList.remove("hidden");

bookBtn.classList.add("active");

}catch(err){

console.log(err);

alert("Server pricing failed");

}

});

}

/* ================= BOOK ================= */

function bookTrip(){

const pickupVal =
fixAZ(pickup.value);

const dropVal =
fixAZ(dropoff.value);

const stops =
Array
.from(
document.querySelectorAll(
".stop-row input"
)
)
.filter(i=>i.value)
.map(i=>fixAZ(i.value));

/* =========================
TRIP DATA
========================= */

const tripData = {

  pickup: pickupVal,

  dropoff: dropVal,

  stops: stops,

  distance:
  document.getElementById(
    "distance"
  ).innerText,

  price:
  document.getElementById(
    "price"
  ).innerText,

  serviceKey:
  selectedService,

  vehicleType:
  selectedService,

  /* =========================
     WARNING POLICY
  ========================= */

  warningMinutes:

  Number(
    window.selectedWarningPolicy
    ?.warningMinutes || 0
  ),

  cancelFee:

  Number(
    window.selectedWarningPolicy
    ?.cancelFee || 0
  ),

noShowFee:

Number(
  window.selectedWarningPolicy
  ?.noShowFee || 0
),

disableCancel:

Boolean(
  window.selectedWarningPolicy
  ?.disableCancel
)
};

/* =========================
SAVE
========================= */

localStorage.setItem(

  "pendingTrip",

  JSON.stringify(tripData)

);

/* =========================
REDIRECT
========================= */

window.location.href =
"/booking/index.html";

}

/* ================= GOOGLE ================= */

async function loadGoogle(){

const res =
await fetch("/api/config");

const data =
await res.json();

const script =
document.createElement("script");

script.src =
`https://maps.googleapis.com/maps/api/js?key=${data.googleKey}`;

script.async = true;

document.head.appendChild(script);

script.onload =
initGoogle;

}

/* ================= START ================= */

window.onload = async function(){

await loadServices();

await loadGoogle();

};

</script>

</body>
</html>
