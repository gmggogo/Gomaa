<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#f8fafc;
  margin:0;
  color:#111827
}

.page{
  max-width:900px;
  margin:auto;
  padding:20px
}

.hero{
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:#fff;
  border-radius:16px;
  padding:20px;
  text-align:center;
  position:relative;
}

.lang-btn{
  position:absolute;
  right:15px;
  top:15px;
  background:#fff;
  color:#111;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:13px;
  font-weight:bold;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08)
}

input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:10px
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px
}

.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#22c55e;color:#fff}
.btn-stop{background:#f97316;color:#fff}

.stop-row{
  display:flex;
  gap:8px;
}

.stop-row input{
  flex:1;
}

.remove-btn{
  background:#ef4444;
  color:#fff;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

#map{
  height:350px;
  border-radius:12px;
  margin-top:10px
}

/* 🔥 CARDS */
.quote-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-top:15px
}

.quote-card{
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  color:#fff;
  padding:15px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  transition:.3s;
}

.quote-card:hover{
  transform:translateY(-3px);
}

.quote-title{font-size:13px}
.quote-value{font-size:20px;font-weight:bold;margin-top:5px}

.hidden{display:none}

/* 📱 MOBILE */
@media(max-width:768px){
  .quote-grid{
    grid-template-columns:repeat(2,1fr)
  }
}
</style>
</head>

<body>

<div class="page">

<div class="hero">

<div class="lang-btn">English / Spanish</div>

<h1>Get Quote</h1>

</div>

<div class="card">

<label>Pickup</label>
<input id="pickup">

<div id="stops"></div>
<button class="btn-stop" onclick="addStop()">+ Add Stop</button>

<label>Dropoff</label>
<input id="dropoff">

<button class="btn-primary" onclick="calculate()">Calculate</button>
<button class="btn-success hidden" id="bookBtn" onclick="bookTrip()">Book</button>

<div id="priceBox" class="hidden">

  <div class="quote-grid">

    <div class="quote-card">
      <div class="quote-title">Distance</div>
      <div class="quote-value" id="distance"></div>
    </div>

    <div class="quote-card">
      <div class="quote-title">Stops</div>
      <div class="quote-value" id="stopsCount"></div>
    </div>

    <div class="quote-card">
      <div class="quote-title">Time</div>
      <div class="quote-value" id="time"></div>
    </div>

    <div class="quote-card" style="background:linear-gradient(135deg,#16a34a,#22c55e)">
      <div class="quote-title">Price</div>
      <div class="quote-value" id="price">$0</div>
    </div>

  </div>

</div>

</div>

<div class="card">
<div id="map"></div>
</div>

</div>

<script>

/* 🔥 RESET UI */
function resetUI(){
  document.getElementById("bookBtn").classList.add("hidden");
  document.getElementById("priceBox").classList.add("hidden");
}

["pickup","dropoff"].forEach(id=>{
  document.getElementById(id).addEventListener("input", resetUI);
});

/* 🔥 FIX ARIZONA */
function fixAZ(address){
  address = address.trim();
  if(address === "") return "";
  if(!address.toLowerCase().includes("az") && !address.toLowerCase().includes("arizona")){
    return address + ", Arizona";
  }
  return address;
}

/* 🔥 STOP */
function addStop(){

  const row = document.createElement("div");
  row.className = "stop-row";

  const input = document.createElement("input");
  input.placeholder = "Stop";
  input.addEventListener("input", resetUI);

  const remove = document.createElement("button");
  remove.innerText = "X";
  remove.className = "remove-btn";

  remove.onclick = () => {
    row.remove();
    resetUI();
  };

  row.appendChild(input);
  row.appendChild(remove);

  document.getElementById("stops").appendChild(row);
}

/* 🔥 MAP */
let map, directionsService, directionsRenderer;

function initGoogle(){
  map = new google.maps.Map(document.getElementById("map"), {
    center:{lat:33.4484,lng:-112.0740},
    zoom:11
  });

  directionsService = new google.maps.DirectionsService();

  directionsRenderer = new google.maps.DirectionsRenderer({ map });
}

/* 🔥 CALCULATE */
function calculate(){

  let pickupVal = fixAZ(pickup.value);
  let dropVal = fixAZ(dropoff.value);

  if(!pickupVal || !dropVal){
    alert("Enter valid address");
    return;
  }

  const stopsInputs = Array.from(document.querySelectorAll(".stop-row input"))
    .filter(i => i.value)
    .map(i => ({ location: fixAZ(i.value) }));

  directionsService.route({
    origin: pickupVal,
    destination: dropVal,
    waypoints: stopsInputs,
    optimizeWaypoints:false,
    travelMode:"DRIVING"
  }, (res, status)=>{

    if(status !== "OK"){
      alert("Address not valid");
      return;
    }

    directionsRenderer.setDirections(res);

    let meters=0, sec=0;

    res.routes[0].legs.forEach(l=>{
      meters+=l.distance.value;
      sec+=l.duration.value;
    });

    let miles = meters/1609;
    let mins = Math.round(sec/60);
    let stops = stopsInputs.length;

    let price = 20 + Math.max(0, miles-5)*2 + stops*5;

    distance.innerText = miles.toFixed(2)+" mi";
    stopsCount.innerText = stops;
    time.innerText = mins+" min";
    priceEl.innerText = "$"+price.toFixed(2);

    document.getElementById("priceBox").classList.remove("hidden");
    document.getElementById("bookBtn").classList.remove("hidden");

  });
}

/* 🔥 BOOK */
function bookTrip(){

  const stops = [];
  document.querySelectorAll(".stop-row input").forEach(i=>{
    if(i.value) stops.push(i.value);
  });

  const trip = {
    pickup: pickup.value,
    dropoff: dropoff.value,
    stops,
    distance: distance.innerText,
    time: time.innerText,
    price: document.getElementById("price").innerText
  };

  localStorage.setItem("pendingTrip", JSON.stringify(trip));
  window.location.href="/booking/index.html";
}

/* 🔥 LOAD MAP */
async function loadGoogle(){
  const res = await fetch("/api/config");
  const data = await res.json();

  const script = document.createElement("script");
  script.src = `https://maps.googleapis.com/maps/api/js?key=${data.googleKey}`;
  script.async = true;

  document.head.appendChild(script);
  script.onload = initGoogle;
}

window.onload = loadGoogle;

</script>

</body>
</html>
