<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Quote</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{font-family:Arial;margin:0;background:#f8fafc;}
.page{max-width:900px;margin:auto;padding:15px;}
.card{background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

button{
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  width:100%;
  margin-bottom:8px;
}

.btn-primary{background:#2563eb;color:#fff;}
.btn-success{background:#22c55e;color:#fff;}

#map{height:300px;border-radius:10px;}

.suggestions{
  background:#fff;
  border:1px solid #ddd;
  position:absolute;
  width:100%;
  z-index:999;
  max-height:200px;
  overflow:auto;
}

.option{padding:10px;cursor:pointer;}
.option:hover{background:#eee;}
.hidden{display:none;}
</style>
</head>

<body>

<div class="page">

<div class="card">
<input id="pickup" placeholder="Pickup address">
<div id="pickupBox" class="suggestions hidden"></div>

<input id="dropoff" placeholder="Dropoff address">
<div id="dropoffBox" class="suggestions hidden"></div>

<button id="calcBtn" class="btn-primary">Calculate Price</button>
<button id="bookBtn" class="btn-success" disabled>Book Trip</button>

<div id="result" class="hidden">
<p id="distance"></p>
<p id="price"></p>
</div>
</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* ================= MAP ================= */

const map = L.map("map").setView([33.4484, -112.0740], 11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let markers = [];

/* ================= SEARCH FIX ================= */

async function searchAddress(q){
  if(q.length < 3) return [];

  // 🔥 FIX مهم: نشيل الرقم لو البحث فشل
  let clean = q.replace(/^\d+\s*/, "");

  try{
    let res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q + " Arizona")}&format=json&limit=5`);
    let data = await res.json();

    if(!data.length){
      res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(clean + " Arizona")}&format=json&limit=5`);
      data = await res.json();
    }

    return data;
  }catch{
    return [];
  }
}

/* ================= AUTOCOMPLETE ================= */

function attach(input, box){

  input.addEventListener("input", async ()=>{
    const q = input.value.trim();

    if(q.length < 3){
      box.classList.add("hidden");
      return;
    }

    const results = await searchAddress(q);

    box.innerHTML = results.map(r=>`
      <div class="option" 
        data-lat="${r.lat}" 
        data-lng="${r.lon}" 
        data-name="${r.display_name}">
        ${r.display_name}
      </div>
    `).join("");

    box.classList.remove("hidden");
  });

  box.addEventListener("click", e=>{
    const el = e.target.closest(".option");
    if(!el) return;

    input.value = el.dataset.name;
    input.dataset.lat = el.dataset.lat;
    input.dataset.lng = el.dataset.lng;

    box.classList.add("hidden");
  });
}

attach(pickup, pickupBox);
attach(dropoff, dropoffBox);

/* ================= GEOCODE (لو كتب يدوي) ================= */

async function forceGeo(input){
  if(input.dataset.lat) return {
    lat: input.dataset.lat,
    lng: input.dataset.lng,
    name: input.value
  };

  const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(input.value + " Arizona")}&format=json&limit=1`);
  const data = await res.json();

  if(!data.length) return null;

  return {
    lat: data[0].lat,
    lng: data[0].lon,
    name: data[0].display_name
  };
}

/* ================= ROUTE ================= */

async function getRoute(p1, p2){
  const url = `https://router.project-osrm.org/route/v1/driving/${p1.lng},${p1.lat};${p2.lng},${p2.lat}?overview=full&geometries=geojson`;
  const res = await fetch(url);
  const data = await res.json();

  if(!data.routes.length) return null;

  const r = data.routes[0];

  return {
    coords: r.geometry.coordinates.map(c=>[c[1],c[0]]),
    distance: r.distance / 1609,
    duration: r.duration / 60
  };
}

/* ================= CALCULATE ================= */

calcBtn.onclick = async ()=>{

  const p1 = await forceGeo(pickup);
  const p2 = await forceGeo(dropoff);

  if(!p1 || !p2){
    alert("Address not found");
    return;
  }

  const route = await getRoute(p1,p2);
  if(!route) return;

  markers.forEach(m=>map.removeLayer(m));
  markers = [];

  const line = L.polyline(route.coords).addTo(map);

  map.fitBounds(line.getBounds());

  let price = 30;
  if(route.distance > 10){
    price += (route.distance - 10) * 2;
  }

  distance.innerText = "Distance: " + route.distance.toFixed(2) + " mi";
  price.innerText = "Price: $" + price.toFixed(2);

  result.classList.remove("hidden");

  // 🔥 تفعيل زرار البوكنج
  bookBtn.disabled = false;

  // حفظ البيانات
  window.tripData = {
    pickup: p1.name,
    dropoff: p2.name,
    price
  };
};

/* ================= BOOK ================= */

bookBtn.onclick = ()=>{
  if(!window.tripData) return;

  localStorage.setItem("tripData", JSON.stringify(window.tripData));

  alert("Trip Saved ✔");
  // تقدر تحط redirect هنا
};

</script>

</body>
</html>
