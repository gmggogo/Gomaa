<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f8fafc;margin:0;color:#111827}
.page{max-width:900px;margin:auto;padding:15px}

/* HERO */
.hero{
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:#fff;
  border-radius:16px;
  padding:20px;
  text-align:center;
  position:relative;
}

.lang-btn{
  position:absolute;
  right:10px;
  top:10px;
  background:#fff;
  color:#111;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
}

/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  padding:15px;
  margin-top:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08)
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-bottom:10px;
  font-size:16px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  margin-top:8px;
  cursor:pointer;
}

.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#22c55e;color:#fff}
.btn-stop{background:#f97316;color:#fff}

/* VEHICLE */
.vehicle-pricing{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-bottom:12px;
}

.vehicle-option{
  background:#fff;
  border:2px solid #e5e7eb;
  border-radius:16px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.vehicle-option.active{
  border-color:#2563eb;
  box-shadow:0 0 12px rgba(37,99,235,0.3);
}

/* ✅ تصغير الصور */
.vehicle-option img{
  width:70px;
  height:45px;
  object-fit:contain;
  display:block;
  margin:auto;
}

.vehicle-option b{
  display:block;
  margin-top:5px;
}

/* STOP */
.stop-row{
  display:flex;
  gap:6px;
}

.remove-btn{
  background:#ef4444;
  color:#fff;
}

/* MAP */
#map{
  height:300px;
  border-radius:12px;
}

/* RESULT */
.quote-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:15px
}

.quote-grid div{
  background:#0f172a;
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
}

/* COLORS */
#price{color:#4ade80}

.hidden{display:none}
</style>
</head>

<body>

<div class="page">

<div class="hero">

<div class="lang-btn" onclick="toggleLang()" id="langBtn">
English / Spanish
</div>

<h1 id="title">Get Quote</h1>

<div id="pricingEN">
<b>Base fare includes first 5 miles</b><br>
Car (X): $20 base + $2 per mile after 5 miles<br>
Minivan (XL): $30 base + $2.5 per mile after 5 miles
</div>

<div id="pricingES" style="display:none;">
<b>La tarifa incluye 5 millas</b><br>
Carro: $20 + $2 por milla<br>
Minivan: $30 + $2.5 por milla
</div>

</div>

<div class="card">

<div class="vehicle-pricing">

<div class="vehicle-option" id="standardBtn" onclick="selectVehicle('standard')">
<img src="11.jpeg">
<b>Car (X)</b>
</div>

<div class="vehicle-option" id="minivanBtn" onclick="selectVehicle('minivan')">
<img src="10.jpeg">
<b>Minivan (XL)</b>
</div>

</div>

<input id="pickup" placeholder="Pickup">
<div id="stops"></div>

<button class="btn-stop" onclick="addStop()">+ Add Stop</button>

<input id="dropoff" placeholder="Dropoff">

<button class="btn-primary" onclick="calculate()">Calculate</button>

<button class="btn-success hidden" id="bookBtn">Booking Now</button>

<div id="priceBox" class="hidden">
<div class="quote-grid">
<div>Distance<b id="distance"></b></div>
<div>Stops<b id="stopsCount"></b></div>
<div>Time<b id="time"></b></div>
<div>Price<b id="price">$0</b></div>
</div>
</div>

</div>

<div class="card">
<div id="map"></div>
</div>

</div>

<script>

let lang="en";
let vehicleType=null;

function toggleLang(){

if(lang==="en"){
lang="es";

langBtn.innerText="Spanish / English";
title.innerText="Cotizar Viaje";

pricingEN.style.display="none";
pricingES.style.display="block";

}else{

lang="en";

langBtn.innerText="English / Spanish";
title.innerText="Get Quote";

pricingEN.style.display="block";
pricingES.style.display="none";
}
}

function selectVehicle(type){
vehicleType=type;

standardBtn.classList.remove("active");
minivanBtn.classList.remove("active");

if(type==="standard") standardBtn.classList.add("active");
else minivanBtn.classList.add("active");
}

function addStop(){
const row=document.createElement("div");
row.className="stop-row";

const input=document.createElement("input");
const btn=document.createElement("button");

btn.innerText="X";
btn.className="remove-btn";
btn.onclick=()=>row.remove();

row.appendChild(input);
row.appendChild(btn);

stops.appendChild(row);
}

let map,dirService,dirRender;

function initMap(){
map=new google.maps.Map(document.getElementById("map"),{
center:{lat:33.4484,lng:-112.0740},
zoom:11
});

dirService=new google.maps.DirectionsService();
dirRender=new google.maps.DirectionsRenderer({map});
}

function calculate(){

if(!vehicleType){
alert("Select vehicle");
return;
}

let OPEN=20;
let PER=2;

if(vehicleType==="minivan"){
OPEN=30;
PER=2.5;
}

dirService.route({
origin:pickup.value,
destination:dropoff.value,
travelMode:"DRIVING"
},(res,status)=>{

if(status!=="OK") return;

dirRender.setDirections(res);

let dist=res.routes[0].legs[0].distance.value/1609;
let timeMin=Math.round(res.routes[0].legs[0].duration.value/60);

let extra=Math.max(0,dist-5);

let priceTotal=OPEN+(extra*PER);

distance.innerText=dist.toFixed(2)+" mi";
time.innerText=timeMin+" min";
stopsCount.innerText=document.querySelectorAll(".stop-row").length;
price.innerText="$"+priceTotal.toFixed(2);

priceBox.classList.remove("hidden");
bookBtn.classList.remove("hidden");

});
}

function loadGoogle(){
fetch("/api/config")
.then(r=>r.json())
.then(data=>{
const s=document.createElement("script");
s.src=`https://maps.googleapis.com/maps/api/js?key=${data.googleKey}`;
s.onload=initMap;
document.head.appendChild(s);
});
}

window.onload=loadGoogle;

</script>

</body>
</html>
