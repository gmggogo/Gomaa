<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f8fafc;margin:0}
.page{max-width:900px;margin:auto;padding:15px}

/* HERO */
.hero{
  background:linear-gradient(135deg,#0f172a,#2563eb);
  color:#fff;
  border-radius:16px;
  padding:20px;
  text-align:center;
  position:relative;
}

.lang-btn{
  position:absolute;
  right:10px;
  top:10px;
  background:#fff;
  color:#111;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* CARD */
.card{
  background:#fff;
  border-radius:16px;
  padding:15px;
  margin-top:15px;
}

/* VEHICLES */
.vehicle-pricing{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.vehicle-option{
  background:#fff;
  border:2px solid #ddd;
  border-radius:16px;
  padding:12px;
  text-align:center;
  cursor:pointer;
}

.vehicle-option.active{
  border-color:#2563eb;
  box-shadow:0 0 10px #2563eb;
}

.vehicle-option img{
  width:120px;
  display:block;
  margin:auto;
}

.vehicle-option b{
  display:block;
  margin-top:8px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:10px;
  margin-top:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}

.btn-primary{background:#2563eb;color:#fff}
.btn-stop{background:#f97316;color:#fff}

/* RESULT */
.quote-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:15px;
}

.quote-grid div{
  background:#111827;
  color:#fff;
  padding:12px;
  border-radius:10px;
  text-align:center;
}

#map{
  height:300px;
  margin-top:15px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="page">

<div class="hero">
<div class="lang-btn" onclick="toggleLang()">EN / ES</div>
<h1 id="title">Get Quote</h1>

<div id="pricing">
Base fare includes first 5 miles<br>
Car: $20 + $2/mile<br>
Minivan: $30 + $2.5/mile
</div>
</div>

<div class="card">

<div class="vehicle-pricing">

<div class="vehicle-option" id="carBtn" onclick="selectVehicle('car')">
<img src="11.jpeg">
<b>Car (X)</b>
</div>

<div class="vehicle-option" id="vanBtn" onclick="selectVehicle('van')">
<img src="10.jpeg">
<b>Minivan (XL)</b>
</div>

</div>

<input id="pickup" placeholder="Pickup">
<div id="stops"></div>

<button class="btn-stop" onclick="addStop()">+ Add Stop</button>

<input id="dropoff" placeholder="Dropoff">

<button class="btn-primary" onclick="calculate()">Calculate</button>

<div id="result" class="quote-grid" style="display:none">
<div>Distance<b id="distance"></b></div>
<div>Stops<b id="stopsCount"></b></div>
<div>Time<b id="time"></b></div>
<div>Price<b id="price"></b></div>
</div>

<div id="map"></div>

</div>

</div>

<script>
let vehicle=null;
let map, directionsService, directionsRenderer;

/* VEHICLE */
function selectVehicle(type){
vehicle=type;
carBtn.classList.remove("active");
vanBtn.classList.remove("active");
type==="car"?carBtn.classList.add("active"):vanBtn.classList.add("active");
}

/* LANGUAGE */
let lang="en";
function toggleLang(){
if(lang==="en"){
lang="es";
title.innerText="Cotizar Viaje";
}else{
lang="en";
title.innerText="Get Quote";
}
}

/* STOP */
function addStop(){
const div=document.createElement("div");
div.innerHTML=`<input placeholder="Stop"><button onclick="this.parentElement.remove()">X</button>`;
stops.appendChild(div);
}

/* MAP */
function initMap(){
map=new google.maps.Map(document.getElementById("map"),{
center:{lat:33.4484,lng:-112.0740},
zoom:11
});

directionsService=new google.maps.DirectionsService();
directionsRenderer=new google.maps.DirectionsRenderer({map});
}

/* CALCULATE */
function calculate(){

if(!vehicle){alert("Select vehicle");return;}

let OPEN=vehicle==="car"?20:30;
let PER=vehicle==="car"?2:2.5;

const waypoints=[...document.querySelectorAll("#stops input")]
.filter(i=>i.value)
.map(i=>({location:i.value}));

directionsService.route({
origin:pickup.value,
destination:dropoff.value,
waypoints:waypoints,
travelMode:"DRIVING"
},(res,status)=>{

if(status!=="OK"){
alert("Address error");
return;
}

directionsRenderer.setDirections(res);

let meters=0,sec=0;

res.routes[0].legs.forEach(l=>{
meters+=l.distance.value;
sec+=l.duration.value;
});

let miles=meters/1609;
let mins=Math.round(sec/60);

let extra=Math.max(0,miles-5);
let total=OPEN+(extra*PER)+(waypoints.length*5);

distance.innerText=miles.toFixed(2)+" mi";
stopsCount.innerText=waypoints.length;
time.innerText=mins+" min";
price.innerText="$"+total.toFixed(2);

result.style.display="grid";
});
}

/* LOAD GOOGLE */
fetch("/api/config")
.then(res=>res.json())
.then(data=>{
const script=document.createElement("script");
script.src=`https://maps.googleapis.com/maps/api/js?key=${data.googleKey}`;
script.async=true;
document.head.appendChild(script);
script.onload=initMap;
});
</script>

</body>
</html>
