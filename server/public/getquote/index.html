<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Get Quote – Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box}
body{font-family:Arial;background:#f8fafc;margin:0;color:#111827}
.page{max-width:980px;margin:auto;padding:18px}
.hero{background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#fff;border-radius:16px;padding:18px;margin-bottom:16px}
.hero h1{margin:0;font-size:28px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px}
input{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin-bottom:10px}
button{padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;margin-top:8px}
.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#22c55e;color:#fff}
.quote-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
#map{height:350px;border-radius:12px;margin-top:10px}
.hidden{display:none}
</style>
</head>

<body>

<div class="page">

<div class="hero">
<h1>Get Quote</h1>
</div>

<div class="card">

<label>Pickup</label>
<input id="pickup">

<div id="stops"></div>
<button onclick="addStop()">+ Stop</button>

<label>Dropoff</label>
<input id="dropoff">

<br>
<button class="btn-primary" onclick="calculate()">Calculate</button>
<button class="btn-success" id="bookBtn" disabled>Book</button>

<div id="priceBox" class="hidden">
<div class="quote-grid">
<div>Distance <br><b id="distance"></b></div>
<div>Stops <br><b id="stopsCount"></b></div>
<div>Time <br><b id="time"></b></div>
<div>Price <br><b id="price"></b></div>
</div>
</div>

</div>

<div class="card">
<div id="map"></div>
</div>

</div>

<script>
let map, directionsService, directionsRenderer, geocoder;

const pickupInput = document.getElementById("pickup");
const dropoffInput = document.getElementById("dropoff");

const OPEN = 20;
const PER_MILE = 2;
const STOP_PRICE = 5;

let selected = { pickup:null, dropoff:null };
let stopCount = 0;

/* ================= GOOGLE INIT ================= */

function initGoogle(){
  map = new google.maps.Map(document.getElementById("map"), {
    center:{lat:33.4484,lng:-112.0740},
    zoom:11
  });

  geocoder = new google.maps.Geocoder();
  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({ map });
}

/* ================= GEOCODE ================= */

function geocode(address){
  return new Promise(resolve=>{
    geocoder.geocode({address},(res,status)=>{
      if(status!=="OK") return resolve(null);

      let r = res[0];

      resolve({
        address:r.formatted_address,
        lat:r.geometry.location.lat(),
        lng:r.geometry.location.lng()
      });
    });
  });
}

/* ================= STOPS ================= */

function addStop(){
  const input = document.createElement("input");
  input.placeholder = "Stop";
  document.getElementById("stops").appendChild(input);
}

/* ================= CALCULATE ================= */

async function calculate(){

  let pickup = await geocode(pickupInput.value);
  let drop = await geocode(dropoffInput.value);

  if(!pickup || !drop){
    alert("Enter valid address");
    return;
  }

  let points = [pickup];

  for (const i of document.querySelectorAll("#stops input")) {
    let geo = await geocode(i.value);
    if (geo) points.push(geo);
  }

  points.push(drop);

  directionsService.route({
    origin:points[0],
    destination:points[points.length-1],
    waypoints:points.slice(1,-1).map(p=>({location:p})),
    travelMode:"DRIVING"
  },(res,status)=>{

    if(status!=="OK"){
      alert("Route error");
      return;
    }

    directionsRenderer.setDirections(res);

    let meters=0,sec=0;

    res.routes[0].legs.forEach(l=>{
      meters+=l.distance.value;
      sec+=l.duration.value;
    });

    let miles=meters/1609;
    let mins=Math.round(sec/60);
    let stops=points.length-2;

    let price=OPEN+(miles*PER_MILE)+(stops*STOP_PRICE);

    document.getElementById("distance").innerText=miles.toFixed(2)+" mi";
    document.getElementById("stopsCount").innerText=stops;
    document.getElementById("time").innerText=mins+" min";
    document.getElementById("price").innerText="$"+price.toFixed(2);

    document.getElementById("priceBox").classList.remove("hidden");
    document.getElementById("bookBtn").disabled=false;

  });
}

/* ================= LOAD GOOGLE KEY FROM SERVER ================= */

async function loadGoogle(){
  const res = await fetch("/api/config");
  const data = await res.json();

  const script = document.createElement("script");
  script.src = `https://maps.googleapis.com/maps/api/js?key=${data.googleKey}`;
  script.async = true;

  document.head.appendChild(script);

  script.onload = initGoogle;
}

window.onload = loadGoogle;

</script>

</body>
</html>
