<!-- summary.html -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>
Company Summary
</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/layout.css">

<style>

/* =========================
GLOBAL
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#eef3f9;
  font-family:'Segoe UI',sans-serif;
  color:#0f172a;
  overflow-x:hidden;
}

/* =========================
HEADER
========================= */

#layoutHeader{
  position:sticky;
  top:0;
  z-index:999;
}

/* =========================
PAGE
========================= */

.page{
  width:100%;
  max-width:1800px;
  margin:auto;
  padding:20px;
}

/* =========================
TOP BAR
========================= */

.top-tools{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.search-box{
  flex:1;
  min-width:240px;
}

.search-box input{
  width:100%;
  height:44px;
  border:none;
  border-radius:12px;
  padding:0 14px;
  background:#fff;
  font-size:14px;
}

.filter{
  height:44px;
  border:none;
  border-radius:12px;
  padding:0 12px;
  background:#fff;
}

.print-btn{
  height:44px;
  border:none;
  border-radius:12px;
  background:#145cff;
  color:#fff;
  padding:0 18px;
  cursor:pointer;
  font-weight:700;
}

/* =========================
TABS
========================= */

.tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

.tab{
  height:38px;
  border:none;
  border-radius:10px;
  background:#dbe4ff;
  color:#0f172a;
  font-weight:700;
  cursor:pointer;
}

.tab.active{
  background:#145cff;
  color:#fff;
}

/* =========================
SERVICE ROW
========================= */

.services-row{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  margin-bottom:10px;
}

/* =========================
TOTALS ROW
========================= */

.totals-row{
  display:grid;
  grid-template-columns:
  repeat(5,minmax(140px,1fr));
  gap:10px;
  margin-bottom:18px;
}

/* =========================
CARDS
========================= */

.service-card,
.total-card{

  border-radius:14px;
  padding:10px 12px;

  min-height:84px;

  display:flex;
  flex-direction:column;
  justify-content:center;

  position:relative;
  overflow:hidden;

}

.service-card{

  background:
  linear-gradient(
    135deg,
    #16c94c,
    #11b940
  );

  color:#fff;

}

.total-card{

  background:
  linear-gradient(
    135deg,
    #145cff,
    #003cff
  );

  color:#fff;

}

.service-card::after,
.total-card::after{

  content:"";

  position:absolute;
  right:-20px;
  top:-20px;

  width:80px;
  height:80px;

  border-radius:50%;

  background:
  rgba(255,255,255,.08);

}

.card-title{
  font-size:12px;
  font-weight:700;
  margin-bottom:6px;
}

.card-line{
  font-size:13px;
  line-height:1.5;
  font-weight:600;
}

.big{
  font-size:22px;
  font-weight:800;
}

/* =========================
TABLE
========================= */

.day-title{
  margin:20px 0 10px;
  font-size:16px;
  font-weight:800;
}

.table-wrap{
  width:100%;
  overflow:auto;
  border-radius:14px;
}

.summary-table{
  width:100%;
  min-width:1200px;
  border-collapse:collapse;
  background:#fff;
}

.summary-table th{

  background:#e2e8f0;
  color:#334155;

  font-size:12px;
  padding:12px;
  text-align:left;

}

.summary-table td{
  padding:12px;
  font-size:12px;
  border-bottom:1px solid #edf2f7;
}

/* =========================
STATUS
========================= */

.status{
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
}

.completed{
  background:#dcfce7;
  color:#15803d;
}

.cancelled{
  background:#fee2e2;
  color:#b91c1c;
}

.noshow{
  background:#fef3c7;
  color:#b45309;
}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

  .page{
    padding:12px;
  }

  .services-row{
    grid-template-columns:
    repeat(2,1fr);
  }

  .totals-row{
    grid-template-columns:
    repeat(2,1fr);
  }

}

</style>

</head>

<body>

<div id="layoutHeader"></div>

<div class="page">

  <!-- =========================
  TOOLS
  ========================= -->

  <div class="top-tools">

    <div class="search-box">
      <input
      id="searchInput"
      placeholder="Search Name / Phone / Trip# / Company">
    </div>

    <select
    id="yearFilter"
    class="filter">
    </select>

    <select
    id="monthFilter"
    class="filter">
    </select>

    <button
    class="print-btn"
    onclick="window.print()">
      Print
    </button>

  </div>

  <!-- =========================
  TABS
  ========================= -->

  <div
  class="tabs"
  id="dynamicTabs">
  </div>

  <!-- =========================
  GREEN SERVICES
  ========================= -->

  <div
  class="services-row"
  id="servicesRow">
  </div>

  <!-- =========================
  BLUE TOTALS
  ========================= -->

  <div
  class="totals-row"
  id="totalsRow">
  </div>

  <!-- =========================
  TABLE
  ========================= -->

  <div id="summaryContent"></div>

</div>

<script src="summary.js"></script>

</body>
</html>
