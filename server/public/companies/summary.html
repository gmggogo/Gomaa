<!-- summary.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Summary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="layout.css">

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  background:#f4f8fb;
  font-family:'Segoe UI',sans-serif;
  color:#111827;
  overflow-x:hidden;
}

#layoutHeader{
  position:sticky;
  top:0;
  z-index:1000;
  background:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.page{
  width:100%;
  max-width:1700px;
  margin:auto;
  padding:88px 14px 24px;
}

.top-bar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.search-input,
.filter-select{
  height:40px;
  border:none;
  border-radius:10px;
  background:#fff;
  padding:0 12px;
  font-size:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  font-weight:700;
}

.search-input{
  flex:1;
  min-width:220px;
}

.print-btn{
  border:none;
  background:#145cff;
  color:#fff;
  border-radius:10px;
  padding:0 18px;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
}

.tabs{
  display:flex;
  gap:8px;
  margin-bottom:12px;
  overflow-x:auto;
  padding-bottom:3px;
}

.tab{
  min-width:120px;
  flex:1;
  height:38px;
  border:none;
  border-radius:10px;
  background:#dbe4f0;
  color:#111827;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
  white-space:nowrap;
}

.tab.active{
  background:#145cff;
  color:#fff;
}

.services-stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(155px,1fr));
  gap:10px;
  margin-bottom:12px;
}

.services-stats .stat{
  background:linear-gradient(135deg,#16a34a,#22c55e);
  border-radius:16px;
  padding:14px 14px;
  min-height:105px;
  color:#fff;
  box-shadow:0 8px 22px rgba(22,163,74,.24);
  transition:.2s ease;
}

.services-stats .stat:hover{
  transform:translateY(-3px);
  box-shadow:0 12px 28px rgba(22,163,74,.32);
}

.services-stats .stat-title{
  font-size:13px;
  color:#dcfce7;
  font-weight:900;
  margin-bottom:8px;
}

.services-stats .stat-lines{
  font-size:13px;
  line-height:1.65;
  font-weight:900;
}

.services-stats .big{
  font-size:17px;
}

.totals-stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:8px;
  margin-bottom:18px;
}

.totals-stats .stat{
  background:#145cff;
  border-radius:12px;
  padding:9px 10px;
  min-height:65px;
  color:#fff;
  box-shadow:0 3px 10px rgba(20,92,255,.16);
}

.totals-stats .stat-title{
  font-size:10px;
  color:#dbeafe;
  font-weight:900;
}

.totals-stats .stat-value{
  margin-top:7px;
  font-size:20px;
  font-weight:900;
}

.day-title{
  margin:22px 0 8px;
  font-size:14px;
  font-weight:900;
  color:#374151;
}

.table-wrap{
  width:100%;
  overflow-x:auto;
  background:#fff;
  border-radius:14px;
  border:1px solid #d1d5db;
  margin-bottom:18px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.summary-table{
  width:100%;
  min-width:1600px;
  border-collapse:collapse;
  table-layout:fixed;
}

.summary-table th{
  background:#cfd8e3;
  color:#111827;
  font-size:10px;
  font-weight:900;
  text-align:left;
  padding:10px 6px;
  white-space:nowrap;
  border-bottom:2px solid #94a3b8;
  border-right:1px solid #cbd5e1;
}

.summary-table td{
  padding:8px 6px;
  font-size:9px;
  border-bottom:1px solid #e5e7eb;
  border-right:1px solid #e5e7eb;
  vertical-align:top;
  line-height:1.5;
  font-weight:700;
  color:#111827;
  overflow:hidden;
  text-overflow:ellipsis;
  background:#fff;
}

.summary-table th:last-child,
.summary-table td:last-child{
  border-right:none;
}

.summary-table tr:nth-child(even) td{
  background:#f8fafc;
}

.summary-table tr:hover td{
  background:#eef4ff;
}

.shared-separator td{
  border-bottom:1px solid #cbd5e1 !important;
}

.trip-divider-line td{
  padding:0 !important;
  height:4px;
  background:#94a3b8;
  border:none !important;
}

.trip-divider td{
  padding:0 !important;
  height:12px;
  background:#f4f8fb;
  border:none !important;
}

.status{
  display:inline-block;
  padding:3px 7px;
  border-radius:999px;
  font-size:8px;
  font-weight:900;
}

.completed{background:#dcfce7;color:#166534;}
.cancelled{background:#fee2e2;color:#991b1b;}
.noshow{background:#fef9c3;color:#854d0e;}
.notcompleted{background:#374151;color:#fff;}
.scheduled{background:#dbeafe;color:#1d4ed8;}
.confirmed{background:#bbf7d0;color:#15803d;}

.total{
  font-weight:900;
  color:#145cff;
}

.summary-table td:first-child{
  background:#dbeafe !important;
  color:#1d4ed8;
  font-weight:900;
}

.summary-table td:nth-child(15){
  background:#fef9c3 !important;
  color:#854d0e;
  font-weight:900;
}

.summary-table td:nth-child(16){
  background:#dcfce7 !important;
  color:#166534;
  font-weight:900;
}

.empty-state{
  background:#fff;
  border-radius:14px;
  padding:30px;
  text-align:center;
  font-size:14px;
  font-weight:900;
  color:#64748b;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

@media(max-width:768px){
  .page{padding:84px 6px 18px;}
  .top-bar{gap:6px;}
  .search-input,.filter-select,.print-btn{
    height:38px;
    font-size:11px;
  }
  .tab{
    font-size:11px;
    height:36px;
    min-width:105px;
  }
  .services-stats{grid-template-columns:1fr 1fr;}
  .totals-stats{grid-template-columns:1fr 1fr;}
  .summary-table{min-width:1450px;}
  .summary-table th,
  .summary-table td{
    font-size:8px;
    padding:5px 4px;
  }
}

@media print{
  #layoutHeader,
  .top-bar,
  .tabs{
    display:none !important;
  }
  .page{padding:0;}
  body{background:#fff;}
}
</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="page">

  <div class="top-bar">
    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="Search Trip# / Company / Entry / Client / Passenger / Phone">

    <select id="yearFilter" class="filter-select"></select>
    <select id="monthFilter" class="filter-select"></select>

    <button class="print-btn" onclick="window.print()">Print</button>
  </div>

  <div class="tabs" id="serviceTabs"></div>

  <div class="services-stats" id="servicesStats"></div>

  <div class="totals-stats" id="totalsStats"></div>

  <div id="summaryContent"></div>

</div>

<script src="layout.js"></script>
<script src="summary.js"></script>

</body>
</html>
