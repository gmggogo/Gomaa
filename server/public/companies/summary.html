<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Summary</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
  margin:0;
  background:#f4f8fb;
  font-family:'Segoe UI',sans-serif;
  color:#111827;
}

#layoutHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:9999;
}

/* PAGE */
.page{
  padding:165px 10px 30px;
}

/* TOP */
.top-bar{
  display:flex;
  gap:10px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.search-input{
  flex:1;
  min-width:220px;
  height:42px;
  border:none;
  border-radius:10px;
  background:#fff;
  padding:0 14px;
  font-size:13px;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.print-btn{
  border:none;
  background:#145cff;
  color:#fff;
  padding:0 18px;
  border-radius:10px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
}

/* FILTERS */
.filters{
  display:flex;
  gap:10px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.filters select{
  height:42px;
  border:none;
  border-radius:10px;
  padding:0 14px;
  background:#fff;
  font-size:13px;
  font-weight:700;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}

/* TABS */
.summary-tabs{
  display:flex;
  gap:10px;
  margin-bottom:16px;
}

.summary-tab{
  flex:1;
  height:46px;
  border:none;
  border-radius:12px;
  background:#dbe4f0;
  color:#111827;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
}

.summary-tab.active{
  background:#145cff;
  color:#fff;
}

/* STATS */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  margin-bottom:20px;
}

.stat-card{
  background:#fff;
  border-radius:12px;
  padding:14px;
  box-shadow:0 3px 12px rgba(0,0,0,.06);
}

.stat-title{
  font-size:11px;
  color:#6b7280;
  margin-bottom:5px;
}

.stat-value{
  font-size:22px;
  font-weight:800;
}

/* DAY */
.day-title{
  margin:20px 0 10px;
  font-size:15px;
  font-weight:800;
  color:#1c2440;
}

/* BIG CARD */
.trip-card{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  margin-bottom:18px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}

/* HEADER */
.trip-header{
  background:#1c2440;
  color:#fff;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}

.trip-number{
  font-size:14px;
  font-weight:800;
}

.trip-info{
  font-size:11px;
  opacity:.9;
}

/* BODY */
.trip-body{
  padding:12px;
}

/* GRID */
.trip-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  margin-bottom:14px;
}

.box{
  background:#f8fafc;
  border-radius:10px;
  padding:10px;
}

.box-title{
  font-size:10px;
  color:#6b7280;
  margin-bottom:5px;
  font-weight:700;
}

.box-value{
  font-size:11px;
  font-weight:700;
  word-break:break-word;
}

/* PASSENGERS */
.passenger-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:12px;
}

/* PASSENGER CARD */
.passenger-card{
  border-radius:14px;
  padding:12px;
  color:#111827;
}

/* STATUS COLORS */
.completed{
  background:#dcfce7;
  border:2px solid #22c55e;
}

.cancelled{
  background:#fee2e2;
  border:2px solid #ef4444;
}

.noshow{
  background:#fef9c3;
  border:2px solid #facc15;
}

/* PASSENGER */
.passenger-name{
  font-size:13px;
  font-weight:800;
  margin-bottom:10px;
}

.passenger-row{
  margin-bottom:7px;
  font-size:11px;
  line-height:1.5;
}

.passenger-label{
  font-weight:800;
}

/* FOOTER */
.trip-footer{
  background:#f3f4f6;
  padding:12px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:14px;
  font-size:13px;
  font-weight:800;
}

.total{
  color:#145cff;
  font-size:18px;
}

/* MOBILE */
@media(max-width:768px){

  .page{
    padding:155px 6px 20px;
  }

  .trip-grid{
    grid-template-columns:1fr;
  }

  .passenger-grid{
    grid-template-columns:1fr;
  }

}

@media print{

  #layoutHeader,
  .top-bar,
  .filters,
  .summary-tabs{
    display:none !important;
  }

  body{
    background:#fff;
  }

  .page{
    padding:0;
  }

}

</style>

<script src="layout.js"></script>

</head>

<body>

<div id="layoutHeader"></div>

<div class="page">

  <!-- TOP -->
  <div class="top-bar">

    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="Search Name / Phone / Trip# / Company">

    <button
      class="print-btn"
      onclick="window.print()">
      Print
    </button>

  </div>

  <!-- FILTER -->
  <div class="filters">

    <select id="yearFilter"></select>

    <select id="monthFilter"></select>

  </div>

  <!-- TABS -->
  <div class="summary-tabs">

    <button
      class="summary-tab active"
      onclick="switchTab('individual',this)">
      Individual
    </button>

    <button
      class="summary-tab"
      onclick="switchTab('shared',this)">
      Shared
    </button>

  </div>

  <!-- STATS -->
  <div class="stats-grid">

    <div class="stat-card">
      <div class="stat-title">Individual Trips</div>
      <div class="stat-value" id="individualTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Shared Trips</div>
      <div class="stat-value" id="sharedTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Completed</div>
      <div class="stat-value" id="completedTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Cancelled</div>
      <div class="stat-value" id="cancelledTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">No Show</div>
      <div class="stat-value" id="noShowTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Revenue</div>
      <div class="stat-value" id="totalRevenue">$0</div>
    </div>

  </div>

  <!-- CONTENT -->
  <div id="summaryContent"></div>

</div>

<script src="summary.js"></script>

</body>
</html>
