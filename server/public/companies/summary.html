<!-- summary.html -->
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Sunbeam Summary</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
  margin:0;
  background:#f4f8fb;
  font-family:'Segoe UI',sans-serif;
  color:#111827;
}

#layoutHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:9999;
}

.page{
  padding:160px 8px 30px;
}

/* TOP */
.top-bar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.search-input,
.filter-select{
  height:38px;
  border:none;
  border-radius:8px;
  background:#fff;
  padding:0 10px;
  font-size:11px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.search-input{
  flex:1;
  min-width:220px;
}

.print-btn{
  border:none;
  background:#145cff;
  color:#fff;
  border-radius:8px;
  padding:0 16px;
  font-size:11px;
  font-weight:800;
  cursor:pointer;
}

/* TABS */
.tabs{
  display:flex;
  gap:8px;
  margin-bottom:12px;
}

.tab{
  flex:1;
  height:42px;
  border:none;
  border-radius:8px;
  background:#dbe4f0;
  color:#111827;
  font-size:12px;
  font-weight:800;
  cursor:pointer;
}

.tab.active{
  background:#145cff;
  color:#fff;
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:8px;
  margin-bottom:14px;
}

.stat{
  background:#fff;
  border-radius:10px;
  padding:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.stat-title{
  font-size:9px;
  color:#6b7280;
}

.stat-value{
  margin-top:4px;
  font-size:20px;
  font-weight:800;
}

/* DATE */
.day-title{
  margin:18px 0 6px;
  font-size:12px;
  font-weight:800;
  color:#374151;
}

/* TABLE */
.table-wrap{
  overflow-x:auto;
  background:#fff;
  border-radius:10px;
  border:1px solid #e5e7eb;
  margin-bottom:14px;
}

.summary-table{
  width:100%;
  min-width:1600px;
  border-collapse:collapse;
}

.summary-table th{
  background:#f9fafb;
  color:#374151;
  font-size:9px;
  text-align:left;
  padding:8px 5px;
  white-space:nowrap;
  border-bottom:1px solid #e5e7eb;
}

.summary-table td{
  padding:7px 5px;
  font-size:9px;
  border-bottom:1px solid #edf1f7;
  vertical-align:top;
  line-height:1.5;
  font-weight:600;
}

.summary-table tr:last-child td{
  border-bottom:none;
}

/* SHARED SEPARATOR */
.shared-separator td{
  border-bottom:1px solid #dbe4f0 !important;
}

/* STATUS */
.status{
  display:inline-block;
  padding:2px 6px;
  border-radius:999px;
  font-size:8px;
  font-weight:800;
}

.completed{
  background:#dcfce7;
  color:#166534;
}

.cancelled{
  background:#fee2e2;
  color:#991b1b;
}

.noshow{
  background:#fef9c3;
  color:#854d0e;
}

.total{
  font-weight:900;
  color:#145cff;
}

.trip-divider{
  height:10px;
}

/* MOBILE */
@media(max-width:768px){

  .page{
    padding:150px 4px 20px;
  }

  .summary-table th,
  .summary-table td{
    font-size:8px;
    padding:5px 4px;
  }

}

/* PRINT */
@media print{

  #layoutHeader,
  .top-bar,
  .tabs{
    display:none !important;
  }

  .page{
    padding:0;
  }

  body{
    background:#fff;
  }

}

</style>

<script src="layout.js"></script>

</head>

<body>

<div id="layoutHeader"></div>

<div class="page">

  <!-- TOP -->
  <div class="top-bar">

    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="Search Name / Phone / Trip# / Company">

    <select id="yearFilter" class="filter-select"></select>

    <select id="monthFilter" class="filter-select"></select>

    <button
      class="print-btn"
      onclick="window.print()">
      Print
    </button>

  </div>

  <!-- TABS -->
  <div class="tabs">

    <button
      class="tab active"
      onclick="switchTab('individual',this)">
      Individual
    </button>

    <button
      class="tab"
      onclick="switchTab('shared',this)">
      Shared
    </button>

  </div>

  <!-- STATS -->
  <div class="stats">

    <div class="stat">
      <div class="stat-title">Individual Trips</div>
      <div class="stat-value" id="individualTrips">0</div>
    </div>

    <div class="stat">
      <div class="stat-title">Shared Trips</div>
      <div class="stat-value" id="sharedTrips">0</div>
    </div>

    <div class="stat">
      <div class="stat-title">Completed</div>
      <div class="stat-value" id="completedTrips">0</div>
    </div>

    <div class="stat">
      <div class="stat-title">Cancelled</div>
      <div class="stat-value" id="cancelledTrips">0</div>
    </div>

    <div class="stat">
      <div class="stat-title">No Show</div>
      <div class="stat-value" id="noShowTrips">0</div>
    </div>

    <div class="stat">
      <div class="stat-title">Revenue</div>
      <div class="stat-value" id="totalRevenue">$0</div>
    </div>

  </div>

  <!-- CONTENT -->
  <div id="summaryContent"></div>

</div>

<script src="summary.js"></script>

</body>
</html>
