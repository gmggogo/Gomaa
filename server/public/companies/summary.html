<!-- summary.html -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation - Summary</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="summary.css">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#f3f6fb;
  font-family:Arial,sans-serif;
  color:#111827;
}

/* HEADER */

.header{
  background:#0f172a;
  color:#fff;
  padding:18px;
  text-align:center;
  font-size:24px;
  font-weight:800;
  letter-spacing:.5px;
}

/* TABS */

.tabs{
  display:flex;
  gap:10px;
  padding:15px;
  justify-content:center;
  flex-wrap:wrap;
}

.tab{
  border:none;
  background:#e5e7eb;
  padding:12px 22px;
  border-radius:14px;
  cursor:pointer;
  font-weight:700;
  transition:.2s;
  font-size:15px;
}

.tab.active{
  background:#2563eb;
  color:#fff;
}

/* STATS */

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:0 15px 15px;
}

.stat-box{
  background:#fff;
  border-radius:18px;
  padding:18px;
  box-shadow:0 4px 18px rgba(0,0,0,.07);
}

.stat-title{
  color:#6b7280;
  font-size:14px;
  margin-bottom:8px;
}

.stat-value{
  font-size:28px;
  font-weight:800;
}

/* CONTENT */

#content{
  display:flex;
  flex-direction:column;
  gap:20px;
  padding:15px;
}

/* TRIP BOX */

.trip-box{
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* TRIP HEADER */

.trip-header{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}

.trip-number{
  font-size:21px;
  font-weight:800;
}

.trip-info{
  font-size:14px;
  opacity:.9;
}

/* PASSENGERS */

.passengers{
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* PASSENGER CARD */

.passenger-card{
  border-radius:18px;
  padding:15px;
  border:2px solid #e5e7eb;
}

/* COLORS */

.completed-card{
  background:#f0fdf4;
  border-color:#22c55e;
}

.cancelled-card{
  background:#fff7ed;
  border-color:#f59e0b;
}

.noshow-card{
  background:#fef2f2;
  border-color:#ef4444;
}

/* TOP */

.passenger-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:14px;
}

.passenger-name{
  font-size:18px;
  font-weight:800;
}

.status-badge{
  padding:7px 14px;
  border-radius:999px;
  color:#fff;
  font-size:13px;
  font-weight:800;
}

.completed-badge{
  background:#16a34a;
}

.cancelled-badge{
  background:#f59e0b;
}

.noshow-badge{
  background:#dc2626;
}

/* GRID */

.passenger-grid{
  display:grid;
  grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
}

.info-box{
  background:#fff;
  border-radius:14px;
  padding:12px;
  border:1px solid #e5e7eb;
}

.info-label{
  color:#6b7280;
  font-size:12px;
  margin-bottom:5px;
}

.info-value{
  font-weight:700;
  font-size:15px;
  word-break:break-word;
}

/* TOTAL */

.trip-total{
  background:#111827;
  color:#fff;
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:19px;
  font-weight:800;
}

/* EMPTY */

.empty-box{
  background:#fff;
  border-radius:20px;
  padding:40px;
  text-align:center;
  font-weight:800;
  box-shadow:0 5px 18px rgba(0,0,0,.08);
}

/* MOBILE */

@media(max-width:768px){

  .header{
    font-size:20px;
  }

  .trip-number{
    font-size:18px;
  }

  .trip-info{
    font-size:13px;
  }

  .passenger-name{
    font-size:16px;
  }

  .trip-total{
    font-size:16px;
  }

  .stat-value{
    font-size:24px;
  }

}

</style>
</head>

<body>

<div class="header">
  SUNBEAM TRANSPORTATION SUMMARY
</div>

<!-- TABS -->

<div class="tabs">

  <button
    class="tab active"
    onclick="switchTab('individual',this)">
    Individual
  </button>

  <button
    class="tab"
    onclick="switchTab('shared',this)">
    Shared
  </button>

</div>

<!-- STATS -->

<div class="stats">

  <div class="stat-box">
    <div class="stat-title">Total Trips</div>
    <div class="stat-value" id="totalTrips">0</div>
  </div>

  <div class="stat-box">
    <div class="stat-title">Completed</div>
    <div class="stat-value" id="completedTrips">0</div>
  </div>

  <div class="stat-box">
    <div class="stat-title">Cancelled</div>
    <div class="stat-value" id="cancelledTrips">0</div>
  </div>

  <div class="stat-box">
    <div class="stat-title">No Show</div>
    <div class="stat-value" id="noShowTrips">0</div>
  </div>

  <div class="stat-box">
    <div class="stat-title">Total Revenue</div>
    <div class="stat-value" id="totalRevenue">$0</div>
  </div>

</div>

<!-- CONTENT -->

<div id="content"></div>

<script src="summary.js"></script>

</body>
</html>
