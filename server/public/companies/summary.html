<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Summary</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
  margin:0;
  background:#f4f8fb;
  font-family:'Segoe UI',sans-serif;
}

/* HEADER */
#layoutHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:9999;
}

/* PAGE */
.summary-page{
  padding:170px 14px 40px;
}

/* TABS */
.summary-tabs{
  display:flex;
  gap:12px;
  margin-bottom:18px;
}

.summary-tab{
  flex:1;
  border:none;
  height:48px;
  border-radius:12px;
  font-weight:700;
  cursor:pointer;
  background:#d9e2ef;
  color:#111827;
  transition:.2s;
}

.summary-tab.active{
  background:#145cff;
  color:#fff;
}

/* STATS */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
  margin-bottom:20px;
}

.stat-card{
  background:#fff;
  border-radius:16px;
  padding:18px;
  box-shadow:0 4px 15px rgba(0,0,0,.06);
}

.stat-title{
  font-size:13px;
  color:#6b7280;
  margin-bottom:6px;
}

.stat-value{
  font-size:28px;
  font-weight:800;
  color:#111827;
}

/* TRIP */
.trip-box{
  background:#fff;
  border-radius:18px;
  overflow:hidden;
  margin-bottom:22px;
  box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.trip-header{
  background:#1c2440;
  color:#fff;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.trip-number{
  font-size:20px;
  font-weight:800;
}

.trip-date{
  font-size:13px;
  opacity:.9;
}

/* PASSENGERS */
.passengers{
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.passenger-card{
  border-radius:14px;
  overflow:hidden;
  border:2px solid #e5e7eb;
}

.completed-card{
  background:#f0fdf4;
  border-color:#22c55e;
}

.cancelled-card{
  background:#fff7ed;
  border-color:#f59e0b;
}

.noshow-card{
  background:#fef2f2;
  border-color:#ef4444;
}

/* TOP */
.passenger-top{
  padding:12px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.passenger-name{
  font-size:17px;
  font-weight:800;
  color:#111827;
}

/* BADGE */
.status-badge{
  padding:7px 14px;
  border-radius:999px;
  color:#fff;
  font-size:12px;
  font-weight:800;
}

.completed{
  background:#16a34a;
}

.cancelled{
  background:#f59e0b;
}

.noshow{
  background:#dc2626;
}

/* GRID */
.passenger-grid{
  padding:0 14px 14px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}

.info-box{
  background:#fff;
  border-radius:12px;
  border:1px solid #e5e7eb;
  padding:10px;
}

.info-label{
  font-size:11px;
  color:#6b7280;
  margin-bottom:4px;
}

.info-value{
  font-size:14px;
  font-weight:700;
  color:#111827;
  word-break:break-word;
}

/* TOTAL */
.trip-total{
  background:#111827;
  color:#fff;
  padding:16px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:18px;
  font-weight:800;
}

/* EMPTY */
.empty-box{
  background:#fff;
  border-radius:18px;
  padding:40px;
  text-align:center;
  font-weight:800;
  box-shadow:0 4px 15px rgba(0,0,0,.06);
}

/* MOBILE */
@media(max-width:768px){

  .summary-page{
    padding:160px 10px 30px;
  }

  .trip-number{
    font-size:17px;
  }

  .trip-total{
    font-size:15px;
  }

  .stat-value{
    font-size:22px;
  }

}

</style>

<script src="layout.js"></script>

</head>

<body>

<div id="layoutHeader"></div>

<div class="summary-page">

  <!-- TABS -->
  <div class="summary-tabs">

    <button
      class="summary-tab active"
      onclick="switchTab('individual',this)">
      Individual
    </button>

    <button
      class="summary-tab"
      onclick="switchTab('shared',this)">
      Shared
    </button>

  </div>

  <!-- STATS -->
  <div class="stats-grid">

    <div class="stat-card">
      <div class="stat-title">Total Trips</div>
      <div class="stat-value" id="totalTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Completed</div>
      <div class="stat-value" id="completedTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Cancelled</div>
      <div class="stat-value" id="cancelledTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">No Show</div>
      <div class="stat-value" id="noShowTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Total Revenue</div>
      <div class="stat-value" id="totalRevenue">$0</div>
    </div>

  </div>

  <!-- CONTENT -->
  <div id="summaryContent"></div>

</div>

<script src="summary.js"></script>

</body>
</html>
