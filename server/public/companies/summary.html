<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Summary</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
  margin:0;
  background:#f4f8fb;
  font-family:'Segoe UI',sans-serif;
  color:#111827;
}

/* HEADER */
#layoutHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:9999;
}

/* PAGE */
.summary-page{
  padding:165px 10px 30px;
}

/* TOP BAR */
.summary-top{
  display:flex;
  gap:10px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

.search-input{
  flex:1;
  min-width:220px;
  height:42px;
  border:none;
  border-radius:10px;
  padding:0 14px;
  font-size:13px;
  background:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.print-btn{
  border:none;
  background:#145cff;
  color:#fff;
  border-radius:10px;
  padding:0 18px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
}

/* FILTERS */
.filters{
  display:flex;
  gap:10px;
  margin-bottom:14px;
  flex-wrap:wrap;
}

.filter-btn{
  border:none;
  background:#dbe4f0;
  color:#111827;
  border-radius:10px;
  padding:10px 16px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
}

.filter-btn.active{
  background:#145cff;
  color:#fff;
}

/* STATS */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  margin-bottom:18px;
}

.stat-card{
  background:#fff;
  border-radius:12px;
  padding:14px;
  box-shadow:0 3px 12px rgba(0,0,0,.06);
}

.stat-title{
  font-size:11px;
  color:#6b7280;
  margin-bottom:6px;
}

.stat-value{
  font-size:22px;
  font-weight:800;
}

/* DAY */
.day-title{
  font-size:15px;
  font-weight:800;
  margin:22px 0 10px;
  color:#1c2440;
}

/* TABLE */
.table-wrap{
  overflow:auto;
  background:#fff;
  border-radius:14px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
}

.summary-table{
  width:100%;
  border-collapse:collapse;
  min-width:1800px;
}

.summary-table th{
  background:#1c2440;
  color:#fff;
  font-size:11px;
  padding:10px 8px;
  text-align:left;
  white-space:nowrap;
}

.summary-table td{
  font-size:11px;
  padding:8px;
  border-bottom:1px solid #e5e7eb;
  vertical-align:top;
  font-weight:600;
  line-height:1.5;
}

/* STATUS */
.status{
  display:block;
  padding:3px 7px;
  border-radius:999px;
  font-size:10px;
  font-weight:800;
  margin-bottom:4px;
  width:max-content;
}

.completed{
  background:#dcfce7;
  color:#166534;
}

.noshow{
  background:#fef9c3;
  color:#854d0e;
}

.cancelled{
  background:#fee2e2;
  color:#991b1b;
}

/* TOTAL */
.total-cell{
  font-size:13px !important;
  font-weight:800 !important;
  color:#145cff;
}

/* SHARED STACK */
.stack{
  display:flex;
  flex-direction:column;
  gap:4px;
}

/* MOBILE */
@media(max-width:768px){

  .summary-page{
    padding:155px 6px 20px;
  }

  .summary-table th,
  .summary-table td{
    font-size:10px;
    padding:7px 6px;
  }

}

@media print{

  #layoutHeader,
  .summary-top,
  .filters{
    display:none !important;
  }

  body{
    background:#fff;
  }

  .summary-page{
    padding:0;
  }

}

</style>

<script src="layout.js"></script>

</head>

<body>

<div id="layoutHeader"></div>

<div class="summary-page">

  <!-- TOP -->
  <div class="summary-top">

    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="Search Name / Phone / Trip# / Company">

    <button
      class="print-btn"
      onclick="window.print()">
      Print
    </button>

  </div>

  <!-- FILTER -->
  <div class="filters">

    <button class="filter-btn active">Today</button>
    <button class="filter-btn">Week</button>
    <button class="filter-btn">Month</button>
    <button class="filter-btn">Year</button>

  </div>

  <!-- STATS -->
  <div class="stats-grid">

    <div class="stat-card">
      <div class="stat-title">Trips</div>
      <div class="stat-value" id="totalTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Completed</div>
      <div class="stat-value" id="completedTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Cancelled</div>
      <div class="stat-value" id="cancelledTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">No Show</div>
      <div class="stat-value" id="noShowTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Revenue</div>
      <div class="stat-value" id="totalRevenue">$0</div>
    </div>

  </div>

  <!-- CONTENT -->
  <div id="summaryContent"></div>

</div>

<script src="summary.js"></script>

</body>
</html>
