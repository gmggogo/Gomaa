<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Trips Summary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f1f5f9;
}

/* HEADER SPACE */
.page{
padding:90px 15px 25px;
max-width:1200px;
margin:auto;
}

/* TITLE */
h2{
margin-bottom:10px;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
flex:1;
padding:10px;
border:none;
border-radius:8px;
background:#374151;
color:#fff;
font-weight:700;
cursor:pointer;
}

.tab.active{
background:#2563eb;
}

/* FILTER */
.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

.filters input,
.filters button{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.filters button{
background:#2563eb;
color:#fff;
border:none;
cursor:pointer;
}

/* TABLE */
.table{
background:#fff;
border-radius:10px;
overflow:auto;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

table{
width:100%;
border-collapse:collapse;
min-width:900px;
}

th{
background:#1f2937;
color:#fff;
padding:10px;
font-size:13px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
font-size:13px;
text-align:center;
}

/* TRIP BADGE */
.trip-badge{
background:#2563eb;
color:#fff;
padding:6px 10px;
border-radius:6px;
font-weight:700;
}

/* STATUS BADGE */
.status{
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:800;
display:inline-block;
}

.status-completed{
background:#dcfce7;
color:#166534;
}

.status-noshow{
background:#fef9c3;
color:#92400e;
}

.status-cancelled{
background:#fee2e2;
color:#991b1b;
}

.status-scheduled{
background:#e5e7eb;
color:#374151;
}

</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="page">

<h2>Trips Summary</h2>

<!-- TABS -->
<div class="tabs">
<button class="tab active" onclick="switchTab('individual',this)">Individual</button>
<button class="tab" onclick="switchTab('shared',this)">Shared</button>
</div>

<!-- FILTER -->
<div class="filters">
<input type="date" id="date">
<input type="text" id="search" placeholder="Search name / trip #">
<button onclick="apply()">Search</button>
<button onclick="window.print()">Print</button>
</div>

<!-- TABLE -->
<div class="table">
<table>
<thead>
<tr>
<th>Trip #</th>
<th>Date</th>
<th>Time</th>
<th>Name</th>
<th>Phone</th>
<th>Status</th>
<th>Total</th>
</tr>
</thead>

<tbody id="body"></tbody>

</table>
</div>

</div>

<script src="layout.js"></script>
<script src="summary.js"></script>

</body>
</html>
