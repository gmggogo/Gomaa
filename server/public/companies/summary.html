<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Trips Summary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f1f5f9;
}

.page{
padding:90px 15px 20px;
max-width:1100px;
margin:auto;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
padding:8px 18px;
border:none;
border-radius:6px;
background:#e5e7eb;
cursor:pointer;
}

.tab.active{
background:#2563eb;
color:#fff;
}

/* BOX */
.trip-box{
background:#fff;
border-radius:10px;
margin-bottom:20px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.trip-header{
background:#1e293b;
color:#fff;
padding:10px;
font-size:14px;
display:flex;
justify-content:space-between;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th{
background:#2563eb;
color:#fff;
padding:8px;
font-size:13px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px;
text-align:center;
}

/* STATUS COLORS */
.completed{background:#dcfce7;}
.cancelled{background:#fee2e2;}
.noshow{background:#fef9c3;}

.total-row{
background:#111827;
color:#fff;
font-weight:bold;
}

</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="page">

<h2>Trips Summary</h2>

<div class="tabs">
<button class="tab active" onclick="switchTab('individual',this)">Individual</button>
<button class="tab" onclick="switchTab('shared',this)">Shared</button>
</div>

<div id="content"></div>

</div>

<script src="layout.js"></script>
<script src="summary.js"></script>

</body>
</html>
