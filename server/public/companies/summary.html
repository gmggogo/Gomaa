<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation – Summary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
margin:0;
font-family:'Segoe UI', Arial, sans-serif;
background:#f4f7fb;
}

.container{
max-width:1500px;
margin:auto;
padding:50px 25px;
}

.section-title{
font-size:22px;
font-weight:700;
color:#1e3a8a;
margin-bottom:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
}

.card{
background:#fff;
padding:30px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,.07);
border-left:6px solid #1e3a8a;
}

.card h3{
margin:0;
font-size:14px;
color:#64748b;
text-transform:uppercase;
}

.card p{
margin-top:18px;
font-size:34px;
font-weight:800;
color:#0f172a;
}

.placeholder{
margin-top:60px;
background:#fff;
padding:40px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
text-align:center;
color:#64748b;
font-size:16px;
}

</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="container">

<div class="section-title">Trips Summary</div>

<div class="cards">

<div class="card">
<h3>Total Trips</h3>
<p>0</p>
</div>

<div class="card">
<h3>Completed</h3>
<p>0</p>
</div>

<div class="card">
<h3>No Show</h3>
<p>0</p>
</div>

<div class="card">
<h3>Cancelled</h3>
<p>0</p>
</div>

</div>

<div class="placeholder">
Summary analytics will appear here once trips start running.
</div>

</div>

<script src="layout.js"></script>

</body>
</html>
