<!-- summary.html -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Sunbeam Summary</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

/* ================= GLOBAL ================= */

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#f4f8fb;
  font-family:'Segoe UI',sans-serif;
  color:#111827;
  overflow-x:hidden;
}

/* ================= HEADER ================= */

#layoutHeader{
  position:sticky;
  top:0;
  z-index:1000;
  background:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}

/* ================= PAGE ================= */

.page{
  width:100%;
  max-width:1800px;
  margin:auto;
  padding:88px 14px 24px;
}

/* ================= TOP BAR ================= */

.top-bar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.search-input,
.filter-select{

  height:42px;

  border:none;

  border-radius:10px;

  background:#fff;

  padding:0 12px;

  font-size:12px;

  box-shadow:0 2px 8px rgba(0,0,0,.05);

  font-weight:700;

}

.search-input{
  flex:1;
  min-width:220px;
}

.print-btn{

  border:none;

  background:#145cff;

  color:#fff;

  border-radius:10px;

  padding:0 18px;

  font-size:12px;

  font-weight:900;

  cursor:pointer;

}

/* ================= TABS ================= */

.tabs{
  display:flex;
  gap:8px;
  margin-bottom:14px;
}

.tab{

  flex:1;

  height:44px;

  border:none;

  border-radius:10px;

  background:#dbe4f0;

  color:#111827;

  font-size:13px;

  font-weight:900;

  cursor:pointer;

}

.tab.active{
  background:#145cff;
  color:#fff;
}

/* ================= STATS ================= */

.stats{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

  gap:12px;

  margin-bottom:20px;

}

.stat{

  background:
    linear-gradient(
      135deg,
      #16a34a,
      #22c55e
    );

  border-radius:16px;

  padding:16px;

  color:#fff;

  position:relative;

  overflow:hidden;

  cursor:pointer;

  transition:.2s;

  border:3px solid transparent;

}

.stat:hover{
  transform:translateY(-2px);
}

.stat.active{

  border-color:#facc15;

}

.stat::before{

  content:"";

  position:absolute;

  top:-30px;

  right:-30px;

  width:120px;

  height:120px;

  border-radius:50%;

  background:
    rgba(255,255,255,.08);

}

.stat-title{

  font-size:13px;

  font-weight:900;

  margin-bottom:12px;

  color:#dcfce7;

}

.stat-value{

  font-size:38px;

  font-weight:900;

  line-height:1;

  margin-bottom:14px;

}

.stat-grid{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:10px;

}

.stat-box{

  background:
    rgba(255,255,255,.12);

  border-radius:12px;

  padding:10px;

}

.stat-label{

  font-size:10px;

  font-weight:800;

  color:#dcfce7;

  margin-bottom:4px;

}

.stat-number{

  font-size:18px;

  font-weight:900;

}

.total-card{

  background:
    linear-gradient(
      135deg,
      #145cff,
      #2563eb
    );

}

/* ================= TABLE ================= */

.day-title{

  margin:24px 0 10px;

  font-size:15px;

  font-weight:900;

  color:#374151;

}

.table-wrap{

  width:100%;

  overflow-x:auto;

  background:#fff;

  border-radius:14px;

  border:1px solid #d1d5db;

  margin-bottom:18px;

}

.summary-table{

  width:100%;

  min-width:1500px;

  border-collapse:collapse;

}

.summary-table th{

  background:#dbe4f0;

  color:#111827;

  font-size:10px;

  font-weight:900;

  padding:10px 6px;

  border-bottom:2px solid #cbd5e1;

  white-space:nowrap;

}

.summary-table td{

  padding:8px 6px;

  font-size:9px;

  border-bottom:1px solid #e5e7eb;

  font-weight:700;

  vertical-align:top;

}

.summary-table tr:nth-child(even) td{
  background:#f8fafc;
}

.trip-divider td{
  height:12px;
  background:#f4f8fb !important;
  border:none;
}

/* ================= STATUS ================= */

.status{

  display:inline-block;

  padding:3px 8px;

  border-radius:999px;

  font-size:9px;

  font-weight:900;

}

.completed{
  background:#dcfce7;
  color:#166534;
}

.cancelled{
  background:#fee2e2;
  color:#991b1b;
}

.noshow{
  background:#fef9c3;
  color:#854d0e;
}

.total{
  font-weight:900;
  color:#145cff;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .page{
    padding:84px 6px 18px;
  }

  .stats{
    grid-template-columns:1fr 1fr;
    gap:8px;
  }

  .stat{
    padding:12px;
  }

  .stat-value{
    font-size:28px;
  }

  .summary-table{
    min-width:1450px;
  }

}

</style>

</head>

<body>

<div id="layoutHeader"></div>

<div class="page">

  <!-- TOP -->

  <div class="top-bar">

    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="Search Name / Phone / Trip# / Company">

    <select
      id="yearFilter"
      class="filter-select">
    </select>

    <select
      id="monthFilter"
      class="filter-select">
    </select>

    <button
      class="print-btn"
      onclick="window.print()">
      Print
    </button>

  </div>

  <!-- DYNAMIC TABS -->

  <div
    id="dynamicTabs"
    class="tabs">
  </div>

  <!-- DYNAMIC STATS -->

  <div
    id="dynamicStats"
    class="stats">
  </div>

  <!-- CONTENT -->

  <div id="summaryContent"></div>

</div>

<script src="layout.js"></script>
<script src="summary.js"></script>

</body>
</html>
