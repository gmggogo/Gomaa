<!-- summary.html -->
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Sunbeam Summary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
  margin:0;
  background:#f4f8fb;
  font-family:'Segoe UI',sans-serif;
  color:#111827;
}

/* =========================
   HEADER
========================= */

#layoutHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:9999;
}

.page{
  padding:160px 8px 30px;
}

/* =========================
   TOP BAR
========================= */

.top-bar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.search-input,
.filter-select{

  height:40px;

  border:none;

  border-radius:8px;

  background:#fff;

  padding:0 12px;

  font-size:11px;

  box-shadow:0 2px 8px rgba(0,0,0,.05);

  font-weight:700;
}

.search-input{
  flex:1;
  min-width:220px;
}

.print-btn{

  border:none;

  background:#145cff;

  color:#fff;

  border-radius:8px;

  padding:0 18px;

  font-size:11px;
  font-weight:900;

  cursor:pointer;

  transition:.2s;
}

.print-btn:hover{
  background:#0f46c9;
}

/* =========================
   TABS
========================= */

.tabs{
  display:flex;
  gap:8px;
  margin-bottom:12px;
}

.tab{

  flex:1;

  height:42px;

  border:none;

  border-radius:8px;

  background:#dbe4f0;

  color:#111827;

  font-size:12px;
  font-weight:900;

  cursor:pointer;

  transition:.2s;
}

.tab.active{
  background:#145cff;
  color:#fff;
}

/* =========================
   STATS
========================= */

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:8px;
  margin-bottom:14px;
}

.stat{

  background:#16a34a;

  border-radius:10px;

  padding:10px;

  box-shadow:0 2px 8px rgba(0,0,0,.08);

  color:#fff;
}

.stat-title{
  font-size:9px;
  color:#dcfce7;
  font-weight:700;
}

.stat-value{
  margin-top:4px;
  font-size:20px;
  font-weight:900;
  color:#fff;
}

/* =========================
   DATE TITLE
========================= */

.day-title{
  margin:18px 0 6px;
  font-size:12px;
  font-weight:900;
  color:#374151;
}

/* =========================
   TABLE WRAP
========================= */

.table-wrap{

  overflow-x:auto;

  background:#fff;

  border-radius:10px;

  border:1px solid #d1d5db;

  margin-bottom:14px;

  box-shadow:0 2px 8px rgba(0,0,0,.05);
}

/* =========================
   MAIN TABLE
========================= */

.summary-table{

  width:100%;

  min-width:1600px;

  border-collapse:collapse;

  table-layout:fixed;
}

/* =========================
   HEADER
========================= */

.summary-table th{

  background:#cfd8e3;

  color:#111827;

  font-size:9px;
  font-weight:900;

  text-align:left;

  padding:9px 6px;

  white-space:nowrap;

  border-bottom:2px solid #94a3b8;
  border-right:1px solid #cbd5e1;
}

/* =========================
   BODY
========================= */

.summary-table td{

  padding:8px 6px;

  font-size:9px;

  border-bottom:1px solid #e5e7eb;
  border-right:1px solid #e5e7eb;

  vertical-align:top;

  line-height:1.5;

  font-weight:700;

  color:#111827;

  overflow:hidden;
  text-overflow:ellipsis;

  background:#fff;
}

/* REMOVE LAST BORDER */

.summary-table th:last-child,
.summary-table td:last-child{
  border-right:none;
}

/* ZEBRA */

.summary-table tr:nth-child(even) td{
  background:#f8fafc;
}

/* HOVER */

.summary-table tr:hover td{
  background:#eef4ff;
}

/* =========================
   SHARED SEPARATOR
========================= */

.shared-separator td{
  border-bottom:1px solid #cbd5e1 !important;
}

/* =========================
   BIG DIVIDER
========================= */

.trip-divider-line td{
  padding:0 !important;
  height:4px;
  background:#94a3b8;
  border:none !important;
}

.trip-divider td{
  padding:0 !important;
  height:12px;
  background:#f4f8fb;
  border:none !important;
}

/* =========================
   STATUS
========================= */

.status{
  display:inline-block;
  padding:2px 6px;
  border-radius:999px;
  font-size:8px;
  font-weight:900;
}

.completed{
  background:#dcfce7;
  color:#166534;
}

.cancelled{
  background:#fee2e2;
  color:#991b1b;
}

.noshow{
  background:#fef9c3;
  color:#854d0e;
}

/* =========================
   TOTAL
========================= */

.total{
  font-weight:900;
  color:#145cff;
}

/* =========================
   COLORS
========================= */

/* TRIP NUMBER */
.summary-table td:first-child{

  background:#dbeafe !important;

  color:#1d4ed8;

  font-weight:900;
}

/* PRICE */
.summary-table td:nth-child(15){

  background:#fef9c3 !important;

  color:#854d0e;

  font-weight:900;
}

/* TOTAL */
.summary-table td:nth-child(16){

  background:#dcfce7 !important;

  color:#166534;

  font-weight:900;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

  .page{
    padding:150px 4px 20px;
  }

  .summary-table th,
  .summary-table td{
    font-size:8px;
    padding:5px 4px;
  }

}

/* =========================
   PRINT
========================= */

@media print{

  #layoutHeader,
  .top-bar,
  .tabs{
    display:none !important;
  }

  .page{
    padding:0;
  }

  body{
    background:#fff;
  }

}

</style>

<script src="layout.js"></script>

</head>

<body>

<div id="layoutHeader"></div>

<div class="page">

  <!-- TOP -->

  <div class="top-bar">

    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="Search Name / Phone / Trip# / Company">

    <select id="yearFilter" class="filter-select"></select>

    <select id="monthFilter" class="filter-select"></select>

    <button
      class="print-btn"
      onclick="window.print()">
      Print
    </button>

  </div>

  <!-- TABS -->

  <div class="tabs">

    <button
      class="tab active"
      onclick="switchTab('individual',this)">
      Individual
    </button>

    <button
      class="tab"
      onclick="switchTab('shared',this)">
      Shared
    </button>

  </div>

  <!-- STATS -->

  <div class="stats">

    <div class="stat">
      <div class="stat-title">Individual Trips</div>
      <div class="stat-value" id="individualTrips">0</div>
    </div>

    <div class="stat">
      <div class="stat-title">Shared Trips</div>
      <div class="stat-value" id="sharedTrips">0</div>
    </div>

    <div class="stat">
      <div class="stat-title">Completed</div>
      <div class="stat-value" id="completedTrips">0</div>
    </div>

    <div class="stat">
      <div class="stat-title">Cancelled</div>
      <div class="stat-value" id="cancelledTrips">0</div>
    </div>

    <div class="stat">
      <div class="stat-title">No Show</div>
      <div class="stat-value" id="noShowTrips">0</div>
    </div>

    <div class="stat">
      <div class="stat-title">Revenue</div>
      <div class="stat-value" id="totalRevenue">$0</div>
    </div>

  </div>

  <!-- CONTENT -->

  <div id="summaryContent"></div>

</div>

<script src="summary.js"></script>

</body>
</html>
