<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trips Summary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">
<link rel="stylesheet" href="summary.css">

<style>
.page{
  padding:80px 15px 25px;
  max-width:1200px;
  margin:auto;
}

.summary-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.summary-head h2{
  margin:0;
  color:#111827;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:14px;
}

.tab{
  flex:1;
  padding:10px 18px;
  border:none;
  border-radius:8px;
  background:#e5e7eb;
  font-weight:800;
  cursor:pointer;
}

.tab.active{
  background:#2563eb;
  color:#fff;
}

.filters{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.filters input,
.filters button{
  padding:9px 10px;
  border-radius:7px;
  border:1px solid #cbd5e1;
}

.filters button{
  background:#2563eb;
  color:#fff;
  border:none;
  font-weight:800;
  cursor:pointer;
}

.total-card{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:10px 14px;
  font-weight:900;
  color:#14532d;
  box-shadow:0 4px 14px rgba(0,0,0,.06);
}

/* INDIVIDUAL TABLE */
.table{
  background:#fff;
  border-radius:10px;
  overflow:auto;
  box-shadow:0 4px 14px rgba(0,0,0,.06);
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:760px;
}

th{
  background:#2563eb;
  color:#fff;
  padding:10px;
  font-size:13px;
}

td{
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:13px;
  text-align:center;
}

.trip-badge{
  display:inline-block;
  background:#0ea5e9;
  color:#fff;
  padding:6px 10px;
  border-radius:8px;
  font-weight:900;
}

.status-completed{color:green;font-weight:900}
.status-noshow{color:#ca8a04;font-weight:900}
.status-cancelled{color:#dc2626;font-weight:900}
.status-scheduled{color:#334155;font-weight:900}

/* SHARED CARDS */
#sharedView{
  display:none;
}

.shared-card{
  background:#fff;
  border-radius:14px;
  margin-bottom:16px;
  overflow:hidden;
  box-shadow:0 5px 18px rgba(0,0,0,.08);
  border:1px solid #e5e7eb;
}

.shared-card-header{
  background:#0f172a;
  color:#fff;
  padding:12px 14px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  font-weight:900;
}

.shared-meta{
  color:#cbd5e1;
  font-size:13px;
  margin-top:3px;
}

.passenger-list{
  padding:10px 14px;
}

.passenger-row{
  display:grid;
  grid-template-columns: 1.2fr 1fr .8fr .6fr;
  gap:10px;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid #eef2f7;
  font-size:13px;
}

.passenger-row:last-child{
  border-bottom:none;
}

.passenger-name{
  font-weight:900;
  color:#111827;
}

.shared-total{
  background:#f8fafc;
  padding:12px 14px;
  text-align:right;
  font-weight:900;
  color:#14532d;
  border-top:1px solid #e5e7eb;
}

.empty{
  background:#fff;
  padding:18px;
  border-radius:10px;
  color:#64748b;
  font-weight:800;
  text-align:center;
}

@media(max-width:700px){
  .page{
    padding:75px 10px 20px;
  }

  .tabs{
    gap:6px;
  }

  .tab{
    padding:10px 8px;
  }

  .filters input,
  .filters button{
    flex:1;
    min-width:120px;
  }

  .passenger-row{
    grid-template-columns:1fr;
    gap:4px;
    border:1px solid #e5e7eb;
    border-radius:10px;
    padding:10px;
    margin-bottom:8px;
  }

  .shared-total{
    text-align:left;
  }
}

@media print{
  #layoutHeader,
  .tabs,
  .filters{
    display:none!important;
  }

  .page{
    padding:0;
    max-width:none;
  }

  body{
    background:#fff;
  }
}
</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="page">

  <div class="summary-head">
    <div>
      <h2>Trips Summary</h2>
      <div style="color:#64748b;font-size:13px;margin-top:4px;">
        Completed • Cancelled • No Show
      </div>
    </div>
    <div class="total-card" id="totalBox">Total: $0.00</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="individualTab" onclick="switchTab('individual',this)">Individual</button>
    <button class="tab" id="sharedTab" onclick="switchTab('shared',this)">Shared</button>
  </div>

  <div class="filters">
    <input type="date" id="date">
    <input type="text" id="search" placeholder="Search by trip # / name / phone">
    <button onclick="apply()">Search</button>
    <button onclick="window.print()">Print</button>
  </div>

  <div id="individualView" class="table">
    <table>
      <thead>
        <tr>
          <th>Trip #</th>
          <th>Date</th>
          <th>Time</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="individualBody"></tbody>
    </table>
  </div>

  <div id="sharedView"></div>

</div>

<script src="layout.js"></script>
<script src="summary.js"></script>

</body>
</html>
