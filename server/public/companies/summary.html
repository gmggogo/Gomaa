<!-- summary.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Summary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#f4f8fb;
  font-family:'Segoe UI',sans-serif;
  color:#111827;
  overflow-x:hidden;
}

#layoutHeader{
  position:sticky;
  top:0;
  z-index:1000;
  background:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.page{
  width:100%;
  max-width:1700px;
  margin:auto;
  padding:88px 14px 24px;
}

.top-bar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.search-input,
.filter-select{
  height:42px;
  border:none;
  border-radius:10px;
  background:#fff;
  padding:0 12px;
  font-size:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  font-weight:700;
}

.search-input{
  flex:1;
  min-width:220px;
}

.print-btn{
  border:none;
  background:#145cff;
  color:#fff;
  border-radius:10px;
  padding:0 18px;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
}

.tabs{
  display:flex;
  gap:8px;
  margin-bottom:14px;
}

.tab{
  flex:1;
  height:44px;
  border:none;
  border-radius:10px;
  background:#dbe4f0;
  color:#111827;
  font-size:13px;
  font-weight:900;
  cursor:pointer;
}

.tab.active{
  background:#145cff;
  color:#fff;
}

.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  margin-bottom:18px;
}

.stat{
  background:#16a34a;
  border-radius:14px;
  padding:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
  color:#fff;
  cursor:pointer;
}

.stat.active{
  outline:3px solid #145cff;
}

.stat-title{
  font-size:11px;
  color:#dcfce7;
  font-weight:700;
}

.stat-value{
  margin-top:6px;
  font-size:24px;
  font-weight:900;
  color:#fff;
}

.stat-money{
  margin-top:4px;
  font-size:12px;
  font-weight:900;
  color:#fef9c3;
}

.day-title{
  margin:22px 0 8px;
  font-size:14px;
  font-weight:900;
  color:#374151;
}

.table-wrap{
  width:100%;
  overflow-x:auto;
  background:#fff;
  border-radius:14px;
  border:1px solid #d1d5db;
  margin-bottom:18px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.summary-table{
  width:100%;
  min-width:1600px;
  border-collapse:collapse;
  table-layout:fixed;
}

.summary-table th{
  background:#cfd8e3;
  color:#111827;
  font-size:10px;
  font-weight:900;
  text-align:left;
  padding:10px 6px;
  white-space:nowrap;
  border-bottom:2px solid #94a3b8;
  border-right:1px solid #cbd5e1;
}

.summary-table td{
  padding:8px 6px;
  font-size:9px;
  border-bottom:1px solid #e5e7eb;
  border-right:1px solid #e5e7eb;
  vertical-align:top;
  line-height:1.5;
  font-weight:700;
  color:#111827;
  overflow:hidden;
  text-overflow:ellipsis;
  background:#fff;
}

.summary-table tr:nth-child(even) td{background:#f8fafc}
.summary-table tr:hover td{background:#eef4ff}

.status{
  display:inline-block;
  padding:2px 6px;
  border-radius:999px;
  font-size:8px;
  font-weight:900;
}

.completed{background:#dcfce7;color:#166534}
.cancelled{background:#fee2e2;color:#991b1b}
.noshow{background:#fef9c3;color:#854d0e}

.total{
  font-weight:900;
  color:#145cff;
}

.shared-separator td{
  border-bottom:1px solid #cbd5e1 !important;
}

.trip-divider-line td{
  padding:0 !important;
  height:4px;
  background:#94a3b8;
  border:none !important;
}

.trip-divider td{
  padding:0 !important;
  height:12px;
  background:#f4f8fb;
  border:none !important;
}

.summary-table td:first-child{
  background:#dbeafe !important;
  color:#1d4ed8;
  font-weight:900;
}

.summary-table td:nth-child(16){
  background:#fef9c3 !important;
  color:#854d0e;
  font-weight:900;
}

@media(max-width:768px){
  .page{padding:84px 6px 18px}
  .search-input,.filter-select,.print-btn{height:40px;font-size:11px}
  .tab{font-size:11px;height:40px}
  .stats{grid-template-columns:1fr 1fr}
  .summary-table{min-width:1450px}
  .summary-table th,.summary-table td{font-size:8px;padding:5px 4px}
}

@media print{
  #layoutHeader,.top-bar,.tabs{display:none !important}
  .page{padding:0}
  body{background:#fff}
}
</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="page">

  <div class="top-bar">
    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="Search Name / Phone / Trip# / Company">

    <select id="yearFilter" class="filter-select"></select>
    <select id="monthFilter" class="filter-select"></select>

    <button class="print-btn" onclick="window.print()">Print</button>
  </div>

  <div class="tabs" id="dynamicTabs"></div>

  <div class="stats" id="dynamicStats"></div>

  <div id="summaryContent"></div>

</div>

<script src="layout.js"></script>
<script src="summary.js"></script>

</body>
</html>
