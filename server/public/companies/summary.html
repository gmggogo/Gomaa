<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trips Summary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

.page{
max-width:1100px;
margin:auto;
padding:100px 15px 30px;
}

/* HEADER TITLE */
.title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
padding:8px 18px;
border:none;
border-radius:6px;
background:#e5e7eb;
cursor:pointer;
font-weight:600;
}

.tab.active{
background:#2563eb;
color:#fff;
}

/* FILTER */
.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.filters input,
.filters button{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.filters button{
background:#2563eb;
color:#fff;
border:none;
cursor:pointer;
}

/* BOX */
.trip-box{
background:#fff;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
overflow:hidden;
}

/* BOX HEADER */
.trip-header{
background:linear-gradient(90deg,#2563eb,#1d4ed8);
color:#fff;
padding:10px;
display:flex;
justify-content:space-between;
font-size:13px;
font-weight:bold;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
}

th{
background:#f1f5f9;
padding:8px;
font-size:12px;
}

td{
padding:8px;
text-align:center;
border-bottom:1px solid #eee;
font-size:12px;
}

/* STATUS COLORS */
.completed{background:#dcfce7}
.noshow{background:#fef9c3}
.cancelled{background:#fee2e2}

/* TOTAL */
.total{
padding:10px;
text-align:right;
font-weight:bold;
background:#f8fafc;
}

/* MOBILE */
@media(max-width:768px){
td,th{font-size:11px}
}

</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="page">

<div class="title">Trips Summary</div>

<div class="tabs">
<button class="tab active" onclick="switchTab('individual',this)">Individual</button>
<button class="tab" onclick="switchTab('shared',this)">Shared</button>
</div>

<div class="filters">
<input type="date" id="date">
<input type="text" id="search" placeholder="Search name">
<button onclick="applyFilter()">Search</button>
<button onclick="window.print()">Print</button>
</div>

<div id="content"></div>

</div>

<script src="layout.js"></script>
<script src="summary.js"></script>

</body>
</html>
