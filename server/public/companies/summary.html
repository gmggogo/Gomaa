<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Summary</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
  margin:0;
  background:#f4f8fb;
  font-family:'Segoe UI',sans-serif;
  color:#111827;
}

#layoutHeader{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:9999;
}

.page{
  padding:165px 8px 30px;
}

/* TOP */
.top-bar{
  display:flex;
  gap:10px;
  margin-bottom:10px;
  flex-wrap:wrap;
}

.search-input,
.filter-select{
  height:40px;
  border:none;
  border-radius:10px;
  background:#fff;
  padding:0 12px;
  font-size:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.search-input{
  flex:1;
  min-width:240px;
}

.print-btn{
  border:none;
  background:#145cff;
  color:#fff;
  padding:0 18px;
  border-radius:10px;
  font-size:12px;
  font-weight:800;
  cursor:pointer;
}

/* TABS */
.summary-tabs{
  display:flex;
  gap:10px;
  margin-bottom:14px;
}

.summary-tab{
  flex:1;
  height:44px;
  border:none;
  border-radius:10px;
  background:#dbe4f0;
  color:#111827;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
}

.summary-tab.active{
  background:#145cff;
  color:#fff;
}

/* STATS */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  margin-bottom:16px;
}

.stat-card{
  background:#fff;
  border-radius:12px;
  padding:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.stat-title{
  font-size:10px;
  color:#6b7280;
  margin-bottom:4px;
}

.stat-value{
  font-size:22px;
  font-weight:800;
}

/* DAY */
.day-title{
  margin:18px 0 8px;
  font-size:13px;
  font-weight:800;
  color:#1c2440;
}

/* TABLE */
.table-wrap{
  overflow-x:auto;
  background:#fff;
  border-radius:14px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);
  margin-bottom:18px;
}

.summary-table{
  width:100%;
  border-collapse:collapse;
  min-width:2100px;
}

.summary-table th{
  background:#1c2440;
  color:#fff;
  padding:8px 5px;
  font-size:9px;
  text-align:left;
  white-space:nowrap;
  position:sticky;
  top:0;
}

.summary-table td{
  padding:6px 5px;
  font-size:9px;
  border-bottom:1px solid #e5e7eb;
  vertical-align:top;
  line-height:1.4;
  font-weight:600;
}

.stack{
  display:flex;
  flex-direction:column;
  gap:3px;
}

/* STATUS */
.status{
  display:inline-block;
  width:max-content;
  padding:2px 6px;
  border-radius:999px;
  font-size:8px;
  font-weight:800;
}

.completed{
  background:#dcfce7;
  color:#166534;
}

.cancelled{
  background:#fee2e2;
  color:#991b1b;
}

.noshow{
  background:#fef9c3;
  color:#854d0e;
}

.total{
  font-size:11px;
  font-weight:900;
  color:#145cff;
}

@media(max-width:768px){

  .page{
    padding:155px 4px 20px;
  }

  .summary-table th,
  .summary-table td{
    font-size:8px;
    padding:5px 4px;
  }

}

@media print{

  #layoutHeader,
  .top-bar,
  .summary-tabs{
    display:none !important;
  }

  .page{
    padding:0;
  }

  body{
    background:#fff;
  }

}

</style>

<script src="layout.js"></script>

</head>

<body>

<div id="layoutHeader"></div>

<div class="page">

  <!-- TOP -->
  <div class="top-bar">

    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="Search Name / Phone / Trip# / Company">

    <select
      id="yearFilter"
      class="filter-select">
    </select>

    <select
      id="monthFilter"
      class="filter-select">
    </select>

    <button
      class="print-btn"
      onclick="window.print()">
      Print
    </button>

  </div>

  <!-- TABS -->
  <div class="summary-tabs">

    <button
      class="summary-tab active"
      onclick="switchTab('individual',this)">
      Individual
    </button>

    <button
      class="summary-tab"
      onclick="switchTab('shared',this)">
      Shared
    </button>

  </div>

  <!-- STATS -->
  <div class="stats-grid">

    <div class="stat-card">
      <div class="stat-title">Individual Trips</div>
      <div class="stat-value" id="individualTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Shared Trips</div>
      <div class="stat-value" id="sharedTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Completed</div>
      <div class="stat-value" id="completedTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Cancelled</div>
      <div class="stat-value" id="cancelledTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">No Show</div>
      <div class="stat-value" id="noShowTrips">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">Revenue</div>
      <div class="stat-value" id="totalRevenue">$0</div>
    </div>

  </div>

  <!-- CONTENT -->
  <div id="summaryContent"></div>

</div>

<script src="summary.js"></script>

</body>
</html>
