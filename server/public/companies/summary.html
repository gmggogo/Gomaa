<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Trips Summary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">
<link rel="stylesheet" href="summary.css">

<style>

/* PAGE */
.page{
padding:80px 15px 20px;
max-width:1200px;
margin:auto;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
padding:8px 18px;
border:none;
border-radius:6px;
background:#e5e7eb;
cursor:pointer;
}

.tab.active{
background:#2563eb;
color:#fff;
}

/* FILTER */
.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

.filters input,
.filters button{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.filters button{
background:#2563eb;
color:#fff;
border:none;
cursor:pointer;
}

/* TABLE */
.table{
background:#fff;
border-radius:8px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

th{
background:#2563eb;
color:#fff;
padding:10px;
font-size:13px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
font-size:13px;
text-align:center;
}

/* STATUS */
.completed{color:green;font-weight:bold}
.noshow{color:#eab308;font-weight:bold}
.cancelled{color:#ef4444;font-weight:bold}

</style>
</head>

<body>

<!-- ✅ layout بتاع الشركات -->
<div id="layoutHeader"></div>

<div class="page">

<h2>Trips Summary</h2>

<!-- TABS -->
<div class="tabs">
<button class="tab active" onclick="switchTab('individual',this)">Individual</button>
<button class="tab" onclick="switchTab('shared',this)">Shared</button>
</div>

<!-- FILTER -->
<div class="filters">
<input type="date" id="date">
<input type="text" id="search" placeholder="Search">
<button onclick="apply()">Search</button>
<button onclick="window.print()">Print</button>
</div>

<!-- TABLE -->
<div class="table">
<table>
<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Name</th>
<th>Phone</th>
<th>Status</th>
<th>Total</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>
</div>

</div>

<script src="layout.js"></script>
<script src="summary.js"></script>

</body>
</html>
