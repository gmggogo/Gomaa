<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Trips Summary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f4f6fa;
}

.page{
padding:90px 15px;
max-width:1100px;
margin:auto;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
padding:8px 15px;
border:none;
border-radius:6px;
background:#ddd;
cursor:pointer;
}

.tab.active{
background:#2563eb;
color:#fff;
}

/* FILTER */
.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

.filters input,.filters button{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.filters button{
background:#2563eb;
color:#fff;
border:none;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:#fff;
border-radius:8px;
overflow:hidden;
}

th{
background:#2563eb;
color:#fff;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}

/* SHARED BOX */
.shared-box{
background:#fff;
border-radius:10px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.shared-header{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-weight:bold;
}

.passenger{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px dashed #ddd;
}

/* STATUS */
.completed{color:green}
.noshow{color:#eab308}
.cancelled{color:red}

</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="page">

<h2>Trips Summary</h2>

<div class="tabs">
<button class="tab active" onclick="switchTab('individual',this)">Individual</button>
<button class="tab" onclick="switchTab('shared',this)">Shared</button>
</div>

<div class="filters">
<input type="date" id="date">
<input type="text" id="search" placeholder="Search">
<button onclick="apply()">Search</button>
<button onclick="window.print()">Print</button>
</div>

<!-- INDIVIDUAL -->
<div id="individualView">
<table>
<thead>
<tr>
<th>Trip #</th>
<th>Date</th>
<th>Time</th>
<th>Name</th>
<th>Status</th>
<th>Total</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<!-- SHARED -->
<div id="sharedView" style="display:none;"></div>

</div>

<script src="layout.js"></script>
<script src="summary.js"></script>

</body>
</html>
