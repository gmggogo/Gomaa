<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SUNBEAM TRANSPORTATION – Add Trip</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
  margin:0;
  font-family:'Segoe UI', Arial, sans-serif;
  background:#f4f8fb;
}

/* HEADER */
#layoutHeader{
  position:sticky;
  top:0;
  z-index:1000;
  background:#fff;
}

/* CONTAINER */
.container{
  max-width:1500px;
  margin:auto;
  padding:85px 20px 30px;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  background:#e2e8f0;
  padding:6px;
  border-radius:14px;
}

.tabs button{
  flex:1;
  padding:13px;
  border-radius:11px;
}

/* SECTIONS */
section{
  background:#fff;
  padding:18px;
  border-radius:14px;
  margin-bottom:18px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
}

section h3{
  margin:0 0 12px;
  font-size:15px;
  color:#0f172a;
}

/* FORM */
.form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.field-wrap{
  position:relative;
}

input, textarea, select{
  width:100%;
  padding:11px;
  font-size:13px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  box-sizing:border-box;
}

input:focus, textarea:focus{
  border-color:#3b82f6;
  box-shadow:0 0 0 2px rgba(59,130,246,.15);
}

textarea{
  min-height:90px;
  margin-top:12px;
}

/* BUTTONS */
.actions{
  display:flex;
  gap:12px;
  margin-top:12px;
}

button{
  padding:12px 22px;
  border:none;
  border-radius:10px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
}

.btn-blue{background:#3b82f6;color:#fff;}
.btn-green{background:#22c55e;color:#000;}
.btn-gray{background:#64748b;color:#fff;}
.btn-light{background:#0ea5e9;color:#fff;}

/* STOPS */
.stop-row{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.remove-stop-btn{
  background:#ef4444;
  color:#fff;
  border-radius:8px;
  padding:10px;
}

/* PASSENGERS */
.passenger-card{
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
}

.passenger-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.remove-passenger{
  background:#ef4444;
  color:#fff;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  .container{padding:85px 12px 20px;}
  .form-grid{grid-template-columns:1fr;}
  .actions{flex-direction:column;}
  button{width:100%;}
}

</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="container">

<!-- TABS -->
<div class="tabs">
  <button id="tabIndividual" class="btn-blue" type="button">Individual</button>
  <button id="tabShared" class="btn-gray" type="button">Shared</button>
</div>

<!-- ================= INDIVIDUAL ================= -->
<div id="individualSection">

<section>
<h3>Entry Information</h3>
<div class="form-grid">
<input id="entryName" placeholder="Data Entry Name">
<input id="entryPhone" placeholder="Phone Number">
</div>
<button class="btn-blue" id="editEntry" type="button">Edit</button>
</section>

<section>
<h3>Client Information</h3>
<div class="form-grid">
<input id="clientName" placeholder="Client Name">
<input id="clientPhone" placeholder="Client Phone">
</div>
</section>

<section>
<h3>Trip Details</h3>

<div class="form-grid">
<input id="pickup" placeholder="Pickup Address">
<input id="dropoff" placeholder="Dropoff Address">
<input id="tripDate" type="date">
<input id="tripTime" type="time">
</div>

<div id="stops"></div>

<button class="btn-light" id="addStopBtn" type="button">+ Add Stop</button>

<textarea id="notes" placeholder="Notes"></textarea>
</section>

<div class="actions">
<button class="btn-gray" id="saveTrip" type="button">Save Trip</button>
<button class="btn-green" id="submitTrip" type="button">Submit Trip</button>
</div>

</div>

<!-- ================= SHARED ================= -->
<div id="sharedSection" style="display:none;">

<section>
<h3>Entry Information</h3>
<div class="form-grid">
<input id="sharedEntryName" placeholder="Data Entry Name">
<input id="sharedEntryPhone" placeholder="Phone Number">
</div>
</section>

<section>
<h3>Shared Setup</h3>
<div class="form-grid">
<select id="passengerCount">
<option value="">Select Passengers</option>
<option value="2">2 Passengers</option>
<option value="3">3 Passengers</option>
<option value="4">4 Passengers</option>
</select>

<input id="sharedDate" type="date">
<input id="sharedTime" type="time">
</div>
</section>

<section>
<h3>Passengers</h3>
<div id="passengersContainer"></div>
</section>

<section>
<h3>Notes</h3>
<textarea id="sharedNotes" placeholder="Notes"></textarea>
</section>

<div class="actions">
<button class="btn-gray" id="saveShared" type="button">Save</button>
<button class="btn-green" id="submitShared" type="button">Submit Shared</button>
</div>

</div>

</div>

<script src="layout.js"></script>
<script src="add-trip.js"></script>

</body>
</html>
