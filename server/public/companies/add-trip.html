<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SUNBEAM TRANSPORTATION – Add Trip</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
margin:0;
font-family:'Segoe UI', Arial, sans-serif;
background:#f4f8fb;
}

.container{
max-width:1400px;
margin:auto;
padding:30px 18px;
}

/* CARD */
.card{
background:#fff;
padding:16px;
border-radius:14px;
margin-bottom:16px;
box-shadow:0 6px 14px rgba(0,0,0,.06);
}

/* TITLES */
.title{
font-size:14px;
font-weight:600;
margin-bottom:10px;
color:#0f172a;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input, textarea, select{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #cbd5e1;
font-size:13px;
}

textarea{
min-height:80px;
}

/* BUTTONS */
.actions{
display:flex;
gap:10px;
margin-top:10px;
}

button{
border:none;
border-radius:10px;
padding:10px;
font-weight:600;
cursor:pointer;
}

.btn-blue{background:#2563eb;color:#fff;}
.btn-green{background:#22c55e;color:#000;}
.btn-gray{background:#64748b;color:#fff;}
.btn-light{background:#0ea5e9;color:#fff;}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tabs button{
flex:1;
}

/* PASSENGERS */
.passenger{
background:#f8fafc;
border:1px solid #e5e7eb;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

/* MOBILE */
@media(max-width:768px){
.grid{
grid-template-columns:1fr;
}
.actions{
flex-direction:column;
}
}

</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="container">

<!-- TABS -->
<div class="tabs">
<button id="tabIndividual" class="btn-blue">Individual</button>
<button id="tabShared" class="btn-gray">Shared</button>
</div>

<!-- ================= INDIVIDUAL ================= -->
<div id="individualSection">

<div class="card">
<div class="title">Entry Information</div>

<div class="grid">
<input id="entryName" placeholder="Data Entry Name">
<input id="entryPhone" placeholder="Phone Number">
</div>

<div class="actions">
<button id="editEntry" class="btn-blue">Edit</button>
</div>
</div>

<div class="card">
<div class="title">Client</div>

<div class="grid">
<input id="clientName" placeholder="Client Name">
<input id="clientPhone" placeholder="Client Phone">
</div>
</div>

<div class="card">
<div class="title">Trip</div>

<div class="grid">
<input id="pickup" placeholder="Pickup">
<input id="dropoff" placeholder="Dropoff">
<input id="tripDate" type="date">
<input id="tripTime" type="time">
</div>

<div id="stops"></div>

<button id="addStopBtn" class="btn-light">+ Add Stop</button>

<textarea id="notes" placeholder="Notes"></textarea>
</div>

<div class="actions">
<button id="saveTrip" class="btn-gray">Save</button>
<button id="submitTrip" class="btn-green">Submit</button>
</div>

</div>

<!-- ================= SHARED ================= -->
<div id="sharedSection" style="display:none;">

<!-- ENTRY -->
<div class="card">
<div class="title">Entry Information</div>

<div class="grid">
<input id="sharedEntryName" placeholder="Data Entry Name">
<input id="sharedEntryPhone" placeholder="Phone Number">
</div>

<div class="actions">
<button id="editSharedEntry" class="btn-blue">Edit</button>
</div>
</div>

<!-- SETUP -->
<div class="card">
<div class="title">Shared Setup</div>

<div class="grid">
<select id="passengerCount">
<option value="">Passengers</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
</select>

<input id="sharedDate" type="date">
<input id="sharedTime" type="time">
</div>
</div>

<!-- PASSENGERS -->
<div class="card">
<div class="title">Passengers</div>

<div id="passengersContainer"></div>
</div>

<!-- NOTES -->
<div class="card">
<div class="title">Notes</div>
<textarea id="sharedNotes"></textarea>
</div>

<div class="actions">
<button id="saveShared" class="btn-gray">Save</button>
<button id="submitShared" class="btn-green">Submit Shared</button>
</div>

</div>

</div>

<script src="layout.js"></script>
<script src="add-trip.js"></script>

</body>
</html>
