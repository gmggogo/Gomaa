<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SUNBEAM TRANSPORTATION – Add Trip</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

/* ================= GLOBAL ================= */

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Segoe UI', Arial, sans-serif;
  background:#f4f8fb;
  color:#111827;
  overflow-x:hidden;
}

#layoutHeader{
  position:sticky;
  top:0;
  z-index:1000;
  background:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}

/* ================= CONTAINER ================= */

.container{
  width:100%;
  max-width:1700px;
  margin:auto;
  padding:88px 14px 24px;
}

/* ================= TABS ================= */

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  background:#e2e8f0;
  padding:6px;
  border-radius:14px;
  overflow-x:auto;
}

.tabs button{
  flex:1;
  min-width:120px;
  padding:13px;
  border:none;
  border-radius:11px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
}

/* ================= BUTTON COLORS ================= */

.btn-blue{
  background:#2563eb;
  color:#fff;
}

.btn-gray{
  background:#64748b;
  color:#fff;
}

.btn-green{
  background:#22c55e;
  color:#000;
}

.btn-light{
  background:#0ea5e9;
  color:#fff;
}

.btn-orange{
  background:#f97316;
  color:#fff;
}

.btn-red{
  background:#ef4444;
  color:#fff;
}

/* ================= SECTION ================= */

section{
  background:#fff;
  padding:18px;
  border-radius:16px;
  margin-bottom:18px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
}

section h3{
  margin:0 0 14px;
  font-size:16px;
  font-weight:800;
  color:#0f172a;
}

/* ================= GRID ================= */

.form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

/* ================= INPUTS ================= */

.field-wrap{
  position:relative;
}

input,
textarea,
select{
  width:100%;
  padding:12px;
  font-size:13px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  background:#fff;
  color:#111827;
}

input:focus,
textarea:focus,
select:focus{
  outline:none;
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,.15);
}

textarea{
  min-height:90px;
  margin-top:12px;
  resize:vertical;
}

/* ================= ACTIONS ================= */

.actions{
  display:flex;
  gap:12px;
  margin-top:12px;
  flex-wrap:wrap;
}

button{
  padding:12px 22px;
  border:none;
  border-radius:10px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-1px);
}

/* ================= STOPS ================= */

.stop-row{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.stop-row input{
  flex:1;
}

.remove-stop-btn{
  background:#ef4444;
  color:#fff;
  border-radius:8px;
  padding:10px 14px;
  width:auto;
}

/* ================= PASSENGERS ================= */

.passenger-card{
  background:#f9fafb;
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
}

.passenger-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.remove-passenger{
  background:#ef4444;
  color:#fff;
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  width:auto;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .container{
    padding:84px 6px 18px;
  }

  .tabs{
    gap:6px;
  }

  .tabs button{
    font-size:11px;
    padding:11px;
    min-width:100px;
  }

  .form-grid{
    grid-template-columns:1fr;
    gap:12px;
  }

  section{
    padding:16px;
    border-radius:14px;
  }

  section h3{
    font-size:15px;
  }

  input,
  textarea,
  select{
    font-size:12px;
    padding:11px;
  }

  .actions{
    flex-direction:column;
  }

  button{
    width:100%;
    font-size:13px;
  }

  .stop-row{
    flex-direction:column;
  }

  .remove-stop-btn{
    width:100%;
  }

  .passenger-header{
    flex-direction:column;
    align-items:flex-start;
    gap:8px;
  }

  .remove-passenger{
    width:100%;
  }

}

</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="container">

<!-- ================= DYNAMIC COMPANY TABS ================= -->

<div class="tabs" id="companyTabs"></div>

<!-- ================= INDIVIDUAL SERVICES ================= -->

<div id="individualSection">

<section>

<h3>Entry Information</h3>

<div class="form-grid">

  <div class="field-wrap">
    <input id="entryName" placeholder="Data Entry Name">
  </div>

  <div class="field-wrap">
    <input id="entryPhone" placeholder="Phone Number">
  </div>

</div>

<div style="margin-top:10px;">
  <button class="btn-blue" id="editEntry" type="button">
    Edit
  </button>
</div>

</section>

<section>

<h3>Client Information</h3>

<div class="form-grid">

  <div class="field-wrap">
    <input id="clientName" placeholder="Client Name">
  </div>

  <div class="field-wrap">
    <input id="clientPhone" placeholder="Client Phone">
  </div>

</div>

</section>

<section>

<h3>Trip Details</h3>

<div class="form-grid">

  <div class="field-wrap">
    <input id="pickup" placeholder="Pickup Address">
  </div>

  <div class="field-wrap">
    <input id="tripDate" type="date">
  </div>

</div>

<div id="stops" style="margin-top:12px;"></div>

<div style="margin-top:10px;">
  <button class="btn-orange" id="addStopBtn" type="button">
    + Add Stop
  </button>
</div>

<div class="form-grid" style="margin-top:12px;">

  <div class="field-wrap">
    <input id="dropoff" placeholder="Dropoff Address">
  </div>

  <div class="field-wrap">
    <input id="tripTime" type="time">
  </div>

</div>

<textarea id="notes" placeholder="Notes"></textarea>

</section>

<div class="actions">

  <button class="btn-gray" id="saveTrip" type="button">
    Save Trip
  </button>

  <button class="btn-green" id="submitTrip" type="button">
    Submit Trip
  </button>

</div>

</div>

<!-- ================= SHARED ================= -->

<div id="sharedSection" style="display:none;">

<section>

<h3>Entry Information</h3>

<div class="form-grid">

  <div class="field-wrap">
    <input id="sharedEntryName" placeholder="Data Entry Name" disabled>
  </div>

  <div class="field-wrap">
    <input id="sharedEntryPhone" placeholder="Phone Number" disabled>
  </div>

</div>

<div style="margin-top:10px;">
  <button class="btn-blue" id="editSharedEntry" type="button">
    Edit
  </button>
</div>

</section>

<section>

<h3>Shared Setup</h3>

<div class="form-grid">

  <div class="field-wrap">
    <select id="passengerCount">
      <option value="">Select Passengers</option>
      <option value="2">2 Passengers</option>
      <option value="3">3 Passengers</option>
      <option value="4">4 Passengers</option>
    </select>
  </div>

  <div class="field-wrap">
    <input id="sharedDate" type="date">
  </div>

  <div class="field-wrap">
    <input id="sharedTime" type="time">
  </div>

</div>

</section>

<section>

<h3>Passengers</h3>

<div id="passengersContainer"></div>

</section>

<section>

<h3>Notes</h3>

<textarea id="sharedNotes" placeholder="Notes"></textarea>

</section>

<div class="actions">

  <button class="btn-gray" id="saveShared" type="button">
    Save
  </button>

  <button class="btn-green" id="submitShared" type="button">
    Submit Shared
  </button>

</div>

</div>

</div>

<script>

/* =========================
DYNAMIC COMPANY SERVICES
========================= */

const COMPANY_SERVICES = [

  {
    key:"STANDARD",
    title:"Standard",
    suffix:"ST",
    shared:false,
    active:true
  },

  {
    key:"XL",
    title:"XL",
    suffix:"XL",
    shared:false,
    active:true
  },

  {
    key:"TAXI",
    title:"Taxi",
    suffix:"TX",
    shared:false,
    active:true
  },

  {
    key:"LIMO",
    title:"Limousine",
    suffix:"LM",
    shared:false,
    active:true
  },

  {
    key:"WHEELCHAIR",
    title:"Wheelchair",
    suffix:"WH",
    shared:false,
    active:true
  },

  {
    key:"SHARED",
    title:"Shared",
    suffix:"SH",
    shared:true,
    active:true
  }

];

/* =========================
BUILD TABS
========================= */

const companyTabs =
document.getElementById(
  "companyTabs"
);

const individualSection =
document.getElementById(
  "individualSection"
);

const sharedSection =
document.getElementById(
  "sharedSection"
);

let activeService =
"STANDARD";

let activeSuffix =
"ST";

function buildCompanyTabs(){

  companyTabs.innerHTML = "";

  COMPANY_SERVICES
  .filter(service => service.active)
  .forEach((service,index)=>{

    const btn =
    document.createElement(
      "button"
    );

    btn.type = "button";

    btn.innerText =
    service.title;

    btn.dataset.service =
    service.key;

    btn.dataset.suffix =
    service.suffix;

    btn.className =
      index === 0
      ? "btn-blue"
      : "btn-gray";

    companyTabs.appendChild(
      btn
    );

    btn.addEventListener(
      "click",
      function(){

        companyTabs
        .querySelectorAll("button")
        .forEach(b=>{

          b.classList.remove(
            "btn-blue"
          );

          b.classList.add(
            "btn-gray"
          );

        });

        btn.classList.remove(
          "btn-gray"
        );

        btn.classList.add(
          "btn-blue"
        );

        activeService =
          service.key;

        activeSuffix =
          service.suffix;

        const isShared =
          service.shared === true;

        individualSection.style.display =
          isShared
          ? "none"
          : "block";

        sharedSection.style.display =
          isShared
          ? "block"
          : "none";

      }
    );

  });

}

buildCompanyTabs();

</script>

<script src="layout.js"></script>
<script src="add-trip.js"></script>

</body>
</html>
