<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation – Add Trip</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<!-- GOOGLE MAPS -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_KEY"></script>

<style>

body{
margin:0;
font-family:'Segoe UI', Arial, sans-serif;
background:#f4f8fb;
}

.container{
max-width:1400px;
margin:auto;
padding:40px 20px;
}

section{
background:#fff;
padding:20px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 6px 18px rgba(0,0,0,.06);
}

.form-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

input, textarea{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #cbd5e1;
background:#f8fafc;
font-size:14px;
}

input:focus, textarea:focus{
border-color:#2563eb;
background:#fff;
outline:none;
}

.actions{
display:flex;
gap:12px;
margin-top:15px;
}

.actions button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.btn-blue{background:#2563eb;color:#fff;}
.btn-green{background:#22c55e;}
.btn-gray{background:#64748b;color:#fff;}
.btn-light{background:#0ea5e9;color:#fff;}

@media(max-width:768px){
.form-grid{grid-template-columns:1fr;}
.actions{flex-direction:column;}
}

</style>
</head>

<body>

<div class="container">

<section>
<h3>Entry Info</h3>
<div class="form-grid">
<input id="entryName" placeholder="Entry Name">
<input id="entryPhone" placeholder="Phone">
</div>
<button class="btn-blue" id="editEntry">Save</button>
</section>

<section>
<h3>Client</h3>
<div class="form-grid">
<input id="clientName" placeholder="Client Name">
<input id="clientPhone" placeholder="Client Phone">
</div>
</section>

<section>
<h3>Trip</h3>

<div class="form-grid">
<input id="pickup" placeholder="Pickup Address">
<input id="dropoff" placeholder="Dropoff Address">
<input id="tripDate" type="date">
<input id="tripTime" type="time">
</div>

<div id="stops"></div>

<button class="btn-light" id="addStopBtn">+ Add Stop</button>

<textarea id="notes" placeholder="Notes"></textarea>

</section>

<div class="actions">
<button class="btn-gray" id="saveTrip">Save</button>
<button class="btn-green" id="submitTrip">Submit</button>
</div>

</div>
