<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SUNBEAM TRANSPORTATION – Add Trip</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
margin:0;
font-family:'Segoe UI', Arial, sans-serif;
background:#f4f8fb;
}

.container{
max-width:1500px;
margin:auto;
padding:50px 25px;
}

/* TABS */

.top-tabs{
display:flex;
gap:12px;
margin-bottom:20px;
}

.tab{
flex:1;
padding:14px;
border:none;
border-radius:12px;
background:#1e293b;
color:#fff;
font-weight:600;
cursor:pointer;
}

.tab.active{
background:#2563eb;
}

/* SECTIONS */

section{
background:#fff;
padding:18px;
border-radius:14px;
margin-bottom:20px;
box-shadow:0 6px 16px rgba(0,0,0,.08);
}

section h3{
margin-bottom:12px;
font-size:15px;
color:#0f172a;
}

/* FORM */

.form-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.field-wrap{
position:relative;
width:100%;
}

input, textarea, select{
width:100%;
padding:10px;
font-size:13px;
border:1px solid #cbd5e1;
border-radius:10px;
box-sizing:border-box;
}

textarea{
min-height:90px;
margin-top:12px;
}

/* BUTTONS */

.actions{
display:flex;
gap:12px;
margin-top:12px;
}

button{
padding:12px 22px;
border:none;
border-radius:10px;
font-size:14px;
font-weight:600;
cursor:pointer;
}

.btn-blue{background:#3b82f6;color:#fff;}
.btn-green{background:#22c55e;color:#000;}
.btn-gray{background:#64748b;color:#fff;}
.btn-light{background:#0ea5e9;color:#fff;}

/* MOBILE */

@media(max-width:768px){

.form-grid{
grid-template-columns:1fr;
}

.actions{
flex-wrap:wrap;
}

button{
width:100%;
}

}

</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="container">

<!-- ================= TABS ================= -->

<div class="top-tabs">
  <button class="tab active">Individual</button>
  <button class="tab">Shared</button>
</div>

<!-- ================= INDIVIDUAL ================= -->

<div id="individualSection">

<section>
<h3>Entry Information</h3>

<div class="form-grid">
  <div class="field-wrap">
    <input placeholder="Data Entry Name">
  </div>
  <div class="field-wrap">
    <input placeholder="Phone Number">
  </div>
</div>

<button class="btn-blue" style="margin-top:10px;">Edit</button>

</section>

<section>

<h3>Client Information</h3>

<div class="form-grid">
  <div class="field-wrap">
    <input placeholder="Client Name">
  </div>
  <div class="field-wrap">
    <input placeholder="Client Phone">
  </div>
</div>

</section>

<section>

<h3>Trip Details</h3>

<div class="form-grid">
  <div class="field-wrap">
    <input placeholder="Pickup Address">
  </div>
  <div class="field-wrap">
    <input placeholder="Dropoff Address">
  </div>
  <div class="field-wrap">
    <input type="date">
  </div>
  <div class="field-wrap">
    <input type="time">
  </div>
</div>

<button class="btn-light" style="margin-top:10px;">+ Add Stop</button>

<textarea placeholder="Notes"></textarea>

</section>

<div class="actions">
<button class="btn-gray">Save Trip</button>
<button class="btn-green">Submit Trip</button>
</div>

</div>

<!-- ================= SHARED ================= -->

<div id="sharedSection">

<section>
<h3>Shared Trip</h3>

<div class="form-grid">
  <div class="field-wrap">
    <select>
      <option>Passengers</option>
      <option>2</option>
      <option>3</option>
      <option>4</option>
    </select>
  </div>

  <div class="field-wrap">
    <input type="date">
  </div>

  <div class="field-wrap">
    <input type="time">
  </div>
</div>

</section>

<section>
<h3>Passengers</h3>

<div class="form-grid">
  <input placeholder="Name">
  <input placeholder="Phone">
  <input placeholder="Pickup">
  <input placeholder="Dropoff">
</div>

</section>

<div class="actions">
<button class="btn-gray">Save</button>
<button class="btn-green">Submit Shared</button>
</div>

</div>

</div>

</body>
</html>
