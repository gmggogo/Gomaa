<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SUNBEAM TRANSPORTATION – Add Trip</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>
body{
margin:0;
font-family:'Segoe UI', Arial, sans-serif;
background:#f4f8fb;
}

.container{
max-width:1500px;
margin:auto;
padding:50px 25px;
}

section{
background:#fff;
padding:18px;
border-radius:14px;
margin-bottom:20px;
box-shadow:0 6px 16px rgba(0,0,0,.08);
}

section h3{
margin-bottom:12px;
font-size:15px;
color:#0f172a;
}

.form-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.field-wrap{
position:relative;
width:100%;
}

input, textarea, select{
width:100%;
padding:10px;
font-size:13px;
border:1px solid #cbd5e1;
border-radius:10px;
box-sizing:border-box;
}

textarea{
min-height:90px;
margin-top:12px;
}

.actions{
display:flex;
gap:12px;
margin-top:12px;
}

button{
padding:12px 22px;
border:none;
border-radius:10px;
font-size:14px;
font-weight:600;
cursor:pointer;
}

.btn-blue{background:#3b82f6;color:#fff;}
.btn-green{background:#22c55e;color:#000;}
.btn-gray{background:#64748b;color:#fff;}
.btn-light{background:#0ea5e9;color:#fff;}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tabs button{
flex:1;
}

.passenger-card{
border:1px solid #e5e7eb;
border-radius:12px;
padding:14px;
background:#f9fafb;
margin-bottom:12px;
}

.passenger-card h4{
margin:0 0 12px;
font-size:14px;
color:#0f172a;
}

.stop-row{
position:relative;
margin-bottom:10px;
}

.remove-stop-btn{
margin-top:6px;
background:#64748b;
color:#fff;
}

@media(max-width:768px){
.container{
padding:25px 14px;
}

.form-grid{
grid-template-columns:1fr;
}

.actions{
flex-wrap:wrap;
}

button{
width:100%;
}
}
</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="container">

<div class="tabs">
<button id="tabIndividual" class="btn-blue" type="button">Individual</button>
<button id="tabShared" class="btn-gray" type="button">Shared</button>
</div>

<div id="individualSection">

<section>
<h3>Entry Information</h3>

<div class="form-grid">
  <div class="field-wrap">
    <input id="entryName" placeholder="Data Entry Name">
  </div>
  <div class="field-wrap">
    <input id="entryPhone" placeholder="Phone Number">
  </div>
</div>

<div style="margin-top:10px;">
<button class="btn-blue" id="editEntry" type="button">Edit</button>
</div>
</section>

<section>
<h3>Client Information</h3>

<div class="form-grid">
  <div class="field-wrap">
    <input id="clientName" placeholder="Client Name">
  </div>
  <div class="field-wrap">
    <input id="clientPhone" placeholder="Client Phone">
  </div>
</div>
</section>

<section>
<h3>Trip Details</h3>

<div class="form-grid">
  <div class="field-wrap">
    <input id="pickup" placeholder="Pickup Address" autocomplete="off">
  </div>
  <div class="field-wrap">
    <input id="dropoff" placeholder="Dropoff Address" autocomplete="off">
  </div>
  <div class="field-wrap">
    <input id="tripDate" type="date">
  </div>
  <div class="field-wrap">
    <input id="tripTime" type="time">
  </div>
</div>

<div id="stops" style="margin-top:10px;"></div>

<button class="btn-light" id="addStopBtn" type="button">+ Add Stop</button>

<textarea id="notes" placeholder="Notes"></textarea>
</section>

<div class="actions">
<button class="btn-gray" id="saveTrip" type="button">Save Trip</button>
<button class="btn-green" id="submitTrip" type="button">Submit Trip</button>
</div>

</div>

<div id="sharedSection" style="display:none;">

<section>
<h3>Entry Information</h3>

<div class="form-grid">
  <div class="field-wrap">
    <input id="sharedEntryName" placeholder="Data Entry Name">
  </div>
  <div class="field-wrap">
    <input id="sharedEntryPhone" placeholder="Phone Number">
  </div>
</div>
</section>

<section>
<h3>Shared Setup</h3>

<div class="form-grid">
  <div class="field-wrap">
    <select id="passengerCount">
      <option value="">Select Passengers</option>
      <option value="2">2 Passengers</option>
      <option value="3">3 Passengers</option>
      <option value="4">4 Passengers</option>
    </select>
  </div>

  <div class="field-wrap">
    <input id="sharedDate" type="date">
  </div>

  <div class="field-wrap">
    <input id="sharedTime" type="time">
  </div>
</div>
</section>

<section>
<h3>Passengers</h3>
<div id="passengersContainer"></div>
</section>

<section>
<h3>Notes</h3>
<textarea id="sharedNotes" placeholder="Notes"></textarea>
</section>

<div class="actions">
<button class="btn-gray" id="saveShared" type="button">Save</button>
<button class="btn-green" id="submitShared" type="button">Submit Shared</button>
</div>

</div>

</div>

<script src="layout.js"></script>
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_KEY"></script>
<script src="add-trip.js"></script>

</body>
</html>
