<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SUNBEAM TRANSPORTATION – Review</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI', Arial, sans-serif;
  background:#f4f8fb;
}

#layoutHeader{
  position:sticky;
  top:0;
  z-index:1000;
  background:#fff;
}

.container{
  max-width:1500px;
  margin:auto;
  padding:90px 20px 30px;
}

.review-tabs{
  display:flex;
  gap:10px;
  margin:0 0 20px;
  background:#e2e8f0;
  padding:6px;
  border-radius:14px;
}

.review-tabs button{
  flex:1;
  padding:13px;
  border:none;
  border-radius:11px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
}

.tab-active{
  background:#2563eb;
  color:#fff;
}

.tab-inactive{
  background:#64748b;
  color:#fff;
}

.date-title{
  margin-top:30px;
  font-weight:700;
  font-size:18px;
  color:#0f172a;
}

table,
.review-table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  margin-top:10px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
  border-radius:12px;
  overflow:hidden;
}

th,
td,
.review-table th,
.review-table td{
  padding:10px;
  font-size:13px;
  border:1px solid #dbe2ea;
  text-align:left;
  vertical-align:top;
}

th,
.review-table th{
  background:#0f172a;
  color:#fff;
}

tr{
  transition:background .3s;
}

tr:hover{
  background:#f9fafb;
}

.multi-line{
  white-space:pre-line;
  line-height:1.65;
  text-align:left;
}

.shared-box{
  border:1px dashed #cbd5e1;
  background:#f8fafc;
  border-radius:10px;
  padding:8px;
}

.passenger-item{
  margin-bottom:8px;
  padding-bottom:8px;
  border-bottom:1px dashed #cbd5e1;
}

.passenger-item:last-child{
  margin-bottom:0;
  padding-bottom:0;
  border-bottom:none;
}

.trip-number-badge,
.trip-badge{
  display:inline-block;
  background:#0ea5e9;
  color:#fff;
  padding:6px 10px;
  border-radius:8px;
  font-weight:800;
  white-space:nowrap;
}

.price-badge{
  display:inline-block;
  background:#bbf7d0;
  color:#14532d;
  padding:6px 10px;
  border-radius:8px;
  font-weight:900;
  box-shadow:0 0 12px rgba(34,197,94,.35);
  white-space:nowrap;
}

.status-badge,
.status{
  display:inline-block;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  font-weight:800;
  white-space:nowrap;
}

.status-scheduled{
  background:#facc15;
  color:#111827;
}

.status-confirmed{
  background:#22c55e;
  color:#fff;
  box-shadow:0 0 10px rgba(34,197,94,.4);
}

.status-cancelled{
  background:#ef4444;
  color:#fff;
}

.status-progress{
  background:#3b82f6;
  color:#fff;
}

.scheduled-row{
  background:#ffffff;
  color:#111827;
}

.confirmed-row{
  background:#22c55e;
  color:#111827;
}

.cancelled-row{
  background:#ef4444;
  color:#111827;
}

.yellow{
  background:#fde047 !important;
  color:#111827;
}

.red{
  background:#ffcccc !important;
}

.red-light{
  background:#fecaca !important;
  color:#111827;
}

.red-mid{
  background:#f87171 !important;
  color:#111827;
}

.red-dark{
  background:#7f1d1d !important;
  color:#ffffff;
}

.past-row{
  background:#374151 !important;
  color:#e5e7eb;
}

@keyframes blinkTrip{
  0%{opacity:1;}
  50%{opacity:.82;}
  100%{opacity:1;}
}

.trip-blink{
  animation:blinkTrip 1.8s infinite;
}

.actions-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}

.btn{
  padding:6px 12px;
  border:none;
  border-radius:6px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  margin:2px;
  display:inline-block;
  white-space:nowrap;
}

.btn.confirm,
.confirm{
  background:#22c55e;
  color:#000;
}

.btn.edit,
.edit{
  background:#3b82f6;
  color:#fff;
}

.btn.delete,
.delete{
  background:#64748b;
  color:#fff;
}

.btn.cancel,
.cancel{
  background:#ef4444;
  color:#fff;
}

.btn.small-delete{
  background:#ef4444;
  color:#fff;
  font-size:11px;
  padding:4px 7px;
}

.edit-input,
input{
  width:100%;
  padding:6px;
  border:1px solid #cbd5e1;
  border-radius:6px;
  font-size:12px;
  box-sizing:border-box;
  margin-bottom:4px;
}

.edit-line{
  display:flex;
  gap:6px;
  align-items:center;
  margin-bottom:6px;
}

@media(max-width:768px){
  .container{
    padding:90px 10px 20px;
  }

  table,
  .review-table{
    display:block;
    overflow-x:auto;
    white-space:nowrap;
  }

  th,
  td,
  .review-table th,
  .review-table td{
    padding:6px;
    font-size:11px;
  }

  .multi-line{
    white-space:pre-line;
    min-width:180px;
  }

  .btn{
    padding:5px 8px;
    font-size:11px;
  }
}
</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="container">
  <div id="tripsContainer"></div>
</div>

<script src="layout.js"></script>
<script src="review.js"></script>

</body>
</html>
