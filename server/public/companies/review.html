<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SUNBEAM TRANSPORTATION – Review</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

/* ================= GLOBAL ================= */

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Segoe UI', Arial, sans-serif;
  background:#f4f8fb;
  color:#111827;
}

#layoutHeader{
  position:sticky;
  top:0;
  z-index:1000;
  background:#fff;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.container{
  width:100%;
  max-width:1700px;
  margin:auto;
  padding:88px 14px 24px;
}

/* ================= TABS ================= */

.review-tabs{
  display:flex;
  gap:10px;
  margin-bottom:18px;
  background:#e2e8f0;
  padding:6px;
  border-radius:14px;
}

.review-tabs button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:13px;
  font-weight:800;
  cursor:pointer;
  transition:.2s;
}

.tab-active{
  background:#2563eb;
  color:#fff;
}

.tab-inactive{
  background:#64748b;
  color:#fff;
}

/* ================= TABLE WRAP ================= */

.table-wrap{
  width:100%;
  overflow-x:auto;
  border-radius:14px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  background:#fff;
}

/* ================= TABLE ================= */

.review-table{
  width:100%;
  min-width:1450px;
  border-collapse:collapse;
  background:#fff;
}

.review-table th,
.review-table td{
  border:1px solid #e2e8f0;
  padding:7px;
  font-size:11px;
  text-align:center;
  vertical-align:middle;
}

.review-table th{
  background:#0f172a;
  color:#fff;
  font-size:11px;
  font-weight:800;
  white-space:nowrap;
  position:sticky;
  top:0;
  z-index:5;
}

.review-table tr:hover{
  background:#f8fafc;
}

/* ================= DATE ================= */

.date-title{
  margin:22px 0 10px;
  font-size:17px;
  font-weight:800;
  color:#0f172a;
}

/* ================= TEXT ================= */

.multi-line{
  white-space:pre-line;
  line-height:1.45;
  text-align:left;
  min-width:150px;
  max-width:220px;
  word-break:break-word;
}

/* ================= CLEAN NUMBERS ================= */

.trip-number-badge{
  color:#2563eb;
  font-size:14px;
  font-weight:900;
  white-space:nowrap;
}

.price-badge{
  color:#15803d;
  font-size:14px;
  font-weight:900;
  white-space:nowrap;
}

.miles-strong{
  color:#2563eb;
  font-size:13px;
  font-weight:900;
  white-space:nowrap;
}

/* ================= ROW COLORS ================= */

.scheduled-row{
  background:#fff;
}

.confirmed-row{
  background:#dcfce7;
}

.cancelled-row{
  background:#fecaca;
}

.yellow{
  background:#fef9c3;
}

.red-light{
  background:#fecaca;
}

.red-mid{
  background:#fca5a5;
}

.red-dark{
  background:#7f1d1d;
  color:#fff;
}

.past-row{
  background:#374151;
  color:#f3f4f6;
}

/* ================= BUTTONS ================= */

.actions-wrap{
  display:flex;
  gap:4px;
  flex-wrap:wrap;
  justify-content:center;
  min-width:160px;
}

.btn{
  border:none;
  padding:5px 8px;
  border-radius:6px;
  font-size:10px;
  font-weight:800;
  cursor:pointer;
  transition:.2s;
  white-space:nowrap;
}

.btn:hover{
  transform:translateY(-1px);
}

.btn.edit{
  background:#2563eb;
  color:#fff;
}

.btn.delete{
  background:#334155;
  color:#fff;
}

.btn.confirm{
  background:#22c55e;
  color:#000;
}

.btn.cancel{
  background:#ef4444;
  color:#fff;
}

.btn.small-delete{
  background:#dc2626;
  color:#fff;
  padding:3px 6px;
  font-size:10px;
}

/* ================= INPUT ================= */

.edit-input{
  width:100%;
  min-width:140px;
  padding:8px;
  border:1px solid #94a3b8;
  border-radius:6px;
  font-size:13px;
  background:#fff;
  color:#111827;
  outline:none;
  margin-bottom:4px;
}

.edit-input:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,.15);
}

/* ================= SCROLLBAR ================= */

.table-wrap::-webkit-scrollbar{
  height:10px;
}

.table-wrap::-webkit-scrollbar-thumb{
  background:#94a3b8;
  border-radius:10px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .container{
    padding:84px 6px 18px;
  }

  .review-tabs{
    gap:6px;
  }

  .review-tabs button{
    font-size:11px;
    padding:10px;
  }

  .table-wrap{
    border-radius:10px;
  }

  .review-table{
    min-width:1350px;
  }

  .review-table th,
  .review-table td{
    padding:5px;
    font-size:10px;
  }

  .multi-line{
    min-width:120px;
    max-width:180px;
    font-size:10px;
  }

  .trip-number-badge{
    font-size:12px;
  }

  .price-badge{
    font-size:12px;
  }

  .miles-strong{
    font-size:11px;
  }

  .btn{
    font-size:9px;
    padding:4px 6px;
  }

  .edit-input{
    min-width:120px;
    font-size:12px;
  }

}

/* ================= LARGE SCREEN ================= */

@media(min-width:1600px){

  .review-table th,
  .review-table td{
    font-size:12px;
  }

}

</style>
</head>

<body>

<!-- HEADER -->
<div id="layoutHeader"></div>

<!-- MAIN -->
<div class="container">

  <!-- REVIEW CONTENT -->
  <div id="tripsContainer"></div>

</div>

<!-- SCRIPTS -->
<script src="layout.js"></script>
<script src="review.js"></script>

</body>
</html>
