<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SUNBEAM TRANSPORTATION – Review</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI', Arial, sans-serif;
  background:#f4f8fb;
}

/* HEADER */
#layoutHeader{
  position:sticky;
  top:0;
  z-index:1000;
}

/* CONTENT */
.container{
  max-width:1500px;
  margin:auto;
  padding:50px 25px;
}

/* LANGUAGE */
.lang-wrap{
  display:flex;
  justify-content:flex-end;
  margin-bottom:12px;
}

.lang-btn{
  background:#0f172a;
  color:#fff;
  border:none;
  border-radius:8px;
  padding:8px 14px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
}

/* DATE TITLE */
.date-title{
  margin-top:30px;
  font-weight:700;
  font-size:18px;
  color:#0f172a;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  margin-top:10px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
  border-radius:12px;
  overflow:hidden;
}

th,td{
  padding:10px;
  font-size:13px;
  border-bottom:1px solid #eee;
  text-align:left;
  white-space:pre-line;
  vertical-align:top;
}

th{
  background:#0f172a;
  color:#fff;
}

tr{
  transition:background .3s;
}

tr:hover{
  background:#f9fafb;
}

/* STATUS COLORS */
.yellow{
  background:#fff3cd !important;
}

.red{
  background:#ffcccc !important;
}

.confirmed-row{
  background:#d1fae5 !important;
}

.cancelled-row{
  background:#fecaca !important;
}

.scheduled-row{
  background:#ffffff !important;
}

.past-row{
  background:#374151 !important;
  color:#e5e7eb !important;
}

.red-light{
  background:#fecaca !important;
}

.red-mid{
  background:#f87171 !important;
}

.red-dark{
  background:#7f1d1d !important;
  color:#fff !important;
}

@keyframes blinkTrip{
  0%{opacity:1;}
  50%{opacity:.82;}
  100%{opacity:1;}
}

.trip-blink{
  animation:blinkTrip 1.8s infinite;
}

/* SHARED CELLS */
td:nth-child(5),
td:nth-child(6),
td:nth-child(7),
td:nth-child(8){
  max-width:260px;
  word-break:break-word;
  line-height:1.55;
}

/* PRICE */
.price-cell{
  color:#16a34a;
  font-weight:800;
  text-align:center;
  white-space:nowrap;
}

/* BUTTONS */
.btn{
  padding:6px 12px;
  border:none;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
  margin-right:6px;
  display:inline-block;
  font-weight:700;
}

.confirm{
  background:#22c55e;
  color:#000;
}

.edit{
  background:#3b82f6;
  color:#fff;
}

.delete{
  background:#64748b;
  color:#fff;
}

.cancel{
  background:#ef4444;
  color:#fff;
}

.save{
  background:#22c55e;
  color:#000;
}

.actions-wrap{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

/* EDIT INPUTS */
input,
.edit-input{
  width:100%;
  padding:5px;
  border:1px solid #ddd;
  border-radius:4px;
  font-size:12px;
  box-sizing:border-box;
}

.edit-cell{
  min-width:160px;
}

/* MOBILE */
@media(max-width:768px){
  .container{
    padding:35px 10px;
    overflow-x:auto;
  }

  table{
    min-width:1200px;
  }

  th,td{
    font-size:11px;
    padding:7px;
  }

  .btn{
    font-size:11px;
    padding:5px 8px;
  }
}
</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="container">

  <div class="lang-wrap">
    <button class="lang-btn" id="langBtn">
      English / Spanish
    </button>
  </div>

  <div id="tripsContainer"></div>

</div>

<script src="layout.js"></script>
<script src="review.js"></script>

</body>
</html>
