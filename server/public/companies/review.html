<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SUNBEAM TRANSPORTATION – Review</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

/* ================= GLOBAL ================= */

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:#f4f8fb;
  color:#111827;
}

/* ================= HEADER ================= */

#layoutHeader{
  position:sticky;
  top:0;
  z-index:1000;
  width:100%;
}

/* ================= CONTAINER ================= */

.container{
  width:100%;
  max-width:1700px;
  margin:auto;
  padding:24px 12px 40px;
}

/* ================= TABS ================= */

.review-tabs{
  display:flex;
  gap:10px;
  margin-bottom:18px;
  background:#dbe4f0;
  padding:6px;
  border-radius:14px;
}

.review-tabs button{
  flex:1;
  border:none;
  border-radius:10px;
  padding:12px;
  cursor:pointer;

  font-size:13px;
  font-weight:900;

  transition:.2s;
}

.tab-active{
  background:#2563eb;
  color:#fff;
}

.tab-inactive{
  background:#94a3b8;
  color:#fff;
}

.review-tabs button:hover{
  opacity:.92;
}

/* ================= DATE TITLE ================= */

.date-title{
  margin:18px 0 10px;
  font-size:18px;
  font-weight:900;
  color:#0f172a;
}

/* ================= TABLE WRAP ================= */

.table-wrap{
  width:100%;
  overflow-x:auto;

  border-radius:16px;

  background:#fff;

  box-shadow:
    0 8px 24px rgba(0,0,0,.08);
}

/* ================= TABLE ================= */

.review-table{
  width:100%;
  min-width:1550px;
  border-collapse:collapse;
  background:#fff;
}

.review-table th{
  background:#0f172a;
  color:#fff;

  padding:10px 8px;

  font-size:11px;
  font-weight:900;

  text-align:center;
  white-space:nowrap;
}

.review-table td{
  border:1px solid #e2e8f0;

  padding:8px;

  font-size:11px;

  text-align:center;
  vertical-align:middle;
}

.review-table tr:hover{
  background:#f8fafc;
}

/* ================= TEXT ================= */

.multi-line{
  white-space:pre-line;
  line-height:1.5;
  text-align:left;

  min-width:150px;
  max-width:240px;

  word-break:break-word;
}

/* ================= BADGES ================= */

.trip-number-badge{
  color:#2563eb;
  font-size:13px;
  font-weight:900;
  white-space:nowrap;
}

.price-badge{
  color:#16a34a;
  font-size:13px;
  font-weight:900;
  white-space:nowrap;
}

.miles-strong{
  color:#2563eb;
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
}

/* ================= ROW COLORS ================= */

.scheduled-row{
  background:#ffffff;
}

.confirmed-row{
  background:#dcfce7;
}

.cancelled-row{
  background:#fee2e2;
}

.past-row{
  background:#374151;
  color:#fff;
}

.yellow{
  background:#fef9c3;
}

.red-light{
  background:#fecaca;
}

.red-mid{
  background:#fca5a5;
}

.red-dark{
  background:#7f1d1d;
  color:#fff;
}

/* ================= ACTION BUTTONS ================= */

.actions-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:4px;
  flex-wrap:wrap;

  min-width:170px;
}

.btn{
  border:none;
  border-radius:7px;

  padding:5px 8px;

  font-size:10px;
  font-weight:900;

  cursor:pointer;

  transition:.2s;
}

.btn:hover{
  transform:translateY(-1px);
}

.btn.edit{
  background:#2563eb;
  color:#fff;
}

.btn.delete{
  background:#dc2626;
  color:#fff;
}

.btn.confirm-green{
  background:#22c55e;
  color:#111827;
}

.btn.confirm-yellow{
  background:#facc15;
  color:#111827;
}

.btn.cancel{
  background:#ef4444;
  color:#fff;
}

.btn.small-delete{
  background:#dc2626;
  color:#fff;

  padding:3px 6px;
  font-size:10px;
}

/* ================= INPUTS ================= */

.edit-input{
  width:100%;
  min-width:140px;

  padding:8px;

  border:1px solid #94a3b8;
  border-radius:7px;

  font-size:12px;

  outline:none;

  background:#fff;
  color:#111827;

  margin-bottom:4px;
}

.edit-input:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,.15);
}

/* ================= SCROLLBAR ================= */

.table-wrap::-webkit-scrollbar{
  height:10px;
}

.table-wrap::-webkit-scrollbar-thumb{
  background:#94a3b8;
  border-radius:10px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .container{
    padding:14px 4px 30px;
  }

  .review-tabs{
    gap:5px;
    padding:5px;
  }

  .review-tabs button{
    font-size:10px;
    padding:10px 4px;
  }

  .table-wrap{
    border-radius:10px;
  }

  .review-table{
    min-width:1450px;
  }

  .review-table th,
  .review-table td{
    padding:5px;
    font-size:10px;
  }

  .multi-line{
    min-width:120px;
    max-width:180px;
    font-size:10px;
  }

  .trip-number-badge{
    font-size:11px;
  }

  .price-badge{
    font-size:11px;
  }

  .miles-strong{
    font-size:10px;
  }

  .btn{
    font-size:9px;
    padding:4px 6px;
  }

  .actions-wrap{
    min-width:150px;
  }

  .edit-input{
    min-width:110px;
    font-size:11px;
    padding:6px;
  }

}

/* ================= LARGE SCREEN ================= */

@media(min-width:1700px){

  .review-table th,
  .review-table td{
    font-size:12px;
  }

}

</style>
</head>

<body>

<!-- HEADER -->
<div id="layoutHeader"></div>

<!-- PAGE -->
<div class="container">

  <!-- TABS -->
  <div class="review-tabs">

    <button
      id="individualTab"
      class="tab-active"
    >
      Individual
    </button>

    <button
      id="sharedTab"
      class="tab-inactive"
    >
      Shared
    </button>

  </div>

  <!-- CONTENT -->
  <div id="tripsContainer"></div>

</div>

<!-- SCRIPTS -->
<script src="layout.js"></script>
<script src="review.js"></script>

</body>
</html>
