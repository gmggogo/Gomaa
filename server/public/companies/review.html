<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SUNBEAM TRANSPORTATION – Review</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

/* ================= GLOBAL ================= */

body{
  margin:0;
  font-family:'Segoe UI', Arial, sans-serif;
  background:#f4f8fb;
}

#layoutHeader{
  position:sticky;
  top:0;
  z-index:1000;
  background:#fff;
}

.container{
  max-width:1500px;
  margin:auto;
  padding:90px 20px 30px;
}

/* ================= TABS ================= */

.review-tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  background:#e2e8f0;
  padding:6px;
  border-radius:14px;
}

.review-tabs button{
  flex:1;
  padding:13px;
  border:none;
  border-radius:11px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
}

.tab-active{
  background:#2563eb;
  color:#fff;
}

.tab-inactive{
  background:#64748b;
  color:#fff;
}

/* ================= TABLE ================= */

.review-table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  margin-top:10px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
  border-radius:12px;
  overflow:hidden;
}

.review-table th,
.review-table td{
  padding:10px;
  font-size:13px;
  border:1px solid #dbe2ea;
  text-align:left;
  vertical-align:top;
}

.review-table th{
  background:#0f172a;
  color:#fff;
}

tr:hover{
  background:#f9fafb;
}

.date-title{
  margin-top:25px;
  font-weight:700;
  font-size:18px;
  color:#0f172a;
}

/* ================= MULTI ================= */

.multi-line{
  white-space:pre-line;
  line-height:1.6;
}

/* ================= BADGES ================= */

.trip-number-badge{
  background:#0ea5e9;
  color:#fff;
  padding:6px 10px;
  border-radius:8px;
  font-weight:800;
}

.price-badge{
  background:#bbf7d0;
  color:#14532d;
  padding:6px 10px;
  border-radius:8px;
  font-weight:900;
  box-shadow:0 0 10px rgba(34,197,94,.4);
}

/* ================= ROW COLORS ================= */

.scheduled-row{ background:#fff; }
.confirmed-row{ background:#22c55e; }
.cancelled-row{ background:#ef4444; }

.yellow{ background:#fde047; }
.red-light{ background:#fecaca; }
.red-mid{ background:#f87171; }
.red-dark{ background:#7f1d1d; color:#fff; }

.past-row{
  background:#374151;
  color:#e5e7eb;
}

/* ================= BUTTONS ================= */

.actions-wrap{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.btn{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
}

.btn.edit{ background:#3b82f6;color:#fff; }
.btn.delete{ background:#64748b;color:#fff; }
.btn.confirm{ background:#22c55e;color:#000; }
.btn.cancel{ background:#ef4444;color:#fff; }

/* ================= INPUT ================= */

.edit-input{
  width:100%;
  padding:6px;
  border:1px solid #cbd5e1;
  border-radius:6px;
  font-size:12px;
  margin-bottom:4px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .container{
    padding:90px 10px 20px;
  }

  .review-table{
    display:block;
    overflow-x:auto;
    white-space:nowrap;
  }

  .review-table th,
  .review-table td{
    font-size:11px;
    padding:6px;
  }

}

</style>
</head>

<body>

<!-- HEADER -->
<div id="layoutHeader"></div>

<!-- MAIN -->
<div class="container">

  <!-- 🔥 هنا بس، JS هو اللي هيبني كل حاجة -->
  <div id="tripsContainer"></div>

</div>

<!-- SCRIPTS -->
<script src="layout.js"></script>
<script src="review.js"></script>

</body>
</html>
