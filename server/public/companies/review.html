<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SUNBEAM TRANSPORTATION – Review</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI', Arial, sans-serif;
  background:#f4f8fb;
}

/* HEADER */
#layoutHeader{
  position:sticky;
  top:0;
  z-index:1000;
  background:#fff;
}

/* CONTENT */
.container{
  max-width:1500px;
  margin:auto;
  padding:90px 20px 30px;
}

/* DATE TITLE */
.date-title{
  margin-top:30px;
  font-weight:700;
  font-size:18px;
  color:#0f172a;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  margin-top:10px;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
  border-radius:12px;
  overflow:hidden;
}

th,td{
  padding:10px;
  font-size:13px;
  border-bottom:1px solid #eee;
  text-align:left;
  vertical-align:middle;
}

th{
  background:#0f172a;
  color:#fff;
}

tr{
  transition:background .3s;
}

tr:hover{
  background:#f9fafb;
}

/* OLD COLOR POLICY */
.yellow{
  background:#fff3cd !important;
}

.red{
  background:#ffcccc !important;
}

.confirmed-row{
  background:#d1fae5 !important;
}

.cancelled-row{
  background:#fecaca !important;
}

/* BUTTONS */
.btn{
  padding:6px 12px;
  border:none;
  border-radius:6px;
  font-size:12px;
  cursor:pointer;
  margin-right:6px;
  display:inline-block;
}

.confirm{
  background:#22c55e;
  color:#000;
}

.edit{
  background:#3b82f6;
  color:#fff;
}

.delete{
  background:#64748b;
  color:#fff;
}

.cancel{
  background:#ef4444;
  color:#fff;
}

/* INPUT */
input{
  width:100%;
  padding:5px;
  border:1px solid #ddd;
  border-radius:4px;
  font-size:12px;
  box-sizing:border-box;
}

/* MOBILE */
@media(max-width:768px){
  .container{
    padding:90px 10px 20px;
  }

  table{
    font-size:11px;
  }

  th,td{
    padding:6px;
    font-size:11px;
  }
}
</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="container">
  <div id="tripsContainer"></div>
</div>

<script src="layout.js"></script>
<script src="review.js"></script>

</body>
</html>
