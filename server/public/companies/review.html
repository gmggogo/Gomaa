<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam – Review</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>
body{
  margin:0;
  font-family:'Segoe UI', Arial;
  background:#f4f8fb;
}

/* HEADER */
#layoutHeader{
  position:sticky;
  top:0;
  z-index:1000;
  background:#fff;
}

/* CONTAINER */
.container{
  max-width:1600px;
  margin:auto;
  padding:90px 15px 30px;
}

/* TABS */
.review-tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.review-tabs button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}

.tab-active{
  background:#2563eb;
  color:#fff;
}

.tab-inactive{
  background:#64748b;
  color:#fff;
}

/* TABLE */
.review-table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  margin-bottom:20px;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.review-table th{
  background:#0f172a;
  color:#fff;
  padding:10px;
  font-size:12px;
}

.review-table td{
  padding:10px;
  font-size:12px;
  border:1px solid #e2e8f0;
  vertical-align:top;
}

/* TEXT FIX */
.multi-line{
  white-space:pre-line;
  line-height:1.5;
}

/* BADGES */
.trip-number-badge{
  background:#0ea5e9;
  color:#fff;
  padding:5px 8px;
  border-radius:6px;
  font-weight:800;
}

.price-badge{
  background:#bbf7d0;
  color:#14532d;
  padding:5px 8px;
  border-radius:6px;
  font-weight:800;
}

/* BUTTONS */
.btn{
  padding:5px 8px;
  border:none;
  border-radius:6px;
  font-size:11px;
  font-weight:700;
  cursor:pointer;
}

.btn.edit{background:#3b82f6;color:#fff;}
.btn.delete{background:#64748b;color:#fff;}
.btn.confirm{background:#22c55e;color:#000;}
.btn.cancel{background:#ef4444;color:#fff;}

.actions-wrap{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
}

/* COLORS */
.confirmed-row{background:#22c55e;}
.cancelled-row{background:#ef4444;}
.past-row{background:#374151;color:#fff;}

@media(max-width:768px){
  .review-table{
    display:block;
    overflow-x:auto;
  }
}
</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="container">

  <!-- TABS -->
  <div id="tabs" class="review-tabs">
    <button class="tab-active">Individual</button>
    <button class="tab-inactive">Shared</button>
  </div>

  <!-- TABLE -->
  <div id="tripsContainer">

    <table class="review-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Trip#</th>
          <th>Entry</th>
          <th>Entry Phone</th>
          <th>Client</th>
          <th>Phone</th>
          <th>Pickup</th>
          <th>Drop</th>
          <th>Stops</th>
          <th>Notes</th>
          <th>Date</th>
          <th>Time</th>
          <th>Status</th>
          <th>Price</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody id="tableBody">
        <!-- JS WILL FILL -->
      </tbody>

    </table>

  </div>

</div>

<script src="layout.js"></script>
<script src="review.js"></script>

</body>
</html>
