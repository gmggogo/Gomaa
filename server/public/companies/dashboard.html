<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>
Sunbeam Transportation – Company Dashboard
</title>

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<link rel="stylesheet" href="layout.css">

<style>

*{
  box-sizing:border-box;
}

:root{

  --blue:#145cff;
  --blueDark:#0f46c9;

  --green:#16a34a;
  --red:#dc2626;
  --orange:#ea580c;

  --bg:#eef3f9;

  --text:#0f172a;
  --muted:#64748b;

  --card:#ffffff;

}

body{

  margin:0;

  background:var(--bg);

  font-family:'Segoe UI',sans-serif;

  color:var(--text);

  overflow-x:hidden;

}

/* ================= HEADER ================= */

#layoutHeader{

  position:sticky;

  top:0;

  z-index:1000;

  background:#fff;

  box-shadow:0 2px 12px rgba(0,0,0,.06);

}

/* ================= CONTAINER ================= */

.container{

  width:100%;

  max-width:1800px;

  margin:auto;

  padding:88px 14px 24px;

}

/* ================= HERO ================= */

.hero{

  background:
  linear-gradient(
    135deg,
    #145cff,
    #1e3a8a
  );

  border-radius:28px;

  padding:32px;

  color:#fff;

  margin-bottom:24px;

  position:relative;

  overflow:hidden;

  box-shadow:
  0 12px 30px rgba(20,92,255,.25);

}

.hero::after{

  content:"";

  position:absolute;

  right:-120px;
  top:-120px;

  width:320px;
  height:320px;

  border-radius:50%;

  background:
  rgba(255,255,255,.08);

}

.hero-top{

  display:flex;

  justify-content:space-between;

  gap:20px;

  flex-wrap:wrap;

  position:relative;

  z-index:2;

}

.hero-title{

  font-size:38px;

  font-weight:900;

}

.hero-sub{

  margin-top:8px;

  font-size:15px;

  color:#dbeafe;

  font-weight:600;

}

.hero-date{

  text-align:right;

  font-size:14px;

  color:#dbeafe;

  font-weight:700;

}

/* ================= STATS ================= */

.cards{

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(220px,1fr));

  gap:18px;

  margin-bottom:32px;

}

.card{

  background:#fff;

  border-radius:22px;

  padding:24px;

  box-shadow:
  0 8px 22px rgba(0,0,0,.06);

  position:relative;

  overflow:hidden;

}

.card::before{

  content:"";

  position:absolute;

  left:0;
  top:0;

  width:100%;
  height:5px;

  background:var(--blue);

}

.card.green::before{
  background:var(--green);
}

.card.red::before{
  background:var(--red);
}

.card.orange::before{
  background:var(--orange);
}

.card-title{

  color:var(--muted);

  font-size:12px;

  font-weight:800;

  text-transform:uppercase;

  letter-spacing:.5px;

}

.card-value{

  margin-top:16px;

  font-size:34px;

  font-weight:900;

}

/* ================= TABLE ================= */

.table-wrap{

  width:100%;

  overflow-x:auto;

  background:#fff;

  border-radius:24px;

  box-shadow:
  0 10px 24px rgba(0,0,0,.06);

}

table{

  width:100%;

  min-width:1000px;

  border-collapse:collapse;

}

th{

  background:#0f172a;

  color:#fff;

  padding:16px;

  font-size:13px;

  text-align:left;

  white-space:nowrap;

}

td{

  padding:16px;

  font-size:13px;

  border-bottom:
  1px solid #f1f5f9;

  white-space:nowrap;

}

.status{

  display:inline-flex;

  align-items:center;

  justify-content:center;

  min-width:100px;

  height:32px;

  border-radius:999px;

  font-size:12px;

  font-weight:900;

}

.completed{
  background:#dcfce7;
  color:#166534;
}

.cancelled{
  background:#fee2e2;
  color:#991b1b;
}

.noshow{
  background:#fef3c7;
  color:#92400e;
}

.scheduled{
  background:#dbeafe;
  color:#1d4ed8;
}

@media(max-width:768px){

  .container{
    padding:84px 8px 20px;
  }

  .hero{
    padding:22px;
  }

  .hero-title{
    font-size:28px;
  }

  .cards{

    grid-template-columns:
    1fr 1fr;

    gap:12px;

  }

  .card{
    padding:16px;
  }

  .card-value{
    font-size:24px;
  }

}

</style>

</head>

<body>

<div id="layoutHeader"></div>

<div class="container">

  <!-- HERO -->

  <div class="hero">

    <div class="hero-top">

      <div>

        <div class="hero-title">

          Welcome,
          <span id="companyName">
            Facility
          </span>

        </div>

        <div class="hero-sub">

          Transportation Billing,
          Shared Trips,
          Revenue & Payment Overview

        </div>

      </div>

      <div class="hero-date">

        <div id="todayDate"></div>
        <div id="todayTime"></div>

      </div>

    </div>

  </div>

  <!-- CARDS -->

  <div class="cards">

    <div class="card">
      <div class="card-title">
        Total Trips Today
      </div>

      <div
        class="card-value"
        id="totalTrips">
        0
      </div>
    </div>

    <div class="card green">
      <div class="card-title">
        Completed Today
      </div>

      <div
        class="card-value"
        id="completedTrips">
        0
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        Upcoming Trips
      </div>

      <div
        class="card-value"
        id="upcomingTrips">
        0
      </div>
    </div>

    <div class="card red">
      <div class="card-title">
        Cancelled / No Show
      </div>

      <div
        class="card-value"
        id="cancelledTrips">
        0
      </div>
    </div>

  </div>

  <!-- TABLE -->

  <div class="table-wrap">

    <table>

      <thead>

        <tr>

          <th>Trip#</th>
          <th>Client</th>
          <th>Pickup Time</th>
          <th>Type</th>
          <th>Status</th>
          <th>Revenue</th>

        </tr>

      </thead>

      <tbody id="tripsBody"></tbody>

    </table>

  </div>

</div>

<script src="layout.js"></script>

<script>

let allTrips = [];

/* ================= LOAD ================= */

async function load(){

  try{

    const company =
      localStorage.getItem("name") || "";

    const res =
      await fetch(
        `/api/trips/summary?company=${encodeURIComponent(company)}`
      );

    allTrips =
      await res.json();

    render();

  }catch(err){

    console.log(err);

  }

}

/* ================= CLOCK ================= */

function updateClock(){

  const now =
    new Date(
      new Date().toLocaleString(
        "en-US",
        {
          timeZone:"America/Phoenix"
        }
      )
    );

  document.getElementById(
    "todayDate"
  ).innerText =

    now.toLocaleDateString(
      "en-US",
      {
        weekday:"long",
        month:"long",
        day:"numeric",
        year:"numeric"
      }
    );

  document.getElementById(
    "todayTime"
  ).innerText =

    now.toLocaleTimeString(
      "en-US",
      {
        hour:"numeric",
        minute:"2-digit"
      }
    );

}

/* ================= MONEY ================= */

function money(v){

  return "$" +
    Number(v || 0).toFixed(2);

}

/* ================= STATUS ================= */

function statusClass(status){

  status =
    String(status || "")
    .toLowerCase();

  if(status.includes("completed"))
    return "completed";

  if(status.includes("cancel"))
    return "cancelled";

  if(status.includes("noshow"))
    return "noshow";

  return "scheduled";

}

/* ================= RENDER ================= */

function render(){

  const facilityName =

    allTrips.find(
      t => t.company
    )?.company

    ||

    "Facility";

  document.getElementById(
    "companyName"
  ).innerText =
    facilityName;

  const tripBody =
    document.getElementById(
      "tripsBody"
    );

  tripBody.innerHTML = "";

  let totalTrips = 0;
  let completedTrips = 0;
  let upcomingTrips = 0;
  let cancelledTrips = 0;

  allTrips.forEach(t=>{

    totalTrips++;

    const status =
      String(
        t.status || ""
      );

    if(
      status === "Completed"
    ){

      completedTrips++;

    }

    else if(

      status === "Cancelled" ||

      status === "NoShow"

    ){

      cancelledTrips++;

    }

    else{

      upcomingTrips++;

    }

    tripBody.innerHTML += `

      <tr>

        <td>
          ${t.tripNumber || "-"}
        </td>

        <td>
          ${t.clientName || "-"}
        </td>

        <td>
          ${t.tripTime || "-"}
        </td>

        <td>
          ${
            t.isShared
            ? "Shared"
            : "Individual"
          }
        </td>

        <td>

          <span class="
            status
            ${statusClass(t.status)}
          ">

            ${t.status || "-"}

          </span>

        </td>

        <td>
          ${money(
            t.finalPrice || 0
          )}
        </td>

      </tr>

    `;

  });

  document.getElementById(
    "totalTrips"
  ).innerText =
    totalTrips;

  document.getElementById(
    "completedTrips"
  ).innerText =
    completedTrips;

  document.getElementById(
    "upcomingTrips"
  ).innerText =
    upcomingTrips;

  document.getElementById(
    "cancelledTrips"
  ).innerText =
    cancelledTrips;

}

/* ================= AUTO ================= */

setInterval(updateClock,1000);

setInterval(load,30000);

/* ================= INIT ================= */

updateClock();

load();

</script>

</body>

</html>
