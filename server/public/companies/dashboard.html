<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation – Company Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

/* ================= GLOBAL ================= */

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#f4f7fb;
  font-family:'Segoe UI',sans-serif;
  color:#111827;
  overflow-x:hidden;
}

/* ================= CONTAINER ================= */

.container{
  width:100%;
  max-width:1700px;
  margin:auto;
  padding:88px 14px 24px;
}

/* ================= TITLES ================= */

.section-title{
  font-size:20px;
  font-weight:700;
  color:#0f172a;
  margin-bottom:20px;
}

.welcome-title{
  font-size:28px;
  font-weight:800;
  color:#1e3a8a;
  margin-bottom:35px;
}

/* ================= CARDS ================= */

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:22px;
}

.card{
  background:#fff;
  padding:24px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.06);
  border-left:6px solid #1e3a8a;
}

.card h3{
  margin:0;
  font-size:14px;
  letter-spacing:.5px;
  color:#64748b;
  text-transform:uppercase;
}

.card p{
  margin-top:16px;
  font-size:34px;
  font-weight:800;
  color:#0f172a;
}

/* ================= TABLE ================= */

.table-section{
  margin-top:55px;
}

.table-wrap{
  width:100%;
  overflow-x:auto;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  background:#fff;
}

table{
  width:100%;
  min-width:700px;
  border-collapse:collapse;
}

th{
  background:#0f172a;
  color:#fff;
  padding:14px;
  font-size:13px;
  letter-spacing:.5px;
  white-space:nowrap;
}

td{
  padding:14px;
  font-size:13px;
  border-bottom:1px solid #f1f1f1;
}

tr:hover{
  background:#f8fafc;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .container{
    padding:84px 6px 18px;
  }

  .welcome-title{
    font-size:22px;
    margin-bottom:28px;
  }

  .section-title{
    font-size:18px;
  }

  .cards{
    grid-template-columns:1fr;
    gap:16px;
  }

  .card{
    padding:20px;
    border-radius:14px;
  }

  .card p{
    font-size:28px;
  }

  th,
  td{
    font-size:12px;
    padding:12px;
  }

}

</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="container">

  <div class="welcome-title">
    Welcome, <span id="companyName"></span>
  </div>

  <!-- TODAY -->

  <div class="section-title">
    Today's Activity
  </div>

  <div class="cards">

    <div class="card">
      <h3>Total Today</h3>
      <p id="totalTrips">0</p>
    </div>

    <div class="card">
      <h3>Completed</h3>
      <p id="completedTrips">0</p>
    </div>

    <div class="card">
      <h3>No Show</h3>
      <p id="noShowTrips">0</p>
    </div>

    <div class="card">
      <h3>Cancelled</h3>
      <p id="cancelledTrips">0</p>
    </div>

  </div>

  <!-- MONTH -->

  <div class="section-title" style="margin-top:60px;">
    This Month
  </div>

  <div class="cards">

    <div class="card">
      <h3>Total Trips</h3>
      <p id="monthTrips">0</p>
    </div>

  </div>

  <!-- LAST 5 -->

  <div class="table-section">

    <div class="section-title">
      Last 5 Trips
    </div>

    <div class="table-wrap">

      <table>

        <thead>
          <tr>
            <th>Date</th>
            <th>Pickup</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody id="lastTripsBody"></tbody>

      </table>

    </div>

  </div>

</div>

<script src="layout.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
