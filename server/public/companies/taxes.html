<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation - Taxes & Earnings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
  margin:0;
  font-family:'Segoe UI',Arial,sans-serif;
  background:#f1f5f9;
  color:#0f172a;
}

.container{
  max-width:1700px;
  margin:auto;
  padding:90px 20px 80px;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  flex-wrap:wrap;
  margin-bottom:25px;
}

.page-title{
  font-size:28px;
  font-weight:900;
  color:#1e3a8a;
}

.filters{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

.filter-input{
  padding:10px 12px;
  border:1px solid #cbd5e1;
  border-radius:10px;
  font-size:14px;
  background:#fff;
}

.btn{
  border:none;
  border-radius:10px;
  padding:11px 16px;
  font-size:14px;
  font-weight:800;
  cursor:pointer;
}

.btn-blue{
  background:#2563eb;
  color:#fff;
}

.btn-green{
  background:#16a34a;
  color:#fff;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
  margin-bottom:25px;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:22px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.card-title{
  font-size:14px;
  color:#64748b;
  margin-bottom:10px;
  font-weight:700;
}

.card-value{
  font-size:28px;
  font-weight:900;
}

.green{
  color:#15803d;
}

.blue{
  color:#2563eb;
}

.red{
  color:#dc2626;
}

.orange{
  color:#ea580c;
}

.section{
  background:#fff;
  border-radius:18px;
  padding:25px;
  margin-bottom:25px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.section-title{
  font-size:20px;
  font-weight:900;
  margin-bottom:20px;
  color:#0f172a;
}

.table-wrap{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1200px;
}

th{
  background:#0f172a;
  color:#fff;
  padding:12px;
  font-size:13px;
  text-align:center;
}

td{
  border:1px solid #e2e8f0;
  padding:12px;
  text-align:center;
  font-size:13px;
}

tr:nth-child(even){
  background:#f8fafc;
}

.status-complete{
  color:#15803d;
  font-weight:900;
}

.status-cancel{
  color:#dc2626;
  font-weight:900;
}

.status-noshow{
  color:#ea580c;
  font-weight:900;
}

.money{
  font-weight:900;
  color:#15803d;
}

@media(max-width:768px){

  .container{
    padding:85px 10px 80px;
  }

  .top-bar{
    flex-direction:column;
    align-items:stretch;
  }

  .page-title{
    font-size:22px;
    text-align:center;
  }

  .filters{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .filter-input{
    width:100%;
    font-size:13px;
  }

  .btn{
    width:100%;
    font-size:13px;
  }

  .cards{
    grid-template-columns:1fr 1fr;
    gap:12px;
  }

  .card{
    padding:16px;
  }

  .card-title{
    font-size:12px;
  }

  .card-value{
    font-size:22px;
  }

  .section{
    padding:16px;
  }

  .section-title{
    font-size:18px;
  }

  table{
    min-width:1000px;
  }

  th{
    font-size:11px;
    padding:10px;
  }

  td{
    font-size:11px;
    padding:10px;
  }

}

</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="container">

  <div class="top-bar">

    <div class="page-title">
      Taxes & Earnings
    </div>

    <div class="filters">

      <input
        type="date"
        id="startDate"
        class="filter-input"
      >

      <input
        type="date"
        id="endDate"
        class="filter-input"
      >

      <button
        class="btn btn-blue"
        id="applyBtn"
      >
        Apply Filter
      </button>

      <button
        class="btn btn-green"
        id="printBtn"
      >
        Print Report
      </button>

    </div>

  </div>

  <!-- SUMMARY -->

  <div class="cards">

    <div class="card">
      <div class="card-title">
        Total Revenue
      </div>
      <div class="card-value green"
        id="totalRevenue">
        $0
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        Total Trips
      </div>
      <div class="card-value blue"
        id="totalTrips">
        0
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        Individual Trips
      </div>
      <div class="card-value blue"
        id="individualTrips">
        0
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        Shared Trips
      </div>
      <div class="card-value orange"
        id="sharedTrips">
        0
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        Shared Passengers
      </div>
      <div class="card-value orange"
        id="sharedPassengers">
        0
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        Completed Trips
      </div>
      <div class="card-value green"
        id="completedTrips">
        0
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        Cancelled Trips
      </div>
      <div class="card-value red"
        id="cancelledTrips">
        0
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        No Show Trips
      </div>
      <div class="card-value red"
        id="noShowTrips">
        0
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        Total Miles
      </div>
      <div class="card-value blue"
        id="totalMiles">
        0
      </div>
    </div>

    <div class="card">
      <div class="card-title">
        Average Revenue
      </div>
      <div class="card-value green"
        id="avgRevenue">
        $0
      </div>
    </div>

  </div>

</div>

<script src="layout.js"></script>

</body>
</html>
