<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Transportation – Taxes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="layout.css">

<style>

body{
margin:0;
font-family:'Segoe UI', Arial, sans-serif;
background:#f4f7fb;
}

.container{
max-width:1500px;
margin:auto;
padding:50px 25px;
}

.section-title{
font-size:22px;
font-weight:700;
color:#1e3a8a;
margin-bottom:30px;
}

.tax-box{
background:#fff;
padding:40px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
margin-bottom:30px;
}

.tax-box h3{
margin-top:0;
font-size:18px;
color:#0f172a;
}

.tax-box p{
color:#64748b;
font-size:15px;
}

</style>
</head>

<body>

<div id="layoutHeader"></div>

<div class="container">

<div class="section-title">Taxes & Earnings</div>

<div class="tax-box">
<h3>Driver Payments</h3>
<p>This section will calculate driver payments automatically.</p>
</div>

<div class="tax-box">
<h3>Company Earnings</h3>
<p>This section will show company revenue and expenses.</p>
</div>

<div class="tax-box">
<h3>Tax Reports</h3>
<p>Yearly tax reports and financial summaries will appear here.</p>
</div>

</div>

<script src="layout.js"></script>

</body>
</html>
