<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f1f5f9;
}

/* HEADER */
.header{
  background:#0f172a;
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

/* TABLE WRAP (مهم للموبايل) */
.table-wrap{
  width:100%;
  overflow-x:auto;
  padding:10px;
}

/* TABLE */
table{
  width:100%;
  min-width:750px;
  border-collapse:collapse;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
}

th{
  background:#1e293b;
  color:#fff;
  padding:10px;
  font-size:13px;
}

td{
  padding:8px;
  font-size:13px;
  text-align:center;
  border-bottom:1px solid #e5e7eb;
}

/* STATUS */
.status{
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  font-weight:bold;
}

.scheduled{ background:#e2e8f0; }
.dispatched{ background:#dbeafe; }
.accepted{ background:#bbf7d0; }
.ontrip{ background:#fde68a; }
.completed{ background:#111827; color:#fff; }

/* BUTTON */
.trip-btn{
  width:100%;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.trip-btn.done{
  background:#111827;
  cursor:not-allowed;
}

/* MOBILE */
@media(max-width:768px){

  th, td{
    font-size:11px;
    padding:6px;
  }

}

</style>
</head>

<body>

<div class="header">My Trips</div>

<div class="table-wrap">

<table>

<thead>
<tr>
<th>#</th>
<th>Client</th>
<th>Pickup</th>
<th>Dropoff</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

<script src="trips.js"></script>

</body>
</html>
