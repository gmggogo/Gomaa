<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Driver Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
background:#f1f5f9;
padding-bottom:90px;
}

/* HEADER */
.header{
background:linear-gradient(90deg,#020617,#0f172a);
color:#fff;
padding:16px;
text-align:center;
font-size:20px;
font-weight:bold;
letter-spacing:.5px;
}

/* CONTAINER */
.container{
padding:12px;
}

/* CARD */
.trip-card{
background:#fff;
border-radius:18px;
padding:16px;
margin-bottom:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
cursor:pointer;
transition:.2s;
}

.trip-card:active{
transform:scale(0.96);
}

/* STATUS COLORS */
.trip-upcoming{border-left:6px solid #3b82f6;}
.trip-urgent{border-left:6px solid #f59e0b;}
.trip-expired{border-left:6px solid #ef4444;}
.trip-completed{
background:#020617;
color:#fff;
}

/* TOP */
.trip-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.trip-number{
font-weight:bold;
font-size:16px;
}

.trip-time{
font-size:13px;
color:#6b7280;
}

/* ADDRESS */
.address-block{
margin-bottom:8px;
}

.label{
font-size:11px;
color:#6b7280;
}

.address{
font-size:14px;
font-weight:500;
}

/* ICON LINE */
.line{
height:2px;
background:#e5e7eb;
margin:6px 0;
}

/* STATUS BADGE */
.badge{
padding:4px 10px;
border-radius:10px;
font-size:11px;
font-weight:bold;
}

.badge-Dispatched{background:#2563eb;color:#fff;}
.badge-Scheduled{background:#e5e7eb;color:#000;}
.badge-Completed{background:#000;color:#fff;}
.badge-InProgress{background:#16a34a;color:#fff;}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:75px;
background:#020617;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #111;
}

.nav button{
background:none;
border:none;
color:#9ca3af;
font-size:12px;
}

.nav button.active{
color:#facc15;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">🚗 My Trips</div>

<div class="container" id="container"></div>

<div class="nav">
<button>🏠</button>
<button class="active">🚗 Trips</button>
<button>🗺️ Map</button>
<button>💬 Chat</button>
<button onclick="logout()">🚪</button>
</div>

<script src="trips.js"></script>

</body>
</html>
