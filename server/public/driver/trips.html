<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Sunbeam – My Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  padding-bottom:80px;
  background:#f3f4f6;
  font-family:Arial;
}

/* PAGE */
.page{
  padding:10px;
}

/* TABLE SCROLL (مهم للموبايل) */
.table-wrap{
  overflow-x:auto;
}

/* TABLE */
table{
  min-width:900px;
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th,td{
  border:1px solid #d1d5db;
  padding:6px;
  text-align:center;
  font-size:12px;
}

th{
  background:#0f172a;
  color:#fff;
}

/* STATUS COLORS */
.done{
  background:#111827;
  color:#fff;
}

.accepted{
  background:#dcfce7;
}

.dispatched{
  background:#e0f2fe;
}

/* BUTTON */
.btn{
  padding:5px 8px;
  border:none;
  border-radius:6px;
  font-size:12px;
  font-weight:bold;
  cursor:pointer;
}

.green{ background:#16a34a; color:#fff }
.blue{ background:#2563eb; color:#fff }
.gray{ background:#6b7280; color:#fff }

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:#020617;
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav button{
  background:none;
  border:none;
  color:#9ca3af;
  font-size:11px;
}

.nav .active{
  color:#facc15;
}

</style>

</head>

<body>

<div class="page">

<div class="table-wrap">

<table>

<thead>
<tr>
<th>#</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Car</th>
<th>Notes</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<div class="nav">
<button>🏠</button>
<button class="active">🚗 Trips</button>
<button>🗺️</button>
<button>💬</button>
<button>🚪</button>
</div>

<script src="trips.js"></script>

</body>
</html>
