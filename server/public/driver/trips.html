<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>My Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:#fff;
  padding-bottom:90px;
}

/* HEADER */
.header{
  background:#020617;
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

/* CONTAINER */
.container{
  padding:14px;
}

/* CARD */
.trip-card{
  background:#111827;
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
  border-left:6px solid #3b82f6;
  transition:.2s;
}

.trip-card:active{
  transform:scale(.97);
}

/* STATUS COLORS (border) */
.trip-completed{ border-left-color:#22c55e; }
.trip-cancelled{ border-left-color:#ef4444; }
.trip-noshow{ border-left-color:#facc15; }
.trip-active{ border-left-color:#2563eb; }

/* TOP */
.trip-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.trip-id{
  font-weight:bold;
  font-size:16px;
}

.trip-time{
  font-size:12px;
  color:#cbd5e1;
}

/* TEXT */
.label{
  font-size:11px;
  color:#9ca3af;
  margin-top:6px;
}

.value{
  font-size:14px;
  font-weight:bold;
}

/* PHONE */
.phone{
  background:#16a34a;
  padding:6px 10px;
  border-radius:8px;
  display:inline-block;
  margin-top:6px;
  text-decoration:none;
  color:#fff;
  font-size:13px;
}

/* ADDRESS */
.address{
  background:#1f2937;
  padding:10px;
  border-radius:10px;
  margin-top:6px;
  font-size:13px;
  line-height:1.4;
}

/* NOTES */
.notes{
  background:#020617;
  padding:10px;
  border-radius:10px;
  margin-top:8px;
  font-size:12px;
}

/* STATUS BOX */
.status-box{
  margin-top:10px;
  padding:8px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
}

/* COLORS */
.status-Completed{
  background:#22c55e;
}

.status-Cancelled{
  background:#ef4444;
}

.status-NoShow{
  background:#facc15;
  color:#000;
}

.status-OnTrip{
  background:#2563eb;
}

.status-Arrived{
  background:#9333ea;
}

.status-Dispatched{
  background:#6b7280;
}

/* BUTTON */
.btn{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
}

/* EMPTY */
.empty{
  text-align:center;
  color:#aaa;
  margin-top:40px;
}

</style>
</head>

<body>

<div class="header">🚗 My Trips</div>

<div class="container" id="container"></div>

<script src="trips.js"></script>

</body>
</html>
