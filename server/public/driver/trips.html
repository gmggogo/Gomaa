<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Driver Trips</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="driver.css" />

  <style>
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:#f1f5f9;
      padding-bottom:90px;
    }

    .top-bar{
      background:#020617;
      color:#fff;
      padding:16px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
      position:sticky;
      top:0;
      z-index:100;
    }

    .page-body{
      padding:12px;
    }

    .trip-card{
      background:#fff;
      border-radius:18px;
      padding:14px;
      margin-bottom:12px;
      box-shadow:0 10px 25px rgba(0,0,0,0.10);
      border-left:6px solid #3b82f6;
      cursor:pointer;
      transition:.2s;
    }

    .trip-card:active{
      transform:scale(0.97);
    }

    .trip-urgent{
      border-left-color:#f59e0b;
    }

    .trip-expired{
      border-left-color:#ef4444;
    }

    .trip-completed{
      background:#020617;
      color:#fff;
      border-left-color:#22c55e;
    }

    .trip-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .trip-number{
      font-weight:bold;
      font-size:16px;
    }

    .trip-time{
      font-size:14px;
      font-weight:600;
    }

    .section{
      margin-bottom:10px;
    }

    .label{
      font-size:11px;
      color:#6b7280;
      margin-bottom:4px;
    }

    .trip-completed .label{
      color:#cbd5e1;
    }

    .value{
      font-size:14px;
      font-weight:600;
      line-height:1.5;
    }

    .row{
      display:flex;
      justify-content:space-between;
      gap:12px;
    }

    .row > div{
      flex:1;
    }

    .phone{
      background:#16a34a;
      color:#fff;
      padding:8px 12px;
      border-radius:8px;
      display:inline-block;
      margin-top:6px;
      text-decoration:none;
      font-size:13px;
      font-weight:bold;
    }

    .address{
      background:#f1f5f9;
      padding:10px;
      border-radius:10px;
      margin-top:6px;
      font-size:13px;
      line-height:1.5;
      word-break:break-word;
      cursor:pointer;
    }

    .trip-completed .address{
      background:#0f172a;
      color:#fff;
    }

    .notes{
      background:#f8fafc;
      padding:10px;
      border-radius:10px;
      font-size:12px;
      margin-top:6px;
      line-height:1.5;
      word-break:break-word;
    }

    .trip-completed .notes{
      background:#0f172a;
      color:#fff;
    }

    .badge{
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
      white-space:nowrap;
      display:inline-block;
    }

    .badge-Dispatched{
      background:#2563eb;
      color:#fff;
    }

    .badge-Completed{
      background:#000;
      color:#fff;
    }

    .badge-Scheduled{
      background:#e5e7eb;
      color:#000;
    }

    .badge-Accepted{
      background:#7c3aed;
      color:#fff;
    }

    .badge-On\ Trip{
      background:#f97316;
      color:#fff;
    }

    .empty-state{
      background:#fff;
      border-radius:18px;
      padding:30px 20px;
      text-align:center;
      color:#475569;
      font-weight:600;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
    }

    .loading-state{
      background:#fff;
      border-radius:18px;
      padding:25px 20px;
      text-align:center;
      color:#334155;
      font-weight:600;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
    }

    .trip-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .trip-btn{
      border:none;
      border-radius:10px;
      padding:10px 12px;
      font-size:13px;
      font-weight:bold;
      cursor:pointer;
    }

    .btn-primary{
      background:#2563eb;
      color:#fff;
    }

    .btn-success{
      background:#16a34a;
      color:#fff;
    }

    .btn-danger{
      background:#dc2626;
      color:#fff;
    }

    .btn-dark{
      background:#111827;
      color:#fff;
    }
  </style>
</head>
<body>

  <div class="top-bar">🚗 My Trips</div>

  <div class="page-body">
    <div id="container" class="loading-state">Loading trips...</div>
  </div>

  <div id="driverNav"></div>

  <script src="driver-nav.js"></script>
  <script src="trips.js"></script>

</body>
</html>
