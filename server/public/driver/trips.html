<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Driver Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:#f1f5f9;
padding-bottom:80px;
}

/* PAGE */
.page{
padding:10px;
}

/* TABLE */
.table-wrap{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
min-width:800px;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
text-align:center;
font-size:13px;
}

th{
background:#0f172a;
color:#fff;
}

/* ROW CLICK */
tr.trip-row{
cursor:pointer;
transition:.2s;
}

tr.trip-row:hover{
background:#e2e8f0;
}

/* COMPLETED */
.completed{
background:#000 !important;
color:#fff !important;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#020617;
display:flex;
justify-content:space-around;
align-items:center;
}

.nav button{
background:none;
border:none;
color:#9ca3af;
font-size:12px;
}

.nav button.active{
color:#facc15;
}

</style>

</head>

<body>

<div class="page">

<div class="table-wrap">

<table>

<thead>
<tr>
<th>#</th>
<th>Pickup</th>
<th>Stops</th>
<th>Dropoff</th>
<th>Date</th>
<th>Time</th>
<th>Car</th>
<th>Notes</th>
<th>Status</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

<div class="nav">
<button>🏠</button>
<button class="active">🚗 Trips</button>
<button>🗺️ Map</button>
<button>💬 Chat</button>
<button onclick="logout()">🚪</button>
</div>

<script src="trips.js"></script>

</body>
</html>
