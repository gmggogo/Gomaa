<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:#f1f5f9;
  padding-bottom:88px;
  color:#0f172a;
}

.header{
  background:linear-gradient(90deg,#020617,#0f172a);
  color:#fff;
  padding:16px 14px;
  text-align:center;
  font-size:20px;
  font-weight:700;
  letter-spacing:.2px;
  position:sticky;
  top:0;
  z-index:20;
}

.container{
  padding:12px;
}

.trip-card{
  background:#fff;
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 10px 24px rgba(2,6,23,.10);
  border-left:6px solid #cbd5e1;
  cursor:pointer;
  transition:.18s ease;
}

.trip-card:active{
  transform:scale(.985);
}

.trip-upcoming{ border-left-color:#3b82f6; }
.trip-soon{ border-left-color:#0ea5e9; }
.trip-urgent{ border-left-color:#f59e0b; }
.trip-expired{ border-left-color:#ef4444; }
.trip-completed{
  background:#020617;
  color:#fff;
  border-left-color:#000;
}

.trip-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.trip-number{
  font-size:16px;
  font-weight:800;
}

.trip-time{
  font-size:13px;
  font-weight:700;
}

.trip-completed .trip-time{
  color:#e2e8f0;
}

.meta-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-top:10px;
}

.badge{
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
  display:inline-block;
}

.badge-Scheduled{ background:#e2e8f0; color:#0f172a; }
.badge-Dispatched{ background:#2563eb; color:#fff; }
.badge-DriverAssigned{ background:#7c3aed; color:#fff; }
.badge-InProgress{ background:#16a34a; color:#fff; }
.badge-Completed{ background:#000; color:#fff; }
.badge-default{ background:#cbd5e1; color:#0f172a; }

.address-block{
  margin-bottom:8px;
}

.label{
  font-size:11px;
  color:#64748b;
  margin-bottom:3px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.3px;
}

.trip-completed .label{
  color:#94a3b8;
}

.address{
  font-size:14px;
  font-weight:600;
  line-height:1.35;
  word-break:break-word;
}

.line{
  height:1px;
  background:#e2e8f0;
  margin:8px 0;
}

.trip-completed .line{
  background:#334155;
}

.notes{
  margin-top:8px;
  padding:10px;
  background:#f8fafc;
  border-radius:12px;
  font-size:12px;
  line-height:1.4;
}

.trip-completed .notes{
  background:#111827;
  color:#e5e7eb;
}

.empty{
  text-align:center;
  background:#fff;
  border-radius:18px;
  padding:28px 16px;
  box-shadow:0 10px 24px rgba(2,6,23,.08);
  color:#475569;
  font-weight:700;
}

.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:76px;
  background:#020617;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #111827;
  z-index:30;
}

.nav button{
  background:none;
  border:none;
  color:#9ca3af;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
}

.nav button.active{
  color:#facc15;
}

.top-hint{
  font-size:12px;
  color:#64748b;
  margin:2px 2px 10px;
  font-weight:700;
}

.trip-completed .meta-date{
  color:#cbd5e1 !important;
}
</style>
</head>
<body>

<div class="header">🚗 My Trips</div>

<div class="container">
  <div class="top-hint">Tap any trip to open it on the map.</div>
  <div id="container"></div>
</div>

<div class="nav">
  <button onclick="window.location.href='index.html'">🏠</button>
  <button class="active">🚗 Trips</button>
  <button onclick="window.location.href='map.html'">🗺️ Map</button>
  <button onclick="window.location.href='chat.html'">💬 Chat</button>
  <button onclick="logout()">🚪</button>
</div>

<script src="trips.js"></script>
</body>
</html>
