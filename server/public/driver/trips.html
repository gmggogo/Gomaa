<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="driver.css">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:#f1f5f9;
padding-bottom:90px;
}

.top-bar{
background:#020617;
color:#fff;
padding:16px;
text-align:center;
font-size:20px;
font-weight:bold;
position:sticky;
top:0;
z-index:100;
}

.page-body{
padding:12px;
}

.trip-card{
background:#fff;
border-radius:18px;
padding:14px;
margin-bottom:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.10);
border-left:6px solid #3b82f6;
cursor:pointer;
}

.trip-card:active{
transform:scale(0.97);
}

/* COLORS */

.trip-completed{
background:#020617;
color:#fff;
border-left-color:#22c55e;
}

.trip-cancelled{
border-left-color:#ef4444;
}

.trip-noshow{
border-left-color:#facc15;
}

/* TEXT */

.label{
font-size:11px;
color:#6b7280;
}

.value{
font-size:14px;
font-weight:600;
}

.phone{
background:#16a34a;
color:#fff;
padding:6px 10px;
border-radius:8px;
display:inline-block;
margin-top:4px;
text-decoration:none;
}

.address{
background:#f1f5f9;
padding:8px;
border-radius:8px;
margin-top:4px;
font-size:13px;
cursor:pointer;
}

.notes{
background:#f8fafc;
padding:8px;
border-radius:8px;
font-size:12px;
margin-top:4px;
}

/* BADGE */

.badge{
padding:6px 12px;
border-radius:10px;
font-size:12px;
font-weight:bold;
display:inline-block;
margin-top:6px;
}

.badge-Completed{background:#22c55e;color:#fff;}
.badge-Cancelled{background:#ef4444;color:#fff;}
.badge-NoShow{background:#facc15;color:#000;}
.badge-Scheduled{background:#e5e7eb;color:#000;}

</style>
</head>

<body>

<div class="top-bar">🚗 My Trips</div>

<div class="page-body" id="container">
Loading...
</div>

<div id="driverNav"></div>

<script src="driver-nav.js"></script>
<script src="trips.js"></script>

</body>
</html>
