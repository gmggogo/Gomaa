<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Driver Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */
body{
margin:0;
font-family:Arial;
background:#f1f5f9;
padding-bottom:80px;
}

/* HEADER */
.header{
background:#020617;
color:#fff;
padding:12px;
text-align:center;
font-size:18px;
}

/* CONTAINER */
.container{
padding:10px;
}

/* CARD */
.trip-card{
background:#fff;
border-radius:14px;
padding:12px;
margin-bottom:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
cursor:pointer;
transition:.2s;
}

.trip-card:hover{
transform:scale(1.01);
}

/* STATUS COLORS */
.trip-upcoming{
border-left:5px solid #3b82f6;
}

.trip-urgent{
border-left:5px solid #f59e0b;
}

.trip-expired{
border-left:5px solid #ef4444;
}

.trip-completed{
background:#000;
color:#fff;
}

/* ROW */
.row{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:5px;
}

/* LABEL */
.label{
color:#6b7280;
font-size:12px;
}

/* BUTTONS */
.btns{
display:flex;
gap:6px;
margin-top:8px;
}

.btn{
flex:1;
padding:8px;
border:none;
border-radius:8px;
font-size:12px;
cursor:pointer;
}

.nav-btn{
background:#2563eb;
color:#fff;
}

.complete-btn{
background:#16a34a;
color:#fff;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#020617;
display:flex;
justify-content:space-around;
align-items:center;
}

.nav button{
background:none;
border:none;
color:#9ca3af;
font-size:12px;
}

.nav button.active{
color:#facc15;
}

</style>

</head>

<body>

<div class="header">🚗 My Trips</div>

<div class="container" id="container"></div>

<div class="nav">
<button>🏠</button>
<button class="active">🚗 Trips</button>
<button>🗺️ Map</button>
<button>💬 Chat</button>
<button onclick="logout()">🚪</button>
</div>

<script src="trips.js"></script>

</body>
</html>
