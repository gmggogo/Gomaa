<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:#f1f5f9;
padding-bottom:90px;
}

/* HEADER */
.header{
background:#020617;
color:#fff;
padding:16px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* CONTAINER */
.container{
padding:12px;
}

/* CARD */
.trip-card{
background:#fff;
border-radius:18px;
padding:14px;
margin-bottom:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
border-left:6px solid #3b82f6;
cursor:pointer;
}

.trip-urgent{border-left-color:#f59e0b;}
.trip-expired{border-left-color:#ef4444;}
.trip-completed{
background:#000;
color:#fff;
}

/* TOP */
.trip-top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.trip-number{
font-weight:bold;
font-size:16px;
}

.trip-time{
font-size:14px;
}

/* SECTION */
.section{
margin-bottom:8px;
}

.label{
font-size:11px;
color:#6b7280;
}

.value{
font-size:14px;
font-weight:600;
}

/* ROW */
.row{
display:flex;
justify-content:space-between;
}

/* NOTES */
.notes{
background:#f1f5f9;
padding:8px;
border-radius:8px;
font-size:12px;
margin-top:5px;
}

/* BADGE */
.badge{
padding:5px 10px;
border-radius:10px;
font-size:11px;
font-weight:bold;
}

.badge-Dispatched{background:#2563eb;color:#fff;}
.badge-Completed{background:#000;color:#fff;}
.badge-Scheduled{background:#ddd;color:#000;}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#020617;
display:flex;
justify-content:space-around;
align-items:center;
}

.nav button{
background:none;
border:none;
color:#9ca3af;
}

.nav button.active{
color:#facc15;
}

</style>
</head>

<body>

<div class="header">🚗 My Trips</div>

<div class="container" id="container"></div>

<div class="nav">
<button>🏠</button>
<button class="active">🚗 Trips</button>
<button>🗺️ Map</button>
<button>💬 Chat</button>
<button onclick="logout()">🚪</button>
</div>

<script src="trips.js"></script>

</body>
</html>
