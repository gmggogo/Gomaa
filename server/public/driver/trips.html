<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Sunbeam – My Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:10px 10px 80px;
background:#f3f4f6;
font-family:Arial
}

/* CARD STYLE بدل الجدول */
.card{
background:#fff;
border-radius:12px;
padding:12px;
margin-bottom:10px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:scale(1.01)
}

/* STATUS COLORS */
.pending{
border-left:6px solid #2563eb
}

.accepted{
border-left:6px solid #16a34a
}

.completed{
background:#111;
color:#fff;
border-left:6px solid #000;
cursor:not-allowed;
opacity:.8
}

/* TITLE */
.title{
font-weight:bold;
margin-bottom:6px;
font-size:14px;
}

/* TEXT */
.text{
font-size:13px;
margin:2px 0;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:65px;
background:#020617;
display:flex;
justify-content:space-around;
align-items:center;
}

.nav button{
background:none;
border:none;
color:#9ca3af;
font-size:11px;
display:flex;
flex-direction:column;
align-items:center;
}

.nav button.active{
color:#facc15
}

</style>

</head>

<body>

<div id="tripsContainer"></div>

<!-- NAV -->
<div class="nav">
<button onclick="goHome()"><span>🏠</span>Home</button>
<button class="active"><span>🚗</span>Trips</button>
<button onclick="goMap()"><span>🗺️</span>Map</button>
<button onclick="logout()"><span>🚪</span>Logout</button>
</div>

<script src="trips.js"></script>

</body>
</html>
