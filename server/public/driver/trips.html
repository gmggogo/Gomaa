<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== BODY ===== */
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:#0f172a;
color:#fff;
padding-bottom:100px;
}

/* ===== HEADER ===== */
.header{
position:sticky;
top:0;
z-index:1000;
background:linear-gradient(180deg,#020617,#0f172a);
padding:18px;
text-align:center;
font-size:22px;
font-weight:700;
}

/* ===== CONTAINER ===== */
.container{
padding:14px;
}

/* ===== CARD ===== */
.trip-card{
background:linear-gradient(145deg,#020617,#0f172a);
border-radius:22px;
padding:18px;
margin-bottom:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
border-left:6px solid #3b82f6;
}

/* الحالات */
.trip-active{border-left-color:#3b82f6;}
.trip-completed{border-left-color:#22c55e;}
.trip-cancelled{border-left-color:#ef4444;}
.trip-noshow{border-left-color:#facc15;}

/* ===== TOP ===== */
.trip-top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:14px;
color:#cbd5e1;
}

/* ===== TEXT ===== */
.label{
font-size:11px;
color:#94a3b8;
margin-top:10px;
}

.value{
font-size:16px;
font-weight:700;
}

/* ===== PHONE ===== */
.phone{
background:#16a34a;
padding:12px;
border-radius:14px;
display:inline-block;
margin-top:8px;
color:#fff;
text-decoration:none;
font-weight:bold;
}

/* ===== ADDRESS ===== */
.address{
background:#1e293b;
padding:14px;
border-radius:16px;
margin-top:8px;
font-size:13px;
line-height:1.5;
cursor:pointer;
}

/* ===== NOTES ===== */
.notes{
background:#020617;
padding:14px;
border-radius:16px;
margin-top:10px;
font-size:13px;
color:#cbd5e1;
}

/* ===== STATUS ===== */
.status-box{
margin-top:14px;
padding:14px;
border-radius:16px;
text-align:center;
font-weight:800;
font-size:15px;
}

.status-Dispatched{background:#6b7280;}
.status-Completed{background:#22c55e;}
.status-Cancelled{background:#ef4444;}
.status-NoShow{background:#facc15;color:#000;}
.status-OnTrip{background:#2563eb;}

/* ===== BUTTON ===== */
.open-btn{
margin-top:14px;
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:linear-gradient(90deg,#2563eb,#1d4ed8);
color:#fff;
font-weight:800;
font-size:16px;
cursor:pointer;
}

/* ===== NAV ===== */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#000;
display:flex;
justify-content:space-around;
align-items:center;
}

.nav button{
background:none;
border:none;
color:#9ca3af;
font-size:12px;
}

.nav button.active{
color:#facc15;
}

.empty{
text-align:center;
margin-top:50px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="header">🚗 My Trips</div>

<div class="container" id="container"></div>

<div class="nav">
<button onclick="goHome()">🏠</button>
<button class="active">🚗</button>
<button onclick="goMap()">🗺️</button>
<button>💬</button>
<button onclick="logout()">🚪</button>
</div>

<script src="trips.js"></script>

<script>
function goHome(){location.href="dashboard.html";}
function goMap(){location.href="map.html";}
function logout(){
localStorage.clear();
location.href="login.html";
}
</script>

</body>
</html>
