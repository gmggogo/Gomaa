<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Trips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="driver.css">

<style>

/* ================= BODY ================= */
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:#0f172a;
color:#fff;
padding-bottom:90px;
}

/* ================= HEADER ================= */
.header{
position:sticky;
top:0;
z-index:1000;
background:linear-gradient(180deg,#020617,#0f172a);
color:#fff;
padding:18px;
text-align:center;
font-size:22px;
font-weight:700;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

/* ================= CONTAINER ================= */
.container{
padding:12px;
}

/* ================= CARD ================= */
.trip-card{
background:linear-gradient(180deg,#0b1f3a,#020617);
border-radius:22px;
padding:16px;
margin-bottom:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
border-left:6px solid #3b82f6;
}

/* حالات */
.trip-active{border-left-color:#3b82f6;}
.trip-completed{border-left-color:#22c55e;}
.trip-cancelled{border-left-color:#ef4444;}
.trip-noshow{border-left-color:#facc15;}

/* ================= TOP ================= */
.trip-top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:15px;
color:#cbd5e1;
}

/* ================= LABEL ================= */
.label{
font-size:11px;
color:#94a3b8;
margin-top:10px;
}

/* ================= VALUE ================= */
.value{
font-size:15px;
font-weight:700;
}

/* ================= PHONE ================= */
.phone{
background:#16a34a;
color:#fff;
padding:10px 14px;
border-radius:12px;
display:inline-block;
margin-top:6px;
text-decoration:none;
font-weight:bold;
}

/* ================= ADDRESS ================= */
.address{
background:#1e293b;
padding:12px;
border-radius:14px;
margin-top:6px;
font-size:13px;
line-height:1.5;
}

/* ================= NOTES ================= */
.notes{
background:#020617;
padding:12px;
border-radius:14px;
margin-top:10px;
font-size:13px;
color:#cbd5e1;
}

/* ================= STATUS ================= */
.status-box{
margin-top:12px;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:bold;
}

/* ألوان الحالات */
.status-Dispatched{background:#64748b;}
.status-Completed{background:#22c55e;}
.status-Cancelled{background:#ef4444;}
.status-NoShow{background:#facc15;color:#000;}
.status-OnTrip{background:#2563eb;}

/* ================= BUTTON ================= */
.open-btn{
margin-top:12px;
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#2563eb;
color:#fff;
font-weight:bold;
font-size:15px;
cursor:pointer;
}

/* ================= NAV ================= */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#000;
display:flex;
justify-content:space-around;
align-items:center;
}

.nav button{
background:none;
border:none;
color:#9ca3af;
font-size:12px;
}

.nav button.active{
color:#facc15;
}

</style>
</head>

<body>

<div class="header">🚗 My Trips</div>

<div class="container" id="container"></div>

<div class="nav">
<button onclick="goHome()">🏠 Home</button>
<button class="active">🚗 Trips</button>
<button onclick="goMap()">🗺️ Map</button>
<button>💬 Chat</button>
<button onclick="logout()">🚪</button>
</div>

<script src="trips.js"></script>

<script>
function goHome(){window.location.href="dashboard.html";}
function goMap(){window.location.href="map.html";}
function logout(){
localStorage.clear();
window.location.href="login.html";
}
</script>

</body>
</html>
