<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Sunbeam Driver Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

#header{
position:absolute;
top:0;
left:0;
right:0;
z-index:1000;

display:flex;
justify-content:space-between;
align-items:center;

background:#0f172a;
padding:10px 15px;
font-size:14px;
}

#driverName{
color:#facc15;
font-weight:bold;
}

#map{
position:absolute;
top:50px;
bottom:120px;
left:0;
right:0;
}

#controls{

position:absolute;
bottom:0;
left:0;
right:0;

background:#111;
padding:15px;

display:flex;
flex-direction:column;
gap:10px;
}

button{
padding:12px;
border:none;
border-radius:6px;
font-size:14px;
cursor:pointer;
}

#btnGoPickup{background:#2563eb;color:white;}
#btnArrived{background:#22c55e;color:white;}
#btnStart{background:#16a34a;color:white;}
#btnDropoff{background:#059669;color:white;}
#btnNoShow{background:#dc2626;color:white;}

#btnGoogle{
background:#111;
border:1px solid #888;
color:white;
}

#waitTimer{
text-align:center;
font-size:18px;
color:#facc15;
display:none;
}

#noShowBox{
display:none;
flex-direction:column;
gap:10px;
}

textarea{
width:100%;
height:60px;
border-radius:6px;
padding:8px;
}

</style>

</head>

<body>

<div id="header">

<div id="driverName">Driver</div>
<div id="datetime"></div>

</div>

<div id="map"
data-pickup-lat="33.2951"
data-pickup-lng="-111.9210"
data-dropoff-lat="33.3055"
data-dropoff-lng="-111.8500"
></div>

<div id="controls">

<button id="btnGoogle">Open in Google Maps</button>

<button id="btnGoPickup">GO TO PICKUP</button>

<button id="btnArrived">ARRIVED</button>

<button id="btnStart">START TRIP</button>

<button id="btnDropoff">DROP OFF</button>

<button id="btnNoShow">NO SHOW</button>

<div id="waitTimer">15:00</div>

<div id="noShowBox">

<textarea id="noShowNotes"
placeholder="Reason for no show"></textarea>

<button id="btnCompleteNoShow">
Complete No Show
</button>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script src="/driver/map.js"></script>

<script>

const raw = localStorage.getItem("loggedDriver");

if(raw){

try{

const d = JSON.parse(raw);

document.getElementById("driverName").innerText =
d.name || d.username || "Driver";

}catch{}

}

function updateTime(){

const now = new Date();

document.getElementById("datetime").innerText =
now.toLocaleString("en-US",{timeZone:"America/Phoenix"});

}

updateTime();
setInterval(updateTime,1000);

</script>

</body>
</html>
