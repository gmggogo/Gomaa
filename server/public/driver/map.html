<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

#map{
  height:70vh;
}

/* controls */
.controls{
  padding:10px;
  background:#fff;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

button{
  flex:1;
  padding:12px;
  font-size:15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* colors */
#googleBtn{background:#111;color:#fff;}
#arrivedBtn{background:#f59e0b;color:#fff;}
#startBtn{background:#2563eb;color:#fff;}
#noShowBtn{background:#dc2626;color:#fff;}
#completeBtn{background:#16a34a;color:#fff;}
#notesBtn{background:#64748b;color:#fff;}

.hidden{display:none}

/* popup */
.popup{
  padding:10px;
  background:#fff;
}

textarea{
  width:100%;
  height:80px;
  margin-top:10px;
  padding:10px;
  font-size:14px;
  border-radius:6px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- ===============================
     BUTTONS
=============================== -->
<div class="controls">

  <button id="googleBtn" onclick="openGoogleMaps()">Google</button>

  <button id="arrivedBtn">Arrived</button>

  <button id="startBtn" class="hidden">Start</button>

  <button id="completeBtn" class="hidden">Complete</button>

  <button id="noShowBtn" class="hidden">No Show</button>

  <button id="notesBtn">Notes</button>

</div>

<!-- ===============================
     NO SHOW BOX
=============================== -->
<div id="noShowBox" class="popup hidden">
  <textarea id="noShowNote" placeholder="No Show reason..."></textarea>
  <button onclick="submitNoShow()">Submit</button>
</div>

<!-- ===============================
     NOTES BOX
=============================== -->
<div id="notesBox" class="popup hidden">
  <textarea id="notesInput" placeholder="Write note..."></textarea>
  <button onclick="submitNote()">Save</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="map.js"></script>

<script>

/* ===============================
   UPDATE BUTTONS STATE
=============================== */
function updateButtons(){

  const trip = driverMapEngine.getCurrentTrip();

  if (!trip) return;

  const status = (trip.status || "").toLowerCase();

  const arrivedBtn = document.getElementById("arrivedBtn");
  const startBtn = document.getElementById("startBtn");
  const noShowBtn = document.getElementById("noShowBtn");
  const completeBtn = document.getElementById("completeBtn");

  // reset
  arrivedBtn.classList.add("hidden");
  startBtn.classList.add("hidden");
  noShowBtn.classList.add("hidden");
  completeBtn.classList.add("hidden");

  // الحالات
  if (status === "" || status === "scheduled" || status === "assigned"){
    arrivedBtn.classList.remove("hidden");
    noShowBtn.classList.remove("hidden");
  }

  else if (status === "arrived"){
    startBtn.classList.remove("hidden");
  }

  else if (status === "started" || status === "in progress"){
    completeBtn.classList.remove("hidden");
  }
}

/* ===============================
   BUTTON ACTIONS
=============================== */

// arrived
document.getElementById("arrivedBtn").onclick = ()=>{
  arrived();
  updateButtons();
};

// start
document.getElementById("startBtn").onclick = ()=>{
  startTrip();
  updateButtons();
};

// complete
document.getElementById("completeBtn").onclick = ()=>{
  completeTrip();
  updateButtons();
};

// no show open
document.getElementById("noShowBtn").onclick = ()=>{
  document.getElementById("noShowBox").classList.remove("hidden");
};

// submit no show
function submitNoShow(){
  const reason = document.getElementById("noShowNote").value;

  if (!reason){
    alert("Enter reason");
    return;
  }

  noShow(reason);

  document.getElementById("noShowBox").classList.add("hidden");

  updateButtons();
}

// notes open
document.getElementById("notesBtn").onclick = ()=>{
  const trip = driverMapEngine.getCurrentTrip();

  document.getElementById("notesInput").value = trip?.notes || "";

  document.getElementById("notesBox").classList.remove("hidden");
};

// save note
function submitNote(){
  const note = document.getElementById("notesInput").value;

  saveNote(note);

  document.getElementById("notesBox").classList.add("hidden");
}

/* ===============================
   AUTO UPDATE
=============================== */
setInterval(()=>{
  updateButtons();
},1000);

updateButtons();

</script>

</body>
</html>
