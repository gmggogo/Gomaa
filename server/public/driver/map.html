<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Driver Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#fff;
}

/* HEADER */
#header{
position:fixed;
top:0;
left:0;
right:0;
background:#020617;
padding:10px;
display:flex;
justify-content:space-between;
z-index:1000;
}

/* NAV TEXT */
#navText{
position:fixed;
top:50px;
left:10px;
right:10px;
background:#020617;
padding:12px;
border-radius:10px;
text-align:center;
z-index:1000;
}

/* MAP */
#map{
position:absolute;
top:110px;
bottom:150px;
left:0;
right:0;
}

/* CONTROLS */
#controls{
position:fixed;
bottom:70px;
left:0;
right:0;
padding:10px;
background:#020617;
display:flex;
flex-direction:column;
gap:8px;
}

button{
padding:14px;
border:none;
border-radius:10px;
font-weight:bold;
font-size:14px;
}

/* COLORS */
#btnArrived{background:#22c55e}
#btnStart{background:#16a34a}
#btnDrop{background:#059669}
#btnNoShow{background:#dc2626}
#btnNavigate{background:#2563eb}
#btnGoogle{background:#111;border:1px solid #666;color:#fff}

/* TIMER */
#timer{
text-align:center;
font-size:18px;
color:#facc15;
display:none;
}

/* NAV BAR */
.nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
background:#020617;
display:flex;
justify-content:space-around;
align-items:center;
z-index:9999;
}

.nav button{
background:none;
border:none;
color:#9ca3af;
font-size:11px;
display:flex;
flex-direction:column;
align-items:center;
}

.nav button.active{
color:#facc15;
}

</style>

</head>

<body>

<div id="header">
<div>Driver</div>
<div id="time"></div>
</div>

<div id="navText">Loading...</div>

<div id="map"
data-trip-id="trip123"
data-pickup-lat="33.2951"
data-pickup-lng="-111.9210"
data-dropoff-lat="33.3055"
data-dropoff-lng="-111.8500"
></div>

<div id="controls">

<button id="btnNavigate">🚀 Start Navigation</button>

<button id="btnArrived" style="display:none">ARRIVED</button>
<button id="btnStart" style="display:none">START TRIP</button>
<button id="btnDrop" style="display:none">DROP OFF</button>
<button id="btnNoShow" style="display:none">NO SHOW</button>

<div id="timer">15:00</div>

</div>

<!-- NAV BAR -->
<div class="nav">

<button onclick="goHome()">🏠<span>Home</span></button>
<button onclick="goTrips()">🚗<span>Trips</span></button>
<button class="active">🗺️<span>Map</span></button>
<button onclick="goChat()">💬<span>Chat</span></button>
<button onclick="logout()">🚪<span>Logout</span></button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="map.js"></script>

<script>
setInterval(()=>{
document.getElementById("time").innerText =
new Date().toLocaleString("en-US",{timeZone:"America/Phoenix"});
},1000);

function goHome(){location.href="dashboard.html"}
function goTrips(){location.href="trips.html"}
function goChat(){alert("Chat coming soon")}
function logout(){localStorage.clear();location.href="login.html"}
</script>

</body>
</html>
