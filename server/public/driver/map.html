<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunbeam Driver Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0f172a;
  color:#fff;
  overflow:hidden;
}

#header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:50px;
  background:#020617;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 12px;
  z-index:1000;
  box-sizing:border-box;
}

#driverName{
  color:#facc15;
  font-weight:bold;
  font-size:15px;
}

#datetime{
  font-size:12px;
  color:#e2e8f0;
}

#navText{
  position:fixed;
  top:58px;
  left:10px;
  right:10px;
  min-height:42px;
  background:#020617;
  border-radius:12px;
  padding:10px 12px;
  box-sizing:border-box;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-weight:bold;
  z-index:1000;
  box-shadow:0 6px 16px rgba(0,0,0,.25);
}

#map{
  position:fixed;
  top:110px;
  left:0;
  right:0;
  bottom:245px;
  z-index:1;
}

#controls{
  position:fixed;
  left:0;
  right:0;
  bottom:70px;
  background:#020617;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:1000;
  box-sizing:border-box;
  border-top:1px solid rgba(255,255,255,.08);
}

button{
  width:100%;
  padding:13px 14px;
  border:none;
  border-radius:12px;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
}

#btnGoogle{
  background:#111827;
  color:#fff;
  border:1px solid #475569;
}

#btnGoPickup{
  background:#2563eb;
  color:#fff;
  display:none;
}

#btnArrived{
  background:#22c55e;
  color:#fff;
  display:none;
}

#btnStart{
  background:#16a34a;
  color:#fff;
  display:none;
}

#btnDropoff{
  background:#059669;
  color:#fff;
  display:none;
}

#btnDropoff.enabled{
  box-shadow:0 0 0 2px rgba(255,255,255,.18) inset;
}

#btnNoShow{
  background:#dc2626;
  color:#fff;
  display:none;
}

#waitTimer{
  display:none;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  color:#facc15;
  padding:4px 0 2px;
}

#noShowBox{
  display:none;
  flex-direction:column;
  gap:8px;
}

#noShowNotes{
  width:100%;
  min-height:72px;
  border:none;
  border-radius:10px;
  padding:10px;
  box-sizing:border-box;
  font-size:14px;
  outline:none;
}

#btnCompleteNoShow{
  background:#b91c1c;
  color:#fff;
}

.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:#000;
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:1200;
  border-top:1px solid rgba(255,255,255,.08);
}

.nav button{
  background:none;
  border:none;
  color:#9ca3af;
  width:auto;
  padding:0;
  font-size:11px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}

.nav button span{
  font-size:20px;
  line-height:1;
}

.nav button.active{
  color:#facc15;
}

.leaflet-routing-container{
  display:none !important;
}
</style>
</head>

<body>

<div id="header">
  <div id="driverName">Driver</div>
  <div id="datetime"></div>
</div>

<div id="navText">Waiting for GPS...</div>

<div
  id="map"
  data-trip-id="trip123"
  data-pickup-lat="33.2951"
  data-pickup-lng="-111.9210"
  data-dropoff-lat="33.3055"
  data-dropoff-lng="-111.8500"
></div>

<div id="controls">
  <button id="btnGoogle">Open in Google Maps</button>
  <button id="btnGoPickup">GO TO PICKUP</button>
  <button id="btnArrived">ARRIVED</button>
  <button id="btnStart">START TRIP</button>
  <button id="btnDropoff">DROP OFF</button>
  <button id="btnNoShow">NO SHOW</button>

  <div id="waitTimer">15:00</div>

  <div id="noShowBox">
    <textarea id="noShowNotes" placeholder="Reason for no show"></textarea>
    <button id="btnCompleteNoShow">Complete No Show</button>
  </div>
</div>

<div class="nav">
  <button onclick="goHome()">
    <span>🏠</span>
    Home
  </button>

  <button onclick="goTrips()">
    <span>🚗</span>
    Trips
  </button>

  <button class="active">
    <span>🗺️</span>
    Map
  </button>

  <button onclick="goChat()">
    <span>💬</span>
    Chat
  </button>

  <button onclick="logout()">
    <span>🚪</span>
    Logout
  </button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="/driver/map.js"></script>

<script>
(function(){
  const raw =
    localStorage.getItem("loggedDriver") ||
    localStorage.getItem("user");

  if(raw){
    try{
      const d = JSON.parse(raw);
      document.getElementById("driverName").innerText =
        d.name || d.username || "Driver";
    }catch(e){}
  }
})();

function updateTime(){
  document.getElementById("datetime").innerText =
    new Date().toLocaleString("en-US",{ timeZone:"America/Phoenix" });
}
updateTime();
setInterval(updateTime, 1000);

function goHome(){
  window.location.href = "dashboard.html";
}

function goTrips(){
  window.location.href = "trips.html";
}

function goChat(){
  alert("Chat coming soon");
}

function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}
</script>

</body>
</html>
