<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:#fff;
overflow:hidden;
}

#header{
position:absolute;
top:0;left:0;right:0;
display:flex;
justify-content:space-between;
padding:12px;
background:#020617;
z-index:1000;
}

#driverName{color:#facc15;font-weight:bold}
#datetime{font-size:12px}

#navText{
position:absolute;
top:55px;
left:10px;
right:10px;
background:#020617;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:bold;
z-index:1000;
}

#map{
position:absolute;
top:110px;
bottom:230px;
left:0;
right:0;
}

#controls{
position:absolute;
bottom:70px;
left:0;
right:0;
padding:12px;
background:#020617;
display:flex;
flex-direction:column;
gap:8px;
}

button{
padding:14px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
font-size:14px;
}

#btnArrived{background:#22c55e}
#btnStart{background:#16a34a}
#btnDropoff{background:#059669}
#btnNoShow{background:#dc2626}
#btnGoogle{background:#111;border:1px solid #777;color:#fff}

#waitTimer{
text-align:center;
color:#facc15;
font-size:20px;
display:none;
}

.nav{
position:absolute;
bottom:0;
left:0;
right:0;
height:70px;
background:#000;
display:flex;
justify-content:space-around;
align-items:center;
}

.nav button{
background:none;
border:none;
color:#9ca3af;
}

.nav .active{color:#facc15}

</style>
</head>

<body>

<div id="header">
<div id="driverName">Driver</div>
<div id="datetime"></div>
</div>

<div id="navText">Waiting GPS...</div>

<div id="map"
data-trip-id="trip123"
data-pickup-lat="33.2951"
data-pickup-lng="-111.9210"
data-dropoff-lat="33.3055"
data-dropoff-lng="-111.8500"
></div>

<div id="controls">

<button id="btnGoogle">Open Google Maps</button>

<button id="btnArrived" style="display:none">ARRIVED</button>
<button id="btnStart" style="display:none">START TRIP</button>
<button id="btnDropoff" style="display:none">DROP OFF</button>
<button id="btnNoShow" style="display:none">NO SHOW</button>

<div id="waitTimer">15:00</div>

</div>

<div class="nav">
<button>🏠</button>
<button class="active">🚗</button>
<button>🗺️</button>
<button>💬</button>
<button onclick="logout()">🚪</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="map.js"></script>

<script>
function logout(){
localStorage.clear();
location.href="login.html";
}

setInterval(()=>{
document.getElementById("datetime").innerText =
new Date().toLocaleString("en-US",{timeZone:"America/Phoenix"});
},1000);
</script>

</body>
</html>
