<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Sunbeam Driver Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- LEAFLET -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- ROUTING -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>

  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#111;
      color:white;
      overflow:hidden;
    }

    #header{
      position:absolute;
      top:0;
      left:0;
      right:0;
      z-index:1000;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#0f172a;
      padding:10px 15px;
      font-size:14px;
      box-sizing:border-box;
    }

    #driverName{
      color:#facc15;
      font-weight:bold;
    }

    #datetime{
      font-size:13px;
    }

    #map{
      position:absolute;
      top:50px;
      bottom:190px;
      left:0;
      right:0;
      z-index:1;
    }

    #controls{
      position:absolute;
      bottom:0;
      left:0;
      right:0;
      z-index:1000;
      background:#111;
      padding:15px;
      display:flex;
      flex-direction:column;
      gap:10px;
      box-sizing:border-box;
      border-top:1px solid #333;
    }

    button{
      padding:12px;
      border:none;
      border-radius:8px;
      font-size:14px;
      font-weight:bold;
      cursor:pointer;
      width:100%;
      box-sizing:border-box;
    }

    #btnGoogle{
      background:#111;
      border:1px solid #888;
      color:white;
    }

    #btnGoPickup{
      background:#2563eb;
      color:white;
    }

    #btnArrived{
      background:#22c55e;
      color:white;
    }

    #btnStart{
      background:#22c55e;
      color:white;
    }

    #btnDropoff{
      background:#16a34a;
      color:white;
    }

    #btnDropoff.enabled{
      box-shadow:0 0 0 2px rgba(255,255,255,0.15) inset;
    }

    #btnNoShow{
      background:#dc2626;
      color:white;
    }

    #btnCompleteNoShow{
      background:#f59e0b;
      color:black;
    }

    #waitTimer{
      text-align:center;
      font-size:18px;
      font-weight:bold;
      color:#facc15;
      display:none;
    }

    #noShowBox{
      display:none;
      flex-direction:column;
      gap:10px;
    }

    textarea{
      width:100%;
      height:70px;
      border-radius:8px;
      padding:10px;
      font-size:14px;
      resize:none;
      box-sizing:border-box;
      border:none;
      outline:none;
    }

    /* نخفي صندوق التوجيه الجانبي */
    .leaflet-routing-container{
      display:none !important;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div id="header">
    <div id="driverName">Driver</div>
    <div id="datetime"></div>
  </div>

  <!-- MAP -->
  <div
    id="map"
    data-pickup-lat="33.2951"
    data-pickup-lng="-111.9210"
    data-dropoff-lat="33.3055"
    data-dropoff-lng="-111.8500"
  ></div>

  <!-- CONTROLS -->
  <div id="controls">

    <button id="btnGoogle" type="button" onclick="openGoogle()">
      Open in Google Maps
    </button>

    <button id="btnGoPickup" type="button" style="display:none">
      GO TO PICKUP
    </button>

    <button id="btnArrived" type="button" style="display:none">
      ARRIVED
    </button>

    <button id="btnStart" type="button" style="display:none">
      START TRIP
    </button>

    <button id="btnDropoff" type="button" style="display:none">
      DROP OFF
    </button>

    <button id="btnNoShow" type="button" style="display:none">
      NO SHOW
    </button>

    <div id="waitTimer">15:00</div>

    <div id="noShowBox">
      <textarea id="noShowNotes" placeholder="Reason for no show"></textarea>
      <button id="btnCompleteNoShow" type="button">
        Complete No Show
      </button>
    </div>

  </div>

  <!-- LIBS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

  <!-- MAP JS -->
  <script src="/driver/map.js"></script>

  <script>
    /* ===============================
       DRIVER NAME
    ================================ */
    (function(){
      const raw = localStorage.getItem("loggedDriver");

      if(raw){
        try{
          const d = JSON.parse(raw);
          document.getElementById("driverName").innerText =
            d.name || d.username || "Driver";
        }catch(err){
          console.log("Driver parse error:", err);
        }
      }
    })();

    /* ===============================
       CLOCK
    ================================ */
    function updateTime(){
      const now = new Date();
      document.getElementById("datetime").innerText =
        now.toLocaleString("en-US", {
          timeZone:"America/Phoenix"
        });
    }

    updateTime();
    setInterval(updateTime, 1000);

    /* ===============================
       GOOGLE MAPS
    ================================ */
    function openGoogle(){

      const mapEl = document.getElementById("map");

      const pickupLat = parseFloat(mapEl.dataset.pickupLat);
      const pickupLng = parseFloat(mapEl.dataset.pickupLng);
      const dropLat = parseFloat(mapEl.dataset.dropoffLat);
      const dropLng = parseFloat(mapEl.dataset.dropoffLng);

      let lat = window.driverLat;
      let lng = window.driverLng;

      if (typeof lat !== "number" || typeof lng !== "number") {
        window.open("https://maps.google.com", "_blank");
        return;
      }

      if (window.routeMode === "dropoff" &&
          !Number.isNaN(dropLat) &&
          !Number.isNaN(dropLng)) {

        window.open(
          `https://www.google.com/maps/dir/?api=1&origin=${lat},${lng}&destination=${dropLat},${dropLng}`,
          "_blank"
        );
        return;
      }

      if (!Number.isNaN(pickupLat) && !Number.isNaN(pickupLng)) {
        window.open(
          `https://www.google.com/maps/dir/?api=1&origin=${lat},${lng}&destination=${pickupLat},${pickupLng}`,
          "_blank"
        );
        return;
      }

      window.open(
        `https://www.google.com/maps?q=${lat},${lng}`,
        "_blank"
      );
    }
  </script>

</body>
</html>
