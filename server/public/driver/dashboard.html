<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Driver Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#133a7c;

color:white;

padding-bottom:105px;

overflow-x:hidden;

}

/* ================= TOP ================= */

.top-bar{

padding:18px 16px 8px;

display:flex;

justify-content:flex-end;

align-items:center;

}

.datetime-box{

width:100%;

display:flex;

justify-content:flex-end;

}

#datetime{

font-size:13px;

background:rgba(255,255,255,.08);

padding:10px 14px;

border-radius:16px;

backdrop-filter:blur(6px);

white-space:nowrap;

max-width:95%;

overflow:hidden;

text-overflow:ellipsis;

}

/* ================= LOGO ================= */

.logo-wrap{

text-align:center;

margin-top:8px;

}

.driver-logo{

width:105px;

max-width:90%;

object-fit:contain;

margin-bottom:12px;

}

/* ================= TITLES ================= */

.main-title{

font-size:24px;

font-weight:700;

color:#facc15;

text-align:center;

margin-bottom:4px;

}

.powered-gh{

text-align:center;

font-size:11px;

opacity:.75;

margin-bottom:20px;

letter-spacing:.5px;

}

/* ================= DRIVER NAME ================= */

.driver-name{

text-align:center;

font-size:18px;

font-weight:500;

margin-bottom:26px;

}

/* ================= STATUS ================= */

.status-box{

width:90%;

margin:auto;

background:#020617;

padding:22px;

border-radius:26px;

font-size:24px;

margin-bottom:26px;

}

.online{

color:#22c55e;

font-weight:700;

}

/* ================= CARDS ================= */

.cards{

width:90%;

margin:auto;

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

margin-bottom:26px;

}

.card{

background:#020617;

border-radius:28px;

height:190px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

font-size:22px;

font-weight:700;

cursor:pointer;

transition:.25s;

text-align:center;

}

.card:hover{

transform:scale(1.03);

}

.card-icon{

font-size:34px;

margin-bottom:10px;

}

/* ================= SUMMARY ================= */

.summary-card{

width:90%;

margin:auto;

background:#020617;

border-radius:28px;

padding:26px;

display:flex;

justify-content:center;

align-items:center;

gap:14px;

font-size:24px;

font-weight:700;

cursor:pointer;

}

/* ================= BOTTOM NAV ================= */

.bottom-nav{

position:fixed;

bottom:0;

left:0;

width:100%;

background:#020617;

display:flex;

justify-content:space-around;

padding:14px 0;

z-index:999;

}

.nav-item{

display:flex;

flex-direction:column;

align-items:center;

font-size:13px;

cursor:pointer;

opacity:.85;

}

.nav-item.active{

color:#facc15;

opacity:1;

}

.nav-icon{

font-size:28px;

margin-bottom:4px;

}

/* ================= DESKTOP ================= */

@media(min-width:768px){

.driver-logo{

width:120px;

}

.main-title{

font-size:30px;

}

.driver-name{

font-size:22px;

}

.cards{

max-width:850px;

}

.card{

height:220px;

font-size:26px;

}

.card-icon{

font-size:42px;

}

.summary-card{

max-width:850px;

font-size:28px;

}

.status-box{

max-width:850px;

font-size:28px;

}

}

</style>

</head>

<body>

<!-- TOP -->

<div class="top-bar">

<div class="datetime-box">

<div id="datetime"></div>

</div>

</div>

<!-- LOGO -->

<div class="logo-wrap">

<img
class="driver-logo app-logo"
alt="Company Logo">

</div>

<!-- TITLE -->

<div class="main-title">

Welcome Driver

</div>

<div class="powered-gh">

Powered by GH Mobility

</div>

<!-- DRIVER NAME -->

<div
class="driver-name"
id="driverName">

Driver

</div>

<!-- STATUS -->

<div class="status-box">

Status:
<span class="online">

ONLINE

</span>

</div>

<!-- CARDS -->

<div class="cards">

<div
class="card"
id="cardTrips">

<div class="card-icon">

🚗

</div>

Trips

</div>

<div
class="card"
id="cardMap">

<div class="card-icon">

🗺️

</div>

Live Map

</div>

<div
class="card"
id="cardHours">

<div class="card-icon">

⏱️

</div>

Work Hours

</div>

<div
class="card"
id="cardEarnings">

<div class="card-icon">

💰

</div>

Earnings

</div>

</div>

<!-- SUMMARY -->

<div
class="summary-card"
id="cardSummary">

📊 View Summary

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

<div
class="nav-item active"
id="navHome">

<div class="nav-icon">

🏠

</div>

Home

</div>

<div
class="nav-item"
id="navTrips">

<div class="nav-icon">

🚗

</div>

Trips

</div>

<div
class="nav-item"
id="navMap">

<div class="nav-icon">

🗺️

</div>

Map

</div>

<div
class="nav-item"
id="navChat">

<div class="nav-icon">

💬

</div>

Chat

</div>

<div
class="nav-item"
id="navLogout">

<div class="nav-icon">

🚪

</div>

Logout

</div>

</div>

<!-- ENGINES -->

<script src="/core/branding.js"></script>

<script src="/core/time.js"></script>

<script>

if(!localStorage.getItem("appLogo")){

localStorage.setItem(
"appLogo",
"/assets/logo.png"
);

}

if(typeof startClock === "function"){

startClock("datetime");

}

</script>

<script src="dashboard.js"></script>

</body>
</html>
