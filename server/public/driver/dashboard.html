<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Driver Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#133a7c;

color:white;

overflow-x:hidden;

padding-bottom:110px;

}

/* ================= TOP ================= */

.top-bar{

padding:16px;

display:flex;

justify-content:flex-start;

align-items:center;

}

#datetime{

font-size:13px;

opacity:.95;

}

/* ================= LOGO ================= */

.logo-wrap{

text-align:center;

margin-top:10px;

}

.driver-logo{

width:110px;

height:auto;

object-fit:contain;

display:block;

margin:auto;

}

/* ================= TITLES ================= */

.main-title{

font-size:28px;

font-weight:700;

color:#facc15;

text-align:center;

margin-top:18px;

margin-bottom:6px;

}

.powered-gh{

text-align:center;

font-size:11px;

opacity:.7;

margin-bottom:28px;

}

/* ================= DRIVER NAME ================= */

.driver-name{

text-align:center;

font-size:20px;

font-weight:500;

margin-bottom:30px;

}

/* ================= STATUS ================= */

.status-box{

width:90%;

margin:auto;

background:#020617;

padding:24px;

border-radius:28px;

font-size:30px;

margin-bottom:30px;

}

.online{

color:#22c55e;

font-weight:700;

}

/* ================= CARDS ================= */

.cards{

width:90%;

margin:auto;

display:grid;

grid-template-columns:1fr 1fr;

gap:24px;

margin-bottom:28px;

}

.card{

background:#020617;

border-radius:30px;

height:210px;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

font-size:22px;

font-weight:700;

cursor:pointer;

}

.card-icon{

font-size:34px;

margin-bottom:12px;

}

/* ================= SUMMARY ================= */

.summary-card{

width:90%;

margin:auto;

background:#020617;

border-radius:30px;

padding:28px;

display:flex;

justify-content:center;

align-items:center;

gap:14px;

font-size:22px;

font-weight:700;

margin-bottom:30px;

cursor:pointer;

}

/* ================= NAV ================= */

.bottom-nav{

position:fixed;

bottom:0;

left:0;

width:100%;

background:#020617;

display:flex;

justify-content:space-around;

padding:14px 0;

z-index:999;

}

.nav-item{

display:flex;

flex-direction:column;

align-items:center;

font-size:13px;

opacity:.85;

cursor:pointer;

}

.nav-item.active{

color:#facc15;

opacity:1;

}

.nav-icon{

font-size:28px;

margin-bottom:4px;

}

/* ================= MOBILE ================= */

@media(max-width:480px){

.driver-logo{

width:95px;

}

.main-title{

font-size:24px;

}

.driver-name{

font-size:18px;

}

.status-box{

font-size:24px;

padding:22px;

}

.card{

height:190px;

font-size:20px;

}

.card-icon{

font-size:32px;

}

.summary-card{

font-size:20px;

padding:24px;

}

}

</style>

</head>

<body>

<!-- TIME -->

<div class="top-bar">

<div id="datetime"></div>

</div>

<!-- LOGO -->

<div class="logo-wrap">

<img
src="/assets/logo.png"
class="driver-logo app-logo"
alt="Company Logo">

</div>

<!-- TITLE -->

<div class="main-title">

Welcome Driver

</div>

<div class="powered-gh">

Powered by GH Mobility

</div>

<!-- DRIVER NAME -->

<div
class="driver-name"
id="driverName">

MIDO KING

</div>

<!-- STATUS -->

<div class="status-box">

Status:
<span class="online">

ONLINE

</span>

</div>

<!-- CARDS -->

<div class="cards">

<div
class="card"
id="cardTrips">

<div class="card-icon">

🚗

</div>

Trips

</div>

<div
class="card"
id="cardMap">

<div class="card-icon">

🗺️

</div>

Live Map

</div>

<div
class="card"
id="cardHours">

<div class="card-icon">

⏱️

</div>

Work Hours

</div>

<div
class="card"
id="cardEarnings">

<div class="card-icon">

💰

</div>

Earnings

</div>

</div>

<!-- SUMMARY -->

<div
class="summary-card"
id="cardSummary">

📊 View Summary

</div>

<!-- NAV -->

<div class="bottom-nav">

<div
class="nav-item active"
id="navHome">

<div class="nav-icon">

🏠

</div>

Home

</div>

<div
class="nav-item"
id="navTrips">

<div class="nav-icon">

🚗

</div>

Trips

</div>

<div
class="nav-item"
id="navMap">

<div class="nav-icon">

🗺️

</div>

Map

</div>

<div
class="nav-item"
id="navChat">

<div class="nav-icon">

💬

</div>

Chat

</div>

<div
class="nav-item"
id="navLogout">

<div class="nav-icon">

🚪

</div>

Logout

</div>

</div>

<script src="/core/branding.js"></script>

<script src="/core/time.js"></script>

<script src="dashboard.js"></script>

<script>

if(typeof startClock === "function"){

startClock("datetime");

}

</script>

</body>
</html>
