<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Driver Login</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="install.json">

<link rel="apple-touch-icon"
href="sunbeamllc.jpeg">

<meta name="theme-color"
content="#0f172a">

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

margin:0;

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#2563eb
);

display:flex;

align-items:center;

justify-content:center;

padding:20px;

}

.login-box{

background:#ffffff;

width:100%;

max-width:360px;

padding:26px;

border-radius:20px;

box-shadow:
0 10px 25px rgba(0,0,0,0.25);

text-align:center;

}

/* LOGO */

.driver-logo{

width:140px;

max-width:90%;

object-fit:contain;

margin-bottom:14px;

}

/* TITLE */

.login-title{

font-size:30px;

font-weight:700;

color:#2563eb;

margin-bottom:8px;

}

/* SUB TITLE */

.login-sub{

font-size:15px;

color:#64748b;

margin-bottom:20px;

}

/* TIME */

.login-time{

font-size:13px;

color:#64748b;

margin-bottom:22px;

line-height:1.5;

}

/* INPUTS */

input{

width:100%;

padding:14px;

margin-bottom:14px;

border-radius:14px;

border:1px solid #d1d5db;

font-size:16px;

}

input:focus{

outline:none;

border-color:#2563eb;

}

/* BUTTON */

button{

width:100%;

padding:15px;

border:none;

border-radius:16px;

font-size:18px;

background:
linear-gradient(
90deg,
#facc15,
#eab308
);

color:#111;

font-weight:bold;

cursor:pointer;

}

/* ERROR */

#error{

margin-top:10px;

font-size:13px;

color:red;

}

/* FOOTER */

.footer{

margin-top:22px;

font-size:13px;

color:#64748b;

line-height:1.8;

}

/* MOBILE */

@media(max-width:480px){

.login-box{

padding:22px;

border-radius:18px;

}

.driver-logo{

width:115px;

}

.login-title{

font-size:26px;

}

button{

font-size:16px;

}

}

</style>

</head>

<body>

<div class="login-box">

<!-- DYNAMIC LOGO -->

<img
class="driver-logo app-logo"
alt="Company Logo">

<!-- TITLE -->

<div class="login-title">

Driver

</div>

<div class="login-sub">

Driver Login

</div>

<!-- TIME -->

<div
class="login-time"
id="driverTime">

</div>

<!-- FORM -->

<form id="loginForm">

<input
id="username"
type="text"
placeholder="Username"
required>

<input
id="password"
type="password"
placeholder="Password"
required>

<button type="submit">

LOGIN

</button>

</form>

<div id="error"></div>

<!-- FOOTER -->

<div class="footer">

Powered by GH Mobility

</div>

</div>

<!-- ENGINES -->

<script src="/core/branding.js"></script>

<script src="/core/time.js"></script>

<script>

/* DEFAULT LOGO */

if(!localStorage.getItem("appLogo")){

localStorage.setItem(
"appLogo",
"/assets/logo.png"
);

}

/* START CLOCK */

if(typeof startClock === "function"){

startClock("driverTime");

}

</script>

<script src="login.js"></script>

</body>
</html>
