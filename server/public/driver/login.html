<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>
Sunbeam Driver Login
</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<!-- APP -->

<link rel="manifest"
href="install.json">

<link rel="apple-touch-icon"
href="sunbeamllc.jpeg">

<meta name="theme-color"
content="#0f172a">

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

margin:0;

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#2563eb
);

display:flex;

align-items:center;

justify-content:center;

padding:20px;

}

/* ================= LOGIN BOX ================= */

.login-box{

background:#ffffff;

width:100%;

max-width:360px;

padding:26px;

border-radius:16px;

box-shadow:
0 10px 25px rgba(0,0,0,0.25);

text-align:center;

}

/* ================= LOGO ================= */

.driver-logo{

width:150px;

max-width:90%;

object-fit:contain;

margin-bottom:10px;

}

/* ================= TITLE ================= */

h1{

margin:0;

font-size:26px;

color:#2563eb;

}

h1 span{
color:#facc15;
}

p{

margin:6px 0 20px;

color:#555;

font-size:14px;

}

/* ================= TIME ================= */

.login-time{

font-size:12px;

color:#64748b;

margin-bottom:18px;

line-height:1.5;

}

/* ================= INPUTS ================= */

input{

width:100%;

padding:12px;

margin-bottom:12px;

border-radius:10px;

border:1px solid #ccc;

font-size:15px;

}

input:focus{

outline:none;

border-color:#2563eb;

}

/* ================= BUTTON ================= */

button{

width:100%;

padding:13px;

border:none;

border-radius:12px;

font-size:16px;

background:
linear-gradient(
90deg,
#facc15,
#eab308
);

color:#111;

font-weight:bold;

cursor:pointer;

}

/* ================= ERROR ================= */

#error{

margin-top:10px;

font-size:13px;

color:red;

}

/* ================= FOOTER ================= */

.footer{

margin-top:18px;

font-size:12px;

color:#64748b;

line-height:1.6;

}

/* ================= MOBILE ================= */

@media(max-width:480px){

.login-box{

padding:22px;

border-radius:14px;

}

.driver-logo{

width:120px;

}

h1{

font-size:22px;

}

button{

font-size:15px;

}

}

</style>

</head>

<body>

<div class="login-box">

<!-- DYNAMIC LOGO -->

<img
class="driver-logo app-logo"
alt="Company Logo">

<h1>

Sunbeam
<span>Driver</span>

</h1>

<p>

Driver Login

</p>

<!-- GLOBAL TIME -->

<div
class="login-time"
id="driverTime">

</div>

<form id="loginForm">

<input
id="username"
type="text"
placeholder="Username"
required>

<input
id="password"
type="password"
placeholder="Password"
required>

<button type="submit">

LOGIN

</button>

</form>

<div id="error"></div>

<div class="footer">

Powered by GH Mobility

<br>

© Sunbeam Transportation

</div>

</div>

<!-- ENGINES -->

<script src="/core/branding.js"></script>

<script src="/core/time.js"></script>

<script>

/* DEFAULT LOGO */

if(!localStorage.getItem("appLogo")){

localStorage.setItem(
"appLogo",
"/assets/logo.png"
);

}

/* START CLOCK */

startClock("driverTime");

</script>

<script src="login.js"></script>

</body>
</html>
