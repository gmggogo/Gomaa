<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>GH Mobility</title>

<link rel="icon" href="assets/app-icon.png">
<link rel="apple-touch-icon"
href="assets/app-icon.png">

<link rel="stylesheet"
href="style.css">

<style>

/* =========================
GLOBAL
========================= */

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f8fafc;
    color:#0f172a;
}

/* =========================
TOP BAR
========================= */

.top-bar{

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:10px 14px;

    background:#fff;

    position:sticky;
    top:0;
    z-index:999;

    box-shadow:0 2px 10px rgba(0,0,0,.06);

}

.top-links{
    display:flex;
    gap:8px;
}

.top-links a{

    text-decoration:none;

    color:#fff;

    padding:8px 14px;

    border-radius:12px;

    font-size:13px;
    font-weight:700;

}

.facility-login{
    background:#2563eb;
}

.staff-login{
    background:#111827;
}

.lang-right{
    display:flex;
    gap:6px;
}

.lang-right button{

    border:none;

    background:#e2e8f0;

    border-radius:18px;

    padding:7px 12px;

    font-size:12px;
    font-weight:700;

    cursor:pointer;

}

/* =========================
HERO
========================= */

.hero{

    width:100%;
    height:170px;

    position:relative;

    overflow:hidden;

}

.hero img{

    width:100%;
    height:100%;

    object-fit:cover;

    filter:brightness(.78);

}

.hero-overlay{

    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    color:#fff;

    text-align:center;

    padding:15px;

}

.hero-overlay h1{

    margin:0 0 6px;

    font-size:30px;
    font-weight:800;

    text-shadow:0 2px 12px rgba(0,0,0,.4);

}

.hero-overlay p{

    margin:0;

    font-size:14px;

    text-shadow:0 2px 10px rgba(0,0,0,.4);

}

.powered-by{

    position:absolute;

    right:10px;
    bottom:10px;

    background:rgba(0,0,0,.35);

    backdrop-filter:blur(5px);

    padding:6px 10px;

    border-radius:20px;

    font-size:10px;
    font-weight:700;

}

/* =========================
ABOUT
========================= */

.about{

    padding:45px 20px;

    text-align:center;

    max-width:900px;

    margin:auto;

}

.about h2{

    margin-bottom:15px;

    font-size:34px;

}

.about p{

    color:#64748b;

    line-height:1.8;

    font-size:17px;

}

/* =========================
QUOTE HEADER
========================= */

.quote-header{

    text-align:center;

    padding:10px 20px 25px;

}

.quote-header h2{

    margin-bottom:10px;

    font-size:32px;

}

.quote-header p{

    color:#64748b;

    font-size:16px;

}

/* =========================
SERVICES
========================= */

.services{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(240px,1fr));

    gap:22px;

    max-width:1400px;

    margin:auto;

    padding:20px;

}

.card{

    background:#fff;

    border-radius:24px;

    overflow:hidden;

    box-shadow:0 10px 30px rgba(0,0,0,.08);

    transition:.25s;

}

.card:hover{
    transform:translateY(-4px);
}

.card img{

    width:100%;
    height:180px;

    object-fit:cover;

}

.card-content{

    padding:18px;

    text-align:center;

}

.card h3{

    margin-top:0;

    font-size:26px;

}

.card p{

    color:#64748b;

    line-height:1.7;

    min-height:50px;

}

.btn{

    display:inline-block;

    margin-top:14px;

    text-decoration:none;

    background:#2563eb;

    color:#fff;

    padding:12px 18px;

    border-radius:14px;

    font-weight:700;

}

/* =========================
CUSTOM SECTION
========================= */

.custom-section{
    padding:20px;
}

.custom-box{

    background:#fff;

    border:2px dashed #cbd5e1;

    border-radius:24px;

    padding:50px 20px;

    text-align:center;

    color:#94a3b8;

    font-size:22px;
    font-weight:700;

}

/* =========================
CONTACT
========================= */

.contact-section{

    text-align:center;

    padding:45px 20px;

    line-height:2;

    font-size:17px;

}

/* =========================
FOOTER
========================= */

footer{

    background:#0f172a;

    color:#fff;

    text-align:center;

    padding:20px;

    font-size:14px;

}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

    .top-bar{
        padding:8px;
    }

    .top-links a{

        font-size:11px;

        padding:6px 8px;

    }

    .lang-right button{

        font-size:10px;

        padding:5px 8px;

    }

    .hero{
        height:140px;
    }

    .hero-overlay h1{
        font-size:22px;
    }

    .hero-overlay p{
        font-size:11px;
    }

    .about h2,
    .quote-header h2{
        font-size:24px;
    }

    .about p,
    .quote-header p{
        font-size:14px;
    }

    .card img{
        height:160px;
    }

    .card h3{
        font-size:22px;
    }

    .custom-box{
        font-size:18px;
        padding:35px 15px;
    }

}

</style>

</head>

<body>

<!-- =========================
TOP BAR
========================= -->

<div class="top-bar">

    <div class="top-links">

        <a href="companies/company-login.html"
        class="facility-login">

            Facility Login

        </a>

        <a href="login.html"
        class="staff-login">

            Staff Login

        </a>

    </div>

    <div class="lang-right">

        <button onclick="setLang('en')">
            English
        </button>

        <button onclick="setLang('es')">
            Spanish
        </button>

    </div>

</div>

<!-- =========================
HERO
========================= -->

<section class="hero"
id="heroSection">

    <img
    src="assets/hero.jpeg"
    id="heroImage">

    <div class="hero-overlay">

        <h1 id="heroTitle">
            GH Mobility
        </h1>

        <p id="heroSubtitle">
            Professional Transportation Solutions
        </p>

        <div class="powered-by">
            Powered by GH Mobility
        </div>

    </div>

</section>

<!-- =========================
ABOUT
========================= -->

<section class="about"
id="aboutSection">

    <h2 id="aboutTitle">
        About Us
    </h2>

    <p id="aboutDescription">

        Professional transportation services.

    </p>

</section>

<!-- =========================
QUOTE HEADER
========================= -->

<section class="quote-header">

    <h2>
        Get Quote & Book Your Ride
    </h2>

    <p>
        Select your service below
    </p>

</section>

<!-- =========================
SERVICES
========================= -->

<section class="services"
id="servicesContainer">

</section>

<!-- =========================
CUSTOM SECTION
========================= -->

<section class="custom-section">

    <div class="custom-box">

        Future Custom Section

    </div>

</section>

<!-- =========================
CONTACT
========================= -->

<div class="contact-section">

    <strong>
        Customer Support
    </strong>

    <br>

    📞 619-509-7197

    <br>

    📧 admin@ghmobility.com

</div>

<!-- =========================
FOOTER
========================= -->

<footer>

    © GH Mobility

</footer>

<script src="index.js"></script>

</body>
</html>
