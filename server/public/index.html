<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>GH Mobility</title>

<link rel="icon"
href="assets/app-icon.png">

<link rel="apple-touch-icon"
href="assets/app-icon.png">

<style>

/* =========================
GLOBAL
========================= */

*{
    box-sizing:border-box;
}

body{

    margin:0;

    font-family:'Segoe UI',sans-serif;

    background:#f1f5f9;

    color:#0f172a;

    overflow-x:hidden;

}

/* =========================
TOP BAR
========================= */

.top-bar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:14px 20px;

    background:#fff;

    position:sticky;

    top:0;

    z-index:999;

    box-shadow:0 2px 10px rgba(0,0,0,.06);

}

.top-links{

    display:flex;

    gap:12px;

}

.top-links a{

    text-decoration:none;

    color:#fff;

    padding:12px 18px;

    border-radius:16px;

    font-size:15px;

    font-weight:700;

    transition:.2s;

}

.facility-login{
    background:#2563eb;
}

.staff-login{
    background:#0f172a;
}

.top-links a:hover{

    transform:translateY(-2px);

}

.lang-right{

    display:flex;

    gap:10px;

}

.lang-right button{

    border:none;

    background:#e2e8f0;

    color:#2563eb;

    border-radius:18px;

    padding:10px 18px;

    font-size:14px;

    font-weight:700;

    cursor:pointer;

}

/* =========================
HERO
========================= */

.hero{

    width:100%;

    height:540px;

    background:#111827;

    position:relative;

    overflow:hidden;

    display:flex;

    justify-content:center;

    align-items:center;

}

.hero img{

    width:100%;

    height:100%;

    object-fit:contain;

    object-position:center center;

}

/* =========================
POWERED
========================= */

.powered-by{

    position:absolute;

    left:20px;

    bottom:20px;

    background:rgba(0,0,0,.45);

    color:#fff;

    padding:10px 18px;

    border-radius:24px;

    font-size:13px;

    font-weight:700;

    backdrop-filter:blur(5px);

}

/* =========================
ABOUT
========================= */

.about{

    text-align:center;

    padding:70px 20px 40px;

    max-width:1100px;

    margin:auto;

}

.about h2{

    font-size:46px;

    margin-bottom:20px;

    color:#1e3a5f;

}

.about p{

    color:#64748b;

    font-size:20px;

    line-height:1.9;

}

/* =========================
QUOTE
========================= */

.quote-header{

    text-align:center;

    padding:20px;

}

.quote-header h2{

    font-size:54px;

    line-height:1.15;

    margin-bottom:15px;

    color:#1e3a5f;

}

.quote-header p{

    color:#64748b;

    font-size:20px;

}

/* =========================
SERVICES
========================= */

.services{

    max-width:1500px;

    margin:auto;

    padding:30px 20px 80px;

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:30px;

}

.card{

    width:300px;

    background:#fff;

    border-radius:28px;

    overflow:hidden;

    box-shadow:0 10px 30px rgba(0,0,0,.08);

    transition:.25s;

}

.card:hover{

    transform:translateY(-5px);

}

.card img{

    width:100%;

    height:220px;

    object-fit:cover;

}

.card-content{

    padding:24px;

    text-align:center;

}

.card h3{

    margin:0 0 10px;

    font-size:30px;

    color:#1e3a5f;

}

.card p{

    color:#64748b;

    font-size:16px;

    line-height:1.7;

    min-height:60px;

}

.btn{

    display:inline-block;

    margin-top:18px;

    background:#2563eb;

    color:#fff;

    text-decoration:none;

    padding:13px 24px;

    border-radius:14px;

    font-size:15px;

    font-weight:700;

}

/* =========================
CUSTOM BOX
========================= */

.custom-section{

    padding:0 20px 70px;

}

.custom-box{

    max-width:1450px;

    margin:auto;

    border:2px dashed #cbd5e1;

    border-radius:30px;

    background:#fff;

    padding:70px 20px;

    text-align:center;

    font-size:28px;

    color:#94a3b8;

    font-weight:700;

}

/* =========================
CONTACT
========================= */

.contact-section{

    text-align:center;

    padding:70px 20px;

    line-height:2.1;

    font-size:18px;

}

/* =========================
FOOTER
========================= */

footer{

    background:#0f172a;

    color:#fff;

    text-align:center;

    padding:24px;

    font-size:14px;

}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

    /* TOP BAR */

    .top-bar{

        flex-direction:column;

        align-items:stretch;

        gap:14px;

        padding:14px;

    }

    .top-links,
    .lang-right{

        width:100%;

        display:grid;

        grid-template-columns:1fr 1fr;

        gap:12px;

    }

    .top-links a,
    .lang-right button{

        width:100%;

        min-height:62px;

        border-radius:22px;

        font-size:16px;

        font-weight:700;

        display:flex;

        align-items:center;

        justify-content:center;

        text-align:center;

        padding:12px;

    }

    /* HERO */

    .hero{

        height:520px;

    }

    .hero img{

        object-fit:cover;

        object-position:center center;

    }

    .powered-by{

        left:16px;

        bottom:16px;

        font-size:13px;

        padding:10px 16px;

        border-radius:24px;

    }

    /* ABOUT */

    .about{

        padding:55px 20px 35px;

    }

    .about h2{

        font-size:34px;

    }

    .about p{

        font-size:17px;

    }

    /* QUOTE */

    .quote-header h2{

        font-size:34px;

    }

    .quote-header p{

        font-size:17px;

    }

    /* SERVICES */

    .services{

        gap:24px;

        padding:25px 18px 60px;

    }

    .card{

        width:100%;

        max-width:380px;

    }

    .card img{

        height:240px;

    }

    .card h3{

        font-size:28px;

    }

    .btn{

        width:100%;

        text-align:center;

    }

    /* CUSTOM */

    .custom-box{

        font-size:22px;

        padding:50px 18px;

    }

}

</style>

</head>

<body>

<!-- =========================
TOP BAR
========================= -->

<div class="top-bar">

    <div class="top-links">

        <a href="companies/company-login.html"
        class="facility-login">

            Facility Login

        </a>

        <a href="login.html"
        class="staff-login">

            Staff Login

        </a>

    </div>

    <div class="lang-right">

        <button onclick="setLang('en')">

            English

        </button>

        <button onclick="setLang('es')">

            Spanish

        </button>

    </div>

</div>

<!-- =========================
HERO
========================= -->

<section class="hero">

    <img
    src="assets/hero.jpeg"
    alt="GH Mobility">

    <div class="powered-by">

        Powered by GH Mobility

    </div>

</section>

<!-- =========================
ABOUT
========================= -->

<section class="about">

    <h2
    data-en="About Us"
    data-es="Sobre nosotros">

        About Us

    </h2>

    <p
    data-en="Professional transportation services."
    data-es="Servicios profesionales de transporte.">

        Professional transportation services.

    </p>

</section>

<!-- =========================
QUOTE HEADER
========================= -->

<section class="quote-header">

    <h2
    data-en="Get Quote & Book Your Ride"
    data-es="Obtenga precio y reserve su viaje">

        Get Quote & Book Your Ride

    </h2>

    <p
    data-en="Select your service below"
    data-es="Seleccione su servicio abajo">

        Select your service below

    </p>

</section>

<!-- =========================
SERVICES
========================= -->

<section class="services"
id="servicesContainer">

</section>

<!-- =========================
CUSTOM BOX
========================= -->

<section class="custom-section">

    <div class="custom-box"

    data-en="Future Custom Section"
    data-es="Sección personalizada futura">

        Future Custom Section

    </div>

</section>

<!-- =========================
CONTACT
========================= -->

<div class="contact-section">

    <strong
    data-en="Customer Support"
    data-es="Atención al cliente">

        Customer Support

    </strong>

    <br>

    📞 619-509-7197

    <br>

    📧 admin@ghmobility.com

</div>

<!-- =========================
FOOTER
========================= -->

<footer>

    © GH Mobility

</footer>

<script src="index.js"></script>

</body>
</html>
