<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>GH Mobility</title>

<link rel="icon"
href="assets/app-icon.png">

<link rel="apple-touch-icon"
href="assets/app-icon.png">

<link rel="stylesheet"
href="style.css">

<style>

/* =========================
GLOBAL
========================= */

*{
    box-sizing:border-box;
}

body{

    margin:0;

    font-family:'Segoe UI',sans-serif;

    background:#f8fafc;

    color:#0f172a;

}

/* =========================
TOP BAR
========================= */

.top-bar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:10px 14px;

    background:#fff;

    position:sticky;

    top:0;

    z-index:999;

    box-shadow:0 2px 10px rgba(0,0,0,.06);

}

.top-links{

    display:flex;

    gap:8px;

}

.top-links a{

    text-decoration:none;

    color:#fff;

    padding:8px 14px;

    border-radius:12px;

    font-size:13px;

    font-weight:700;

}

.facility-login{
    background:#2563eb;
}

.staff-login{
    background:#111827;
}

.lang-right{

    display:flex;

    gap:6px;

}

.lang-right button{

    border:none;

    background:#e2e8f0;

    border-radius:18px;

    padding:7px 12px;

    font-size:12px;

    font-weight:700;

    cursor:pointer;

}

/* =========================
HERO
========================= */

.hero{

    width:100%;

    height:460px;

    position:relative;

    overflow:hidden;

    background:#0f172a;

}

/* 🔥 الصورة */

.hero img{

    width:100%;

    height:100%;

    object-fit:contain;

    object-position:center bottom;

    transform:scale(1.55)
    translateY(40px);

    filter:brightness(.96);

}

/* =========================
POWERED
========================= */

.powered-by{

    position:absolute;

    left:15px;

    bottom:15px;

    color:#fff;

    font-size:12px;

    font-weight:700;

    background:rgba(0,0,0,.35);

    padding:7px 12px;

    border-radius:20px;

    backdrop-filter:blur(5px);

}

/* =========================
ABOUT
========================= */

.about{

    max-width:1000px;

    margin:auto;

    text-align:center;

    padding:55px 20px 35px;

}

.about h2{

    font-size:36px;

    margin-bottom:16px;

}

.about p{

    color:#64748b;

    line-height:1.9;

    font-size:17px;

}

/* =========================
QUOTE HEADER
========================= */

.quote-header{

    text-align:center;

    padding:10px 20px 25px;

}

.quote-header h2{

    font-size:34px;

    margin-bottom:10px;

}

.quote-header p{

    color:#64748b;

    font-size:16px;

}

/* =========================
SERVICES
========================= */

.services-wrapper{

    max-width:1450px;

    margin:auto;

    padding:0 20px 40px;

}

.services{

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:24px;

}

.card{

    width:300px;

    background:#fff;

    border-radius:24px;

    overflow:hidden;

    box-shadow:0 10px 30px rgba(0,0,0,.08);

    transition:.25s;

}

.card:hover{
    transform:translateY(-4px);
}

.card img{

    width:100%;

    height:190px;

    object-fit:cover;

}

.card-content{

    padding:18px;

    text-align:center;

}

.card h3{

    margin-top:0;

    font-size:27px;

}

.card p{

    color:#64748b;

    line-height:1.7;

    min-height:52px;

}

.btn{

    display:inline-block;

    margin-top:15px;

    text-decoration:none;

    background:#2563eb;

    color:#fff;

    padding:12px 20px;

    border-radius:14px;

    font-weight:700;

}

/* =========================
CUSTOM BOX
========================= */

.custom-section{

    padding:10px 20px 45px;

}

.custom-box{

    max-width:1400px;

    margin:auto;

    background:#fff;

    border:2px dashed #cbd5e1;

    border-radius:28px;

    padding:55px 20px;

    text-align:center;

    color:#94a3b8;

    font-size:24px;

    font-weight:700;

}

/* =========================
CONTACT
========================= */

.contact-section{

    text-align:center;

    padding:50px 20px;

    line-height:2;

    font-size:17px;

}

/* =========================
FOOTER
========================= */

footer{

    background:#0f172a;

    color:#fff;

    text-align:center;

    padding:20px;

    font-size:14px;

}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

    .top-bar{
        padding:8px;
    }

    .top-links a{

        font-size:11px;

        padding:6px 8px;

    }

    .lang-right button{

        font-size:10px;

        padding:5px 8px;

    }

    .hero{

        height:260px;

    }

    .hero img{

        transform:scale(1.9)
        translateY(28px);

    }

    .powered-by{

        left:10px;

        bottom:10px;

        font-size:9px;

    }

    .about h2,
    .quote-header h2{

        font-size:26px;

    }

    .about p,
    .quote-header p{

        font-size:14px;

    }

    .card{

        width:100%;

        max-width:340px;

    }

    .card img{

        height:180px;

    }

    .custom-box{

        font-size:18px;

        padding:35px 15px;

    }

}

</style>

</head>

<body>

<!-- =========================
TOP BAR
========================= -->

<div class="top-bar">

    <div class="top-links">

        <a href="companies/company-login.html"
        class="facility-login">

            Facility Login

        </a>

        <a href="login.html"
        class="staff-login">

            Staff Login

        </a>

    </div>

    <div class="lang-right">

        <button onclick="setLang('en')">
            English
        </button>

        <button onclick="setLang('es')">
            Spanish
        </button>

    </div>

</div>

<!-- =========================
HERO
========================= -->

<section class="hero">

    <!-- 🔥 الصورة بس -->
    <img
    src="assets/hero.jpeg"
    alt="GH Mobility">

    <!-- 🔥 Powered فقط -->
    <div class="powered-by">

        Powered by GH Mobility

    </div>

</section>

<!-- =========================
ABOUT
========================= -->

<section class="about">

    <h2
    data-en="About Us"
    data-es="Sobre nosotros">

        About Us

    </h2>

    <p
    data-en="Professional transportation services."
    data-es="Servicios profesionales de transporte.">

        Professional transportation services.

    </p>

</section>

<!-- =========================
QUOTE HEADER
========================= -->

<section class="quote-header">

    <h2
    data-en="Get Quote & Book Your Ride"
    data-es="Obtenga precio y reserve su viaje">

        Get Quote & Book Your Ride

    </h2>

    <p
    data-en="Select your service below"
    data-es="Seleccione su servicio abajo">

        Select your service below

    </p>

</section>

<!-- =========================
SERVICES
========================= -->

<div class="services-wrapper">

    <section class="services"
    id="servicesContainer">

    </section>

</div>

<!-- =========================
CUSTOM BOX
========================= -->

<section class="custom-section">

    <div class="custom-box"

    data-en="Future Custom Section"
    data-es="Sección personalizada futura">

        Future Custom Section

    </div>

</section>

<!-- =========================
CONTACT
========================= -->

<div class="contact-section">

    <strong
    data-en="Customer Support"
    data-es="Atención al cliente">

        Customer Support

    </strong>

    <br>

    📞 619-509-7197

    <br>

    📧 admin@ghmobility.com

</div>

<!-- =========================
FOOTER
========================= -->

<footer>

    © GH Mobility

</footer>

<script src="index.js"></script>

</body>
</html>
