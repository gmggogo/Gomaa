<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Sunbeam Transportation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="assets/app-icon.png">

<style>

/* ===== GLOBAL ===== */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Segoe UI,Arial;
  background:#f3f4f6;
}

/* ===== HERO ===== */

.hero{
  width:100%;
  background:#111827;
  padding:10px;
}

.hero img{
  width:100%;
  border-radius:20px;
}

/* ===== SERVICES ===== */

.services{
  max-width:1200px;
  margin:auto;
  padding:40px 15px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

/* ===== CARD ===== */

.card{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  display:flex;
  flex-direction:column;
}

.card img{
  width:100%;
  height:200px;
  object-fit:contain;
  background:#eee;
}

/* ===== CARD BODY FIX ===== */

.card-body{
  padding:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.card h3{
  width:100%;
  font-size:22px;
  margin-bottom:10px;
  text-align:center;
}

.card p{
  width:100%;
  font-size:15px;
  line-height:1.7;

  text-align:justify;
  text-align-last:center; /* مهم */
}

.card-btn{
  margin-top:15px;
  background:#2563eb;
  color:#fff;
  text-decoration:none;
  padding:12px;
  border-radius:12px;
  width:100%;
  text-align:center;
}

/* ===== ALIGN CONTROL ===== */

.align-left{ text-align:left !important; }
.align-right{ text-align:right !important; }
.align-center{ text-align:center !important; }
.align-justify{
  text-align:justify !important;
  text-align-last:center !important;
}

/* ===== MOBILE ===== */

@media(max-width:768px){
  .card h3{font-size:20px;}
  .card p{font-size:14px;}
}

</style>

</head>

<body>

<section class="hero">
  <img src="/assets/hero.jpeg">
</section>

<section id="servicesContainer" class="services"></section>

<script src="/core/branding.js"></script>

<script>

window.addEventListener("DOMContentLoaded", async ()=>{
  await Branding.load();
  Branding.renderHomepageCards("servicesContainer","en");
});

</script>

</body>
</html>
