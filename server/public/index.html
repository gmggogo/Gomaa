<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>GH Mobility</title>

<link rel="icon"
href="assets/app-icon.png">

<link rel="apple-touch-icon"
href="assets/app-icon.png">

<link rel="stylesheet"
href="style.css">

<style>

/* =========================
GLOBAL
========================= */

*{
    box-sizing:border-box;
}

body{

    margin:0;

    font-family:'Segoe UI',sans-serif;

    background:#f8fafc;

    color:#0f172a;

    overflow-x:hidden;

}

/* =========================
TOP BAR
========================= */

.top-bar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:12px 16px;

    background:#fff;

    position:sticky;

    top:0;

    z-index:999;

    box-shadow:0 2px 10px rgba(0,0,0,.06);

}

.top-links{

    display:flex;

    gap:10px;

}

.top-links a{

    text-decoration:none;

    color:#fff;

    padding:10px 16px;

    border-radius:14px;

    font-size:14px;

    font-weight:700;

}

.facility-login{
    background:#2563eb;
}

.staff-login{
    background:#111827;
}

.lang-right{

    display:flex;

    gap:8px;

}

.lang-right button{

    border:none;

    background:#e2e8f0;

    border-radius:18px;

    padding:8px 14px;

    font-size:13px;

    font-weight:700;

    cursor:pointer;

    color:#2563eb;

}

/* =========================
HERO
========================= */

.hero{

    width:100%;

    height:560px;

    position:relative;

    overflow:hidden;

    background:#111827;

}

/* =========================
HERO IMAGE
========================= */

.hero img{

    width:100%;

    height:100%;

    object-fit:contain;

    object-position:center bottom;

    transform:
    scale(1.75)
    translateY(85px);

    filter:brightness(.98);

}

/* =========================
POWERED
========================= */

.powered-by{

    position:absolute;

    left:18px;

    bottom:18px;

    background:rgba(0,0,0,.35);

    color:#fff;

    padding:8px 14px;

    border-radius:20px;

    font-size:12px;

    font-weight:700;

    backdrop-filter:blur(6px);

}

/* =========================
ABOUT
========================= */

.about{

    max-width:1000px;

    margin:auto;

    text-align:center;

    padding:60px 20px 40px;

}

.about h2{

    font-size:42px;

    margin-bottom:18px;

    color:#1e3a5f;

}

.about p{

    color:#64748b;

    line-height:1.9;

    font-size:19px;

}

/* =========================
QUOTE HEADER
========================= */

.quote-header{

    text-align:center;

    padding:20px;

}

.quote-header h2{

    font-size:48px;

    line-height:1.2;

    margin-bottom:14px;

    color:#1e3a5f;

}

.quote-header p{

    color:#64748b;

    font-size:20px;

}

/* =========================
SERVICES
========================= */

.services-wrapper{

    max-width:1500px;

    margin:auto;

    padding:20px 20px 60px;

}

.services{

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:28px;

}

/* =========================
CARD
========================= */

.card{

    width:310px;

    background:#fff;

    border-radius:26px;

    overflow:hidden;

    box-shadow:0 12px 35px rgba(0,0,0,.08);

    transition:.25s;

}

.card:hover{

    transform:translateY(-5px);

}

.card img{

    width:100%;

    height:210px;

    object-fit:cover;

}

.card-content{

    padding:22px;

    text-align:center;

}

.card h3{

    margin-top:0;

    margin-bottom:10px;

    font-size:30px;

    color:#1e3a5f;

}

.card p{

    color:#64748b;

    line-height:1.7;

    min-height:60px;

    font-size:16px;

}

.btn{

    display:inline-block;

    margin-top:18px;

    text-decoration:none;

    background:#2563eb;

    color:#fff;

    padding:13px 24px;

    border-radius:14px;

    font-weight:700;

    font-size:15px;

}

/* =========================
CUSTOM BOX
========================= */

.custom-section{

    padding:0 20px 60px;

}

.custom-box{

    max-width:1450px;

    margin:auto;

    background:#fff;

    border:2px dashed #cbd5e1;

    border-radius:28px;

    padding:60px 20px;

    text-align:center;

    color:#94a3b8;

    font-size:26px;

    font-weight:700;

}

/* =========================
CONTACT
========================= */

.contact-section{

    text-align:center;

    padding:60px 20px;

    line-height:2.1;

    font-size:18px;

}

/* =========================
FOOTER
========================= */

footer{

    background:#0f172a;

    color:#fff;

    text-align:center;

    padding:22px;

    font-size:14px;

}

/* =========================
MOBILE HERO FIX
========================= */

@media(max-width:768px){

    .hero{

        height:250px !important;

        background:#111827;

    }

    .hero img{

        width:100%;

        height:100%;

        object-fit:cover !important;

        object-position:center bottom !important;

        /* 🔥 أهم تعديل */
        transform:none !important;

        filter:brightness(.98);

    }

    .powered-by{

        left:12px;

        bottom:12px;

        font-size:10px;

        padding:7px 12px;

    }

}

    /* ABOUT */

    .about{

        padding:45px 18px 30px;

    }

    .about h2{

        font-size:28px;

    }

    .about p{

        font-size:15px;

    }

    /* QUOTE */

    .quote-header h2{

        font-size:30px;

    }

    .quote-header p{

        font-size:16px;

    }

    /* CARDS */

    .services{

        gap:20px;

    }

    .card{

        width:100%;

        max-width:360px;

    }

    .card img{

        height:220px;

    }

    .card h3{

        font-size:26px;

    }

    .card p{

        font-size:15px;

    }

    .btn{

        width:100%;

        text-align:center;

    }

    /* CUSTOM */

    .custom-box{

        font-size:19px;

        padding:40px 16px;

    }

    /* CONTACT */

    .contact-section{

        font-size:16px;

    }

}

</style>

</head>

<body>

<!-- =========================
TOP BAR
========================= -->

<div class="top-bar">

    <div class="top-links">

        <a href="companies/company-login.html"
        class="facility-login">

            Facility Login

        </a>

        <a href="login.html"
        class="staff-login">

            Staff Login

        </a>

    </div>

    <div class="lang-right">

        <button onclick="setLang('en')">

            English

        </button>

        <button onclick="setLang('es')">

            Spanish

        </button>

    </div>

</div>

<!-- =========================
HERO
========================= -->

<section class="hero">

    <img
    src="assets/hero.jpeg"
    alt="GH Mobility">

    <div class="powered-by">

        Powered by GH Mobility

    </div>

</section>

<!-- =========================
ABOUT
========================= -->

<section class="about">

    <h2
    data-en="About Us"
    data-es="Sobre nosotros">

        About Us

    </h2>

    <p
    data-en="Professional transportation services."
    data-es="Servicios profesionales de transporte.">

        Professional transportation services.

    </p>

</section>

<!-- =========================
QUOTE HEADER
========================= -->

<section class="quote-header">

    <h2
    data-en="Get Quote & Book Your Ride"
    data-es="Obtenga precio y reserve su viaje">

        Get Quote & Book Your Ride

    </h2>

    <p
    data-en="Select your service below"
    data-es="Seleccione su servicio abajo">

        Select your service below

    </p>

</section>

<!-- =========================
SERVICES
========================= -->

<div class="services-wrapper">

    <section class="services"
    id="servicesContainer">

    </section>

</div>

<!-- =========================
CUSTOM BOX
========================= -->

<section class="custom-section">

    <div class="custom-box"

    data-en="Future Custom Section"
    data-es="Sección personalizada futura">

        Future Custom Section

    </div>

</section>

<!-- =========================
CONTACT
========================= -->

<div class="contact-section">

    <strong
    data-en="Customer Support"
    data-es="Atención al cliente">

        Customer Support

    </strong>

    <br>

    📞 619-509-7197

    <br>

    📧 admin@ghmobility.com

</div>

<!-- =========================
FOOTER
========================= -->

<footer>

    © GH Mobility

</footer>

<script src="index.js"></script>

</body>
</html>
