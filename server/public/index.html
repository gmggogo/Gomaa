<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>GH Mobility</title>

<link rel="icon"
href="assets/app-icon.png">

<link rel="apple-touch-icon"
href="assets/app-icon.png">

<style>

/* =========================
GLOBAL
========================= */

*{
    box-sizing:border-box;
}

html,
body{

    margin:0;
    padding:0;

    font-family:
    'Segoe UI',
    sans-serif;

    background:#f1f5f9;

    color:#0f172a;

    overflow-x:hidden;

}

/* =========================
TOP BAR
========================= */

.top-bar{

    width:100%;

    display:flex;

    justify-content:
    space-between;

    align-items:center;

    padding:14px 18px;

    background:#ffffff;

    position:sticky;

    top:0;

    z-index:999;

    box-shadow:
    0 2px 12px
    rgba(0,0,0,.06);

}

.top-left,
.top-right{

    display:flex;

    align-items:center;

    gap:10px;

}

/* =========================
BUTTONS
========================= */

.top-btn{

    border:none;

    text-decoration:none;

    cursor:pointer;

    display:flex;

    align-items:center;

    justify-content:center;

    min-height:44px;

    padding:10px 18px;

    border-radius:14px;

    font-size:14px;

    font-weight:700;

    transition:.2s;

    white-space:nowrap;

}

.facility-btn{

    background:#2563eb;

    color:#fff;

}

.staff-btn{

    background:#0f172a;

    color:#fff;

}

.lang-btn{

    background:#e2e8f0;

    color:#2563eb;

}

.active-lang{

    background:#16a34a !important;

    color:#fff !important;

}

/* =========================
HERO
========================= */

.hero{

    width:100%;

    height:520px;

    background:#111827;

    position:relative;

    overflow:hidden;

}

.hero img{

    width:100%;

    height:100%;

    object-fit:contain;

    object-position:center center;

    display:block;

}

/* =========================
POWERED
========================= */

.powered-by{

    position:absolute;

    left:18px;

    bottom:18px;

    background:
    rgba(0,0,0,.45);

    color:#fff;

    padding:10px 18px;

    border-radius:24px;

    font-size:13px;

    font-weight:700;

    backdrop-filter:
    blur(5px);

}

/* =========================
ABOUT
========================= */

.about{

    max-width:1100px;

    margin:auto;

    text-align:center;

    padding:
    70px 20px
    40px;

}

.about h2{

    margin:0 0 20px;

    font-size:48px;

    color:#1e3a5f;

}

.about p{

    margin:0;

    color:#64748b;

    font-size:20px;

    line-height:1.9;

}

/* =========================
QUOTE
========================= */

.quote-header{

    text-align:center;

    padding:
    10px 20px
    30px;

}

.quote-header h2{

    margin:0 0 16px;

    font-size:54px;

    line-height:1.15;

    color:#1e3a5f;

}

.quote-header p{

    margin:0;

    color:#64748b;

    font-size:20px;

}

/* =========================
SERVICES
========================= */

.services{

    max-width:1500px;

    margin:auto;

    padding:
    20px
    20px
    80px;

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:28px;

}

/* =========================
CARD
========================= */

.card{

    width:300px;

    background:#fff;

    border-radius:28px;

    overflow:hidden;

    box-shadow:
    0 10px 30px
    rgba(0,0,0,.08);

    transition:.25s;

}

.card:hover{

    transform:
    translateY(-4px);

}

.card img{

    width:100%;

    height:210px;

    object-fit:cover;

    display:block;

}

.card-content{

    padding:22px;

    text-align:center;

}

.card h3{

    margin:
    0 0 10px;

    font-size:30px;

    color:#1e3a5f;

}

.card p{

    margin:0;

    min-height:60px;

    color:#64748b;

    font-size:16px;

    line-height:1.7;

}

.card-btn{

    display:inline-block;

    margin-top:18px;

    background:#2563eb;

    color:#fff;

    text-decoration:none;

    padding:
    13px 24px;

    border-radius:14px;

    font-size:15px;

    font-weight:700;

}

/* =========================
CUSTOM SECTION
========================= */

.custom-section{

    padding:
    0 20px 70px;

}

.custom-box{

    max-width:1450px;

    margin:auto;

    background:#fff;

    border:
    2px dashed #cbd5e1;

    border-radius:30px;

    padding:
    70px 20px;

    text-align:center;

    font-size:28px;

    color:#94a3b8;

    font-weight:700;

}

/* =========================
CONTACT
========================= */

.contact-section{

    text-align:center;

    padding:
    70px 20px;

    line-height:2.1;

    font-size:18px;

}

/* =========================
FOOTER
========================= */

footer{

    background:#0f172a;

    color:#fff;

    text-align:center;

    padding:24px;

    font-size:14px;

}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

    /* TOP */

    .top-bar{

        padding:10px;

        gap:8px;

    }

    .top-left,
    .top-right{

        gap:8px;

    }

    .top-btn{

        min-height:38px;

        padding:
        8px 12px;

        border-radius:12px;

        font-size:12px;

    }

    /* HERO */

    .hero{

        height:430px;

    }

    .hero img{

        object-fit:cover;

        object-position:center center;

    }

    .powered-by{

        left:14px;

        bottom:14px;

        font-size:12px;

        padding:
        9px 14px;

    }

    /* ABOUT */

    .about{

        padding:
        50px 18px
        30px;

    }

    .about h2{

        font-size:34px;

    }

    .about p{

        font-size:17px;

    }

    /* QUOTE */

    .quote-header h2{

        font-size:34px;

    }

    .quote-header p{

        font-size:16px;

    }

    /* SERVICES */

    .services{

        gap:22px;

        padding:
        20px 18px
        60px;

    }

    .card{

        width:100%;

        max-width:380px;

    }

    .card img{

        height:230px;

    }

    .card h3{

        font-size:28px;

    }

    .card-btn{

        width:100%;

        text-align:center;

    }

    /* CUSTOM */

    .custom-box{

        font-size:22px;

        padding:
        50px 18px;

    }

    /* CONTACT */

    .contact-section{

        font-size:16px;

    }

}

</style>

</head>

<body>

<!-- =========================
TOP BAR
========================= -->

<div class="top-bar">

    <!-- LEFT -->

    <div class="top-left">

        <a
        href="companies/company-login.html"
        class="
        top-btn
        facility-btn">

            Facility Login

        </a>

        <a
        href="login.html"

        staff-btn">

        </a>

    </div>

    <!-- RIGHT -->

    <div class="top-right">

        <button
        id="lang-en"
        class="
        top-btn
        lang-btn
        active-lang"

            English

        </button>

        <button
        id="lang-es"

        top-btn
        lang-btn"

        </button>

</div>

<!-- =========================
HERO
========================= -->

<section class="hero">

    <img
    src="assets/hero.jpeg"
    alt="GH Mobility">

    <div class="powered-by">

        Powered by GH Mobility

    </div>

</section>

<!-- =========================
ABOUT
========================= -->

<section class="about">

    <h2

    data-en="About Us"

    data-es="Sobre nosotros">

        About Us

    <p

    data-en="
    Professional transportation services.
    "

    data-es="

</section>

<!-- =========================
QUOTE
========================= -->

<section class="quote-header">

    <h2

    data-en="
    Get Quote & Book Your Ride

    data-es="
    Obtenga precio y reserve su viaje

        Get Quote & Book Your Ride

    <p

    data-en="
    Select your service below
    "

        Select your service below

</section>

<!-- =========================
SERVICES
========================= -->

<section
class="services"

id="servicesContainer">

</section>

<!-- =========================
CUSTOM SECTION
========================= -->

<section class="custom-section">

    <div

    class="custom-box"

    data-en="
    Future Custom Section
    "

    Sección personalizada futura

        Future Custom Section

</section>

<!-- =========================
CONTACT
========================= -->

<div class="contact-section">

    <strong

    data-en="
    Customer Support
    "

    data-es="
    Atención al cliente
    ">

        Customer Support

    </strong>

    <br>

    📞 619-509-7197

    <br>

    📧 admin@ghmobility.com

</div>

<!-- =========================
FOOTER
========================= -->

<footer>

    © GH Mobility

</footer>

<!-- =========================
LANGUAGE SCRIPT
========================= -->

<script>

function setLang(lang){

    /* TEXT */

    document
    .querySelectorAll("[data-en]")
    .forEach(el=>{

        const value =
        el.getAttribute(
            "data-" + lang
        );

        if(value){

            el.innerText = value;

        }

    });

    /* REMOVE ACTIVE */

    document
    .querySelectorAll(".lang-btn")
    .forEach(btn=>{

        btn.classList.remove(
            "active-lang"
        );

    });

    /* ADD ACTIVE */

    const activeBtn =
    document.getElementById(
        "lang-" + lang
    );

    if(activeBtn){

        activeBtn.classList.add(
            "active-lang"
        );

    }

}

window.addEventListener(
"DOMContentLoaded",
()=>{

    setLang("en");

});

</script>

<script src="index.js"></script>

</body>
</html>
