<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>
Sunbeam Transportation
</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="icon"
href="assets/app-icon.png">

<link rel="apple-touch-icon"
href="assets/app-icon.png">

<style>

/* =========================
GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    font-family:
    'Segoe UI',
    Arial,
    sans-serif;

    background:#f3f4f6;

    overflow-x:hidden;

    color:#0f172a;

    width:100%;

}

/* =========================
TOP BAR
========================= */

.top-bar{

    width:100%;

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:20px;

    padding:20px 34px;

    background:#f8fafc;

    flex-wrap:wrap;

    position:sticky;

    top:0;

    z-index:999;

    box-shadow:
    0 2px 12px rgba(0,0,0,.05);

}

/* =========================
LEFT BUTTONS
========================= */

.top-links{

    display:flex;

    gap:14px;

    flex-wrap:wrap;

}

.top-links a{

    text-decoration:none;

    padding:15px 28px;

    border-radius:18px;

    font-size:16px;

    font-weight:800;

    color:#fff;

    transition:.2s;

}

.top-links a:hover{

    transform:translateY(-2px);

}

.facility-login{

    background:#2563eb;

}

.staff-login{

    background:#0f172a;

}

/* =========================
LANGUAGE
========================= */

.lang-right{

    display:flex;

    gap:12px;

    flex-wrap:wrap;

}

.lang-btn{

    border:none;

    cursor:pointer;

    padding:15px 24px;

    border-radius:18px;

    font-size:16px;

    font-weight:800;

    background:#dbe1ea;

    color:#2563eb;

    transition:.2s;

}

.active-lang{

    background:#16a34a !important;

    color:#fff !important;

}

/* =========================
HERO
========================= */

.hero{

    width:100%;

    background:#111827;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    padding:24px;

}

.hero-inner{

    position:relative;

    width:100%;

    max-width:1900px;

}

.hero-inner::after{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
    to top,
    rgba(0,0,0,.45),
    rgba(0,0,0,.08)
    );

    border-radius:32px;

    pointer-events:none;

}

.hero-image{

    width:100%;

    height:620px;

    object-fit:cover;

    display:block;

    border-radius:32px;

}

/* =========================
POWERED
========================= */

.powered-box{

    position:absolute;

    left:30px;

    bottom:30px;

    z-index:5;

    background:rgba(0,0,0,.75);

    color:#fff;

    padding:16px 28px;

    border-radius:40px;

    font-size:16px;

    font-weight:800;

    backdrop-filter:blur(8px);

}

/* =========================
ABOUT
========================= */

.about{

    text-align:center;

    padding:100px 30px 50px;

}

.about h2{

    font-size:72px;

    color:#1e3a6d;

    margin-bottom:24px;

    font-weight:900;

}

.about p{

    font-size:28px;

    color:#6b7280;

    max-width:1400px;

    margin:auto;

    line-height:2;

}

/* =========================
QUOTE
========================= */

.quote-header{

    text-align:center;

    padding:50px 30px 34px;

}

.quote-header h2{

    font-size:80px;

    color:#1e3a6d;

    margin-bottom:20px;

    line-height:1.1;

    font-weight:900;

}

.quote-header p{

    font-size:28px;

    color:#6b7280;

    max-width:1400px;

    margin:auto;

    line-height:2;

}

/* =========================
SERVICES
========================= */

.services{

    width:100%;

    max-width:2400px;

    margin:auto;

    padding:50px 60px 120px;

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    align-items:stretch;

    gap:38px;

}

/* =========================
CARD
========================= */

.card{

    flex:1 1 420px;

    min-width:380px;

    max-width:460px;

    background:#fff;

    border-radius:30px;

    overflow:hidden;

    box-shadow:
    0 10px 28px rgba(15,23,42,.08);

    transition:.25s;

    display:flex;

    flex-direction:column;

}

.card:hover{

    transform:
    translateY(-8px);

    box-shadow:
    0 18px 40px rgba(37,99,235,.18);

}

.card-image{

    width:100%;

    height:300px;

    object-fit:cover;

    background:#e2e8f0;

    transition:.35s;

}

.card:hover .card-image{

    transform:scale(1.04);

}

.card-body{

    padding:30px;

    text-align:center;

    display:flex;

    flex-direction:column;

    flex:1;

}

.card h3{

    font-size:36px;

    margin-bottom:16px;

    color:#111827;

    font-weight:900;

    line-height:1.3;

    word-break:break-word;

}

.card p{

    font-size:20px;

    color:#6b7280;

    line-height:2;

    flex:1;

    word-break:break-word;

}

.card-btn{

    display:flex;

    align-items:center;

    justify-content:center;

    width:100%;

    min-height:64px;

    padding:18px;

    margin-top:26px;

    background:#2563eb;

    color:#fff !important;

    text-decoration:none;

    border-radius:18px;

    font-size:22px;

    font-weight:900;

    letter-spacing:.3px;

    transition:.2s;

    box-shadow:
    0 8px 20px rgba(37,99,235,.25);

    text-align:center;

}

.card-btn:hover{

    background:#1d4ed8;

}

/* =========================
EXTRA
========================= */

.extra-sections{

    width:100%;

    max-width:2200px;

    margin:auto;

    padding:30px 60px 120px;

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    align-items:stretch;

    gap:38px;

}

.extra-box{

    flex:1 1 850px;

    min-width:500px;

    max-width:1000px;

    background:#fff;

    border-radius:32px;

    padding:50px;

    box-shadow:
    0 12px 34px rgba(0,0,0,.08);

    transition:.25s;

}

.extra-box:hover{

    transform:
    translateY(-6px);

    box-shadow:
    0 18px 44px rgba(37,99,235,.14);

}

.extra-box h3{

    font-size:52px;

    color:#1e3a6d;

    margin-bottom:28px;

    font-weight:900;

    line-height:1.3;

    word-break:break-word;

}

.extra-box p{

    font-size:28px;

    color:#6b7280;

    line-height:2.2;

    word-break:break-word;

}

/* =========================
CONTACT
========================= */

.contact-section{

    text-align:center;

    padding:100px 30px;

    background:#fff;

    font-size:28px;

    line-height:2.3;

    color:#111827;

}

.contact-section strong{

    font-size:52px;

    color:#111827;

}

/* =========================
FOOTER
========================= */

footer{

    background:#111827;

    color:#fff;

    text-align:center;

    padding:36px;

    font-size:22px;

    font-weight:800;

}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

    .top-bar{

        flex-direction:column;

        align-items:stretch;

        gap:12px;

        padding:14px;

    }

    .top-links,
    .lang-right{

        width:100%;

        display:grid;

        grid-template-columns:1fr 1fr;

        gap:10px;

    }

    .top-links a,
    .lang-btn{

        width:100%;

        text-align:center;

        font-size:13px;

        padding:12px 8px;

        border-radius:12px;

    }

    .hero{

        padding:0;

    }

    .hero-inner::after{

        border-radius:0;

    }

    .hero-image{

        height:340px;

        border-radius:0;

    }

    .powered-box{

        left:12px;

        bottom:12px;

        font-size:11px;

        padding:8px 14px;

    }

    .about{

        padding:60px 16px 20px;

    }

    .about h2{

        font-size:40px;

    }

    .about p{

        font-size:18px;

    }

    .quote-header{

        padding:36px 16px 18px;

    }

    .quote-header h2{

        font-size:50px;

    }

    .quote-header p{

        font-size:18px;

    }

    .services{

        padding:20px 16px 70px;

        display:flex;

        flex-direction:column;

        align-items:center;

        gap:24px;

    }

    .card{

        width:100%;

        min-width:100%;

        max-width:100%;

        border-radius:24px;

    }

    .card-image{

        height:240px;

    }

    .card-body{

        padding:24px;

    }

    .card h3{

        font-size:28px;

    }

    .card p{

        font-size:17px;

    }

    .card-btn{

        font-size:18px;

        min-height:56px;

    }

    .extra-sections{

        padding:16px 16px 80px;

        flex-direction:column;

        align-items:center;

        gap:22px;

    }

    .extra-box{

        width:100%;

        min-width:100%;

        max-width:100%;

        padding:32px;

        border-radius:24px;

    }

    .extra-box h3{

        font-size:34px;

    }

    .extra-box p{

        font-size:18px;

        line-height:2;

    }

    .contact-section{

        font-size:18px;

        padding:60px 14px;

    }

    .contact-section strong{

        font-size:34px;

    }

    footer{

        font-size:18px;

    }

}

</style>

</head>

<body>

<!-- بقيت الصفحة زي ما هي بدون تغيير -->

</body>
</html>
