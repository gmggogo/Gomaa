<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>
Sunbeam Transportation
</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="icon"
href="assets/app-icon.png">

<link rel="apple-touch-icon"
href="assets/app-icon.png">

<style>

/* =========================
GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:
    'Segoe UI',
    Arial,
    sans-serif;

    background:#f3f4f6;

    overflow-x:hidden;

    color:#0f172a;

}

/* =========================
TOP BAR
========================= */

.top-bar{

    width:100%;

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:20px;

    padding:18px 24px;

    background:#f8fafc;

    flex-wrap:wrap;

    position:sticky;

    top:0;

    z-index:999;

    box-shadow:
    0 2px 10px rgba(0,0,0,.05);

}

/* =========================
LEFT BUTTONS
========================= */

.top-links{

    display:flex;

    gap:12px;

    flex-wrap:wrap;

}

.top-links a{

    text-decoration:none;

    padding:14px 24px;

    border-radius:16px;

    font-size:16px;

    font-weight:700;

    color:#fff;

    transition:.2s;

}

.top-links a:hover{

    transform:translateY(-2px);

}

.facility-login{

    background:#2563eb;

}

.staff-login{

    background:#0f172a;

}

/* =========================
LANGUAGE
========================= */

.lang-right{

    display:flex;

    gap:12px;

    flex-wrap:wrap;

}

.lang-btn{

    border:none;

    cursor:pointer;

    padding:14px 22px;

    border-radius:16px;

    font-size:16px;

    font-weight:700;

    background:#dbe1ea;

    color:#2563eb;

    transition:.2s;

}

.active-lang{

    background:#16a34a !important;

    color:#fff !important;

}

/* =========================
HERO
========================= */

.hero{

    width:100%;

    background:#111827;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    padding:20px;

}

.hero-inner{

    position:relative;

    width:100%;

    max-width:1500px;

}

.hero-image{

    width:100%;

    display:block;

    border-radius:28px;

}

/* =========================
POWERED
========================= */

.powered-box{

    position:absolute;

    left:26px;

    bottom:26px;

    background:rgba(0,0,0,.75);

    color:#fff;

    padding:14px 24px;

    border-radius:40px;

    font-size:15px;

    font-weight:700;

    backdrop-filter:blur(8px);

}

/* =========================
ABOUT
========================= */

.about{

    text-align:center;

    padding:90px 20px 40px;

}

.about h2{

    font-size:60px;

    color:#1e3a6d;

    margin-bottom:20px;

    font-weight:900;

}

.about p{

    font-size:25px;

    color:#6b7280;

    max-width:1100px;

    margin:auto;

    line-height:1.9;

}

/* =========================
QUOTE
========================= */

.quote-header{

    text-align:center;

    padding:40px 20px 24px;

}

.quote-header h2{

    font-size:70px;

    color:#1e3a6d;

    margin-bottom:18px;

    line-height:1.1;

    font-weight:900;

}

.quote-header p{

    font-size:24px;

    color:#6b7280;

    max-width:1000px;

    margin:auto;

    line-height:1.8;

}

/* =========================
SERVICES
========================= */

.services{

    width:100%;

    max-width:1700px;

    margin:auto;

    padding:40px 20px 80px;

    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    align-items:stretch;

    gap:28px;

}

/* =========================
CARD
========================= */

.card{

    width:320px;

    background:#fff;

    border-radius:26px;

    overflow:hidden;

    box-shadow:
    0 10px 30px rgba(0,0,0,.10);

    transition:.25s;

    display:flex;

    flex-direction:column;

}

.card:hover{

    transform:
    translateY(-8px);

    box-shadow:
    0 16px 40px rgba(37,99,235,.18);

}

.card-image{

    width:100%;

    height:240px;

    object-fit:cover;

    display:block;

    background:#e2e8f0;

}

.card-body{

    padding:24px;

    text-align:center;

    display:flex;

    flex-direction:column;

    flex:1;

}

.card h3{

    font-size:30px;

    margin-bottom:12px;

    color:#111827;

    font-weight:800;

}

.card p{

    font-size:17px;

    color:#6b7280;

    line-height:1.7;

    flex:1;

}

.card-btn{

    display:flex;

    align-items:center;

    justify-content:center;

    width:100%;

    height:58px;

    margin-top:20px;

    background:#2563eb;

    color:#fff !important;

    text-decoration:none;

    border-radius:16px;

    font-size:20px;

    font-weight:800;

    transition:.2s;

}

.card-btn:hover{

    background:#1d4ed8;

}

/* =========================
EXTRA
========================= */

.extra-sections{

    width:100%;

    padding:20px 20px 80px;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(420px,1fr));

    gap:28px;

    max-width:1500px;

    margin:auto;

}

.extra-box{

    background:#fff;

    border-radius:28px;

    padding:36px;

    box-shadow:
    0 10px 30px rgba(0,0,0,.08);

    transition:.25s;

}

.extra-box:hover{

    transform:
    translateY(-6px);

    box-shadow:
    0 16px 40px rgba(37,99,235,.14);

}

.extra-box h3{

    font-size:42px;

    color:#1e3a6d;

    margin-bottom:22px;

    font-weight:900;

    line-height:1.2;

}

.extra-box p{

    font-size:22px;

    color:#6b7280;

    line-height:2;

}

/* =========================
CONTACT
========================= */

.contact-section{

    text-align:center;

    padding:80px 20px;

    background:#fff;

    font-size:24px;

    line-height:2.2;

    color:#111827;

}

.contact-section strong{

    font-size:42px;

    color:#111827;

}

/* =========================
FOOTER
========================= */

footer{

    background:#111827;

    color:#fff;

    text-align:center;

    padding:30px;

    font-size:20px;

    font-weight:700;

}

/* =========================
MOBILE
========================= */

@media(max-width:768px){

    .top-bar{

        flex-direction:column;

        align-items:stretch;

        gap:12px;

        padding:14px;

    }

    .top-links,
    .lang-right{

        width:100%;

        display:grid;

        grid-template-columns:1fr 1fr;

        gap:10px;

    }

    .top-links a,
    .lang-btn{

        width:100%;

        text-align:center;

        font-size:13px;

        padding:12px 8px;

        border-radius:12px;

    }

    .hero{

        padding:0;

    }

    .hero-image{

        border-radius:0;

    }

    .powered-box{

        left:12px;

        bottom:12px;

        font-size:11px;

        padding:8px 14px;

    }

    .about{

        padding:60px 16px 20px;

    }

    .about h2{

        font-size:38px;

    }

    .about p{

        font-size:18px;

        line-height:1.9;

    }

    .quote-header{

        padding:36px 16px 18px;

    }

    .quote-header h2{

        font-size:50px;

    }

    .quote-header p{

        font-size:18px;

        line-height:1.8;

    }

    .services{

        padding:20px 14px 50px;

        justify-content:center;

        gap:22px;

    }

    .card{

        width:100%;

        max-width:420px;

        border-radius:22px;

    }

    .card-image{

        height:240px;

    }

    .card-body{

        padding:20px;

    }

    .card h3{

        font-size:26px;

    }

    .card p{

        font-size:16px;

    }

    .card-btn{

        height:54px;

        font-size:18px;

    }

    .extra-sections{

        padding:14px;

        grid-template-columns:1fr;

        gap:18px;

    }

    .extra-box{

        padding:28px;

        border-radius:24px;

    }

    .extra-box h3{

        font-size:32px;

    }

    .extra-box p{

        font-size:18px;

        line-height:1.9;

    }

    .contact-section{

        font-size:18px;

        padding:60px 14px;

    }

    .contact-section strong{

        font-size:32px;

    }

    footer{

        font-size:18px;

    }

}

</style>

</head>
<body>
