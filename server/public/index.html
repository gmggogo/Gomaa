<script src="/core/branding.js"></script>

<script>

let currentLang = "en";

/* =========================
LANG BUTTONS
========================= */

function updateLangButtons(){

    document
    .querySelectorAll(".lang-btn")
    .forEach(btn=>{

        btn.classList.remove(
            "active-lang"
        );

    });

    if(currentLang === "en"){

        document
        .getElementById("lang-en")
        .classList.add(
            "active-lang"
        );

    }

    if(currentLang === "es"){

        document
        .getElementById("lang-es")
        .classList.add(
            "active-lang"
        );

    }

}

/* =========================
RENDER PAGE
========================= */

function renderPage(){

    const data =
    Branding.data || {};

    /* =========================
    ABOUT
    ========================= */

    document.getElementById(
    "aboutTitle"
    ).innerText =

    currentLang === "es"
    ? (
        data.aboutTitleEs ||
        data.aboutTitle ||
        "Transporte profesional en Arizona"
      )
    : (
        data.aboutTitle ||
        "Professional Transportation Across Arizona"
      );

    document.getElementById(
    "aboutText"
    ).innerText =

    currentLang === "es"
    ? (
        data.aboutTextEs ||
        data.aboutText ||
        ""
      )
    : (
        data.aboutText ||
        ""
      );

    /* =========================
    QUOTE
    ========================= */

    document.getElementById(
    "quoteTitle"
    ).innerText =

    currentLang === "es"
    ? (
        data.quoteTitleEs ||
        data.quoteTitle ||
        ""
      )
    : (
        data.quoteTitle ||
        ""
      );

    document.getElementById(
    "quoteText"
    ).innerText =

    currentLang === "es"
    ? (
        data.quoteTextEs ||
        data.quoteText ||
        ""
      )
    : (
        data.quoteText ||
        ""
      );

    /* =========================
    EXTRA BOX 1
    ========================= */

    document.getElementById(
    "extra1TitleView"
    ).innerText =

    currentLang === "es"
    ? (
        data.extra1TitleEs ||
        data.extra1Title ||
        ""
      )
    : (
        data.extra1Title ||
        ""
      );

    document.getElementById(
    "extra1TextView"
    ).innerHTML =

    currentLang === "es"
    ? (
        data.extra1TextEs ||
        data.extra1Text ||
        ""
      )
    : (
        data.extra1Text ||
        ""
      );

    /* =========================
    EXTRA BOX 2
    ========================= */

    document.getElementById(
    "extra2TitleView"
    ).innerText =

    currentLang === "es"
    ? (
        data.extra2TitleEs ||
        data.extra2Title ||
        ""
      )
    : (
        data.extra2Title ||
        ""
      );

    document.getElementById(
    "extra2TextView"
    ).innerHTML =

    currentLang === "es"
    ? (
        data.extra2TextEs ||
        data.extra2Text ||
        ""
      )
    : (
        data.extra2Text ||
        ""
      );

    /* =========================
    SHOW / HIDE EXTRA BOXES
    ========================= */

    const extra1 =
    document.getElementById(
    "extraBox1"
    );

    const extra2 =
    document.getElementById(
    "extraBox2"
    );

    if(extra1){

        extra1.style.display =
        data.extra1Active
        ? "block"
        : "none";

    }

    if(extra2){

        extra2.style.display =
        data.extra2Active
        ? "block"
        : "none";

    }

    /* =========================
    CONTACT
    ========================= */

    document.getElementById(
    "contactTitleView"
    ).innerText =

    currentLang === "es"
    ? (
        data.contactTitleEs ||
        data.contactTitle ||
        "Atención al cliente"
      )
    : (
        data.contactTitle ||
        "Customer Support"
      );

    document.getElementById(
    "contactPhoneView"
    ).innerText =

    data.contactPhone ||
    "619-509-7197";

    document.getElementById(
    "contactEmailView"
    ).innerText =

    data.contactEmail ||
    "admin@sunbeamtransportationllc.com";

    document.getElementById(
    "footerView"
    ).innerText =

    currentLang === "es"
    ? (
        data.footerTextEs ||
        data.footerText ||
        "©️ Sunbeam Transportation"
      )
    : (
        data.footerText ||
        "©️ Sunbeam Transportation"
      );

    /* =========================
    RENDER SERVICES
    ========================= */

    Branding.renderHomepageCards(
    "servicesContainer",
    currentLang
    );

    /* =========================
    APPLY THEME ENGINE
    ========================= */

    Branding.applyThemeEngine();

    /* =========================
    UPDATE GRID
    ========================= */

    updateServicesLayout();

    updateLangButtons();

}

/* =========================
SET LANGUAGE
========================= */

window.setLang = function(lang){

    currentLang = lang;

    renderPage();

};

/* =========================
SERVICES GRID
========================= */

function updateServicesLayout(){

    const services =
    document.getElementById(
    "servicesContainer"
    );

    if(!services) return;

    const count =
    services.querySelectorAll(".card").length;

    services.classList.remove(
        "layout-1",
        "layout-2",
        "layout-4",
        "layout-5"
    );

    if(count === 1){

        services.classList.add(
        "layout-1"
        );

    }

    else if(count === 2){

        services.classList.add(
        "layout-2"
        );

    }

    else if(count === 4){

        services.classList.add(
        "layout-4"
        );

    }

    else if(count === 5){

        services.classList.add(
        "layout-5"
        );

    }

}

/* =========================
INIT
========================= */

window.addEventListener(
"DOMContentLoaded",
async ()=>{

    await Branding.load();

    renderPage();

});

</script>
